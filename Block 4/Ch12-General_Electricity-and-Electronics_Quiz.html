const DRILL = [{"label": "Ohm's Law", "text": "I = E / R (current = volts / ohms); transposed: E = I x R and R = E / I. (p. 12-17/18)"}, {"label": "Watt's Law / Power", "text": "P = I x E; also P = I^2 x R; also P = E^2 / R. 1 horsepower = 746 watts. (p. 12-21/22)"}, {"label": "RMS value", "text": "RMS (effective) = 0.707 x peak; Peak = 1.414 x RMS. AC meters read the RMS (heating-effect) value. (p. 12-48/49)"}, {"label": "Average vs RMS trap", "text": "Average value = 0.637 x peak (DISTRACTOR); RMS = 0.707 x peak (CORRECT). Do not swap them. (p. 12-49)"}, {"label": "Meter connections", "text": "AMMETER = in SERIES (low resistance, never across a voltage source). VOLTMETER = in PARALLEL (high resistance, across two points). (p. 12-69/71)"}, {"label": "Current units", "text": "1 ampere = 1 coulomb/second; 1 coulomb = 6.28 billion electrons. Current symbol = I; emf symbol = E. (p. 12-17)"}, {"label": "Resistance factors", "text": "R is DIRECTLY proportional to length; INVERSELY proportional to cross-sectional area; rises with temperature (carbon is the exception). (p. 12-18/19)"}, {"label": "AWG rule", "text": "Decrease of 3 gauge numbers ~doubles area (2:1) and HALVES resistance. One gauge number = ~25% area change; 10 numbers = 10:1. (p. 12-20)"}, {"label": "Series vs Parallel", "text": "SERIES: same current, R adds up, voltage drops add to source. PARALLEL: same voltage, RT < smallest branch, currents add. (p. 12-34/39)"}, {"label": "Caps vs resistors trap", "text": "CAPACITORS: parallel ADDS (CT = C1+C2); series uses reciprocal (less than smallest). This is OPPOSITE to resistors. (p. 12-53)"}, {"label": "Reactance with frequency", "text": "XL = 2 pi f L RISES with frequency; XC = 1/(2 pi f C) FALLS with frequency. Both measured in ohms. (p. 12-54/58)"}, {"label": "Impedance & power factor", "text": "Z = sqrt(R^2 + X^2); RLC: X = XL - XC. Power factor = (true watts / apparent VA) x 100. (p. 12-60/64)"}, {"label": "Cell voltages", "text": "Lead-acid cell ~2 V (6 cells = 12 V, 12 cells = 24 V; ~2.2 V off charger). Ni-Cad cell ~1.25 V (electrolyte = KOH). (p. 12-89/91/92)"}, {"label": "Battery hookup & hydrometer", "text": "PARALLEL increases ampere-hour capacity (voltage same); SERIES increases voltage. Hydrometer reads specific gravity 1.100-1.300. (p. 12-89/90)"}, {"label": "Transformer / turns ratio", "text": "Voltage ratio = turns ratio (Np:Ns). Step up voltage = step down current. Iron losses = hysteresis + eddy current. (p. 12-65/67)"}, {"label": "Diode bias", "text": "FORWARD biased (neg to N, pos to P) = conducts. REVERSE biased = blocks, wider depletion zone. Rectifier converts AC to DC. (p. 12-98/100)"}];

    let opts='';

      const L='ABCD'[li];
      opts += '<button class="opt" data-li="'+li+'" onclick="QUIZ.pick('+li+')">'+
              '<span class="L">'+L+'</span><span class="T">'+esc(o)+'</span><span class="mark"></span></button>';
    });
    document.getElementById('cardmount').innerHTML =
      '<div class="card"><span class="tag">'+esc(q.topic)+'</span>'+
      '<div class="stem">'+esc(q.q)+'</div>'+
      '<div class="opts" id="opts">'+opts+'</div>'+
      '<div class="fb" id="fb"></div></div>';
    document.getElementById('nextbtn').disabled = true;
    document.getElementById('skipbtn').style.display = '';
    this.locked=false;
  },

  pick(li){
    if(this.locked) return;
    this.locked=true;
    const idx=this.order[this.i], q=DATA[idx];
    const wrapEl=document.getElementById('opts'); wrapEl.classList.add('locked');
    const btns=wrapEl.querySelectorAll('.opt');
    const ok = (li===q.correct);
    btns.forEach(b=>{
      const bl=+b.dataset.li;
      if(bl===q.correct){ b.classList.add('correct'); b.querySelector('.mark').textContent='✓'; }
      if(bl===li && !ok){ b.classList.add('wrong'); b.querySelector('.mark').textContent='✗'; }
    });
    this.answered++;
    if(ok) this.score++; else this.missed.push(idx);
    const fb=document.getElementById('fb');
    fb.className='fb show '+(ok?'ok':'no');
    fb.innerHTML = '<div class="verdict">'+(ok?'✓ Correct':'✗ Incorrect')+'</div>'+
      '<div class="ans">Answer: '+'ABCD'[q.correct]+'. '+esc(q.short)+'</div>'+
      '<div class="expl">'+esc(q.expl)+'</div>'+
      '<div class="cite">📖 '+esc(q.cite)+'</div>';
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('nextbtn').disabled = false;
    document.getElementById('skipbtn').style.display = 'none';
  },

  next(skip){
    if(skip && !this.locked){ /* skipped, not answered */ }
    this.i++;
    if(this.i >= this.order.length){ this.finish(); return; }
    this.render();
    window.scrollTo({top:0,behavior:'smooth'});
  },

  finish(){
    document.getElementById('quiz').style.display='none';
    const R=document.getElementById('results');
    const total=this.answered;
    const pct = total? Math.round(this.score/total*100):0;
    const pass = pct>=70;
    let miss='';
    if(this.missed.length){
      miss='<h3 style="text-align:left;font-size:16px;color:var(--navy);margin:22px 0 8px;">Review your '+this.missed.length+' missed:</h3><div class="misslist">';
      this.missed.forEach(idx=>{ const q=DATA[idx];
        miss+='<div class="missitem"><div class="mq">'+esc(q.q)+'</div>'+
              '<div class="ma"><b>'+'ABCD'[q.correct]+'. '+esc(q.short)+'</b> — '+esc(q.expl)+'</div>'+
              '<div class="mc">📖 '+esc(q.cite)+'</div></div>';
      });
      miss+='</div>';
    } else {
      miss='<div class="allright">🎯 Perfect — every question correct!</div>';
    }
    let drillHtml='';
    if(DRILL && DRILL.length){
      drillHtml='<details class="drill"><summary>📌 High-Yield Drill Box ('+DRILL.length+' must-know facts)</summary>';
      DRILL.forEach(d=>{ drillHtml+='<div class="drillrow"><b>'+esc(d.label)+':</b> '+esc(d.text)+'</div>'; });
      drillHtml+='</details>';
    }
    R.innerHTML =
      '<h1>'+(pass?'Nice work 👍':'Keep grinding 💪')+'</h1>'+
      '<div class="bigscore">'+this.score+'<small>/'+total+'</small></div>'+
      '<div class="pct '+(pass?'pass':'fail')+'">'+pct+'%  '+(pass?'· passing (≥70%)':'· below 70%')+'</div>'+
      '<div class="nav" style="max-width:430px;margin:0 auto 4px;">'+
        '<button class="btn primary" onclick="QUIZ.retake(false)">Retake all</button>'+
        (this.missed.length?'<button class="btn ghost" onclick="QUIZ.retake(true)">Retake missed only</button>':'')+
      '</div>'+
      miss + drillHtml;
    R.style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  }
};

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('quiz').style.display==='none') return;
  const k=e.key.toLowerCase();
  if(['a','b','c','d'].includes(k)) QUIZ.pick('abcd'.indexOf(k));
  else if(['1','2','3','4'].includes(k)) QUIZ.pick(+k-1);
  else if(e.key==='Enter' && !document.getElementById('nextbtn').disabled) QUIZ.next();
});

QUIZ.init();
</script>
</body>
</html>
