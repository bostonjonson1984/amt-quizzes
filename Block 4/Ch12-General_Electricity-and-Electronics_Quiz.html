approximately 2 volts; a 12-volt battery uses 6 cells in series, and a 24-volt battery uses 12 cells.", "cite": "FAA-H-8083-30B p. 12-87", "topic": "Batteries & Cells"}, {"q": "What is the approximate normal RATED voltage of a single lead-acid cell?", "options": ["1.2 volts", "1.5 volts", "2.2 volts", "2 volts"], "correct": 3, "short": "2 volts", "expl": "A lead-acid cell is normally rated at approximately 2 volts (about 2.2 V right off the charger).", "cite": "FAA-H-8083-30B p. 12-89", "topic": "Batteries & Cells"}, {"q": "A lead-acid cell just removed from the charger reads approximately:", "options": ["2.2 volts", "1.25 volts", "2.0 volts", "2.5 volts"], "correct": 0, "short": "2.2 volts", "expl": "Although a lead-acid cell is rated at approximately 2 volts, just off the charger it reads about 2.2 volts.", "cite": "FAA-H-8083-30B p. 12-89", "topic": "Batteries & Cells"}, {"q": "The most common battery capacity rating, found by multiplying current in amperes by discharge time in hours, is the:", "options": ["Voltage rating", "Ampere-hour rating", "Watt rating", "Specific gravity rating"], "correct": 1, "short": "Ampere-hour rating", "expl": "The most common battery rating is the ampere-hour rating: current (amps) multiplied by discharge time (hours).", "cite": "FAA-H-8083-30B p. 12-89", "topic": "Batteries & Cells"}, {"q": "A battery rated at 1 ampere-hour can ideally supply 1 amp for 1 hour, or 1/2 amp for how long?", "options": ["1/2 hour", "1 hour", "2 hours", "4 hours"], "correct": 2, "short": "2 hours", "expl": "Ampere-hour = amps x hours. A 1 A-h battery supplies 1 A for 1 hour, or 1/2 A for 2 hours, or 2 A for 1/2 hour.", "cite": "FAA-H-8083-30B p. 12-89", "topic": "Batteries & Cells"}, {"q": "For rating airplane battery capacity, what discharge time period has been established as the basis?", "options": ["1 hour", "10 hours", "20 hours", "5 hours"], "correct": 3, "short": "5 hours", "expl": "For airplane batteries, a period of 5 hours has been established as the discharge time used in rating battery capacity.", "cite": "FAA-H-8083-30B p. 12-89", "topic": "Batteries & Cells"}, {"q": "Connecting batteries in PARALLEL increases which rating, while voltage stays the same?", "options": ["Ampere-hour (capacity)", "Voltage", "Internal resistance", "Specific gravity"], "correct": 0, "short": "Ampere-hour capacity", "expl": "Connecting batteries in parallel increases ampere-hour capacity (capacity), not voltage. Connecting in series increases total voltage but not capacity.", "cite": "FAA-H-8083-30B p. 12-89", "topic": "Batteries & Cells"}, {"q": "Connecting batteries in SERIES increases:", "options": ["Ampere-hour capacity", "The total voltage", "The specific gravity", "The discharge rate"], "correct": 1, "short": "The total voltage", "expl": "Connecting batteries in series increases the total voltage but not the ampere-hour capacity.", "cite": "FAA-H-8083-30B p. 12-89", "topic": "Batteries & Cells"}, {"q": "Battery life cycle is defined as the number of complete charge/discharge cycles before normal capacity falls below what percentage of initial rated capacity?", "options": ["50 percent", "60 percent", "80 percent", "100 percent"], "correct": 2, "short": "80 percent", "expl": "Battery life cycle is the number of complete charge/discharge cycles before normal charge capacity falls below 80 percent of its initial rated capacity.", "cite": "FAA-H-8083-30B p. 12-89", "topic": "Batteries & Cells"}, {"q": "The state of charge of a lead-acid battery is indicated by the density (specific gravity) of the electrolyte, measured with a(n):", "options": ["Voltmeter", "Ammeter", "Megger", "Hydrometer"], "correct": 3, "short": "Hydrometer", "expl": "State of charge is indicated by the specific gravity of the electrolyte, measured with a hydrometer — a sealed glass tube weighted to float upright.", "cite": "FAA-H-8083-30B p. 12-90", "topic": "Batteries & Cells"}, {"q": "The scale range on a typical hydrometer used for lead-acid batteries runs from:", "options": ["1.100 to 1.300", "1.000 to 1.100", "1.300 to 1.500", "0.900 to 1.000"], "correct": 0, "short": "1.100 to 1.300", "expl": "The hydrometer's paper scale has a range of 1.100 to 1.300. The more dense the electrolyte, the higher the hydrometer floats.", "cite": "FAA-H-8083-30B p. 12-90", "topic": "Batteries & Cells"}, {"q": "In a new, fully-charged aircraft battery, the electrolyte is approximately 30 percent acid and 70 percent water, with a specific gravity of about:", "options": ["1.150", "1.270 to 1.300", "1.200", "1.000"], "correct": 1, "short": "About 1.270 to 1.300", "expl": "A new fully-charged battery's electrolyte is ~30 percent acid/70 percent water and is about 1.300 (1.270 at 60 F). During discharge it drops below 1.300 (to ~1.150 discharged).", "cite": "FAA-H-8083-30B p. 12-90", "topic": "Batteries & Cells"}, {"q": "When taking a hydrometer reading, no temperature correction is necessary as long as the electrolyte temperature is between:", "options": ["32 F and 50 F", "50 F and 70 F", "70 F and 90 F", "90 F and 110 F"], "correct": 2, "short": "70 F and 90 F", "expl": "No correction is necessary when the temperature is between 70 F and 90 F. Above 90 F or below 70 F, a correction factor must be applied.", "cite": "FAA-H-8083-30B p. 12-90", "topic": "Batteries & Cells"}, {"q": "When servicing a lead-acid battery, hydrometer readings should always be taken:", "options": ["After adding distilled water", "Only when fully discharged", "Only when the battery is warm", "Before adding distilled water"], "correct": 3, "short": "Before adding distilled water", "expl": "Always take hydrometer readings BEFORE adding distilled water, never after, to allow the water time to mix and avoid a non-representative sample.", "cite": "FAA-H-8083-30B p. 12-91", "topic": "Batteries & Cells"}, {"q": "The two standard methods of charging a battery are the constant current method and the:", "options": ["Constant voltage method", "Constant resistance method", "Trickle-pulse method", "Specific-gravity method"], "correct": 0, "short": "Constant voltage method", "expl": "Batteries are charged by either the constant voltage or the constant current method. In constant voltage, charging current tapers off as the battery nears full charge.", "cite": "FAA-H-8083-30B p. 12-91", "topic": "Batteries & Cells"}, {"q": "In the aircraft, the storage battery is charged by the aircraft generator system using which method (because generator voltage is held constant by a regulator)?", "options": ["Constant current method", "Constant voltage method", "Pulse method", "Trickle method"], "correct": 1, "short": "Constant voltage method", "expl": "In the aircraft, the battery is charged by the constant voltage method, since the generator voltage is held constant by a voltage regulator.", "cite": "FAA-H-8083-30B p. 12-91", "topic": "Batteries & Cells"}, {"q": "When a lead-acid battery is being charged, it generates an explosive mixture of:", "options": ["Carbon dioxide and nitrogen", "Sulfur and water vapor", "Hydrogen and oxygen", "Helium and argon"], "correct": 2, "short": "Hydrogen and oxygen", "expl": "When charging, a battery generates hydrogen and oxygen, an explosive mixture. Loosen the vent caps and prevent open flames, sparks, or ignition sources.", "cite": "FAA-H-8083-30B p. 12-91", "topic": "Batteries & Cells"}, {"q": "The electrolyte used in a nickel-cadmium (Ni-Cad) battery is:", "options": ["Sulfuric acid", "Distilled water only", "Hydrochloric acid", "Potassium hydroxide (KOH)"], "correct": 3, "short": "Potassium hydroxide (KOH)", "expl": "The Ni-Cad electrolyte is a potassium hydroxide (KOH) solution (20-34 percent by weight pure KOH in distilled water).", "cite": "FAA-H-8083-30B p. 12-91", "topic": "Batteries & Cells"}, {"q": "What is the approximate typical open-circuit cell voltage of a single nickel-cadmium cell?", "options": ["1.25 volts", "2.0 volts", "2.2 volts", "1.5 volts"], "correct": 0, "short": "1.25 volts", "expl": "The typical open-circuit cell voltage of a nickel-cadmium battery is about 1.25 volts — distinctly lower than the ~2 V lead-acid cell.", "cite": "FAA-H-8083-30B p. 12-92", "topic": "Batteries & Cells"}, {"q": "Toward the end of charging (or if overcharged), a nickel-cadmium cell emits gas. To completely charge a Ni-Cad, some of this 'gassing':", "options": ["Must never occur", "Must take place, however slight", "Indicates a dead cell", "Means the cell is reversed"], "correct": 1, "short": "Must take place (however slight)", "expl": "To completely charge a Ni-Cad, some gassing, however slight, must take place; thus some water is used. The gas is hydrogen and oxygen from decomposition of water in the electrolyte.", "cite": "FAA-H-8083-30B p. 12-92", "topic": "Batteries & Cells"}, {"q": "For a nickel-cadmium battery, water should be added to the cells only when the battery is:", "options": ["Fully discharged", "Half charged", "Fully charged", "Cold"], "correct": 2, "short": "Fully charged", "expl": "During discharge the plates absorb electrolyte; on recharge the level rises and is highest at full charge. Therefore water should be added only when the battery is fully charged.", "cite": "FAA-H-8083-30B p. 12-92", "topic": "Batteries & Cells"}, {"q": "The undesirable Ni-Cad characteristic caused by constant overcharge and infrequent discharge, technically called 'voltage depression' but commonly (and erroneously) called:", "options": ["Sulfation", "Thermal runaway", "Gassing", "Memory effect"], "correct": 3, "short": "Memory effect", "expl": "Ni-Cads exhibit 'voltage depression,' commonly but erroneously called 'memory effect.' SLA batteries do not have this characteristic.", "cite": "FAA-H-8083-30B p. 12-93", "topic": "Batteries & Cells"}, {"q": "One of the first aircraft to utilize lithium-ion batteries is the:", "options": ["Boeing 787", "Cessna 172", "Airbus A320", "Piper Cub"], "correct": 0, "short": "Boeing 787", "expl": "The FAA certified lithium-ion batteries for aircraft; one of the first to use them is the Boeing 787, which uses two 32V 8-cell lithium-ion batteries.", "cite": "FAA-H-8083-30B p. 12-93", "topic": "Batteries & Cells"}, {"q": "A major reason AC has largely replaced DC in commercial power systems is that AC voltages can be readily increased or decreased by means of:", "options": ["Resistors", "Transformers", "Capacitors", "Diodes"], "correct": 1, "short": "Transformers", "expl": "AC can be transmitted economically over long distances because AC voltages can be increased or decreased by transformers.", "cite": "FAA-H-8083-30B p. 12-43", "topic": "AC Theory"}, {"q": "Which two effects occur in AC circuits that do NOT occur in DC circuits?", "options": ["Voltage drop and current flow", "Resistance and power", "Inductive reactance and capacitive reactance", "Polarity and frequency"], "correct": 2, "short": "Inductive & capacitive reactance", "expl": "Because AC constantly changes direction and intensity, inductive reactance and capacitive reactance occur in AC circuits but not in DC circuits.", "cite": "FAA-H-8083-30B p. 12-44", "topic": "AC Theory"}, {"q": "In 1831, who discovered that a magnetic field could create a current flow in a conductor (electromagnetic induction)?", "options": ["Oersted", "Lenz", "Ohm", "Faraday"], "correct": 3, "short": "Faraday", "expl": "In 1831, Faraday discovered that a magnetic field could create a current flow in a conductor — the basis of generator operation.", "cite": "FAA-H-8083-30B p. 12-44", "topic": "AC Theory"}, {"q": "Lenz's Law states that the induced current caused by relative motion of a conductor and magnetic field always flows in a direction such that its magnetic field:", "options": ["Opposes the motion", "Aids the motion", "Has no effect on the motion", "Reverses the source"], "correct": 0, "short": "Opposes the motion", "expl": "Lenz's Law: the induced current always flows in such a direction that its magnetic field OPPOSES the motion that produced it.", "cite": "FAA-H-8083-30B p. 12-44", "topic": "AC Theory"}, {"q": "Using the generator LEFT-hand rule, the SECOND finger of the left hand points in the direction of the:", "options": ["Magnetic lines of force", "Induced emf", "Movement of the conductor", "Current in the field coil"], "correct": 1, "short": "Induced emf", "expl": "Generator left-hand rule: first finger = magnetic lines of force (N to S), thumb = movement of conductor, second finger = direction of induced emf.", "cite": "FAA-H-8083-30B p. 12-44", "topic": "AC Theory"}, {"q": "The value of an induced emf depends on three factors: the strength of the magnetic field, the speed of rotation, and:", "options": ["The wire color", "The air temperature", "The number of wires moving through the field", "The wire resistance"], "correct": 2, "short": "Number of wires in the field", "expl": "Induced emf depends on (1) number of wires moving through the field, (2) strength of the magnetic field, and (3) speed of rotation.", "cite": "FAA-H-8083-30B p. 12-44", "topic": "AC Theory"}, {"q": "Generators that produce alternating current are called AC generators or:", "options": ["Rectifiers", "Inverters", "Commutators", "Alternators"], "correct": 3, "short": "Alternators", "expl": "Generators used to produce alternating current are called AC generators or alternators.", "cite": "FAA-H-8083-30B p. 12-44", "topic": "Motors & Generators"}, {"q": "In a simple AC generator, current is taken from the rotating loop by brushes riding on two metal:", "options": ["Slip rings (collector rings)", "Commutator segments", "Field poles", "Armature laminations"], "correct": 0, "short": "Slip rings (collector rings)", "expl": "In a simple AC generator the ends of the loop connect to two slip rings (collector rings) C1 and C2; brushes take the current from these rings.", "cite": "FAA-H-8083-30B p. 12-45", "topic": "Motors & Generators"}, {"q": "A repetition of a pattern in which voltage rises to a maximum positive, falls to zero, rises to a maximum negative, and returns to zero is called one:", "options": ["Alternation", "Cycle", "Period", "Wavelength"], "correct": 1, "short": "Cycle", "expl": "A cycle is a complete series of changes that returns to the starting point. There are two alternations in a complete cycle: positive and negative.", "cite": "FAA-H-8083-30B p. 12-46", "topic": "AC Theory"}, {"q": "How many alternations are there in one complete cycle of AC?", "options": ["One", "Three", "Two (positive and negative)", "Four"], "correct": 2, "short": "Two alternations", "expl": "There are two alternations in a complete cycle: the positive alternation and the negative alternation. Each is half a cycle.", "cite": "FAA-H-8083-30B p. 12-46", "topic": "AC Theory"}, {"q": "The number of complete AC cycles occurring per second is the frequency, whose standard unit is the:", "options": ["Volt", "Ohm", "Henry", "Hertz (Hz)"], "correct": 3, "short": "Hertz (Hz)", "expl": "Frequency is the number of cycles of AC per second; the standard unit is the hertz (Hz).", "cite": "FAA-H-8083-30B p. 12-46", "topic": "AC Theory"}, {"q": "A 2-pole generator turning at 3,600 rpm produces what frequency?", "options": ["60 cps (Hz)", "30 Hz", "50 Hz", "400 Hz"], "correct": 0, "short": "60 cps (Hz)", "expl": "F = (P/2) x (rpm/60) = 1 x 60 = 60 cps. The handbook gives this exact worked example (a 4-pole, 1,800-rpm generator also yields 60 cps).", "cite": "FAA-H-8083-30B p. 12-46", "topic": "AC Theory"}, {"q": "The time required for a sine wave to complete one full cycle is called the:", "options": ["Frequency", "Period", "Wavelength", "Alternation"], "correct": 1, "short": "Period", "expl": "The period is the time required for a sine wave to complete one full cycle.", "cite": "FAA-H-8083-30B p. 12-46", "topic": "AC Theory"}, {"q": "The period of a sine wave and its frequency are related how?", "options": ["Period = frequency squared", "Period = frequency", "Period = 1 / frequency", "Period = 2 x frequency"], "correct": 2, "short": "Period = 1 / frequency", "expl": "Period is inversely proportional to frequency: t = 1/f, and f = 1/t. The higher the frequency, the shorter the period.", "cite": "FAA-H-8083-30B p. 12-46", "topic": "AC Theory"}, {"q": "The distance a waveform travels during one period, indicated by the Greek letter lambda, is the:", "options": ["Period", "Frequency", "Amplitude", "Wavelength"], "correct": 3, "short": "Wavelength", "expl": "Wavelength (lambda) is the distance a waveform travels during a period, measured from one point on the waveform to the corresponding point on the next.", "cite": "FAA-H-8083-30B p. 12-47", "topic": "AC Theory"}, {"q": "Two AC waveforms that go through their maximum and minimum points at the SAME time and in the same direction are said to be:", "options": ["In phase", "Out of phase", "Rectified", "Resonant"], "correct": 0, "short": "In phase", "expl": "When two waves are exactly in step — reaching maximum and minimum at the same time and direction — they are in phase.", "cite": "FAA-H-8083-30B p. 12-47", "topic": "AC Theory"}, {"q": "When two waveforms reach their maximum/minimum values at different times, the waveform that reaches its maximum first is said to:", "options": ["Lag the other", "Lead the other", "Be rectified", "Be in phase"], "correct": 1, "short": "Lead the other", "expl": "When out of phase, the waveform that reaches its maximum or minimum value first is said to lead the other; the other lags.", "cite": "FAA-H-8083-30B p. 12-47", "topic": "AC Theory"}, {"q": "How many electrical degrees are there in one complete cycle of an AC sine wave?", "options": ["90 degrees", "180 degrees", "360 degrees", "270 degrees"], "correct": 2, "short": "360 degrees", "expl": "One full sine-wave cycle spans 360 degrees: zero at 0, max at 90, zero at 180, max (opposite) at 270, zero at 360.", "cite": "FAA-H-8083-30B p. 12-49", "topic": "AC Theory"}, {"q": "The three values of AC are instantaneous, peak, and:", "options": ["Average", "Reactive", "Apparent", "Effective (RMS)"], "correct": 3, "short": "Effective (RMS)", "expl": "There are three values of AC: instantaneous, peak, and effective root mean square (RMS).", "cite": "FAA-H-8083-30B p. 12-48", "topic": "AC Values (RMS/Peak)"}, {"q": "The largest instantaneous value of a sine wave, occurring at 90 degrees (and 270 degrees in the opposite direction), is the:", "options": ["Peak value", "RMS value", "Average value", "Instantaneous value"], "correct": 0, "short": "Peak value", "expl": "The peak value is the largest instantaneous value; the largest positive value occurs at 90 degrees and the largest negative at 270 degrees.", "cite": "FAA-H-8083-30B p. 12-48", "topic": "AC Values (RMS/Peak)"}, {"q": "The effective value of a sine wave is also known as the:", "options": ["Peak value", "RMS (root mean square) value", "Average value", "Instantaneous value"], "correct": 1, "short": "RMS value", "expl": "The effective value is also known as the RMS (root mean square) value, which most AC voltmeters display. It is a measure of the heating effect.", "cite": "FAA-H-8083-30B p. 12-48", "topic": "AC Values (RMS/Peak)"}, {"q": "The effective (RMS) value of an AC sine wave equals what fraction of the peak value?", "options": ["0.637 x peak", "1.414 x peak", "0.707 x peak", "1.0 x peak"], "correct": 2, "short": "0.707 x peak", "expl": "RMS (effective) value = 0.707 x peak. It represents the heating effect — the DC voltage producing the same heat. (Do not confuse with 0.637.)", "cite": "FAA-H-8083-30B p. 12-48", "topic": "AC Values (RMS/Peak)"}, {"q": "Peak voltage can be found from RMS voltage using the relationship:", "options": ["Vp = 0.707 x Vrms", "Vp = 0.637 x Vrms", "Vp = 2 x Vrms", "Vp = 1.414 x Vrms"], "correct": 3, "short": "Vp = 1.414 x Vrms", "expl": "Algebraically rearranging Vrms = 0.707 x Vp gives Vp = 1.414 x Vrms. Peak is the larger value.", "cite": "FAA-H-8083-30B p. 12-49", "topic": "AC Values (RMS/Peak)"}, {"q": "Household AC is 110 volts RMS. Approximately what is the PEAK voltage?", "options": ["155 volts", "78 volts", "110 volts", "220 volts"], "correct": 0, "short": "Approximately 155 volts", "expl": "Vp = 1.414 x 110 = ~155 volts. The handbook gives this exact example: the 110 V supplied to homes is only 0.707 of the ~155 V peak.", "cite": "FAA-H-8083-30B p. 12-49", "topic": "AC Values (RMS/Peak)"}, {"q": "Unless otherwise specified, any values given for AC current or voltage are assumed to be:", "options": ["Peak values", "Effective (RMS) values", "Average values", "Instantaneous values"], "correct": 1, "short": "Effective (RMS) values", "expl": "In the study of AC, any values for current or voltage are assumed to be effective (RMS) values unless otherwise specified. AC meters read effective values.", "cite": "FAA-H-8083-30B p. 12-49", "topic": "AC Values (RMS/Peak)"}, {"q": "Besides resistance, which TWO factors oppose current flow ONLY in AC circuits (not DC)?", "options": ["Voltage and current", "Impedance and resistance", "Inductive reactance and capacitive reactance", "Permeability and reluctance"], "correct": 2, "short": "Inductive & capacitive reactance", "expl": "Resistance opposes both AC and DC. Inductive reactance (XL) and capacitive reactance (XC) oppose current only in AC circuits and can create a phase shift.", "cite": "FAA-H-8083-30B p. 12-49", "topic": "AC Reactance"}, {"q": "In its most basic form, a capacitor is constructed of two parallel plates separated by a nonconductor called a:", "options": ["Resistor", "Conductor", "Diode", "Dielectric"], "correct": 3, "short": "Dielectric", "expl": "A capacitor is two parallel plates separated by a nonconductor called a dielectric. In a circuit, a capacitor serves as a reservoir/storehouse for electricity.", "cite": "FAA-H-8083-30B p. 12-50", "topic": "Capacitance & Inductance"}, {"q": "A good capacitor connected to a DC source, once charged, will:", "options": ["Block DC and pass the effects of pulsing DC or AC", "Pass DC continuously", "Short out the source", "Increase the DC voltage"], "correct": 0, "short": "Block DC, pass AC/pulsing DC", "expl": "There can be no continuous movement of DC through a capacitor. A good capacitor blocks DC and passes the effects of pulsing DC or AC.", "cite": "FAA-H-8083-30B p. 12-50", "topic": "Capacitance & Inductance"}, {"q": "The time constant of a series resistor/capacitor (RC) circuit equals:", "options": ["R + C", "R x C (resistance times capacitance)", "R / C", "C / R"], "correct": 1, "short": "tau = R x C", "expl": "The RC time constant tau equals the product of resistance (ohms) and capacitance (farads): tau = RC.", "cite": "FAA-H-8083-30B p. 12-50", "topic": "Capacitance & Inductance"}, {"q": "In one RC time constant, a capacitor charges to approximately what percentage of the source voltage?", "options": ["50 percent", "86 percent", "63 percent", "99 percent"], "correct": 2, "short": "63 percent", "expl": "One time constant is the time required to charge to 63 percent of the source voltage. About 5 time constants brings it to ~99 percent.", "cite": "FAA-H-8083-30B p. 12-50", "topic": "Capacitance & Inductance"}, {"q": "A capacitor reaches approximately 99 percent of full charge after how many RC time constants?", "options": ["1", "2", "3", "5"], "correct": 3, "short": "5 time constants", "expl": "The time to reach about 99 percent of source voltage is approximately 5 time constants (5 tau).", "cite": "FAA-H-8083-30B p. 12-50", "topic": "Capacitance & Inductance"}, {"q": "The basic unit of capacitance is the:", "options": ["Farad", "Henry", "Ohm", "Coulomb"], "correct": 0, "short": "Farad", "expl": "The basic unit of capacitance is the farad (f): one farad is one coulomb of charge stored with one volt across the plates.", "cite": "FAA-H-8083-30B p. 12-50", "topic": "Capacitance & Inductance"}, {"q": "One farad is defined as one coulomb of charge stored with how much voltage across the plates?", "options": ["Ten volts", "One volt", "One hundred volts", "One thousand volts"], "correct": 1, "short": "One volt", "expl": "By definition, one farad is one coulomb of charge stored with one volt across the plates of the capacitor (C = Q/E).", "cite": "FAA-H-8083-30B p. 12-50", "topic": "Capacitance & Inductance"}, {"q": "The two more common practical units of capacitance, smaller than the farad, are the microfarad and the:", "options": ["Megafarad", "Kilofarad", "Picofarad", "Henry"], "correct": 2, "short": "Picofarad", "expl": "Because one farad is large, smaller units are used: the microfarad (10^-6 F) and the picofarad (10^-12 F).", "cite": "FAA-H-8083-30B p. 12-51", "topic": "Capacitance & Inductance"}, {"q": "The maximum DC voltage that can be applied across a capacitor without damage is called its breakdown voltage, working voltage, or simply the:", "options": ["Capacitance", "Reactance", "Tolerance", "Voltage rating"], "correct": 3, "short": "Voltage rating", "expl": "The voltage rating (breakdown voltage / working voltage) is the maximum DC voltage that can be applied without risk of dielectric breakdown and arcing.", "cite": "FAA-H-8083-30B p. 12-51", "topic": "Capacitance & Inductance"}, {"q": "A capacitor should be selected so that its working voltage is at least what percentage greater than the highest voltage to be applied?", "options": ["50 percent", "10 percent", "25 percent", "100 percent"], "correct": 0, "short": "50 percent", "expl": "The capacitor's working voltage should be at least 50 percent greater than the highest voltage to be applied.", "cite": "FAA-H-8083-30B p. 12-51", "topic": "Capacitance & Inductance"}, {"q": "The capacitance of parallel plates is DIRECTLY proportional to which factor?", "options": ["Plate spacing", "Plate area", "Frequency", "Wire gauge"], "correct": 1, "short": "Plate area", "expl": "Capacitance is directly proportional to plate area: a larger plate area produces larger capacitance. Doubling the area doubles the capacitance.", "cite": "FAA-H-8083-30B p. 12-51", "topic": "Capacitance & Inductance"}, {"q": "The capacitance of parallel plates is INVERSELY proportional to which factor?", "options": ["Plate area", "Dielectric constant", "Plate spacing", "Applied voltage"], "correct": 2, "short": "Plate spacing", "expl": "Capacitance is inversely proportional to plate spacing: increasing the spacing (dielectric thickness) decreases capacitance.", "cite": "FAA-H-8083-30B p. 12-51", "topic": "Capacitance & Inductance"}, {"q": "The three factors that affect the capacitance of parallel plates are plate area, plate spacing, and the:", "options": ["Wire material", "Frequency", "Current", "Dielectric material"], "correct": 3, "short": "Dielectric material", "expl": "Capacitance is affected by (1) plate area, (2) plate spacing, and (3) the dielectric material. The dielectric constant of a vacuum is defined as 1 (air is very close to 1).", "cite": "FAA-H-8083-30B p. 12-51", "topic": "Capacitance & Inductance"}, {"q": "Which capacitor type is generally POLARIZED (marked + and -) and should be used only with DC or pulsating DC?", "options": ["Electrolytic capacitor", "Mica capacitor", "Ceramic capacitor", "Air capacitor"], "correct": 0, "short": "Electrolytic capacitor", "expl": "Electrolytic capacitors are generally polarized (+ and - leads marked) and should be subjected to direct or pulsating direct voltage only. They provide large capacitance in small size.", "cite": "FAA-H-8083-30B p. 12-52", "topic": "Capacitance & Inductance"}, {"q": "When capacitors are connected in SERIES, the total capacitance is:", "options": ["The sum of the capacitances", "Less than that of the smallest capacitor", "Equal to the largest capacitor", "The average of the capacitors"], "correct": 1, "short": "Less than the smallest", "expl": "In series, the effective plate separation increases, so total capacitance is less than the smallest capacitor (uses the reciprocal formula — opposite of resistors).", "cite": "FAA-H-8083-30B p. 12-53", "topic": "Capacitance & Inductance"}, {"q": "Capacitors connected in PARALLEL combine how (to find total capacitance)?", "options": ["Use the reciprocal formula", "Take the smallest value", "Add them directly (CT = C1 + C2 + ...)", "Take the product over sum"], "correct": 2, "short": "Add them directly", "expl": "Capacitors in parallel add directly: CT = C1 + C2 + C3... (the effective plate area increases). This is OPPOSITE to resistors in parallel — a common trap.", "cite": "FAA-H-8083-30B p. 12-53", "topic": "Capacitance & Inductance"}, {"q": "Two capacitors, 330 uF and 220 uF, are connected in PARALLEL. The total capacitance is:", "options": ["110 uF", "132 uF", "73 uF", "550 uF"], "correct": 3, "short": "550 uF", "expl": "In parallel, capacitances add directly: 330 uF + 220 uF = 550 uF. This is the handbook's worked example.", "cite": "FAA-H-8083-30B p. 12-53", "topic": "Capacitance & Inductance"}, {"q": "In a circuit containing ONLY capacitance, the current:", "options": ["Leads the applied voltage by 90 degrees", "Lags the applied voltage by 90 degrees", "Is in phase with the voltage", "Is zero"], "correct": 0, "short": "Leads the voltage by 90 degrees", "expl": "In a circuit with only capacitance, the current leads the applied voltage by 90 degrees (one-fourth cycle). In a circuit with only inductance, current lags voltage by 90 degrees.", "cite": "FAA-H-8083-30B p. 12-56", "topic": "AC Reactance"}, {"q": "Capacitive reactance (XC), measured in ohms, is found with the formula XC = 1 / (2 pi f C). As frequency INCREASES, XC:", "options": ["Increases", "Decreases", "Stays constant", "Becomes infinite"], "correct": 1, "short": "Decreases", "expl": "XC = 1/(2 pi f C) is inversely proportional to frequency — as frequency rises, capacitive reactance DECREASES (opposite of inductive reactance).", "cite": "FAA-H-8083-30B p. 12-54", "topic": "AC Reactance"}, {"q": "When capacitors are connected in SERIES, their total capacitive reactance is found by:", "options": ["The reciprocal (parallel) formula", "Product over sum", "Adding the individual reactances", "Taking the smallest"], "correct": 2, "short": "Adding the individual reactances", "expl": "When capacitors are connected in series, the total reactance equals the SUM of the individual reactances (Xct = Xc1 + Xc2 + ...). Note this is opposite to how their capacitance combines.", "cite": "FAA-H-8083-30B p. 12-55", "topic": "AC Reactance"}, {"q": "Faraday's Law (the Law of Electromagnetic Induction) states the induced emf in a closed loop of wire is proportional to:", "options": ["The wire resistance", "The wire color", "The applied DC voltage", "The rate of change of the magnetic flux through the coil"], "correct": 3, "short": "Rate of change of magnetic flux", "expl": "Faraday's Law: the induced emf in a closed loop of wire is proportional to the rate of change of the magnetic flux through a coil of wire.", "cite": "FAA-H-8083-30B p. 12-56", "topic": "Capacitance & Inductance"}, {"q": "The property of a coil to oppose any CHANGE in current through it is called:", "options": ["Inductance", "Capacitance", "Resistance", "Reluctance"], "correct": 0, "short": "Inductance", "expl": "The primary aspect of a coil's operation is its property to oppose any change in current through it; this property is called inductance (symbol L).", "cite": "FAA-H-8083-30B p. 12-56", "topic": "Capacitance & Inductance"}, {"q": "In a series RL circuit, the current increases to what percentage of full value in 1 time constant after the circuit is closed?", "options": ["50 percent", "63 percent", "86 percent", "99 percent"], "correct": 1, "short": "63 percent", "expl": "In a series RL circuit, current increases to 63 percent of full value in 1 time constant, and reaches 99 percent after the 5th time constant — like an RC charging curve.", "cite": "FAA-H-8083-30B p. 12-56", "topic": "Capacitance & Inductance"}, {"q": "As a general rule, the inductance of a coil varies as:", "options": ["The number of turns", "The square root of the turns", "The square of the number of turns", "The inverse of the turns"], "correct": 2, "short": "The square of the number of turns", "expl": "Doubling the number of turns produces a field twice as strong for the same current, but as a general rule the inductance varies as the SQUARE of the number of turns.", "cite": "FAA-H-8083-30B p. 12-57", "topic": "Capacitance & Inductance"}, {"q": "Doubling the LENGTH of a coil while keeping the same number of turns does what to the inductance?", "options": ["Doubles it", "Quadruples it", "Leaves it unchanged", "Halves it"], "correct": 3, "short": "Halves it", "expl": "Doubling the length of a coil, while keeping the same number of turns, halves the value of inductance.", "cite": "FAA-H-8083-30B p. 12-57", "topic": "Capacitance & Inductance"}, {"q": "Lenz's Law (1833), which gives the direction of the induced emf, states the induced emf always opposes the:", "options": ["Change in magnetic flux", "Wire resistance", "Applied frequency", "Source polarity"], "correct": 0, "short": "Change in magnetic flux", "expl": "Lenz's Law: the induced emf always acts in such a direction that the current it drives produces a magnetic field which OPPOSES the change in magnetic flux.", "cite": "FAA-H-8083-30B p. 12-57", "topic": "Capacitance & Inductance"}, {"q": "The basic unit of inductance is the:", "options": ["Farad", "Henry", "Ohm", "Coulomb"], "correct": 1, "short": "Henry", "expl": "The henry (H) is the basic unit of inductance. A circuit has one henry when current changing at one ampere per second induces one volt.", "cite": "FAA-H-8083-30B p. 12-58", "topic": "Capacitance & Inductance"}, {"q": "When inductors are connected in SERIES, the total inductance is:", "options": ["Less than the smallest inductor", "The product over sum", "The sum of the individual inductors", "The reciprocal of the sum"], "correct": 2, "short": "Sum of the individual inductors", "expl": "When inductors are connected in series, the total inductance LT is the SUM of the individual inductors: LT = L1 + L2 + ... + LN (like resistors in series).", "cite": "FAA-H-8083-30B p. 12-58", "topic": "Capacitance & Inductance"}, {"q": "When inductors are connected in PARALLEL, the total inductance is:", "options": ["The sum of the inductors", "Equal to the largest", "The product of the inductors", "Less than the smallest inductance"], "correct": 3, "short": "Less than the smallest", "expl": "When inductors are connected in parallel, the total inductance is less than the smallest inductance (uses the reciprocal formula, like resistors in parallel).", "cite": "FAA-H-8083-30B p. 12-58", "topic": "Capacitance & Inductance"}, {"q": "Inductive reactance, the opposition an inductor offers to AC, is symbolized XL and measured in:", "options": ["Ohms", "Henries", "Farads", "Volts"], "correct": 0, "short": "Ohms", "expl": "Inductive reactance (XL) is measured in ohms, just as resistance is. Inductance itself is measured in henries.", "cite": "FAA-H-8083-30B p. 12-58", "topic": "AC Reactance"}, {"q": "Inductive reactance is calculated with XL = 2 pi f L. As frequency INCREASES, XL:", "options": ["Decreases", "Increases", "Stays constant", "Becomes negative"], "correct": 1, "short": "Increases", "expl": "XL = 2 pi f L is directly proportional to frequency and inductance — raise the frequency and inductive reactance rises (opposite of XC).", "cite": "FAA-H-8083-30B p. 12-58", "topic": "AC Reactance"}, {"q": "In the handbook example, an inductance of 0.146 H at 60 cps gives an inductive reactance (XL = 2 pi f L) of approximately:", "options": ["8 ohms", "11 ohms", "55 ohms", "110 ohms"], "correct": 2, "short": "55 ohms", "expl": "XL = 6.28 x 60 x 0.146 = 55 ohms. This is the handbook's worked example.", "cite": "FAA-H-8083-30B p. 12-58", "topic": "AC Reactance"}, {"q": "In AC series circuits, inductive reactances are combined how?", "options": ["By the reciprocal formula", "Product over sum", "Subtracted", "Added like resistances in series"], "correct": 3, "short": "Added like resistances in series", "expl": "In AC series circuits, inductive reactances are added like resistances in series; total reactance equals the sum of the individual reactances.", "cite": "FAA-H-8083-30B p. 12-59", "topic": "AC Reactance"}, {"q": "The combined total opposition to current flow in an AC circuit, made up of resistance and reactance, is called:", "options": ["Impedance", "Capacitance", "Conductance", "Inductance"], "correct": 0, "short": "Impedance", "expl": "The combined effects of resistance, inductive reactance, and capacitive reactance make up the total opposition called impedance (Z), measured in ohms.", "cite": "FAA-H-8083-30B p. 12-59", "topic": "Impedance & Power Factor"}, {"q": "Ohm's Law for an AC circuit is written as:", "options": ["I = E / R", "I = E / Z", "I = E x Z", "I = Z / E"], "correct": 1, "short": "I = E / Z", "expl": "For AC, Ohm's Law uses impedance: I = E/Z. When the circuit is resistance only, Z = R and it is the same as the DC form.", "cite": "FAA-H-8083-30B p. 12-59", "topic": "Impedance & Power Factor"}, {"q": "For a series AC circuit with resistance and inductance, impedance is found by:", "options": ["Z = R + XL", "Z = R x XL", "Z = square root of (R^2 + XL^2)", "Z = R - XL"], "correct": 2, "short": "Z = sqrt(R^2 + XL^2)", "expl": "Resistance and reactance act at right angles, so by the Pythagorean theorem Z = sqrt(R^2 + XL^2). Substitute XC for circuits with capacitance.", "cite": "FAA-H-8083-30B p. 12-60", "topic": "Impedance & Power Factor"}, {"q": "In the handbook example with R = 6 ohms and XL = 8 ohms, the impedance Z is:", "options": ["2 ohms", "14 ohms", "48 ohms", "10 ohms"], "correct": 3, "short": "10 ohms", "expl": "Z = sqrt(6^2 + 8^2) = sqrt(36 + 64) = sqrt(100) = 10 ohms. This is the handbook's worked example.", "cite": "FAA-H-8083-30B p. 12-60", "topic": "Impedance & Power Factor"}, {"q": "A series AC circuit has 10 ohms resistance and 13 ohms capacitive reactance. Using Z = sqrt(R^2 + XC^2), the impedance is approximately:", "options": ["16.4 ohms", "3 ohms", "23 ohms", "169 ohms"], "correct": 0, "short": "Approximately 16.4 ohms", "expl": "Z = sqrt(10^2 + 13^2) = sqrt(100 + 169) = sqrt(269) = ~16.4 ohms. This is the handbook's worked example.", "cite": "FAA-H-8083-30B p. 12-61", "topic": "Impedance & Power Factor"}, {"q": "When a circuit contains resistance, inductance, AND capacitance, the reactances are combined by:", "options": ["Adding XL and XC", "Subtracting the smaller reactance from the larger (X = XL - XC)", "Multiplying XL and XC", "Ignoring the smaller one"], "correct": 1, "short": "Subtracting (X = XL - XC)", "expl": "Because their effects are exactly opposite, inductive and capacitive reactance are combined by subtraction (smaller from larger): then Z = sqrt(R^2 + (XL - XC)^2).", "cite": "FAA-H-8083-30B p. 12-60", "topic": "Impedance & Power Factor"}, {"q": "For a series RLC circuit with R = 4 ohms, XL = 10 ohms, XC = 7 ohms, the impedance Z is:", "options": ["3 ohms", "11 ohms", "5 ohms", "21 ohms"], "correct": 2, "short": "5 ohms", "expl": "Z = sqrt(R^2 + (XL - XC)^2) = sqrt(4^2 + (10-7)^2) = sqrt(16 + 9) = sqrt(25) = 5 ohms. Handbook worked example.", "cite": "FAA-H-8083-30B p. 12-62", "topic": "Impedance & Power Factor"}, {"q": "At the particular frequency where inductive reactance equals capacitive reactance and they cancel, the circuit is said to be:", "options": ["Saturated", "Open", "Rectified", "In resonance (at resonant frequency)"], "correct": 3, "short": "In resonance (resonant frequency)", "expl": "At the resonant frequency, XL = XC; since they are opposite, they cancel, leaving only resistance to oppose current. The circuit is 'in resonance'.", "cite": "FAA-H-8083-30B p. 12-63", "topic": "Impedance & Power Factor"}, {"q": "In an AC circuit, the power actually consumed by the resistance portion (the working power, indicated by a wattmeter) is called:", "options": ["True power", "Apparent power", "Reactive power", "Peak power"], "correct": 0, "short": "True power", "expl": "True power (symbol P, measured in watts) is the working power consumed by the resistance, indicated by a wattmeter in the circuit.", "cite": "FAA-H-8083-30B p. 12-64", "topic": "Impedance & Power Factor"}, {"q": "The power consumed by the ENTIRE AC circuit (both resistance and reactance), measured in volt-amps, is called:", "options": ["True power", "Apparent power", "Real power", "Working power"], "correct": 1, "short": "Apparent power", "expl": "Apparent power (symbol S, measured in volt-amps) is the power consumed by the entire circuit, including resistance and reactance — the product of effective voltage and current.", "cite": "FAA-H-8083-30B p. 12-64", "topic": "Impedance & Power Factor"}, {"q": "The ratio of true power to apparent power, usually expressed as a percent, is called the:", "options": ["Efficiency", "Turns ratio", "Power factor", "Coefficient of coupling"], "correct": 2, "short": "Power factor", "expl": "Power factor (PF) is the ratio of true power to apparent power, usually expressed in percent: PF = (watts / volt-amperes) x 100.", "cite": "FAA-H-8083-30B p. 12-64", "topic": "Impedance & Power Factor"}, {"q": "A 220-volt AC motor draws 50 amperes; a wattmeter reads 9,350 watts. What is the apparent power?", "options": ["9,350 watts", "270 VA", "4,675 VA", "11,000 volt-amperes"], "correct": 3, "short": "11,000 volt-amperes", "expl": "Apparent power = volts x amperes = 220 x 50 = 11,000 watts (volt-amperes). This is the handbook's worked example.", "cite": "FAA-H-8083-30B p. 12-65", "topic": "Impedance & Power Factor"}, {"q": "For that 220-volt motor (true power 9,350 W, apparent power 11,000 VA), the power factor is:", "options": ["85 percent", "50 percent", "70 percent", "100 percent"], "correct": 0, "short": "85 percent", "expl": "PF = (9,350 / 11,000) x 100 = 85 percent. This is the handbook's worked example.", "cite": "FAA-H-8083-30B p. 12-65", "topic": "Impedance & Power Factor"}, {"q": "True power equals apparent power ONLY when the AC circuit is made up of:", "options": ["Pure inductance", "Pure resistance", "Pure capacitance", "Series reactance"], "correct": 1, "short": "Pure resistance", "expl": "Only when the AC circuit is pure resistance is apparent power equal to true power. With reactance present, current and voltage are out of phase and true power is less.", "cite": "FAA-H-8083-30B p. 12-64", "topic": "Impedance & Power Factor"}, {"q": "A transformer changes electrical energy from one voltage to another by means of:", "options": ["Direct electrical connection", "Chemical reaction", "Mutual induction between two coils", "Mechanical gearing"], "correct": 2, "short": "Mutual induction", "expl": "A transformer's two coils are not electrically connected; an alternating voltage on one coil creates a voltage in the other by mutual induction.", "cite": "FAA-H-8083-30B p. 12-65", "topic": "Transformers"}, {"q": "Why can a transformer NOT be used with pure (steady) DC voltage?", "options": ["DC is too high", "DC has no current", "Transformers only pass AC current directly", "Only a varying voltage creates the varying magnetic field needed for mutual induction"], "correct": 3, "short": "Pure DC produces no varying field", "expl": "A transformer needs a varying magnetic field for mutual induction. Pure DC produces a steady field, so only AC (or pulsating DC) can be used.", "cite": "FAA-H-8083-30B p. 12-65", "topic": "Transformers"}, {"q": "The three basic parts of a transformer are an iron core, a primary winding, and a:", "options": ["Secondary winding", "Commutator", "Brush assembly", "Slip ring"], "correct": 0, "short": "Secondary winding", "expl": "A transformer has three basic parts: an iron core (low-reluctance flux path), a primary winding (receives source energy), and a secondary winding (receives energy by induction).", "cite": "FAA-H-8083-30B p. 12-65", "topic": "Transformers"}, {"q": "The factor that determines whether a transformer is step-up or step-down is the:", "options": ["Core material", "Turns ratio", "Wire gauge", "Frequency"], "correct": 1, "short": "Turns ratio", "expl": "The turns ratio — primary turns to secondary turns — determines step-up vs. step-down. The voltage ratio equals the turns ratio in an ideal transformer.", "cite": "FAA-H-8083-30B p. 12-65", "topic": "Transformers"}, {"q": "A step-down transformer with a 5-to-1 turns ratio, fed with 10 volts on the primary, produces what secondary voltage?", "options": ["50 volts", "10 volts", "2 volts", "5 volts"], "correct": 2, "short": "2 volts", "expl": "Voltage ratio = turns ratio. A 5:1 step-down with 10 V on the primary gives 10/5 = 2 V on the secondary. Handbook example.", "cite": "FAA-H-8083-30B p. 12-65", "topic": "Transformers"}, {"q": "A transformer has a 1-to-4 turns ratio (step-up). If 10 volts are applied to the primary, what is the secondary output?", "options": ["2.5 volts", "10 volts", "14 volts", "40 volts"], "correct": 3, "short": "40 volts", "expl": "Voltage ratio = turns ratio. With a 1:4 step-up and 10 V primary, secondary = 10 x 4 = 40 V. Handbook example.", "cite": "FAA-H-8083-30B p. 12-65", "topic": "Transformers"}, {"q": "If a transformer steps UP the voltage, it steps DOWN the:", "options": ["Current (by the same ratio)", "Frequency", "Power", "Turns ratio"], "correct": 0, "short": "Current (by the same ratio)", "expl": "If a transformer steps up voltage, it steps down current by the same ratio, because the power (I x E) of the secondary equals that of the primary minus losses.", "cite": "FAA-H-8083-30B p. 12-66", "topic": "Transformers"}, {"q": "A transformer's primary develops 10,000 lines of force but only 9,000 cut the secondary. The transformer efficiency (coefficient of coupling) is:", "options": ["80 percent", "90 percent", "100 percent", "10 percent"], "correct": 1, "short": "90 percent", "expl": "9,000 / 10,000 = 0.9, so the coefficient of coupling is 0.9 and the transformer is 90 percent efficient.", "cite": "FAA-H-8083-30B p. 12-66", "topic": "Transformers"}, {"q": "No transformer is 100 percent efficient because some of the magnetic flux escapes the magnetic circuit. This lost flux is called:", "options": ["Eddy flux", "Hysteresis flux", "Leakage flux", "Mutual flux"], "correct": 2, "short": "Leakage flux", "expl": "A certain amount of magnetic flux, called leakage flux, leaks out of the magnetic circuit; thus no transformer is 100 percent efficient (though iron-core types approach it).", "cite": "FAA-H-8083-30B p. 12-66", "topic": "Transformers"}, {"q": "Current transformers are connected how in the circuit, and voltage transformers how?", "options": ["Both in series", "Both in parallel", "Current transformers in parallel; voltage transformers in series", "Current transformers in series; voltage transformer primaries in parallel"], "correct": 3, "short": "Current=series; voltage=parallel", "expl": "Voltage transformer primaries are connected in PARALLEL across the supply voltage; current transformer primaries are connected in SERIES in the primary circuit.", "cite": "FAA-H-8083-30B p. 12-65", "topic": "Transformers"}, {"q": "The 'iron' losses in a transformer are of two types: eddy current loss and:", "options": ["Hysteresis loss", "Copper loss", "Leakage loss", "Resistive loss"], "correct": 0, "short": "Hysteresis loss", "expl": "Iron losses are hysteresis loss (energy to re-magnetize the core each cycle) and eddy current loss (currents induced in the core). Copper loss is a separate conductor loss.", "cite": "FAA-H-8083-30B p. 12-67", "topic": "Transformers"}, {"q": "To reduce eddy current losses in a transformer, the core is made of:", "options": ["Solid iron", "Laminations coated with insulation", "Copper", "Aluminum"], "correct": 1, "short": "Insulated laminations", "expl": "To reduce eddy current losses, transformer cores are made of laminations coated with insulation, which reduces the circulation of induced currents.", "cite": "FAA-H-8083-30B p. 12-67", "topic": "Transformers"}, {"q": "The basic DC meter movement (used in the ammeter, voltmeter, and ohmmeter) that deflects a pointer in proportion to current through a coil is the:", "options": ["Moving iron vane movement", "Electrodynamometer movement", "d'Arsonval movement", "Inclined coil movement"], "correct": 2, "short": "d'Arsonval movement", "expl": "The d'Arsonval meter movement is the basic DC current-measuring device used in the ammeter, voltmeter, and ohmmeter; the pointer deflects in proportion to coil current.", "cite": "FAA-H-8083-30B p. 12-68", "topic": "Measuring Instruments"}, {"q": "The amount of current required to drive a meter movement to full-scale deflection is called the meter's:", "options": ["Resistance", "Damping", "Multiplier", "Current sensitivity"], "correct": 3, "short": "Current sensitivity", "expl": "Current sensitivity is the amount of current required to drive the movement to full-scale deflection (e.g., a 1 mA movement needs 1 mA for full scale).", "cite": "FAA-H-8083-30B p. 12-68", "topic": "Measuring Instruments"}, {"q": "To extend an ammeter's range so it can read currents larger than the movement allows, a resistor is added that bypasses the excess current. This is called a:", "options": ["Shunt resistor", "Multiplier resistor", "Bleeder resistor", "Series resistor"], "correct": 0, "short": "Shunt resistor", "expl": "A shunt resistor is added in parallel to bypass current exceeding the movement's limit, extending the ammeter's range.", "cite": "FAA-H-8083-30B p. 12-69", "topic": "Measuring Instruments"}, {"q": "How is an AMMETER connected to measure current in a circuit?", "options": ["In parallel with the load", "In series with the element being measured", "Across the voltage source", "Between ground and chassis"], "correct": 1, "short": "In series with the element", "expl": "Always connect an ammeter in SERIES with the element whose current is to be measured. NEVER connect an ammeter across a voltage source — its very low resistance allows excessive current.", "cite": "FAA-H-8083-30B p. 12-69", "topic": "Measuring Instruments"}, {"q": "Why must an ammeter NEVER be connected directly across a source of voltage such as a battery?", "options": ["Its high resistance blocks current", "It measures only AC", "Its very low resistance allows excessive current that can damage it", "It will read zero"], "correct": 2, "short": "Low resistance allows excessive current", "expl": "The ammeter's resistance is extremely low; connected across a voltage source, even a volt or so causes very high current to flow through the meter, damaging it.", "cite": "FAA-H-8083-30B p. 12-70", "topic": "Measuring Instruments"}, {"q": "The most accurate ammeter readings are obtained at approximately what point on the scale?", "options": ["Full-scale deflection", "Quarter-scale deflection", "Zero deflection", "Half-scale deflection"], "correct": 3, "short": "Half-scale deflection", "expl": "The most accurate readings are obtained at approximately half-scale deflection; start with the highest range and work down.", "cite": "FAA-H-8083-30B p. 12-70", "topic": "Measuring Instruments"}, {"q": "To extend a VOLTMETER's range, a resistor in series with the movement that drops excess voltage is added; this is called the:", "options": ["Multiplier resistor", "Shunt resistor", "Bleeder resistor", "Damping resistor"], "correct": 0, "short": "Multiplier resistor", "expl": "For a voltmeter, a series multiplier resistor (RM) drops any excess voltage above what the movement needs for full-scale deflection.", "cite": "FAA-H-8083-30B p. 12-70", "topic": "Measuring Instruments"}, {"q": "Voltmeter sensitivity is defined in terms of:", "options": ["Volts per ampere", "Resistance per volt (ohms/volt)", "Amps per ohm", "Watts per volt"], "correct": 1, "short": "Resistance per volt (ohms/volt)", "expl": "Voltmeter sensitivity is defined in terms of resistance per volt (ohms/volt). A 50 microamp movement has a sensitivity of 20k ohms/volt.", "cite": "FAA-H-8083-30B p. 12-70", "topic": "Measuring Instruments"}, {"q": "How is a VOLTMETER connected to measure the voltage across a component?", "options": ["In series with the component", "Across the battery only", "In parallel (across) the two points", "In place of a fuse"], "correct": 2, "short": "In parallel (across the two points)", "expl": "Voltmeters are connected in PARALLEL — across the two points being measured. (Ammeter = series; voltmeter = parallel. A classic exam trap.)", "cite": "FAA-H-8083-30B p. 12-71", "topic": "Measuring Instruments"}, {"q": "To prevent shunting (drawing off current and changing the reading) when measuring voltage, a technician should use a voltmeter with:", "options": ["Low resistance", "No internal resistance", "An external shunt", "High resistance"], "correct": 3, "short": "High resistance", "expl": "A low-resistance voltmeter draws off significant current and lowers the circuit's effective resistance. Use a HIGH-resistance voltmeter to prevent shunting.", "cite": "FAA-H-8083-30B p. 12-71", "topic": "Measuring Instruments"}, {"q": "The function of the ohmmeter is to measure resistance; unlike the ammeter and voltmeter, it contains its own:", "options": ["Battery (power source)", "External shunt", "Multiplier only", "Rectifier"], "correct": 0, "short": "Battery (power source)", "expl": "The ohmmeter is self-excited — it contains a battery and a variable resistor in series with the movement to produce current through the resistance being measured.", "cite": "FAA-H-8083-30B p. 12-71", "topic": "Measuring Instruments"}, {"q": "On an ohmmeter, when the leads are OPEN (not connected), the pointer indicates:", "options": ["Zero ohms", "Infinite resistance", "Half-scale", "A short circuit"], "correct": 1, "short": "Infinite resistance", "expl": "When the ohmmeter leads are open, the meter indicates infinite resistance (an open circuit). When the leads are shorted, it reads zero.", "cite": "FAA-H-8083-30B p. 12-71", "topic": "Measuring Instruments"}, {"q": "The ohmmeter scale, where values decrease from left to right, is often called a:", "options": ["Linear scale", "Log scale", "Back-off scale", "Mirror scale"], "correct": 2, "short": "Back-off scale", "expl": "Because the ohmmeter values decrease from left to right, the scale is often called a back-off scale; it is nonlinear (more compressed toward the left).", "cite": "FAA-H-8083-30B p. 12-71", "topic": "Measuring Instruments"}, {"q": "A high-range ohmmeter containing a hand-operated generator, used to measure insulation resistance with a high 'breakdown' voltage, is a:", "options": ["Multimeter", "Ammeter", "Wheatstone bridge", "Megger (megohmmeter)"], "correct": 3, "short": "Megger (megohmmeter)", "expl": "The megger (megohmmeter) is a high-range ohmmeter with a hand-operated generator, used to measure insulation resistance, ground, continuity, and short circuits at high potential.", "cite": "FAA-H-8083-30B p. 12-72", "topic": "Measuring Instruments"}, {"q": "The chief advantage of the megger over an ordinary ohmmeter is its capacity to measure resistance with a high potential, or:", "options": ["Breakdown voltage", "Lower battery voltage", "AC frequency", "Faster response"], "correct": 0, "short": "Breakdown voltage", "expl": "The megger's chief advantage is its capacity to measure resistance with a high potential, or 'breakdown' voltage, ensuring insulation will not short or leak under electrical stress.", "cite": "FAA-H-8083-30B p. 12-72", "topic": "Measuring Instruments"}, {"q": "A standard d'Arsonval (DC) meter connected in an AC circuit reads:", "options": ["The peak value", "Zero (the average of the AC cycle)", "The RMS value", "Twice the average"], "correct": 1, "short": "Zero", "expl": "A DC d'Arsonval meter in an AC circuit reads zero, because the current reverses too rapidly for the coil to follow, so it assumes an average position (zero).", "cite": "FAA-H-8083-30B p. 12-73", "topic": "Measuring Instruments"}, {"q": "To measure AC with a d'Arsonval movement, additional circuitry is required that converts AC to DC. This device is a:", "options": ["Transformer", "Capacitor", "Rectifier", "Resistor"], "correct": 2, "short": "Rectifier", "expl": "For AC measurements, additional circuitry with a rectifier (half-wave or full-wave) converts AC to DC so the movement can respond.", "cite": "FAA-H-8083-30B p. 12-73", "topic": "Measuring Instruments"}, {"q": "A meter movement that can measure either AC or DC using two concentric iron vanes (one fixed, one movable) inside a solenoid, relying on repulsion, is the:", "options": ["d'Arsonval movement", "Electrodynamometer", "Megger", "Moving iron vane meter"], "correct": 3, "short": "Moving iron vane meter", "expl": "The moving iron vane meter uses repulsion between two concentric iron vanes inside a solenoid; it depends on induced magnetism and works on AC or DC.", "cite": "FAA-H-8083-30B p. 12-74", "topic": "Measuring Instruments"}, {"q": "Electric power is measured by means of a wattmeter, which has two elements (one for current, one for voltage) and is usually of which type?", "options": ["Electrodynamometer type", "d'Arsonval type", "Moving iron vane type", "Inclined coil type"], "correct": 0, "short": "Electrodynamometer type", "expl": "Because power is the product of current and voltage, a wattmeter needs two elements and is usually of the electrodynamometer type; it can measure AC or DC power.", "cite": "FAA-H-8083-30B p. 12-76", "topic": "Measuring Instruments"}, {"q": "The instrument used to view and quantify waveform characteristics (phase, amplitude, duration), typically using a cathode-ray tube, is the:", "options": ["Multimeter", "Oscilloscope", "Megger", "Hydrometer"], "correct": 1, "short": "Oscilloscope", "expl": "The oscilloscope makes it possible to see and quantify waveform characteristics such as phase relationships, amplitudes, and durations, usually using a CRT.", "cite": "FAA-H-8083-30B p. 12-76", "topic": "Measuring Instruments"}, {"q": "The combined analog instrument that includes the voltmeter, ammeter, and ohmmeter is commonly called a multimeter or:", "options": ["Megger", "CRT", "VOM (volt-ohm-milliammeter)", "DIP"], "correct": 2, "short": "VOM", "expl": "The combined voltmeter/ammeter/ohmmeter is called a multimeter or a VOM (volt-ohm-milliammeter). Digital versions are the DMM and DVM.", "cite": "FAA-H-8083-30B p. 12-80", "topic": "Measuring Instruments"}, {"q": "Compared with older analog meters, digital multimeters (DMM) and digital voltmeters (DVM) offer greater accuracy and:", "options": ["Lower input resistance (more loading)", "Slower readings", "No need for a power source", "Higher input resistance (less loading effect)"], "correct": 3, "short": "Higher input resistance", "expl": "The DVM/DMM offers greater accuracy, less ambiguity, and higher input resistance, which gives it less of a loading effect on a circuit.", "cite": "FAA-H-8083-30B p. 12-80", "topic": "Measuring Instruments"}, {"q": "The two most common materials used for semiconductors, each having four valence electrons, are germanium and:", "options": ["Silicon", "Copper", "Aluminum", "Carbon"], "correct": 0, "short": "Silicon", "expl": "The two most common semiconductor materials are germanium and silicon; each atom has four valence electrons. Silicon is preferred for its wider temperature range.", "cite": "FAA-H-8083-30B p. 12-95", "topic": "Semiconductors & Diodes"}, {"q": "The very stable bond in which two silicon atoms each share one electron equally is called a:", "options": ["Ionic bond", "Covalent bond", "Metallic bond", "Hydrogen bond"], "correct": 1, "short": "Covalent bond", "expl": "Two silicon atoms share electrons equally in a covalent bond, which is very stable and holds the atoms together tightly.", "cite": "FAA-H-8083-30B p. 12-95", "topic": "Semiconductors & Diodes"}, {"q": "The process of adding small amounts of impurities to a semiconductor material to increase its current flow is called:", "options": ["Biasing", "Rectifying", "Doping", "Sintering"], "correct": 2, "short": "Doping", "expl": "Doping is the process by which small amounts of additives (impurities) are added to a semiconductor to increase current flow by adding electrons or holes.", "cite": "FAA-H-8083-30B p. 12-96", "topic": "Semiconductors & Diodes"}, {"q": "A semiconductor doped with a donor impurity (such as phosphorus or arsenic) that produces an EXCESS of electrons is called:", "options": ["P-type", "Neutral-type", "Intrinsic", "N-type"], "correct": 3, "short": "N-type", "expl": "An N-type semiconductor is doped with a donor impurity, producing an excess of electrons; the electrons are the majority current carriers.", "cite": "FAA-H-8083-30B p. 12-96", "topic": "Semiconductors & Diodes"}, {"q": "A semiconductor doped with an acceptor impurity (such as boron or aluminum) that creates 'holes' is called:", "options": ["P-type", "N-type", "Donor-type", "Intrinsic"], "correct": 0, "short": "P-type", "expl": "A P-type semiconductor is doped with an acceptor impurity having only three valence electrons; this creates holes, which act as positive charges (the majority carrier).", "cite": "FAA-H-8083-30B p. 12-96", "topic": "Semiconductors & Diodes"}, {"q": "A two-element semiconductor device that uses the rectifying properties of a PN junction to permit current flow in one direction only is the:", "options": ["Transistor", "Diode (PN junction diode)", "Capacitor", "Resistor"], "correct": 1, "short": "Diode (PN junction diode)", "expl": "The semiconductor diode (PN junction diode) is a two-element device that converts AC into DC by permitting current flow in one direction only.", "cite": "FAA-H-8083-30B p. 12-98", "topic": "Semiconductors & Diodes"}, {"q": "The region around a PN junction that lacks free electrons and holes is called the:", "options": ["Conduction band", "Valence band", "Depletion region (barrier)", "Doping zone"], "correct": 2, "short": "Depletion region", "expl": "The area around the junction barrier lacks (is depleted of) free electrons and holes and is called the depletion region; the electrostatic field there is the barrier.", "cite": "FAA-H-8083-30B p. 12-98", "topic": "Semiconductors & Diodes"}, {"q": "A semiconductor diode allows current to flow easily in which condition?", "options": ["When reverse biased", "Only with AC applied", "In both directions equally", "When forward biased"], "correct": 3, "short": "When forward biased", "expl": "A forward-biased diode (negative source to N-type, positive source to P-type) conducts easily. Reverse bias blocks current. This one-way action makes a diode a rectifier.", "cite": "FAA-H-8083-30B p. 12-98", "topic": "Semiconductors & Diodes"}, {"q": "In a FORWARD biased diode, the negative voltage source connects to the N-type material and the positive source connects to the:", "options": ["P-type material", "N-type material", "Depletion zone", "Cathode"], "correct": 0, "short": "P-type material", "expl": "In a forward biased PN junction, the negative source connects to N-type and the positive source connects to P-type material, allowing current to flow easily.", "cite": "FAA-H-8083-30B p. 12-99", "topic": "Semiconductors & Diodes"}, {"q": "When a diode is REVERSE biased, the most noticeable effect is that the depletion zone becomes:", "options": ["Narrower", "Wider", "Neutral", "Conductive"], "correct": 1, "short": "Wider", "expl": "When reverse biased, holes and electrons move away from the junction, widening the depletion zone and preventing current flow by the majority carriers.", "cite": "FAA-H-8083-30B p. 12-99", "topic": "Semiconductors & Diodes"}, {"q": "A device that transforms AC into DC by limiting or regulating the direction of current flow is a:", "options": ["Inverter", "Transformer", "Rectifier", "Oscillator"], "correct": 2, "short": "Rectifier", "expl": "A rectifier transforms AC into DC by limiting/regulating current direction. The two methods discussed are the half-wave rectifier and the full-wave rectifier.", "cite": "FAA-H-8083-30B p. 12-100", "topic": "Semiconductors & Diodes"}, {"q": "A rectifier that produces output from only one half (e.g., the positive swing) of each AC cycle is a:", "options": ["Full-wave rectifier", "Bridge rectifier", "Zener rectifier", "Half-wave rectifier"], "correct": 3, "short": "Half-wave rectifier", "expl": "The half-wave rectifier reproduces the input minus the negative voltage swing — it uses only one half of each cycle.", "cite": "FAA-H-8083-30B p. 12-101", "topic": "Semiconductors & Diodes"}, {"q": "A full-wave bridge rectifier uses how many diodes, with the output being a continuous sequence of pulses?", "options": ["Four diodes", "Two diodes", "Three diodes", "One diode"], "correct": 0, "short": "Four diodes", "expl": "The full-wave bridge rectifier uses four diodes (D1-D4). During each half cycle, two diodes conduct so current passes through the load in the same direction both alternations.", "cite": "FAA-H-8083-30B p. 12-101", "topic": "Semiconductors & Diodes"}, {"q": "A diode designed to break down (conduct) at a specific reverse-bias voltage and act as a voltage regulator is a:", "options": ["Schottky diode", "Zener diode", "Light-emitting diode", "Photodiode"], "correct": 1, "short": "Zener diode", "expl": "Zener (breakdown) diodes conduct when reverse-bias voltage reaches a designed value, then behave like a constant voltage source — functioning as a voltage regulator.", "cite": "FAA-H-8083-30B p. 12-103", "topic": "Semiconductors & Diodes"}, {"q": "In a forward-biased diode where energy is dissipated as LIGHT rather than heat, the device is a:", "options": ["Zener diode", "Photodiode", "Light-emitting diode (LED)", "Varactor"], "correct": 2, "short": "Light-emitting diode (LED)", "expl": "In an LED, the energy released as electrons fall into holes is dissipated as light. Advantages over incandescent lamps: longer life, lower voltage, faster operation, less heat.", "cite": "FAA-H-8083-30B p. 12-103", "topic": "Semiconductors & Diodes"}, {"q": "A variable-capacitance diode whose capacitance is controlled by the reverse voltage applied is a:", "options": ["Zener", "Schottky", "LED", "Varactor (varicap)"], "correct": 3, "short": "Varactor", "expl": "The varactor (varicap) is a variable-capacitance diode; the reverse voltage applied controls its capacitance. It often replaces mechanically tuned capacitors.", "cite": "FAA-H-8083-30B p. 12-104", "topic": "Semiconductors & Diodes"}, {"q": "A three-terminal device used primarily to amplify signals and control current is the:", "options": ["Transistor", "Diode", "Capacitor", "Rectifier"], "correct": 0, "short": "Transistor", "expl": "The transistor is a three-terminal device used primarily to amplify signals and control current within a circuit.", "cite": "FAA-H-8083-30B p. 12-105", "topic": "Transistors"}, {"q": "The three regions of a transistor are the collector, the emitter, and the:", "options": ["Cathode", "Base", "Anode", "Gate"], "correct": 1, "short": "Base", "expl": "A transistor's three regions are the collector (moderately doped), the emitter (heavily doped), and the base (significantly less doped and thinnest).", "cite": "FAA-H-8083-30B p. 12-105", "topic": "Transistors"}, {"q": "Which transistor region is HEAVILY doped?", "options": ["The base", "The collector", "The emitter", "The gate"], "correct": 2, "short": "The emitter", "expl": "The emitter is heavily doped, the collector is moderately doped, and the base is significantly less doped (and thinnest).", "cite": "FAA-H-8083-30B p. 12-105", "topic": "Transistors"}, {"q": "Transistors are classified as either NPN or PNP according to:", "options": ["Their color code", "The number of leads", "Their power rating", "The arrangement of their N and P materials"], "correct": 3, "short": "Arrangement of N and P materials", "expl": "Transistors are classified NPN or PNP according to the arrangement of their N and P materials. NPN has P sandwiched between two N regions; PNP is the opposite.", "cite": "FAA-H-8083-30B p. 12-105", "topic": "Transistors"}, {"q": "On a transistor schematic symbol, how are NPN and PNP distinguished?", "options": ["By the direction of the arrow on the emitter", "By the color of the symbol", "By the number of terminals", "By the thickness of the base line"], "correct": 0, "short": "Direction of the emitter arrow", "expl": "The arrow is on the emitter. Arrow pointing IN = PNP; arrow pointing OUT = NPN.", "cite": "FAA-H-8083-30B p. 12-106", "topic": "Transistors"}, {"q": "To use a transistor as an amplifier, the emitter-base junction is biased in the forward direction (low resistance) and the collector-base junction is:", "options": ["Forward biased (low resistance)", "Reverse biased (high resistance)", "Left unbiased", "Shorted"], "correct": 1, "short": "Reverse biased (high resistance)", "expl": "For amplification, the emitter-base junction is forward biased (low resistance) and the collector-base junction is reverse biased (high resistance), producing power gain.", "cite": "FAA-H-8083-30B p. 12-106", "topic": "Transistors"}, {"q": "In a PNP transistor, the majority current carriers are:", "options": ["Electrons", "Ions", "Holes", "Protons"], "correct": 2, "short": "Holes", "expl": "In a PNP transistor the majority carriers are holes (the opposite of the NPN, where electrons are the majority carriers). To bias a PNP, the bias network polarity is reversed.", "cite": "FAA-H-8083-30B p. 12-107", "topic": "Transistors"}, {"q": "The name 'transistor' is a combination of which two words?", "options": ["Transmit and resistor", "Transform and resistor", "Transit and register", "Transfer and resistor"], "correct": 3, "short": "Transfer and resistor", "expl": "Because the device transfers current from a low-resistance path to a high-resistance one, its name combines 'transfer' and 'resistor' — transistor.", "cite": "FAA-H-8083-30B p. 12-107", "topic": "Transistors"}, {"q": "A transistor design with only ONE PN junction that is a VOLTAGE-controlled device (rather than current-controlled) is the:", "options": ["Field-effect transistor (FET)", "Bipolar transistor", "Zener", "Diode"], "correct": 0, "short": "Field-effect transistor (FET)", "expl": "The field-effect transistor (FET) has only one PN junction and is a voltage-controlled device, unlike the bipolar transistor which has two junctions and is current-controlled.", "cite": "FAA-H-8083-30B p. 12-107", "topic": "Transistors"}, {"q": "The transistor configuration that provides the best combination of voltage and current gain and is the only one giving a 180-degree phase reversal is the:", "options": ["Common-base (CB)", "Common-emitter (CE)", "Common-collector (CC)", "Common-source"], "correct": 1, "short": "Common-emitter (CE)", "expl": "The common-emitter (CE) configuration provides good gains for voltage, current, and power, and is the only configuration that provides a 180-degree phase reversal.", "cite": "FAA-H-8083-30B p. 12-108", "topic": "Transistors"}, {"q": "A logic gate whose output is HIGH only when ALL of its inputs are high is the:", "options": ["OR gate", "NOT gate", "AND gate", "NOR gate"], "correct": 2, "short": "AND gate", "expl": "The AND gate output is high only when all inputs are high. If any input is low, the output is low — it determines when conditions are met at the same time.", "cite": "FAA-H-8083-30B p. 12-121", "topic": "Logic Circuits"}, {"q": "A logic gate whose output is HIGH when ANY ONE (or more) of its inputs is high is the:", "options": ["AND gate", "NAND gate", "Inverter", "OR gate"], "correct": 3, "short": "OR gate", "expl": "The OR gate output is high whenever any one of its inputs is high; the output is low only when no input is high.", "cite": "FAA-H-8083-30B p. 12-121", "topic": "Logic Circuits"}, {"q": "A logic gate (also called a NOT gate) that converts one logic state into its opposite is the:", "options": ["Inverter", "AND gate", "OR gate", "NAND gate"], "correct": 0, "short": "Inverter (NOT gate)", "expl": "The inverter (NOT gate) converts one logic state into the opposite — a 1 to a 0 or a 0 to a 1.", "cite": "FAA-H-8083-30B p. 12-121", "topic": "Logic Circuits"}, {"q": "A NAND gate produces a LOW output only when:", "options": ["Any input is high", "All inputs are high", "All inputs are low", "Any input is low"], "correct": 1, "short": "All inputs are high", "expl": "NAND = NOT-AND (AND with inverted output). The NAND output is low only when all inputs are high; if any input is low, the output is high.", "cite": "FAA-H-8083-30B p. 12-122", "topic": "Logic Circuits"}, {"q": "Replacing the slip rings of a basic AC generator with two half-cylinders (a commutator) produces a:", "options": ["AC alternator", "Transformer", "Basic DC generator", "Inverter"], "correct": 2, "short": "Basic DC generator", "expl": "Replacing the slip rings with a commutator (two half cylinders) makes a basic DC generator; the commutator action produces a DC voltage.", "cite": "FAA-H-8083-30B p. 12-125", "topic": "Motors & Generators"}, {"q": "The rotating parts of a DC generator — the coil and commutator together — are called the:", "options": ["Stator", "Field", "Yoke", "Armature"], "correct": 3, "short": "Armature", "expl": "The rotating coil and commutator of a DC generator are together called the armature.", "cite": "FAA-H-8083-30B p. 12-125", "topic": "Motors & Generators"}, {"q": "What are the three basic types of DC motors?", "options": ["Series, shunt, and compound", "Rotary, static, and synchronous", "AC, DC, and universal", "Primary, secondary, and tertiary"], "correct": 0, "short": "Series, shunt, compound", "expl": "The three basic types of DC motors are series motors, shunt motors, and compound motors. They differ in how the field and armature coils are connected.", "cite": "FAA-H-8083-30B p. 12-141", "topic": "Motors & Generators"}, {"q": "Which DC motor has its field windings connected in SERIES with the armature, producing HIGH starting torque (used as an aircraft engine starter)?", "options": ["Shunt motor", "Series motor", "Compound motor", "Synchronous motor"], "correct": 1, "short": "Series motor", "expl": "In a series motor the field windings are in series with the armature; the large starting current produces high starting torque — its principal advantage. Used as engine starters and for gear/flap operation.", "cite": "FAA-H-8083-30B p. 12-141", "topic": "Motors & Generators"}, {"q": "What is the danger if a SERIES motor has its load removed entirely?", "options": ["It stalls immediately", "It reverses direction", "It may overspeed until the armature flies apart", "It draws no current"], "correct": 2, "short": "It may overspeed and fly apart", "expl": "A series motor runs at high speed under light load; if the load is removed entirely, the motor may operate at such a high speed that the armature flies apart.", "cite": "FAA-H-8083-30B p. 12-142", "topic": "Motors & Generators"}, {"q": "A DC motor whose field winding is connected in PARALLEL (shunt) with the armature, giving fairly constant speed, is a:", "options": ["Series motor", "Universal motor", "Stepper motor", "Shunt motor"], "correct": 3, "short": "Shunt motor", "expl": "In a shunt motor the field winding is connected in parallel (shunt) with the armature; starting torque is less than a series motor's, but speed is more constant.", "cite": "FAA-H-8083-30B p. 12-142", "topic": "Motors & Generators"}, {"q": "A DC motor that combines a series winding and a shunt winding in the field is a:", "options": ["Compound motor", "Series motor", "Shunt motor", "Synchronous motor"], "correct": 0, "short": "Compound motor", "expl": "The compound motor combines series and shunt motors; it has both a shunt winding and a series winding in the field. Its starting torque is higher than a shunt but lower than a series motor.", "cite": "FAA-H-8083-30B p. 12-142", "topic": "Motors & Generators"}, {"q": "When a DC motor's armature rotates in the magnetic field, a voltage is induced that opposes the applied voltage. This is called:", "options": ["Forward emf", "Counter (back) emf", "Self-induction", "Mutual induction"], "correct": 1, "short": "Counter (back) emf", "expl": "The voltage induced in the armature windings as it rotates is the counter (back) emf, opposite in direction to the applied voltage. It limits the armature current.", "cite": "FAA-H-8083-30B p. 12-142", "topic": "Motors & Generators"}, {"q": "As a DC motor's armature speed INCREASES, the counter emf increases and the current through the armature:", "options": ["Increases", "Stays the same", "Decreases", "Reverses"], "correct": 2, "short": "Decreases", "expl": "The faster the armature rotates, the greater the counter emf; counter emf opposes the applied voltage, so armature current decreases as speed increases. A motor draws high current on starting.", "cite": "FAA-H-8083-30B p. 12-142", "topic": "Motors & Generators"}, {"q": "An AC-series motor is a single-phase motor that resembles a DC motor in that it has brushes and a commutator, and it can operate on:", "options": ["AC only", "DC only", "Three-phase only", "Either AC or DC circuits"], "correct": 3, "short": "Either AC or DC", "expl": "The AC-series motor resembles a DC motor (brushes and commutator) and operates on either AC or DC circuits. Modifications (laminations, compensating winding) make it work well on AC.", "cite": "FAA-H-8083-30B p. 12-152", "topic": "Motors & Generators"}, {"q": "The frequency of an alternator's output voltage depends on the number of poles and the:", "options": ["Speed of rotation of the rotor", "Wire gauge", "Voltage applied", "Core material"], "correct": 0, "short": "Speed of rotation", "expl": "Alternator frequency depends on the number of poles and the speed of rotation: the faster the speed (or the more poles), the higher the frequency.", "cite": "FAA-H-8083-30B p. 12-157", "topic": "Motors & Generators"}, {"q": "A device used to convert a portion of the aircraft's DC power to AC (mainly for instruments, radio, radar, lighting) is an:", "options": ["Rectifier", "Inverter", "Alternator", "Transformer"], "correct": 1, "short": "Inverter", "expl": "An inverter converts DC power to AC, used mainly for instruments, radio, radar, lighting, and accessories — usually at 400 cps.", "cite": "FAA-H-8083-30B p. 12-93", "topic": "Motors & Generators"}, {"q": "Aircraft inverters are usually built to supply AC current at a frequency of:", "options": ["50 cps", "60 cps", "400 cps", "1,000 cps"], "correct": 2, "short": "400 cps", "expl": "Inverters are usually built to supply current at a frequency of 400 cps. Some provide more than one voltage (e.g., 26 V AC and 115 V AC).", "cite": "FAA-H-8083-30B p. 12-93", "topic": "Motors & Generators"}, {"q": "The two basic types of inverters are the rotary inverter and the:", "options": ["Linear inverter", "Magnetic inverter", "Thermal inverter", "Static (solid-state) inverter"], "correct": 3, "short": "Static (solid-state) inverter", "expl": "The two basic types of inverters are the rotary and the static (solid-state). Static inverters have no moving parts, are smaller, lighter, and more efficient.", "cite": "FAA-H-8083-30B p. 12-93", "topic": "Motors & Generators"}];
