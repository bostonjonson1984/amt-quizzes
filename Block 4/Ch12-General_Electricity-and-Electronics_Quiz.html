<title>Ch.12 General — Fundamentals of Electricity &amp; Electronics</title>
<style>
  :root{
    --navy:#0d2a4a; --navy2:#15436e; --gold:#ffce4d; --ink:#1c2330;
    --green:#1f9d57; --greenbg:#e7f7ee; --red:#d6453d; --redbg:#fdecea;
    --line:#e3e8f0; --muted:#5a6678; --card:#ffffff; --bg:#eef2f8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:0 16px env(safe-area-inset-bottom);
  }
  .wrap{width:100%; max-width:720px; margin:0 auto;}

  /* top bar */
  .bar{position:sticky; top:0; z-index:10; background:var(--bg); padding:14px 0 8px;}
  .barrow{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted); font-weight:600;}
  .score{color:var(--navy);}
  .prog{height:8px; background:#dbe3ee; border-radius:6px; margin-top:8px; overflow:hidden;}
  .progfill{height:100%; width:0; background:linear-gradient(90deg,var(--navy2),var(--gold)); transition:width .35s ease;}

  /* card */
  .card{background:var(--card); border-radius:14px; padding:22px 20px 20px; margin-top:14px;
        box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .tag{display:inline-block; background:#eef2f8; color:var(--navy2); font-size:10.5px; font-weight:800;
       letter-spacing:.5px; padding:3px 9px; border-radius:11px; text-transform:uppercase;}
  .stem{font-size:19px; line-height:1.42; font-weight:600; margin:12px 0 18px; color:#0d1b2a;}

  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{display:flex; align-items:flex-start; gap:11px; width:100%; text-align:left;
       background:#f7f9fc; border:1.5px solid var(--line); border-radius:11px;
       padding:14px 15px; font-size:16px; line-height:1.35; cursor:pointer;
       transition:border-color .12s, background .12s, transform .05s; color:var(--ink);}
  .opt:hover:not(.locked){border-color:var(--navy2); background:#fff;}
  .opt:active:not(.locked){transform:scale(.995);}
  .opt .L{flex:0 0 26px; height:26px; border-radius:50%; background:#e6ecf4; color:var(--navy);
          font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;}
  .opt .T{flex:1; padding-top:2px;}
  .opts.locked .opt{cursor:default;}
  .opt.correct{border-color:var(--green); background:var(--greenbg);}
  .opt.correct .L{background:var(--green); color:#fff;}
  .opt.wrong{border-color:var(--red); background:var(--redbg);}
  .opt.wrong .L{background:var(--red); color:#fff;}
  .opt .mark{margin-left:auto; font-weight:800; font-size:15px; align-self:center;}
  .opt.correct .mark{color:var(--green);}
  .opt.wrong .mark{color:var(--red);}

  /* feedback */
  .fb{margin-top:16px; border-radius:11px; padding:15px 16px; display:none;}
  .fb.show{display:block; animation:rise .25s ease;}
  @keyframes rise{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .fb.ok{background:var(--greenbg); border:1px solid #b9e6cb;}
  .fb.no{background:var(--redbg); border:1px solid #f3c6c2;}
  .fb .verdict{font-weight:800; font-size:15px; margin-bottom:5px;}
  .fb.ok .verdict{color:var(--green);}
  .fb.no .verdict{color:var(--red);}
  .fb .ans{font-weight:700; margin-bottom:6px;}
  .fb .expl{font-size:14.5px; line-height:1.5; color:#27313f;}
  .fb .cite{margin-top:9px; font-size:12.5px; color:var(--muted); font-style:italic;}

  .nav{display:flex; gap:10px; margin:16px 0 26px;}
  .btn{flex:1; border:none; border-radius:11px; padding:15px; font-size:16px; font-weight:700;
       cursor:pointer; font-family:inherit;}
  .btn.primary{background:var(--navy); color:#fff;}
  .btn.primary:hover{background:var(--navy2);}
  .btn.ghost{background:#fff; color:var(--navy); border:1.5px solid var(--line);}
  .btn:disabled{opacity:.4; cursor:default;}
  .hint{text-align:center; font-size:12px; color:var(--muted); margin:-12px 0 22px;}

  /* start + results screens */
  .screen{background:var(--card); border-radius:16px; padding:30px 24px; margin-top:22px; text-align:center;
          box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .screen h1{font-size:24px; margin:0 0 6px; color:var(--navy);}
  .screen .sub{color:var(--muted); font-size:14px; margin-bottom:22px; line-height:1.45;}
  .bigscore{font-size:60px; font-weight:800; color:var(--navy); line-height:1; margin:8px 0;}
  .bigscore small{font-size:22px; color:var(--muted); font-weight:600;}
  .pct{font-size:17px; font-weight:700; margin-bottom:18px;}
  .pass{color:var(--green);} .fail{color:var(--red);}
  .opt.toggle{justify-content:center; cursor:pointer; font-weight:600; max-width:320px; margin:0 auto 18px;}
  .opt.toggle.on{border-color:var(--navy2); background:#eef4fb;}
  .misslist{text-align:left; margin-top:6px;}
  .missitem{border-left:3px solid var(--red); background:#fff6f5; border-radius:6px; padding:11px 13px; margin-bottom:10px;}
  .missitem .mq{font-weight:600; font-size:14.5px; margin-bottom:5px;}
  .missitem .ma{font-size:13.5px; color:#27313f;} .missitem .mc{font-size:12px; color:var(--muted); font-style:italic; margin-top:4px;}
  .allright{font-size:16px; color:var(--green); font-weight:700; margin:14px 0;}
  details.drill{margin:18px 0 4px; text-align:left;}
  details.drill summary{cursor:pointer; font-weight:700; color:var(--navy); font-size:15px; padding:8px 0;}
  .drillrow{border-bottom:1px solid var(--line); padding:9px 2px; font-size:13.5px;}
  .drillrow b{color:var(--navy2);}
  .foot{text-align:center; color:#9aa6b8; font-size:11px; margin:10px 0 26px;}
</style>

<script>
const DATA  = [{"q": "Anything that has mass and volume — the substance physical objects are made of — is defined as:", "options": ["Matter", "Energy", "Charge", "A field"], "correct": 0, "short": "Matter", "expl": "Matter is anything that has mass and volume and is the substance of which physical objects are composed. Its four states are solids, liquids, gases, and plasma; the technician deals with solids, liquids, and gases.", "cite": "FAA-H-8083-30B p. 12-1", "topic": "Matter & Atoms"}, {"q": "A substance that cannot be reduced to a simpler form by chemical means — such as iron, gold, or oxygen — is called a(n):", "options": ["Compound", "Element", "Mixture", "Molecule"], "correct": 1, "short": "Element", "expl": "An element cannot be reduced to a simpler form by chemical means. A compound, by contrast, is a chemical combination of two or more elements (e.g., water = 2 hydrogen + 1 oxygen).", "cite": "FAA-H-8083-30B p. 12-1", "topic": "Matter & Atoms"}, {"q": "A chemical combination of two or more elements — such as water (two hydrogen atoms and one oxygen atom) — is a:", "options": ["Element", "Ion", "Compound", "Isotope"], "correct": 2, "short": "Compound", "expl": "A compound is a chemical combination of two or more elements. Water is the most common example. Substances composed of only one type of atom are elements.", "cite": "FAA-H-8083-30B p. 12-1", "topic": "Matter & Atoms"}, {"q": "What is the smallest particle of matter that can exist and still retain the identity of a substance such as water?", "options": ["Atom", "Proton", "Electron", "Molecule"], "correct": 3, "short": "Molecule", "expl": "The molecule (e.g., H2O) is the smallest particle of matter that can exist and still retain its identity. The atom is the basic building block, but the molecule retains the substance's identity.", "cite": "FAA-H-8083-30B p. 12-1", "topic": "Matter & Atoms"}, {"q": "The most basic building block of all matter, composed of protons, neutrons, and electrons, is the:", "options": ["Atom", "Molecule", "Compound", "Cell"], "correct": 0, "short": "Atom", "expl": "The atom is the most basic building block of all matter and is composed of three subatomic particles: protons, neutrons, and electrons.", "cite": "FAA-H-8083-30B p. 12-1", "topic": "Matter & Atoms"}, {"q": "Which two subatomic particles are located in the nucleus of an atom?", "options": ["Protons and electrons", "Protons and neutrons", "Electrons and neutrons", "Ions and electrons"], "correct": 1, "short": "Protons and neutrons", "expl": "At the center of the atom is the nucleus, which contains the positively-charged protons and the neutrally-charged neutrons. The electrons orbit at the periphery.", "cite": "FAA-H-8083-30B p. 12-1", "topic": "Matter & Atoms"}, {"q": "Which subatomic particle carries a NEGATIVE charge and has a very small mass compared to a proton?", "options": ["Proton", "Neutron", "Electron", "Nucleus"], "correct": 2, "short": "Electron", "expl": "The electron is the negatively-charged particle with a very small mass. The proton's mass is approximately 1,837 times greater than that of the electron.", "cite": "FAA-H-8083-30B p. 12-2", "topic": "Matter & Atoms"}, {"q": "Approximately how many times greater is the mass of a proton compared to the mass of an electron?", "options": ["18 times", "183 times", "18,370 times", "1,837 times"], "correct": 3, "short": "About 1,837 times", "expl": "The proton's mass is approximately 1,837 times greater than the electron's. Because of this, the number of protons and neutrons in the nucleus determines an atom's overall weight; the electron's weight is not considered.", "cite": "FAA-H-8083-30B p. 12-2", "topic": "Matter & Atoms"}, {"q": "An atom is said to have a NEUTRAL charge when:", "options": ["The positive proton charge equals the negative electron charge", "It has more electrons than protons", "It has more protons than electrons", "It contains only neutrons"], "correct": 0, "short": "Proton (+) charge = electron (-) charge", "expl": "When the total positive charge of the protons in the nucleus equals the total negative charge of the orbiting electrons, the atom has a neutral charge.", "cite": "FAA-H-8083-30B p. 12-2", "topic": "Matter & Atoms"}, {"q": "The maximum number of electrons that any shell can hold is defined by the equation:", "options": ["2n", "2n^2", "n^2", "n/2"], "correct": 1, "short": "2n^2", "expl": "Electron capacity = 2n^2, where n is the energy level. The first shell holds 2 electrons, the second 8, the third 18, and so on.", "cite": "FAA-H-8083-30B p. 12-2", "topic": "Matter & Atoms"}, {"q": "The number of chemical bonds an atom can form — determined by the number of electrons in its outermost shell — is called its:", "options": ["Permeability", "Resistivity", "Valence", "Polarity"], "correct": 2, "short": "Valence", "expl": "Valence is the number of chemical bonds an atom can form; the electrons in the outermost shell are the valence electrons and determine valence.", "cite": "FAA-H-8083-30B p. 12-2", "topic": "Matter & Atoms"}, {"q": "The process by which an atom loses or gains electrons is called:", "options": ["Saturation", "Doping", "Induction", "Ionization"], "correct": 3, "short": "Ionization", "expl": "Ionization is the process by which an atom loses or gains electrons, making it a positive or negative ion.", "cite": "FAA-H-8083-30B p. 12-2", "topic": "Matter & Atoms"}, {"q": "An atom that has LOST an electron becomes a positively charged particle called a:", "options": ["Positive ion (cation)", "Anion", "Free electron", "Neutron"], "correct": 0, "short": "Positive ion (cation)", "expl": "Dislodging an electron leaves the atom net positive — a positive ion or cation. An atom that GAINS an electron becomes a negative ion or anion.", "cite": "FAA-H-8083-30B p. 12-2", "topic": "Matter & Atoms"}, {"q": "An atom that has GAINED an extra electron is negatively charged and is called a(n):", "options": ["Cation", "Negative ion (anion)", "Proton", "Free electron"], "correct": 1, "short": "Negative ion (anion)", "expl": "An atom that gains an extra electron is negatively charged and is called a negative ion or anion. Losing an electron yields a positive ion (cation).", "cite": "FAA-H-8083-30B p. 12-2", "topic": "Matter & Atoms"}, {"q": "The loosely-bound outermost electrons that can drift from atom to atom and make up current flow are called:", "options": ["Bound electrons", "Valence ions", "Free electrons", "Core electrons"], "correct": 2, "short": "Free electrons", "expl": "Free electrons are the loosely-bound outermost electrons that can be easily dislodged and travel atom-to-atom, becoming the flow of electrons called current.", "cite": "FAA-H-8083-30B p. 12-2", "topic": "Matter & Atoms"}, {"q": "Which group of materials makes the BEST electrical conductors because of their many free electrons?", "options": ["Glass, ceramic, plastic", "Silicon and germanium", "Rubber and porcelain", "Gold, copper, and silver"], "correct": 3, "short": "Gold, copper, and silver", "expl": "Gold, copper, and silver possess many free electrons and make good conductors. Copper and silver have just one electron in their outer orbit.", "cite": "FAA-H-8083-30B p. 12-3", "topic": "Conductors & Insulators"}, {"q": "Glass, ceramic, and plastic do NOT conduct electrical current well because, under normal conditions, their atoms:", "options": ["Do not produce free electrons", "Have too many free electrons", "Are radioactive", "Are magnetic"], "correct": 0, "short": "Do not produce free electrons", "expl": "Insulators such as glass, ceramic, and plastic do not produce free electrons under normal conditions; the absence of free electrons means current cannot be conducted.", "cite": "FAA-H-8083-30B p. 12-3", "topic": "Conductors & Insulators"}, {"q": "When an insulator is placed in an extremely strong electrical field and its outer electrons are dislodged, the resulting action that usually causes physical damage is called:", "options": ["Saturation", "Breakdown", "Ionization", "Doping"], "correct": 1, "short": "Breakdown", "expl": "Only in an extremely strong electrical field will an insulator's outer electrons be dislodged; this action is called breakdown and usually damages the insulator.", "cite": "FAA-H-8083-30B p. 12-4", "topic": "Conductors & Insulators"}, {"q": "Silicon and germanium — the two most widely used materials for transistors and integrated circuits — are classified as:", "options": ["Conductors", "Insulators", "Semiconductors", "Superconductors"], "correct": 2, "short": "Semiconductors", "expl": "Semiconductor properties fall between conductors and insulators; in their pure state they neither conduct nor insulate well. Silicon and germanium are the most widely used.", "cite": "FAA-H-8083-30B p. 12-4", "topic": "Conductors & Insulators"}, {"q": "In electrical work, the prefix 'kilo' (k) means:", "options": ["One-thousandth", "One million", "One-millionth", "One thousand"], "correct": 3, "short": "One thousand", "expl": "Kilo (k) means one thousand. Mega (M) = one million; milli (m) = one-thousandth; micro (mu) = one-millionth.", "cite": "FAA-H-8083-30B p. 12-4", "topic": "Metric Prefixes"}, {"q": "The prefix 'micro' used in electrical calculations means:", "options": ["One-millionth", "One million", "One thousand", "One-thousandth"], "correct": 0, "short": "One-millionth", "expl": "Micro (mu) means one-millionth (1/1,000,000). Milli means one-thousandth. These appear constantly with farads (microfarad) and amps.", "cite": "FAA-H-8083-30B p. 12-4", "topic": "Metric Prefixes"}, {"q": "Electricity in which the electrons are at rest (a buildup of charge on the surface of an object, with no current flowing) is called:", "options": ["Dynamic electricity", "Static electricity", "Alternating current", "Direct current"], "correct": 1, "short": "Static electricity", "expl": "Static electricity is a buildup of charge on the surface of an object; it is 'static' because no current is flowing. Dynamic electricity has electrons in motion.", "cite": "FAA-H-8083-30B p. 12-4", "topic": "Static Electricity"}, {"q": "Per the fundamental law of static electricity (and magnetism), how do charges behave?", "options": ["Like charges attract; unlike charges repel", "All charges attract", "Like charges repel; unlike charges attract", "All charges repel"], "correct": 2, "short": "Like charges repel; unlike charges attract", "expl": "One of the most fundamental laws of static electricity and magnetism: like charges repel each other and unlike charges attract each other.", "cite": "FAA-H-8083-30B p. 12-4", "topic": "Static Electricity"}, {"q": "The field of force that exists around a charged body, represented by lines extending in all directions, is called the:", "options": ["Magnetic field", "Gravitational field", "Eddy field", "Electrostatic (dielectric) field"], "correct": 3, "short": "Electrostatic (dielectric) field", "expl": "A field of force around a charged body is an electrostatic field (sometimes called a dielectric field), represented by lines extending in all directions.", "cite": "FAA-H-8083-30B p. 12-5", "topic": "Static Electricity"}, {"q": "By arbitrary agreement, the direction of an electrostatic field is determined using a small:", "options": ["Positive test charge", "Negative test charge", "Neutral test charge", "Magnetic pole"], "correct": 0, "short": "Positive test charge", "expl": "It is arbitrarily agreed that a small positive test charge is used to determine field direction; the field around a positive charge points away from it.", "cite": "FAA-H-8083-30B p. 12-5", "topic": "Static Electricity"}, {"q": "On an irregularly-shaped charged object, the greatest charge concentrates at:", "options": ["The flat surfaces", "The points or areas of sharpest curvature", "The center", "The areas of least curvature"], "correct": 1, "short": "The points / sharpest curvature", "expl": "The charge on an irregularly-shaped object is not evenly distributed; the greatest charge is at the points, or areas of sharpest curvature.", "cite": "FAA-H-8083-30B p. 12-5", "topic": "Static Electricity"}, {"q": "One of the most frequent causes of damage to a solid-state component or integrated circuit when handled is:", "options": ["Magnetic interference", "High humidity", "Electrostatic discharge (ESD)", "Low voltage"], "correct": 2, "short": "Electrostatic discharge (ESD)", "expl": "ESD from the human body is one of the most frequent causes of damage to solid-state components. ESD-sensitive parts ship in special protective bags.", "cite": "FAA-H-8083-30B p. 12-5", "topic": "Static Electricity"}, {"q": "To safely protect a solid-state component from ESD while handling it, a technician should:", "options": ["Hold it by the pins", "Keep it in direct sunlight", "Warm it before handling", "Wear a grounding wrist strap and discharge body static"], "correct": 3, "short": "Wear a grounding wrist strap", "expl": "ESD damage is avoided by discharging body static (touch the chassis of the removed box), wearing a grounding wrist strap, and good professional handling.", "cite": "FAA-H-8083-30B p. 12-5", "topic": "Static Electricity"}, {"q": "Magnetism is defined as the property of an object to attract certain metallic substances, generally those composed of iron or iron alloys, which are called:", "options": ["Ferrous materials", "Nonferrous materials", "Diamagnetic materials", "Dielectric materials"], "correct": 0, "short": "Ferrous materials", "expl": "Magnetism is the property of an object to attract certain metallic substances — generally ferrous materials (iron or iron alloys such as soft iron, steel, and alnico).", "cite": "FAA-H-8083-30B p. 12-6", "topic": "Magnetism"}, {"q": "Which three nonferrous materials are magnetic to a limited degree?", "options": ["Copper, aluminum, tin", "Nickel, cobalt, and gadolinium", "Brass, bronze, zinc", "Silver, gold, lead"], "correct": 1, "short": "Nickel, cobalt, gadolinium", "expl": "Magnetic materials include at least three nonferrous materials magnetic to a limited degree: nickel, cobalt, and gadolinium.", "cite": "FAA-H-8083-30B p. 12-6", "topic": "Magnetism"}, {"q": "Substances that are REPELLED by both poles of a magnet are classified as:", "options": ["Ferromagnetic", "Paramagnetic", "Diamagnetic", "Nonmagnetic"], "correct": 2, "short": "Diamagnetic", "expl": "A few non-magnetic substances (e.g., bismuth) are diamagnetic, having a permeability less than one; they are repelled by both poles of a magnet.", "cite": "FAA-H-8083-30B p. 12-6", "topic": "Magnetism"}, {"q": "The 'N' end of a freely-suspended bar magnet is more precisely described as the:", "options": ["North-repelling end", "Neutral pole", "Negative pole", "North-seeking pole"], "correct": 3, "short": "North-seeking pole", "expl": "If a magnet swings freely it aligns with the earth; the 'N' end is the North-seeking pole, which points toward the North magnetic pole.", "cite": "FAA-H-8083-30B p. 12-6", "topic": "Magnetism"}, {"q": "The individual lines making up a magnetic field are called lines of force, also referred to as:", "options": ["Magnetic flux", "Reluctance", "Coercivity", "Eddy currents"], "correct": 0, "short": "Magnetic flux", "expl": "The invisible lines making up the magnetic field are the lines of force, also called magnetic flux. They are concentrated at the North and South poles.", "cite": "FAA-H-8083-30B p. 12-8", "topic": "Magnetism"}, {"q": "When no more lines of force can be induced into a piece of magnetic material, the material is said to be:", "options": ["Polarized", "Saturated", "Neutralized", "Demagnetized"], "correct": 1, "short": "Saturated", "expl": "There is a limit to the number of lines of force a magnet can hold; when no more can be induced, the material is saturated.", "cite": "FAA-H-8083-30B p. 12-8", "topic": "Magnetism"}, {"q": "Magnetic lines of force behave such that:", "options": ["They cross each other freely", "They have no direction", "They never cross one another and actually repel each other", "They only exist in air"], "correct": 2, "short": "They never cross and repel each other", "expl": "Lines of force are separate, individual forces; one line never crosses another — they actually repel one another and remain parallel.", "cite": "FAA-H-8083-30B p. 12-8", "topic": "Magnetism"}, {"q": "When storing a magnet, 'keeper bars' are installed across the poles to:", "options": ["Increase the magnet's heat", "Reverse the polarity", "Add electrical charge", "Provide an easy flux path and promote retention of magnetism"], "correct": 3, "short": "Provide an easy flux path / retain magnetism", "expl": "Keeper bars provide an easy path for flux lines from one pole to the other, promoting retention of the molecules' North-South alignment.", "cite": "FAA-H-8083-30B p. 12-8", "topic": "Magnetism"}, {"q": "Heating, hammering, or dropping a magnet causes the strength of the magnet to:", "options": ["Decrease", "Increase", "Remain the same", "Reverse"], "correct": 0, "short": "Decrease", "expl": "Heating or sudden shock creates misalignment of the molecules, causing the magnet's strength to decrease.", "cite": "FAA-H-8083-30B p. 12-8", "topic": "Magnetism"}, {"q": "The measure of the EASE with which magnetic flux can penetrate a material is called:", "options": ["Reluctance", "Permeability", "Retentivity", "Coercivity"], "correct": 1, "short": "Permeability", "expl": "Permeability is the measure of the ease with which magnetic flux can penetrate a material. Soft iron and ferrous metals have high permeability. A vacuum is rated 1.", "cite": "FAA-H-8083-30B p. 12-9", "topic": "Magnetism"}, {"q": "The permeability scale is based on a perfect vacuum, which is given a rating of:", "options": ["0", "100", "1", "1,000"], "correct": 2, "short": "1", "expl": "The permeability scale is based on a perfect vacuum with a rating of one; air and nonmagnetic materials are so close they are also considered to have a rating of one.", "cite": "FAA-H-8083-30B p. 12-9", "topic": "Magnetism"}, {"q": "Iron and its alloys, which have by far the greatest permeability, are termed:", "options": ["Paramagnetic", "Diamagnetic", "Nonmagnetic", "Ferromagnetic"], "correct": 3, "short": "Ferromagnetic", "expl": "Ferromagnetic applies to iron and its alloys, which have by far the greatest permeability. Nonferrous metals with permeability greater than one (nickel, cobalt) are paramagnetic.", "cite": "FAA-H-8083-30B p. 12-9", "topic": "Magnetism"}, {"q": "The measure of OPPOSITION a material offers to magnetic lines of force — comparable to resistance in an electrical circuit — is called:", "options": ["Reluctance", "Permeability", "Flux", "Retentivity"], "correct": 0, "short": "Reluctance", "expl": "Reluctance is the measure of opposition to lines of force, comparable to electrical resistance. The reluctance of soft iron is much lower than that of air.", "cite": "FAA-H-8083-30B p. 12-9", "topic": "Magnetism"}, {"q": "A magnet that retains its magnetism long after the magnetizing force is removed is classified as a:", "options": ["Temporary magnet", "Permanent magnet", "Electromagnet", "Ring magnet"], "correct": 1, "short": "Permanent magnet", "expl": "Permanent magnets retain their magnetism long after the magnetizing force is removed; temporary magnets quickly lose most of their magnetism.", "cite": "FAA-H-8083-30B p. 12-9", "topic": "Magnetism"}, {"q": "The ability of a magnet to HOLD its magnetism, which varies with the type of metal, is known as:", "options": ["Reluctance", "Permeability", "Retentivity", "Saturation"], "correct": 2, "short": "Retentivity", "expl": "Retentivity is the ability of a magnet to hold its magnetism. Soft iron magnetizes easily but loses most of its magnetism quickly when the force is removed.", "cite": "FAA-H-8083-30B p. 12-11", "topic": "Magnetism"}, {"q": "The small amount of magnetism remaining in soft iron after the magnetizing force is removed — important to generator operation — is called:", "options": ["Saturation", "Coercive force", "Permeability", "Residual magnetism"], "correct": 3, "short": "Residual magnetism", "expl": "The small amount of magnetism remaining after the force is removed is residual magnetism, of great importance in such applications as generator operation.", "cite": "FAA-H-8083-30B p. 12-11", "topic": "Magnetism"}, {"q": "Which alloy of iron, aluminum, nickel, and cobalt is considered one of the very best permanent-magnet materials?", "options": ["Alnico", "Constantan", "Manganin", "Nichrome"], "correct": 0, "short": "Alnico", "expl": "Alnico (aluminum-nickel-cobalt) is considered one of the very best permanent-magnet materials. Others include ferrites, neodymium-iron-boron, and samarium-cobalt.", "cite": "FAA-H-8083-30B p. 12-11", "topic": "Magnetism"}, {"q": "In 1820, who discovered that a compass needle is deflected near a current-carrying conductor, demonstrating a link between electricity and magnetism?", "options": ["Faraday", "Oersted", "Lenz", "Ohm"], "correct": 1, "short": "Oersted", "expl": "In 1820, Danish physicist Hans Christian Oersted discovered that a compass needle is deflected near a current-carrying conductor, linking electricity and magnetism.", "cite": "FAA-H-8083-30B p. 12-12", "topic": "Electromagnetism"}, {"q": "The magnetic field around a straight current-carrying conductor takes what shape?", "options": ["A straight line along the wire", "A single loop at the end", "A series of concentric circles around the conductor", "A square pattern"], "correct": 2, "short": "Concentric circles around the conductor", "expl": "A series of concentric circles around the conductor represents the field; if all lines were shown it would appear as a continuous cylinder of circles.", "cite": "FAA-H-8083-30B p. 12-12", "topic": "Electromagnetism"}, {"q": "Per the handbook, which rule determines the direction of the magnetic field lines around a current-carrying conductor when the direction of current flow is known?", "options": ["Right-hand rule", "Fleming's rule", "Lenz's rule", "Left-hand rule"], "correct": 3, "short": "Left-hand rule", "expl": "Grasp the conductor in the LEFT hand with the thumb pointing in the direction of current flow; the fingers wrap in the direction of the magnetic field lines. This is the left-hand rule.", "cite": "FAA-H-8083-30B p. 12-12", "topic": "Electromagnetism"}, {"q": "A coil of wire loops with a soft-iron core inside, which concentrates the magnetic flux, is called a(n):", "options": ["Electromagnet", "Capacitor", "Resistor", "Rheostat"], "correct": 0, "short": "Electromagnet", "expl": "An iron core in a coil of wire loops is an electromagnet; the soft iron (greater permeability than air) concentrates the flux in the center and the poles act like a bar magnet.", "cite": "FAA-H-8083-30B p. 12-13", "topic": "Electromagnetism"}, {"q": "Adding a soft-iron core to a current-carrying coil does which TWO things?", "options": ["Decreases flux and disperses lines", "Increases the magnetic flux and concentrates the flux lines", "Reverses polarity and adds resistance", "Lowers voltage and raises current"], "correct": 1, "short": "Increases flux & concentrates lines", "expl": "The soft-iron core does two things: it increases the magnetic flux and concentrates the flux lines.", "cite": "FAA-H-8083-30B p. 12-13", "topic": "Electromagnetism"}, {"q": "Per the handbook, the polarity (North/South) of a current-carrying coil/electromagnet is found by grasping the coil with the LEFT hand so the fingers point in the direction of electron flow (minus to plus); the thumb then points to the:", "options": ["South pole", "Center of the coil", "North pole", "Direction of flux only"], "correct": 2, "short": "North pole", "expl": "Using the left-hand rule for a coil, with fingers curved in the direction of electron flow (minus to plus), the thumb points to the North pole.", "cite": "FAA-H-8083-30B p. 12-14", "topic": "Electromagnetism"}, {"q": "The strength of an electromagnet's field can be increased by increasing the current flow or by:", "options": ["Decreasing the number of loops", "Reversing the polarity", "Cooling the core", "Increasing the number of loops in the wire"], "correct": 3, "short": "Increasing the number of loops", "expl": "Field strength is increased by increasing current flow or the number of loops; doubling either approximately doubles the field strength. The core metal type is also a factor.", "cite": "FAA-H-8083-30B p. 12-14", "topic": "Electromagnetism"}, {"q": "A device in which a spring-loaded iron core is pulled to a center position to complete a circuit when a coil is energized is a:", "options": ["Solenoid (solenoid switch/relay)", "Capacitor", "Rectifier", "Potentiometer"], "correct": 0, "short": "Solenoid", "expl": "The solenoid (also called solenoid switch or relay) uses a spring-loaded off-center iron core that is rapidly pulled to center when the coil is energized, completing a circuit.", "cite": "FAA-H-8083-30B p. 12-14", "topic": "Electromagnetism"}, {"q": "The conventional current theory, advanced by Benjamin Franklin, holds that current flows:", "options": ["From negative to positive", "From positive (+) to negative (-)", "In both directions at once", "Only in AC circuits"], "correct": 1, "short": "Positive to negative", "expl": "Conventional current theory, advanced by Franklin, visualizes current as flowing from positive (+) to negative (-). Electron flow is the opposite.", "cite": "FAA-H-8083-30B p. 12-14", "topic": "Conventional vs Electron Flow"}, {"q": "How does the FAA officially define the direction of current flow?", "options": ["Conventional flow (positive to negative)", "Drift flow", "Electron flow (negative to positive)", "Bidirectional flow"], "correct": 2, "short": "Electron flow (negative to positive)", "expl": "The FAA officially defines current flow using electron theory: negative to positive. Electron flow is what actually happens — electrons flow from the negative source to the positive.", "cite": "FAA-H-8083-30B p. 12-14", "topic": "Conventional vs Electron Flow"}, {"q": "The electromotive force (emf) — the push or pressure that moves electrons through a circuit — is represented by which symbol and measured in what unit?", "options": ["Symbol I, measured in amperes", "Symbol R, measured in ohms", "Symbol Q, measured in coulombs", "Symbol E, measured in volts"], "correct": 3, "short": "Symbol E, measured in volts", "expl": "The symbol for emf is the capital letter 'E', and it is measured in volts. It is the electrical pressure that moves electrons.", "cite": "FAA-H-8083-30B p. 12-14", "topic": "EMF, Current & Units"}, {"q": "Voltage (potential difference) is best described as a value that is:", "options": ["Determined between two points", "A flow through one point", "Always equal to current", "Independent of the circuit"], "correct": 0, "short": "Determined between two points", "expl": "Unlike current (a flow), voltage is determined between two points — it is the potential difference or emf felt across two points.", "cite": "FAA-H-8083-30B p. 12-14", "topic": "EMF, Current & Units"}, {"q": "Electrons in motion making up an electric current are measured as a rate of charge flow. What is the symbol used for current in formulas?", "options": ["E", "I", "R", "Q"], "correct": 1, "short": "I", "expl": "The symbol used to indicate current in formulas or on schematics is the capital letter 'I'. Current is a measure of the rate at which charge flows.", "cite": "FAA-H-8083-30B p. 12-16", "topic": "EMF, Current & Units"}, {"q": "One ampere (A) of current is equivalent to how much charge passing a point in one second?", "options": ["1 volt", "1 ohm", "1 coulomb", "1 joule"], "correct": 2, "short": "1 coulomb", "expl": "1 A = 1 coulomb per second. One ampere equals one coulomb of charge passing through a conductor in one second.", "cite": "FAA-H-8083-30B p. 12-17", "topic": "EMF, Current & Units"}, {"q": "One coulomb of charge is equal to approximately how many electrons?", "options": ["6.28 thousand", "6.28 million", "1,837", "6.28 billion"], "correct": 3, "short": "6.28 billion electrons", "expl": "The handbook states one coulomb of charge equals 6.28 billion electrons. (Note: 1 A = 1 C/s.)", "cite": "FAA-H-8083-30B p. 12-17", "topic": "EMF, Current & Units"}, {"q": "When current flows in only ONE direction through a circuit, it is called:", "options": ["Direct current (DC)", "Alternating current (AC)", "Inductive current", "Eddy current"], "correct": 0, "short": "Direct current (DC)", "expl": "When current flow is in one direction it is direct current (DC). Current that periodically oscillates back and forth is alternating current (AC).", "cite": "FAA-H-8083-30B p. 12-17", "topic": "EMF, Current & Units"}, {"q": "The relatively slow average velocity at which electrons drift toward the positive end of a conductor is called the:", "options": ["Escape velocity", "Drift velocity", "Phase velocity", "Saturation velocity"], "correct": 1, "short": "Drift velocity", "expl": "The average velocity of the charge is called drift velocity — a relatively slow speed — even though the effect of current is nearly instantaneous.", "cite": "FAA-H-8083-30B p. 12-17", "topic": "EMF, Current & Units"}, {"q": "Ohm's Law states that current equals voltage divided by resistance. Which equation expresses this?", "options": ["I = E x R", "I = R / E", "I = E / R", "E = I / R"], "correct": 2, "short": "I = E / R", "expl": "Ohm's Law: I = E/R, where I is current (A), E is voltage (V), and R is resistance (ohms). Transposed: E = I x R and R = E/I.", "cite": "FAA-H-8083-30B p. 12-17", "topic": "Ohm's Law"}, {"q": "Transposing Ohm's Law to solve for voltage gives which equation?", "options": ["E = I / R", "E = R / I", "E = I + R", "E = I x R"], "correct": 3, "short": "E = I x R", "expl": "Multiplying I = E/R by R gives the second form of Ohm's Law: E = I(R).", "cite": "FAA-H-8083-30B p. 12-18", "topic": "Ohm's Law"}, {"q": "Transposing Ohm's Law to solve for resistance gives which equation?", "options": ["R = E / I", "R = I x E", "R = I / E", "R = E + I"], "correct": 0, "short": "R = E / I", "expl": "Dividing E = I(R) by I gives the third form of Ohm's Law: R = E/I.", "cite": "FAA-H-8083-30B p. 12-18", "topic": "Ohm's Law"}, {"q": "Using the handbook's graph example with a constant 20-ohm resistance, if 60 volts are applied the current is:", "options": ["0.5 A", "3 A", "6 A", "30 A"], "correct": 1, "short": "3 amperes", "expl": "I = E/R = 60 V / 20 ohms = 3 A. This matches the handbook's linear-relationship graph (E=10 gives 0.5 A, E=60 gives 3 A, E=120 gives 6 A).", "cite": "FAA-H-8083-30B p. 12-17", "topic": "Ohm's Law"}, {"q": "A circuit has 28 volts applied across a 14-ohm resistor. How much current flows?", "options": ["0.5 A", "14 A", "2 A", "42 A"], "correct": 2, "short": "2 amperes", "expl": "I = E/R = 28 V / 14 ohms = 2 A. When two of the three quantities are known, the third is found by transposing Ohm's Law.", "cite": "FAA-H-8083-30B p. 12-18", "topic": "Ohm's Law"}, {"q": "Using Ohm's Law, what voltage is required to push 5 amperes through a 4-ohm resistor?", "options": ["1.25 V", "9 V", "0.8 V", "20 V"], "correct": 3, "short": "20 volts", "expl": "E = I x R = 5 A x 4 ohms = 20 V.", "cite": "FAA-H-8083-30B p. 12-18", "topic": "Ohm's Law"}, {"q": "If 24 volts produces 3 amperes of current, what is the resistance?", "options": ["8 ohms", "72 ohms", "0.125 ohm", "27 ohms"], "correct": 0, "short": "8 ohms", "expl": "R = E/I = 24 V / 3 A = 8 ohms.", "cite": "FAA-H-8083-30B p. 12-18", "topic": "Ohm's Law"}, {"q": "The unit used to measure resistance is the ohm, whose symbol is:", "options": ["The letter R", "The Greek letter omega", "The letter E", "The letter I"], "correct": 1, "short": "The Greek letter omega", "expl": "The unit of resistance is the ohm, symbolized by the Greek letter omega. In formulas, the capital letter 'R' refers to resistance.", "cite": "FAA-H-8083-30B p. 12-18", "topic": "Conductors & Wire"}, {"q": "Which material is usually considered the BEST available conductor for a given wire diameter?", "options": ["Aluminum", "Iron", "Copper", "Tungsten"], "correct": 2, "short": "Copper", "expl": "Copper is usually considered the best available conductor; a copper wire of a given diameter offers lower resistance than aluminum of the same diameter.", "cite": "FAA-H-8083-30B p. 12-18", "topic": "Conductors & Wire"}, {"q": "Aluminum is often used as a conductor instead of copper when which factor is important?", "options": ["Conductivity", "Color", "Magnetism", "Weight (and cost)"], "correct": 3, "short": "Weight (and cost)", "expl": "Aluminum is much lighter than copper and, for weight and cost reasons, is often used when the weight factor is important — even though it has higher resistance per diameter.", "cite": "FAA-H-8083-30B p. 12-18", "topic": "Conductors & Wire"}, {"q": "How does the resistance of a metallic conductor change as its length increases?", "options": ["Resistance increases (directly proportional to length)", "Resistance decreases", "Resistance is unaffected", "Resistance varies with the square of length"], "correct": 0, "short": "Increases (directly proportional)", "expl": "Resistance is DIRECTLY proportional to length — double the length, double the resistance. (It is INVERSELY proportional to cross-sectional area.)", "cite": "FAA-H-8083-30B p. 12-18", "topic": "Conductors & Wire"}, {"q": "If the cross-sectional area of a conductor is doubled, the resistance to current flow is:", "options": ["Doubled", "Cut in half", "Unchanged", "Quadrupled"], "correct": 1, "short": "Cut in half", "expl": "Resistance is inversely proportional to cross-sectional area. Doubling the area cuts resistance in half because electrons have more room to move without collision.", "cite": "FAA-H-8083-30B p. 12-19", "topic": "Conductors & Wire"}, {"q": "List the FOUR major factors that determine the resistance of a conductor.", "options": ["Voltage, current, power, time", "Color, weight, shape, age", "Material, length, cross-sectional area, temperature", "Frequency, phase, reactance, impedance"], "correct": 2, "short": "Material, length, area, temperature", "expl": "The four properties that determine resistance are the material, length, cross-sectional area, and temperature.", "cite": "FAA-H-8083-30B p. 12-19", "topic": "Conductors & Wire"}, {"q": "For most materials used as conductors, what happens to resistance as temperature rises?", "options": ["Resistance decreases", "Resistance stays exactly constant", "Resistance drops to zero", "Resistance increases"], "correct": 3, "short": "Resistance increases", "expl": "Most materials used as conductors increase in resistance as temperature increases. Carbon is an exception (it decreases); constantan and Manganin change very little.", "cite": "FAA-H-8083-30B p. 12-19", "topic": "Conductors & Wire"}, {"q": "Which substance is an EXCEPTION, showing a DECREASE in resistance as temperature increases?", "options": ["Carbon", "Copper", "Aluminum", "Iron"], "correct": 0, "short": "Carbon", "expl": "Although most conductors increase in resistance with temperature, carbon shows a decrease in resistance as the temperature increases.", "cite": "FAA-H-8083-30B p. 12-19", "topic": "Conductors & Wire"}, {"q": "The amount of resistance increase of a 1-ohm sample per degree rise in temperature above 0 degrees C is called the:", "options": ["Resistivity", "Temperature coefficient of resistance", "Reluctance", "Permeability"], "correct": 1, "short": "Temperature coefficient of resistance", "expl": "The temperature coefficient of resistance is the increase in resistance of a 1-ohm sample per degree rise above 0 degrees C. For copper it is approximately 0.00427 ohm.", "cite": "FAA-H-8083-30B p. 12-19", "topic": "Conductors & Wire"}, {"q": "In American Wire Gauge (AWG), each DECREASE of one gauge number equals approximately what change in cross-sectional area?", "options": ["50 percent increase", "10 percent decrease", "25 percent increase", "2:1 increase"], "correct": 2, "short": "25 percent increase", "expl": "Each decrease of one gauge number equals a ~25 percent increase in cross-sectional area. A decrease of three gauge numbers approximately doubles the area (2:1).", "cite": "FAA-H-8083-30B p. 12-20", "topic": "Conductors & Wire"}, {"q": "In AWG, a decrease of THREE gauge numbers does what to the conductor's resistance for a given length?", "options": ["Doubles it", "Leaves it unchanged", "Triples it", "Cuts it in half"], "correct": 3, "short": "Cuts it in half", "expl": "A decrease of three gauge numbers approximately doubles the cross-sectional area (2:1), which cuts the resistance of a given length in half.", "cite": "FAA-H-8083-30B p. 12-20", "topic": "Conductors & Wire"}, {"q": "A change of TEN wire gauge numbers represents approximately what change in cross-sectional area?", "options": ["10:1", "2:1", "5:1", "100:1"], "correct": 0, "short": "10:1", "expl": "A change of ten wire gauge numbers represents a 10:1 change in cross-sectional area.", "cite": "FAA-H-8083-30B p. 12-20", "topic": "Conductors & Wire"}, {"q": "In wire measurement standards used in North America, one 'mil' equals:", "options": ["One-tenth of an inch", "One-thousandth of an inch", "One-hundredth of an inch", "One inch"], "correct": 1, "short": "One-thousandth of an inch", "expl": "The mil (one-thousandth of an inch) is the unit of diameter; the foot is the unit length. A wire of 1 mil diameter and 1 foot length is the unit size (mil-foot).", "cite": "FAA-H-8083-30B p. 12-20", "topic": "Conductors & Wire"}, {"q": "Power, the rate of energy consumption or conversion, is measured in watts. One watt equals a rate of:", "options": ["1 joule per minute", "1 coulomb per second", "1 joule per second", "1 volt per second"], "correct": 2, "short": "1 joule per second", "expl": "The watt (W) is a rate of energy conversion of 1 joule/second. The number of joules consumed in 1 second equals the number of watts.", "cite": "FAA-H-8083-30B p. 12-21", "topic": "Power & Watt's Law"}, {"q": "One horsepower of mechanical power is equivalent to how many watts of electrical power?", "options": ["550 watts", "1,000 watts", "33,000 watts", "746 watts"], "correct": 3, "short": "746 watts", "expl": "An electric motor rated at 1 horsepower requires 746 watts of electrical energy. (33,000 ft-lb/min and 550 ft-lb/s describe the mechanical definition of horsepower.)", "cite": "FAA-H-8083-30B p. 12-21", "topic": "Power & Watt's Law"}, {"q": "One horsepower is defined as the power required to move how much weight one foot in one minute?", "options": ["33,000 pounds", "550 pounds", "746 pounds", "1,000 pounds"], "correct": 0, "short": "33,000 pounds", "expl": "One horsepower is required to move 33,000 pounds 1 foot in 1 minute, which works out to 550 ft-lb/s.", "cite": "FAA-H-8083-30B p. 12-21", "topic": "Power & Watt's Law"}, {"q": "Using the general power formula P = I x E, what is the power in a circuit with 2 amps at 24 volts?", "options": ["12 watts", "48 watts", "26 watts", "96 watts"], "correct": 1, "short": "48 watts", "expl": "P = I(E) = 2 A x 24 V = 48 W. This is the handbook's own worked example of the general power formula (Watt's Law).", "cite": "FAA-H-8083-30B p. 12-22", "topic": "Power & Watt's Law"}, {"q": "A circuit carries 2 amps through a 100-ohm resistor. Using P = I^2 R, what is the power dissipated?", "options": ["200 watts", "50 watts", "400 watts", "10,000 watts"], "correct": 2, "short": "400 watts", "expl": "Second form of the power equation: P = I^2 R = (2 A)^2 x 100 ohms = 4 x 100 = 400 W. This is the handbook's worked example.", "cite": "FAA-H-8083-30B p. 12-22", "topic": "Power & Watt's Law"}, {"q": "Using the third form of the power equation, P = E^2 / R, what is the power for 24 volts across 20 ohms?", "options": ["1.2 watts", "480 watts", "120 watts", "28.8 watts"], "correct": 3, "short": "28.8 watts", "expl": "P = E^2/R = (24 V)^2 / 20 ohms = 576 / 20 = 28.8 W. This matches the handbook's worked example.", "cite": "FAA-H-8083-30B p. 12-22", "topic": "Power & Watt's Law"}, {"q": "How is total power found in BOTH series and parallel circuits?", "options": ["It equals the sum of the power dissipated in each resistor", "It equals the largest single power dissipation", "It equals the source voltage times resistance", "It cannot be determined"], "correct": 0, "short": "Sum of each resistor's power", "expl": "Total power dissipated in both series and parallel circuits equals the sum of the power dissipated in each resistor: PT = P1 + P2 + ... + PN. Power is simply additive.", "cite": "FAA-H-8083-30B p. 12-22", "topic": "Power & Watt's Law"}, {"q": "A familiar unit of electrical ENERGY (not power), seen on an electric bill, is the:", "options": ["Volt-ampere", "Kilowatt-hour", "Coulomb", "Ohm-second"], "correct": 1, "short": "Kilowatt-hour", "expl": "Energy = power x time. Because power is in watts and time in seconds, a unit of energy is the watt-second or, more familiarly, the kilowatt-hour (kWh).", "cite": "FAA-H-8083-30B p. 12-22", "topic": "Power & Watt's Law"}, {"q": "What are the four most common methods of producing electrical energy?", "options": ["Wind, water, solar, nuclear", "Friction, induction, conduction, radiation", "Pressure, chemical, thermal, and light", "AC, DC, static, dynamic"], "correct": 2, "short": "Pressure, chemical, thermal, light", "expl": "The four most common methods of producing electrical energy are pressure (piezoelectric), chemical (battery), thermal (thermocouple), and light (solar cell).", "cite": "FAA-H-8083-30B p. 12-22", "topic": "Sources of Electricity"}, {"q": "Producing a voltage by applying mechanical pressure to a crystal such as quartz is called the:", "options": ["Seebeck effect", "Photovoltaic effect", "Hall effect", "Piezoelectric effect"], "correct": 3, "short": "Piezoelectric effect", "expl": "Piezoelectric generation results from mechanical pressure on a dielectric crystal (e.g., quartz, Rochelle salt). The crystal produces a voltage proportional to the stress.", "cite": "FAA-H-8083-30B p. 12-22", "topic": "Sources of Electricity"}, {"q": "A thermocouple generates a voltage proportional to temperature at the junction of two dissimilar metals. This thermal-electric phenomenon is the:", "options": ["Seebeck effect", "Piezoelectric effect", "Photovoltaic effect", "Edison effect"], "correct": 0, "short": "Seebeck effect", "expl": "Thermocouples generate a voltage proportional to junction temperature — the Seebeck effect. They are used to measure cylinder head temperature and Turbine Inlet Temperature (TIT).", "cite": "FAA-H-8083-30B p. 12-23", "topic": "Sources of Electricity"}, {"q": "A device that converts light energy directly into electricity is a:", "options": ["Thermocouple", "Solar (photovoltaic) cell", "Piezo crystal", "Rectifier"], "correct": 1, "short": "Solar (photovoltaic) cell", "expl": "A solar cell or photovoltaic cell converts light energy into electricity; photons absorbed by semiconducting material (silicon) break electrons loose to produce current.", "cite": "FAA-H-8083-30B p. 12-23", "topic": "Sources of Electricity"}, {"q": "The general purpose of a resistor in a circuit is to:", "options": ["Store charge", "Oppose AC only", "Limit the amount of current flow", "Increase voltage"], "correct": 2, "short": "Limit the amount of current flow", "expl": "The general use of a resistor is to limit the amount of current flow. Heat is typically the unwanted loss of energy (except in heating elements).", "cite": "FAA-H-8083-30B p. 12-24", "topic": "Resistors & Color Code"}, {"q": "A carbon composition resistor's ohmic (resistive) value is determined by:", "options": ["The length of its leads", "The color of its body", "Its operating voltage", "The amount of graphite relative to the insulation material"], "correct": 3, "short": "Graphite-to-insulation ratio", "expl": "The carbon composition resistor is a mixture of carbon/graphite, insulation filler, and binder; the amount of graphite relative to insulation determines the ohmic value.", "cite": "FAA-H-8083-30B p. 12-24", "topic": "Resistors & Color Code"}, {"q": "On the resistor color code, what numerical value does the color RED represent?", "options": ["2", "0", "1", "5"], "correct": 0, "short": "2", "expl": "Color code values: Black 0, Brown 1, Red 2, Orange 3, Yellow 4, Green 5, Blue 6, Violet 7, Gray 8, White 9.", "cite": "FAA-H-8083-30B p. 12-25", "topic": "Resistors & Color Code"}, {"q": "On the resistor color code, what numerical value does the color GREEN represent?", "options": ["3", "5", "4", "6"], "correct": 1, "short": "5", "expl": "Green = 5 on the resistor color code. (Black 0, Brown 1, Red 2, Orange 3, Yellow 4, Green 5, Blue 6, Violet 7, Gray 8, White 9.)", "cite": "FAA-H-8083-30B p. 12-25", "topic": "Resistors & Color Code"}, {"q": "The percentage variation allowed between a resistor's marked value and its actual value is known as its:", "options": ["Wattage", "Resistivity", "Tolerance", "Reactance"], "correct": 2, "short": "Tolerance", "expl": "Tolerance is the allowable percentage variation between marked and actual value. A 5 percent resistor is not more than 5 percent higher or lower than the marked value.", "cite": "FAA-H-8083-30B p. 12-24", "topic": "Resistors & Color Code"}, {"q": "On a resistor, a GOLD fourth (tolerance) band indicates what tolerance?", "options": ["1 percent", "10 percent", "20 percent", "5 percent"], "correct": 3, "short": "5 percent", "expl": "A gold fourth band = 5 percent tolerance; silver = 10 percent; no fourth band = 20 percent.", "cite": "FAA-H-8083-30B p. 12-25", "topic": "Resistors & Color Code"}, {"q": "On a resistor, a SILVER fourth (tolerance) band indicates what tolerance?", "options": ["10 percent", "1 percent", "5 percent", "20 percent"], "correct": 0, "short": "10 percent", "expl": "A silver fourth band = 10 percent tolerance. Gold = 5 percent; no band = 20 percent.", "cite": "FAA-H-8083-30B p. 12-25", "topic": "Resistors & Color Code"}, {"q": "On a 4-band resistor, if there is NO fourth (tolerance) color band, what tolerance is understood?", "options": ["5 percent", "20 percent", "10 percent", "1 percent"], "correct": 1, "short": "20 percent", "expl": "If there is no fourth band, the tolerance is understood to be 20 percent.", "cite": "FAA-H-8083-30B p. 12-25", "topic": "Resistors & Color Code"}, {"q": "On an end-to-center band resistor, the THIRD color band normally indicates:", "options": ["The first digit", "The second digit", "The number of zeros to add to the first two digits", "The wattage rating"], "correct": 2, "short": "Number of zeros to add", "expl": "The third band indicates the number of zeros to add to the two digits from the first and second bands (except gold = x 0.10, silver = x 0.01).", "cite": "FAA-H-8083-30B p. 12-25", "topic": "Resistors & Color Code"}, {"q": "A resistor reads red, green, yellow. Its resistance value is:", "options": ["25 ohms", "2,500 ohms", "2,540 ohms", "250,000 ohms"], "correct": 3, "short": "250,000 ohms", "expl": "Red=2, Green=5, Yellow=4 (number of zeros). So 25 followed by four zeros = 250,000 ohms. With no fourth band, tolerance is 20 percent (50,000 ohms).", "cite": "FAA-H-8083-30B p. 12-25", "topic": "Resistors & Color Code"}, {"q": "Wire-wound resistors are typically used in applications that require:", "options": ["Handling large amounts of current and high power ratings", "Very small currents", "Radio-frequency tuning", "Temperature sensing"], "correct": 0, "short": "Large current / high power", "expl": "Wire-wound resistors typically control large amounts of current and have high power ratings; they are constructed by winding resistance wire around an insulating rod.", "cite": "FAA-H-8083-30B p. 12-26", "topic": "Resistors & Color Code"}, {"q": "Which variable resistor is used to VARY the current in a circuit and is connected in series?", "options": ["Potentiometer", "Rheostat", "Thermistor", "Photocell"], "correct": 1, "short": "Rheostat", "expl": "A rheostat is a variable resistor used to vary current; connected in series, increasing its resistance increases total resistance and decreases current.", "cite": "FAA-H-8083-30B p. 12-26", "topic": "Resistors & Color Code"}, {"q": "A potentiometer is considered a THREE-terminal device and is used to vary the:", "options": ["Current in a circuit", "Frequency", "Voltage in a circuit", "Resistance of the source"], "correct": 2, "short": "Voltage in a circuit", "expl": "The potentiometer is a three-terminal device (terminal 3 is the wiper). While a rheostat varies current, the potentiometer is used to vary the voltage in a circuit.", "cite": "FAA-H-8083-30B p. 12-27", "topic": "Resistors & Color Code"}, {"q": "A thermistor is a variable resistor with a NEGATIVE temperature coefficient, which means that as temperature increases its resistance:", "options": ["Increases", "Stays constant", "Becomes infinite", "Decreases"], "correct": 3, "short": "Decreases", "expl": "The thermistor is temperature-sensitive with a negative temperature coefficient: as sensed temperature increases, the thermistor's resistance decreases.", "cite": "FAA-H-8083-30B p. 12-27", "topic": "Resistors & Color Code"}, {"q": "In a LINEAR potentiometer, one quarter turn of the wiper results in:", "options": ["One quarter of the total resistance", "The full resistance", "Half the resistance", "Zero resistance"], "correct": 0, "short": "One quarter of the total resistance", "expl": "In a linear potentiometer, resistance varies linearly with wiper position; one quarter turn gives one quarter of the total resistance.", "cite": "FAA-H-8083-30B p. 12-27", "topic": "Resistors & Color Code"}, {"q": "A situation in which a point at full system voltage comes into direct contact with the ground/return side, creating a path with virtually no resistance, is called a:", "options": ["Open circuit", "Direct short", "Series fault", "Voltage drop"], "correct": 1, "short": "Direct short", "expl": "A direct short describes full system voltage coming into direct contact with ground, establishing a path with virtually no resistance and causing rapid heat generation.", "cite": "FAA-H-8083-30B p. 12-27", "topic": "Circuit Protection"}, {"q": "In most fuses, the metal strip that melts to open the circuit is made of an alloy of:", "options": ["Copper and aluminum", "Lead and silver", "Tin and bismuth", "Iron and nickel"], "correct": 2, "short": "Tin and bismuth", "expl": "In most fuses, the metal strip is made of an alloy of tin and bismuth, which melts and opens the circuit when current exceeds the rated capacity.", "cite": "FAA-H-8083-30B p. 12-28", "topic": "Circuit Protection"}, {"q": "A circuit-protection device similar to a fuse but made of copper, used in heavy-current circuits (30 amp or greater) and which must be replaced once opened, is a:", "options": ["Circuit breaker", "Thermal switch", "Relay", "Current limiter"], "correct": 3, "short": "Current limiter", "expl": "The current limiter's link is usually copper and stands a considerable overload briefly; it opens in over-current heavy circuits (30 A+), is used to sectionalize a bus, and must be replaced.", "cite": "FAA-H-8083-30B p. 12-29", "topic": "Circuit Protection"}, {"q": "A circuit-protection device that interrupts current on an overload and CAN be reset (unlike a fuse) is a:", "options": ["Circuit breaker", "Fuse", "Current limiter", "Resistor"], "correct": 0, "short": "Circuit breaker", "expl": "A circuit breaker opens when current exceeds a set value and can be reset; a fuse or current limiter must be replaced after it opens.", "cite": "FAA-H-8083-30B p. 12-29", "topic": "Circuit Protection"}, {"q": "Which type of circuit breaker is NOT allowed in aircraft?", "options": ["Magnetic type", "Automatic reset type", "Thermal overload type", "Manually reset type"], "correct": 1, "short": "Automatic reset type", "expl": "Automatic reset type circuit breakers are not allowed in aircraft. Most circuit breakers must be reset by hand.", "cite": "FAA-H-8083-30B p. 12-29", "topic": "Circuit Protection"}, {"q": "A thermal protector (thermal switch) used to protect a MOTOR works by opening the circuit when the motor:", "options": ["Loses voltage", "Spins too slowly", "Becomes excessively hot", "Draws too little current"], "correct": 2, "short": "Becomes excessively hot", "expl": "A thermal protector opens the circuit automatically whenever the motor becomes excessively hot, using a bimetallic disk/strip that bends when heated.", "cite": "FAA-H-8083-30B p. 12-29", "topic": "Circuit Protection"}, {"q": "In a switch's designation, the number of POLES indicates:", "options": ["The number of toggle rest positions", "The voltage rating", "The number of throws", "The number of circuits (paths) that can be completed at one time"], "correct": 3, "short": "Number of circuits completed", "expl": "Pole = the switch's movable blade/contactor; the number of poles equals the number of circuits (paths) that can be completed at any one time.", "cite": "FAA-H-8083-30B p. 12-30", "topic": "Switches & Relays"}, {"q": "In a switch's designation, the number of THROWS indicates:", "options": ["The number of circuits each pole can complete", "Number of poles", "The current rating", "The number of mounting screws"], "correct": 0, "short": "Circuits each pole can complete", "expl": "Throw indicates the number of circuits, or paths for current, that it is possible to complete through the switch with each pole or contactor.", "cite": "FAA-H-8083-30B p. 12-30", "topic": "Switches & Relays"}, {"q": "A switch that allows a connection between two contacts — either open in one position or closed in the other — is designated:", "options": ["DPDT", "SPST", "DPST", "SPDT"], "correct": 1, "short": "SPST (single-pole, single-throw)", "expl": "The single-pole, single-throw (SPST) switch allows a connection between two contacts; the circuit is open in one position and closed in the other.", "cite": "FAA-H-8083-30B p. 12-30", "topic": "Switches & Relays"}, {"q": "A switch that makes a connection from one set of contacts to either of two other sets of contacts is designated:", "options": ["SPST", "SPDT", "DPDT", "DPST"], "correct": 2, "short": "DPDT (double-pole, double-throw)", "expl": "The double-pole, double-throw (DPDT) switch makes a connection from one set of contacts to either of two other sets of contacts.", "cite": "FAA-H-8083-30B p. 12-30", "topic": "Switches & Relays"}, {"q": "A switch that stays open except when held in the closed position is identified as:", "options": ["Normally closed (NC)", "Double throw", "Locking", "Normally open (NO)"], "correct": 3, "short": "Normally open (NO)", "expl": "A switch that stays open except when held in the closed position is a normally open (NO) switch. One that stays closed except when held open is normally closed (NC).", "cite": "FAA-H-8083-30B p. 12-31", "topic": "Switches & Relays"}, {"q": "A switch that opens or closes a circuit with a very small movement (1/16 inch or less) of the tripping device — often used as a limit switch for landing gear — is a:", "options": ["Microswitch", "Toggle switch", "Rotary switch", "DIP switch"], "correct": 0, "short": "Microswitch", "expl": "A microswitch opens or closes a circuit with a very small movement (1/16 inch or less). They are used primarily as limit switches for landing gear, actuator motors, etc.", "cite": "FAA-H-8083-30B p. 12-31", "topic": "Switches & Relays"}, {"q": "An electromechanical switch in which a SMALL current energizes a coil to control a LARGE amount of current is a:", "options": ["Rheostat", "Relay", "Rectifier", "Potentiometer"], "correct": 1, "short": "Relay", "expl": "A relay is an electromechanical switch where a small amount of current can control a large amount of current; the energized electromagnet pulls the common (C) arm.", "cite": "FAA-H-8083-30B p. 12-33", "topic": "Switches & Relays"}, {"q": "On a relay, when the coil is energized and the arm is pulled down, the contacts between the arm and the normally closed (NC) contacts are:", "options": ["Closed", "Shorted", "Opened", "Unchanged"], "correct": 2, "short": "Opened", "expl": "When energized, the electromagnetic field pulls the arm down: the circuit between the arm and the NC contacts opens, and between the arm and the NO contacts closes.", "cite": "FAA-H-8083-30B p. 12-33", "topic": "Switches & Relays"}, {"q": "Components connected end-to-end so the same current flows through each, with only one path for current, form a:", "options": ["Parallel circuit", "Series-parallel circuit", "Bridge circuit", "Series circuit"], "correct": 3, "short": "Series circuit", "expl": "A series circuit connects components end-to-end so the same current flows through each; there is only one path for the current.", "cite": "FAA-H-8083-30B p. 12-33", "topic": "Series & Parallel Circuits"}, {"q": "In a SERIES circuit, what is true about the current?", "options": ["Current is the same through every component and at every point", "Current divides among the resistors", "Current is greatest at the source only", "Current is zero in the resistors"], "correct": 0, "short": "Same through every component", "expl": "In a series circuit the current is always the same value at every point because there is only one path.", "cite": "FAA-H-8083-30B p. 12-34", "topic": "Series & Parallel Circuits"}, {"q": "In a SERIES circuit, the total resistance equals:", "options": ["The smallest resistor value", "The sum of the individual resistors", "The product of the resistors", "Less than the smallest resistor"], "correct": 1, "short": "The sum of the resistors", "expl": "For resistors in series, total resistance = R1 + R2 + R3 + ... + RN (a simple sum).", "cite": "FAA-H-8083-30B p. 12-34", "topic": "Series & Parallel Circuits"}, {"q": "Three resistors of 10, 20, and 30 ohms are connected in SERIES. What is the total resistance?", "options": ["6 ohms", "30 ohms", "60 ohms", "20 ohms"], "correct": 2, "short": "60 ohms", "expl": "Series total resistance is the simple sum: 10 + 20 + 30 = 60 ohms.", "cite": "FAA-H-8083-30B p. 12-34", "topic": "Series & Parallel Circuits"}, {"q": "A 12-volt source is in series with R1 = 10 ohms and R2 = 30 ohms. Using the handbook's example, the circuit current is:", "options": ["0.4 A", "3 A", "40 A", "0.3 A"], "correct": 3, "short": "0.3 amperes", "expl": "RT = 10 + 30 = 40 ohms; I = E/RT = 12 V / 40 ohms = 0.3 A. This is the handbook's worked series-circuit example.", "cite": "FAA-H-8083-30B p. 12-34", "topic": "Series & Parallel Circuits"}, {"q": "The loss in electrical pressure (emf) caused by forcing electrons through a resistor is called the:", "options": ["Voltage drop", "Source voltage", "Reactance", "Bleeder current"], "correct": 0, "short": "Voltage drop", "expl": "Voltage drop refers to the loss in electrical pressure or emf caused by forcing electrons through a resistor; each resistor has its own drop.", "cite": "FAA-H-8083-30B p. 12-35", "topic": "Series & Parallel Circuits"}, {"q": "In the handbook example, a current of 1 mA flows through R1=1k, R2=3k, R3=5k in series. The source voltage equals:", "options": ["3 volts", "9 volts", "5 volts", "1 volt"], "correct": 1, "short": "9 volts", "expl": "Voltage drops: 1 V + 3 V + 5 V = 9 V. Or ES = I x RT = 1 mA x 9 k = 9 V. The sum of the drops equals the source voltage.", "cite": "FAA-H-8083-30B p. 12-36", "topic": "Series & Parallel Circuits"}, {"q": "Three 1.5-volt cells are connected in series with the SAME polarity. The total voltage is:", "options": ["0 volts", "1.5 volts", "4.5 volts", "3.0 volts"], "correct": 2, "short": "4.5 volts", "expl": "Voltage sources in series add algebraically: 1.5 + 1.5 + 1.5 = +4.5 volts when all polarities are in the same direction.", "cite": "FAA-H-8083-30B p. 12-36", "topic": "Series & Parallel Circuits"}, {"q": "Kirchhoff's Voltage Law states that around any closed loop, the algebraic sum of all voltages is:", "options": ["Equal to the largest drop", "Equal to the current", "Equal to total resistance", "Zero"], "correct": 3, "short": "Zero", "expl": "Kirchhoff's Voltage Law: the algebraic sum of all voltages around a closed loop is zero. Equivalently, the sum of all voltage drops equals the total source voltage.", "cite": "FAA-H-8083-30B p. 12-36", "topic": "Kirchhoff's Laws"}, {"q": "Stated another way, Kirchhoff's Voltage Law tells us the source voltage equals:", "options": ["The sum of the voltage drops", "The largest single voltage drop", "Zero", "The total current"], "correct": 0, "short": "Sum of the voltage drops", "expl": "The source voltage equals the sum of the voltage drops: ES = E1 + E2 + E3 + ... + EN.", "cite": "FAA-H-8083-30B p. 12-36", "topic": "Kirchhoff's Laws"}, {"q": "In a series circuit, one resistor drops 14 volts and another drops 10 volts. By Kirchhoff's Voltage Law, the source voltage is:", "options": ["4 volts", "24 volts", "14 volts", "140 volts"], "correct": 1, "short": "24 volts", "expl": "The source voltage equals the sum of the drops: 14 V + 10 V = 24 V. This is the handbook's worked example.", "cite": "FAA-H-8083-30B p. 12-36", "topic": "Kirchhoff's Laws"}, {"q": "A 24-volt source feeds three series resistors. Two drops are 12 V and 10 V. Using KVL, the third drop (E3) is:", "options": ["12 volts", "22 volts", "2 volts", "46 volts"], "correct": 2, "short": "2 volts", "expl": "24 - 12 - 10 - E3 = 0, so E3 = 2 volts. This is the handbook's worked example.", "cite": "FAA-H-8083-30B p. 12-36", "topic": "Kirchhoff's Laws"}, {"q": "A device that makes it possible to obtain more than one voltage from a single power source — usually resistors connected in series with fixed/movable contacts — is a:", "options": ["Current divider", "Transformer", "Rectifier", "Voltage divider"], "correct": 3, "short": "Voltage divider", "expl": "Voltage dividers make it possible to obtain more than one voltage from a single power source; they consist of resistors in series with tap contacts.", "cite": "FAA-H-8083-30B p. 12-37", "topic": "Voltage Dividers"}, {"q": "In a voltage divider, the small current that flows through the divider in addition to the load currents is called the:", "options": ["Bleeder current", "Drift current", "Eddy current", "Branch current"], "correct": 0, "short": "Bleeder current", "expl": "In addition to the load currents (I1, I2, I3), some bleeder current (IB) flows. The total current IT is the sum of all currents.", "cite": "FAA-H-8083-30B p. 12-37", "topic": "Voltage Dividers"}, {"q": "Using the voltage divider formula EX = (RX/RT) x ES with RT = 1,000 ohms, ES = 100 V, the drop across a 300-ohm resistor is:", "options": ["10 V", "30 V", "60 V", "100 V"], "correct": 1, "short": "30 volts", "expl": "EX = (300/1000) x 100 = 30 V. The voltage drop across a resistor equals the ratio of its resistance to total resistance, times the source voltage.", "cite": "FAA-H-8083-30B p. 12-39", "topic": "Voltage Dividers"}, {"q": "In a parallel circuit, each separate path for current flow is called a:", "options": ["Node", "Loop", "Branch", "Tap"], "correct": 2, "short": "Branch", "expl": "A parallel circuit provides more than one path for current; each of these parallel paths is called a branch.", "cite": "FAA-H-8083-30B p. 12-39", "topic": "Series & Parallel Circuits"}, {"q": "In a PARALLEL circuit, what is the same across every branch?", "options": ["The current", "The resistance", "The power", "The voltage"], "correct": 3, "short": "The voltage", "expl": "The voltage across any branch equals the voltage across all the other branches; branches are connected across the same source. Current divides among branches.", "cite": "FAA-H-8083-30B p. 12-39", "topic": "Series & Parallel Circuits"}, {"q": "In a PARALLEL circuit, the total resistance is always:", "options": ["Less than the value of the smallest resistor", "Equal to the sum of the branches", "Equal to the largest branch", "The average of the branches"], "correct": 0, "short": "Less than the smallest branch", "expl": "The total resistance of a parallel combination is always less than the value of the smallest resistor, because adding branches gives current more paths.", "cite": "FAA-H-8083-30B p. 12-39", "topic": "Series & Parallel Circuits"}, {"q": "In a parallel circuit, the total current of the circuit equals:", "options": ["The current in the smallest branch", "The sum of the current in all branches", "The largest single branch current", "Zero"], "correct": 1, "short": "Sum of all branch currents", "expl": "The total current of a parallel circuit is the sum of the current in all branches, and is greater than that of any given branch.", "cite": "FAA-H-8083-30B p. 12-39", "topic": "Series & Parallel Circuits"}, {"q": "The total resistance of two resistors in parallel equals:", "options": ["R1 + R2", "The sum divided by the product", "The product of the two resistors divided by their sum", "The smaller resistor only"], "correct": 2, "short": "Product over sum", "expl": "For two resistors in parallel, RT = (R1 x R2) / (R1 + R2) — the product of both resistors divided by their sum.", "cite": "FAA-H-8083-30B p. 12-41", "topic": "Series & Parallel Circuits"}, {"q": "Using the product-over-sum formula, a 500-ohm and 400-ohm resistor in parallel give a total resistance of approximately:", "options": ["900 ohms", "450 ohms", "100 ohms", "222.22 ohms"], "correct": 3, "short": "222.22 ohms", "expl": "RT = (500 x 400) / (500 + 400) = 200,000 / 900 = 222.22 ohms. This is the handbook's worked example.", "cite": "FAA-H-8083-30B p. 12-41", "topic": "Series & Parallel Circuits"}, {"q": "Three equal 30-ohm resistors are connected in parallel. The total resistance is:", "options": ["10 ohms", "90 ohms", "30 ohms", "15 ohms"], "correct": 0, "short": "10 ohms", "expl": "For N equal resistors in parallel, RT = R/N = 30/3 = 10 ohms. (Handbook troubleshooting example uses three 30-ohm branches giving RT = 10 ohms.)", "cite": "FAA-H-8083-30B p. 12-84", "topic": "Series & Parallel Circuits"}, {"q": "Kirchhoff's Current Law states that at any junction (node):", "options": ["Current leaving exceeds current entering", "The sum of currents entering equals the sum of currents leaving", "Current is the same in every branch", "Voltage drops sum to zero"], "correct": 1, "short": "Currents in = currents out", "expl": "Kirchhoff's Current Law: the sum of the currents into a junction equals the sum of the currents flowing out of that same junction.", "cite": "FAA-H-8083-30B p. 12-41", "topic": "Kirchhoff's Laws"}, {"q": "Using Kirchhoff's Current Law: if branch currents I1 = 5 mA and I2 = 12 mA enter a node, the total current is:", "options": ["7 mA", "12 mA", "17 mA", "60 mA"], "correct": 2, "short": "17 mA", "expl": "IT = I1 + I2 = 5 mA + 12 mA = 17 mA. This is the handbook's worked example.", "cite": "FAA-H-8083-30B p. 12-41", "topic": "Kirchhoff's Laws"}, {"q": "Total current into a node is 75 mA. Two of three branches carry 30 mA and 20 mA. The third branch carries:", "options": ["15 mA", "50 mA", "125 mA", "25 mA"], "correct": 3, "short": "25 mA", "expl": "IT = I1 + I2 + I3, so 75 = 30 + I2 + 20, giving I2 = 25 mA. This is the handbook's worked example.", "cite": "FAA-H-8083-30B p. 12-41", "topic": "Kirchhoff's Laws"}, {"q": "In a parallel circuit acting as a current divider, branches with higher resistance carry:", "options": ["Less current", "More current", "The same current as low-resistance branches", "No current"], "correct": 0, "short": "Less current", "expl": "Branch currents are inversely proportional to the ohmic values: branches with higher resistance have less current than those with lower resistance.", "cite": "FAA-H-8083-30B p. 12-41", "topic": "Series & Parallel Circuits"}, {"q": "A circuit that is a combination of resistors in series and in parallel is called a:", "options": ["Bridge circuit", "Series-parallel circuit", "Resonant circuit", "Tank circuit"], "correct": 1, "short": "Series-parallel circuit", "expl": "Most real circuits are series-parallel — combinations of resistors in parallel and in series; the same series and parallel rules apply.", "cite": "FAA-H-8083-30B p. 12-42", "topic": "Series & Parallel Circuits"}, {"q": "In the handbook's series-parallel example (R1 = 1k in series with R2=2k parallel R3=3k, ES = 24 V), the total resistance RT is:", "options": ["1.2 k-ohm", "5 k-ohm", "2.2 k-ohm", "6 k-ohm"], "correct": 2, "short": "2.2 k-ohms", "expl": "R23 = (2k x 3k)/(2k+3k) = 6,000k/5k = 1.2k. RT = R1 + R23 = 1k + 1.2k = 2.2k ohms.", "cite": "FAA-H-8083-30B p. 12-43", "topic": "Series & Parallel Circuits"}, {"q": "In that same series-parallel example (RT = 2.2 k-ohm, ES = 24 V), the total current IT is approximately:", "options": ["2.2 mA", "24 mA", "52.8 mA", "10.9 mA"], "correct": 3, "short": "10.9 mA", "expl": "IT = ES/RT = 24 V / 2.2k = 10.9 mA (handbook worked example).", "cite": "FAA-H-8083-30B p. 12-43", "topic": "Series & Parallel Circuits"}, {"q": "An unintentional low-resistance path between two points (or to ground) that usually creates high current flow is called a:", "options": ["Short circuit", "Open circuit", "Series circuit", "Voltage divider"], "correct": 0, "short": "Short circuit", "expl": "A short circuit is an unintentional low-resistance path; it usually creates high current flow that burns out or damages the conductor or components.", "cite": "FAA-H-8083-30B p. 12-78", "topic": "Open & Short Circuits"}, {"q": "A circuit that is not a complete or continuous path — representing an infinitely large resistance so no current flows — is a(n):", "options": ["Short circuit", "Open circuit", "Parallel circuit", "Closed circuit"], "correct": 1, "short": "Open circuit", "expl": "An open circuit is not a complete or continuous path; it represents an infinitely large resistance. Switches and burned-out components are common causes.", "cite": "FAA-H-8083-30B p. 12-79", "topic": "Open & Short Circuits"}, {"q": "The state of being continuous, uninterrupted, or connected together (a circuit that is not broken) is called:", "options": ["Discontinuity", "Reactance", "Continuity", "Saturation"], "correct": 2, "short": "Continuity", "expl": "Continuity is the state of being continuous, uninterrupted, or connected together — the opposite of a broken or open circuit.", "cite": "FAA-H-8083-30B p. 12-79", "topic": "Open & Short Circuits"}, {"q": "When tracing an OPEN in a SERIES circuit with a voltmeter, the open component will show:", "options": ["Zero volts", "Half the source voltage", "A negative voltage", "The total (source) voltage across it"], "correct": 3, "short": "Total source voltage", "expl": "With an open in a series circuit, no current flows so good components drop 0 V; the total source voltage appears across the open component (per Kirchhoff's Voltage Law).", "cite": "FAA-H-8083-30B p. 12-82", "topic": "Open & Short Circuits"}, {"q": "When checking for an open in a PARALLEL circuit, why can a voltmeter NOT be used effectively?", "options": ["Across an open resistor it reads the voltage drop of the parallel branch", "It draws too much current", "It cannot measure AC", "It has too high resistance"], "correct": 0, "short": "Reads parallel branch voltage", "expl": "A voltmeter cannot be used in a parallel circuit for an open, since placed across an open resistor it reads the voltage drop in a parallel branch. Use an ammeter or modified ohmmeter.", "cite": "FAA-H-8083-30B p. 12-84", "topic": "Open & Short Circuits"}, {"q": "To accurately check the resistance of a component with an ohmmeter, the component must first be:", "options": ["Energized", "Isolated/disconnected and the power removed", "Heated", "Shorted"], "correct": 1, "short": "Isolated and power removed", "expl": "When using an ohmmeter, the component must be isolated and the power source removed, otherwise parallel paths cause inaccurate readings or meter damage.", "cite": "FAA-H-8083-30B p. 12-82", "topic": "Open & Short Circuits"}, {"q": "In a SERIES circuit, a shorted resistor causes the circuit current to:", "options": ["Decrease", "Stay the same", "Increase (greater than normal current flow)", "Drop to zero"], "correct": 2, "short": "Increase", "expl": "A short across a series circuit produces a greater-than-normal current flow; usually this blows the fuse or burns out a component.", "cite": "FAA-H-8083-30B p. 12-83", "topic": "Open & Short Circuits"}, {"q": "A cell whose energy-releasing electrochemical reaction is NOT reversible — so it cannot be safely recharged — is a:", "options": ["Secondary cell", "Storage cell", "Fuel cell", "Primary cell"], "correct": 3, "short": "Primary cell", "expl": "In a primary cell (e.g., dry cell), one metal is consumed during discharge; the reaction is not reversible and recharging is usually dangerous and can cause explosion.", "cite": "FAA-H-8083-30B p. 12-87", "topic": "Batteries & Cells"}, {"q": "A cell in which the electrochemical reaction that releases energy is REVERSIBLE — so it can be recharged — is a:", "options": ["Secondary cell", "Primary cell", "Dry cell", "Photocell"], "correct": 0, "short": "Secondary cell", "expl": "A secondary cell (e.g., lead-acid, Ni-Cad) has a reversible reaction and can be recharged.", "cite": "FAA-H-8083-30B p. 12-87", "topic": "Batteries & Cells"}, {"q": "In a lead-acid cell, the electrolyte is sulfuric acid, the positive electrode is lead peroxide (lead dioxide), and the negative electrode is:", "options": ["Carbon", "Lead (spongy lead)", "Zinc", "Copper"], "correct": 1, "short": "Lead (spongy lead)", "expl": "The lead-acid cell uses sulfuric acid electrolyte, positive plates of lead dioxide (PbO2), and negative plates of spongy lead.", "cite": "FAA-H-8083-30B p. 12-87", "topic": "Batteries & Cells"}, {"q": "How many lead-acid cells in series make up a typical 12-volt battery?", "options": ["3 cells", "12 cells", "6 cells", "24 cells"], "correct": 2, "short": "6 cells", "expl": "Each lead-acid cell produces
