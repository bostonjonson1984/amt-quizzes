<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NDT — Non-Destructive Testing Test</title>
<style>
  :root{
    --navy:#0d2a4a; --navy2:#15436e; --gold:#ffce4d; --ink:#1c2330;
    --green:#1f9d57; --greenbg:#e7f7ee; --red:#d6453d; --redbg:#fdecea;
    --line:#e3e8f0; --muted:#5a6678; --card:#ffffff; --bg:#eef2f8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:0 16px env(safe-area-inset-bottom);
  }
  .wrap{width:100%; max-width:720px; margin:0 auto;}

  /* top bar */
  .bar{position:sticky; top:0; z-index:10; background:var(--bg); padding:14px 0 8px;}
  .barrow{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted); font-weight:600;}
  .score{color:var(--navy);}
  .prog{height:8px; background:#dbe3ee; border-radius:6px; margin-top:8px; overflow:hidden;}
  .progfill{height:100%; width:0; background:linear-gradient(90deg,var(--navy2),var(--gold)); transition:width .35s ease;}

  /* card */
  .card{background:var(--card); border-radius:14px; padding:22px 20px 20px; margin-top:14px;
        box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .tag{display:inline-block; background:#eef2f8; color:var(--navy2); font-size:10.5px; font-weight:800;
       letter-spacing:.5px; padding:3px 9px; border-radius:11px; text-transform:uppercase;}
  .stem{font-size:19px; line-height:1.42; font-weight:600; margin:12px 0 18px; color:#0d1b2a;}

  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{display:flex; align-items:flex-start; gap:11px; width:100%; text-align:left;
       background:#f7f9fc; border:1.5px solid var(--line); border-radius:11px;
       padding:14px 15px; font-size:16px; line-height:1.35; cursor:pointer;
       transition:border-color .12s, background .12s, transform .05s; color:var(--ink);}
  .opt:hover:not(.locked){border-color:var(--navy2); background:#fff;}
  .opt:active:not(.locked){transform:scale(.995);}
  .opt .L{flex:0 0 26px; height:26px; border-radius:50%; background:#e6ecf4; color:var(--navy);
          font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;}
  .opt .T{flex:1; padding-top:2px;}
  .opts.locked .opt{cursor:default;}
  .opt.correct{border-color:var(--green); background:var(--greenbg);}
  .opt.correct .L{background:var(--green); color:#fff;}
  .opt.wrong{border-color:var(--red); background:var(--redbg);}
  .opt.wrong .L{background:var(--red); color:#fff;}
  .opt .mark{margin-left:auto; font-weight:800; font-size:15px; align-self:center;}
  .opt.correct .mark{color:var(--green);}
  .opt.wrong .mark{color:var(--red);}

  /* feedback */
  .fb{margin-top:16px; border-radius:11px; padding:15px 16px; display:none;}
  .fb.show{display:block; animation:rise .25s ease;}
  @keyframes rise{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .fb.ok{background:var(--greenbg); border:1px solid #b9e6cb;}
  .fb.no{background:var(--redbg); border:1px solid #f3c6c2;}
  .fb .verdict{font-weight:800; font-size:15px; margin-bottom:5px;}
  .fb.ok .verdict{color:var(--green);}
  .fb.no .verdict{color:var(--red);}
  .fb .ans{font-weight:700; margin-bottom:6px;}
  .fb .expl{font-size:14.5px; line-height:1.5; color:#27313f;}
  .fb .cite{margin-top:9px; font-size:12.5px; color:var(--muted); font-style:italic;}

  .nav{display:flex; gap:10px; margin:16px 0 26px;}
  .btn{flex:1; border:none; border-radius:11px; padding:15px; font-size:16px; font-weight:700;
       cursor:pointer; font-family:inherit;}
  .btn.primary{background:var(--navy); color:#fff;}
  .btn.primary:hover{background:var(--navy2);}
  .btn.ghost{background:#fff; color:var(--navy); border:1.5px solid var(--line);}
  .btn:disabled{opacity:.4; cursor:default;}
  .hint{text-align:center; font-size:12px; color:var(--muted); margin:-12px 0 22px;}

  /* start + results screens */
  .screen{background:var(--card); border-radius:16px; padding:30px 24px; margin-top:22px; text-align:center;
          box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .screen h1{font-size:24px; margin:0 0 6px; color:var(--navy);}
  .screen .sub{color:var(--muted); font-size:14px; margin-bottom:22px; line-height:1.45;}
  .bigscore{font-size:60px; font-weight:800; color:var(--navy); line-height:1; margin:8px 0;}
  .bigscore small{font-size:22px; color:var(--muted); font-weight:600;}
  .pct{font-size:17px; font-weight:700; margin-bottom:18px;}
  .pass{color:var(--green);} .fail{color:var(--red);}
  .opt.toggle{justify-content:center; cursor:pointer; font-weight:600; max-width:320px; margin:0 auto 18px;}
  .opt.toggle.on{border-color:var(--navy2); background:#eef4fb;}
  .misslist{text-align:left; margin-top:6px;}
  .missitem{border-left:3px solid var(--red); background:#fff6f5; border-radius:6px; padding:11px 13px; margin-bottom:10px;}
  .missitem .mq{font-weight:600; font-size:14.5px; margin-bottom:5px;}
  .missitem .ma{font-size:13.5px; color:#27313f;} .missitem .mc{font-size:12px; color:var(--muted); font-style:italic; margin-top:4px;}
  .allright{font-size:16px; color:var(--green); font-weight:700; margin:14px 0;}
  details.drill{margin:18px 0 4px; text-align:left;}
  details.drill summary{cursor:pointer; font-weight:700; color:var(--navy); font-size:15px; padding:8px 0;}
  .drillrow{border-bottom:1px solid var(--line); padding:9px 2px; font-size:13.5px;}
  .drillrow b{color:var(--navy2);}
  .foot{text-align:center; color:#9aa6b8; font-size:11px; margin:10px 0 26px;}
</style>
</head>
<body>
<div class="wrap">

  <!-- START -->
  <div id="start" class="screen">
    <h1>NDT — Non-Destructive Testing Test</h1>
    <div class="sub">AIM Block 2 · AC 43.13-1B Ch.5 (NDI) + FAA-H-8083-30B</div>
    <div id="startmeta" class="sub"></div>
    <div id="shuffleToggle" class="opt toggle"><span class="T">🔀&nbsp; Shuffle question order</span></div>
    <div class="nav" style="max-width:320px;margin:0 auto;">
      <button class="btn primary" onclick="QUIZ.start()">Start Quiz →</button>
    </div>
    <div class="hint">Tip: press A–D (or 1–4) to answer, Enter for next.</div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" style="display:none;">
    <div class="bar">
      <div class="barrow"><span id="counter">Q1</span><span class="score" id="scorelbl">Score 0/0</span></div>
      <div class="prog"><div class="progfill" id="progfill"></div></div>
    </div>
    <div id="cardmount"></div>
    <div class="nav">
      <button class="btn ghost" id="skipbtn" onclick="QUIZ.next(true)">Skip</button>
      <button class="btn primary" id="nextbtn" onclick="QUIZ.next()" disabled>Next →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="screen" style="display:none;"></div>

  <div class="foot">amt-tutor · Matt's Agency · offline study quiz</div>
</div>

<script>
const DATA  = [{"q": "Non-destructive testing (NDT/NDI) is best described as inspection that:", "options": ["Determines material/structural integrity WITHOUT damage or destruction of the item", "Replaces all visual inspection", "Always damages the part to reveal flaws", "Can only be done in a laboratory"], "correct": 0, "short": "Determines material/structural integrity WITHOUT damage or destruction of the item", "expl": "NDT/NDI techniques evaluate integrity without damaging or destroying the item under investigation.", "cite": "AC 43.13-1B ¶5-7, p. 5-6", "topic": "general NDT"}, {"q": "Which is the most basic and most commonly used inspection method?", "options": ["Ultrasonic", "Radiographic", "Eddy current", "Visual"], "correct": 3, "short": "Visual", "expl": "Visual inspection is the most basic and common method — inexpensive, portable, immediate results, minimum training.", "cite": "AC 43.13-1B Table 5-1, p. 5-7", "topic": "visual"}, {"q": "Most advanced NDI (eddy current, ultrasonic, radiographic) is typically performed by:", "options": ["The aircraft owner", "Any pilot before flight", "Quality-control inspectors / specially trained or certified technicians", "Anyone with an A&P, unrestricted"], "correct": 2, "short": "Quality-control inspectors / specially trained or certified technicians", "expl": "NDI by eddy current/ultrasonic/X-ray is usually done by QC inspectors or specially trained/certified techs; X-ray by certified organizations.", "cite": "AC 43.13-1B ¶5-6, p. 5-6 / [class notes — verify with instructor]", "topic": "general NDT"}, {"q": "Radiographic (X-ray) inspection is generally:", "options": ["Performed by any A&P", "Cheap and quick with no hazards", "Limited to surface defects only", "A safety hazard, very expensive/slow, requiring high skill and certified operators"], "correct": 3, "short": "A safety hazard, very expensive/slow, requiring high skill and certified operators", "expl": "X-ray detects internal flaws but is a safety hazard, expensive/slow, highly skill-dependent, and done by certified contractors.", "cite": "AC 43.13-1B Table 5-1, p. 5-7; ¶5-37", "topic": "radiographic"}, {"q": "A borescope is primarily used to inspect:", "options": ["External paint condition", "Magnetic flux strength", "Interior areas that are otherwise inaccessible (e.g., engine internals)", "Tire tread depth"], "correct": 2, "short": "Interior areas that are otherwise inaccessible (e.g., engine internals)", "expl": "Borescopes (and fiber-optic scopes) let you see interior areas of objects that cannot be reached directly.", "cite": "AC 43.13-1B ¶5-23, p. 5-13 / [class notes — verify with instructor]", "topic": "visual/borescope"}, {"q": "A fiber-optic borescope is advantageous because it:", "options": ["Has a flexible probe that can bend around corners, often with a camera attached", "Cannot bend at all", "Only works underwater", "Requires X-ray film"], "correct": 0, "short": "Has a flexible probe that can bend around corners, often with a camera attached", "expl": "A fiber-optic scope has a flexible probe that bends around corners (length up to ~4 ft) and may have a camera attached.", "cite": "[class notes — verify with instructor]", "topic": "visual/borescope"}, {"q": "Which set lists common basic visual-inspection tools?", "options": ["Magnaflux machine, yoke, coil", "Ultrasonic transducer, couplant, oscilloscope", "X-ray tube, film, lead apron", "Flashlight, mirror, magnifying glass, borescope"], "correct": 3, "short": "Flashlight, mirror, magnifying glass, borescope", "expl": "Basic visual inspection tools include a flashlight, mirror, magnifying glass, and borescope.", "cite": "AC 43.13-1B ¶5-23, p. 5-13 / [class notes — verify with instructor]", "topic": "visual/borescope"}, {"q": "A limitation shared by visual inspection and dye penetrant is that they detect:", "options": ["Only surface discontinuities/defects", "Only subsurface flaws", "Flaws hidden inside castings", "Flaws in plastics only"], "correct": 0, "short": "Only surface discontinuities/defects", "expl": "Both visual and dye penetrant locate SURFACE defects only; subsurface flaws need another method.", "cite": "AC 43.13-1B Table 5-1, p. 5-7; ¶5-60b", "topic": "visual/penetrant"}, {"q": "Dye (liquid) penetrant inspection can detect discontinuities that are:", "options": ["Open to the surface", "Only in ferromagnetic steel", "Visible to the naked eye already", "Buried deep inside the part"], "correct": 0, "short": "Open to the surface", "expl": "Penetrant detects only discontinuities OPEN to the surface; some other method is needed for subsurface defects.", "cite": "AC 43.13-1B ¶5-60b, p. 5-29", "topic": "penetrant"}, {"q": "Penetrant inspection can be used on:", "options": ["Only aluminum", "Nonporous metals (ferrous and non-ferrous) and nonmetallic materials such as plastics", "Only ferromagnetic steel", "Only magnetic parts"], "correct": 1, "short": "Nonporous metals (ferrous and non-ferrous) and nonmetallic materials such as plastics", "expl": "Penetrant works on nonporous metal and nonmetal components — ferrous, non-ferrous, and many nonmetallics — not tied to ferromagnetism.", "cite": "AC 43.13-1B ¶5-60/5-60a, p. 5-29", "topic": "penetrant"}, {"q": "The physical action that draws penetrant INTO a surface-breaking flaw is:", "options": ["Eddy-current induction", "Centrifugal force", "Capillary attraction (capillary action)", "Magnetic attraction"], "correct": 2, "short": "Capillary attraction (capillary action)", "expl": "Capillary attraction draws the liquid penetrant into any fault that reaches the surface.", "cite": "AC 43.13-1B ¶5-62/5-63h, p. 5-33 / [class notes — verify with instructor]", "topic": "penetrant"}, {"q": "\"Dwell time\" in penetrant inspection is the time required for the:", "options": ["Developer to dry", "Part to demagnetize", "Penetrant to soak into and fill the discontinuity", "Black light to warm up"], "correct": 2, "short": "Penetrant to soak into and fill the discontinuity", "expl": "Dwell (penetration) time lets the penetrant enter the flaw. Cracks require LONGER dwell; excess heat evaporates penetrant.", "cite": "AC 43.13-1B ¶5-62, p. 5-31", "topic": "penetrant"}, {"q": "Tight/narrow cracks generally require what change to dwell time?", "options": ["Shorter dwell", "Dwell is irrelevant", "Longer dwell", "No dwell at all"], "correct": 2, "short": "Longer dwell", "expl": "Small/tight cracks require a LONGER dwell time so penetrant has time to enter; too much heat evaporates it.", "cite": "AC 43.13-1B ¶5-62, p. 5-31 / [class notes — verify with instructor]", "topic": "penetrant"}, {"q": "The developer in penetrant inspection works by:", "options": ["Acting as a blotter that draws (bleeds) penetrant back out to reveal the flaw", "Dissolving the base metal", "Sealing the crack permanently", "Magnetizing the part"], "correct": 0, "short": "Acting as a blotter that draws (bleeds) penetrant back out to reveal the flaw", "expl": "Developer is a blotter that produces 'bleed-out' (reverse capillary action), drawing penetrant out to form visible indications.", "cite": "AC 43.13-1B ¶5-62, p. 5-34", "topic": "penetrant"}, {"q": "The three general kinds of developer are:", "options": ["Dry, wet, and non-aqueous", "DC, AC, half-wave", "Acid, base, neutral", "Red, white, blue"], "correct": 0, "short": "Dry, wet, and non-aqueous", "expl": "Developers are DRY (loose powder), WET (powder in water), and NON-AQUEOUS (powder suspended in solvent, spray can).", "cite": "AC 43.13-1B ¶5-62, p. 5-30 (Table 5-3) / [class notes — verify with instructor]", "topic": "penetrant"}, {"q": "In VISIBLE dye penetrant, flaws typically appear as:", "options": ["Blue dots only", "Black shadows on film", "Red lines against a white developer background in normal white light", "Glowing green lines under UV"], "correct": 2, "short": "Red lines against a white developer background in normal white light", "expl": "Visible (color-contrast) penetrant shows RED indications against white developer, inspected in normal visible white light.", "cite": "AC 43.13-1B ¶5-62j, p. 5-34 / [class notes — verify with instructor]", "topic": "penetrant"}, {"q": "FLUORESCENT penetrant indications are viewed under:", "options": ["No light at all", "Red safelight", "Bright sunlight", "Black (ultraviolet) light in a darkened area"], "correct": 3, "short": "Black (ultraviolet) light in a darkened area", "expl": "Fluorescent penetrant glows greenish-yellow and must be inspected under black (UV) light in a dark area.", "cite": "AC 43.13-1B ¶5-62j, p. 5-34", "topic": "penetrant"}, {"q": "If a part is NOT thoroughly washed before developer, the indication tends to be:", "options": ["Fuzzy/blurred due to excess background penetrant", "Magnetic", "Sharper and easier to read", "Invisible permanently"], "correct": 0, "short": "Fuzzy/blurred due to excess background penetrant", "expl": "Inadequate removal of excess penetrant leaves background that makes indications fuzzy/blurred instead of sharp.", "cite": "AC 43.13-1B ¶5-60b, p. 5-29 / [class notes — verify with instructor]", "topic": "penetrant"}, {"q": "Why must mechanical cleaning (abrasive blasting, scraping, wire brushing) be AVOIDED before penetrant inspection?", "options": ["It demagnetizes the part", "It can smear/peen metal over the flaw, sealing or reducing the opening so penetrant can't enter", "It is too slow", "It is only for ferrous metals"], "correct": 1, "short": "It can smear/peen metal over the flaw, sealing or reducing the opening so penetrant can't enter", "expl": "Mechanical methods may peen/smear metal over the defect, masking it; etching is used to reopen mechanically-smeared openings.", "cite": "AC 43.13-1B Table 5-5, p. 5-32; ¶5-63g, p. 5-33", "topic": "penetrant"}, {"q": "Before penetrant inspection, paint and other coatings on the part must be:", "options": ["Left in place", "Painted thicker", "Magnetized", "Removed (the surface must be clean and free of coatings)"], "correct": 3, "short": "Removed (the surface must be clean and free of coatings)", "expl": "Part preparation requires removing finishes/sealant/paint; a high degree of cleanliness is required for penetrant.", "cite": "AC 43.13-1B Table 5-1, p. 5-7; ¶5-62a", "topic": "penetrant"}, {"q": "Magnetic particle inspection (MPI) can ONLY be used on:", "options": ["Aluminum and plastics", "Non-metallic composites", "Any conductive metal", "Ferromagnetic (ferrous) materials such as iron, nickel, cobalt and some alloys"], "correct": 3, "short": "Ferromagnetic (ferrous) materials such as iron, nickel, cobalt and some alloys", "expl": "MPI works only on ferromagnetic materials (iron, nickel, cobalt, some alloys); non-magnetic materials cannot be inspected.", "cite": "AC 43.13-1B ¶5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "MPI detects which kinds of flaws?", "options": ["Only deep internal voids", "Only flaws in plastics", "Surface and slightly subsurface discontinuities", "Only paint defects"], "correct": 2, "short": "Surface and slightly subsurface discontinuities", "expl": "MPI reveals surface and slightly subsurface discontinuities in ferromagnetic parts.", "cite": "AC 43.13-1B Table 5-1, p. 5-7; ¶5-19", "topic": "magnetic particle"}, {"q": "For a flaw to be detected by MPI, the magnetic flux lines must run:", "options": ["Parallel to the flaw", "Perpendicular (across) the flaw", "At 45° only", "Through the operator"], "correct": 1, "short": "Perpendicular (across) the flaw", "expl": "Flux must be PERPENDICULAR to the fault. Faults running PARALLEL to the flux are NOT detected.", "cite": "AC 43.13-1B ¶5-19, p. 5-11 / [class notes — verify with instructor]", "topic": "magnetic particle"}, {"q": "Because flaws can lie in any direction, a part is usually magnetized in:", "options": ["Three random directions", "No specific direction", "One direction only", "Two directions — longitudinal and circular"], "correct": 3, "short": "Two directions — longitudinal and circular", "expl": "To find all faults, the part is magnetized longitudinally AND circularly (two directions).", "cite": "AC 43.13-1B ¶5-19, p. 5-11 / [class notes — verify with instructor]", "topic": "magnetic particle"}, {"q": "LONGITUDINAL magnetization is produced by:", "options": ["Passing current through the part itself", "Using ultrasonic waves", "Using a black light", "Placing the part inside a coil so flux runs lengthwise"], "correct": 3, "short": "Placing the part inside a coil so flux runs lengthwise", "expl": "Longitudinal: part placed in a coil; current through the coil runs the field lengthwise through the part.", "cite": "AC 43.13-1B ¶5-19, p. 5-11 / [class notes — verify with instructor]", "topic": "magnetic particle"}, {"q": "CIRCULAR magnetization is produced by:", "options": ["Spraying developer", "Placing the part in a coil", "Passing current through the part itself (or a central conductor)", "Heating the part"], "correct": 2, "short": "Passing current through the part itself (or a central conductor)", "expl": "Circular: current flows through the part itself (or between head/electrode contacts), creating a circular field.", "cite": "AC 43.13-1B ¶5-19, p. 5-11 / [class notes — verify with instructor]", "topic": "magnetic particle"}, {"q": "In the WET method of MPI, the iron particles are:", "options": ["Applied as a paint", "Suspended in a liquid bath (kerosene/light oil) and flowed over the part", "Replaced by penetrant dye", "Dusted on dry from a shaker"], "correct": 1, "short": "Suspended in a liquid bath (kerosene/light oil) and flowed over the part", "expl": "Wet method flows finely divided iron oxides suspended in oil/kerosene over the part; needs continuous agitation.", "cite": "AC 43.13-1B ¶5-19, p. 5-11 / [class notes — verify with instructor]", "topic": "magnetic particle"}, {"q": "RESIDUAL magnetism MPI means the magnetizing force is:", "options": ["Applied continuously during inspection", "Removed BEFORE applying particles/inspecting (relies on retained field)", "Never applied", "Replaced by AC only"], "correct": 1, "short": "Removed BEFORE applying particles/inspecting (relies on retained field)", "expl": "Residual method: magnetizing force is removed before testing; used on hardened/heat-treated steel that retains a field.", "cite": "AC 43.13-1B ¶5-19, p. 5-11 / [class notes — verify with instructor]", "topic": "magnetic particle"}, {"q": "CONTINUOUS magnetism MPI gives greater sensitivity to subsurface flaws because the field is:", "options": ["Applied continuously while particles are applied/inspected", "Removed before inspection", "Only used on aluminum", "Only AC"], "correct": 0, "short": "Applied continuously while particles are applied/inspected", "expl": "Continuous method keeps the magnetizing force applied during particle application — better subsurface sensitivity.", "cite": "AC 43.13-1B ¶5-19, p. 5-11 / [class notes — verify with instructor]", "topic": "magnetic particle"}, {"q": "After magnetic particle inspection, the part must be:", "options": ["Painted immediately", "Demagnetized (and cleaned)", "Left magnetized for storage", "Heated to red"], "correct": 1, "short": "Demagnetized (and cleaned)", "expl": "Parts must be DEMAGNETIZED after MPI (residual magnetism attracts debris / disturbs instruments), then cleaned.", "cite": "AC 43.13-1B Table 5-1, p. 5-7; ¶5-19", "topic": "magnetic particle"}, {"q": "In a Magnaflux machine, which current MAGNETIZES vs. DEMAGNETIZES the part?", "options": ["DC magnetizes, AC demagnetizes", "Neither affects magnetism", "Both magnetize equally", "AC magnetizes, DC demagnetizes"], "correct": 0, "short": "DC magnetizes, AC demagnetizes", "expl": "Per the notes: DC is used to magnetize the part; AC is used to demagnetize (degauss) it.", "cite": "[class notes — verify with instructor]", "topic": "magnetic particle"}, {"q": "Eddy current testing is based on:", "options": ["X-ray absorption", "Sound-wave reflection", "Capillary action", "Electromagnetic induction"], "correct": 3, "short": "Electromagnetic induction", "expl": "Eddy current testing is based on electromagnetic induction — an AC coil induces eddy currents whose changes reveal flaws.", "cite": "AC 43.13-1B ¶5-30, p. 5-17", "topic": "eddy current"}, {"q": "Eddy current inspection can examine:", "options": ["Both surface AND subsurface areas", "Only plastics", "Only the outer paint", "Only the inside of castings via film"], "correct": 0, "short": "Both surface AND subsurface areas", "expl": "Eddy current NDT can examine surface and subsurface areas very quickly.", "cite": "AC 43.13-1B ¶5-30, p. 5-17", "topic": "eddy current"}, {"q": "Eddy current is LIMITED to materials that:", "options": ["Float in water", "Are non-conductive", "Conduct electricity (it cannot be used on plastics)", "Are magnetic only"], "correct": 2, "short": "Conduct electricity (it cannot be used on plastics)", "expl": "Eddy current works only on electrically CONDUCTIVE materials; it cannot be used on plastics/non-conductors.", "cite": "AC 43.13-1B ¶5-30, p. 5-18", "topic": "eddy current"}, {"q": "Which property describes a metal's ability to ACCEPT magnetic lines of flux (affecting eddy response)?", "options": ["Density", "Mass", "Conductivity", "Permeability"], "correct": 3, "short": "Permeability", "expl": "Permeability is the ability of a material to accept magnetic lines (flux); it affects eddy current response.", "cite": "AC 43.13-1B ¶5-30, p. 5-18 / [class notes — verify with instructor]", "topic": "eddy current"}, {"q": "Which is NOT one of the properties affecting eddy current response listed in the notes?", "options": ["Permeability", "Capillary attraction", "Mass / presence of voids or faults", "Conductivity"], "correct": 1, "short": "Capillary attraction", "expl": "Eddy response factors: conductivity, permeability, mass, and presence of voids/faults. Capillary attraction belongs to penetrant.", "cite": "AC 43.13-1B ¶5-30, p. 5-18 / [class notes — verify with instructor]", "topic": "eddy current"}, {"q": "Ultrasonic inspection introduces what into the material to find flaws?", "options": ["X-rays", "Liquid dye", "High-frequency sound waves", "Magnetic flux"], "correct": 2, "short": "High-frequency sound waves", "expl": "Ultrasonic testers use high-frequency SOUND waves; reflections from surfaces/discontinuities reveal flaws.", "cite": "AC 43.13-1B ¶5-43, p. 5-19", "topic": "ultrasonic"}, {"q": "Per the notes, ultrasonic is the only NDT method usable on which group?", "options": ["Only magnetic alloys", "Plastics, ceramics, composites, and most metals", "Only ferrous steel", "Only aluminum"], "correct": 1, "short": "Plastics, ceramics, composites, and most metals", "expl": "The notes state ultrasonic is the only NDT method usable on plastics, ceramics, composites, and most metals.", "cite": "[class notes — verify with instructor] (cf. AC 43.13-1B Table 5-1, wide material range)", "topic": "ultrasonic"}, {"q": "Ultrasonic is valued for detecting:", "options": ["Minute cracks and voids too small for X-ray detection", "Magnetic poles", "Paint thickness only", "Only large surface dents"], "correct": 0, "short": "Minute cracks and voids too small for X-ray detection", "expl": "Ultrasonic detects MINUTE cracks/voids too small for radiographic (X-ray) detection.", "cite": "AC 43.13-1B ¶5-43, p. 5-19 / [class notes — verify with instructor]", "topic": "ultrasonic"}, {"q": "The three ultrasonic contact systems named in the notes are:", "options": ["Immersion, dip, spray", "Pulse echo, through transmission, resonance", "Dry, wet, non-aqueous", "Longitudinal, circular, residual"], "correct": 1, "short": "Pulse echo, through transmission, resonance", "expl": "The three contact systems are PULSE ECHO, THROUGH TRANSMISSION, and RESONANCE.", "cite": "AC 43.13-1B ¶5-43, p. 5-19 / [class notes — verify with instructor]", "topic": "ultrasonic"}, {"q": "Of the two basic ultrasonic test methods, which can be done anywhere (portable) vs. done in shops?", "options": ["Both only in the field", "Contact = can be done anywhere; Immersion = done in shops", "Both only in shops", "Immersion = anywhere; Contact = shops"], "correct": 1, "short": "Contact = can be done anywhere; Immersion = done in shops", "expl": "Contact testing can be done anywhere (portable); immersion testing is done in shops (part submerged in a tank).", "cite": "[class notes — verify with instructor]", "topic": "ultrasonic"}, {"q": "A key advantage of radiographic (X-ray) inspection is that it can:", "options": ["Only see the surface", "Be done by anyone with no training", "Never pose a hazard", "Detect internal/hidden flaws and give a permanent test record (film)"], "correct": 3, "short": "Detect internal/hidden flaws and give a permanent test record (film)", "expl": "Radiography detects surface AND internal flaws, inspects hidden areas, and produces a permanent record.", "cite": "AC 43.13-1B Table 5-1, p. 5-7", "topic": "radiographic"}, {"q": "Radiographic testing requires which safety practice?", "options": ["No precautions needed", "Only safety glasses", "Roping off the radiation area and posting radioactive warnings", "Only gloves"], "correct": 2, "short": "Roping off the radiation area and posting radioactive warnings", "expl": "Radiation areas must be roped off and marked with radioactive warnings; A&P mechanics do not perform radiography.", "cite": "AC 43.13-1B ¶5-37 / Table 5-1, p. 5-7", "topic": "radiographic"}, {"q": "Radiographic inspection on aircraft is performed by:", "options": ["Any A&P", "The owner", "Contractors/technicians specializing in (certified for) X-ray testing", "The pilot"], "correct": 2, "short": "Contractors/technicians specializing in (certified for) X-ray testing", "expl": "X-ray is only performed by certified organizations/contractors specializing in radiographic testing.", "cite": "AC 43.13-1B ¶5-37 / [class notes — verify with instructor]", "topic": "radiographic"}, {"q": "Compared with ultrasonic, radiography is generally:", "options": ["Slower, more expensive, and a greater safety hazard", "Better for tiny cracks", "Limited to surface flaws", "Faster and cheaper"], "correct": 0, "short": "Slower, more expensive, and a greater safety hazard", "expl": "X-ray is very expensive/slow and a safety hazard; ultrasonic finds minute cracks too small for X-ray.", "cite": "AC 43.13-1B Table 5-1, p. 5-7", "topic": "radiographic"}, {"q": "Which two methods can detect BOTH surface and subsurface discontinuities?", "options": ["Penetrant and radiographic surface only", "Visual and ultrasonic surface only", "Visual and penetrant", "Magnetic particle and eddy current"], "correct": 3, "short": "Magnetic particle and eddy current", "expl": "Magnetic particle and eddy current both detect surface AND subsurface flaws; visual/penetrant are surface-only.", "cite": "AC 43.13-1B Table 5-1, p. 5-7", "topic": "cross-method"}, {"q": "'Discontinuity' in NDT terminology means:", "options": ["A type of developer", "A flaw — a disruption in the part's normal physical structure", "A magnetizing coil", "A perfectly sound part"], "correct": 1, "short": "A flaw — a disruption in the part's normal physical structure", "expl": "A discontinuity is a flaw: a disruption in a part's normal physical (structural) continuity.", "cite": "AC 43.13-1B ¶5-1 / ¶5-19, p. 5-11", "topic": "general NDT"}, {"q": "If chemicals from DIFFERENT penetrant groups (e.g., Group 1 and Group 2) are mixed, the result is:", "options": ["Faster dwell", "False results / unreliable indications", "More sensitive testing", "Stronger magnetism"], "correct": 1, "short": "False results / unreliable indications", "expl": "Mixing chemicals from different groups gives FALSE/unreliable results; keep systems matched.", "cite": "[class notes — verify with instructor]", "topic": "penetrant"}, {"q": "When no defect is found during penetrant inspection, the part is:", "options": ["Sent to X-ray", "Returned to service / reinstalled (with proper documentation/part tag)", "Demagnetized only", "Scrapped"], "correct": 1, "short": "Returned to service / reinstalled (with proper documentation/part tag)", "expl": "A part with no defect is returned to service/reinstalled; a part tag documents good vs. bad parts.", "cite": "[class notes — verify with instructor]", "topic": "penetrant"}, {"q": "A hand-held YOKE used for portable MPI in the field most commonly uses:", "options": ["Dry magnetic media (and may add magnetic field indicator)", "Ultrasonic couplant", "Wet fluorescent bath only", "X-ray film"], "correct": 0, "short": "Dry magnetic media (and may add magnetic field indicator)", "expl": "The portable yoke uses dry media; its legs must straddle the flaw, placed across (≈90° to) the principal flaw direction.", "cite": "AC 43.13-1B ¶5-19, p. 5-11 / [class notes — verify with instructor]", "topic": "magnetic particle"}];
const DRILL = [{"label": "Surface-only", "text": "Visual & Dye Penetrant detect SURFACE discontinuities only."}, {"label": "Surface + subsurface", "text": "Magnetic Particle & Eddy Current detect surface AND subsurface flaws."}, {"label": "MPI material limit", "text": "Magnetic Particle works ONLY on ferromagnetic (ferrous) materials."}, {"label": "Flux rule", "text": "MPI flux must be PERPENDICULAR to the flaw; faults PARALLEL to flux are missed."}, {"label": "Two MPI directions", "text": "Magnetize LONGITUDINAL (in a coil) + CIRCULAR (current through part)."}, {"label": "DC vs AC", "text": "DC magnetizes the part; AC demagnetizes (degausses) it."}, {"label": "Residual vs continuous", "text": "Residual = field removed BEFORE inspection; Continuous = field applied DURING (better subsurface)."}, {"label": "Capillary action", "text": "Penetrant enters a flaw by CAPILLARY attraction; developer 'bleeds it out' (reverse capillary)."}, {"label": "Visible vs fluorescent", "text": "Visible = RED lines vs white developer in white light; Fluorescent = glow under BLACK/UV light."}, {"label": "Eddy current limits", "text": "Eddy current needs CONDUCTIVE material (not plastics); often NO coating removal needed."}, {"label": "Ultrasonic", "text": "Ultrasonic = high-frequency SOUND waves; finds MINUTE cracks too small for X-ray; Contact=anywhere, Immersion=shop."}, {"label": "X-ray", "text": "Radiography sees INTERNAL flaws, gives permanent film record, but is a HAZARD, expensive, certified-techs only."}];

const QUIZ = {
  order:[], i:0, score:0, answered:0, missed:[], shuffle:false,

  init(){
    document.getElementById('startmeta').innerHTML =
      '<b>'+DATA.length+'</b> questions &nbsp;·&nbsp; instant feedback &nbsp;·&nbsp; every answer cited';
    const t=document.getElementById('shuffleToggle');
    t.onclick=()=>{ this.shuffle=!this.shuffle; t.classList.toggle('on',this.shuffle); };
  },

  start(){
    this.order = DATA.map((_,k)=>k);
    if(this.shuffle){ for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('start').style.display='none';
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  retake(missedOnly){
    if(missedOnly && this.missed.length){ const m=this.missed.slice(); this.order=m; }
    else { this.order = DATA.map((_,k)=>k); if(this.shuffle){for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];}} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  render(){
    const idx=this.order[this.i], q=DATA[idx];
    const total=this.order.length;
    document.getElementById('counter').textContent = 'Q'+(this.i+1)+' of '+total;
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('progfill').style.width = (this.i/total*100)+'%';
    let opts='';
    q.options.forEach((o,li)=>{
      const L='ABCD'[li];
      opts += '<button class="opt" data-li="'+li+'" onclick="QUIZ.pick('+li+')">'+
              '<span class="L">'+L+'</span><span class="T">'+esc(o)+'</span><span class="mark"></span></button>';
    });
    document.getElementById('cardmount').innerHTML =
      '<div class="card"><span class="tag">'+esc(q.topic)+'</span>'+
      '<div class="stem">'+esc(q.q)+'</div>'+
      '<div class="opts" id="opts">'+opts+'</div>'+
      '<div class="fb" id="fb"></div></div>';
    document.getElementById('nextbtn').disabled = true;
    document.getElementById('skipbtn').style.display = '';
    this.locked=false;
  },

  pick(li){
    if(this.locked) return;
    this.locked=true;
    const idx=this.order[this.i], q=DATA[idx];
    const wrapEl=document.getElementById('opts'); wrapEl.classList.add('locked');
    const btns=wrapEl.querySelectorAll('.opt');
    const ok = (li===q.correct);
    btns.forEach(b=>{
      const bl=+b.dataset.li;
      if(bl===q.correct){ b.classList.add('correct'); b.querySelector('.mark').textContent='✓'; }
      if(bl===li && !ok){ b.classList.add('wrong'); b.querySelector('.mark').textContent='✗'; }
    });
    this.answered++;
    if(ok) this.score++; else this.missed.push(idx);
    const fb=document.getElementById('fb');
    fb.className='fb show '+(ok?'ok':'no');
    fb.innerHTML = '<div class="verdict">'+(ok?'✓ Correct':'✗ Incorrect')+'</div>'+
      '<div class="ans">Answer: '+'ABCD'[q.correct]+'. '+esc(q.short)+'</div>'+
      '<div class="expl">'+esc(q.expl)+'</div>'+
      '<div class="cite">📖 '+esc(q.cite)+'</div>';
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('nextbtn').disabled = false;
    document.getElementById('skipbtn').style.display = 'none';
  },

  next(skip){
    if(skip && !this.locked){ /* skipped, not answered */ }
    this.i++;
    if(this.i >= this.order.length){ this.finish(); return; }
    this.render();
    window.scrollTo({top:0,behavior:'smooth'});
  },

  finish(){
    document.getElementById('quiz').style.display='none';
    const R=document.getElementById('results');
    const total=this.answered;
    const pct = total? Math.round(this.score/total*100):0;
    const pass = pct>=70;
    let miss='';
    if(this.missed.length){
      miss='<h3 style="text-align:left;font-size:16px;color:var(--navy);margin:22px 0 8px;">Review your '+this.missed.length+' missed:</h3><div class="misslist">';
      this.missed.forEach(idx=>{ const q=DATA[idx];
        miss+='<div class="missitem"><div class="mq">'+esc(q.q)+'</div>'+
              '<div class="ma"><b>'+'ABCD'[q.correct]+'. '+esc(q.short)+'</b> — '+esc(q.expl)+'</div>'+
              '<div class="mc">📖 '+esc(q.cite)+'</div></div>';
      });
      miss+='</div>';
    } else {
      miss='<div class="allright">🎯 Perfect — every question correct!</div>';
    }
    let drillHtml='';
    if(DRILL && DRILL.length){
      drillHtml='<details class="drill"><summary>📌 High-Yield Drill Box ('+DRILL.length+' must-know facts)</summary>';
      DRILL.forEach(d=>{ drillHtml+='<div class="drillrow"><b>'+esc(d.label)+':</b> '+esc(d.text)+'</div>'; });
      drillHtml+='</details>';
    }
    R.innerHTML =
      '<h1>'+(pass?'Nice work 👍':'Keep grinding 💪')+'</h1>'+
      '<div class="bigscore">'+this.score+'<small>/'+total+'</small></div>'+
      '<div class="pct '+(pass?'pass':'fail')+'">'+pct+'%  '+(pass?'· passing (≥70%)':'· below 70%')+'</div>'+
      '<div class="nav" style="max-width:430px;margin:0 auto 4px;">'+
        '<button class="btn primary" onclick="QUIZ.retake(false)">Retake all</button>'+
        (this.missed.length?'<button class="btn ghost" onclick="QUIZ.retake(true)">Retake missed only</button>':'')+
      '</div>'+
      miss + drillHtml;
    R.style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  }
};

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('quiz').style.display==='none') return;
  const k=e.key.toLowerCase();
  if(['a','b','c','d'].includes(k)) QUIZ.pick('abcd'.indexOf(k));
  else if(['1','2','3','4'].includes(k)) QUIZ.pick(+k-1);
  else if(e.key==='Enter' && !document.getElementById('nextbtn').disabled) QUIZ.next();
});

QUIZ.init();
</script>
</body>
</html>
