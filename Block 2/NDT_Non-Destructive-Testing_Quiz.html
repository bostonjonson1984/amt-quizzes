<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NDT — Non-Destructive Testing (Complete)</title>
<style>
  :root{
    --navy:#0d2a4a; --navy2:#15436e; --gold:#ffce4d; --ink:#1c2330;
    --green:#1f9d57; --greenbg:#e7f7ee; --red:#d6453d; --redbg:#fdecea;
    --line:#e3e8f0; --muted:#5a6678; --card:#ffffff; --bg:#eef2f8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:0 16px env(safe-area-inset-bottom);
  }
  .wrap{width:100%; max-width:720px; margin:0 auto;}

  /* top bar */
  .bar{position:sticky; top:0; z-index:10; background:var(--bg); padding:14px 0 8px;}
  .barrow{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted); font-weight:600;}
  .score{color:var(--navy);}
  .prog{height:8px; background:#dbe3ee; border-radius:6px; margin-top:8px; overflow:hidden;}
  .progfill{height:100%; width:0; background:linear-gradient(90deg,var(--navy2),var(--gold)); transition:width .35s ease;}

  /* card */
  .card{background:var(--card); border-radius:14px; padding:22px 20px 20px; margin-top:14px;
        box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .tag{display:inline-block; background:#eef2f8; color:var(--navy2); font-size:10.5px; font-weight:800;
       letter-spacing:.5px; padding:3px 9px; border-radius:11px; text-transform:uppercase;}
  .stem{font-size:19px; line-height:1.42; font-weight:600; margin:12px 0 18px; color:#0d1b2a;}

  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{display:flex; align-items:flex-start; gap:11px; width:100%; text-align:left;
       background:#f7f9fc; border:1.5px solid var(--line); border-radius:11px;
       padding:14px 15px; font-size:16px; line-height:1.35; cursor:pointer;
       transition:border-color .12s, background .12s, transform .05s; color:var(--ink);}
  .opt:hover:not(.locked){border-color:var(--navy2); background:#fff;}
  .opt:active:not(.locked){transform:scale(.995);}
  .opt .L{flex:0 0 26px; height:26px; border-radius:50%; background:#e6ecf4; color:var(--navy);
          font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;}
  .opt .T{flex:1; padding-top:2px;}
  .opts.locked .opt{cursor:default;}
  .opt.correct{border-color:var(--green); background:var(--greenbg);}
  .opt.correct .L{background:var(--green); color:#fff;}
  .opt.wrong{border-color:var(--red); background:var(--redbg);}
  .opt.wrong .L{background:var(--red); color:#fff;}
  .opt .mark{margin-left:auto; font-weight:800; font-size:15px; align-self:center;}
  .opt.correct .mark{color:var(--green);}
  .opt.wrong .mark{color:var(--red);}

  /* feedback */
  .fb{margin-top:16px; border-radius:11px; padding:15px 16px; display:none;}
  .fb.show{display:block; animation:rise .25s ease;}
  @keyframes rise{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .fb.ok{background:var(--greenbg); border:1px solid #b9e6cb;}
  .fb.no{background:var(--redbg); border:1px solid #f3c6c2;}
  .fb .verdict{font-weight:800; font-size:15px; margin-bottom:5px;}
  .fb.ok .verdict{color:var(--green);}
  .fb.no .verdict{color:var(--red);}
  .fb .ans{font-weight:700; margin-bottom:6px;}
  .fb .expl{font-size:14.5px; line-height:1.5; color:#27313f;}
  .fb .cite{margin-top:9px; font-size:12.5px; color:var(--muted); font-style:italic;}

  .nav{display:flex; gap:10px; margin:16px 0 26px;}
  .btn{flex:1; border:none; border-radius:11px; padding:15px; font-size:16px; font-weight:700;
       cursor:pointer; font-family:inherit;}
  .btn.primary{background:var(--navy); color:#fff;}
  .btn.primary:hover{background:var(--navy2);}
  .btn.ghost{background:#fff; color:var(--navy); border:1.5px solid var(--line);}
  .btn:disabled{opacity:.4; cursor:default;}
  .hint{text-align:center; font-size:12px; color:var(--muted); margin:-12px 0 22px;}

  /* start + results screens */
  .screen{background:var(--card); border-radius:16px; padding:30px 24px; margin-top:22px; text-align:center;
          box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .screen h1{font-size:24px; margin:0 0 6px; color:var(--navy);}
  .screen .sub{color:var(--muted); font-size:14px; margin-bottom:22px; line-height:1.45;}
  .bigscore{font-size:60px; font-weight:800; color:var(--navy); line-height:1; margin:8px 0;}
  .bigscore small{font-size:22px; color:var(--muted); font-weight:600;}
  .pct{font-size:17px; font-weight:700; margin-bottom:18px;}
  .pass{color:var(--green);} .fail{color:var(--red);}
  .opt.toggle{justify-content:center; cursor:pointer; font-weight:600; max-width:320px; margin:0 auto 18px;}
  .opt.toggle.on{border-color:var(--navy2); background:#eef4fb;}
  .misslist{text-align:left; margin-top:6px;}
  .missitem{border-left:3px solid var(--red); background:#fff6f5; border-radius:6px; padding:11px 13px; margin-bottom:10px;}
  .missitem .mq{font-weight:600; font-size:14.5px; margin-bottom:5px;}
  .missitem .ma{font-size:13.5px; color:#27313f;} .missitem .mc{font-size:12px; color:var(--muted); font-style:italic; margin-top:4px;}
  .allright{font-size:16px; color:var(--green); font-weight:700; margin:14px 0;}
  details.drill{margin:18px 0 4px; text-align:left;}
  details.drill summary{cursor:pointer; font-weight:700; color:var(--navy); font-size:15px; padding:8px 0;}
  .drillrow{border-bottom:1px solid var(--line); padding:9px 2px; font-size:13.5px;}
  .drillrow b{color:var(--navy2);}
  .foot{text-align:center; color:#9aa6b8; font-size:11px; margin:10px 0 26px;}
</style>
</head>
<body>
<div class="wrap">

  <!-- START -->
  <div id="start" class="screen">
    <h1>NDT — Non-Destructive Testing (Complete)</h1>
    <div class="sub">AIM Block 2 · full notes coverage · AC 43.13-1B Ch.5 + FAA-H-8083-30B</div>
    <div id="startmeta" class="sub"></div>
    <div id="shuffleToggle" class="opt toggle"><span class="T">🔀&nbsp; Shuffle question order</span></div>
    <div class="nav" style="max-width:320px;margin:0 auto;">
      <button class="btn primary" onclick="QUIZ.start()">Start Quiz →</button>
    </div>
    <div class="hint">Tip: press A–D (or 1–4) to answer, Enter for next.</div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" style="display:none;">
    <div class="bar">
      <div class="barrow"><span id="counter">Q1</span><span class="score" id="scorelbl">Score 0/0</span></div>
      <div class="prog"><div class="progfill" id="progfill"></div></div>
    </div>
    <div id="cardmount"></div>
    <div class="nav">
      <button class="btn ghost" id="skipbtn" onclick="QUIZ.next(true)">Skip</button>
      <button class="btn primary" id="nextbtn" onclick="QUIZ.next()" disabled>Next →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="screen" style="display:none;"></div>

  <div class="foot">amt-tutor · Matt's Agency · offline study quiz</div>
</div>

<script>
const DATA  = [{"q": "Non-destructive testing (NDT/NDI/NDE) is best described as inspection that:", "options": ["Determines material/structural integrity WITHOUT damaging or destroying the item", "Always destroys the part to reveal hidden flaws", "Replaces every form of visual inspection", "Can only ever be done in a sealed laboratory"], "correct": 0, "short": "Determines integrity WITHOUT damaging the item", "expl": "NDT/NDI/NDE evaluates the material or structural integrity of a part without damaging or destroying it, so the part can stay in service.", "cite": "AC 43.13-1B Ch.5, par.5-1", "topic": "general NDT"}, {"q": "The six common NDT methods covered in the notes are:", "options": ["Visual, magnetic, sonar, radar, infrared, laser", "Visual, dye penetrant, magnetic particle, ultrasonic, eddy current, X-ray (radiographic)", "Hardness, tensile, fatigue, bend, torsion, shear", "Penetrant, paint, polish, prime, plate, passivate"], "correct": 1, "short": "Visual, dye penetrant, magnetic particle, ultrasonic, eddy current, X-ray", "expl": "The six common methods are visual, dye (liquid) penetrant, magnetic particle, ultrasonic, eddy current, and radiographic (X-ray).", "cite": "AC 43.13-1B Ch.5, par.5-7; Table 5-1, p. 5-7", "topic": "general NDT"}, {"q": "Which inspection method is the most basic and most commonly used?", "options": ["Eddy current", "Radiographic (X-ray)", "Visual", "Ultrasonic"], "correct": 2, "short": "Visual", "expl": "Visual inspection is the most basic and most common NDT method - fast, cheap, portable, and needing minimum training.", "cite": "AC 43.13-1B Ch.5, Table 5-1, p. 5-7", "topic": "visual"}, {"q": "Which three NDT methods may an A&P mechanic typically perform?", "options": ["Ultrasonic, eddy current, X-ray", "X-ray, ultrasonic, magnetic particle", "Eddy current, radiographic, visual", "Visual, dye penetrant, magnetic particle"], "correct": 3, "short": "Visual, dye penetrant, magnetic particle", "expl": "Per the notes an A&P can perform visual, dye penetrant, and magnetic particle inspections.", "cite": "[class notes]", "topic": "general NDT"}, {"q": "Advanced NDI such as ultrasonic and eddy current is usually performed by:", "options": ["Quality-control inspectors / specially trained technicians", "The aircraft owner", "Any pilot during preflight", "Anyone holding an A&P, no restriction"], "correct": 0, "short": "QC inspectors / specially trained technicians", "expl": "Ultrasonic and eddy current NDI is normally done by quality-control inspectors or specially trained technicians, not every A&P.", "cite": "[class notes]", "topic": "general NDT"}, {"q": "Radiographic (X-ray) inspection on aircraft is performed by:", "options": ["Any A&P mechanic", "Certified organizations / contractors only", "The pilot before flight", "The aircraft owner"], "correct": 1, "short": "Certified organizations / contractors only", "expl": "X-ray is performed only by certified organizations/contractors specializing in radiographic testing; A&Ps do not perform it.", "cite": "[class notes]", "topic": "radiographic"}, {"q": "Visual inspections are commonly carried out at which points relative to flight?", "options": ["Only once per year", "Only after an accident", "Pre-flight, thru-flight (between flights), and post-flight", "Only during overhaul"], "correct": 2, "short": "Pre-flight, thru-flight, and post-flight", "expl": "Routine visual checks are made pre-flight, thru-flight (turnaround), and post-flight.", "cite": "[class notes]", "topic": "visual"}, {"q": "Visual inspection is used to detect everyday defects such as:", "options": ["Internal casting voids", "Subsurface fatigue cracks", "Grain structure of heat-treated steel", "Worn tires, clogged tubes/lines, and fluid leaks"], "correct": 3, "short": "Worn tires, clogged tubes, and fluid leaks", "expl": "Visual inspection catches obvious surface conditions - worn tires, clogged tubes/lines, and fluid leaks.", "cite": "[class notes]", "topic": "visual"}, {"q": "Which set lists basic visual-inspection tools from the notes?", "options": ["Flashlight, mirror, magnifying glass, borescope", "Magnaflux machine, yoke, coil", "Transducer, couplant, oscilloscope", "X-ray tube, film, lead apron"], "correct": 0, "short": "Flashlight, mirror, magnifying glass, borescope", "expl": "Basic visual tools are a flashlight, mirror, magnifying glass, and borescope.", "cite": "AC 43.13-1B Ch.5, par.5-23, p. 5-13; FAA-H-8083-30B p. 8-1", "topic": "visual"}, {"q": "According to the notes, inspection lights should be:", "options": ["Dim and colored to reduce glare", "Bright - adequate white light, strong enough to clearly see surface defects", "Any flashlight regardless of output", "Ultraviolet only"], "correct": 1, "short": "Bright (adequate white light)", "expl": "Inspection lights should be bright - adequate white light strong enough to clearly reveal surface defects.", "cite": "[class notes]", "topic": "visual"}, {"q": "In the notes light-type list, which bulb gives about 70% more light than a standard incandescent?", "options": ["LED", "Xenon / HID", "Halogen", "Fluorescent tube"], "correct": 2, "short": "Halogen (~70% more light)", "expl": "The notes order bulbs standard incandescent -> halogen (~70% more light) -> xenon/HID (~100% more) -> LED (over 100% more).", "cite": "[class notes]", "topic": "visual"}, {"q": "Which bulb type does the notes list as giving about 100% more light than a standard bulb?", "options": ["Halogen", "Standard incandescent", "Candle", "Xenon / HID"], "correct": 3, "short": "Xenon / HID (~100% more light)", "expl": "Xenon/HID is listed at about 100% more light than a standard incandescent bulb.", "cite": "[class notes]", "topic": "visual"}, {"q": "Which bulb type does the notes list as giving OVER 100% more light than standard bulbs?", "options": ["LED", "Halogen", "Standard incandescent", "Xenon"], "correct": 0, "short": "LED (over 100% more light)", "expl": "LED is listed as providing over 100% more light than standard bulbs (and the longest service life of the group).", "cite": "[class notes]", "topic": "visual"}, {"q": "To inspect the INTERIOR areas of objects, which two tools are used?", "options": ["Yoke and coil", "Borescope and fiber-optic scope", "Transducer and couplant", "X-ray tube and film"], "correct": 1, "short": "Borescope and fiber-optic scope", "expl": "Interior areas (e.g., engine internals) are inspected with a borescope and a fiber-optic scope.", "cite": "AC 43.13-1B Ch.5, par.5-23, p. 5-13", "topic": "visual/borescope"}, {"q": "A fiber-optic scope is advantageous because it:", "options": ["Cannot bend at all", "Only works underwater", "Has a flexible probe that can bend around corners (length up to ~4 ft), often with a camera attached", "Requires X-ray film to form an image"], "correct": 2, "short": "Flexible probe that bends around corners (~4 ft, camera)", "expl": "A fiber-optic scope has a flexible probe that bends around corners, reaches up to about 4 ft, and may have a camera attached.", "cite": "[class notes]", "topic": "visual/borescope"}, {"q": "Per the notes, the approximate purchase cost of a borescope is around:", "options": ["$500", "$7,000", "$1,000,000", "$50,000"], "correct": 3, "short": "~$50,000", "expl": "The notes give a borescope cost around $50,000 (with repair costs around $7,000), which is why special training is required.", "cite": "[class notes]", "topic": "visual/borescope"}, {"q": "Per the notes, the approximate REPAIR cost figure tied to the borescope is around:", "options": ["$7,000", "$70", "$700", "$70,000"], "correct": 0, "short": "~$7,000", "expl": "The notes list a borescope repair cost around $7,000 (versus ~$50,000 to purchase).", "cite": "[class notes]", "topic": "visual/borescope"}, {"q": "Why does borescope use require special training?", "options": ["It uses radioactive material", "It is expensive equipment that is costly to repair if mishandled", "It requires a black light", "It only works on ferrous metal"], "correct": 1, "short": "Expensive equipment, costly to repair", "expl": "The borescope is costly (around $50,000) and expensive to repair (around $7,000), so special training is required to use it.", "cite": "[class notes]", "topic": "visual/borescope"}, {"q": "Dye (liquid) penetrant inspection locates cracks, porosity, and other faults that are:", "options": ["Buried deep inside the casting", "Only in ferromagnetic steel", "Open to the surface", "Visible to the naked eye already"], "correct": 2, "short": "Open to the surface", "expl": "Penetrant finds only discontinuities OPEN to the surface; subsurface flaws require a different method.", "cite": "AC 43.13-1B Ch.5, par.5-60, p. 5-29", "topic": "penetrant"}, {"q": "Dye penetrant inspection can be used on which materials?", "options": ["Only aluminum", "Only magnetic (ferrous) parts", "Only non-conductive plastics", "Ferrous metals, non-ferrous metals, and non-metallic (plastics)"], "correct": 3, "short": "Ferrous, non-ferrous, and non-metallic (plastics)", "expl": "Penetrant works on ferrous and non-ferrous metals and on non-metallic materials such as plastics (nonporous surfaces).", "cite": "AC 43.13-1B Ch.5, par.5-60a, p. 5-29", "topic": "penetrant"}, {"q": "The dye penetrates which kind of fault, and is then made visible by what?", "options": ["Surface faults; made visible by the developer", "Subsurface faults; made visible by X-ray film", "Internal voids; made visible by a magnet", "Magnetic faults; made visible by iron powder"], "correct": 0, "short": "Surface faults; made visible by developer", "expl": "The dye penetrates surface (surface-breaking) faults and is then made visible against the developer.", "cite": "AC 43.13-1B Ch.5, par.5-60b, p. 5-29", "topic": "penetrant"}, {"q": "The two types of dye penetrant used on aircraft are:", "options": ["Dry and wet", "Visible (red/color-contrast) and fluorescent (UV)", "Residual and continuous", "Longitudinal and circular"], "correct": 1, "short": "Visible (red) and fluorescent (UV)", "expl": "Aircraft use two penetrant types: visible (red, color-contrast) read in white light, and fluorescent, read under UV/black light.", "cite": "AC 43.13-1B Ch.5, par.5-60, p. 5-29; Table 5-3, p. 5-30", "topic": "penetrant"}, {"q": "The VISIBLE dye penetrant type is seen how?", "options": ["Glowing under black light only", "As black shadows on X-ray film", "As red indications against a white developer in normal white light", "Only with a microscope"], "correct": 2, "short": "Red against white developer in white light", "expl": "Visible (color-contrast) penetrant shows red indications against the white developer, viewed in ordinary visible white light.", "cite": "AC 43.13-1B Ch.5, par.5-60, p. 5-29; Table 5-3", "topic": "penetrant"}, {"q": "The FLUORESCENT dye penetrant type requires what to read it?", "options": ["Bright sunlight", "A red safelight", "No light at all", "Ultraviolet (black) light"], "correct": 3, "short": "Ultraviolet (black) light", "expl": "Fluorescent penetrant glows and must be read under ultraviolet (black) light.", "cite": "AC 43.13-1B Ch.5, par.5-60, p. 5-29; Table 5-3", "topic": "penetrant"}, {"q": "The physical action that draws penetrant INTO a surface-breaking flaw is:", "options": ["Capillary attraction (capillary action)", "Magnetic attraction", "Centrifugal force", "Electromagnetic induction"], "correct": 0, "short": "Capillary attraction", "expl": "Capillary attraction (capillary action) draws the liquid penetrant into any fault that reaches the surface.", "cite": "AC 43.13-1B Ch.5, par.5-62/5-63h, p. 5-33", "topic": "penetrant"}, {"q": "\"Dwell time\" in penetrant inspection is the time required for the:", "options": ["Developer to fully dry", "Penetrant to soak into and fill the discontinuity", "Black light to warm up", "Part to demagnetize"], "correct": 1, "short": "Penetrant to soak into the discontinuity", "expl": "Dwell (penetration) time lets the penetrant enter and fill the flaw before excess is washed off.", "cite": "AC 43.13-1B Ch.5, par.5-62, p. 5-31", "topic": "penetrant"}, {"q": "After sufficient dwell time, the next steps are to:", "options": ["Magnetize the part, then apply iron powder", "X-ray the part, then degauss it", "Wash off the excess penetrant, then apply developer", "Heat the part, then quench it"], "correct": 2, "short": "Wash off excess penetrant, then apply developer", "expl": "After dwell, the excess penetrant is washed off and developer is applied to draw the trapped penetrant back out.", "cite": "AC 43.13-1B Ch.5, par.5-62, p. 5-31", "topic": "penetrant"}, {"q": "Tight or narrow cracks generally require what change to dwell time?", "options": ["Shorter dwell", "No dwell at all", "Dwell is irrelevant", "Longer dwell"], "correct": 3, "short": "Longer dwell", "expl": "Small/tight cracks need a longer dwell so penetrant has time to enter; but excess heat evaporates the penetrant.", "cite": "AC 43.13-1B Ch.5, par.5-62, p. 5-31", "topic": "penetrant"}, {"q": "Heating the part to speed penetration is risky because:", "options": ["It evaporates the penetrant", "It magnetizes the part", "It makes the developer red", "It shortens the black-light warm-up"], "correct": 0, "short": "It evaporates the penetrant", "expl": "Heat decreases needed dwell time but too much heat evaporates the penetrant before it can enter the flaw.", "cite": "AC 43.13-1B Ch.5, par.5-62, p. 5-31", "topic": "penetrant"}, {"q": "The developer reveals flaws by what action?", "options": ["Forward capillary action drawing penetrant deeper", "Reverse capillary action (\"bleed-out\") drawing penetrant back out of the discontinuity", "Magnetizing the trapped penetrant", "Dissolving the surrounding base metal"], "correct": 1, "short": "Reverse capillary action / bleed-out", "expl": "The developer is a blotter producing reverse capillary action (bleed-out), drawing trapped penetrant back out to form visible indications.", "cite": "AC 43.13-1B Ch.5, par.5-62, p. 5-34", "topic": "penetrant"}, {"q": "If a part is NOT thoroughly washed before the developer, the indication becomes:", "options": ["Sharper and easier to read", "Magnetic", "Fuzzy / blurred from excess background penetrant", "Permanently invisible"], "correct": 2, "short": "Fuzzy / blurred", "expl": "Inadequate washing leaves background penetrant that makes the indication fuzzy/blurred instead of sharp.", "cite": "AC 43.13-1B Ch.5, par.5-60b, p. 5-29", "topic": "penetrant"}, {"q": "With RED (visible) dye penetrant, fault types appear as:", "options": ["Glowing green lines under UV", "Black bands on film", "Blue dots only", "Red lines against the white developer in visible white light"], "correct": 3, "short": "Red lines against white developer (white light)", "expl": "Visible penetrant produces red lines against the white developer, read in ordinary white light.", "cite": "AC 43.13-1B Ch.5, par.5-62j, p. 5-34", "topic": "penetrant"}, {"q": "With FLUORESCENT penetrant, fault types appear as:", "options": ["Glowing (greenish-yellow) fluorescent lines under black/UV light", "Red lines in white light", "Black shadows on X-ray film", "No visible indication"], "correct": 0, "short": "Glowing fluorescent lines under UV", "expl": "Fluorescent penetrant produces glowing greenish-yellow lines visible under black (UV) light.", "cite": "AC 43.13-1B Ch.5, par.5-62j, p. 5-34", "topic": "penetrant"}, {"q": "Before penetrant inspection you must NOT clean the part with which methods?", "options": ["Solvent wiping or detergent washing", "Abrasive blasting, scraping, or heavy wire brushing", "Rinsing and drying", "Vapor degreasing"], "correct": 1, "short": "Abrasive blasting, scraping, wire brushing", "expl": "Do NOT use mechanical methods (abrasive blasting, scraping, wire brushing) - they smear/peen metal over the flaw and hide it.", "cite": "AC 43.13-1B Ch.5, Table 5-5, p. 5-32; par.5-63g", "topic": "penetrant"}, {"q": "Mechanical cleaning is avoided before penetrant inspection because it:", "options": ["Demagnetizes the part", "Is simply too slow", "Smears/peens metal over the flaw, sealing or reducing the opening so penetrant cannot enter", "Only works on ferrous metal"], "correct": 2, "short": "Smears metal over the flaw, sealing the opening", "expl": "Mechanical methods can peen/smear metal across the defect, sealing or narrowing the opening so penetrant cannot enter; etching reopens such smeared openings.", "cite": "AC 43.13-1B Ch.5, par.5-63g, p. 5-33", "topic": "penetrant"}, {"q": "Acceptable methods to PREPARE a part for penetrant (remove grease/dirt/oil) include:", "options": ["Abrasive blasting and scraping", "Heavy wire brushing", "Heating until the oil burns off", "A petroleum-based solvent or detergent, then rinse and dry"], "correct": 3, "short": "Petroleum solvent/detergent, then rinse and dry", "expl": "Preparation removes grease/dirt/oil with a petroleum-based solvent or detergent, then the part is rinsed and dried - no mechanical methods.", "cite": "AC 43.13-1B Ch.5, par.5-62, p. 5-31", "topic": "penetrant"}, {"q": "Why must petroleum-based cleaning products NOT be used on oxygen equipment?", "options": ["Petroleum and oxygen can cause an explosion", "They are too expensive", "They evaporate too slowly", "They demagnetize the regulator"], "correct": 0, "short": "Petroleum + oxygen can explode", "expl": "WARNING: petroleum products must not contact oxygen equipment because petroleum and oxygen can cause an explosion.", "cite": "AC 43.13-1B Ch.5, par.5-62 (caution)", "topic": "penetrant"}, {"q": "Penetrant is APPLIED to the part by:", "options": ["X-ray exposure", "Immersing, swabbing, or spraying so the surface is fully covered", "Magnetizing the part", "Dusting on dry powder"], "correct": 1, "short": "Immerse, swab, or spray (fully covered)", "expl": "Penetrant is applied by immersing, swabbing, or spraying, making sure the surface is fully covered.", "cite": "AC 43.13-1B Ch.5, par.5-62, p. 5-31", "topic": "penetrant"}, {"q": "When spraying to wash off water-soluble penetrant, the notes specify roughly:", "options": ["100-120 psi straight on", "5-10 psi at 90 degrees", "30-40 psi at about a 45-degree angle", "200 psi at 0 degrees"], "correct": 2, "short": "30-40 psi at ~45 deg", "expl": "Water-soluble penetrant is flushed off using about 30-40 psi at roughly a 45-degree spray angle.", "cite": "[class notes]", "topic": "penetrant"}, {"q": "Which psi range does the notes give for the penetrant water flush?", "options": ["10-20 psi", "60-80 psi", "90-110 psi", "30-40 psi"], "correct": 3, "short": "30-40 psi", "expl": "The notes specify a 30-40 psi water flush (at about 45 degrees).", "cite": "[class notes]", "topic": "penetrant"}, {"q": "Which spray ANGLE does the notes give for the penetrant water flush?", "options": ["45 degrees", "0 degrees (straight on)", "15 degrees", "90 degrees (perpendicular)"], "correct": 0, "short": "45 degrees", "expl": "The notes specify about a 45-degree spray angle for the 30-40 psi penetrant flush.", "cite": "[class notes]", "topic": "penetrant"}, {"q": "With POST-EMULSIFYING penetrant, what extra step is required before washing?", "options": ["Magnetize the part", "Apply an emulsifier so the penetrant can be water-washed", "X-ray the part", "Heat the part to 100 deg F"], "correct": 1, "short": "Apply an emulsifier before washing", "expl": "Post-emulsifying penetrant is not directly water-washable; an emulsifier is applied first so the excess can then be washed off.", "cite": "AC 43.13-1B Ch.5, par.5-62, p. 5-31", "topic": "penetrant"}, {"q": "To remove SOLVENT-removable penetrant, you should:", "options": ["Flush with 100 psi water", "Spray solvent directly into the flaw", "Wipe with an absorbent towel, then wipe again with a solvent-dampened towel", "Submerge the part in solvent for an hour"], "correct": 2, "short": "Wipe with absorbent towel, then solvent towel", "expl": "Solvent-removable excess is wiped off with an absorbent towel first, then a towel dampened with solvent - never flooding solvent over the surface.", "cite": "AC 43.13-1B Ch.5, par.5-62, p. 5-31", "topic": "penetrant"}, {"q": "The three kinds of developer used in penetrant inspection are:", "options": ["DC, AC, half-wave", "Red, white, blue", "Visible, fluorescent, residual", "Dry, wet, and non-aqueous"], "correct": 3, "short": "Dry, wet, non-aqueous", "expl": "Developers are dry, wet, and non-aqueous.", "cite": "AC 43.13-1B Ch.5, par.5-62, p. 5-30 (Table 5-3)", "topic": "penetrant"}, {"q": "A DRY developer is applied how, and excess removed how?", "options": ["As loose powder (bin dip for small parts, brush/powder gun for large parts); excess removed with low-pressure air", "Mixed with water and air-dried", "Sprayed from a solvent can only", "Painted on with a brush dipped in oil"], "correct": 0, "short": "Loose powder; excess blown off with low-pressure air", "expl": "Dry developer is a loose powder - small parts dipped in a bin or powder-gunned; large parts brushed or powder-gunned; excess removed with low-pressure air.", "cite": "AC 43.13-1B Ch.5, par.5-62, p. 5-30", "topic": "penetrant"}, {"q": "A WET developer is:", "options": ["A chalk powder suspended in solvent in a spray can", "A white powder mixed with water, then air-dried on the part", "A loose dry powder blown on", "A magnetic iron bath"], "correct": 1, "short": "White powder mixed with water, air-dried", "expl": "Wet developer is a white powder mixed with water; it is applied and then air-dried on the part.", "cite": "AC 43.13-1B Ch.5, par.5-62, p. 5-30", "topic": "penetrant"}, {"q": "A NON-AQUEOUS developer is:", "options": ["A dry powder dipped from a bin", "A powder mixed only with water", "A chalk powder suspended in a solvent, applied from a spray can", "A magnetic dry media"], "correct": 2, "short": "Chalk powder in solvent, from a spray can", "expl": "Non-aqueous developer is a chalk powder suspended in a solvent and applied from a spray can.", "cite": "AC 43.13-1B Ch.5, par.5-62, p. 5-30", "topic": "penetrant"}, {"q": "After interpreting the penetrant indications, the developer is removed by:", "options": ["Leaving it on permanently", "X-ray exposure", "Magnetizing the part", "Water rinse / detergent / mechanical means, then drying the part"], "correct": 3, "short": "Water rinse/detergent/mechanical, then dry", "expl": "After inspection the developer is removed by water rinse, detergent, or mechanical means, and the part is dried.", "cite": "AC 43.13-1B Ch.5, par.5-62, p. 5-31", "topic": "penetrant"}, {"q": "If NO defect is found during penetrant inspection, the part is:", "options": ["Returned to service / reinstalled", "Scrapped", "Sent to X-ray", "Demagnetized only"], "correct": 0, "short": "Returned to service / reinstalled", "expl": "A part with no defect is returned to service or reinstalled (with proper documentation/part tag).", "cite": "[class notes]", "topic": "penetrant"}, {"q": "When a DEFECT is found, the part is handled by:", "options": ["Reinstalling it immediately", "Attaching a part tag (different tags identify good vs. bad parts)", "Painting over the flaw", "Magnetizing it for storage"], "correct": 1, "short": "Attaching a part tag (good vs. bad)", "expl": "A defective part gets a part tag; different tags distinguish good (serviceable) from bad (rejected) parts.", "cite": "[class notes]", "topic": "penetrant"}, {"q": "The Group 1 VISIBLE penetrant chemicals named in the notes are:", "options": ["Zyglo ZL-27A penetrant and ZP-9F developer", "Magnaflux 7HF and 14A", "Spotcheck SKC-S cleaner, SKL-SP1 penetrant, SKD-S2 developer", "MEK and acetone"], "correct": 2, "short": "SKC-S cleaner, SKL-SP1 penetrant, SKD-S2 developer", "expl": "Group 1 (visible) set: Spotcheck SKC-S cleaner, SKL-SP1 penetrant, and SKD-S2 developer.", "cite": "[class notes]", "topic": "penetrant"}, {"q": "The Group 2 FLUORESCENT penetrant chemicals named in the notes are:", "options": ["SKL-SP1 penetrant and SKD-S2 developer", "MEK cleaner and chalk powder", "DC coil and AC degausser", "Spotcheck SKC-S cleaner, Zyglo ZL-27A penetrant, Zyglo ZP-9F developer"], "correct": 3, "short": "SKC-S cleaner, Zyglo ZL-27A, Zyglo ZP-9F", "expl": "Group 2 (fluorescent) set: Spotcheck SKC-S cleaner, Zyglo ZL-27A penetrant, and Zyglo ZP-9F developer.", "cite": "[class notes]", "topic": "penetrant"}, {"q": "If chemicals from DIFFERENT penetrant groups (Group 1 and Group 2) are mixed, the result is:", "options": ["False / unreliable results", "Faster dwell time", "More sensitive testing", "Stronger fluorescence"], "correct": 0, "short": "False / unreliable results", "expl": "Mixing chemicals across groups gives false, unreliable results; keep the cleaner/penetrant/developer system matched.", "cite": "[class notes]", "topic": "penetrant"}, {"q": "Fluorescent penetrant inspection requires what environment?", "options": ["Bright daylight", "A UV (black) light and a darkened room", "A red safelight", "No special lighting"], "correct": 1, "short": "UV (black) light and a dark room", "expl": "Fluorescent penetrant must be read under a UV/black light in a darkened area so the glow is visible.", "cite": "AC 43.13-1B Ch.5, par.5-62j, p. 5-34", "topic": "penetrant"}, {"q": "The notes give the black-light UV lamp rating as approximately:", "options": ["5-12 V from a battery", "440 V DC", "28-100 V UV lamp operating on 115 V AC", "12-24 V AC only"], "correct": 2, "short": "28-100 V UV lamp on 115 V AC", "expl": "The notes give a UV lamp of about 28-100 V operating from 115 V AC.", "cite": "[class notes]", "topic": "penetrant"}, {"q": "How long must the black light warm up before use, per the notes?", "options": ["No warm-up needed", "30-40 minutes", "1-2 hours", "5-10 minutes"], "correct": 3, "short": "5-10 minutes", "expl": "The notes specify a black-light warm-up of about 5-10 minutes.", "cite": "[class notes]", "topic": "penetrant"}, {"q": "A black light must have which condition to work properly?", "options": ["Its filter/port unblocked and unobstructed", "A blocked filter port for safety", "No unblocked filter port at all", "A red lens installed"], "correct": 0, "short": "Filter port unblocked / unobstructed", "expl": "The black-light filter/port must not be blocked; an obstructed port reduces output and gives poor indications.", "cite": "[class notes]", "topic": "penetrant"}, {"q": "If a black light is turned OFF, what must happen before relighting it?", "options": ["Nothing - relight immediately", "It must cool down before relighting", "It must be recharged for an hour", "It must be demagnetized"], "correct": 1, "short": "It must cool before relighting", "expl": "A black light that is turned off must be allowed to cool before it can be relit.", "cite": "[class notes]", "topic": "penetrant"}, {"q": "In the fluorescent (Zyglo) sequence, the penetrant used and its dwell are:", "options": ["SKL-SP1 penetrant, 30-minute dwell", "Magnaflux bath, 5-minute dwell", "Zyglo ZL-27A penetrant, about a 10-minute dwell", "No penetrant, dry powder only"], "correct": 2, "short": "Zyglo ZL-27A, ~10-minute dwell", "expl": "The fluorescent set uses Zyglo ZL-27A penetrant with about a 10-minute dwell.", "cite": "[class notes]", "topic": "penetrant"}, {"q": "In the fluorescent process, excess penetrant should be removed with:", "options": ["Automotive shop rags", "A wire brush", "High-pressure abrasive", "A clean cloth (NOT automotive rags)"], "correct": 3, "short": "A clean cloth, NOT automotive rags", "expl": "Excess fluorescent penetrant is wiped with a clean cloth - not automotive rags, which can leave contaminants/fluorescing residue.", "cite": "[class notes]", "topic": "penetrant"}, {"q": "Bright greenish-yellow fluorescent INDICATIONS most directly reveal:", "options": ["Cracks, laps, forging bursts, and cold shuts", "Paint thickness", "Grain size only", "Magnetic poles"], "correct": 0, "short": "Cracks, laps, forging bursts, cold shuts", "expl": "Bright greenish-yellow lines indicate cracks, laps, forging bursts, and cold shuts.", "cite": "[class notes]", "topic": "penetrant"}, {"q": "In fluorescent penetrant, porosity, shrinkage, lack of bond, and leaks appear as:", "options": ["Sharp straight red lines", "Dots / bright (rounded) areas rather than lines", "Black bands on film", "No indication"], "correct": 1, "short": "Dots / bright rounded areas", "expl": "Porosity, shrinkage, lack of bond, and leaks show up as dots or bright areas rather than line-type indications.", "cite": "[class notes]", "topic": "penetrant"}, {"q": "Compared with the red (visible) process, the fluorescent process adds which requirement?", "options": ["A magnet is required", "X-ray film is required", "A black (UV) light is required", "No difference at all"], "correct": 2, "short": "A black (UV) light is required", "expl": "The fluorescent steps are essentially the same as the red process except that a black (UV) light is required to read the indications.", "cite": "[class notes]", "topic": "penetrant"}, {"q": "NDT electronic inspection methods are used to locate faults on the:", "options": ["Painted exterior only", "Tire surface", "Cockpit instruments", "Interior of a part"], "correct": 3, "short": "Interior of a part", "expl": "Electronic inspection (eddy current, ultrasonic, radiographic) locates faults on the interior of a part.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-17", "topic": "general NDT"}, {"q": "The three NDT electronic-inspection methods are:", "options": ["Eddy current, ultrasonic, radiographic", "Visual, penetrant, magnetic", "Dry, wet, non-aqueous", "Longitudinal, circular, residual"], "correct": 0, "short": "Eddy current, ultrasonic, radiographic", "expl": "The electronic-inspection methods are eddy current, ultrasonic, and radiographic.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-17", "topic": "general NDT"}, {"q": "By induction theory, moving a magnet inside a coil will:", "options": ["Demagnetize the coil", "Induce electricity (current) in the coil", "Heat the coil red", "Do nothing"], "correct": 1, "short": "Induce electricity in the coil", "expl": "A magnet moved inside a coil induces electricity (a current) in that coil - the basis of induction.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-17", "topic": "eddy current"}, {"q": "Passing AC through a coil produces:", "options": ["A steady (non-moving) field", "X-rays", "A moving (changing) magnetic field", "Capillary action"], "correct": 2, "short": "A moving (changing) magnetic field", "expl": "AC through a coil creates a moving/changing magnetic field.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-17", "topic": "eddy current"}, {"q": "When that changing magnetic field crosses another coil/conductor, it causes:", "options": ["The conductor to demagnetize", "The field to disappear", "A capillary draw", "Electrical current to flow in that conductor"], "correct": 3, "short": "Current to flow in the other conductor", "expl": "A field crossing another coil/conductor induces an electrical current to flow in it.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-17", "topic": "eddy current"}, {"q": "Eddy currents are best described as:", "options": ["Loops of induced current flowing in closed loops, perpendicular to the magnetic field", "X-rays absorbed by metal", "Sound waves bouncing off flaws", "Iron particles gathered at a flaw"], "correct": 0, "short": "Closed loops of induced current, perpendicular to the field", "expl": "Eddy currents are loops of induced current flowing in closed loops, oriented perpendicular to the magnetic field that produced them.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-17", "topic": "eddy current"}, {"q": "Eddy current testing is based on:", "options": ["Capillary action", "Electromagnetic induction", "Sound-wave reflection", "X-ray absorption"], "correct": 1, "short": "Electromagnetic induction", "expl": "Eddy current testing is based on electromagnetic induction - an AC probe induces eddy currents whose changes reveal flaws.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-17", "topic": "eddy current"}, {"q": "Eddy current inspection can examine:", "options": ["Only the outer paint", "Only the inside of castings via film", "Both surface AND subsurface areas, very quickly", "Only plastics"], "correct": 2, "short": "Surface AND subsurface, very quickly", "expl": "Eddy current can examine surface and subsurface areas very quickly.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-17", "topic": "eddy current"}, {"q": "An advantage of eddy current is that it can inspect a part:", "options": ["Only after the part is X-rayed", "Only on plastics", "Only after demagnetizing", "Without removing surface coatings such as primer, paint, or anodize"], "correct": 3, "short": "Without removing surface coatings", "expl": "Eddy current can often inspect through surface coatings (primer/paint/anodized) without removing them.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-17", "topic": "eddy current"}, {"q": "Eddy current is LIMITED to materials that:", "options": ["Conduct electricity (it cannot be used on plastics)", "Float in water", "Are non-conductive", "Are magnetic only"], "correct": 0, "short": "Conduct electricity (not plastics)", "expl": "Eddy current works only on electrically conductive materials; it cannot inspect plastics/non-conductors.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-18", "topic": "eddy current"}, {"q": "Which list correctly gives the properties that affect eddy current response?", "options": ["Color, weight, smell, and price", "Conductivity, permeability, mass, and presence of voids/faults", "Capillary action, dwell, developer, and wash", "DC, AC, residual, and continuous"], "correct": 1, "short": "Conductivity, permeability, mass, voids/faults", "expl": "Eddy response is affected by conductivity, permeability, mass, and the presence of voids/faults.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-18", "topic": "eddy current"}, {"q": "In an eddy current probe, the AC produces what at the probe tip?", "options": ["A steady DC field", "A beam of X-rays", "An oscillating magnetic field", "A sound pulse"], "correct": 2, "short": "An oscillating magnetic field", "expl": "The probe AC generates an oscillating magnetic field; mutual inductance with the part lets flaws alter the impedance read by the instrument.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-17", "topic": "eddy current"}, {"q": "Defects or thickness changes are sensed in eddy current because they alter the:", "options": ["Color of the part", "Smell of the metal", "Weight of the probe", "Impedance seen by the probe coil"], "correct": 3, "short": "Impedance seen by the probe", "expl": "Thickness changes and defects alter the impedance of the probe coil, which the instrument reads as a change.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-18", "topic": "eddy current"}, {"q": "Conductivity (as used in eddy current) is the ability of a material to:", "options": ["Conduct electrical current", "Accept magnetic flux", "Absorb X-rays", "Hold a liquid penetrant"], "correct": 0, "short": "Conduct electrical current", "expl": "Conductivity is the ability to conduct current; it helps differentiate alloy, grain, heat-treat, and tensile condition, set against a null reference.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-18", "topic": "eddy current"}, {"q": "Conductivity differences let eddy current differentiate among:", "options": ["Paint colors", "Alloy, grain, heat-treat condition, and tensile strength", "Dwell times", "Developer types"], "correct": 1, "short": "Alloy, grain, heat-treat, tensile", "expl": "Because conductivity changes with them, eddy current can differentiate alloy, grain, heat-treat condition, and tensile strength against a null reference.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-18", "topic": "eddy current"}, {"q": "Permeability, as it affects eddy current, is the ability of a material to:", "options": ["Conduct electricity", "Resist corrosion", "Accept magnetic lines (flux)", "Hold penetrant"], "correct": 2, "short": "Accept magnetic lines (flux)", "expl": "Permeability is the ability of a material to accept magnetic lines of flux.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-18", "topic": "eddy current"}, {"q": "Mass, as it affects eddy current, refers to:", "options": ["The weight of the probe handle", "The dwell time", "The black-light voltage", "The amount of material the probe moves over (more mass changes the reading; corrosion/thickness loss shows up)"], "correct": 3, "short": "Amount of material the probe passes over", "expl": "More mass the probe moves over changes the reading, so corrosion and thickness changes (mass loss) are detectable.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-18", "topic": "eddy current"}, {"q": "The ABSOLUTE eddy current method works by:", "options": ["Sending current to induce a given amount, zeroed by a bridge at a reference", "Comparing two parts at once", "Spraying developer", "Using sound waves"], "correct": 0, "short": "Induced amount zeroed by a bridge at a reference", "expl": "The absolute method induces a set amount of current and is zeroed by a bridge circuit at a reference standard.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-18", "topic": "eddy current"}, {"q": "The COMPARISON eddy current method works by:", "options": ["Using a single coil with no reference", "Using a double-coil probe that compares the part to a known reference", "X-raying two parts", "Magnetizing the part"], "correct": 1, "short": "Double-coil probe compares to a reference", "expl": "The comparison method uses a double-coil probe that compares the test part against a known reference standard.", "cite": "AC 43.13-1B Ch.5, par.5-30, p. 5-18", "topic": "eddy current"}, {"q": "Ultrasonic inspection introduces what into the material to find flaws?", "options": ["X-rays", "Liquid dye", "High-frequency sound waves", "Magnetic flux"], "correct": 2, "short": "High-frequency sound waves", "expl": "Ultrasonic testers use high-frequency sound waves; reflections from surfaces and flaws reveal discontinuities.", "cite": "AC 43.13-1B Ch.5, par.5-43, p. 5-19", "topic": "ultrasonic"}, {"q": "Per the notes, ultrasonic is the ONLY NDT method usable on which group?", "options": ["Only ferrous steel", "Only aluminum", "Only magnetic alloys", "Plastics, ceramics, composites, and most metals"], "correct": 3, "short": "Plastics, ceramics, composites, most metals", "expl": "The notes state ultrasonic is the only NDT method usable on plastics, ceramics, composites, and most metals.", "cite": "[class notes]", "topic": "ultrasonic"}, {"q": "Ultrasonic is valued for detecting:", "options": ["Minute cracks and voids too small for X-ray", "Magnetic poles", "Paint thickness only", "Only large surface dents"], "correct": 0, "short": "Minute cracks/voids too small for X-ray", "expl": "Ultrasonic detects minute cracks and voids that are too small for radiographic (X-ray) detection.", "cite": "AC 43.13-1B Ch.5, par.5-43, p. 5-19", "topic": "ultrasonic"}, {"q": "Of the two basic ultrasonic methods, which is done in shops and which can be done anywhere?", "options": ["Both only in shops", "Immersion = done in shops; Contact = can be done anywhere", "Immersion = anywhere; Contact = shops", "Both only in the field"], "correct": 1, "short": "Immersion = shops; Contact = anywhere", "expl": "Immersion testing (part submerged in a tank) is a shop method; contact testing is portable and can be done anywhere.", "cite": "AC 43.13-1B Ch.5, par.5-43, p. 5-19", "topic": "ultrasonic"}, {"q": "The three ultrasonic CONTACT systems are:", "options": ["Immersion, dip, spray", "Dry, wet, non-aqueous", "Pulse echo, through transmission, resonance", "Longitudinal, circular, residual"], "correct": 2, "short": "Pulse echo, through transmission, resonance", "expl": "The three contact systems are pulse echo, through transmission, and resonance.", "cite": "AC 43.13-1B Ch.5, par.5-43, p. 5-19", "topic": "ultrasonic"}, {"q": "The PULSE-ECHO ultrasonic system uses:", "options": ["Two transducers on opposite sides", "A continuously varied frequency", "A liquid bath only", "One transducer that both generates and receives the sound; good for small defects"], "correct": 3, "short": "One transducer (sends + receives), small defects", "expl": "Pulse echo uses a single transducer to both generate and receive the sound pulse; it is sensitive to small defects.", "cite": "AC 43.13-1B Ch.5, par.5-43, p. 5-19", "topic": "ultrasonic"}, {"q": "The THROUGH-TRANSMISSION ultrasonic system uses:", "options": ["Two transducers on opposite sides; less sensitive to small defects", "One transducer only", "A micrometer dial", "A magnet and iron powder"], "correct": 0, "short": "Two transducers, opposite sides (less sensitive to small defects)", "expl": "Through transmission uses two transducers on opposite sides of the part; it is less sensitive to small defects than pulse echo.", "cite": "AC 43.13-1B Ch.5, par.5-43, p. 5-19", "topic": "ultrasonic"}, {"q": "The RESONANCE ultrasonic system is characterized by:", "options": ["A single fixed frequency", "Continuously varying the frequency, used for thickness measurement (like a micrometer)", "Two transducers on opposite faces", "Iron particles in a bath"], "correct": 1, "short": "Frequency varied continuously; thickness measurement", "expl": "Resonance continuously varies the frequency and is used for thickness measurement, acting much like a micrometer.", "cite": "AC 43.13-1B Ch.5, par.5-43, p. 5-19", "topic": "ultrasonic"}, {"q": "Radiographic (X-ray) inspection requires:", "options": ["No precautions at all", "Only safety glasses", "Special equipment/certifications, with the radiation area roped off and warnings posted", "Only rubber gloves"], "correct": 2, "short": "Special equipment/certs; area roped off + warnings", "expl": "Radiography needs special equipment and certifications; the radiation area is roped off and posted with warnings.", "cite": "AC 43.13-1B Ch.5, par.5-37", "topic": "radiographic"}, {"q": "Magnetic particle inspection (MPI) detects flaws that are:", "options": ["Only deep internal voids", "Only in plastics", "Only paint defects", "Surface and slightly subsurface, in ferromagnetic materials"], "correct": 3, "short": "Surface + slightly subsurface (ferromagnetic)", "expl": "MPI reveals surface and slightly subsurface discontinuities in ferromagnetic (iron/nickel/cobalt and some alloys) materials.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "In MPI, what forms at the edges of a crack to reveal it?", "options": ["Magnetic poles, where iron particles gather to form an indication", "Capillary attraction", "Eddy currents", "X-ray shadows"], "correct": 0, "short": "Magnetic poles; iron particles gather there", "expl": "A magnetic field is introduced; magnetic poles form at the edges of cracks, and iron particles gather there to form a visible indication.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "MPI indications are made visible by which lighting?", "options": ["Only red safelight", "Ultraviolet light (or visible light)", "X-ray film", "Sunlight only"], "correct": 1, "short": "Ultraviolet (or visible) light", "expl": "Indications are made visible under ultraviolet light (with fluorescent media) or under visible light (with color media).", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "In NDT terminology, a flaw is called a:", "options": ["Developer", "Couplant", "Discontinuity", "Yoke"], "correct": 2, "short": "Discontinuity", "expl": "A flaw is a discontinuity - a disruption in the part normal physical/structural continuity.", "cite": "AC 43.13-1B Ch.5, par.5-1", "topic": "general NDT"}, {"q": "MPI is capable of detecting which discontinuities?", "options": ["Paint runs and scratches only", "Only corrosion pits", "Only loose rivets", "Cracks, splits, seams, voids, cold shuts, and inclusions"], "correct": 3, "short": "Cracks, splits, seams, voids, cold shuts, inclusions", "expl": "MPI detects cracks, splits, seams, voids, cold shuts, and inclusions in ferromagnetic parts.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "Typical aircraft parts inspected by MPI include:", "options": ["Landing gear, bolts, and high-stress steel supports", "Plastic windows and composite panels", "Aluminum skins and fiberglass radomes", "Rubber tires and seals"], "correct": 0, "short": "Landing gear, bolts, high-stress steel supports", "expl": "MPI is used on landing gear, bolts, and high-stress steel structural supports.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "MPI can ONLY be used on:", "options": ["Any conductive metal", "Ferrous (ferromagnetic) materials", "Aluminum and plastics", "Non-metallic composites"], "correct": 1, "short": "Ferrous (ferromagnetic) materials", "expl": "MPI works only on ferrous/ferromagnetic materials; non-magnetic materials cannot be inspected this way.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "For a flaw to be detected by MPI, the magnetic flux lines must run:", "options": ["Parallel to the flaw", "At exactly 45 degrees", "Perpendicular (across) the flaw", "Through the operator"], "correct": 2, "short": "Perpendicular (across) the flaw", "expl": "Flux must be perpendicular to the flaw; faults running parallel to the flux are not detected.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "Faults that run PARALLEL to the magnetic flux are:", "options": ["Detected most strongly", "Detected only with UV light", "Detected only by ultrasonic", "Not detected"], "correct": 3, "short": "Not detected", "expl": "Because flux must be perpendicular to a flaw, faults running parallel to the flux are not detected - hence two magnetizing directions.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "Because flaws can lie in any direction, the part is magnetized in:", "options": ["Two directions - longitudinal and circular", "One direction only", "No specific direction", "Three random directions"], "correct": 0, "short": "Two directions - longitudinal and circular", "expl": "To catch flaws in any orientation, the part is magnetized both longitudinally and circularly.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "Good MPI media (the iron particles) must be:", "options": ["Low permeability and high retentivity", "Ferromagnetic, finely divided iron oxides with high permeability and low retentivity", "Non-magnetic plastic powder", "Coarse steel shot"], "correct": 1, "short": "High permeability, low retentivity iron oxides", "expl": "The media must be ferromagnetic, finely divided iron oxides with high permeability and low retentivity (so they move freely and do not stay magnetized).", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "The DRY MPI method is best suited to:", "options": ["Submerged shop tanks", "Plastics only", "Field conditions (portable use)", "Oxygen systems"], "correct": 2, "short": "Field conditions (portable)", "expl": "Dry media is used under field conditions; particles may be gray/black/red or fluorescent.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "Dry MPI media is applied using:", "options": ["A submerged bath", "A spray can of solvent", "An immersion tank", "A hand shaker, spray bulb, or powder gun"], "correct": 3, "short": "Hand shaker, spray bulb, or powder gun", "expl": "Dry media is applied with a hand shaker, spray bulb, or powder gun in field conditions.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "The WET MPI method uses particles that are:", "options": ["Suspended in a liquid bath (stationary equipment) with continuous agitation", "Blown on dry from a gun", "Mixed into paint", "Replaced by penetrant dye"], "correct": 0, "short": "Suspended in a liquid bath, continuous agitation", "expl": "Wet method flows particles suspended in a bath on stationary equipment, with continuous agitation to keep them suspended.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "RESIDUAL magnetism MPI means the magnetizing force is:", "options": ["Applied continuously during inspection", "Removed BEFORE applying particles/inspecting (relies on retained field)", "Never applied at all", "Replaced by ultrasonic"], "correct": 1, "short": "Removed BEFORE inspecting (retained field)", "expl": "Residual method removes the magnetizing force before testing; it relies on the field retained by hardened/heat-treated steel parts.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "The residual MPI method is typically used on:", "options": ["Soft aluminum parts", "Plastics", "Heat-treated (hardened) steel parts that retain a field", "Oxygen lines"], "correct": 2, "short": "Heat-treated (hardened) steel parts", "expl": "Residual magnetism is used on heat-treated/hardened steel parts because they retain enough magnetism after the force is removed.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "CONTINUOUS magnetism MPI keeps the magnetizing force:", "options": ["Removed before inspection", "Used only on aluminum", "Off the whole time", "Applied continuously during testing (greater subsurface sensitivity)"], "correct": 3, "short": "Applied continuously (better subsurface sensitivity)", "expl": "Continuous method keeps the magnetizing force applied during testing, giving greater sensitivity to subsurface flaws.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "In a Magnaflux machine, which current MAGNETIZES vs. DEMAGNETIZES the part?", "options": ["DC magnetizes; AC demagnetizes", "AC magnetizes; DC demagnetizes", "Both magnetize equally", "Neither affects magnetism"], "correct": 0, "short": "DC magnetizes; AC demagnetizes", "expl": "Per the notes, in the Magnaflux machine DC magnetizes the part and AC demagnetizes (degausses) it.", "cite": "[class notes]", "topic": "magnetic particle"}, {"q": "The two methods of magnetizing a part in MPI are:", "options": ["Spraying and dipping", "Passing current through a coil the part sits in (DC coil), or passing current through the part via copper clamp electrodes/pads", "X-ray and ultrasonic", "Heating and quenching"], "correct": 1, "short": "DC coil pass-through, or current through the part via clamps", "expl": "A part is magnetized by a DC coil it passes through, or by passing current through the part itself using copper clamp electrodes/pads.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "The magnetic field indicator (pie gauge) is used to:", "options": ["Measure dwell time", "Read the black-light voltage", "Check the amount of residual magnetic flux in the part", "Spray developer"], "correct": 2, "short": "Check residual magnetic flux (pie gauge)", "expl": "The magnetic field indicator (pie gauge) checks the amount of residual magnetic flux remaining in the part.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "After MPI, parts must be returned to a usable state by:", "options": ["Leaving them magnetized", "Painting them", "Heating them red", "AC demagnetizing (degausser)"], "correct": 3, "short": "AC demagnetizing / degausser", "expl": "After inspection, parts are AC-demagnetized (degaussed) so residual magnetism does not attract debris or disturb instruments.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "LONGITUDINAL magnetization is produced by:", "options": ["Placing the part inside a coil and passing current through the coil", "Passing current through the part itself", "Using a black light", "Spraying developer"], "correct": 0, "short": "Part in a coil; current through the coil", "expl": "Longitudinal magnetization places the part inside a coil; current through the coil runs the flux lengthwise through the part.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "CIRCULAR magnetization is produced by:", "options": ["Placing the part in a coil", "Passing current through the part (between heads, or via a central conductive rod; flat objects use test probes)", "Spraying developer", "Heating the part"], "correct": 1, "short": "Current through the part (heads/rod/probes)", "expl": "Circular magnetization passes current through the part itself - between contact heads, through a central rod, or via test probes on flat objects.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "In the magnetizing-current summary, which current MAGNETIZES (and at what range)?", "options": ["AC, 5-12 V", "AC, 110-440 V", "DC, about 110-440 V", "DC, 12-24 V only"], "correct": 2, "short": "DC, ~110-440 V magnetizes", "expl": "Direct current (DC) at about 110-440 V is used to magnetize the part.", "cite": "[class notes]", "topic": "magnetic particle"}, {"q": "In the magnetizing-current summary, which current DEMAGNETIZES the part?", "options": ["DC only", "No current can demagnetize", "High-voltage DC only", "Alternating current (AC) - or reversing/decaying DC"], "correct": 3, "short": "AC (or reversing DC) demagnetizes", "expl": "Alternating current (AC) degausses/demagnetizes the part; reversing (decaying) DC can also be used.", "cite": "[class notes]", "topic": "magnetic particle"}, {"q": "A hand-held YOKE for portable field MPI uses:", "options": ["Dry media plus a magnetic field, with its legs placed across the flaw", "Wet fluorescent bath only", "Ultrasonic couplant", "X-ray film"], "correct": 0, "short": "Dry media + magnetic field, legs across the flaw", "expl": "The portable yoke applies a magnetic field with dry media; its legs straddle the flaw to drive flux across it.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "With a yoke, the magnetic field indicator is placed how relative to the principal direction?", "options": ["Parallel (0 degrees)", "At 90 degrees to the principal field direction", "At 45 degrees", "Behind the yoke"], "correct": 1, "short": "90 degrees to the principal direction", "expl": "The magnetic field indicator is placed at 90 degrees to the principal direction, and the part is checked in two directions.", "cite": "[class notes]", "topic": "magnetic particle"}, {"q": "A FATIGUE crack indication in MPI typically appears as:", "options": ["Short, jagged, less clear lines", "Fuzzy variable-size marks", "A sharp, clear, uniform line", "Symmetrical fine dots"], "correct": 2, "short": "Sharp, clear, uniform line", "expl": "Fatigue cracks show up as sharp, clear, uniform indications.", "cite": "[class notes]", "topic": "magnetic particle"}, {"q": "A HEAT-TREAT crack indication in MPI typically appears as:", "options": ["A single sharp uniform line", "Symmetrical fine sharp lines", "Fuzzy rounded dots", "Short, jagged, and less clear"], "correct": 3, "short": "Short, jagged, less clear", "expl": "Heat-treat cracks appear short, jagged, and less clear than fatigue cracks.", "cite": "[class notes]", "topic": "magnetic particle"}, {"q": "A SHRINK-crack indication in MPI typically appears as:", "options": ["Jagged and close together", "Sharp uniform single lines", "Straight intermittent dashes", "A bright rounded dot"], "correct": 0, "short": "Jagged and close together", "expl": "Shrink cracks show jagged indications that are close together.", "cite": "[class notes]", "topic": "magnetic particle"}, {"q": "A SEAM indication in MPI typically appears as:", "options": ["Fuzzy variable blobs", "Symmetrical, fine, sharp lines", "Random scattered dots", "Short jagged marks"], "correct": 1, "short": "Symmetrical, fine, sharp lines", "expl": "Seams appear as symmetrical, fine, sharp lines.", "cite": "[class notes]", "topic": "magnetic particle"}, {"q": "A HAIRLINE indication in MPI is described as:", "options": ["Wide jagged marks", "A bright rounded dot", "Very fine, close seams", "Symmetrical thick lines"], "correct": 2, "short": "Very fine, close seams", "expl": "Hairline indications look like very fine, closely spaced seams.", "cite": "[class notes]", "topic": "magnetic particle"}, {"q": "INCLUSION indications in MPI typically appear as:", "options": ["A single sharp uniform line", "Symmetrical fine sharp lines", "A perfectly round dot", "Straight intermittent / fuzzy lines of variable size"], "correct": 3, "short": "Straight intermittent / fuzzy, variable size", "expl": "Inclusions show as straight intermittent or fuzzy indications of variable size.", "cite": "[class notes]", "topic": "magnetic particle"}, {"q": "Test bars with KNOWN flaws are used in MPI to:", "options": ["Verify the system/process is performing correctly", "Magnetize the production part", "Replace the pie gauge", "Demagnetize the equipment"], "correct": 0, "short": "Verify the system is performing", "expl": "Test bars containing known flaws are used to verify that the MPI system and process are performing correctly.", "cite": "[class notes]", "topic": "magnetic particle"}, {"q": "The correct ORDER of the MPI procedure is:", "options": ["Magnetize, pre-clean, demagnetize, apply media, interpret, clean, disposition", "Pre-clean, introduce magnetic field, apply media, interpret, demagnetize, clean, disposition", "Apply media, magnetize, interpret, pre-clean, clean, demagnetize, disposition", "Interpret, magnetize, apply media, pre-clean, clean, disposition, demagnetize"], "correct": 1, "short": "Pre-clean > magnetize > media > interpret > demag > clean > disposition", "expl": "MPI order: (1) pre-clean, (2) introduce the magnetic field, (3) apply media, (4) interpret, (5) demagnetize, (6) clean, (7) disposition of the part.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "Which is the FIRST step of the MPI procedure?", "options": ["Demagnetize the part", "Apply the media", "Pre-clean the part", "Interpret the indications"], "correct": 2, "short": "Pre-clean the part", "expl": "Step 1 of MPI is pre-cleaning the part before any magnetic field is introduced.", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "After interpreting the indications, the next two MPI steps are:", "options": ["Magnetize, then apply media", "Disposition, then pre-clean", "Apply media, then interpret again", "Demagnetize, then clean the part"], "correct": 3, "short": "Demagnetize, then clean", "expl": "After interpretation come demagnetizing (step 5) and cleaning (step 6), before final disposition (step 7).", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "The final (7th) step of the MPI procedure is:", "options": ["Disposition of the part", "Magnetize the part", "Apply media", "Pre-clean the part"], "correct": 0, "short": "Disposition of the part", "expl": "The last MPI step is disposition of the part (serviceable vs. rejected, with the proper tag).", "cite": "AC 43.13-1B Ch.5, par.5-19, p. 5-11", "topic": "magnetic particle"}, {"q": "During fluorescent UV inspection in the field, tarps are used to:", "options": ["Magnetize the part", "Block ambient light so the fluorescent glow is visible", "Collect the iron powder", "Catch dripping penetrant"], "correct": 1, "short": "Block ambient light for UV reading", "expl": "Tarps block ambient light so the fluorescent indications can be seen clearly under UV.", "cite": "[class notes]", "topic": "magnetic particle"}, {"q": "Which two methods detect only SURFACE discontinuities?", "options": ["Magnetic particle and eddy current", "Ultrasonic and radiographic", "Visual and dye penetrant", "Eddy current and ultrasonic"], "correct": 2, "short": "Visual and dye penetrant", "expl": "Visual and dye penetrant detect surface discontinuities only; other methods are needed for subsurface flaws.", "cite": "AC 43.13-1B Ch.5, Table 5-1, p. 5-7", "topic": "cross-method"}, {"q": "Which two methods detect BOTH surface and subsurface discontinuities?", "options": ["Visual and penetrant", "Visual and radiographic", "Penetrant and ultrasonic", "Magnetic particle and eddy current"], "correct": 3, "short": "Magnetic particle and eddy current", "expl": "Magnetic particle and eddy current both detect surface AND subsurface flaws; visual/penetrant are surface-only.", "cite": "AC 43.13-1B Ch.5, Table 5-1, p. 5-7", "topic": "cross-method"}, {"q": "Which method is limited to FERROUS materials, and which is limited to CONDUCTIVE materials?", "options": ["Magnetic particle is ferrous-only; eddy current is conductive-only", "Penetrant is ferrous-only; ultrasonic is conductive-only", "Eddy current is ferrous-only; magnetic particle is conductive-only", "Both work on any material"], "correct": 0, "short": "MPI = ferrous-only; eddy current = conductive-only", "expl": "Magnetic particle works only on ferromagnetic (ferrous) materials; eddy current works only on electrically conductive materials.", "cite": "AC 43.13-1B Ch.5, Table 5-1, p. 5-7", "topic": "cross-method"}, {"q": "Which method can find MINUTE cracks too small for X-ray and also works on plastics/ceramics/composites?", "options": ["Magnetic particle", "Ultrasonic", "Eddy current", "Dye penetrant"], "correct": 1, "short": "Ultrasonic", "expl": "Ultrasonic finds minute cracks too small for X-ray and is the only listed method usable on plastics, ceramics, composites, and most metals.", "cite": "AC 43.13-1B Ch.5, par.5-43, p. 5-19", "topic": "cross-method"}, {"q": "Which statement correctly pairs an induction-based vs. sound-based method?", "options": ["Eddy current is sound-based; ultrasonic is induction-based", "Both are based on X-rays", "Eddy current is based on electromagnetic induction; ultrasonic is based on high-frequency sound waves", "Both are based on capillary action"], "correct": 2, "short": "Eddy = induction; ultrasonic = sound", "expl": "Eddy current is based on electromagnetic induction; ultrasonic is based on high-frequency sound waves.", "cite": "AC 43.13-1B Ch.5, par.5-30 / par.5-43", "topic": "cross-method"}];
const DRILL = [{"label": "Six methods", "text": "Visual, Dye Penetrant, Magnetic Particle, Ultrasonic, Eddy Current, X-ray. Visual = most basic/common."}, {"label": "Who performs", "text": "A&P: visual, dye penetrant, magnetic particle. Ultrasonic/eddy = QC/trained techs. X-ray = certified orgs only."}, {"label": "Surface-only vs surface+subsurface", "text": "Visual & Penetrant = SURFACE only. Magnetic Particle & Eddy Current = surface AND subsurface."}, {"label": "Penetrant capillary", "text": "Penetrant enters a flaw by CAPILLARY attraction; developer is a blotter using REVERSE capillary (bleed-out)."}, {"label": "Visible vs fluorescent", "text": "Visible = RED lines vs white developer in white light. Fluorescent = greenish-yellow glow under BLACK/UV light."}, {"label": "Penetrant flush", "text": "Water-soluble flush ~30-40 psi at ~45 deg. Three developers: DRY, WET, NON-AQUEOUS."}, {"label": "No mechanical clean", "text": "Do NOT abrasive-blast/scrape/wire-brush before penetrant - it smears metal over the flaw and hides it."}, {"label": "Petroleum + oxygen", "text": "Never use petroleum cleaners on oxygen equipment - petroleum + oxygen can EXPLODE."}, {"label": "Black light", "text": "UV lamp 28-100 V on 115 V AC; 5-10 min warm-up; unblocked port; cool before relighting."}, {"label": "MPI material limit", "text": "Magnetic Particle works ONLY on ferrous (ferromagnetic) materials; a flaw = DISCONTINUITY."}, {"label": "MPI flux rule", "text": "Flux must be PERPENDICULAR to the flaw; faults PARALLEL to flux are missed. Magnetize LONGITUDINAL + CIRCULAR."}, {"label": "Magnaflux DC/AC", "text": "DC magnetizes (~110-440 V); AC demagnetizes (degausses). Pie gauge checks residual flux."}, {"label": "Residual vs continuous", "text": "Residual = field removed BEFORE inspection (heat-treated steel). Continuous = field applied DURING (better subsurface)."}, {"label": "Eddy current limits", "text": "Eddy = electromagnetic induction; CONDUCTIVE materials only (not plastics); often NO coating removal. Factors: conductivity, permeability, mass, voids."}, {"label": "Ultrasonic", "text": "High-frequency SOUND; finds MINUTE cracks too small for X-ray; works on plastics/ceramics/composites/metals. Contact=anywhere, Immersion=shop. Systems: pulse echo, through transmission, resonance."}, {"label": "MPI order", "text": "Pre-clean > magnetize > apply media > interpret > demagnetize > clean > disposition (7 steps)."}];

const QUIZ = {
  order:[], i:0, score:0, answered:0, missed:[], shuffle:false,

  init(){
    document.getElementById('startmeta').innerHTML =
      '<b>'+DATA.length+'</b> questions &nbsp;·&nbsp; instant feedback &nbsp;·&nbsp; every answer cited';
    const t=document.getElementById('shuffleToggle');
    t.onclick=()=>{ this.shuffle=!this.shuffle; t.classList.toggle('on',this.shuffle); };
  },

  start(){
    this.order = DATA.map((_,k)=>k);
    if(this.shuffle){ for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('start').style.display='none';
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  retake(missedOnly){
    if(missedOnly && this.missed.length){ const m=this.missed.slice(); this.order=m; }
    else { this.order = DATA.map((_,k)=>k); if(this.shuffle){for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];}} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  render(){
    const idx=this.order[this.i], q=DATA[idx];
    const total=this.order.length;
    document.getElementById('counter').textContent = 'Q'+(this.i+1)+' of '+total;
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('progfill').style.width = (this.i/total*100)+'%';
    let opts='';
    q.options.forEach((o,li)=>{
      const L='ABCD'[li];
      opts += '<button class="opt" data-li="'+li+'" onclick="QUIZ.pick('+li+')">'+
              '<span class="L">'+L+'</span><span class="T">'+esc(o)+'</span><span class="mark"></span></button>';
    });
    document.getElementById('cardmount').innerHTML =
      '<div class="card"><span class="tag">'+esc(q.topic)+'</span>'+
      '<div class="stem">'+esc(q.q)+'</div>'+
      '<div class="opts" id="opts">'+opts+'</div>'+
      '<div class="fb" id="fb"></div></div>';
    document.getElementById('nextbtn').disabled = true;
    document.getElementById('skipbtn').style.display = '';
    this.locked=false;
  },

  pick(li){
    if(this.locked) return;
    this.locked=true;
    const idx=this.order[this.i], q=DATA[idx];
    const wrapEl=document.getElementById('opts'); wrapEl.classList.add('locked');
    const btns=wrapEl.querySelectorAll('.opt');
    const ok = (li===q.correct);
    btns.forEach(b=>{
      const bl=+b.dataset.li;
      if(bl===q.correct){ b.classList.add('correct'); b.querySelector('.mark').textContent='✓'; }
      if(bl===li && !ok){ b.classList.add('wrong'); b.querySelector('.mark').textContent='✗'; }
    });
    this.answered++;
    if(ok) this.score++; else this.missed.push(idx);
    const fb=document.getElementById('fb');
    fb.className='fb show '+(ok?'ok':'no');
    fb.innerHTML = '<div class="verdict">'+(ok?'✓ Correct':'✗ Incorrect')+'</div>'+
      '<div class="ans">Answer: '+'ABCD'[q.correct]+'. '+esc(q.short)+'</div>'+
      '<div class="expl">'+esc(q.expl)+'</div>'+
      '<div class="cite">📖 '+esc(q.cite)+'</div>';
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('nextbtn').disabled = false;
    document.getElementById('skipbtn').style.display = 'none';
  },

  next(skip){
    if(skip && !this.locked){ /* skipped, not answered */ }
    this.i++;
    if(this.i >= this.order.length){ this.finish(); return; }
    this.render();
    window.scrollTo({top:0,behavior:'smooth'});
  },

  finish(){
    document.getElementById('quiz').style.display='none';
    const R=document.getElementById('results');
    const total=this.answered;
    const pct = total? Math.round(this.score/total*100):0;
    const pass = pct>=70;
    let miss='';
    if(this.missed.length){
      miss='<h3 style="text-align:left;font-size:16px;color:var(--navy);margin:22px 0 8px;">Review your '+this.missed.length+' missed:</h3><div class="misslist">';
      this.missed.forEach(idx=>{ const q=DATA[idx];
        miss+='<div class="missitem"><div class="mq">'+esc(q.q)+'</div>'+
              '<div class="ma"><b>'+'ABCD'[q.correct]+'. '+esc(q.short)+'</b> — '+esc(q.expl)+'</div>'+
              '<div class="mc">📖 '+esc(q.cite)+'</div></div>';
      });
      miss+='</div>';
    } else {
      miss='<div class="allright">🎯 Perfect — every question correct!</div>';
    }
    let drillHtml='';
    if(DRILL && DRILL.length){
      drillHtml='<details class="drill"><summary>📌 High-Yield Drill Box ('+DRILL.length+' must-know facts)</summary>';
      DRILL.forEach(d=>{ drillHtml+='<div class="drillrow"><b>'+esc(d.label)+':</b> '+esc(d.text)+'</div>'; });
      drillHtml+='</details>';
    }
    R.innerHTML =
      '<h1>'+(pass?'Nice work 👍':'Keep grinding 💪')+'</h1>'+
      '<div class="bigscore">'+this.score+'<small>/'+total+'</small></div>'+
      '<div class="pct '+(pass?'pass':'fail')+'">'+pct+'%  '+(pass?'· passing (≥70%)':'· below 70%')+'</div>'+
      '<div class="nav" style="max-width:430px;margin:0 auto 4px;">'+
        '<button class="btn primary" onclick="QUIZ.retake(false)">Retake all</button>'+
        (this.missed.length?'<button class="btn ghost" onclick="QUIZ.retake(true)">Retake missed only</button>':'')+
      '</div>'+
      miss + drillHtml;
    R.style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  }
};

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('quiz').style.display==='none') return;
  const k=e.key.toLowerCase();
  if(['a','b','c','d'].includes(k)) QUIZ.pick('abcd'.indexOf(k));
  else if(['1','2','3','4'].includes(k)) QUIZ.pick(+k-1);
  else if(e.key==='Enter' && !document.getElementById('nextbtn').disabled) QUIZ.next();
});

QUIZ.init();
</script>
