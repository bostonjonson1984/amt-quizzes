<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Project 2-11 — Corrosion Control Quiz</title>
<style>
  :root{
    --navy:#0d2a4a; --navy2:#15436e; --gold:#ffce4d; --ink:#1c2330;
    --green:#1f9d57; --greenbg:#e7f7ee; --red:#d6453d; --redbg:#fdecea;
    --line:#e3e8f0; --muted:#5a6678; --card:#ffffff; --bg:#eef2f8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:0 16px env(safe-area-inset-bottom);
  }
  .wrap{width:100%; max-width:720px; margin:0 auto;}

  /* top bar */
  .bar{position:sticky; top:0; z-index:10; background:var(--bg); padding:14px 0 8px;}
  .barrow{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted); font-weight:600;}
  .score{color:var(--navy);}
  .prog{height:8px; background:#dbe3ee; border-radius:6px; margin-top:8px; overflow:hidden;}
  .progfill{height:100%; width:0; background:linear-gradient(90deg,var(--navy2),var(--gold)); transition:width .35s ease;}

  /* card */
  .card{background:var(--card); border-radius:14px; padding:22px 20px 20px; margin-top:14px;
        box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .tag{display:inline-block; background:#eef2f8; color:var(--navy2); font-size:10.5px; font-weight:800;
       letter-spacing:.5px; padding:3px 9px; border-radius:11px; text-transform:uppercase;}
  .stem{font-size:19px; line-height:1.42; font-weight:600; margin:12px 0 18px; color:#0d1b2a;}

  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{display:flex; align-items:flex-start; gap:11px; width:100%; text-align:left;
       background:#f7f9fc; border:1.5px solid var(--line); border-radius:11px;
       padding:14px 15px; font-size:16px; line-height:1.35; cursor:pointer;
       transition:border-color .12s, background .12s, transform .05s; color:var(--ink);}
  .opt:hover:not(.locked){border-color:var(--navy2); background:#fff;}
  .opt:active:not(.locked){transform:scale(.995);}
  .opt .L{flex:0 0 26px; height:26px; border-radius:50%; background:#e6ecf4; color:var(--navy);
          font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;}
  .opt .T{flex:1; padding-top:2px;}
  .opts.locked .opt{cursor:default;}
  .opt.correct{border-color:var(--green); background:var(--greenbg);}
  .opt.correct .L{background:var(--green); color:#fff;}
  .opt.wrong{border-color:var(--red); background:var(--redbg);}
  .opt.wrong .L{background:var(--red); color:#fff;}
  .opt .mark{margin-left:auto; font-weight:800; font-size:15px; align-self:center;}
  .opt.correct .mark{color:var(--green);}
  .opt.wrong .mark{color:var(--red);}

  /* feedback */
  .fb{margin-top:16px; border-radius:11px; padding:15px 16px; display:none;}
  .fb.show{display:block; animation:rise .25s ease;}
  @keyframes rise{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .fb.ok{background:var(--greenbg); border:1px solid #b9e6cb;}
  .fb.no{background:var(--redbg); border:1px solid #f3c6c2;}
  .fb .verdict{font-weight:800; font-size:15px; margin-bottom:5px;}
  .fb.ok .verdict{color:var(--green);}
  .fb.no .verdict{color:var(--red);}
  .fb .ans{font-weight:700; margin-bottom:6px;}
  .fb .expl{font-size:14.5px; line-height:1.5; color:#27313f;}
  .fb .cite{margin-top:9px; font-size:12.5px; color:var(--muted); font-style:italic;}

  .nav{display:flex; gap:10px; margin:16px 0 26px;}
  .btn{flex:1; border:none; border-radius:11px; padding:15px; font-size:16px; font-weight:700;
       cursor:pointer; font-family:inherit;}
  .btn.primary{background:var(--navy); color:#fff;}
  .btn.primary:hover{background:var(--navy2);}
  .btn.ghost{background:#fff; color:var(--navy); border:1.5px solid var(--line);}
  .btn:disabled{opacity:.4; cursor:default;}
  .hint{text-align:center; font-size:12px; color:var(--muted); margin:-12px 0 22px;}

  /* start + results screens */
  .screen{background:var(--card); border-radius:16px; padding:30px 24px; margin-top:22px; text-align:center;
          box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .screen h1{font-size:24px; margin:0 0 6px; color:var(--navy);}
  .screen .sub{color:var(--muted); font-size:14px; margin-bottom:22px; line-height:1.45;}
  .bigscore{font-size:60px; font-weight:800; color:var(--navy); line-height:1; margin:8px 0;}
  .bigscore small{font-size:22px; color:var(--muted); font-weight:600;}
  .pct{font-size:17px; font-weight:700; margin-bottom:18px;}
  .pass{color:var(--green);} .fail{color:var(--red);}
  .opt.toggle{justify-content:center; cursor:pointer; font-weight:600; max-width:320px; margin:0 auto 18px;}
  .opt.toggle.on{border-color:var(--navy2); background:#eef4fb;}
  .misslist{text-align:left; margin-top:6px;}
  .missitem{border-left:3px solid var(--red); background:#fff6f5; border-radius:6px; padding:11px 13px; margin-bottom:10px;}
  .missitem .mq{font-weight:600; font-size:14.5px; margin-bottom:5px;}
  .missitem .ma{font-size:13.5px; color:#27313f;} .missitem .mc{font-size:12px; color:var(--muted); font-style:italic; margin-top:4px;}
  .allright{font-size:16px; color:var(--green); font-weight:700; margin:14px 0;}
  details.drill{margin:18px 0 4px; text-align:left;}
  details.drill summary{cursor:pointer; font-weight:700; color:var(--navy); font-size:15px; padding:8px 0;}
  .drillrow{border-bottom:1px solid var(--line); padding:9px 2px; font-size:13.5px;}
  .drillrow b{color:var(--navy2);}
  .foot{text-align:center; color:#9aa6b8; font-size:11px; margin:10px 0 26px;}
</style>
</head>
<body>
<div class="wrap">

  <!-- START -->
  <div id="start" class="screen">
    <h1>Project 2-11 — Corrosion Control Quiz</h1>
    <div class="sub">AIM Block 2 · EXHAUSTIVE · Sources: AC 43-4B (primary) + FAA-H-8083-30B Ch.8</div>
    <div id="startmeta" class="sub"></div>
    <div id="shuffleToggle" class="opt toggle"><span class="T">🔀&nbsp; Shuffle question order</span></div>
    <div class="nav" style="max-width:320px;margin:0 auto;">
      <button class="btn primary" onclick="QUIZ.start()">Start Quiz →</button>
    </div>
    <div class="hint">Tip: press A–D (or 1–4) to answer, Enter for next.</div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" style="display:none;">
    <div class="bar">
      <div class="barrow"><span id="counter">Q1</span><span class="score" id="scorelbl">Score 0/0</span></div>
      <div class="prog"><div class="progfill" id="progfill"></div></div>
    </div>
    <div id="cardmount"></div>
    <div class="nav">
      <button class="btn ghost" id="skipbtn" onclick="QUIZ.next(true)">Skip</button>
      <button class="btn primary" id="nextbtn" onclick="QUIZ.next()" disabled>Next →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="screen" style="display:none;"></div>

  <div class="foot">amt-tutor · Matt's Agency · offline study quiz</div>
</div>

<script>
const DATA  = [{"q": "Aircraft operating in a corrosive environment require a more stringent corrosion preventive/control program than aircraft in a dry environment. Which is one of the corrosive environments AC 43-4B identifies?", "options": ["Salt air (marine) environments", "High-altitude desert operation", "Operation below 10,000 ft MSL", "Below-freezing operation only"], "correct": 0, "short": "Salt air (marine) environments.", "expl": "AC 43-4B lists salt air, heavy atmospheric industrial pollution, and over-water (over-the-ocean) operations as the corrosive environments. Dry/desert air is far less corrosive.", "cite": "AC 43-4B p. 1-2, para. 1.8.1", "topic": "environments"}, {"q": "Per AC 43-4B, which over-the-surface operation is named as a corrosive environment requiring a stricter corrosion-control program?", "options": ["Over-water (over-the-ocean) operations", "Over-mountain operation", "Over-forest operation", "High-altitude cruise"], "correct": 0, "short": "Over-water (over-the-ocean) operations.", "expl": "The three corrosive environments named are salt air, heavy atmospheric industrial pollution, and over-water (over-the-ocean) operations. Marine salt is the chief driver.", "cite": "AC 43-4B p. 1-2, para. 1.8.1", "topic": "environments"}, {"q": "Heavy atmospheric INDUSTRIAL pollution is a corrosive environment chiefly because it deposits:", "options": ["Acidic, salt- and sulfur-bearing contaminants that act as electrolytes", "Excess oxygen onto the metal", "Mechanical abrasion from soot only", "Ultraviolet degradation of the paint"], "correct": 0, "short": "Acidic/sulfur-bearing contaminants that act as electrolytes.", "expl": "Industrial pollution deposits acidic and sulfur-bearing contaminants onto the surface; these act as corrosive agents/electrolytes. The driver is chemical, not abrasion or UV.", "cite": "AC 43-4B p. 1-2, para. 1.8.1", "topic": "environments"}, {"q": "AC 43-4B names THREE corrosive environments. They are salt air, over-water operations, and:", "options": ["Tropical rainforest only", "Arctic cold", "Heavy atmospheric industrial pollution", "Volcanic ash only"], "correct": 2, "short": "Heavy atmospheric industrial pollution.", "expl": "The complete list of corrosive environments in para. 1.8.1 is: salt air, heavy atmospheric industrial pollution, and over-water (over-the-ocean) operations.", "cite": "AC 43-4B p. 1-2, para. 1.8.1", "topic": "environments"}, {"q": "AC 43-4B lists factors that influence the rate of metal corrosion. Which of the following is one of those factors?", "options": ["The paint manufacturer's brand", "Heat treatment and grain direction of the metal", "The aircraft registration number", "The altitude where the part was machined"], "correct": 1, "short": "Heat treatment and grain direction.", "expl": "Listed factors include type of metal; heat treatment and grain direction; presence of a dissimilar less-corrodible metal; temperature; presence of electrolytes; and more.", "cite": "AC 43-4B p. 2-2/2-3, para. 2.4.1", "topic": "factors"}, {"q": "Which is NOT one of the corrosion-rate factors listed in AC 43-4B?", "options": ["Color of the protective topcoat", "Presence of electrolytes (salt water, battery fluids)", "Anode-to-cathode surface area ratio", "Temperature"], "correct": 0, "short": "Color of the protective topcoat.", "expl": "Para. 2.4.1 lists metal type, heat treatment/grain direction, dissimilar metals, temperature, electrolytes, oxygen availability, electrolyte concentration, anode/cathode area, biological organisms, mechanical stress, and time of exposure. Paint color is not a factor.", "cite": "AC 43-4B p. 2-2/2-3, para. 2.4.1", "topic": "factors"}, {"q": "The presence of a dissimilar, LESS corrodible metal in contact with a metal increases corrosion because it sets up:", "options": ["Filiform corrosion", "Heat oxidation", "Direct chemical attack only", "Galvanic (electrochemical) corrosion"], "correct": 3, "short": "Galvanic corrosion.", "expl": "A dissimilar, less-corrodible (more noble) metal in electrical contact through an electrolyte makes the active metal the anode, accelerating galvanic corrosion. This is one of the listed corrosion-rate factors.", "cite": "AC 43-4B p. 2-2/2-3, para. 2.4.1", "topic": "factors"}, {"q": "Which of the following corrosion-rate factors describes how long the metal has been exposed to the corrosive condition?", "options": ["Grain direction", "Time of exposure", "Electrolyte concentration", "Anode/cathode area"], "correct": 1, "short": "Time of exposure.", "expl": "Among the factors in para. 2.4.1 is the time of exposure of the metal to the corrosive environment — longer exposure means more corrosion.", "cite": "AC 43-4B p. 2-2/2-3, para. 2.4.1", "topic": "factors"}, {"q": "Per AC 43-4B, the availability of which gas at the metal surface is one of the factors influencing corrosion rate?", "options": ["Oxygen", "Nitrogen", "Helium", "Argon"], "correct": 0, "short": "Oxygen (its availability at the surface).", "expl": "Availability of oxygen is a listed corrosion-rate factor. Differences in oxygen availability drive oxygen concentration (crevice) cells.", "cite": "AC 43-4B p. 2-2/2-3, para. 2.4.1", "topic": "factors"}, {"q": "Which is a listed corrosion-rate factor relating to LIVING contamination on the surface?", "options": ["Presence of biological organisms", "Color of corrosion product", "Type of rivet head", "Paint gloss level"], "correct": 0, "short": "Presence of biological organisms.", "expl": "Presence of biological organisms (microbial growth, e.g. in fuel tanks) is one of the factors in para. 2.4.1 that influences corrosion and its rate.", "cite": "AC 43-4B p. 2-2/2-3, para. 2.4.1", "topic": "factors"}, {"q": "Galvanic corrosion occurs when:", "options": ["A single metal is heated above 700 deg F", "Paint is applied too thickly", "Two dissimilar metals make electrical contact in the presence of an electrolyte", "Oxygen is completely excluded"], "correct": 2, "short": "Two dissimilar metals + electrolyte + electrical contact.", "expl": "Galvanic corrosion needs two dissimilar metals (anode + cathode), an electrolyte, and electrical contact between them. The greater the activity difference, the faster the attack.", "cite": "AC 43-4B p. 2-5, para. 2.5.3", "topic": "forms"}, {"q": "Galvanic (dissimilar-metal) corrosion requires four conditions. Besides an anode and a cathode, the other two are:", "options": ["Heat and pressure", "Sunlight and oxygen", "Paint and primer", "An electrolyte and electrical contact between the metals"], "correct": 3, "short": "An electrolyte and electrical contact.", "expl": "The four requirements are: an anode (more active metal), a cathode (less active metal), an electrolyte, and electrical contact between anode and cathode.", "cite": "AC 43-4B p. 2-5, para. 2.5.3 (also p. 2-1, para. 2.2)", "topic": "forms"}, {"q": "In a galvanic couple, corrosion is RAPID and SEVERE when the surface area of the corroding (anodic) metal is:", "options": ["Larger than the less-active (cathodic) metal", "Exactly equal to the cathode", "Smaller than the less-active (cathodic) metal", "Coated with a thick oxide film"], "correct": 2, "short": "Smaller than the cathode (unfavorable area ratio).", "expl": "If the anode area is SMALLER than the cathode, corrosion is rapid and severe. If the anode is LARGER than the cathode, the attack is slow and superficial.", "cite": "AC 43-4B p. 2-5/2-6, para. 2.5.3", "topic": "forms"}, {"q": "In a galvanic couple, corrosion is SLOW and SUPERFICIAL when the corroding (anodic) metal is:", "options": ["Smaller than the cathode", "Larger than the less-active (cathodic) metal", "Painted over", "Made of magnesium"], "correct": 1, "short": "Larger than the cathode.", "expl": "When the corroding metal (anode) is larger than the less-active metal (cathode), the corrosion is slow and superficial — a favorable area ratio.", "cite": "AC 43-4B p. 2-5/2-6, para. 2.5.3", "topic": "forms"}, {"q": "A form of corrosion that first appears as a white or gray powdery deposit, similar to dust, blotching the surface — and reveals tiny holes when cleaned away — is:", "options": ["Filiform corrosion", "Fretting corrosion", "Pitting corrosion", "Intergranular corrosion"], "correct": 2, "short": "Pitting corrosion.", "expl": "AC 43-4B: pitting is the most common effect of corrosion on aluminum and magnesium alloys; first noticeable as a white/gray powdery deposit, and cleaning it reveals tiny pits or holes.", "cite": "AC 43-4B p. 2-4, para. 2.5.2", "topic": "forms"}, {"q": "Pitting corrosion is the MOST COMMON effect of corrosion on which metals?", "options": ["Steel and copper", "Titanium and nickel", "Aluminum and magnesium alloys", "Lead and tin"], "correct": 2, "short": "Aluminum and magnesium alloys.", "expl": "Pitting is the most common effect of corrosion on aluminum and magnesium alloys. Steel shows reddish-brown rust, not the white/gray powder of pitting.", "cite": "AC 43-4B p. 2-4, para. 2.5.2", "topic": "forms"}, {"q": "After the powdery deposit of pitting corrosion is cleaned away, what is revealed in the surface?", "options": ["A smooth bright finish", "A worm-like trace", "Blue-green crystals", "Tiny pits or holes"], "correct": 3, "short": "Tiny pits or holes.", "expl": "When the white/gray powdery deposit of pitting is cleaned away, tiny pits or holes in the surface can be seen — the defining feature of pitting corrosion.", "cite": "AC 43-4B p. 2-4, para. 2.5.2", "topic": "forms"}, {"q": "Uniform surface (etch) corrosion attacks the metal surface:", "options": ["Only along grain boundaries", "Evenly/uniformly over a wide area, producing a general roughening or etched look", "In a worm-like line under paint", "Only between two vibrating parts"], "correct": 1, "short": "Evenly over a wide area (general roughening/etch).", "expl": "Uniform surface corrosion is the most common type — a direct chemical or electrochemical attack spread evenly over the surface, leaving a roughened, etched, often frosted appearance.", "cite": "AC 43-4B p. 2-4, para. 2.5.1", "topic": "forms"}, {"q": "Concentration cell (crevice) corrosion develops where there is a difference in concentration of ions or oxygen. Oxygen concentration cells typically form under all of the following EXCEPT:", "options": ["A freshly anodized, sealed surface with no deposits", "Metallic or nonmetallic deposits on the surface", "Faying surfaces such as riveted lap joints", "Gaskets, wood, rubber and similar materials in contact with the metal"], "correct": 0, "short": "A clean, sealed anodized surface.", "expl": "Oxygen cells form under deposits, faying/riveted lap joints, and gaskets/wood/rubber. A clean, properly sealed surface with no trapped material creates no oxygen-starved anodic site.", "cite": "AC 43-4B p. 2-6, para. 2.5.4.2", "topic": "forms"}, {"q": "Per the worksheet, oxygen concentration cells develop under which of these surface conditions?", "options": ["Bare polished metal in dry air", "Freshly painted smooth skin", "A vacuum-sealed component", "Faying surfaces such as riveted lap joints"], "correct": 3, "short": "Faying surfaces such as riveted lap joints.", "expl": "The three oxygen-cell locations from para. 2.5.4.2 are: metallic/nonmetallic deposits; faying surfaces (riveted lap joints); and gaskets, wood, rubber and similar materials in contact with the metal.", "cite": "AC 43-4B p. 2-6, para. 2.5.4.2", "topic": "forms"}, {"q": "In an oxygen concentration cell, corrosion occurs at the area of:", "options": ["High oxygen concentration (the cathode)", "Low oxygen concentration (the anode)", "Highest paint thickness", "Greatest temperature only"], "correct": 1, "short": "Low oxygen concentration (the anode).", "expl": "The metal under the LOW oxygen concentration becomes anodic and corrodes; the high-oxygen area is cathodic. Crevices, deposits, and lap joints starve oxygen and become anodic.", "cite": "AC 43-4B p. 2-6, para. 2.5.4.2", "topic": "forms"}, {"q": "Active-passive cells (a concentration-cell variant) rapidly attack metals that rely on a tightly adhering passive film, such as:", "options": ["Pure copper", "Lead solder", "Cadmium plating", "Corrosion-resistant (stainless) steel under a dirt particle"], "correct": 3, "short": "Corrosion-resistant (stainless) steel under a dirt particle.", "expl": "Active-passive cells attack metals depending on a passive oxide film (e.g. CRES/stainless). A salt deposit or dirt particle breaks the film locally; that small active area becomes anodic and pits rapidly. (This is the source for the worksheet Q4 'fourth' location.)", "cite": "AC 43-4B p. 2-6, para. 2.5.4.3", "topic": "forms"}, {"q": "Corrosion that attacks along the grain boundaries of an alloy — where boundary and grain center act as anode and cathode — is called:", "options": ["Filiform corrosion", "Intergranular corrosion", "Fretting corrosion", "Uniform corrosion"], "correct": 1, "short": "Intergranular corrosion.", "expl": "Intergranular corrosion attacks the grain boundaries, which differ chemically from the grain center. High-strength aluminum alloys 2014 and 7075 are especially susceptible if improperly heat-treated.", "cite": "AC 43-4B p. 2-6/2-7, para. 2.5.5", "topic": "forms"}, {"q": "High-strength aluminum alloys 2014 and 7075 become more susceptible to intergranular corrosion when they have been:", "options": ["Anodized", "Improperly heat-treated and then exposed to a corrosive environment", "Shot-peened", "Painted with epoxy primer"], "correct": 1, "short": "Improperly heat-treated, then exposed to corrosion.", "expl": "AC 43-4B specifically calls out 2014 and 7075 as more susceptible to intergranular corrosion if improperly heat-treated and then exposed to a corrosive environment.", "cite": "AC 43-4B p. 2-7, para. 2.5.5", "topic": "forms"}, {"q": "An advanced form of intergranular corrosion in which surface grains are lifted/swelled by expanding corrosion products at the grain boundaries is:", "options": ["Pitting", "Filiform corrosion", "Stress-corrosion cracking", "Exfoliation corrosion"], "correct": 3, "short": "Exfoliation corrosion.", "expl": "Exfoliation is an advanced intergranular corrosion that lifts and swells surface grains (a flaky, layered look). It occurs on extruded, rolled, wrought, and forged high-strength aluminum/magnesium parts.", "cite": "AC 43-4B p. 2-7/2-8, para. 2.5.6", "topic": "forms"}, {"q": "A special form of oxygen concentration cell corrosion that occurs under an organic (paint) coating and is recognized by a worm-like trace beneath the paint film is:", "options": ["Exfoliation", "Fretting corrosion", "Galvanic corrosion", "Filiform corrosion"], "correct": 3, "short": "Filiform corrosion.", "expl": "Filiform is a special oxygen concentration / crevice corrosion under organic coatings, recognized by worm-like threads of corrosion product beneath the paint film.", "cite": "AC 43-4B p. 2-9, para. 2.5.7", "topic": "forms"}, {"q": "Filiform corrosion occurs when the atmospheric relative humidity is between:", "options": ["78 and 90 percent", "30 and 50 percent", "55 and 70 percent", "95 and 100 percent"], "correct": 0, "short": "78 and 90 percent.", "expl": "AC 43-4B: filiform occurs when relative humidity is between 78 and 90 percent and the surface is slightly acidic. Storing below 70 percent RH helps prevent it.", "cite": "AC 43-4B p. 2-9, para. 2.5.7", "topic": "forms"}, {"q": "Filiform corrosion occurs at 78-90% relative humidity AND when the metal surface is:", "options": ["Strongly alkaline", "Perfectly neutral", "Slightly acidic", "Oil-coated"], "correct": 2, "short": "Slightly acidic.", "expl": "Filiform requires relative humidity between 78 and 90 percent AND a slightly acidic surface; corrosion starts at breaks in the coating and moves underneath it.", "cite": "AC 43-4B p. 2-9, para. 2.5.7", "topic": "forms"}, {"q": "Which storage condition helps PREVENT filiform corrosion?", "options": ["Storing above 90 percent relative humidity", "Storing below 70 percent relative humidity", "Leaving acidic contaminants on the surface", "Removing all paint"], "correct": 1, "short": "Store below 70 percent relative humidity.", "expl": "Prevention includes storing below 70 percent RH, using low-diffusion coatings, and washing off acidic contaminants. High humidity promotes filiform; bare metal is not the fix.", "cite": "AC 43-4B p. 2-9, para. 2.5.7", "topic": "forms"}, {"q": "Stress-corrosion cracking is best described as:", "options": ["Intergranular cracking caused by combined stress and corrosion", "Cracking from heat alone", "Pitting under a paint blister", "Wear between two vibrating parts"], "correct": 0, "short": "Intergranular cracking from combined stress + corrosion.", "expl": "AC 43-4B: stress-corrosion cracking is an intergranular cracking of a metal caused by combined stress and corrosion. Stress may be internal (residual) or external (applied).", "cite": "AC 43-4B p. 2-10, para. 2.6.1", "topic": "forms"}, {"q": "Which process creates COMPRESSIVE surface stresses that help REDUCE stress-corrosion cracking?", "options": ["Shot peening", "Pickling", "Stress raising", "Pitting"], "correct": 0, "short": "Shot peening.", "expl": "Shot peening a metal surface creates compressive surface stresses that reduce stress-corrosion cracking and increase the threshold stress level.", "cite": "AC 43-4B p. 2-11, para. 2.6.1", "topic": "forms"}, {"q": "Abrasive wear at the interface of two highly-loaded surfaces held immobile but caused to rub by vibration — removing protective film and exposing fresh metal — is:", "options": ["Fretting corrosion", "Filiform corrosion", "Intergranular corrosion", "Exfoliation"], "correct": 0, "short": "Fretting corrosion.", "expl": "Fretting occurs where two highly-loaded surfaces rub due to vibration; the rubbing removes protective film, prevents oxide reformation, and can cause severe pitting and fatigue cracking.", "cite": "AC 43-4B p. 2-12/2-13, para. 2.6.3", "topic": "forms"}, {"q": "AC 43-4B identifies the MOST COMMON corrosive agents/media as:", "options": ["Oils, greases, and waxes", "Acids, alkalis, and salts (plus atmosphere and water)", "Inert gases and vacuum", "Plastics and rubber"], "correct": 1, "short": "Acids, alkalis, and salts (plus atmosphere and water).", "expl": "The most common corrosive agents are acids, alkalis, and salts; the atmosphere and water also act as corrosive agents. Worksheet Q5 lists all five.", "cite": "AC 43-4B p. 2-14/2-15, para. 2.7", "topic": "agents"}, {"q": "Besides acids, alkalis, and salts, which TWO also act as corrosive agents per AC 43-4B?", "options": ["Oils and greases", "Nitrogen and argon", "Sealants and primers", "The atmosphere and water"], "correct": 3, "short": "The atmosphere and water.", "expl": "AC 43-4B: the atmosphere and water may act as corrosive agents as well, in addition to the most-common acids, alkalis, and salts.", "cite": "AC 43-4B p. 2-14/2-15, para. 2.7", "topic": "agents"}, {"q": "Which of the following is one of the FIVE corrosive media on the worksheet (Q5)?", "options": ["Anodize film", "Cadmium plating", "Nitrogen in tires", "Salts"], "correct": 3, "short": "Salts.", "expl": "The five corrosive media for worksheet Q5 are: acids, alkalis, salts, the atmosphere, and water.", "cite": "AC 43-4B p. 2-14/2-15, para. 2.7", "topic": "agents"}, {"q": "The recommended corrosion-prevention treatment for ALUMINUM alloy parts generally consists of:", "options": ["Leaving the bare metal exposed", "Cadmium plating only", "Anodize or conversion coating, then prime (and topcoat)", "No coating, just frequent washing"], "correct": 2, "short": "Anodize or conversion coat, then prime/topcoat.", "expl": "Aluminum is protected by anodizing or a chemical conversion coating, then primed and topcoated (some later aircraft use IVD aluminum plating). Bare aluminum is not the recommended protection.", "cite": "AC 43-4B p. 3-1, para. 3.1.1", "topic": "prevention"}, {"q": "BRASS and BRONZE parts are typically protected against corrosion by:", "options": ["Anodizing only", "No treatment - they are immune", "Steel-wool burnishing", "Cadmium plating, zinc plating, IVD aluminum coating, or a conversion coating"], "correct": 3, "short": "Cadmium/zinc/IVD-aluminum or conversion coating.", "expl": "AC 43-4B lists cadmium plating, zinc plating, IVD aluminum coating, or a conversion coating as the protective measures for brass and bronze.", "cite": "AC 43-4B p. 3-1, para. 3.1.2", "topic": "prevention"}, {"q": "MAGNESIUM alloys are among the most chemically active aircraft metals and therefore:", "options": ["Always require protective coatings (special chemical/electrochemical treatments and paint)", "Require no protective finish", "Are best protected by bare polishing", "Should be cadmium-plated with a wire brush"], "correct": 0, "short": "Always require protective coatings.", "expl": "Magnesium is highly active and ALWAYS requires protective coatings — special chemical and electrochemical treatments plus paint finishes.", "cite": "AC 43-4B p. 3-1, para. 3.1.3", "topic": "prevention"}, {"q": "Anodizing is the most common surface treatment used to protect which metal?", "options": ["Steel", "Copper", "Aluminum", "Lead"], "correct": 2, "short": "Aluminum.", "expl": "Anodizing (an electrolytic oxide coating) is the most common surface treatment for non-clad aluminum. It is then primed/topcoated for full protection.", "cite": "AC 43-4B p. 3-1, para. 3.1.1", "topic": "prevention"}, {"q": "Per AC 43-4B Table 3-1, MAGNESIUM is highly susceptible to which attack, and how does its corrosion appear?", "options": ["Surface oxidation; reddish-brown rust", "Pitting; white, powdery, snow-like mounds and white spots", "Crevice; blue-green powder", "Exfoliation only; black mottling"], "correct": 1, "short": "Pitting; white powdery snow-like mounds/white spots.", "expl": "Table 3-1 lists magnesium as highly susceptible to pitting, with white powdery snow-like mounds and white spots. Worksheet Q7's answer is 'pitting.'", "cite": "AC 43-4B p. 3-4, Table 3-1 (also p. 3-1, para. 3.2.1)", "topic": "metals"}, {"q": "Magnesium is susceptible to what TYPE of corrosive attack (worksheet Q7)?", "options": ["Reddish rust", "Pitting", "Blue-green powdering", "Crazing"], "correct": 1, "short": "Pitting.", "expl": "Magnesium, the most chemically active aircraft metal, is highly susceptible to pitting-type corrosion that appears as white powdery snow-like mounds and lifts the paint film.", "cite": "AC 43-4B p. 3-4, Table 3-1", "topic": "metals"}, {"q": "Per Table 3-1, how does corrosion on STAINLESS steels (300/400 series) typically appear (worksheet Q8)?", "options": ["Classic red rust like carbon steel", "A rough surface, sometimes with a uniform red, brown, or stain", "White powdery snow-like mounds", "Blue-green powder"], "correct": 1, "short": "Rough surface; sometimes a uniform red, brown, or stain.", "expl": "Stainless does NOT show classic red rust. Table 3-1 describes a rough surface, sometimes with a uniform red, brown, or stain. It is prone to crevice/pitting (marine) and intergranular (300 series).", "cite": "AC 43-4B p. 3-4, Table 3-1", "topic": "metals"}, {"q": "Per Table 3-1, the corrosion product appearance for ALUMINUM is:", "options": ["Reddish-brown oxide", "White-to-gray powder", "Blue or blue-green powder", "Green powdery deposit"], "correct": 1, "short": "White-to-gray powder.", "expl": "Aluminum corrosion appears as white-to-gray powder. Reddish-brown is low-alloy steel rust; blue/blue-green is copper-based; green is nickel.", "cite": "AC 43-4B p. 3-4, Table 3-1", "topic": "metals"}, {"q": "Per Table 3-1, copper-based BRASS and BRONZE corrosion appears as:", "options": ["White-to-gray powder", "Reddish-brown oxide", "No visible product below 700 deg F", "Blue or blue-green powdery deposit"], "correct": 3, "short": "Blue or blue-green powdery deposit.", "expl": "Brass/bronze (copper alloys) show surface and intergranular corrosion appearing as a blue or blue-green powdery deposit.", "cite": "AC 43-4B p. 3-4, Table 3-1", "topic": "metals"}, {"q": "Per Table 3-1, low-alloy STEEL corrosion appears as:", "options": ["White-to-gray powder", "Blue-green powder", "Snow-like mounds", "Reddish-brown oxide (rust)"], "correct": 3, "short": "Reddish-brown oxide (rust).", "expl": "Low-alloy steel shows the classic reddish-brown oxide (rust). This is distinct from aluminum's white-gray powder or copper's blue-green deposit.", "cite": "AC 43-4B p. 3-4, Table 3-1", "topic": "metals"}, {"q": "Per Table 3-1, TITANIUM produces 'no visible corrosion products at low temperature,' but colored surface oxides develop above:", "options": ["300 degrees F", "700 degrees F (370 deg C)", "500 degrees F", "212 degrees F"], "correct": 1, "short": "700 degrees F (about 370 deg C).", "expl": "Titanium is highly corrosion resistant; colored surface oxides develop above 700 deg F (370 deg C). Repeated contact with chlorinated solvents can degrade it at high temperature.", "cite": "AC 43-4B p. 3-4, Table 3-1", "topic": "metals"}, {"q": "Per Table 3-1, CADMIUM is described as 'used as sacrificial plating to protect steel,' and its corrosion ranges from a white powdery deposit to:", "options": ["Blue-green powder", "Brown or black mottling of the surface", "Reddish rust", "A worm-like trace"], "correct": 1, "short": "Brown or black mottling of the surface.", "expl": "Cadmium gives uniform surface corrosion ranging from white powder to brown or black mottling. The mottling SIGNALS that sacrificial protection is working — do not remove it for appearance.", "cite": "AC 43-4B p. 3-4, Table 3-1 (also p. 6-39, para. 6.81)", "topic": "metals"}, {"q": "WHEEL WELLS and landing gear are among the MOST corrosion-prone areas on an aircraft primarily because they:", "options": ["Are always painted with the thinnest coatings", "Are exposed to mud, water, salt, gravel and runway debris, with complex shapes hard to coat", "Operate at the highest temperatures", "Contain the battery"], "correct": 1, "short": "Runway debris exposure + complex shapes hard to coat.", "expl": "Wheel wells/landing gear receive more punishment than any other area: mud, water, salt, gravel and debris thrown from runways, plus complicated shapes/fittings that make complete paint coverage difficult.", "cite": "AC 43-4B p. 4-2/4-3, para. 4.6", "topic": "areas"}, {"q": "Why is complete protective-paint coverage difficult on the landing gear / wheel well area (worksheet Q9)?", "options": ["Their complicated shapes, assemblies, and fittings", "The area is too hot to paint", "Paint is banned there by regulation", "They are made of plastic"], "correct": 0, "short": "Complicated shapes, assemblies, and fittings.", "expl": "Beyond debris exposure, the complicated shapes, assemblies, and fittings of the landing gear/wheel well make complete protective-coating coverage difficult — leaving bare spots for corrosion.", "cite": "AC 43-4B p. 4-2/4-3, para. 4.6", "topic": "areas"}, {"q": "ENGINE FRONTAL areas and cooling-air vents are corrosion-prone mainly because (worksheet Q10):", "options": ["They are sealed from all airflow", "They never reach operating temperature", "Constant abrasion by dirt/gravel/rain removes protection while moist salt/pollutant-laden air flows over unpainted surfaces", "They are coated in cadmium"], "correct": 2, "short": "Abrasion strips protection; contaminated air flows over bare surfaces.", "expl": "Constant abrasion by airborne dirt, gravel and rain strips protective surfaces, and unpainted areas (cooling fins, machined mounting bases) are continuously exposed to moist, salt- or pollutant-laden air.", "cite": "AC 43-4B p. 4-9/4-10, para. 4.9", "topic": "areas"}, {"q": "Exhaust trail areas are a known corrosion trouble spot mainly because exhaust deposits combine with moisture to form:", "options": ["Mildly corrosive acids that attack the surface", "An inert protective film", "A galvanic anode", "A passive oxide layer"], "correct": 0, "short": "Mildly corrosive acids on the surface.", "expl": "Exhaust gas deposits trap and hold other corrosive agents and, with moisture, can form mildly corrosive acids — making the exhaust trail a high-priority corrosion control point.", "cite": "AC 43-4B p. 4-1, para. 4.2 (Figure 4-1)", "topic": "areas"}, {"q": "Battery compartments and vents are corrosion-prone because the electrolyte and its fumes:", "options": ["Are chemically inert", "Spread corrosive agents to nearby metal and trapped areas", "Cool the structure", "Form a protective coating"], "correct": 1, "short": "Spread corrosive agents to nearby metal.", "expl": "Battery acid (or alkaline) fumes and electrolyte spills corrode the battery box and nearby structure; vents can carry corrosive fumes downstream. Spills must be neutralized promptly.", "cite": "AC 43-4B p. 4-29, para. 4.13.2.8 (cleaning agents); see also areas guidance", "topic": "areas"}, {"q": "A protective coating that corrodes ITSELF to protect the underlying base metal is called a:", "options": ["Non-sacrificial coating", "Conversion-only coating", "Sacrificial coating", "Topcoat sealant"], "correct": 2, "short": "Sacrificial coating.", "expl": "Sacrificial coatings (cadmium, zinc, aluminum) corrode preferentially to protect the base metal. Non-sacrificial coatings protect by barrier action.", "cite": "AC 43-4B p. 4-20, para. 4.12.3", "topic": "finishes"}, {"q": "Which group lists ONLY sacrificial protective coatings (worksheet Q11)?", "options": ["Chromium plate, nickel plate, topcoat", "Conversion coating, primer, sealant", "Cadmium, zinc, aluminum", "Anodize, alodine, paint"], "correct": 2, "short": "Cadmium, zinc, aluminum.", "expl": "Sacrificial coatings are cadmium, zinc, and aluminum. Hard chromium/nickel plating, conversion coatings, primers/sealants, and topcoats are non-sacrificial.", "cite": "AC 43-4B p. 4-20, para. 4.12.3", "topic": "finishes"}, {"q": "Hard CHROMIUM plating and NICKEL plating are examples of:", "options": ["Sacrificial coatings", "Conversion coatings", "Electrolytes", "Non-sacrificial coatings"], "correct": 3, "short": "Non-sacrificial coatings.", "expl": "Hard plating (chromium, nickel) protects by forming a hard barrier, not by sacrificing itself — so it is non-sacrificial. Cadmium/zinc/aluminum are the sacrificial coatings.", "cite": "AC 43-4B p. 4-20, para. 4.12.3", "topic": "finishes"}, {"q": "Which of the following is a NON-sacrificial protective finish per worksheet Q11?", "options": ["Chemical conversion coating", "Cadmium", "Zinc", "Aluminum"], "correct": 0, "short": "Chemical conversion coating.", "expl": "Non-sacrificial finishes include hard plating (chromium, nickel), chemical conversion coatings, sealant/primers, and topcoat. Cadmium, zinc, and aluminum are sacrificial.", "cite": "AC 43-4B p. 4-20, para. 4.12.3", "topic": "finishes"}, {"q": "Primers, sealants, and the topcoat protect the base metal by:", "options": ["Forming a barrier that keeps electrolytes off the metal (non-sacrificial)", "Sacrificing themselves to corrosion", "Adding a galvanic anode", "Increasing surface conductivity"], "correct": 0, "short": "Forming a barrier (non-sacrificial).", "expl": "Sealant/primers and topcoat are non-sacrificial: they shield the metal from moisture and electrolytes by barrier action, rather than corroding in its place.", "cite": "AC 43-4B p. 4-20, para. 4.12.3", "topic": "finishes"}, {"q": "Which cleaning agent is correctly matched to neutralizing an electrolyte spill from a SULFURIC-ACID (lead-acid) battery?", "options": ["Boric acid solution", "Monobasic sodium phosphate", "Acetone", "Sodium bicarbonate (baking soda)"], "correct": 3, "short": "Sodium bicarbonate.", "expl": "Sodium bicarbonate neutralizes acidic (lead-acid/sulfuric) spills. Monobasic sodium phosphate and boric acid are for nickel-cadmium (alkaline) spills.", "cite": "AC 43-4B p. 4-29, para. 4.13.2.8", "topic": "cleaning-agents"}, {"q": "Monobasic sodium phosphate and boric acid are used to neutralize electrolyte spills from which battery type?", "options": ["Lead-acid (sulfuric)", "Nickel-cadmium", "Lithium-ion", "Dry-cell"], "correct": 1, "short": "Nickel-cadmium.", "expl": "Nickel-cadmium electrolyte is alkaline, so it is neutralized with an acidic agent (monobasic sodium phosphate and boric acid). Sodium bicarbonate handles acidic lead-acid spills.", "cite": "AC 43-4B p. 4-29, para. 4.13.2.8", "topic": "cleaning-agents"}, {"q": "Per worksheet Q12, a MILD ABRASIVE used to polish out scratches in canopy/transparency materials is:", "options": ["Plastic polish", "Sodium bicarbonate", "Boric acid", "Alkaline degreaser"], "correct": 0, "short": "Plastic polish.", "expl": "The miscellaneous cleaning agents in para. 4.13.2.8 include plastic polish (a mild abrasive to polish out scratches in canopy materials), alkaline chemicals, sodium bicarbonate, and monobasic sodium phosphate/boric acid.", "cite": "AC 43-4B p. 4-29, para. 4.13.2.8", "topic": "cleaning-agents"}, {"q": "Per worksheet Q12, ALKALINE chemicals among the miscellaneous cleaning agents are used to:", "options": ["Strip paint", "Neutralize specific acidic soils", "Anodize aluminum", "Passivate stainless"], "correct": 1, "short": "Neutralize specific acidic soils.", "expl": "Alkaline chemicals are listed as miscellaneous cleaning agents used to neutralize specific acidic soils on the aircraft surface.", "cite": "AC 43-4B p. 4-29, para. 4.13.2.8", "topic": "cleaning-agents"}, {"q": "In addition to routine maintenance, an aircraft operating in a MODERATE corrosive environment should be inspected for corrosion every:", "options": ["15 calendar days", "90 calendar days", "180 calendar days", "45 calendar days"], "correct": 3, "short": "45 calendar days.", "expl": "Suggested intervals: severe = 15 days, moderate = 45 days, mild = 90 days. The 45-day moderate interval is the worksheet Q13 answer and a classic exam number.", "cite": "AC 43-4B p. 5-1, para. 5.2 (also p. 4-21, para. 4.13.1.3)", "topic": "intervals"}, {"q": "Per AC 43-4B suggested intervals, an aircraft in a SEVERE corrosive environment should be inspected every:", "options": ["15 calendar days", "45 calendar days", "60 calendar days", "90 calendar days"], "correct": 0, "short": "15 calendar days.", "expl": "Severe = 15 days, moderate = 45 days, mild = 90 days. Severe zones get the shortest interval.", "cite": "AC 43-4B p. 4-21, para. 4.13.1.3 (also p. 5-1, para. 5.2)", "topic": "intervals"}, {"q": "Per AC 43-4B suggested intervals, an aircraft in a MILD corrosive environment should be inspected every:", "options": ["15 calendar days", "45 calendar days", "365 calendar days", "90 calendar days"], "correct": 3, "short": "90 calendar days.", "expl": "Mild zones = 90 days, moderate = 45 days, severe = 15 days. Milder environment, longer interval.", "cite": "AC 43-4B p. 4-21, para. 4.13.1.3 (also p. 5-1, para. 5.2)", "topic": "intervals"}, {"q": "Before performing a corrosion inspection, the aircraft should be (worksheet Q14):", "options": ["Defueled completely", "Stripped of all paint", "Washed (cleaned) first", "Weighed"], "correct": 2, "short": "Washed first.", "expl": "AC 43-4B directs that the aircraft be washed prior to ANY inspection for corrosion, so contaminants do not hide developing corrosion. Worksheet Q14 answer = True.", "cite": "AC 43-4B p. 5-1, para. 5.2", "topic": "intervals"}, {"q": "Which of the following is one of the nondestructive inspection (NDI) methods listed in AC 43-4B?", "options": ["Tensile testing", "Eddy current inspection", "Hardness-file testing", "Magnetic compass swing"], "correct": 1, "short": "Eddy current inspection.", "expl": "NDI methods include visual/fiber-optic, liquid (dye) penetrant, magnetic particle, eddy current, X-ray (radiographic), ultrasonic, and acoustic emission. Tensile/hardness-file are destructive/mechanical.", "cite": "AC 43-4B p. 5-12, para. 5.4.1.2", "topic": "ndi"}, {"q": "Which NDI method uses a dye drawn into surface-breaking flaws, then a developer to make the flaw visible, and is LIMITED to flaws open to the surface?", "options": ["Liquid (dye) penetrant", "Eddy current", "X-ray", "Ultrasonic"], "correct": 0, "short": "Liquid (dye) penetrant.", "expl": "Liquid penetrant reveals only surface-breaking flaws (the dye must enter an opening). Eddy current and ultrasonic find some subsurface flaws; X-ray sees internal/volumetric defects.", "cite": "AC 43-4B p. 5-12, para. 5.4.1.2", "topic": "ndi"}, {"q": "Which NDI method can ONLY be used on ferromagnetic (magnetizable) materials such as steel?", "options": ["Liquid penetrant", "Magnetic particle", "Eddy current", "Ultrasonic"], "correct": 1, "short": "Magnetic particle.", "expl": "Magnetic particle inspection requires a ferromagnetic material; it cannot be used on aluminum or other nonmagnetic metals. Penetrant, eddy current, and ultrasonic work on nonmagnetic metals too.", "cite": "AC 43-4B p. 5-12, para. 5.4.1.2", "topic": "ndi"}, {"q": "Which NDI method uses penetrating radiation to reveal internal (subsurface/volumetric) defects?", "options": ["Liquid penetrant", "Magnetic particle", "X-ray (radiographic) inspection", "Visual inspection"], "correct": 2, "short": "X-ray (radiographic) inspection.", "expl": "Radiographic (X-ray) inspection sees internal/volumetric defects, including hidden corrosion and inclusions. Penetrant and magnetic particle are limited to surface or near-surface flaws.", "cite": "AC 43-4B p. 5-12, para. 5.4.1.2", "topic": "ndi"}, {"q": "Which NDI method uses high-frequency SOUND waves to detect subsurface flaws and measure remaining thickness?", "options": ["Liquid penetrant", "Ultrasonic inspection", "Magnetic particle", "Fiber-optic borescope"], "correct": 1, "short": "Ultrasonic inspection.", "expl": "Ultrasonic uses high-frequency sound to find subsurface flaws and measure remaining thickness (useful for hidden corrosion). Penetrant/magnetic particle are surface methods.", "cite": "AC 43-4B p. 5-12, para. 5.4.1.2", "topic": "ndi"}, {"q": "Which inspection method uses a borescope/fiber-optic device to look inside areas the eye cannot directly reach (worksheet Q15 'A')?", "options": ["Ultrasonic", "Magnetic particle", "Eddy current", "Visual / fiber-optic (borescope) inspection"], "correct": 3, "short": "Visual / fiber-optic (borescope) inspection.", "expl": "Visual inspection, aided by fiber-optic borescopes, lets the inspector see hidden cavities and ducts. The worksheet Q15 list begins with visual/fiber-optic then the six AC methods.", "cite": "AC 43-4B p. 5-12, para. 5.4.1.2 (fiber optics also p. 4-14, para. 4.11.6)", "topic": "ndi"}, {"q": "Which NDI method induces eddy currents in a conductive part and detects flaws by changes in those currents (works on nonmagnetic metals like aluminum)?", "options": ["Magnetic particle", "Liquid penetrant", "Acoustic emission", "Eddy current"], "correct": 3, "short": "Eddy current.", "expl": "Eddy current inspection works on conductive metals (including nonmagnetic aluminum) and can find surface and near-surface cracks and corrosion thinning.", "cite": "AC 43-4B p. 5-12, para. 5.4.1.2", "topic": "ndi"}, {"q": "When mixing acid and water, the correct and safe procedure is to:", "options": ["Add water to acid slowly", "Mix equal amounts simultaneously", "Never add water to acid - always add acid to water", "Heat the acid first, then pour in water"], "correct": 2, "short": "Add acid to water; never add water to acid.", "expl": "Never add water to acid - the violent exothermic reaction can spatter acid. Always add acid slowly to water. Worksheet Q16(a) = True.", "cite": "AC 43-4B p. 6-1, para. 6.1.1", "topic": "safety"}, {"q": "When MIXING ALKALIS with water, AC 43-4B requires that the containers used:", "options": ["Be made of bare aluminum", "Be open to the air", "Be made to withstand the chemical heat generated", "Be pre-chilled in ice"], "correct": 2, "short": "Be made to withstand the heat generated.", "expl": "Mixing alkalis with water generates heat; use containers made to withstand the chemical heat generated. Worksheet Q16(b) = True.", "cite": "AC 43-4B p. 6-1, para. 6.1.1", "topic": "safety"}, {"q": "When using solvents, cleaners, strippers, etchants, or conversion coatings, AC 43-4B requires that you:", "options": ["Wear cotton gloves only", "Work without gloves for better feel", "Wear rubber or plastic gloves", "Apply with bare hands and rinse afterward"], "correct": 2, "short": "Wear rubber or plastic gloves.", "expl": "Rubber or plastic gloves are required when handling solvents, cleaners, strippers, etchants, or conversion coatings. Worksheet Q16(d) = True.", "cite": "AC 43-4B p. 6-1, para. 6.1.1", "topic": "safety"}, {"q": "If a paint stripper, etchant, or conversion-coating material contacts your skin or clothing, you should:", "options": ["Wash it from the body/skin/clothing immediately", "Let it dry, then brush it off", "Neutralize it with acid", "Cover it with a bandage"], "correct": 0, "short": "Wash it off immediately.", "expl": "Wash any paint stripper, etchant, or conversion coating material immediately from body, skin, or clothing - these are corrosive to tissue. Worksheet Q16(c) = True.", "cite": "AC 43-4B p. 6-1, para. 6.1.1", "topic": "safety"}, {"q": "Pits remaining after removal of corrosion products must be blended out when they are found in:", "options": ["Any structure, critical or not", "Critical and highly-stressed structural areas", "Only painted areas", "Only noncritical fairings"], "correct": 1, "short": "Critical and highly-stressed structural areas.", "expl": "In critical and highly-stressed areas, remaining pits must be blended out to prevent stress risers that cause stress-corrosion cracking. Worksheet Q17 answer.", "cite": "AC 43-4B p. 6-7, para. 6.15.3", "topic": "blendout"}, {"q": "When reworking a corrosion dish-out, AC 43-4B specifies blending the depression using a length-to-depth ratio of:", "options": ["20 to 1", "5 to 1", "10 to 1", "2 to 1"], "correct": 0, "short": "20 to 1 (length-to-depth).", "expl": "Rework depressions with a smoothly-blended dish-out using a length-to-depth ratio of 20:1. NOTE: AC 43-4B specifies only this 20:1 ratio; it does NOT state any separate 10:1 width ratio.", "cite": "AC 43-4B p. 6-7, para. 6.15.2", "topic": "blendout"}, {"q": "Blending out remaining pits in critical/highly-stressed areas is required mainly to prevent:", "options": ["Galvanic corrosion", "Filiform corrosion", "Stress risers that lead to stress-corrosion cracking", "Paint blistering"], "correct": 2, "short": "Stress risers that lead to stress-corrosion cracking.", "expl": "Sharp pits act as stress risers (concentrators) and can initiate stress-corrosion cracking or fatigue cracks in loaded structure, so they are blended smooth.", "cite": "AC 43-4B p. 6-7, para. 6.15.3", "topic": "blendout"}, {"q": "Why does AC 43-4B require a smoothly blended dish-out (20:1) rather than a sharp gouge when removing corrosion?", "options": ["To save material", "To make it look better only", "To avoid creating a sharp stress concentration in the structure", "To speed up the repair"], "correct": 2, "short": "To avoid a sharp stress concentration.", "expl": "A gradual 20:1 blended contour spreads load smoothly; an abrupt edge would concentrate stress and could initiate cracking. The ratio controls the smoothness of the cleanup.", "cite": "AC 43-4B p. 6-7, para. 6.15.2", "topic": "blendout"}, {"q": "Before resorting to chemical testing, the PRIMARY reference used to identify an aircraft metal is the:", "options": ["Aircraft Structural Repair Manual (SRM)", "Type Certificate Data Sheet", "Pilot's Operating Handbook", "Weight and balance report"], "correct": 0, "short": "The Structural Repair Manual (SRM).", "expl": "AC 43-4B: the primary method of identifying metal is the aircraft SRM. Chemical testing is used only after other methods are exhausted. Worksheet Q18 answer.", "cite": "AC 43-4B p. 6-13, para. 6.16.1.1", "topic": "metal-id"}, {"q": "Chemical testing to determine an aircraft metal's composition should be used:", "options": ["First, before any other method", "Never under any circumstances", "Only on plastics", "Only when all other identification methods are exhausted"], "correct": 3, "short": "Only when all other methods are exhausted.", "expl": "The SRM is primary; chemical testing is a last resort used only when all other identification methods have been exhausted.", "cite": "AC 43-4B p. 6-13, para. 6.16.1.2 (order: 6.16.1.1)", "topic": "metal-id"}, {"q": "Which of the following must NEVER be used to remove corrosion from an ALUMINUM surface?", "options": ["Aluminum wool", "Steel wool or a steel wire brush", "Fiber (Tampico) bristle brush", "Mild abrasive"], "correct": 1, "short": "Steel wool or steel wire brush.", "expl": "Steel wool, steel wire brushes, copper alloy brushes, and severe abrasives must never be used on aluminum - they embed dissimilar particles that start galvanic corrosion. Worksheet Q19.", "cite": "AC 43-4B p. 6-23, para. 6.51.3.1", "topic": "aluminum-cleaning"}, {"q": "Per worksheet Q19, which of these is on the 'never use on aluminum' list?", "options": ["Copper alloy brushes", "Aluminum wool", "Fiber bristle brush", "Mild abrasive"], "correct": 0, "short": "Copper alloy brushes.", "expl": "The four prohibited items for aluminum are: steel wool, steel wire brushes, copper alloy brushes, and severe abrasive materials.", "cite": "AC 43-4B p. 6-23, para. 6.51.3.1", "topic": "aluminum-cleaning"}, {"q": "Using a steel wire brush on aluminum is harmful chiefly because it:", "options": ["Scratches the anodize only", "Generates static electricity", "Removes paint too slowly", "Embeds steel particles that set up dissimilar-metal (galvanic) corrosion"], "correct": 3, "short": "Embeds steel particles -> galvanic corrosion.", "expl": "Steel (or copper) particles embedded in aluminum become future corrosion sites by forming galvanic couples. That is why steel/copper brushes and steel wool are prohibited on aluminum.", "cite": "AC 43-4B p. 6-23, para. 6.51.3.1", "topic": "aluminum-cleaning"}, {"q": "Which materials are ACCEPTABLE for removing corrosion from aluminum?", "options": ["Steel wool and emery cloth", "Copper alloy brushes and crocus cloth", "Aluminum wool, fiber (Tampico) bristle brushes, and mild abrasives", "Any wire brush"], "correct": 2, "short": "Aluminum wool, fiber bristle brushes, mild abrasives.", "expl": "Acceptable choices are aluminum wool, fiber (Tampico) bristle brushes, and mild abrasives. Steel/copper brushes, steel wool, and severe abrasives are prohibited on aluminum.", "cite": "AC 43-4B p. 6-23, para. 6.51.3.1", "topic": "aluminum-cleaning"}, {"q": "Austenitic (300-series) stainless steels resist corrosion because of a tightly adhering oxide (passive) film. If that film is broken, re-passivation does NOT restore it, and serviceability is affected, AC 43-4B says you must:", "options": ["Paint over the area", "Wire-brush the area bright", "Remove the part", "Apply cadmium plating"], "correct": 2, "short": "Remove the part.", "expl": "If corrosion occurs on austenitic steel and the part's structural integrity or serviceability is affected (film not restored by re-passivation), the part must be removed. Worksheet Q20.", "cite": "AC 43-4B p. 6-37, para. 6.74", "topic": "stainless"}, {"q": "Austenitic 300-series stainless steels are protected from corrosion primarily by:", "options": ["A sacrificial cadmium layer", "A tightly adhering passive oxide film", "Anodizing", "Galvanic anodes"], "correct": 1, "short": "A tightly adhering passive oxide film.", "expl": "Non-magnetic austenitic (300-series) stainless relies on a tight, self-healing passive oxide film. If that film is broken and cannot re-passivate, active corrosion can begin.", "cite": "AC 43-4B p. 6-37, para. 6.74", "topic": "stainless"}, {"q": "Stainless steel that shows a brown/tea-colored stain on the surface is best assessed as:", "options": ["Classic red rust requiring scrapping", "A normal protective film", "Filiform corrosion", "A rough/stained surface — evidence of corrosion attack on the passive film"], "correct": 3, "short": "Rough/stained surface = corrosion of the passive film.", "expl": "Stainless does not show classic red rust; tea-staining/brown discoloration indicates the passive film has been attacked (crevice/pitting). Table 3-1 describes a rough surface, sometimes red/brown/stained.", "cite": "AC 43-4B p. 3-4, Table 3-1 (also p. 6-37, para. 6.74)", "topic": "stainless"}, {"q": "Cadmium- and zinc-plated parts must NEVER have their coatings cleaned with a:", "options": ["Soft cloth", "Fiber bristle brush", "Wire brush", "Soap-and-water rinse"], "correct": 2, "short": "A wire brush.", "expl": "AC 43-4B: under no condition should a cadmium (or zinc) coating be cleaned with a wire brush - it would remove the thin sacrificial layer. Worksheet Q21.", "cite": "AC 43-4B p. 6-39, para. 6.81.2 (zinc: 6.81.3)", "topic": "finishes"}, {"q": "Why must a cadmium-plated part never be wire-brushed?", "options": ["It scratches paint", "It causes static", "It is too slow", "The wire brush removes the thin sacrificial cadmium layer that protects the steel"], "correct": 3, "short": "It removes the sacrificial cadmium layer.", "expl": "The cadmium layer is thin and sacrificial. A wire brush would strip it, exposing the base steel to corrosion. Clean with non-abrasive methods instead.", "cite": "AC 43-4B p. 6-39, para. 6.81.2", "topic": "finishes"}, {"q": "Properly functioning cadmium plating may show white-to-brown-to-black MOTTLING on its surface. This mottling indicates (worksheet Q22):", "options": ["The plating has failed and must be stripped", "An electrolyte spill requiring neutralization", "Filiform corrosion under the paint", "Sacrificial protection is taking place - do not remove it for appearance"], "correct": 3, "short": "Sacrificial protection working - leave it alone.", "expl": "Mottling (white to brown to black) shows the cadmium is sacrificially protecting the base metal; under no condition should it be removed merely for appearance.", "cite": "AC 43-4B p. 6-39, para. 6.81", "topic": "finishes"}, {"q": "Cadmium-plate mottling ranges in color from white to:", "options": ["Blue-green", "Bright silver", "Brown to black", "Deep red"], "correct": 2, "short": "Brown to black.", "expl": "The sacrificial-protection mottling on cadmium plate ranges from white through brown to black spots. It signals the coating is working and should not be removed for appearance.", "cite": "AC 43-4B p. 6-39, para. 6.81 (also p. 3-4, Table 3-1)", "topic": "finishes"}, {"q": "Before applying soap and water to a plastic (transparent) surface, you should FIRST (worksheet Q23):", "options": ["Flush it with fresh water to dissolve salt deposits and wash away dust", "Wipe it with acetone", "Polish it with a dry cloth", "Spray it with window cleaner"], "correct": 0, "short": "Flush with fresh water first.", "expl": "Flush plastic surfaces with fresh water first to dissolve salt and remove grit, then wash with soap and water, preferably by hand. Dry cloths and solvents scratch or craze plastic.", "cite": "FAA-H-8083-30B p. 8-24", "topic": "plastics"}, {"q": "To remove oil and grease from a plastic windshield/window, you should (worksheet Q24):", "options": ["Wipe with carbon tetrachloride", "Use lacquer thinner", "Rub gently with a cloth wet with soap and water", "Use gasoline on a rag"], "correct": 2, "short": "Rub gently with a soap-and-water-wet cloth.", "expl": "Remove oil and grease by rubbing gently with a soap-and-water cloth. Solvents like carbon tetrachloride, lacquer thinner, and gasoline soften the plastic and cause crazing.", "cite": "FAA-H-8083-30B p. 8-24", "topic": "plastics"}, {"q": "Which of the following must NOT be used on aircraft plastics because it softens the plastic and causes crazing (worksheet Q25)?", "options": ["Soap and water", "Acetone", "Fresh water", "A clean chamois"], "correct": 1, "short": "Acetone.", "expl": "Acetone, benzene, carbon tetrachloride, lacquer thinners, window-cleaning sprays, gasoline, fire-extinguisher fluid, and deicer fluid all craze plastic. Soap, water, and a chamois are safe.", "cite": "FAA-H-8083-30B p. 8-24", "topic": "plastics"}, {"q": "Worksheet Q25 lists three solvents NOT to use on plastics. They are acetone, benzene, and:", "options": ["Soap solution", "Distilled water", "Carbon tetrachloride", "Mineral oil"], "correct": 2, "short": "Carbon tetrachloride.", "expl": "The worksheet's three blanks are acetone, benzene, and carbon tetrachloride (first three of the full FAA list). All soften the plastic and cause crazing.", "cite": "FAA-H-8083-30B p. 8-24", "topic": "plastics"}, {"q": "Crazing of an aircraft plastic windshield refers to:", "options": ["A network of fine cracks/clouding caused by solvent attack or stress", "A protective oxide film", "A type of galvanic corrosion", "Sacrificial cadmium mottling"], "correct": 0, "short": "A network of fine cracks/clouding in the plastic.", "expl": "Crazing is fine cracking/clouding of plastic, commonly caused by incompatible solvents (acetone, benzene, carbon tetrachloride, etc.). It is unrelated to metal corrosion.", "cite": "FAA-H-8083-30B p. 8-24", "topic": "plastics"}, {"q": "To avoid scratching a plastic windshield, you should NOT:", "options": ["Rub it with a dry cloth", "Wash it by hand with soap and water", "Rinse it with fresh water", "Dry it with a clean chamois"], "correct": 0, "short": "Rub it with a dry cloth.", "expl": "Because the surface is soft, do not rub plastic with a dry cloth - it scratches and builds static that attracts dust. Wash by hand and dry with a chamois or absorbent cotton.", "cite": "FAA-H-8083-30B p. 8-24", "topic": "plastics"}, {"q": "Which of the following IS safe to use when drying a cleaned plastic transparency?", "options": ["A wire brush", "A clean, damp chamois or absorbent cotton", "Acetone-soaked rag", "Compressed grit"], "correct": 1, "short": "A clean, damp chamois or absorbent cotton.", "expl": "Dry plastic with a clean damp chamois or soft absorbent cotton - never a dry/abrasive cloth and never solvents, which scratch or craze the surface.", "cite": "FAA-H-8083-30B p. 8-24", "topic": "plastics"}, {"q": "Per AC 43-4B, which cleaning method is specifically noted to CRAZE plastic and should not be used on transparencies?", "options": ["Hand washing with mild soap", "Fresh-water rinse", "Soft cloth wipe", "Steam cleaning"], "correct": 3, "short": "Steam cleaning.", "expl": "AC 43-4B notes that steam cleaning crazes plastic. (The detailed solvent list that crazes plastic is in FAA-H-8083-30B p. 8-24.)", "cite": "AC 43-4B p. 4-30, para. 4.13.2.9", "topic": "plastics"}, {"q": "A mechanic finds a worm-like trail of corrosion under the painted skin of a stored aircraft kept in a humid hangar (~85% RH). The MOST likely corrosion and a good prevention step are:", "options": ["Pitting; strip all paint", "Galvanic corrosion; add a sacrificial anode", "Filiform corrosion; store below 70% RH and use low-diffusion coatings", "Fretting; lubricate the joint"], "correct": 2, "short": "Filiform; store below 70% RH.", "expl": "A worm-like trace under paint at 78-90% RH is filiform corrosion. Prevention includes storing below 70% RH, low-diffusion coatings, and washing off acidic contaminants.", "cite": "AC 43-4B p. 2-9, para. 2.5.7", "topic": "scenario"}, {"q": "During a corrosion inspection a mechanic plans to clean an aluminum panel using a power wire brush from the steel-parts bench. What is wrong with this plan?", "options": ["Nothing - wire brushing aluminum is preferred", "Aluminum cannot be cleaned at all", "Only X-ray may touch aluminum", "A steel wire brush embeds steel particles into aluminum, causing galvanic corrosion; use aluminum wool or a fiber brush"], "correct": 3, "short": "Steel brush -> embedded steel -> galvanic corrosion.", "expl": "Never use a steel wire brush (or steel wool/copper brush) on aluminum; embedded steel particles start dissimilar-metal corrosion. Use aluminum wool, fiber (Tampico) brushes, and mild abrasives.", "cite": "AC 43-4B p. 6-23, para. 6.51.3.1", "topic": "scenario"}, {"q": "A lead-acid battery has leaked electrolyte into its box. The correct neutralizing agent, and the reason cadmium mottling on the box plating should be left alone, are:", "options": ["Boric acid; mottling means failure", "Acetone; mottling is just dirt", "Sodium bicarbonate; mottling shows the cadmium is sacrificially protecting the steel", "Monobasic sodium phosphate; mottling must be wire-brushed off"], "correct": 2, "short": "Sodium bicarbonate; mottling = sacrificial protection working.", "expl": "Sodium bicarbonate neutralizes acidic (lead-acid) electrolyte. Cadmium mottling (white-to-brown-to-black) shows sacrificial protection is working and must not be removed for appearance.", "cite": "AC 43-4B p. 4-29 para. 4.13.2.8; p. 6-39 para. 6.81", "topic": "scenario"}, {"q": "A 7075 aluminum fitting was improperly heat-treated and then exposed to salt air. Which corrosion is it now MOST susceptible to, and what advanced form could follow?", "options": ["Filiform, then galvanic", "Fretting, then crazing", "Uniform etch, then passivation", "Intergranular corrosion, which can advance to exfoliation"], "correct": 3, "short": "Intergranular -> can advance to exfoliation.", "expl": "Improperly heat-treated 2014/7075 are prone to intergranular corrosion along grain boundaries, which can advance to exfoliation (lifting/swelling of surface grains).", "cite": "AC 43-4B p. 2-7, para. 2.5.5 (exfoliation: 2.5.6)", "topic": "scenario"}, {"q": "A mechanic finds tiny holes under a white powdery deposit on a magnesium gearbox housing. The corrosion form is ___ and magnesium is described as ___ to it.", "options": ["Filiform; immune", "Galvanic; resistant", "Pitting; highly susceptible", "Crevice; mildly susceptible"], "correct": 2, "short": "Pitting; highly susceptible.", "expl": "White/gray powder over tiny holes is pitting, the most common corrosion of aluminum and magnesium. Table 3-1 lists magnesium as highly susceptible to pitting.", "cite": "AC 43-4B p. 2-4 para. 2.5.2; p. 3-4 Table 3-1", "topic": "scenario"}, {"q": "To repair a shallow corrosion pit in a highly-stressed wing spar cap, the mechanic should blend the area to a smooth dish-out with a length-to-depth ratio of:", "options": ["20:1", "5:1", "10:1", "No blending - just paint over it"], "correct": 0, "short": "20:1.", "expl": "In critical/highly-stressed areas, pits must be blended out (not left as stress risers) using a smoothly contoured 20:1 length-to-depth dish-out.", "cite": "AC 43-4B p. 6-7, para. 6.15.2/6.15.3", "topic": "scenario"}];
const DRILL = [{"label": "Corrosive environments (3)", "text": "Salt air | Heavy atmospheric industrial pollution | Over-water (over-the-ocean) operations (AC 43-4B p. 1-2)"}, {"label": "Inspection intervals", "text": "Severe = 15 days | Moderate = 45 days | Mild = 90 calendar-days (AC 43-4B p. 4-21 / p. 5-1)"}, {"label": "Blend-out ratio", "text": "Length-to-depth 20:1 for corrosion dish-outs (AC 43-4B p. 6-7). [The AC states NO separate 10:1 width ratio.]"}, {"label": "Filiform corrosion", "text": "Worm-like trace under paint at 78-90% RH on slightly acidic surface; prevent by storing below 70% RH (AC 43-4B p. 2-9)"}, {"label": "Oxygen concentration cell - 3 locations", "text": "1) deposits 2) faying/riveted lap joints 3) gaskets-wood-rubber. Anode = LOW-oxygen area (AC 43-4B p. 2-6)"}, {"label": "Galvanic area ratio", "text": "Anode SMALLER than cathode = rapid, severe; anode LARGER = slow, superficial (AC 43-4B p. 2-5)"}, {"label": "Corrosive media (5)", "text": "Acids | Alkalis | Salts | Atmosphere | Water (AC 43-4B p. 2-14/2-15)"}, {"label": "Sacrificial coatings", "text": "Cadmium, Zinc, Aluminum (corrode to save the base metal) (AC 43-4B p. 4-20)"}, {"label": "Non-sacrificial coatings", "text": "Hard chrome/nickel plate, chemical conversion coatings, sealant/primers, topcoat (AC 43-4B p. 4-20)"}, {"label": "Cadmium mottling", "text": "White-to-brown-to-black = sacrificial protection working; do NOT remove. Never wire-brush cad/zinc (AC 43-4B p. 6-39)"}, {"label": "Never on aluminum", "text": "Steel wool, steel wire brush, copper alloy brush, severe abrasives -> embed dissimilar metal = galvanic corrosion (AC 43-4B p. 6-23)"}, {"label": "Battery neutralizers", "text": "Lead-acid (acid) = sodium bicarbonate | Ni-Cad (alkaline) = monobasic sodium phosphate + boric acid (AC 43-4B p. 4-29)"}, {"label": "Primary metal-ID reference", "text": "Aircraft Structural Repair Manual (SRM) - chemical testing only as a last resort (AC 43-4B p. 6-13)"}, {"label": "Acid + water rule", "text": "NEVER add water to acid - always add acid to water (AC 43-4B p. 6-1)"}, {"label": "Crazes plastic - do NOT use", "text": "Acetone, benzene, carbon tetrachloride, lacquer thinner, gasoline, window-clean spray, deicer/extinguisher fluid, steam (FAA-30B p. 8-24)"}];

const QUIZ = {
  order:[], i:0, score:0, answered:0, missed:[], shuffle:false,

  init(){
    document.getElementById('startmeta').innerHTML =
      '<b>'+DATA.length+'</b> questions &nbsp;·&nbsp; instant feedback &nbsp;·&nbsp; every answer cited';
    const t=document.getElementById('shuffleToggle');
    t.onclick=()=>{ this.shuffle=!this.shuffle; t.classList.toggle('on',this.shuffle); };
  },

  start(){
    this.order = DATA.map((_,k)=>k);
    if(this.shuffle){ for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('start').style.display='none';
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  retake(missedOnly){
    if(missedOnly && this.missed.length){ const m=this.missed.slice(); this.order=m; }
    else { this.order = DATA.map((_,k)=>k); if(this.shuffle){for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];}} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  render(){
    const idx=this.order[this.i], q=DATA[idx];
    const total=this.order.length;
    document.getElementById('counter').textContent = 'Q'+(this.i+1)+' of '+total;
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('progfill').style.width = (this.i/total*100)+'%';
    let opts='';
    q.options.forEach((o,li)=>{
      const L='ABCD'[li];
      opts += '<button class="opt" data-li="'+li+'" onclick="QUIZ.pick('+li+')">'+
              '<span class="L">'+L+'</span><span class="T">'+esc(o)+'</span><span class="mark"></span></button>';
    });
    document.getElementById('cardmount').innerHTML =
      '<div class="card"><span class="tag">'+esc(q.topic)+'</span>'+
      '<div class="stem">'+esc(q.q)+'</div>'+
      '<div class="opts" id="opts">'+opts+'</div>'+
      '<div class="fb" id="fb"></div></div>';
    document.getElementById('nextbtn').disabled = true;
    document.getElementById('skipbtn').style.display = '';
    this.locked=false;
  },

  pick(li){
    if(this.locked) return;
    this.locked=true;
    const idx=this.order[this.i], q=DATA[idx];
    const wrapEl=document.getElementById('opts'); wrapEl.classList.add('locked');
    const btns=wrapEl.querySelectorAll('.opt');
    const ok = (li===q.correct);
    btns.forEach(b=>{
      const bl=+b.dataset.li;
      if(bl===q.correct){ b.classList.add('correct'); b.querySelector('.mark').textContent='✓'; }
      if(bl===li && !ok){ b.classList.add('wrong'); b.querySelector('.mark').textContent='✗'; }
    });
    this.answered++;
    if(ok) this.score++; else this.missed.push(idx);
    const fb=document.getElementById('fb');
    fb.className='fb show '+(ok?'ok':'no');
    fb.innerHTML = '<div class="verdict">'+(ok?'✓ Correct':'✗ Incorrect')+'</div>'+
      '<div class="ans">Answer: '+'ABCD'[q.correct]+'. '+esc(q.short)+'</div>'+
      '<div class="expl">'+esc(q.expl)+'</div>'+
      '<div class="cite">📖 '+esc(q.cite)+'</div>';
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('nextbtn').disabled = false;
    document.getElementById('skipbtn').style.display = 'none';
  },

  next(skip){
    if(skip && !this.locked){ /* skipped, not answered */ }
    this.i++;
    if(this.i >= this.order.length){ this.finish(); return; }
    this.render();
    window.scrollTo({top:0,behavior:'smooth'});
  },

  finish(){
    document.getElementById('quiz').style.display='none';
    const R=document.getElementById('results');
    const total=this.answered;
    const pct = total? Math.round(this.score/total*100):0;
    const pass = pct>=70;
    let miss='';
    if(this.missed.length){
      miss='<h3 style="text-align:left;font-size:16px;color:var(--navy);margin:22px 0 8px;">Review your '+this.missed.length+' missed:</h3><div class="misslist">';
      this.missed.forEach(idx=>{ const q=DATA[idx];
        miss+='<div class="missitem"><div class="mq">'+esc(q.q)+'</div>'+
              '<div class="ma"><b>'+'ABCD'[q.correct]+'. '+esc(q.short)+'</b> — '+esc(q.expl)+'</div>'+
              '<div class="mc">📖 '+esc(q.cite)+'</div></div>';
      });
      miss+='</div>';
    } else {
      miss='<div class="allright">🎯 Perfect — every question correct!</div>';
    }
    let drillHtml='';
    if(DRILL && DRILL.length){
      drillHtml='<details class="drill"><summary>📌 High-Yield Drill Box ('+DRILL.length+' must-know facts)</summary>';
      DRILL.forEach(d=>{ drillHtml+='<div class="drillrow"><b>'+esc(d.label)+':</b> '+esc(d.text)+'</div>'; });
      drillHtml+='</details>';
    }
    R.innerHTML =
      '<h1>'+(pass?'Nice work 👍':'Keep grinding 💪')+'</h1>'+
      '<div class="bigscore">'+this.score+'<small>/'+total+'</small></div>'+
      '<div class="pct '+(pass?'pass':'fail')+'">'+pct+'%  '+(pass?'· passing (≥70%)':'· below 70%')+'</div>'+
      '<div class="nav" style="max-width:430px;margin:0 auto 4px;">'+
        '<button class="btn primary" onclick="QUIZ.retake(false)">Retake all</button>'+
        (this.missed.length?'<button class="btn ghost" onclick="QUIZ.retake(true)">Retake missed only</button>':'')+
      '</div>'+
      miss + drillHtml;
    R.style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  }
};

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('quiz').style.display==='none') return;
  const k=e.key.toLowerCase();
  if(['a','b','c','d'].includes(k)) QUIZ.pick('abcd'.indexOf(k));
  else if(['1','2','3','4'].includes(k)) QUIZ.pick(+k-1);
  else if(e.key==='Enter' && !document.getElementById('nextbtn').disabled) QUIZ.next();
});

QUIZ.init();
</script>
</body>
</html>
