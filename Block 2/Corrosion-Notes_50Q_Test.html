/AC 43.13 material.", "cite": "FAA-H-8083-30B p. 8-20, 8-23 [class notes]", "topic": "dissimilar insulation"}, {"q": "Corrosion prevention works by eliminating one or more of the four cell conditions. The four are: anode, cathode, electrolyte, and:", "options": ["Heat", "Sunlight", "Electrical contact (current path) between anode and cathode", "Vibration"], "correct": 2, "short": "Electrical contact / current path.", "expl": "Prevention eliminates one or more of: the anode (corroding metal), the cathode (dissimilar metal), the electrolyte (conductive liquid), or the electrical contact (current path) between anode and cathode.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "prevention"}, {"q": "Engine oil contributes to corrosion prevention because changing it (or replacing with preservative oil for storage):", "options": ["Increases nobility", "Anodizes the case", "Plates the bearings", "Removes absorbed contaminants / keeps moisture and contaminants out"], "correct": 3, "short": "Removes contaminants; keeps moisture out.", "expl": "Engine oil absorbs contaminants; changing oil — or using preservative oil for storage — keeps moisture/contaminants out and prevents internal corrosion.", "cite": "FAA-H-8083-30B p. 8-10, 8-11", "topic": "prevention"}, {"q": "Steel propeller blades are preserved against corrosion by:", "options": ["Anodizing", "Wiping with clean engine oil after each flight", "Cadmium dipping", "Painting with dope"], "correct": 1, "short": "Wiping with clean engine oil after each flight.", "expl": "Steel propeller blades retain a smooth, corrosion-resistant surface if wiped with clean engine oil after each flight.", "cite": "FAA-H-8083-30B p. 8-26", "topic": "prevention"}, {"q": "Dissimilar metals should always be ___ on the structure and from contact with water.", "options": ["Welded", "Insulated / separated", "Painted black", "Heat-treated"], "correct": 1, "short": "Insulated / separated.", "expl": "Dissimilar metals must be insulated/separated on the structure (and protected from water) to prevent galvanic corrosion.", "cite": "FAA-H-8083-30B p. 8-20", "topic": "dissimilar insulation"}, {"q": "Which is the FIRST listed dissimilar-metal insulation method in the notes?", "options": ["Vinyl tape", "Grease", "Washers", "Non-porous dielectric material"], "correct": 3, "short": "Non-porous dielectric material.", "expl": "The notes list insulation methods starting with non-porous dielectric material, then primer, vinyl tape, aluminum tape, washers, and grease/sealant.", "cite": "FAA-H-8083-30B p. 8-20", "topic": "dissimilar insulation"}, {"q": "Dissimilar-metal joints get at least ___ of zinc-chromate (or epoxy) primer.", "options": ["One coat", "Five coats", "No coats", "Two coats"], "correct": 3, "short": "Two coats.", "expl": "Dissimilar-metal joints are protected with at least two coats of zinc-chromate or epoxy primer.", "cite": "FAA-H-8083-30B p. 8-20", "topic": "dissimilar insulation"}, {"q": "Pressure-sensitive vinyl tape used to insulate dissimilar-metal joints is:", "options": ["0.030 inch thick", "0.10 inch thick", "0.0005 inch thick", "0.003 inch thick"], "correct": 3, "short": "0.003 inch thick.", "expl": "Dissimilar-metal joints use at least two coats of primer plus 0.003-inch pressure-sensitive vinyl tape applied smoothly without stretching.", "cite": "FAA-H-8083-30B p. 8-20", "topic": "dissimilar insulation"}, {"q": "Which is a complete list of approved dissimilar-metal separators from the notes?", "options": ["Steel wool, paint, wax", "Bare metal contact and a coat of rust", "Non-porous dielectric, 2 coats zinc-chromate/epoxy primer, 0.003\" vinyl tape, aluminum tape, washers, grease/sealant", "Only one layer of vinyl tape"], "correct": 2, "short": "Dielectric, primer, vinyl tape, aluminum tape, washers, grease/sealant.", "expl": "Six valid separators: non-porous dielectric material; at least 2 coats zinc-chromate/epoxy primer; 0.003-inch vinyl tape; aluminum tape; insulating washers; and grease or sealant.", "cite": "FAA-H-8083-30B p. 8-20", "topic": "dissimilar insulation"}, {"q": "Steel fasteners in aluminum structure (countersunk holes treated and primed) should be installed:", "options": ["Dry", "Heated", "Frozen", "Wet (coated with primer/sealant while still wet)"], "correct": 3, "short": "Wet — with primer/sealant while still wet.", "expl": "Steel fasteners in aluminum are coated with primer and installed wet (sealant/primer still wet) to insulate the dissimilar-metal contact. [class notes] — 'installed wet' is standard AC 43.13-1B practice; -30B requires primer/insulation on the contact.", "cite": "AC 43.13-1B [class notes]", "topic": "dissimilar insulation"}, {"q": "When dissimilar metals make contact in the presence of moisture, the result is:", "options": ["Both become more noble", "A protective alloy forms", "Oxidation (decomposition) of one or both metals", "Heat discoloration only"], "correct": 2, "short": "Oxidation/decomposition of one or both metals.", "expl": "Dissimilar-metal contact with moisture creates electrolytic action that oxidizes (decomposes) one or both metals — accelerated by salt water.", "cite": "FAA-H-8083-30B p. 8-20", "topic": "dissimilar metal"}];
const DRILL = [{"label": "Appearance — Aluminum/Magnesium", "text": "Gray or white powdery deposit with pitting & etching."}, {"label": "Appearance — Copper / Steel", "text": "Copper = greenish film; Steel = reddish rust (iron oxide)."}, {"label": "Two classifications", "text": "Direct chemical attack (same point) vs. electrochemical (a measurable DISTANCE apart)."}, {"label": "Four conditions for electrochemical corrosion", "text": "Anode + cathode (dissimilar metal) + electrolyte + electrical contact (path). Eliminate ANY ONE to stop it."}, {"label": "Filiform RH band", "text": "78–90% relative humidity, slightly acidic surface, under organic coating; worm-like traces."}, {"label": "Five types", "text": "Surface, Dissimilar-metal (galvanic), Intergranular, Stress, Fretting."}, {"label": "Fretting signatures", "text": "False brinelling (grooves) and the 'smoking rivet' (black ring)."}, {"label": "Detection methods", "text": "Visual (most used, 5–10X), Eddy current, Ultrasonic, Radiological (X-ray)."}, {"label": "Rework ratio", "text": "20:1 length-to-depth blended dish-out; clean width ~10× the depth."}, {"label": "Magnesium", "text": "First in the series — most chemically active / most anodic, hardest to protect. No steel tools."}, {"label": "Anodize vs. Alodine", "text": "Anodize = electrolytic factory process (insulating oxide); Alodine = non-electrolytic chemical conversion (MIL-C-5541)."}, {"label": "Alclad", "text": "Pure-aluminum cladding is the ANODE (sacrificial) protecting the stronger alloy core."}, {"label": "Hydrogen embrittlement", "text": "Hydrogen absorbed from non-approved caustic/acid cleaners — danger to high-strength steel."}, {"label": "Dissimilar-metal insulation", "text": "Dielectric, 2 coats zinc-chromate/epoxy primer, 0.003\" vinyl tape, aluminum tape, washers, grease/sealant. Steel fasteners installed WET."}, {"label": "Zinc chromate primer", "text": "MIL-P-8585A, porous film releases chromate ions, yellow-green/dark green, thinned with toluol."}];

const QUIZ = {
  order:[], i:0, score:0, answered:0, missed:[], shuffle:false,

  init(){
    document.getElementById('startmeta').innerHTML =
      '<b>'+DATA.length+'</b> questions &nbsp;·&nbsp; instant feedback &nbsp;·&nbsp; every answer cited';
    const t=document.getElementById('shuffleToggle');
    t.onclick=()=>{ this.shuffle=!this.shuffle; t.classList.toggle('on',this.shuffle); };
  },

  start(){
    this.order = DATA.map((_,k)=>k);
    if(this.shuffle){ for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('start').style.display='none';
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  retake(missedOnly){
    if(missedOnly && this.missed.length){ const m=this.missed.slice(); this.order=m; }
    else { this.order = DATA.map((_,k)=>k); if(this.shuffle){for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];}} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  render(){
    const idx=this.order[this.i], q=DATA[idx];
    const total=this.order.length;
    document.getElementById('counter').textContent = 'Q'+(this.i+1)+' of '+total;
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('progfill').style.width = (this.i/total*100)+'%';
    let opts='';
    q.options.forEach((o,li)=>{
      const L='ABCD'[li];
      opts += '<button class="opt" data-li="'+li+'" onclick="QUIZ.pick('+li+')">'+
              '<span class="L">'+L+'</span><span class="T">'+esc(o)+'</span><span class="mark"></span></button>';
    });
    document.getElementById('cardmount').innerHTML =
      '<div class="card"><span class="tag">'+esc(q.topic)+'</span>'+
      '<div class="stem">'+esc(q.q)+'</div>'+
      '<div class="opts" id="opts">'+opts+'</div>'+
      '<div class="fb" id="fb"></div></div>';
    document.getElementById('nextbtn').disabled = true;
    document.getElementById('skipbtn').style.display = '';
    this.locked=false;
  },

  pick(li){
    if(this.locked) return;
    this.locked=true;
    const idx=this.order[this.i], q=DATA[idx];
    const wrapEl=document.getElementById('opts'); wrapEl.classList.add('locked');
    const btns=wrapEl.querySelectorAll('.opt');
    const ok = (li===q.correct);
    btns.forEach(b=>{
      const bl=+b.dataset.li;
      if(bl===q.correct){ b.classList.add('correct'); b.querySelector('.mark').textContent='✓'; }
      if(bl===li && !ok){ b.classList.add('wrong'); b.querySelector('.mark').textContent='✗'; }
    });
    this.answered++;
    if(ok) this.score++; else this.missed.push(idx);
    const fb=document.getElementById('fb');
    fb.className='fb show '+(ok?'ok':'no');
    fb.innerHTML = '<div class="verdict">'+(ok?'✓ Correct':'✗ Incorrect')+'</div>'+
      '<div class="ans">Answer: '+'ABCD'[q.correct]+'. '+esc(q.short)+'</div>'+
      '<div class="expl">'+esc(q.expl)+'</div>'+
      '<div class="cite">📖 '+esc(q.cite)+'</div>';
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('nextbtn').disabled = false;
    document.getElementById('skipbtn').style.display = 'none';
  },

  next(skip){
    if(skip && !this.locked){ /* skipped, not answered */ }
    this.i++;
    if(this.i >= this.order.length){ this.finish(); return; }
    this.render();
    window.scrollTo({top:0,behavior:'smooth'});
  },

  finish(){
    document.getElementById('quiz').style.display='none';
    const R=document.getElementById('results');
    const total=this.answered;
    const pct = total? Math.round(this.score/total*100):0;
    const pass = pct>=70;
    let miss='';
    if(this.missed.length){
      miss='<h3 style="text-align:left;font-size:16px;color:var(--navy);margin:22px 0 8px;">Review your '+this.missed.length+' missed:</h3><div class="misslist">';
      this.missed.forEach(idx=>{ const q=DATA[idx];
        miss+='<div class="missitem"><div class="mq">'+esc(q.q)+'</div>'+
              '<div class="ma"><b>'+'ABCD'[q.correct]+'. '+esc(q.short)+'</b> — '+esc(q.expl)+'</div>'+
              '<div class="mc">📖 '+esc(q.cite)+'</div></div>';
      });
      miss+='</div>';
    } else {
      miss='<div class="allright">🎯 Perfect — every question correct!</div>';
    }
    let drillHtml='';
    if(DRILL && DRILL.length){
      drillHtml='<details class="drill"><summary>📌 High-Yield Drill Box ('+DRILL.length+' must-know facts)</summary>';
      DRILL.forEach(d=>{ drillHtml+='<div class="drillrow"><b>'+esc(d.label)+':</b> '+esc(d.text)+'</div>'; });
      drillHtml+='</details>';
    }
    R.innerHTML =
      '<h1>'+(pass?'Nice work 👍':'Keep grinding 💪')+'</h1>'+
      '<div class="bigscore">'+this.score+'<small>/'+total+'</small></div>'+
      '<div class="pct '+(pass?'pass':'fail')+'">'+pct+'%  '+(pass?'· passing (≥70%)':'· below 70%')+'</div>'+
      '<div class="nav" style="max-width:430px;margin:0 auto 4px;">'+
        '<button class="btn primary" onclick="QUIZ.retake(false)">Retake all</button>'+
        (this.missed.length?'<button class="btn ghost" onclick="QUIZ.retake(true)">Retake missed only</button>':'')+
      '</div>'+
      miss + drillHtml;
    R.style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  }
};

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('quiz').style.display==='none') return;
  const k=e.key.toLowerCase();
  if(['a','b','c','d'].includes(k)) QUIZ.pick('abcd'.indexOf(k));
  else if(['1','2','3','4'].includes(k)) QUIZ.pick(+k-1);
  else if(e.key==='Enter' && !document.getElementById('nextbtn').disabled) QUIZ.next();
});

QUIZ.init();
</script>
</body>
</html>
