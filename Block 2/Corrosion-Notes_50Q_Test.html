<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Corrosion Notes — 50Q Test</title>
<style>
  :root{
    --navy:#0d2a4a; --navy2:#15436e; --gold:#ffce4d; --ink:#1c2330;
    --green:#1f9d57; --greenbg:#e7f7ee; --red:#d6453d; --redbg:#fdecea;
    --line:#e3e8f0; --muted:#5a6678; --card:#ffffff; --bg:#eef2f8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:0 16px env(safe-area-inset-bottom);
  }
  .wrap{width:100%; max-width:720px; margin:0 auto;}

  /* top bar */
  .bar{position:sticky; top:0; z-index:10; background:var(--bg); padding:14px 0 8px;}
  .barrow{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted); font-weight:600;}
  .score{color:var(--navy);}
  .prog{height:8px; background:#dbe3ee; border-radius:6px; margin-top:8px; overflow:hidden;}
  .progfill{height:100%; width:0; background:linear-gradient(90deg,var(--navy2),var(--gold)); transition:width .35s ease;}

  /* card */
  .card{background:var(--card); border-radius:14px; padding:22px 20px 20px; margin-top:14px;
        box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .tag{display:inline-block; background:#eef2f8; color:var(--navy2); font-size:10.5px; font-weight:800;
       letter-spacing:.5px; padding:3px 9px; border-radius:11px; text-transform:uppercase;}
  .stem{font-size:19px; line-height:1.42; font-weight:600; margin:12px 0 18px; color:#0d1b2a;}

  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{display:flex; align-items:flex-start; gap:11px; width:100%; text-align:left;
       background:#f7f9fc; border:1.5px solid var(--line); border-radius:11px;
       padding:14px 15px; font-size:16px; line-height:1.35; cursor:pointer;
       transition:border-color .12s, background .12s, transform .05s; color:var(--ink);}
  .opt:hover:not(.locked){border-color:var(--navy2); background:#fff;}
  .opt:active:not(.locked){transform:scale(.995);}
  .opt .L{flex:0 0 26px; height:26px; border-radius:50%; background:#e6ecf4; color:var(--navy);
          font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;}
  .opt .T{flex:1; padding-top:2px;}
  .opts.locked .opt{cursor:default;}
  .opt.correct{border-color:var(--green); background:var(--greenbg);}
  .opt.correct .L{background:var(--green); color:#fff;}
  .opt.wrong{border-color:var(--red); background:var(--redbg);}
  .opt.wrong .L{background:var(--red); color:#fff;}
  .opt .mark{margin-left:auto; font-weight:800; font-size:15px; align-self:center;}
  .opt.correct .mark{color:var(--green);}
  .opt.wrong .mark{color:var(--red);}

  /* feedback */
  .fb{margin-top:16px; border-radius:11px; padding:15px 16px; display:none;}
  .fb.show{display:block; animation:rise .25s ease;}
  @keyframes rise{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .fb.ok{background:var(--greenbg); border:1px solid #b9e6cb;}
  .fb.no{background:var(--redbg); border:1px solid #f3c6c2;}
  .fb .verdict{font-weight:800; font-size:15px; margin-bottom:5px;}
  .fb.ok .verdict{color:var(--green);}
  .fb.no .verdict{color:var(--red);}
  .fb .ans{font-weight:700; margin-bottom:6px;}
  .fb .expl{font-size:14.5px; line-height:1.5; color:#27313f;}
  .fb .cite{margin-top:9px; font-size:12.5px; color:var(--muted); font-style:italic;}

  .nav{display:flex; gap:10px; margin:16px 0 26px;}
  .btn{flex:1; border:none; border-radius:11px; padding:15px; font-size:16px; font-weight:700;
       cursor:pointer; font-family:inherit;}
  .btn.primary{background:var(--navy); color:#fff;}
  .btn.primary:hover{background:var(--navy2);}
  .btn.ghost{background:#fff; color:var(--navy); border:1.5px solid var(--line);}
  .btn:disabled{opacity:.4; cursor:default;}
  .hint{text-align:center; font-size:12px; color:var(--muted); margin:-12px 0 22px;}

  /* start + results screens */
  .screen{background:var(--card); border-radius:16px; padding:30px 24px; margin-top:22px; text-align:center;
          box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .screen h1{font-size:24px; margin:0 0 6px; color:var(--navy);}
  .screen .sub{color:var(--muted); font-size:14px; margin-bottom:22px; line-height:1.45;}
  .bigscore{font-size:60px; font-weight:800; color:var(--navy); line-height:1; margin:8px 0;}
  .bigscore small{font-size:22px; color:var(--muted); font-weight:600;}
  .pct{font-size:17px; font-weight:700; margin-bottom:18px;}
  .pass{color:var(--green);} .fail{color:var(--red);}
  .opt.toggle{justify-content:center; cursor:pointer; font-weight:600; max-width:320px; margin:0 auto 18px;}
  .opt.toggle.on{border-color:var(--navy2); background:#eef4fb;}
  .misslist{text-align:left; margin-top:6px;}
  .missitem{border-left:3px solid var(--red); background:#fff6f5; border-radius:6px; padding:11px 13px; margin-bottom:10px;}
  .missitem .mq{font-weight:600; font-size:14.5px; margin-bottom:5px;}
  .missitem .ma{font-size:13.5px; color:#27313f;} .missitem .mc{font-size:12px; color:var(--muted); font-style:italic; margin-top:4px;}
  .allright{font-size:16px; color:var(--green); font-weight:700; margin:14px 0;}
  details.drill{margin:18px 0 4px; text-align:left;}
  details.drill summary{cursor:pointer; font-weight:700; color:var(--navy); font-size:15px; padding:8px 0;}
  .drillrow{border-bottom:1px solid var(--line); padding:9px 2px; font-size:13.5px;}
  .drillrow b{color:var(--navy2);}
  .foot{text-align:center; color:#9aa6b8; font-size:11px; margin:10px 0 26px;}
</style>
</head>
<body>
<div class="wrap">

  <!-- START -->
  <div id="start" class="screen">
    <h1>Corrosion Notes — 50Q Test</h1>
    <div class="sub">AIM Block 2 · General · FAA-H-8083-30B Ch. 8 · built from Matthew&#x27;s filled corrosion notes</div>
    <div id="startmeta" class="sub"></div>
    <div id="shuffleToggle" class="opt toggle"><span class="T">🔀&nbsp; Shuffle question order</span></div>
    <div class="nav" style="max-width:320px;margin:0 auto;">
      <button class="btn primary" onclick="QUIZ.start()">Start Quiz →</button>
    </div>
    <div class="hint">Tip: press A–D (or 1–4) to answer, Enter for next.</div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" style="display:none;">
    <div class="bar">
      <div class="barrow"><span id="counter">Q1</span><span class="score" id="scorelbl">Score 0/0</span></div>
      <div class="prog"><div class="progfill" id="progfill"></div></div>
    </div>
    <div id="cardmount"></div>
    <div class="nav">
      <button class="btn ghost" id="skipbtn" onclick="QUIZ.next(true)">Skip</button>
      <button class="btn primary" id="nextbtn" onclick="QUIZ.next()" disabled>Next →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="screen" style="display:none;"></div>

  <div class="foot">amt-tutor · Matt's Agency · offline study quiz</div>
</div>

<script>
const DATA  = [{"q": "Corrosion is best defined as the deterioration of metal by:", "options": ["Mechanical abrasion only", "Heat discoloration above 700 °F", "Chemical or electrochemical attack", "Fatigue cracking"], "correct": 2, "short": "Chemical or electrochemical attack.", "expl": "Corrosion is the natural deterioration of a refined metal by chemical or electrochemical attack with its environment.", "cite": "FAA-H-8083-30B p. 8-1", "topic": "definition"}, {"q": "Corrosion converts a refined metal back into a more ___ form, such as an oxide, hydroxide, or sulfide.", "options": ["Pure and ductile", "Stable / natural (metallic compound)", "Heat-treated", "Anodized"], "correct": 1, "short": "Stable / natural metallic compound.", "expl": "Corrosion returns the metal to a more chemically stable (natural) state — a metallic compound such as an oxide, hydroxide, or sulfide.", "cite": "FAA-H-8083-30B p. 8-1", "topic": "definition"}, {"q": "The MAIN source of corrosion in aircraft is water/water vapor containing salt combined with:", "options": ["Engine oil", "Atmospheric oxygen", "Hydraulic fluid", "Nitrogen"], "correct": 1, "short": "Atmospheric oxygen.", "expl": "Water or water vapor containing salt, combined with oxygen in the atmosphere, is the main source of corrosion.", "cite": "FAA-H-8083-30B p. 8-1", "topic": "corrosive agents"}, {"q": "On ALUMINUM and MAGNESIUM, corrosion typically appears as:", "options": ["Pitting and etching with a gray or white powdery deposit", "A greenish film", "A reddish rust byproduct", "A black ring"], "correct": 0, "short": "Gray/white powdery deposit, with pitting and etching.", "expl": "Aluminum and magnesium corrode to a gray or white powdery deposit with pitting and etching of the surface.", "cite": "FAA-H-8083-30B p. 8-1", "topic": "appearance"}, {"q": "On COPPER and copper alloys, corrosion appears as a:", "options": ["Gray powder", "Greenish film", "Reddish rust", "Black smoking ring"], "correct": 1, "short": "Greenish film.", "expl": "Copper and copper alloys form a greenish corrosion film.", "cite": "FAA-H-8083-30B p. 8-1", "topic": "appearance"}, {"q": "On STEEL, corrosion appears as a:", "options": ["Greenish film", "Reddish corrosion byproduct (rust)", "Gray-white powder", "Worm-like trace"], "correct": 1, "short": "Reddish byproduct — rust.", "expl": "Steel corrodes to a reddish corrosion byproduct commonly called rust (iron oxide).", "cite": "FAA-H-8083-30B p. 8-1", "topic": "appearance"}, {"q": "Aluminum corrosion products are usually easy to spot because they are:", "options": ["Reddish-brown and flaky", "White and more voluminous than the original base metal", "Greenish and waxy", "Invisible until cleaned"], "correct": 1, "short": "White and more voluminous than the base metal.", "expl": "Aluminum corrosion products are white and generally more voluminous than the original base metal.", "cite": "FAA-H-8083-30B p. 8-1, 8-18", "topic": "appearance"}, {"q": "The two general classifications that cover most corrosion are:", "options": ["Surface and pitting", "Galvanic and stress", "Direct chemical attack and electrochemical attack", "Intergranular and exfoliation"], "correct": 2, "short": "Direct chemical attack and electrochemical attack.", "expl": "The handbook divides corrosion into two general classifications: direct chemical attack and electrochemical attack.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "classifications"}, {"q": "In DIRECT chemical attack, the anodic and cathodic changes occur:", "options": ["A measurable distance apart", "Only with dissimilar metals", "Simultaneously at the SAME point", "Only under paint"], "correct": 2, "short": "At the same point, simultaneously.", "expl": "In direct (pure) chemical attack, the metal is converted to a metallic compound and the anodic and cathodic changes take place at the same point.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "direct vs electrochemical"}, {"q": "In ELECTROCHEMICAL attack, the anodic and cathodic changes take place:", "options": ["At the same point", "A measurable DISTANCE apart", "Only above 700 °F", "Without any electrolyte"], "correct": 1, "short": "A measurable distance apart.", "expl": "In electrochemical attack, the anodic and cathodic changes occur a measurable distance apart, requiring an electrolyte.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "direct vs electrochemical"}, {"q": "Direct chemical attack is an attack resulting from direct exposure of a bare surface to caustic liquid or gaseous agents. On aluminum the visible product (white/gray powdery oxide) is formed by:", "options": ["Galvanic coupling", "Fretting", "Heat discoloration", "Oxidation (a chemical reaction with oxygen)"], "correct": 3, "short": "Oxidation — a reaction with oxygen.", "expl": "Oxidation is a chemical reaction with oxygen; on aluminum it produces the white/gray powdery oxide that is the visible corrosion product.", "cite": "FAA-H-8083-30B p. 8-1", "topic": "direct vs electrochemical"}, {"q": "In the notes, Iron Oxide is defined as:", "options": ["The protective film on aluminum", "A green copper film", "The reddish-brown corrosion byproduct of steel (rust)", "An anodized coating"], "correct": 2, "short": "Rust — reddish-brown byproduct of steel.", "expl": "Iron oxide is the reddish-brown corrosion byproduct of steel, i.e., rust.", "cite": "FAA-H-8083-30B p. 8-1", "topic": "appearance"}, {"q": "Amalgamation is a chemical reaction of aluminum with ___; if spilled on aluminum it must be removed promptly and its vapors are poisonous.", "options": ["Salt water", "Battery acid", "Hydraulic fluid", "Mercury"], "correct": 3, "short": "Mercury.", "expl": "Amalgamation is a reaction of mercury with aluminum; spilled mercury must be removed promptly and mercury vapors are poisonous. [class notes] — amalgamation/mercury is AIM/AC 43-4 wording, not spelled out verbatim in -30B Ch.8.", "cite": "FAA-H-8083-30B Ch.8 / AC 43-4 [class notes]", "topic": "amalgamation"}, {"q": "Electrochemical attack may be likened chemically to the reaction in:", "options": ["A combustion engine", "A welding arc", "Electroplating, anodizing, or a dry-cell battery", "A hydraulic pump"], "correct": 2, "short": "Electroplating, anodizing, or a dry-cell battery.", "expl": "Electrochemical attack is chemically similar to the reaction in electroplating, anodizing, or a dry-cell battery.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "electrochemical"}, {"q": "If two dissimilar materials are placed in an ___ solution, a chemical reaction will occur.", "options": ["Oil", "Inert-gas", "Dry", "Electrolyte (electrolytic)"], "correct": 3, "short": "Electrolyte (electrolytic).", "expl": "Two dissimilar materials placed in an electrolyte (electrolytic) solution will set up a chemical reaction — the basis of electrochemical corrosion.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "electrochemical"}, {"q": "In electrochemical attack, electrons are removed from one metal and deposited on the other. This requires a medium, usually ___, to conduct a tiny current of electricity.", "options": ["Oil", "Water", "Air", "Grease"], "correct": 1, "short": "Water.", "expl": "The reaction needs a conductive medium — usually water — to carry the tiny current of electricity between the metals.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "electrolyte"}, {"q": "How many conditions must exist before electrochemical corrosion can occur?", "options": ["Two", "Four", "Three", "Five"], "correct": 1, "short": "Four.", "expl": "Four conditions: an anode, a cathode (dissimilar conductive metal), an electrolyte, and electrical contact (path) between anode and cathode.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "four conditions"}, {"q": "Condition #1 for electrochemical corrosion — a metal subject to corrosion — is the:", "options": ["Anode", "Cathode", "Electrolyte", "Conductor"], "correct": 0, "short": "Anode.", "expl": "The anode is condition #1: the metal that is subject to corrosion.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "four conditions"}, {"q": "Condition #2 — presence of a dissimilar conductive metal with LESS tendency to corrode — is the:", "options": ["Cathode (dissimilar conductive material)", "Anode", "Electrolyte", "Path"], "correct": 0, "short": "Cathode — dissimilar conductive material.", "expl": "The cathode is a dissimilar conductive metal that has less tendency to corrode.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "four conditions"}, {"q": "Condition #3 — a conductive fluid forming the path for electrons between anode and cathode — is the:", "options": ["Oxide film", "Electrolyte", "Anode", "Insulator"], "correct": 1, "short": "Electrolyte.", "expl": "The electrolyte is the conductive fluid that provides the path for electrons between the anode and cathode.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "four conditions"}, {"q": "Condition #4 — electrical ___ between anode and cathode (usually metal-to-metal, e.g., rivets/bolts) — completes the cell.", "options": ["Insulation", "Coating", "Distance", "Contact"], "correct": 3, "short": "Contact (path).", "expl": "Electrical contact between anode and cathode — usually metal-to-metal contact such as rivets, bolts, or corrosion — completes the path for the returning electrons.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "four conditions"}, {"q": "Elimination of ___ of the four conditions will stop electrochemical corrosion.", "options": ["All four at once", "Only the electrolyte", "Only the anode", "Any ONE"], "correct": 3, "short": "Any ONE condition.", "expl": "Eliminating any ONE of the four conditions stops electrochemical corrosion — the basis of corrosion control (most often removing the electrolyte by cleaning).", "cite": "FAA-H-8083-30B p. 8-3", "topic": "four conditions"}, {"q": "Why does eliminating the ELECTROLYTE stop corrosion?", "options": ["It removes the anode", "It makes the cathode anodic", "It heats the metal", "It breaks the conductive liquid path so the cell's current cannot flow"], "correct": 3, "short": "It breaks the conductive path so current can't flow.", "expl": "Removing the electrolyte breaks the conductive liquid path; without it the minute corrosion current cannot flow, so the cell cannot operate.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "four conditions"}, {"q": "Every metal's specific electrical potential in a given environment is called its:", "options": ["Hardness", "Nobility", "Ductility", "Tensile strength"], "correct": 1, "short": "Nobility.", "expl": "All metals and alloys have a specific electrical potential in a chemical environment; that potential is called the metal's nobility.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "electrochemical series"}, {"q": "The LESS noble a metal is, the:", "options": ["Harder it is", "More cathodic it is", "Heavier it is", "More easily it is corroded"], "correct": 3, "short": "More easily it corrodes.", "expl": "The less noble a metal, the more easily it is corroded; exposure makes the more active metal anodic and the less active metal cathodic.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "electrochemical series"}, {"q": "Small corrosion cells set up on a single alloy surface by these potential differences are called:", "options": ["Galvanic skins", "Local cells", "Heat cells", "Dry cells"], "correct": 1, "short": "Local cells.", "expl": "The differences in potential establish small anode/cathode areas on the surface called local cells.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "electrochemical"}, {"q": "The electrochemical (galvanic) series is a list of metals/alloys ranked from:", "options": ["Hardest to softest", "Cheapest to most costly", "Lightest to heaviest", "Most likely to corrode (anodic) to least likely (cathodic)"], "correct": 3, "short": "Most anodic (corrodes) to most cathodic (least likely).", "expl": "The galvanic/electrochemical series ranks metals from most anodic (most likely to corrode) to most cathodic (least likely).", "cite": "FAA-H-8083-30B p. 8-6 (Fig 8-6)", "topic": "electrochemical series"}, {"q": "Metals are grouped from the most ___ to the most ___ in the series.", "options": ["Cathodic … anodic", "Anodic … cathodic", "Noble … active", "Hard … soft"], "correct": 1, "short": "Anodic (corrodes) to cathodic (least likely).", "expl": "Metals are grouped from most anodic (most likely to corrode) to most cathodic (least likely to corrode).", "cite": "FAA-H-8083-30B p. 8-6 (Fig 8-6)", "topic": "electrochemical series"}, {"q": "TERM — 'Anode' is defined as the metal that is:", "options": ["Most noble and does not corrode", "Most active / least noble — oxidized and corrodes", "Always the electrolyte", "Always magnesium-free"], "correct": 1, "short": "Most active / least noble — it corrodes.", "expl": "The anode is the metal most likely to corrode (most active / less noble); it is oxidized and corrodes.", "cite": "FAA-H-8083-30B p. 8-6", "topic": "anode/cathode"}, {"q": "TERM — 'Cathode' is defined as the metal that is:", "options": ["Most active and corrodes first", "Least likely to corrode (most noble); does NOT corrode", "Always magnesium", "The conductive liquid"], "correct": 1, "short": "Most noble — it does not corrode.", "expl": "The cathode is the metal least likely to corrode (most noble / less active); it does not corrode.", "cite": "FAA-H-8083-30B p. 8-6", "topic": "anode/cathode"}, {"q": "TERM — 'Electrolyte' is defined as:", "options": ["A dissimilar metal", "The protective oxide film", "An inert gas", "A continuous conductive liquid path (usually water) able to conduct a tiny current"], "correct": 3, "short": "A continuous conductive liquid path, usually water.", "expl": "The electrolyte is a continuous, conductive liquid path (usually water) capable of conducting a tiny current of electricity.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "electrolyte"}, {"q": "TERM — 'Ions' are best described as:", "options": ["Neutral atoms", "Electrically charged atoms; at the anode metal ions go into solution", "Protective oxides", "Inert gas molecules"], "correct": 1, "short": "Electrically charged atoms; metal ions leave at the anode.", "expl": "Ions are electrically charged atoms; metal ions go into solution at the anode (the metal that loses electrons and corrodes). [class notes] — 'ions' is defined contextually; -30B has no standalone glossary line.", "cite": "FAA-H-8083-30B p. 8-7 [class notes]", "topic": "terms"}, {"q": "TERM — 'Chemical reaction' (corrosion): the metal is converted into a metallic compound — the metal is oxidized (anodic change) and the corrosive agent is:", "options": ["Oxidized too", "Unchanged", "Reduced (cathodic change)", "Plated"], "correct": 2, "short": "Reduced (cathodic change).", "expl": "In the corrosion chemical reaction the metal is oxidized (anodic change) and the corrosive agent is reduced (cathodic change).", "cite": "FAA-H-8083-30B p. 8-3", "topic": "terms"}, {"q": "TERM — 'Electrochemical' corrosion specifically requires an electrolyte because the anodic and cathodic changes are:", "options": ["A measurable distance apart", "At the same point", "Heat-driven", "Driven by vibration"], "correct": 0, "short": "A measurable distance apart.", "expl": "Electrochemical corrosion has anodic and cathodic changes a measurable distance apart, which requires an electrolyte (current path).", "cite": "FAA-H-8083-30B p. 8-3", "topic": "terms"}, {"q": "The most common corrosive agents are:", "options": ["Oils, greases, and waxes", "Plastics and rubber", "Acids, alkalies, and salts", "Inert gases"], "correct": 2, "short": "Acids, alkalies, and salts.", "expl": "The most common corrosive agents are acids, alkalies, and salts (the atmosphere and water also act as agents/media).", "cite": "FAA-H-8083-30B p. 8-10", "topic": "corrosive agents"}, {"q": "Among corrosive agents, the MOST destructive are the:", "options": ["Acids (e.g., battery acid, halogen acids)", "Salts", "Alkalies", "Waxes"], "correct": 0, "short": "Acids — most destructive.", "expl": "Acids are the most destructive corrosive agents — sulfuric (battery) acid, halogen acids (hydrochloric, hydrofluoric, hydrobromic), nitrous compounds, and organic acids.", "cite": "FAA-H-8083-30B p. 8-10", "topic": "corrosive agents"}, {"q": "Which group is particularly corrosive to ALUMINUM (washing soda, potash, lime)?", "options": ["Acids", "Alkalies", "Salts", "Solvents"], "correct": 1, "short": "Alkalies.", "expl": "Alkalies such as washing soda, potash (wood ashes), and lime (cement dust) are particularly corrosive to aluminum.", "cite": "FAA-H-8083-30B p. 8-10", "topic": "corrosive agents"}, {"q": "Which alkali is the EXCEPTION that aluminum alloys are highly resistant to?", "options": ["Ammonia", "Washing soda", "Potash", "Lime"], "correct": 0, "short": "Ammonia.", "expl": "Aluminum alloys are highly resistant to ammonia, even though most alkalies attack aluminum.", "cite": "FAA-H-8083-30B p. 8-10", "topic": "corrosive agents"}, {"q": "Most salt solutions are corrosive agents mainly because they are:", "options": ["Strong acids", "Inert", "Alkaline only", "Good electrolytes that promote corrosive attack"], "correct": 3, "short": "Good electrolytes.", "expl": "Most salt solutions are good electrolytes and therefore promote corrosive attack.", "cite": "FAA-H-8083-30B p. 8-10", "topic": "corrosive agents"}, {"q": "The major ATMOSPHERIC corrosive agents are:", "options": ["Nitrogen and argon", "Carbon and silicon", "Ozone and helium", "Oxygen and airborne moisture"], "correct": 3, "short": "Oxygen and airborne moisture.", "expl": "The major atmospheric corrosive agents are oxygen and airborne moisture.", "cite": "FAA-H-8083-30B p. 8-10", "topic": "corrosive agents"}, {"q": "The corrosiveness of WATER depends mainly on its:", "options": ["Temperature only", "Dissolved minerals/gases and conductivity (ability to act as an electrolyte)", "Color", "Surface tension"], "correct": 1, "short": "Its dissolved minerals/gases and conductivity.", "expl": "Water's corrosiveness depends on dissolved minerals and gases that govern its conductivity — its ability to act as an electrolyte.", "cite": "FAA-H-8083-30B p. 8-10", "topic": "corrosive agents"}, {"q": "Aircraft operated near ___ must be cleaned more often to remove salt residue.", "options": ["Mountains", "Salt water / a marine (seacoast) environment", "Deserts", "Forests"], "correct": 1, "short": "Salt water / marine (seacoast) environment.", "expl": "Aircraft near salt water / a marine (seacoast) environment need more frequent cleaning to remove corrosive salt residue.", "cite": "FAA-H-8083-30B p. 8-1, 8-2", "topic": "corrosive agents"}, {"q": "Chemical (direct) corrosion tends to occur under ___ conditions over a long period of time.", "options": ["Dry (constant-exposure)", "Wet", "Frozen", "Vibrating"], "correct": 0, "short": "Dry / constant-exposure conditions.", "expl": "Direct chemical attack from constant exposure occurs under dry conditions over a long period. [class notes] — phrasing is AIM slide-style; not verbatim in -30B.", "cite": "FAA-H-8083-30B Ch.8 [class notes]", "topic": "corrosive agents"}, {"q": "Electrochemical corrosion occurs under ___ conditions and proceeds ___.", "options": ["Dry … slowly", "Frozen … never", "Wet/moist (electrolyte present) … rapidly", "Hot … only above 700 °F"], "correct": 2, "short": "Wet/moist conditions, rapidly.", "expl": "Electrochemical corrosion needs an electrolyte, so it occurs under wet/moist conditions and proceeds rapidly (speed increases in hot, moist climates). [class notes] — AIM-style phrasing.", "cite": "FAA-H-8083-30B p. 8-2, 8-3", "topic": "corrosive agents"}, {"q": "Type of corrosion #1 listed in the 8083 (most common/general form) is:", "options": ["Stress corrosion", "Fretting corrosion", "Surface corrosion", "Filiform corrosion"], "correct": 2, "short": "Surface corrosion.", "expl": "The handbook lists surface corrosion as the first (most common) of the five types.", "cite": "FAA-H-8083-30B p. 8-5", "topic": "types"}, {"q": "Type of corrosion #2 — caused by contact of two unlike metals plus an electrolyte — is:", "options": ["Intergranular", "Stress", "Dissimilar metal (galvanic) corrosion", "Fretting"], "correct": 2, "short": "Dissimilar metal (galvanic) corrosion.", "expl": "Dissimilar metal corrosion (galvanic) is the second type listed.", "cite": "FAA-H-8083-30B p. 8-6", "topic": "types"}, {"q": "Type of corrosion #3 — an attack along the grain boundaries of an alloy — is:", "options": ["Surface", "Fretting", "Intergranular corrosion", "Filiform"], "correct": 2, "short": "Intergranular corrosion.", "expl": "Intergranular corrosion is the third type — attack along an alloy's grain boundaries.", "cite": "FAA-H-8083-30B p. 8-7", "topic": "types"}, {"q": "Type of corrosion #4 — caused by sustained tensile stress plus a corrosive environment — is:", "options": ["Surface", "Fretting", "Stress corrosion (stress-corrosion cracking)", "Dissimilar metal"], "correct": 2, "short": "Stress corrosion (cracking).", "expl": "Stress corrosion / stress-corrosion cracking is the fourth type.", "cite": "FAA-H-8083-30B p. 8-8", "topic": "types"}, {"q": "Type of corrosion #5 — between two surfaces at rest with slight relative motion — is:", "options": ["Fretting corrosion", "Filiform", "Intergranular", "Exfoliation"], "correct": 0, "short": "Fretting corrosion.", "expl": "Fretting corrosion is the fifth type listed.", "cite": "FAA-H-8083-30B p. 8-9", "topic": "types"}, {"q": "The notes state additional types of corrosion are listed in which documents?", "options": ["AC 43.13 and AC 43-4 (43.4)", "14 CFR 43 and 91", "FAA-H-8083-31B and -32B", "TCDS and AD notes"], "correct": 0, "short": "AC 43.13 and AC 43-4.", "expl": "The worksheet cites AC 43.13 and AC 43-4 for additional/in-depth corrosion types; -30B p.8-1 points to AC 43-4 (Corrosion Control for Aircraft). [class notes]", "cite": "AC 43.13 / AC 43-4 [class notes]", "topic": "types"}, {"q": "Surface corrosion appears as a general roughening, etching, or pitting, often with a powdery deposit. Under a coating it may first show as:", "options": ["A worm-like trace", "A green film", "Small blisters where the paint/plating lifts off", "A black ring"], "correct": 2, "short": "Small blisters lifting the coating.", "expl": "Hidden surface corrosion lifts the surface coating (paint or plating) into small blisters from the pressure of corrosion products.", "cite": "FAA-H-8083-30B p. 8-5", "topic": "surface corrosion"}, {"q": "Uniform etch corrosion results from a direct chemical or electrochemical attack; on a polished surface it first shows as:", "options": ["Lifted metal layers", "A green film", "A general dulling, then frosted/etched/pitted surface", "A reddish streak"], "correct": 2, "short": "General dulling, then a frosted/etched/pitted surface.", "expl": "Uniform etch first appears as a general dulling of the surface; if allowed to continue the surface becomes rough and frosted (etched/pitted).", "cite": "FAA-H-8083-30B p. 8-5", "topic": "surface corrosion"}, {"q": "The general dulling/discoloration of metal from exposure to elevated temperatures is ___ — and is NOT uniform etch corrosion.", "options": ["Filiform", "Pitting", "Heat discoloration / oxidation", "Fretting"], "correct": 2, "short": "Heat discoloration / oxidation (not corrosion).", "expl": "Discoloration from heat is oxidation/heat discoloration, not uniform etch corrosion; colored surface oxides can form on some alloys above 700 °F. [class notes] — AIM-style distractor line.", "cite": "FAA-H-8083-30B p. 8-3 (Fig 8-2 note)", "topic": "surface corrosion"}, {"q": "Pitting and filiform corrosion are forms of ___ on a metal surface.", "options": ["Stress corrosion", "Fretting", "Direct chemical attack", "Concentration cell corrosion (surface attack on coated metal)"], "correct": 3, "short": "Concentration cell / surface attack on coated metal.", "expl": "Pitting and filiform are forms of concentration cell corrosion — surface attack on coated metal.", "cite": "FAA-H-8083-30B p. 8-6, 8-7", "topic": "surface corrosion"}, {"q": "The most common effect of corrosion on aluminum and magnesium alloys, resembling dust blotching the surface, is:", "options": ["Pitting corrosion", "Filiform", "Fretting", "Exfoliation"], "correct": 0, "short": "Pitting corrosion.", "expl": "Pitting is the most common corrosion effect on aluminum and magnesium — a white/gray powdery deposit like dust that blotches the surface.", "cite": "FAA-H-8083-30B p. 8-6", "topic": "pitting"}, {"q": "When the pitting deposit is cleaned away, you can see tiny ___ in the surface.", "options": ["Worm trails", "Green spots", "Holes or pits", "Brinell grooves"], "correct": 2, "short": "Holes or pits.", "expl": "Cleaning the powdery deposit reveals tiny holes or pits in the surface — the signature of pitting corrosion.", "cite": "FAA-H-8083-30B p. 8-6", "topic": "pitting"}, {"q": "Pitting can be severe in other alloys when ___ absorb moisture on the surface.", "options": ["Oil films", "Paint chips", "Oxide films", "Flux residues (hygroscopic)"], "correct": 3, "short": "Flux residues (hygroscopic).", "expl": "Hygroscopic flux residues absorb moisture and tend to cause severe pitting.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "pitting"}, {"q": "Filiform corrosion is a special form of ___ corrosion that occurs under organic coatings.", "options": ["Stress", "Oxygen concentration cell", "Direct chemical", "Fretting"], "correct": 1, "short": "Oxygen concentration cell.", "expl": "Filiform is a special form of oxygen concentration cell corrosion that occurs under organic coatings (paint).", "cite": "FAA-H-8083-30B p. 8-5", "topic": "filiform"}, {"q": "Filiform corrosion is recognized by its characteristic:", "options": ["Green powder", "Worm-like trace (series of small worms) under the paint", "Lifted metal layers", "Black ring"], "correct": 1, "short": "Worm-like trace under the paint.", "expl": "Filiform shows as a series of small worm-like traces beneath the paint film.", "cite": "FAA-H-8083-30B p. 8-5", "topic": "filiform"}, {"q": "Filiform corrosion is often seen on surfaces that were improperly ___ prior to painting (slightly acidic surface).", "options": ["Heat-treated", "Anodized", "Cleaned / surface-prepared", "Riveted"], "correct": 2, "short": "Cleaned / surface-prepared.", "expl": "Filiform appears where the surface was improperly cleaned/prepared (left slightly acidic) before painting.", "cite": "FAA-H-8083-30B p. 8-5", "topic": "filiform"}, {"q": "Filiform corrosion typically occurs when relative humidity is between:", "options": ["20–40 percent", "50–60 percent", "78–90 percent", "Above 95 percent"], "correct": 2, "short": "78–90 percent RH.", "expl": "Filiform occurs when relative humidity is 78–90 percent and the surface is slightly acidic; storing below ~70% RH helps prevent it.", "cite": "FAA-H-8083-30B p. 8-5", "topic": "filiform"}, {"q": "The 78–90% range that drives filiform corrosion is a value of:", "options": ["Temperature in °F", "Salt concentration", "Relative humidity", "pH"], "correct": 2, "short": "Relative humidity.", "expl": "78–90 percent is the relative-humidity band in which filiform corrosion develops.", "cite": "FAA-H-8083-30B p. 8-5", "topic": "filiform"}, {"q": "If filiform corrosion is left untreated, it can lead to ___, especially around fasteners and seams.", "options": ["Fretting", "Heat discoloration", "Intergranular corrosion", "Hydrogen embrittlement"], "correct": 2, "short": "Intergranular corrosion.", "expl": "Untreated filiform corrosion can progress to intergranular corrosion, particularly around fasteners and at seams.", "cite": "FAA-H-8083-30B p. 8-5", "topic": "filiform"}, {"q": "Dissimilar metal corrosion is also called:", "options": ["Galvanic (electrolytic) corrosion", "Intergranular corrosion", "Fretting", "Uniform etch"], "correct": 0, "short": "Galvanic (electrolytic) corrosion.", "expl": "Dissimilar metal corrosion = galvanic (electrolytic) corrosion.", "cite": "FAA-H-8083-30B p. 8-6, 8-20", "topic": "dissimilar metal"}, {"q": "Galvanic corrosion occurs when two dissimilar metals make ___ contact in the presence of an electrolyte.", "options": ["Insulated", "No", "Electrical (metal-to-metal)", "Painted"], "correct": 2, "short": "Electrical (metal-to-metal) contact.", "expl": "Galvanic corrosion occurs when two dissimilar metals make electrical (metal-to-metal) contact in the presence of an electrolyte.", "cite": "FAA-H-8083-30B p. 8-10", "topic": "dissimilar metal"}, {"q": "For an aluminum skin next to a steel screw, the rate of galvanic corrosion depends on the difference in ___ between the metals.", "options": ["Hardness", "Color", "Activity (position in the galvanic series)", "Weight"], "correct": 2, "short": "Activity (galvanic-series position).", "expl": "The rate depends on the difference in activity — their separation in the galvanic/electrochemical series. Greater difference = faster corrosion.", "cite": "FAA-H-8083-30B p. 8-10, 8-6", "topic": "dissimilar metal"}, {"q": "Because of activity differences, materials are grouped together so that similar metals are used together to:", "options": ["Increase weight", "Improve paint bond", "Raise nobility", "Eliminate the possibility of galvanic corrosion"], "correct": 3, "short": "Eliminate galvanic corrosion.", "expl": "Grouping similar metals (close in the series) minimizes the potential difference and helps eliminate galvanic corrosion.", "cite": "FAA-H-8083-30B p. 8-6, 8-20", "topic": "dissimilar metal"}, {"q": "In the galvanic series, the pairing with the GREATEST activity difference (most severe couple) is:", "options": ["2024 and 1100 aluminum", "Brass and copper", "Magnesium and gold/graphite", "Nickel and silver"], "correct": 2, "short": "Magnesium and gold/graphite.", "expl": "Magnesium is most anodic and gold/graphite most cathodic — the largest potential difference and most severe galvanic couple.", "cite": "FAA-H-8083-30B p. 8-6", "topic": "electrochemical series"}, {"q": "Forcing small steel particles into aluminum with a steel wire brush or steel wool can cause:", "options": ["Filiform corrosion", "Heat oxidation", "Stress corrosion", "Dissimilar (galvanic) metal corrosion"], "correct": 3, "short": "Dissimilar (galvanic) metal corrosion.", "expl": "Embedding steel particles in aluminum creates dissimilar-metal corrosion sites; never use steel wool/steel brushes on aluminum or magnesium.", "cite": "FAA-H-8083-30B p. 8-19", "topic": "dissimilar metal"}, {"q": "If dissimilar metals (steel screw in aluminum skin) are in contact with a corrosive agent, dissimilar-metal corrosion can then continue as:", "options": ["Filiform corrosion", "Intergranular corrosion", "Fretting", "Heat discoloration"], "correct": 1, "short": "Intergranular corrosion.", "expl": "Galvanic (dissimilar-metal) corrosion at a steel-screw/aluminum-skin joint can progress into intergranular corrosion.", "cite": "FAA-H-8083-30B p. 8-7 (Fig 8-14)", "topic": "dissimilar metal"}, {"q": "Intergranular corrosion is an attack along ___ of an alloy, commonly from a lack of uniformity in the alloy structure.", "options": ["The surface oxide", "Rivet heads", "The paint film", "The grain boundaries"], "correct": 3, "short": "The grain boundaries.", "expl": "Intergranular corrosion attacks along grain boundaries and commonly results from a lack of uniformity (e.g., improper heat treatment) in the alloy.", "cite": "FAA-H-8083-30B p. 8-7", "topic": "intergranular"}, {"q": "Intergranular corrosion can form between the grain boundaries of areas that are:", "options": ["Spot-welded together", "Painted", "Anodized", "Lubricated"], "correct": 0, "short": "Spot-welded together.", "expl": "Intergranular corrosion can form at the grain boundaries of spot-welded seams.", "cite": "FAA-H-8083-30B p. 8-7, 8-14", "topic": "intergranular"}, {"q": "Intergranular corrosion (along grain boundaries) is detected with ___ equipment.", "options": ["Litmus paper", "Ultrasonic and eddy current", "Magnifying glass only", "A straight-edge ruler"], "correct": 1, "short": "Ultrasonic and eddy current.", "expl": "Subsurface intergranular/exfoliation corrosion is detected with ultrasonic and eddy current inspection equipment.", "cite": "FAA-H-8083-30B p. 8-7, 8-9", "topic": "detection"}, {"q": "Damage from intergranular corrosion is repaired ONLY by:", "options": ["Painting over it", "Adding more rivets", "Anodizing", "Mechanical removal of all corrosion products and delaminated layers"], "correct": 3, "short": "Mechanical removal of all corrosion/delaminated layers.", "expl": "Intergranular damage is repaired only by mechanical removal of all corrosion products and delaminated metal; then evaluate remaining strength (DER if limits are exceeded).", "cite": "FAA-H-8083-30B p. 8-19", "topic": "intergranular"}, {"q": "Exfoliation corrosion is best described as a/an:", "options": ["Surface powder", "Worm-like trace", "Pitting in tubing", "Advanced form of intergranular corrosion that lifts surface grains in layers"], "correct": 3, "short": "Advanced intergranular corrosion that lifts grains in layers.", "expl": "Exfoliation is an advanced form of intergranular corrosion; expanding corrosion products at grain boundaries lift the surface grains in layers.", "cite": "FAA-H-8083-30B p. 8-7", "topic": "exfoliation"}, {"q": "Exfoliation forms most often in ___ such as spars (where grain thickness is less).", "options": ["Cast magnesium cases", "Extruded sections", "Polished Alclad skin", "Steel cables"], "correct": 1, "short": "Extruded sections.", "expl": "Exfoliation is most often seen in extruded sections like spars, where grain thickness is less than in rolled forms.", "cite": "FAA-H-8083-30B p. 8-7", "topic": "exfoliation"}, {"q": "Exfoliation forces the metal to:", "options": ["Separate (lift) in layers / delaminate", "Form a green film", "Develop a black ring", "Shrink uniformly"], "correct": 0, "short": "Separate / delaminate in layers.", "expl": "Expanding corrosion products at the grain boundaries force the metal to separate (lift) in layers — delamination.", "cite": "FAA-H-8083-30B p. 8-7", "topic": "exfoliation"}, {"q": "Exfoliation corrosion is typically detected by ___ inspection.", "options": ["Ultrasonic", "Litmus", "Visual only", "Magnetic particle"], "correct": 0, "short": "Ultrasonic.", "expl": "Exfoliation (a subsurface corrosion) is detected by ultrasonic inspection.", "cite": "FAA-H-8083-30B p. 8-7, 8-13", "topic": "exfoliation"}, {"q": "Stress corrosion occurs from the combined effect of sustained ___ and a damaging chemical environment.", "options": ["Tensile stress (constant or cyclic)", "Compressive stress", "Heat only", "Vibration only"], "correct": 0, "short": "Sustained tensile stress (constant or cyclic).", "expl": "Stress corrosion results from sustained tensile stress (constant or cyclic) acting together with a damaging/corrosive chemical environment.", "cite": "FAA-H-8083-30B p. 8-8", "topic": "stress corrosion"}, {"q": "Stress-corrosion cracking occurs along lines of external loading (surface) or ___ stress (under the surface).", "options": ["Compressive", "Thermal", "Magnetic", "Internal (trapped, residual)"], "correct": 3, "short": "Internal (trapped/residual) stress.", "expl": "Cracking occurs along lines of external loading on the surface or internal (trapped/residual) stress under the surface.", "cite": "FAA-H-8083-30B p. 8-8", "topic": "stress corrosion"}, {"q": "Internal stresses are produced during ___ (e.g., cold-working or unequal cooling).", "options": ["Painting", "Cleaning", "Manufacturing processes", "Inspection"], "correct": 2, "short": "Manufacturing processes.", "expl": "Internal (residual) stresses are produced during manufacturing — cold-working, unequal cooling, etc.", "cite": "FAA-H-8083-30B p. 8-8", "topic": "stress corrosion"}, {"q": "Stress-corrosion cracking is defined as a ___ of the metal caused by sustained tensile stress and a corrosive environment.", "options": ["Discoloration", "Polishing", "Plating", "Failure (cracking)"], "correct": 3, "short": "Failure / cracking.", "expl": "Stress-corrosion cracking is a failure (cracking) of the metal that progresses along grain boundaries under constant tensile stress in a corrosive environment.", "cite": "FAA-H-8083-30B p. 8-8", "topic": "stress corrosion"}, {"q": "Fretting corrosion occurs between two mating surfaces, normally at rest, that are subject to slight:", "options": ["Heat", "Relative motion (vibration)", "Chemical immersion", "Electrical current"], "correct": 1, "short": "Relative motion (vibration).", "expl": "Fretting occurs when two surfaces normally at rest undergo slight relative motion (vibration).", "cite": "FAA-H-8083-30B p. 8-9", "topic": "fretting"}, {"q": "Fretting corrosion is characterized by ___ of the surfaces and generation of considerable finely divided debris.", "options": ["Pitting", "Greening", "Blistering", "Cracking"], "correct": 0, "short": "Pitting (plus fine debris).", "expl": "Fretting is characterized by pitting of the surfaces and the generation of considerable quantities of finely divided debris.", "cite": "FAA-H-8083-30B p. 8-9", "topic": "fretting"}, {"q": "Deep grooves resembling brinell marks worn into a bearing surface by fretting are called:", "options": ["False brinelling", "Smoking rivets", "Exfoliation", "Pitting trails"], "correct": 0, "short": "False brinelling.", "expl": "Where contact areas are small and sharp, fretting wears grooves resembling brinell marks — called false brinelling.", "cite": "FAA-H-8083-30B p. 8-9", "topic": "fretting"}, {"q": "The classic indication of fretting corrosion on an aircraft rivet is a:", "options": ["Green film", "Black ring (smoking rivet) trailing toward the tail", "White whisker", "Worm-like trace"], "correct": 1, "short": "Black ring — the 'smoking rivet'.", "expl": "Fretting on rivets shows as a black ring — the 'smoking rivet' — typically trailing toward the tail after flight.", "cite": "FAA-H-8083-30B p. 8-9", "topic": "fretting"}, {"q": "Regarding moisture and fretting, the notes state that parts must be ___ when fretting occurs (water vapor increases the reaction).", "options": ["Lubricated (and fasteners properly torqued)", "Anodized", "Painted", "Heat-treated"], "correct": 0, "short": "Lubricated (and fasteners properly torqued).", "expl": "To control fretting, parts must be lubricated and fasteners properly torqued; water vapor increases the reaction. [class notes] — 'parts must be ___' phrasing is AIM-style.", "cite": "FAA-H-8083-30B p. 8-9 [class notes]", "topic": "fretting"}, {"q": "Corrosion Detection Method #1 — the most widely used — uses magnifying glasses, mirrors, flashlight, and borescopes. It is:", "options": ["Eddy current", "Ultrasonic", "Visual", "Radiological"], "correct": 2, "short": "Visual (most widely used).", "expl": "Visual inspection is the most widely used method, aided by a 5–10X magnifier, flashlight, inspection mirror, and borescope.", "cite": "FAA-H-8083-30B p. 8-13", "topic": "detection"}, {"q": "Visual corrosion inspection commonly uses a magnifier of about:", "options": ["5–10X", "1–2X", "50X", "100X"], "correct": 0, "short": "5–10X.", "expl": "A 5–10X magnifying glass is used with a flashlight and inspection mirror for visual corrosion inspection.", "cite": "FAA-H-8083-30B p. 8-13", "topic": "detection"}, {"q": "Detection Method #2 — induced electrical currents detect surface and subsurface cracks/corrosion — is:", "options": ["Ultrasonic", "Eddy current", "Radiological", "Dye penetrant"], "correct": 1, "short": "Eddy current.", "expl": "Eddy current uses induced electrical currents to detect surface and subsurface cracks/corrosion; it requires calibrated equipment and a reference standard.", "cite": "FAA-H-8083-30B p. 8-13", "topic": "detection"}, {"q": "Detection Method #3 — high-frequency sound waves detect subsurface corrosion/thinning (e.g., exfoliation) — is:", "options": ["Eddy current", "Visual", "Ultrasonic", "Radiological"], "correct": 2, "short": "Ultrasonic.", "expl": "Ultrasonic uses high-frequency sound waves to detect subsurface corrosion and thinning such as exfoliation; it requires calibration and a reference standard.", "cite": "FAA-H-8083-30B p. 8-13, 8-7", "topic": "detection"}, {"q": "Detection Method #4 — penetrating radiation reveals hidden/internal corrosion — is:", "options": ["Eddy current", "Ultrasonic", "Visual", "Radiological (X-ray)"], "correct": 3, "short": "Radiological (X-ray).", "expl": "Radiological (X-ray) uses penetrating radiation to reveal hidden/internal corrosion; it requires calibrated equipment and certified NDI personnel.", "cite": "FAA-H-8083-30B p. 8-13", "topic": "detection"}, {"q": "Which detection methods require properly calibrated equipment and a reference standard each time used?", "options": ["Visual and tactile", "Eddy current, ultrasonic, and radiological (X-ray)", "Litmus and pH paper", "Dry-wash and polishing"], "correct": 1, "short": "Eddy current, ultrasonic, and X-ray.", "expl": "Eddy current, ultrasonic, and X-ray each require calibrated equipment and a controlling reference standard for reliable results.", "cite": "FAA-H-8083-30B p. 8-13", "topic": "detection"}, {"q": "Battery compartments stay corrosion-prone mainly because:", "options": ["They hold magnesium castings", "They see high-velocity air", "They trap exhaust gas", "Fumes from overheated electrolyte spread to adjacent cavities"], "correct": 3, "short": "Electrolyte fumes spread to adjacent cavities.", "expl": "Fumes from overheated electrolyte are hard to contain and spread to adjacent cavities, attacking unprotected metal; check the sump jar and test for acid/alkali with litmus paper.", "cite": "FAA-H-8083-30B p. 8-11", "topic": "corrosion-prone"}, {"q": "Battery boxes are vented to outside air through a vent containing a porous pad moistened with:", "options": ["Chromic acid", "Kerosene", "A neutralizing agent (bicarbonate of soda)", "Stoddard solvent"], "correct": 2, "short": "A neutralizing agent — bicarbonate of soda.", "expl": "Battery vent systems use a porous pad moistened with a neutralizing agent (bicarbonate of soda) to neutralize acid fumes.", "cite": "FAA-H-8083-30B p. 8-11", "topic": "corrosion-prone"}, {"q": "Engine exhaust trail areas are corrosion-prone because exhaust deposits are:", "options": ["Alkaline and harmless", "An inert film", "Self-neutralizing", "Very corrosive, collecting at gaps, seams, hinges, and fairings downstream"], "correct": 3, "short": "Very corrosive — collect at gaps/seams/hinges/fairings.", "expl": "Both reciprocating and turbine exhaust deposits are very corrosive and give trouble at gaps, seams, hinges, and fairings downstream of the exhaust.", "cite": "FAA-H-8083-30B p. 8-11", "topic": "corrosion-prone"}, {"q": "Lavatory and food-service areas are corrosion-prone because:", "options": ["They run hot", "Spilled food/waste attracts and retains moisture causing corrosive attack", "They are exposed to exhaust", "They are magnesium"], "correct": 1, "short": "Spilled food/waste retains moisture.", "expl": "Spilled food and waste attract and retain moisture, causing corrosive attack; clean these areas frequently and maintain sealant and paint.", "cite": "FAA-H-8083-30B p. 8-12", "topic": "corrosion-prone"}, {"q": "Which area 'receives more punishment' from mud, water, salt, gravel, and debris than any other?", "options": ["The wheel well and landing gear", "The empennage", "The cockpit", "Fuel tank vents"], "correct": 0, "short": "Wheel well and landing gear.", "expl": "The wheel well and landing gear receive more punishment from mud, water, salt, gravel, and debris than any other area; their complex shapes are hard to coat (check magnesium wheels, B-nuts, struts).", "cite": "FAA-H-8083-30B p. 8-12", "topic": "corrosion-prone"}, {"q": "Abrasion by high-velocity air removes protective coatings on:", "options": ["Engine frontal areas and cooling-air vents (some have abrasion strips)", "Battery boxes", "Bilge areas", "Control cables"], "correct": 0, "short": "Engine frontal areas / cooling-air vents.", "expl": "High-velocity air abrades protective coatings on engine frontal areas and cooling-air vents (some aircraft use abrasion strips).", "cite": "FAA-H-8083-30B p. 8-13", "topic": "corrosion-prone"}, {"q": "Corrosion that 'first appears along seams and lap joints,' starting in spot-welded seams (checked with a straight-edge ruler for waviness), is:", "options": ["Spot-weld / seam (concentration cell / crevice) corrosion", "Filiform", "Fretting", "Pitting"], "correct": 0, "short": "Spot-weld / seam (crevice) corrosion.", "expl": "Concentration-cell / crevice corrosion appears along seams and lap joints, starting in spot-welded seams; waviness is checked with a straight-edge ruler.", "cite": "FAA-H-8083-30B p. 8-13", "topic": "corrosion-prone"}, {"q": "Organic growth that grows into ___ around rivet heads and seams in the exhaust trail attaches to aluminum skin and causes oxygen-concentration-cell corrosion.", "options": ["Scum / slime (micro-organisms)", "Paint", "Sealant", "Primer"], "correct": 0, "short": "Scum / slime (micro-organisms).", "expl": "Organic growth (micro-organisms) forms scum/slime that attaches to aluminum skin, causing oxygen-concentration-cell corrosion; water in fuel can seep through sealers causing similar growth.", "cite": "FAA-H-8083-30B p. 8-12", "topic": "corrosion-prone"}, {"q": "Piano-type hinges are prime corrosion spots mainly because:", "options": ["They are all magnesium", "They run hot from braking", "The steel pin contacts the aluminum hinge (dissimilar metals) and traps moisture (electrolyte)", "They see exhaust gas"], "correct": 2, "short": "Steel pin + aluminum hinge + trapped moisture.", "expl": "Piano hinges combine a steel pin with an aluminum hinge (dissimilar metals) and trap moisture that acts as the electrolyte.", "cite": "FAA-H-8083-30B p. 8-13", "topic": "corrosion-prone"}, {"q": "Areas where movable surfaces (flaps, spoilers) move back into the structure and trap dirt/water are the:", "options": ["Wing flap and spoiler recesses (inspect deployed)", "Battery boxes", "Bilge areas", "Exhaust trails"], "correct": 0, "short": "Wing flap and spoiler recesses.", "expl": "Flap and spoiler recesses collect dirt and water unnoticed while retracted; inspect them with the surfaces fully deployed.", "cite": "FAA-H-8083-30B p. 8-13", "topic": "corrosion-prone"}, {"q": "Low-point areas where debris and liquids accumulate, with drain holes that may become clogged, are the:", "options": ["Cockpit", "Engine frontal area", "Water entrapment areas (low-point drains)", "Fuel vents"], "correct": 2, "short": "Water entrapment areas (low-point drains).", "expl": "Water entrapment areas collect debris and liquids; drain holes are provided but may clog and must be kept clear.", "cite": "FAA-H-8083-30B p. 8-12", "topic": "corrosion-prone"}, {"q": "Control cables are inspected for corrosion by:", "options": ["Immersing them in acid", "Random cleaning of short sections with solvent-soaked cloths", "Sand-blasting", "Heating to 700 °F"], "correct": 1, "short": "Random cleaning of short sections with solvent cloths.", "expl": "Inspect cables by random cleaning of short sections with solvent-soaked cloths; water between cables causes corrosion if left unprotected. Replace cables with internal corrosion.", "cite": "FAA-H-8083-30B p. 8-13", "topic": "corrosion-prone"}, {"q": "Bilge areas and engine mounts (tubular steel structure) are corrosion-prone because starter current returns through the mounts and waste fluids collect. Welded steel tubular elements are periodically protected with:", "options": ["Hot linseed oil (filled then drained)", "Chromic acid", "Battery electrolyte", "Stoddard solvent"], "correct": 0, "short": "Hot linseed oil (filled, then drained).", "expl": "Welded steel tube structures are filled with hot linseed oil and drained to prevent internal corrosion. [class notes] — the hot-linseed-oil tube treatment is AC 43.13-1B welded-tubular-steel practice, not -30B Ch.8 verbatim.", "cite": "AC 43.13-1B [class notes]", "topic": "corrosion-prone"}, {"q": "Bilge areas specifically are corrosion-prone because:", "options": ["High-velocity air abrades coatings", "Exhaust gas accumulates", "Waste fluids, water, and debris collect and residual oil masks hidden water cells", "Anodizing wears away"], "correct": 2, "short": "Waste fluids/water collect; oil masks hidden water.", "expl": "Bilge areas collect waste hydraulic fluid, water, dirt, and debris; residual oil masks small water pools that set up hidden corrosion cells.", "cite": "FAA-H-8083-30B p. 8-12", "topic": "corrosion-prone"}, {"q": "A complete corrosion treatment, step 1, is:", "options": ["Applying paint", "Cleaning and stripping of the corroded area", "Neutralizing", "Heat-treating"], "correct": 1, "short": "Cleaning and stripping the area.", "expl": "Step 1 of a complete corrosion treatment is cleaning and stripping (removing the finish from) the corroded area.", "cite": "FAA-H-8083-30B p. 8-14", "topic": "treatment steps"}, {"q": "Complete corrosion treatment, step 2, is to ___ any residual materials remaining in pits and crevices.", "options": ["Neutralize", "Paint", "Anodize", "Polish"], "correct": 0, "short": "Neutralize.", "expl": "Step 2 is neutralizing residual corrosive materials in pits and crevices.", "cite": "FAA-H-8083-30B p. 8-14", "topic": "treatment steps"}, {"q": "Complete corrosion treatment, step 3, is to ___ protective surface films.", "options": ["Remove", "Strip", "Restore", "Ignore"], "correct": 2, "short": "Restore.", "expl": "Step 3 is restoring protective surface films that were removed.", "cite": "FAA-H-8083-30B p. 8-14", "topic": "treatment steps"}, {"q": "Complete corrosion treatment, final step, is:", "options": ["Leaving the metal bare", "Applying temporary or permanent coatings or paint finishes", "Pickling in acid", "Heat-treating"], "correct": 1, "short": "Applying temporary/permanent coatings or paint.", "expl": "The final step is applying temporary or permanent coatings or paint finishes.", "cite": "FAA-H-8083-30B p. 8-14", "topic": "treatment steps"}, {"q": "Corrosion under paint cannot be inspected until the paint is:", "options": ["Stripped (area masked/contained)", "Flown off", "Anodized", "Heated"], "correct": 0, "short": "Stripped.", "expl": "Corrosion under paint can't be assessed until the finish is stripped; mask/contain the area and protect rubber, acrylics, plastics, and sealants from the stripper.", "cite": "FAA-H-8083-30B p. 8-14, 8-15", "topic": "treatment steps"}, {"q": "When stripping/cleaning corrosion, you must NOT use steel wool or a steel wire brush on:", "options": ["Steel parts", "Cadmium plating", "Titanium fasteners", "Aluminum or magnesium"], "correct": 3, "short": "Aluminum or magnesium.", "expl": "Never use steel wool or a steel wire brush on aluminum or magnesium — embedded steel particles cause dissimilar-metal corrosion.", "cite": "FAA-H-8083-30B p. 8-14, 8-19", "topic": "treatment steps"}, {"q": "If corrosion is severe, it may be easier to ___ than to treat it; some parts must be replaced due to the extent of corrosion.", "options": ["Paint", "Anneal", "Anodize", "Replace the part"], "correct": 3, "short": "Replace the part.", "expl": "Where corrosion is extensive, replacing the part can be easier than treating it; some parts must be replaced.", "cite": "FAA-H-8083-30B p. 8-14", "topic": "treatment steps"}, {"q": "When reworking corrosion depressions, clean an area around the pits to a width about 10× the depth and a length of about:", "options": ["5× the depth", "20× the depth (20:1 length-to-depth)", "2× the depth", "50× the depth"], "correct": 1, "short": "20× the depth (20:1 ratio).", "expl": "Rework depressions as smoothly blended dish-outs using a 20:1 length-to-depth ratio (width ~10× the depth).", "cite": "FAA-H-8083-30B p. 8-15, 8-16", "topic": "treatment steps"}, {"q": "The '20:1' figure in corrosion rework refers to the:", "options": ["Length-to-depth ratio of the blended dish-out", "Solvent dilution", "Cure time in hours", "RH percentage"], "correct": 0, "short": "Length-to-depth ratio.", "expl": "20:1 is the length-to-depth ratio used when blending a corrosion dish-out.", "cite": "FAA-H-8083-30B p. 8-15, 8-16", "topic": "treatment steps"}, {"q": "In treating ferrous materials, iron oxide (rust) is a problem because it:", "options": ["Forms a protective barrier", "Neutralizes acids", "Causes alloys to corrode and must have all traces removed", "Forms only above 700 °F"], "correct": 2, "short": "It causes further corrosion; remove all traces.", "expl": "Iron oxide (rust) causes alloys to corrode; all traces must be removed (mechanically) because rust is not protective and promotes more attack.", "cite": "FAA-H-8083-30B p. 8-15", "topic": "ferrous"}, {"q": "On highly stressed steel parts, corrosion is removed with fine stone or fine abrasive paper — NOT brushes — because:", "options": ["Brushes are too slow", "Brushes leave paint", "Brushes cause filiform", "Wire brushing/blasting can damage or notch high-stress steel"], "correct": 3, "short": "To avoid damaging high-stress steel.", "expl": "On highly stressed steel parts use fine stone or fine abrasive paper (not brushes/blasting) to avoid creating stress risers; this removes corrosion safely.", "cite": "FAA-H-8083-30B p. 8-17", "topic": "ferrous"}, {"q": "Mechanical corrosion removal methods include wire brushes, abrasive paper, abrasive blasting (sand, aluminum oxide, glass beads), and:", "options": ["Mild abrasive (rouge, fine-grit aluminum oxide) / nonwoven abrasive pad", "Steel wool on aluminum", "Acid immersion", "Sandpaper on magnesium only"], "correct": 0, "short": "Mild abrasive (rouge, fine aluminum oxide) / nonwoven pad.", "expl": "Methods also include mild abrasives (rouge, fine-grit aluminum oxide, buffing compound on cloth wheels) and nonwoven abrasive pads.", "cite": "FAA-H-8083-30B p. 8-17", "topic": "ferrous"}, {"q": "Hydrogen embrittlement is a chemical reaction causing ___ to be absorbed into metals, often from non-approved or commercial caustic/acid cleaning compounds.", "options": ["Oxygen", "Carbon", "Hydrogen", "Chromium"], "correct": 2, "short": "Hydrogen.", "expl": "Hydrogen embrittlement is the absorption of hydrogen into metals, often caused by non-approved/commercial caustic or acid cleaning compounds.", "cite": "FAA-H-8083-30B p. 8-17", "topic": "hydrogen embrittlement"}, {"q": "Chemical rust removers are restricted on high-strength steel parts (without engineering authorization) because they can cause:", "options": ["Exfoliation", "Filiform corrosion", "Anodizing", "Hydrogen embrittlement"], "correct": 3, "short": "Hydrogen embrittlement.", "expl": "High-strength steel is subject to hydrogen embrittlement, so chemical corrosion removers require engineering authorization.", "cite": "FAA-H-8083-30B p. 8-17", "topic": "hydrogen embrittlement"}, {"q": "Plating (electroplating) is best described as:", "options": ["A non-electrolytic chemical dip", "A painted organic coating", "A thin coating of one metal electrolytically deposited onto another", "A buffing process"], "correct": 2, "short": "One metal electrolytically deposited on another.", "expl": "Plating/electroplating is a thin coating of one metal electrolytically deposited on another (e.g., cadmium on steel).", "cite": "FAA-H-8083-30B p. 8-21, 8-22", "topic": "protective coatings"}, {"q": "In an electroplating setup from the notes, the part to be plated is connected to the ___ terminal and the coating metal to the ___ terminal, both in an electrolyte.", "options": ["Positive … negative", "Positive … positive", "Ground … ground", "Negative (cathode) … positive (anode)"], "correct": 3, "short": "Part = cathode (negative); coating metal = anode (positive).", "expl": "In plating the steel part is the cathode (connected negative) and the cadmium/chromium coating metal is the anode (connected positive), both immersed in an electrolyte.", "cite": "FAA-H-8083-30B p. 8-22", "topic": "protective coatings"}, {"q": "A SACRIFICIAL coating (such as cadmium or zinc on steel) is the ___; it corrodes rather than the base metal.", "options": ["Cathode", "Anode", "Electrolyte", "Insulator"], "correct": 1, "short": "Anode.", "expl": "A sacrificial coating is anodic to the base metal — it becomes the anode and corrodes preferentially, protecting the base metal.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "protective coatings"}, {"q": "Cadmium is used as a sacrificial plating on steel because cadmium is:", "options": ["More noble than steel", "Anodic to steel and corrodes preferentially to protect it", "Harder than steel", "Heat-resistant"], "correct": 1, "short": "Anodic to steel — corrodes to protect it.", "expl": "Cadmium is anodic to steel, so it corrodes sacrificially (uniform surface corrosion of the plating) and protects the steel base.", "cite": "FAA-H-8083-30B p. 8-3", "topic": "protective coatings"}, {"q": "In organic-coating (painting) surface prep, the surface is first prepared by:", "options": ["Dry abrasive blasting", "Acid pickling", "Hot linseed oil", "Flame treatment"], "correct": 0, "short": "Dry abrasive blasting.", "expl": "Organic-coating surface prep begins with dry abrasive blasting to clean and roughen the surface.", "cite": "FAA-H-8083-30B p. 8-22, 8-23", "topic": "protective coatings"}, {"q": "Before primer adheres, cadmium-plated parts must be etched with ___ solution.", "options": ["Aliphatic naphtha", "Linseed oil", "Butyrate dope", "Chromic acid (10% chromic acid activated with sulfuric acid)"], "correct": 3, "short": "Chromic acid solution.", "expl": "Cadmium-plated parts are etched with chromic acid (10% chromic acid activated with sulfuric acid) so the primer will adhere.", "cite": "FAA-H-8083-30B p. 8-22, 8-23", "topic": "protective coatings"}, {"q": "In the painting sequence, after surface prep you coat with ___ before topcoat.", "options": ["Wax", "Dope", "Primer (zinc chromate or epoxy primer)", "Lacquer thinner"], "correct": 2, "short": "Primer (zinc chromate or epoxy).", "expl": "After prep you apply primer (zinc chromate or epoxy primer); allow it to dry at least one hour before painting.", "cite": "FAA-H-8083-30B p. 8-20, 8-23", "topic": "protective coatings"}, {"q": "After priming, you must allow the primer to dry at least ___ before painting.", "options": ["One hour", "10 minutes", "24 hours", "One week"], "correct": 0, "short": "One hour (minimum).", "expl": "Allow the primer to dry at least one hour before painting (6 hours air-dry between primer coats on dissimilar-metal joints).", "cite": "FAA-H-8083-30B p. 8-20", "topic": "protective coatings"}, {"q": "The most effective barrier between metal surfaces and a corrosive environment is:", "options": ["A good, intact protective paint finish", "A coat of grease", "An oxide film alone", "Dry air"], "correct": 0, "short": "A good, intact paint finish.", "expl": "A good, intact protective paint finish is the most effective barrier against corrosion.", "cite": "FAA-H-8083-30B p. 8-23", "topic": "protective coatings"}, {"q": "The notes give one-word coating DEFINITIONS. 'Tough decorative coating' = :", "options": ["Lacquer", "Epoxy", "Dope", "Enamel"], "correct": 3, "short": "Enamel.", "expl": "Enamel = a tough decorative coating. [class notes] — these one-word coating definitions are AIM/AC 43.13 list-style; -30B names polyurethane enamel/epoxy/dope but not each as a single matched term.", "cite": "FAA-H-8083-30B p. 8-23 [class notes]", "topic": "protective coatings"}, {"q": "Coating definition — 'protective glossy finish' = :", "options": ["Dope", "Lacquer (or polyurethane enamel)", "Epoxy", "Primer"], "correct": 1, "short": "Lacquer / polyurethane enamel.", "expl": "Lacquer (polyurethane enamel) = a protective glossy finish. [class notes]", "cite": "FAA-H-8083-30B p. 8-23 [class notes]", "topic": "protective coatings"}, {"q": "Coating definition — 'chemical-resistant finishing material' = :", "options": ["Lacquer", "Epoxy (two-part epoxy paint)", "Dope", "Wax"], "correct": 1, "short": "Epoxy (two-part epoxy paint).", "expl": "Epoxy (two-part epoxy paint) = a chemical-resistant finishing material. [class notes]", "cite": "FAA-H-8083-30B p. 8-23 [class notes]", "topic": "protective coatings"}, {"q": "Coating definition — material 'used to shrink cotton/linen fabric' = :", "options": ["Lacquer", "Epoxy", "Primer", "Dope (nitrate dope, then butyrate dope)"], "correct": 3, "short": "Dope.", "expl": "Dope (nitrate dope then butyrate dope) is used to shrink and protect cotton/linen fabric. [class notes]", "cite": "FAA-H-8083-30B p. 8-23 [class notes]", "topic": "protective coatings"}, {"q": "Which dope 'will not cause lifting or softening' of an existing finish?", "options": ["Nitrate dope", "Butyrate dope", "Epoxy", "Lacquer"], "correct": 1, "short": "Butyrate dope.", "expl": "Butyrate dope does not cause lifting or softening (unlike nitrate dope over some finishes). [class notes]", "cite": "FAA-H-8083-30B p. 8-23 [class notes]", "topic": "protective coatings"}, {"q": "A 'compatible finish system' is best described as a:", "options": ["Single coat of wax", "Bare metal", "Group of chemically compatible materials (primer + topcoat that bond together)", "Sacrificial plating"], "correct": 2, "short": "Group of chemically compatible materials.", "expl": "A compatible finish system is a group of chemically compatible materials — primer plus topcoat that bond together. [class notes]", "cite": "FAA-H-8083-30B p. 8-23 [class notes]", "topic": "protective coatings"}, {"q": "___ dissolves oil/grease, does not harm rubber/acrylic, and is used to wipe surfaces clean before painting.", "options": ["Chromic acid", "Aliphatic naphtha", "Battery electrolyte", "Linseed oil"], "correct": 1, "short": "Aliphatic naphtha.", "expl": "Aliphatic naphtha dissolves oil and grease without harming rubber or acrylics and is used to wipe surfaces clean before painting.", "cite": "FAA-H-8083-30B p. 8-26", "topic": "protective coatings"}, {"q": "Among aircraft construction metals, MAGNESIUM is:", "options": ["The most noble and corrosion-resistant", "Always the cathode", "First in the series — the most chemically active (most anodic) and hardest to protect", "Immune in moist air"], "correct": 2, "short": "Most chemically active / most anodic — hardest to protect.", "expl": "Magnesium is first in the electrochemical series — the most chemically active (most anodic) metal in aircraft and the most difficult to protect.", "cite": "FAA-H-8083-30B p. 8-19, 8-6", "topic": "magnesium"}, {"q": "Magnesium may experience stress-corrosion cracking in:", "options": ["Moist air", "Dry nitrogen", "Pure water only", "Vacuum"], "correct": 0, "short": "Moist air.", "expl": "Magnesium alloys may stress-corrode in moist air (salt water attacks steel/aluminum; methyl-alcohol/HCl attacks titanium).", "cite": "FAA-H-8083-30B p. 8-8", "topic": "magnesium"}, {"q": "Mechanical corrosion removal on non-ferrous metals (magnesium/aluminum) uses non-metallic (hog-bristle) brushes and:", "options": ["Steel wire brushes", "Carbide-tipped cutting tools", "Iron scrapers", "Steel wool"], "correct": 1, "short": "Carbide-tipped cutting tools.", "expl": "Non-ferrous removal uses non-metallic (hog-bristle) brushes and carbide-tipped cutting tools — never steel wool, steel wire brushes, or steel tools on magnesium/aluminum.", "cite": "FAA-H-8083-30B p. 8-19", "topic": "magnesium"}, {"q": "When cleaning corroded magnesium you must NOT use:", "options": ["Hog-bristle brushes", "Nonwoven abrasive pads", "Chromic-acid solution", "Steel wire brushes or steel cutting tools"], "correct": 3, "short": "Steel wire brushes / steel cutting tools.", "expl": "Steel wire brushes, carborundum abrasives, and steel tools must never be used on magnesium; use stiff hog-bristle/nonmetallic tools.", "cite": "FAA-H-8083-30B p. 8-19", "topic": "magnesium"}, {"q": "Pure aluminum forms a dense ___ so air cannot penetrate, preventing further corrosion — but it is not strong enough for aircraft structures.", "options": ["Aluminum oxide film (protective oxide)", "Rust layer", "Cadmium plate", "Paint film"], "correct": 0, "short": "Aluminum oxide film (protective oxide).", "expl": "Pure aluminum forms a dense aluminum oxide film that blocks air and prevents further corrosion, but pure aluminum is too weak for structures.", "cite": "FAA-H-8083-30B p. 8-18, 8-22", "topic": "alclad/anodize"}, {"q": "___ is pure aluminum rolled/clad over a stronger aluminum alloy; the pure cladding is sacrificial (anodic).", "options": ["Alclad", "Anodize", "Alodine", "Cadmium plate"], "correct": 0, "short": "Alclad.", "expl": "Alclad is relatively pure aluminum clad over a stronger alloy; the pure cladding is anodic (sacrificial) and protects the alloy core. Avoid mechanically removing the Alclad layer.", "cite": "FAA-H-8083-30B p. 8-18", "topic": "alclad/anodize"}, {"q": "In Alclad, the sacrificial (anodic) layer is the:", "options": ["Pure-aluminum cladding", "Stronger alloy core", "Anodized oxide", "Primer"], "correct": 0, "short": "The pure-aluminum cladding.", "expl": "The pure-aluminum cladding is anodic to (and sacrificially protects) the stronger alloy core.", "cite": "FAA-H-8083-30B p. 8-18", "topic": "alclad/anodize"}, {"q": "ANODIZING is best described as a/an:", "options": ["Simple field chemical dip", "Mechanical buffing", "Painting step", "Electrolytic factory process — part bathed in a chromic-acid (lead vat) bath with the part as the positive pole"], "correct": 3, "short": "Electrolytic factory process (chromic-acid bath).", "expl": "Anodizing is an electrolytic factory process; the part is bathed in chromic acid and water (lead vat) with the aluminum as the positive pole, thickening the protective oxide film.", "cite": "FAA-H-8083-30B p. 8-19, 8-22", "topic": "alclad/anodize"}, {"q": "Anodizing causes the surface to take on a light/dark gray color and acts as a/an:", "options": ["Electric insulator (poor conductor)", "Electrical conductor", "Sacrificial anode", "Heat sink"], "correct": 0, "short": "Electric insulator (poor conductor).", "expl": "The anodic (oxide) coating is a poor conductor — an electric insulator — so it must be removed where a bonding wire attaches.", "cite": "FAA-H-8083-30B p. 8-19, 8-22", "topic": "alclad/anodize"}, {"q": "ALODIZING (Alodine) is best described as a/an:", "options": ["Simple non-electrolytic (chemical conversion) coating for all aluminum alloys", "Electrolytic factory-only process", "Mechanical sanding", "Heat treatment"], "correct": 0, "short": "Non-electrolytic chemical conversion coating.", "expl": "Alodizing is a simple non-electrolytic chemical conversion process forming an oxide film with chromic acid and water (MIL-C-5541 / Alodine 1201); it is replacing anodizing in field work.", "cite": "FAA-H-8083-30B p. 8-22", "topic": "alodine/anodize"}, {"q": "The military spec / brand associated with the alodine chemical conversion coating is:", "options": ["MIL-P-8585A", "MIL-A-8625", "Stoddard solvent", "MIL-C-5541 / Alodine 1201"], "correct": 3, "short": "MIL-C-5541 / Alodine 1201.", "expl": "Alodizing uses MIL-C-5541 / Alodine 1201 to increase corrosion resistance and paint-bonding qualities.", "cite": "FAA-H-8083-30B p. 8-22", "topic": "alodine/anodize"}, {"q": "Before alodizing, all corrosion must be removed and the cleaned surface must support an unbroken:", "options": ["Oxide layer", "Paint coat", "Water-break-free rinse film", "Primer film"], "correct": 2, "short": "Unbroken (water-break-free) rinse film.", "expl": "All corrosion must be removed before alodizing, and the surface must support an unbroken (water-break-free) rinse film, confirming cleanliness.", "cite": "FAA-H-8083-30B p. 8-22", "topic": "alodine/anodize"}, {"q": "For alodizing, the chemical conversion solution is applied and kept ___ for about 2–5 minutes, then rinsed.", "options": ["Wet", "Dry", "Frozen", "Hot above 700 °F"], "correct": 0, "short": "Wet (keep wet) 2–5 minutes.", "expl": "Apply the alodine chemical 2–5 minutes, keeping the surface wet, then rinse.", "cite": "FAA-H-8083-30B p. 8-22", "topic": "alodine/anodize"}, {"q": "Alodine improves corrosion resistance AND:", "options": ["Hardness", "Electrical conductivity", "Weight", "Paint adhesion / paint-bonding qualities"], "correct": 3, "short": "Paint adhesion / paint-bonding qualities.", "expl": "Alodine improves paint adhesion (paint-bonding qualities) along with corrosion resistance.", "cite": "FAA-H-8083-30B p. 8-22", "topic": "alodine/anodize"}, {"q": "Which statement about anodize vs. alodine is correct?", "options": ["Anodize is electrolytic; alodine is a non-electrolytic chemical conversion", "Both are electrolytic", "Alodine is electrolytic; anodize is chemical", "Neither helps paint adhesion"], "correct": 0, "short": "Anodize = electrolytic; alodine = chemical conversion.", "expl": "Anodizing uses electric current (electrolytic); alodizing/Alodine is a non-electrolytic chemical conversion. Both improve corrosion resistance and paint bond.", "cite": "FAA-H-8083-30B p. 8-19, 8-22", "topic": "alodine/anodize"}, {"q": "A thin natural aluminum oxide film (about 0.001\"–0.0025\" thick) is:", "options": ["Not detrimental — a protective hard-shell barrier", "Severe corrosion to remove", "Always rust", "An anodized coating only"], "correct": 0, "short": "Not detrimental — protective hard shell.", "expl": "This thin natural oxide (0.001–0.0025\") is not detrimental; it forms a protective hard-shell barrier and is not the severe corrosion of concern.", "cite": "FAA-H-8083-30B p. 8-18", "topic": "alclad/anodize"}, {"q": "A 10% chromic acid solution activated with sulfuric acid is used mainly to:", "options": ["Strip paint", "Treat/inhibit corroded aluminum (and magnesium), restoring the protective oxide film", "Plate cadmium", "Remove hydrogen"], "correct": 1, "short": "Treat corroded aluminum/magnesium and restore the oxide film.", "expl": "A 10% chromic acid solution activated by sulfuric acid treats corroded aluminum (and magnesium), restoring the protective oxide film.", "cite": "FAA-H-8083-30B p. 8-22", "topic": "alodine/anodize"}, {"q": "Zinc chromate primer is specified under:", "options": ["MIL-C-5541", "MIL-A-8625", "MIL-P-8585A", "AC 43-4"], "correct": 2, "short": "MIL-P-8585A.", "expl": "Zinc chromate primer is specified under MIL-P-8585A. [class notes] — the specific MIL number is AIM/AC 43.13 material; -30B confirms zinc chromate/epoxy primer for dissimilar-metal joints.", "cite": "FAA-H-8083-30B p. 8-20 [class notes]", "topic": "dissimilar insulation"}, {"q": "Zinc chromate primer protects partly because its porous film:", "options": ["Releases chromate ions when wetted, inhibiting electrolytic action", "Seals out all oxygen permanently", "Conducts current to the cathode", "Hardens into metal plate"], "correct": 0, "short": "Releases chromate ions to inhibit electrolytic action.", "expl": "Zinc chromate primer is a porous film; when wetted it releases chromate ions that inhibit electrolytic (corrosion) action.", "cite": "FAA-H-8083-30B p. 8-20", "topic": "dissimilar insulation"}, {"q": "The color of zinc chromate primer is:", "options": ["Red oxide", "Gray", "Black", "Yellow-green or dark green"], "correct": 3, "short": "Yellow-green or dark green.", "expl": "Zinc chromate primer is yellow-green or dark green in color.", "cite": "FAA-H-8083-30B p. 8-20", "topic": "dissimilar insulation"}, {"q": "Zinc chromate primer is thinned with ___ (a less-flammable solvent), and applied using a filter mask or respirator.", "options": ["Water", "Gasoline", "Kerosene", "Toluol / toluene (approved primer thinner)"], "correct": 3, "short": "Toluol / toluene (less-flammable thinner).", "expl": "Zinc chromate is thinned with toluol/toluene (the approved, less-flammable thinner); use a filter mask or respirator. [class notes] — thinner detail is AIM
