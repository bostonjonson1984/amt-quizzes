<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Block 2 Tools &amp; Measuring Devices — Notes Review</title>
<style>
  :root{
    --navy:#0d2a4a; --navy2:#15436e; --gold:#ffce4d; --ink:#1c2330;
    --green:#1f9d57; --greenbg:#e7f7ee; --red:#d6453d; --redbg:#fdecea;
    --line:#e3e8f0; --muted:#5a6678; --card:#ffffff; --bg:#eef2f8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:0 16px env(safe-area-inset-bottom);
  }
  .wrap{width:100%; max-width:720px; margin:0 auto;}

  /* top bar */
  .bar{position:sticky; top:0; z-index:10; background:var(--bg); padding:14px 0 8px;}
  .barrow{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted); font-weight:600;}
  .score{color:var(--navy);}
  .prog{height:8px; background:#dbe3ee; border-radius:6px; margin-top:8px; overflow:hidden;}
  .progfill{height:100%; width:0; background:linear-gradient(90deg,var(--navy2),var(--gold)); transition:width .35s ease;}

  /* card */
  .card{background:var(--card); border-radius:14px; padding:22px 20px 20px; margin-top:14px;
        box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .tag{display:inline-block; background:#eef2f8; color:var(--navy2); font-size:10.5px; font-weight:800;
       letter-spacing:.5px; padding:3px 9px; border-radius:11px; text-transform:uppercase;}
  .stem{font-size:19px; line-height:1.42; font-weight:600; margin:12px 0 18px; color:#0d1b2a;}

  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{display:flex; align-items:flex-start; gap:11px; width:100%; text-align:left;
       background:#f7f9fc; border:1.5px solid var(--line); border-radius:11px;
       padding:14px 15px; font-size:16px; line-height:1.35; cursor:pointer;
       transition:border-color .12s, background .12s, transform .05s; color:var(--ink);}
  .opt:hover:not(.locked){border-color:var(--navy2); background:#fff;}
  .opt:active:not(.locked){transform:scale(.995);}
  .opt .L{flex:0 0 26px; height:26px; border-radius:50%; background:#e6ecf4; color:var(--navy);
          font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;}
  .opt .T{flex:1; padding-top:2px;}
  .opts.locked .opt{cursor:default;}
  .opt.correct{border-color:var(--green); background:var(--greenbg);}
  .opt.correct .L{background:var(--green); color:#fff;}
  .opt.wrong{border-color:var(--red); background:var(--redbg);}
  .opt.wrong .L{background:var(--red); color:#fff;}
  .opt .mark{margin-left:auto; font-weight:800; font-size:15px; align-self:center;}
  .opt.correct .mark{color:var(--green);}
  .opt.wrong .mark{color:var(--red);}

  /* feedback */
  .fb{margin-top:16px; border-radius:11px; padding:15px 16px; display:none;}
  .fb.show{display:block; animation:rise .25s ease;}
  @keyframes rise{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .fb.ok{background:var(--greenbg); border:1px solid #b9e6cb;}
  .fb.no{background:var(--redbg); border:1px solid #f3c6c2;}
  .fb .verdict{font-weight:800; font-size:15px; margin-bottom:5px;}
  .fb.ok .verdict{color:var(--green);}
  .fb.no .verdict{color:var(--red);}
  .fb .ans{font-weight:700; margin-bottom:6px;}
  .fb .expl{font-size:14.5px; line-height:1.5; color:#27313f;}
  .fb .cite{margin-top:9px; font-size:12.5px; color:var(--muted); font-style:italic;}

  .nav{display:flex; gap:10px; margin:16px 0 26px;}
  .btn{flex:1; border:none; border-radius:11px; padding:15px; font-size:16px; font-weight:700;
       cursor:pointer; font-family:inherit;}
  .btn.primary{background:var(--navy); color:#fff;}
  .btn.primary:hover{background:var(--navy2);}
  .btn.ghost{background:#fff; color:var(--navy); border:1.5px solid var(--line);}
  .btn:disabled{opacity:.4; cursor:default;}
  .hint{text-align:center; font-size:12px; color:var(--muted); margin:-12px 0 22px;}

  /* start + results screens */
  .screen{background:var(--card); border-radius:16px; padding:30px 24px; margin-top:22px; text-align:center;
          box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .screen h1{font-size:24px; margin:0 0 6px; color:var(--navy);}
  .screen .sub{color:var(--muted); font-size:14px; margin-bottom:22px; line-height:1.45;}
  .bigscore{font-size:60px; font-weight:800; color:var(--navy); line-height:1; margin:8px 0;}
  .bigscore small{font-size:22px; color:var(--muted); font-weight:600;}
  .pct{font-size:17px; font-weight:700; margin-bottom:18px;}
  .pass{color:var(--green);} .fail{color:var(--red);}
  .opt.toggle{justify-content:center; cursor:pointer; font-weight:600; max-width:320px; margin:0 auto 18px;}
  .opt.toggle.on{border-color:var(--navy2); background:#eef4fb;}
  .misslist{text-align:left; margin-top:6px;}
  .missitem{border-left:3px solid var(--red); background:#fff6f5; border-radius:6px; padding:11px 13px; margin-bottom:10px;}
  .missitem .mq{font-weight:600; font-size:14.5px; margin-bottom:5px;}
  .missitem .ma{font-size:13.5px; color:#27313f;} .missitem .mc{font-size:12px; color:var(--muted); font-style:italic; margin-top:4px;}
  .allright{font-size:16px; color:var(--green); font-weight:700; margin:14px 0;}
  details.drill{margin:18px 0 4px; text-align:left;}
  details.drill summary{cursor:pointer; font-weight:700; color:var(--navy); font-size:15px; padding:8px 0;}
  .drillrow{border-bottom:1px solid var(--line); padding:9px 2px; font-size:13.5px;}
  .drillrow b{color:var(--navy2);}
  .foot{text-align:center; color:#9aa6b8; font-size:11px; margin:10px 0 26px;}
</style>
</head>

<script>
const DATA  = [{"q": "Metal-head hammers are usually sized according to what?", "options": ["The hardness of the head material", "The diameter of the striking face", "The weight of the head alone, without the handle", "The overall length of the hammer including the handle"], "correct": 2, "short": "The weight of the head alone (without the handle).", "expl": "Metal-head hammers are sized by the weight of the head only; the handle is not counted.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-1 (Hammers & Mallets)", "topic": "Hammers"}, {"q": "Peen hammers are used in commercial sheet-metal work primarily to do what?", "options": ["Drive nails", "Bend metal", "Set rivets only", "Shape soft aluminum castings"], "correct": 1, "short": "Bend metal (sheet-metal work).", "expl": "Peen hammers are used in commercial sheet-metal work to bend metal; they are NOT intended for driving nails.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-1 (Hammers)", "topic": "Hammers"}, {"q": "Which peen hammer has a flat face and a ball-shaped end?", "options": ["Cross peen", "Straight peen", "Riveting hammer", "Ball peen"], "correct": 3, "short": "Ball peen.", "expl": "The ball-peen hammer has a flat striking face and a rounded (ball) end opposite it.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-1, Fig 11-1 (Hammers)", "topic": "Hammers"}, {"q": "The straight-peen hammer has a flat face and a wedge-shaped end oriented how?", "options": ["Parallel to the handle", "Set at 45 degrees to the handle", "At a right angle to the handle", "Curved like a ball"], "correct": 0, "short": "Parallel to the handle.", "expl": "A straight-peen hammer's wedge end runs parallel (in line) with the handle; the cross-peen's wedge runs at a right angle to it.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-1, Fig 11-1 (Hammers)", "topic": "Hammers"}, {"q": "The cross-peen hammer has a flat face and a wedge-shaped end oriented how?", "options": ["Flat on both ends", "Rounded like a ball", "Parallel to the handle", "At a right angle to the handle"], "correct": 3, "short": "At a right angle to the handle.", "expl": "The cross-peen's wedge is set at a right angle to the handle (the opposite of the straight peen).", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-1, Fig 11-1 (Hammers)", "topic": "Hammers"}, {"q": "A mallet is a hammer-like tool with a head made of which materials?", "options": ["Aluminum or magnesium", "Lead or babbitt", "Hickory, rawhide, or rubber", "Steel, brass, or cast iron"], "correct": 2, "short": "Hickory, rawhide, or rubber.", "expl": "A mallet has a soft head (hickory, rawhide, or rubber) so it can shape thin metal without leaving creases or dents from abrupt corners.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-1 (Mallets / soft-faced)", "topic": "Hammers"}, {"q": "A soft-faced hammer is handy for what kind of work?", "options": ["Shaping thin metal parts without creases or dents", "Cutting rivets", "Center-punching hardened steel", "Driving steel nails"], "correct": 0, "short": "Shaping thin metal without causing creases or dents.", "expl": "Soft-faced hammers/mallets shape thin metal and soft aluminum without marring it; a steel hammer used the same way would crease or dent the part.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-1 (Mallets / soft-faced)", "topic": "Hammers"}, {"q": "The two types of soft-faced (plastic-tipped) hammers his notes list are:", "options": ["Rubber-tipped and wood-tipped", "Soft plastic tipped and hard plastic tipped", "Lead-tipped and brass-tipped", "Rawhide and copper"], "correct": 1, "short": "Soft plastic tipped and hard plastic tipped.", "expl": "His notes list two soft-faced types: soft plastic tipped and hard plastic tipped. The replaceable tips let a worn or wrong-hardness tip be swapped.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-1 (soft-faced hammers); AIM Tool Notes", "topic": "Hammers"}, {"q": "The tips on a soft-faced (plastic-tipped) hammer are designed to be:", "options": ["Permanently molded on", "Replaceable", "Made of steel", "Filled with lead shot"], "correct": 1, "short": "Replaceable.", "expl": "Soft-faced hammer tips are replaceable, so a worn tip (or the wrong hardness) can be swapped instead of discarding the hammer.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-1; AIM Tool Notes", "topic": "Hammers"}, {"q": "A soft-faced hammer is commonly used to shape what material?", "options": ["Stainless steel", "Hardened tool steel", "Titanium", "Soft aluminum alloy"], "correct": 3, "short": "Soft aluminum alloy.", "expl": "Soft-faced hammers are used to shape soft aluminum alloy without marring or work-hardening the surface.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-1; AIM Tool Notes", "topic": "Hammers"}, {"q": "A screwdriver is classified by which three things?", "options": ["Weight, handle color, and brand", "Voltage, length, and tip hardness", "Its shape, type of blade, and blade length", "Torque rating, magnetism, and finish"], "correct": 2, "short": "Shape, type of blade, and blade length.", "expl": "The screwdriver is classified by shape, type of blade, and blade length. It has one purpose: loosening/tightening screws or screw-head bolts.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-1 (Screwdrivers)", "topic": "Screwdrivers"}, {"q": "A common (flat-blade) screwdriver is sized in inches by the length of its:", "options": ["Shank", "Handle", "Tip", "Overall body"], "correct": 0, "short": "The length of the shank.", "expl": "A common screwdriver is sized in inches by the length of the shank (the metal shaft between handle and tip).", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-1 (Screwdrivers); AIM Tool Notes", "topic": "Screwdrivers"}, {"q": "A common screwdriver blade must fill at least what percentage of the screw slot?", "options": ["50 percent", "75 percent", "60 percent", "90 percent"], "correct": 1, "short": "At least 75 percent of the slot.", "expl": "A common screwdriver must fill at least 75% of the screw slot; the wrong size cuts and burrs the slot, possibly requiring a screw extractor.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-2 (Screwdrivers)", "topic": "Screwdrivers"}, {"q": "When selecting a common screwdriver, you should pick:", "options": ["Any blade you have handy", "The smallest blade that fits in the slot", "The largest screwdriver whose blade makes a good fit", "A blade exactly one size larger than the slot"], "correct": 2, "short": "The largest screwdriver whose blade makes a good fit.", "expl": "Select the largest screwdriver whose blade makes a good fit in the slot — that gives the most contact and the least chance of slipping or burring.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-1/11-2 (Screwdrivers)", "topic": "Screwdrivers"}, {"q": "What happens if a common screwdriver is the wrong size for the slot?", "options": ["It cuts and burrs the slot, possibly ruining the screw", "It tightens the screw faster", "Nothing; it works the same", "It strips only the threads"], "correct": 0, "short": "It cuts and burrs the slot, possibly ruining the screw.", "expl": "A wrong-size blade cuts and burrs the slot (may need a screw extractor) and can slip and damage adjacent structure.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-2 (Screwdrivers)", "topic": "Screwdrivers"}, {"q": "An offset screwdriver is used where:", "options": ["High torque is needed", "The screw is recessed-head", "A power tool is required", "There is no clearance for a straight screwdriver"], "correct": 3, "short": "Where there is no clearance (tight spots).", "expl": "Offset screwdrivers reach screws in tight places where there is no clearance for a normal straight screwdriver.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-2 (Screwdrivers); AIM Tool Notes", "topic": "Screwdrivers"}, {"q": "A common (flat-tip) screwdriver is also called a:", "options": ["Crosspoint screwdriver", "Flat or straight-slot screwdriver", "Reed & Prince", "Torx driver"], "correct": 1, "short": "Flat (straight-slot) screwdriver.", "expl": "The common screwdriver is the flat / straight-slot type, used where slotted-head screws or fasteners are found.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-1 (Screwdrivers); AIM Tool Notes", "topic": "Screwdrivers"}, {"q": "The two types of recessed-head (crosspoint) screwdrivers are the Phillips and the:", "options": ["Robertson", "Allen", "Reed & Prince", "Torx"], "correct": 2, "short": "Reed & Prince.", "expl": "The two recessed-head crosspoint types are the Phillips and the Reed & Prince. They are NOT interchangeable.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-2 (Recessed-head screwdrivers)", "topic": "Screwdrivers"}, {"q": "Which recessed-head screwdriver has a SHARP pointed tip?", "options": ["Square drive", "Phillips", "Torx", "Reed & Prince"], "correct": 3, "short": "Reed & Prince (sharp point).", "expl": "The Reed & Prince has a sharp pointed tip; the Phillips is blunt. They look similar but are NOT interchangeable.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-2, Fig 11-2 (Recessed-head); AIM Tool Notes", "topic": "Screwdrivers"}, {"q": "The Phillips screwdriver has a blunt tip and is sized by which numbers?", "options": ["#1, #2, #3, #4", "A through Z", "#0 through #5", "#10 through #14"], "correct": 0, "short": "#1, #2, #3, #4.", "expl": "The Phillips has a blunt tip and is sized #1, #2, #3, #4 (his notes). The Reed & Prince, by contrast, has a sharp point.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-2 (Recessed-head); AIM Tool Notes", "topic": "Screwdrivers"}, {"q": "Phillips and Reed & Prince screwdriver tips are:", "options": ["Identical and interchangeable", "Similar in appearance but NOT interchangeable", "Only made for power tools", "The same tool with two names"], "correct": 1, "short": "Similar-looking but NOT interchangeable.", "expl": "Although they look alike, the Phillips is not interchangeable with the Reed & Prince — using the wrong one mutilates the screw head.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-2 (Recessed-head screwdrivers)", "topic": "Screwdrivers"}, {"q": "A replaceable-tip ('10-in-1') screwdriver allows for:", "options": ["Use only with power tools", "More torque than a fixed driver", "Magnetic pickup of screws", "Quick changing of the tip and economical replacement when worn"], "correct": 3, "short": "Quick tip changes and cheap replacement of worn tips.", "expl": "The replaceable-tip ('10-in-1') screwdriver lets you quickly swap tips and economically replace a tip when it becomes worn.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-3 (Replaceable tip screwdrivers)", "topic": "Screwdrivers"}, {"q": "Replaceable screwdriver tips are commonly called:", "options": ["Camlocks", "Hex keys", "Apex bits", "Diestocks"], "correct": 2, "short": "Apex bits.", "expl": "Replaceable screwdriver tips are commonly called apex bits.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-3; AIM Tool Notes", "topic": "Screwdrivers"}, {"q": "A speed handle with apex bits is best used when:", "options": ["A large number of screws must be removed/installed and no power tools are available or allowed", "A torque value is critical", "Only one screw needs turning", "Working on recessed-head screws only"], "correct": 0, "short": "Many screws to remove/install and no power tools available/allowed.", "expl": "Speed handles (with apex bits) speed up removing or installing a large number of screws by hand when power tools aren't available or allowed.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-3; AIM Tool Notes", "topic": "Screwdrivers"}, {"q": "The pliers used most frequently in aircraft repair work are the:", "options": ["Vise-grip and lineman's", "Slip-joint and tongue-and-groove", "Diagonal, needle-nose, and duckbill", "Channellock and fence pliers"], "correct": 2, "short": "Diagonal, needle-nose (and duckbill).", "expl": "The pliers used most often in aircraft work are the diagonal, the needle-nose, and the duckbill.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-3 (Pliers); AIM Tool Notes", "topic": "Pliers"}, {"q": "Plier size indicates the tool's overall length, usually ranging from:", "options": ["3 to 9 inches", "5 to 12 inches", "8 to 18 inches", "1 to 6 inches"], "correct": 1, "short": "5 to 12 inches.", "expl": "The size of pliers indicates their overall length, usually ranging from 5 to 12 inches.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-3 (Pliers); AIM Tool Notes", "topic": "Pliers"}, {"q": "Which is one of the two important rules for using pliers?", "options": ["Never use pliers to turn nuts or bolts", "Only use pliers on aluminum", "Always use pliers to cut hardened steel", "Always oil the joint before use"], "correct": 0, "short": "Never use pliers to turn nuts or bolts.", "expl": "Rule: do NOT use pliers to turn nuts — in seconds, pliers can damage a nut more than years of service. Also: don't work pliers beyond their capacity.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-3 (Pliers)", "topic": "Pliers"}, {"q": "Needle-nose pliers are used to:", "options": ["Cut heavy bolts", "Twist safety wire only", "Turn B-nuts on fluid lines", "Hold objects and make adjustments in tight places"], "correct": 3, "short": "Hold objects and make adjustments in tight places.", "expl": "Needle-nose pliers have half-round jaws of varying lengths; they hold objects and make adjustments in tight spots.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-3 (Pliers)", "topic": "Pliers"}, {"q": "Duckbill pliers are used exclusively for:", "options": ["Bending sheet metal", "Twisting safety wire", "Cutting cotter pins", "Removing rivets"], "correct": 1, "short": "Twisting safety wire.", "expl": "Duckbill pliers have thin, flat jaws shaped like a duck's bill and are used exclusively for twisting safety wire.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-3 (Pliers)", "topic": "Pliers"}, {"q": "Diagonal cutters ('dikes') are used to:", "options": ["Hold work in tight places", "Twist safety wire only", "Turn nuts and bolts", "Cut wire, rivets, small screws, and cotter pins, and remove safety wire"], "correct": 3, "short": "Cut wire, rivets, small screws, cotter pins; remove safety wire.", "expl": "Diagonal cutters cut wire, rivets, small screws, and cotter pins, and are practically indispensable for removing/installing safety wire.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-3 (Pliers / Diagonal)", "topic": "Pliers"}, {"q": "Punches are used to concentrate the force of what?", "options": ["A hammer blow", "A reamer", "A drill", "A torque wrench"], "correct": 0, "short": "A hammer blow.", "expl": "Punches concentrate the force of a hammer blow. Different punch types are designed for specific tasks and are identified by their shape.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-3 (Punches); AIM Tool Notes", "topic": "Punches"}, {"q": "Punches are identified by their:", "options": ["Color", "Handle material", "Shape", "Weight"], "correct": 2, "short": "Shape.", "expl": "Punch types are identified by their shape, each designed to accomplish a specific task.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-3 (Punches); AIM Tool Notes", "topic": "Punches"}, {"q": "A PRICK punch is used to:", "options": ["Place reference marks on metal (e.g., for layout/drilling)", "Enlarge holes", "Drive out rivets", "Make a 60-degree starting indentation for a drill"], "correct": 0, "short": "Place reference marks on metal.", "expl": "The prick punch has a small sharp point used to place reference marks on metal — e.g., transferring a dimension from a paper pattern to show where to drill.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-3/11-4 (Punches / Prick punch)", "topic": "Punches"}, {"q": "A CENTER punch is ground to a point of about what angle?", "options": ["90 degrees", "45 degrees", "60 degrees", "30 degrees"], "correct": 2, "short": "About 60 degrees.", "expl": "The center punch has a heavier body than a prick punch and is ground to a point of about 60 deg; it makes the indentation that starts a drill.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-4 (Punches / Center punch)", "topic": "Punches"}, {"q": "What is the main difference between a center punch and a prick punch?", "options": ["They are identical", "The center punch has a heavier body and a wider (~60 deg) point to start drills; the prick punch is finer for layout marks", "The prick punch is used to drive out pins", "The center punch is longer"], "correct": 1, "short": "Center punch = heavier, ~60 deg, starts drills; prick punch = fine layout marks.", "expl": "The center punch is heavier and ground to ~60 deg to make a drill-starting indentation; the prick punch is finer and used to lay out reference marks.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-4 (Punches)", "topic": "Punches"}, {"q": "A PIN punch (drift punch) is used to:", "options": ["Transfer hole locations", "Start a drilled hole", "Make reference marks", "Remove (drive out) rivets, bolts, and pins"], "correct": 3, "short": "Remove (drive out) rivets, bolts, and pins.", "expl": "Pin punches (often called drift punches) drive out rivets, bolts, and pins. They have a straight shank (unlike the tapered drive/starting punch).", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-4 (Punches / Pin punch)", "topic": "Punches"}, {"q": "A STARTING punch (FAA: drive/tapered punch) is used to:", "options": ["Make 60-degree layout marks", "Mark rivet holes from a template", "Drive (start) bolts and pins out of their holes", "Cut external threads"], "correct": 2, "short": "Start driving bolts/pins out of their holes.", "expl": "The starting punch (his notes) is the FAA 'drive punch / tapered punch': used to START driving bolts and pins out of holes. A pin punch then finishes the job. Same tool, two names.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-4 (Punches / Drive punch); AIM Tool Notes", "topic": "Punches"}, {"q": "Why must a starting (drive) punch be followed by a pin punch when driving a pin out?", "options": ["The drive punch is too weak", "It prevents the hammer from breaking", "The pin punch is only for marking", "The drive punch tapers to its face, so once its sides touch the hole it can't go further; the straight-shank pin punch finishes"], "correct": 3, "short": "Drive punch tapers and binds at the hole; the straight pin punch finishes.", "expl": "A drive punch's sides taper all the way to the face, so it can only start the pin until its sides touch the hole. A straight-shank pin punch then drives the pin the rest of the way out.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-4 (Punches)", "topic": "Punches"}, {"q": "A TRANSFER punch is used to:", "options": ["Mark rivet hole locations from a template/pattern", "Make a 60-degree drill start", "Twist safety wire", "Drive out pins"], "correct": 0, "short": "Mark/transfer rivet hole locations from a template.", "expl": "The transfer punch (~4 in. long) has a point that fits a template's drill-locating hole, transferring the hole location to the work; its tip resembles a prick punch point.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-4 (Punches / Transfer punch)", "topic": "Punches"}, {"q": "Why should you NEVER use a prick punch or center punch to remove an object from a hole?", "options": ["It is too slow", "The pointed tip spreads the object and makes it bind even more", "It scratches the surrounding metal", "It dulls the punch"], "correct": 1, "short": "The point spreads the object, making it bind worse.", "expl": "A prick/center punch point spreads the object inside the hole, causing it to bind even more — use a drive/pin punch instead.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-4 (Punches)", "topic": "Punches"}, {"q": "American aircraft hardware uses which wrench sizing system?", "options": ["Metric sizes", "Number gauge sizes", "English sizes", "Whitworth sizes"], "correct": 2, "short": "English sizes.", "expl": "American aircraft use English (SAE) wrench sizes.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-4 (Wrenches); AIM Tool Notes", "topic": "Wrenches"}, {"q": "Aircraft wrenches are generally made from what steel, with what plating?", "options": ["Carbon steel, painted", "Chrome-vanadium steel, cadmium- or chrome-plated", "Tool steel, zinc-plated", "Stainless steel, anodized"], "correct": 1, "short": "Chrome-vanadium steel, cadmium- or chrome-plated.", "expl": "Wrenches are made from chrome-vanadium steel and are cadmium- or chrome-plated for corrosion resistance.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-4 (Wrenches)", "topic": "Wrenches"}, {"q": "The jaws of a wrench are made parallel to the handle or set at an angle between:", "options": ["30 and 60 degrees", "45 and 90 degrees", "0 and 15 degrees", "15 and 90 degrees"], "correct": 3, "short": "15 to 90 degrees.", "expl": "Wrench jaws are parallel to the handle or set at an angle ranging from 15 deg to 90 deg, which lets the wrench reach nuts at different positions.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-4 (Wrenches); AIM Tool Notes", "topic": "Wrenches"}, {"q": "A solid, nonadjustable wrench with open parallel jaws on one or both ends is a(n):", "options": ["Open-end wrench", "Combination wrench", "Flare-nut wrench", "Box-end wrench"], "correct": 0, "short": "Open-end wrench.", "expl": "Open-end wrenches are solid, nonadjustable wrenches with open parallel jaws on one or both ends.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-4/11-5 (Open-end); AIM Tool Notes", "topic": "Wrenches"}, {"q": "A box-end wrench is made with a closed loop of how many points?", "options": ["8 or 16 point", "4 or 8 point", "5 or 10 point", "6 or 12 point"], "correct": 3, "short": "6 or 12 point.", "expl": "Box-end wrenches have a closed loop with 6 or 12 points; the 12-point allows the wrench to be repositioned in a smaller swing arc.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-5 (Box-end); AIM Tool Notes", "topic": "Wrenches"}, {"q": "A combination wrench has:", "options": ["A ratcheting head on both ends", "Two open ends of the same size", "One open end and one box end of the same size", "Two box ends of different sizes"], "correct": 2, "short": "One open end and one box end, same size.", "expl": "A combination wrench has one open end and one box end, both the same size — the best of both styles in one tool.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-5 (Combination); AIM Tool Notes", "topic": "Wrenches"}, {"q": "A ratcheting wrench is distinguished by having a:", "options": ["Plastic-covered strap", "Ratcheting mechanism", "Closed 12-point loop only", "Pin instead of a lug"], "correct": 1, "short": "A ratcheting mechanism.", "expl": "The ratcheting wrench has a ratcheting mechanism so the nut can be turned without lifting the wrench off between strokes.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-5; AIM Tool Notes", "topic": "Wrenches"}, {"q": "Flare-nut wrenches are used on the B-nuts and fittings of:", "options": ["Fluid lines (fuel, hydraulic, oxygen)", "Electrical connectors", "Engine mounts", "Control cables"], "correct": 0, "short": "Fluid lines (B-nuts/fittings).", "expl": "The flare-nut wrench grips a B-nut on fuel, hydraulic, or oxygen lines; its near-closed box shape slips over the tube yet grips more sides than an open-end.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-6 (Flare nut wrench)", "topic": "Wrenches"}, {"q": "Why is a flare-nut wrench preferred over an open-end wrench on a fluid-line B-nut?", "options": ["It is adjustable", "It is lighter", "It applies more torque", "Its nearly-closed box grips more flats, reducing the chance of rounding the soft B-nut"], "correct": 3, "short": "It grips more flats than an open-end, so it won't round off the soft B-nut.", "expl": "The flare-nut wrench looks like a box-end with a slot to pass over the tubing; it contacts more flats than an open-end, protecting the soft aluminum B-nut from rounding.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-6 (Flare nut wrench)", "topic": "Wrenches"}, {"q": "A socket wrench is made up of which two basic parts?", "options": ["A blade and a shank", "A socket and a handle", "A frame and a blade", "A jaw and a spring"], "correct": 1, "short": "A socket and a handle.", "expl": "A socket wrench consists of two parts: the socket (which fits the nut) and the handle (which drives it).", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-5 (Socket wrench); AIM Tool Notes", "topic": "Wrenches"}, {"q": "Sockets are commonly available in which two depths?", "options": ["Standard and deep", "Open and closed", "Shallow and flush", "Short and stub"], "correct": 0, "short": "Standard and deep.", "expl": "Sockets come in standard and deep versions; deep sockets reach nuts on long studs or recessed fasteners.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-5/11-6 (Sockets); AIM Tool Notes", "topic": "Wrenches"}, {"q": "Which of these is one of the common socket drive sizes from his notes?", "options": ["7/8 inch", "3/16 inch", "1/2 inch", "5/16 inch"], "correct": 2, "short": "1/2 inch.", "expl": "His notes list socket drive sizes 1/4, 3/8, 1/2, 3/4, 1, and 2-1/2 inch. 1/2-inch drive is one of the most common.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-5/11-6; AIM Tool Notes", "topic": "Wrenches"}, {"q": "Which of the following is NOT one of the 'other types of wrenches' his notes list?", "options": ["Crowfoot", "Strap wrench", "Pipe wrench", "Hook spanner"], "correct": 2, "short": "Pipe wrench (not listed).", "expl": "His notes list crowfoot, hook spanner, Allen, strap, and impact wrenches as the 'other types.' Pipe wrench is not on that list.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-6/11-7 (Other wrenches); AIM Tool Notes", "topic": "Wrenches"}, {"q": "An Allen wrench is shaped like a:", "options": ["Flat open jaw", "Ratcheting head", "Closed loop", "Six-sided (hex) L-shaped bar"], "correct": 3, "short": "A six-sided (hex) L-shaped bar.", "expl": "Allen wrenches are six-sided bars in the shape of an L, used to turn recessed (hex socket) setscrews.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-7 (Allen wrench)", "topic": "Wrenches"}, {"q": "Snips or shears are used for cutting what kind of metal?", "options": ["Thick plate", "Thin sheet metal", "Hardened tool steel", "Cast iron"], "correct": 1, "short": "Thin sheet metal.", "expl": "Snips/shears are used to cut thin sheet metal in straight lines or curves.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-7 (Hand Snips); AIM Tool Notes", "topic": "Snips"}, {"q": "Tinner's snips are designed for what kind of cut?", "options": ["Straight cuts", "Trimming rivets", "Cutting heat-treated stainless", "Cutting inside curves"], "correct": 0, "short": "Straight cuts.", "expl": "Tinner's straight snips cut straight lines (and gentle curves) in thin sheet metal.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-7 (Hand Snips); AIM Tool Notes", "topic": "Snips"}, {"q": "Aviation (Dutchman) snips are designed especially for cutting:", "options": ["Heat-treated aluminum alloy and stainless steel", "Wood and fiberboard", "Thin tin only", "Copper tubing"], "correct": 0, "short": "Heat-treated aluminum alloy and stainless steel.", "expl": "Aviation/Dutchman snips have serrated, compound-leverage blades for cutting heat-treated aluminum alloy and stainless steel, and for enlarging small holes.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-7 (Aviation snips)", "topic": "Snips"}, {"q": "Aviation snip blades are serrated and provide what advantage?", "options": ["Self-sharpening teeth", "Compound leverage so they grip and cut thicker/harder sheet", "No burrs at all", "A polished cut edge"], "correct": 1, "short": "Compound leverage for cutting thicker/harder sheet.", "expl": "The serrated blades and compound-leverage handles let aviation snips grip and cut thicker, harder sheet (heat-treated aluminum, stainless).", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-7 (Aviation snips); AIM Tool Notes", "topic": "Snips"}, {"q": "STRAIGHT-cut aviation snips have what color handles?", "options": ["Green", "Red", "Blue", "Yellow"], "correct": 3, "short": "Yellow handles.", "expl": "Color code: STRAIGHT-cut aviation snips = YELLOW handles.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-7 (Aviation snips); AIM Tool Notes", "topic": "Snips"}, {"q": "RIGHT-hand cutting aviation snips have what color handles?", "options": ["Yellow", "Orange", "Green", "Red"], "correct": 2, "short": "Green handles.", "expl": "Color code: RIGHT-hand (cut from left to right, curving right) aviation snips = GREEN handles. Green = Go right.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-7 (Aviation snips); AIM Tool Notes", "topic": "Snips"}, {"q": "LEFT-hand cutting aviation snips have what color handles?", "options": ["Green", "Black", "Yellow", "Red"], "correct": 3, "short": "Red handles.", "expl": "Color code: LEFT-hand cutting aviation snips = RED handles.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-7 (Aviation snips); AIM Tool Notes", "topic": "Snips"}, {"q": "Which color-to-snip pairing is CORRECT?", "options": ["Green = right-hand", "Red = straight", "Yellow = left-hand", "Yellow = right-hand"], "correct": 0, "short": "Green = right-hand.", "expl": "Straight = yellow, Right-hand = green, Left-hand = red. Only 'Green = right-hand' is correct here.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-7 (Aviation snips); AIM Tool Notes", "topic": "Snips"}, {"q": "Hand snips typically range in length from:", "options": ["12 to 18 inches", "1 to 6 inches", "7 to 12 inches", "5 to 12 inches"], "correct": 2, "short": "7 to 12 inches.", "expl": "His notes give a snip length range of 7 to 12 inches.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-7; AIM Tool Notes", "topic": "Snips"}, {"q": "A hacksaw consists of which three parts?", "options": ["Handle, tang, and heel", "Blade, frame, and handle", "Frame, vise, and clamp", "Blade, motor, and guard"], "correct": 1, "short": "Blade, frame, and handle.", "expl": "A hacksaw has three parts: the blade, the frame, and the handle.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-7/11-8 (Hacksaws); AIM Tool Notes", "topic": "Hacksaw"}, {"q": "Hacksaw blades are made of what kind of steel (per his notes)?", "options": ["Aluminum or brass", "Carbon or molybdenum steel", "Cast iron or bronze", "Chrome-vanadium only"], "correct": 1, "short": "Carbon or molybdenum steel.", "expl": "His notes: hacksaw blades are carbon or molybdenum steel. (The handbook also mentions high-grade tool steel / tungsten steel.)", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-8 (Hacksaws); AIM Tool Notes", "topic": "Hacksaw"}, {"q": "The 'pitch' of a hacksaw blade refers to:", "options": ["Its thickness", "The cutting angle", "Its length", "The number of teeth per inch"], "correct": 3, "short": "The number of teeth per inch (TPI).", "expl": "Blade pitch = the number of teeth per inch. Available pitches: 14, 18, 24, and 32 TPI.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-8 (Hacksaws)", "topic": "Hacksaw"}, {"q": "A 14-TPI hacksaw blade is preferred for cutting:", "options": ["Thin tubing, copper, brass", "Solid stock tool steel", "Machine steel, cold-rolled steel, soft/structural material", "Thin-wall tubing and sheet metal"], "correct": 2, "short": "Machine steel / cold-rolled / soft, large-section stock.", "expl": "14 TPI is for machine steel, cold-rolled steel, and structural/soft large-section stock — fewer teeth clear chips on thick soft material.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-8 (Hacksaws)", "topic": "Hacksaw"}, {"q": "An 18-TPI hacksaw blade is preferred for:", "options": ["Solid stock aluminum, bearing metal, tool steel, and cast iron", "Thin sheet metal", "Thin-wall tubing", "Copper channel only"], "correct": 0, "short": "Solid stock aluminum, bearing metal, tool steel, cast iron.", "expl": "18 TPI suits solid-stock aluminum, bearing metal, tool steel, and cast iron.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-8 (Hacksaws)", "topic": "Hacksaw"}, {"q": "A 24-TPI hacksaw blade is used for:", "options": ["Thin-wall tubing and sheet metal", "Thin tubing, copper, brass, channel, and angle iron", "Thick aluminum bar", "Structural steel beams"], "correct": 1, "short": "Thin tubing, copper, brass, channel, angle iron.", "expl": "24 TPI cuts thicker-than-thin tubing plus copper, brass, channel, and angle iron.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-8 (Hacksaws)", "topic": "Hacksaw"}, {"q": "A 32-TPI hacksaw blade is used for cutting:", "options": ["Solid aluminum stock", "Cast iron", "Machine steel", "Thin-wall tubing and sheet metal"], "correct": 3, "short": "Thin-wall tubing and sheet metal.", "expl": "32 TPI (the finest) is for thin-wall tubing and sheet metal — many fine teeth keep at least 2-3 teeth on the thin work so they don't snag.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-8 (Hacksaws)", "topic": "Hacksaw"}, {"q": "When cutting thin-wall tubing, at least how many teeth should contact the tube wall?", "options": ["3 teeth", "5 teeth", "1 tooth", "2 teeth"], "correct": 0, "short": "At least 3 teeth on the tube wall.", "expl": "His notes: when cutting thin tubing, at least 3 teeth should be on the tube wall (the handbook phrases it as 'at least two teeth' minimum at all times). More teeth on the work prevents snagging/stripping.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-8 (Hacksaw procedures); AIM Tool Notes", "topic": "Hacksaw"}, {"q": "A hacksaw cuts on which stroke?", "options": ["Neither; it is rocked", "Both strokes equally", "The forward (push) stroke", "The pull (return) stroke"], "correct": 2, "short": "The forward (push) stroke.", "expl": "Assemble the blade with teeth pointing away from the handle; cutting is done on the forward stroke, and the blade is lifted on the return stroke.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-8 (Hacksaw procedures)", "topic": "Hacksaw"}, {"q": "A hacksaw blade should be installed so the teeth point:", "options": ["Straight down", "Toward the handle", "It doesn't matter", "Away from the handle"], "correct": 3, "short": "Away from the handle.", "expl": "Mount the blade so the teeth point AWAY from the handle, so the saw cuts on the forward (push) stroke.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-8 (Hacksaw procedures)", "topic": "Hacksaw"}, {"q": "A chisel can cut and chip any metal that is:", "options": ["The same hardness as the chisel", "Made of aluminum only", "Softer than the chisel itself", "Harder than the chisel"], "correct": 2, "short": "Softer than the chisel itself.", "expl": "A chisel is hard steel that can cut/chip any metal SOFTER than the chisel itself — e.g., shearing rivets or splitting seized nuts off bolts.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-8 (Chisels)", "topic": "Chisels"}, {"q": "A flat cold chisel can be used for which job?", "options": ["Reaming holes to size", "Shearing rivet heads / splitting seized nuts off bolts", "Cutting external threads", "Drilling holes"], "correct": 1, "short": "Shearing rivets / splitting seized nuts from bolts.", "expl": "Used in restricted areas for shearing rivets, or splitting seized or damaged nuts from bolts.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-8 (Chisels)", "topic": "Chisels"}, {"q": "The cutting edge of a flat cold chisel is ground to about what angle for general use?", "options": ["60 to 70 degrees", "80 to 90 degrees", "45 to 60 degrees", "30 to 45 degrees"], "correct": 0, "short": "60 to 70 degrees.", "expl": "The cutting angle of a flat cold chisel should be 60 deg to 70 deg for general use.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-8 (Chisels)", "topic": "Chisels"}, {"q": "The SIZE of a flat cold chisel is determined by:", "options": ["The width of its cutting edge", "Its overall length", "The hardness of the steel", "The weight of the head"], "correct": 0, "short": "The width of the cutting edge.", "expl": "A flat cold chisel's size is set by the width of its cutting edge; lengths are usually 5 to 8 inches.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-8/11-9 (Chisels)", "topic": "Chisels"}, {"q": "Files are catalogued (known) by which of the following?", "options": ["Tooth count per inch only", "Length, shape (cross section), and cut", "Voltage and tang size", "Weight, color, and brand"], "correct": 1, "short": "Length, shape (cross section), and cut.", "expl": "Files are catalogued three ways: length, shape (cross section/physical configuration), and cut.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-9 (Files)", "topic": "Files"}, {"q": "Files are used to do what?", "options": ["Drill holes", "Twist safety wire", "Square ends, file rounded corners, remove burrs/slivers, smooth rough edges", "Cut threads"], "correct": 2, "short": "Square ends, round corners, remove burrs, smooth edges.", "expl": "Files square ends, file rounded corners, remove burrs and slivers, straighten uneven edges, smooth rough edges, and file holes/slots.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-9 (Files)", "topic": "Files"}, {"q": "The part of a file that fits into the handle is the:", "options": ["Edge", "Heel", "Point", "Tang"], "correct": 3, "short": "Tang.", "expl": "The tang is the pointed end of the file that fits into the handle; it is never included in the file's length measurement.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-9, Fig 11-16 (Files)", "topic": "Files"}, {"q": "A flat file is used principally for:", "options": ["Smoothing / general finishing on flat surfaces", "Filing concave surfaces", "Rapid stock removal on soft metal", "Filing acute angles"], "correct": 0, "short": "Smoothing / general finishing (flat surfaces).", "expl": "The flat file is the most common file, slightly tapered toward the point, used for smoothing and general finishing.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-9 (Flat files); AIM Tool Notes", "topic": "Files"}, {"q": "A half-round file has which two working surfaces?", "options": ["Two flat faces", "A knife edge and a flat", "One convex (curved) face and one flat face", "Two concave faces"], "correct": 2, "short": "One convex (curved/round) face and one flat face.", "expl": "The half-round file has a curved (convex) side and a flat side, letting it file both flat surfaces and concave (curved) openings.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-9 (Half-round files)", "topic": "Files"}, {"q": "A triangular file is also called a:", "options": ["Knife file", "Rasp", "Vixen file", "Three-square file"], "correct": 3, "short": "Three-square file.", "expl": "The triangular (three-square) file is triangular in cross section and is used to file acute angles and to sharpen tools/cutters.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-9 (Triangular / three-square)", "topic": "Files"}, {"q": "Which file has a knife-blade cross section, used by tool and die makers on acute angles?", "options": ["Vixen file", "Knife file", "Half-round file", "Round file"], "correct": 1, "short": "Knife file.", "expl": "The knife file has a knife-blade section and is used on work having acute angles.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-9/11-10 (Knife file)", "topic": "Files"}, {"q": "A round file is circular in cross section and is used principally for:", "options": ["Filing circular openings or concave surfaces", "Rapid filing of soft metal", "Filing flat surfaces", "Cutting acute angles"], "correct": 0, "short": "Filing circular openings / concave surfaces.", "expl": "Round files are circular in section and file circular openings or concave surfaces.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-9 (Round files)", "topic": "Files"}, {"q": "A vixen (curved-tooth) file is especially designed for:", "options": ["Cutting threads", "Filing acute interior angles", "Filing hardened steel", "Rapid filing and producing a smooth finish on soft metals/aluminum"], "correct": 3, "short": "Rapid filing / smooth finish on soft metals (aluminum).", "expl": "Vixen (curved-tooth) files are designed for rapid filing and give excellent results on soft metals like aluminum, lead, and phosphor bronze.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-10 (Vixen files)", "topic": "Files"}, {"q": "What tool is used to clean a file (clear metal filings from the teeth)?", "options": ["A wire wheel", "A bristle paintbrush", "A file card", "Compressed air only"], "correct": 2, "short": "A file card.", "expl": "A file card (a stiff wire-bristle brush) is used to clean filings out of a file's teeth; a dirty file scratches the work and won't cut cleanly.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-10, Fig 11-18 (File card)", "topic": "Files"}, {"q": "His notes list FIVE types of portable drills used in aviation. Which is one of them?", "options": ["Magnetic-base drill", "Pneumatic (air) drill", "Radial arm drill", "Drill press"], "correct": 1, "short": "Pneumatic (air) drill.", "expl": "His notes list five portable drill types: hand, electric, pneumatic, cordless, (and the handwritten 5th). The handbook names four (hand, breast, electric, pneumatic); 'cordless' is the common 5th in AIM teaching.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-11 (Portable drills); AIM Tool Notes", "topic": "Drills"}, {"q": "Holes 1/4 inch in diameter and under can be drilled with which tool?", "options": ["A breast drill", "A hand drill ('egg beater')", "A pneumatic drill only", "A drill press only"], "correct": 1, "short": "A hand drill ('egg beater').", "expl": "Holes 1/4 inch in diameter and under can be drilled with the hand drill, commonly called an 'egg beater.'", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-11 (Portable drills)", "topic": "Drills"}, {"q": "The hand drill used for small (<=1/4 in.) holes is commonly nicknamed the:", "options": ["Pistol drill", "Brace", "Speed handle", "Egg beater"], "correct": 3, "short": "Egg beater.", "expl": "The hand drill for holes 1/4 inch and under is commonly called the 'egg beater.'", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-11 (Portable drills)", "topic": "Drills"}, {"q": "Why is a breast drill used instead of a hand drill for larger holes?", "options": ["It is cordless", "It never overheats", "Its breastplate lets you apply body weight to increase cutting power", "It spins faster"], "correct": 2, "short": "Its breastplate lets you add body weight for more cutting power.", "expl": "The breast drill holds larger twist drills and has a breastplate so the operator can press body weight against it to increase cutting power.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-11 (Breast drill)", "topic": "Drills"}, {"q": "Pneumatic (air) drills are preferred over electric drills around flammable materials because:", "options": ["Electric drill sparks are a fire/explosion hazard", "They are lighter", "They never need a power source", "They are faster"], "correct": 0, "short": "Electric drills can spark and ignite flammable materials.", "expl": "Around flammable materials, pneumatic drills are preferred because sparks from an electric drill are a fire or explosion hazard.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-12 (Drills)", "topic": "Drills"}, {"q": "Twist drills are made of which materials?", "options": ["Cast iron or bronze", "Aluminum or brass", "Carbon steel or high-speed (alloy) steel", "Chrome-vanadium only"], "correct": 2, "short": "Carbon steel or high-speed (alloy) steel.", "expl": "Twist drills are made of carbon steel or high-speed alloy steel. Carbon-steel drills are fine for general work but dull quickly if overheated.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-11 (Twist drills)", "topic": "Drills"}, {"q": "What is the risk of overheating a CARBON steel twist drill?", "options": ["It becomes magnetic", "It rusts", "Nothing happens", "It loses its temper/hardness (becomes dull and useless)"], "correct": 3, "short": "It loses its temper/hardness and goes dull.", "expl": "Overheating a carbon-steel drill draws its temper, ruining the cutting edge. High-speed steel tolerates heat far better.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-11 (Twist drills); AIM Tool Notes", "topic": "Drills"}, {"q": "A twist drill is made up of which three principal parts?", "options": ["Shank, body, and point (tip)", "Handle, blade, and shank", "Tang, heel, and point", "Flute, margin, and tang"], "correct": 0, "short": "Shank, body, and point (tip).", "expl": "The three principal parts of a twist drill are the shank, the body, and the point (cutting tip).", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-11/11-12, Fig 11-19 (Twist drill)", "topic": "Drills"}, {"q": "The spiral grooves running the length of a twist drill body are called:", "options": ["Lands", "Flutes (helical flutes)", "Margins", "Webs"], "correct": 1, "short": "Flutes (helical flutes).", "expl": "A twist drill has helical (spiral) flutes that carry chips out of the hole — the spiral cut is why it's called a 'twist' drill.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-11/11-12 (Twist drill)", "topic": "Drills"}, {"q": "For MOST drilling (general materials), the included cutting-point angle should be about:", "options": ["100 degrees", "90 degrees", "118 degrees", "135 degrees"], "correct": 2, "short": "118 degrees (59 deg each side).", "expl": "For most drilling, a 118 deg cutting angle (59 deg on each side of center) is sufficient. This is the FAA-confirmed 'most materials' value.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-12 (Twist drill sharpening)", "topic": "Drills"}, {"q": "When drilling SOFT metals (e.g., lead), which cutting-point angle may be more efficient?", "options": ["90 degrees", "118 degrees", "60 degrees", "135 degrees"], "correct": 0, "short": "90 degrees.", "expl": "When drilling soft metals, a cutting angle of 90 deg may be more efficient. (FAA-confirmed value.)", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-12 (Twist drill sharpening)", "topic": "Drills"}, {"q": "For HARD materials such as stainless steel, AIM teaches a drill-point angle of about:", "options": ["90 degrees", "135 degrees", "118 degrees", "100 degrees"], "correct": 1, "short": "About 135 degrees (AIM/shop convention — verify with instructor).", "expl": "DIVERGENCE: AIM slides teach ~135 deg for hard materials/stainless. FAA-H-8083-30B Ch.11 only states 118 deg (general) and 90 deg (soft) — it does NOT print the 135 deg value, so treat this as AIM/shop convention. [verify with instructor]", "cite": "AIM Tool Notes (per-material table) — NOT in -30B Ch.11 text; [verify with instructor]", "topic": "Drills"}, {"q": "For aircraft ALUMINUM alloy, AIM teaches a drill-point angle of about:", "options": ["118 degrees", "90 degrees", "100 degrees", "135 degrees"], "correct": 3, "short": "About 135 degrees (AIM/shop convention — verify with instructor).", "expl": "DIVERGENCE: AIM's per-material table lists ~135 deg for aircraft aluminum alloy. The FAA handbook text gives only 118 deg general and 90 deg soft — the 135 deg figure is AIM/shop teaching. [verify with instructor]", "cite": "AIM Tool Notes (per-material table) — NOT in -30B Ch.11 text; [verify with instructor]", "topic": "Drills"}, {"q": "Which is one of the methods used to indicate (size) a drill?", "options": ["By color band", "By the fractional, number, letter, or metric/decimal system", "By weight", "By the handle length"], "correct": 1, "short": "Fractional, number, letter, and decimal/metric systems.", "expl": "Drill sizes are indicated four ways: fractional (e.g., 1/16 in), number (No. 80 to No. 1), letter (A to Z), and decimal/metric equivalents.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-12 (Drill sizing)", "topic": "Drills"}, {"q": "In the drilling procedure, the FIRST safety step his notes list is to:", "options": ["Center-punch the hole", "Set the correct speed", "Lubricate the drill", "Use eye protection"], "correct": 3, "short": "Use eye protection.", "expl": "His notes' drilling procedure starts with: use eye protection. Other steps include lubricating the drill and using the correct speed.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-12 (Drilling); AIM Tool Notes", "topic": "Drills"}, {"q": "A countersink cuts what, and for what purpose?", "options": ["A cone-shaped chamfer/depression around a hole so a rivet or screw sets flush", "A groove, for safety wire", "A round hole, to pass a bolt", "Internal threads, for a screw"], "correct": 0, "short": "A cone-shaped depression so a flush rivet/screw sits flush.", "expl": "A countersink cuts a cone-shaped chamfer/depression around a hole so a flush (countersunk) rivet or screw head sits flush with the surface.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-13 (Countersink)", "topic": "Countersink"}, {"q": "The standard countersink shown in the handbook has what included angle?", "options": ["82 degrees", "90 degrees", "100 degrees", "120 degrees"], "correct": 2, "short": "100 degrees.", "expl": "The angle of the standard countersink is 100 deg, matching the standard 100 deg countersunk rivet/screw head.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-13 (Countersink)", "topic": "Countersink"}, {"q": "When using a countersink, care must be taken NOT to:", "options": ["Spin it too slowly", "Countersink aluminum", "Use cutting oil", "Remove an excessive amount of material (which reduces flush-joint strength)"], "correct": 3, "short": "Remove too much material (weakens the flush joint).", "expl": "Removing excessive material with a countersink reduces the strength of flush joints; stop countersinks (some with micrometer depth settings) help control depth.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-13 (Countersink)", "topic": "Countersink"}, {"q": "Reamers are used to:", "options": ["Cut external threads", "Drill new holes", "Smooth and enlarge holes to an exact size", "Cut internal threads"], "correct": 2, "short": "Smooth and enlarge holes to exact size.", "expl": "Reamers smooth and enlarge an existing hole to an exact size; the hole is first drilled slightly undersize.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-13 (Reamers)", "topic": "Reamers"}, {"q": "When reaming, you must rotate the reamer:", "options": ["As fast as possible", "In the cutting direction only — never back it out opposite", "Back and forth freely", "Opposite the cutting direction to clear chips"], "correct": 1, "short": "In the cutting direction ONLY; never back it out the other way.", "expl": "Always rotate a reamer in the cutting direction only. NEVER back a reamer out of a hole by turning it the opposite way — that chips/dulls the brittle blades.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-13 (Reamers)", "topic": "Reamers"}, {"q": "The hole to be reamed should be drilled how, relative to the reamer size?", "options": ["Slightly SMALLER (undersize) than the reamer", "Slightly larger than the reamer", "Twice the reamer size", "Exactly the reamer size"], "correct": 0, "short": "Slightly smaller (undersize) than the reamer.", "expl": "Drill the hole slightly undersize (about 0.003-0.007 in.) so the reamer removes a thin, even cut to finish it to exact size.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-13 (Reamers)", "topic": "Reamers"}, {"q": "Reamer blades are hardened to the point of being brittle, so you must:", "options": ["Heat them before use", "Handle them carefully to avoid chipping", "Always back them out to cool", "Use them only on steel"], "correct": 1, "short": "Handle them carefully to avoid chipping the brittle blades.", "expl": "Reamer blades are hardened to the point of being brittle and must be handled carefully to avoid chipping them.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-13 (Reamers)", "topic": "Reamers"}, {"q": "A tap is used to cut threads where?", "options": ["Around a rivet head", "On the face of a flange", "On the outside of a rod", "On the inside of a hole (internal threads)"], "correct": 3, "short": "On the inside of a hole (internal threads).", "expl": "A tap cuts threads on the INSIDE of a hole (internal threads); a die cuts external threads on round stock.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-14 (Taps and Dies)", "topic": "Taps"}, {"q": "Standard taps and dies use National Fine (NF) and which other standard (per his notes)?", "options": ["National Coarse (NC)", "National Extra Fine (NEF)", "Metric Coarse", "National Pipe (NP)"], "correct": 0, "short": "National Coarse (NC).", "expl": "His notes pair National Fine (NF) and National Coarse (NC). The FAA handbook lists four total: NC, NF, National Extra Fine (NEF), and National Pipe.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-14 (Taps and Dies); AIM Tool Notes", "topic": "Taps"}, {"q": "The three taps used in aviation (in a standard set) are the:", "options": ["Coarse, fine, and pipe taps", "Solid, split, and adjustable taps", "Taper, plug, and bottoming taps", "Left, right, and center taps"], "correct": 2, "short": "Taper, plug, and bottoming taps.", "expl": "A hand-tap set has three taps of identical diameter differing only in taper: the taper tap, the plug tap, and the bottoming tap.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-14 (Taps)", "topic": "Taps"}, {"q": "Which tap is used to BEGIN the tapping process?", "options": ["Pipe tap", "Plug tap", "Bottoming tap", "Taper tap"], "correct": 3, "short": "The taper tap.", "expl": "The taper tap (tapered back ~6-7 threads) is used to start tapping; it cuts a full thread once past the taper and is the only tap needed for through-holes in thin sections.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-14 (Taps)", "topic": "Taps"}, {"q": "A taper tap is held and turned with what?", "options": ["A diestock", "A T-handle (tap wrench)", "A breast drill", "A flare-nut wrench"], "correct": 1, "short": "A T-handle (tap wrench).", "expl": "His notes: taper taps are held with a T-handle (tap wrench); some taps are held with a solid handle. The T-handle/adjustable tap wrench turns the tap squarely.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-14 (Taps); AIM Tool Notes", "topic": "Taps"}, {"q": "The BOTTOMING tap is used to:", "options": ["Cut full threads to the bottom of a blind hole", "Cut external threads", "Start the thread", "Ream the hole first"], "correct": 0, "short": "Cut full threads to the bottom of a blind hole.", "expl": "The bottoming tap is NOT tapered; it cuts full threads to the bottom of a blind hole. A taper tap must be used FIRST to start the threads.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-14 (Taps)", "topic": "Taps"}, {"q": "Before using a bottoming tap, what must be done first?", "options": ["Ream the hole oversize", "Use a die", "Use a taper tap first to start cutting the threads", "Countersink the hole to 100 degrees"], "correct": 2, "short": "Use a taper tap first to start the threads.", "expl": "When using the bottoming tap, a taper tap must first be used to start cutting the threads, because the bottoming tap has no taper to ease it in.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-14 (Taps)", "topic": "Taps"}, {"q": "A die is used to cut threads where?", "options": ["On the outside (external) of rods, bolts, and pipes", "On a flat plate", "Inside a hole", "Around a rivet"], "correct": 0, "short": "External threads on rods, bolts, and pipes.", "expl": "A die cuts EXTERNAL threads on the outside of rods, bolts, and pipes; a tap cuts internal threads.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-14 (Dies)", "topic": "Dies"}, {"q": "A die is round or hexagonal in shape with what feature through the center?", "options": ["A slot", "A round (threaded) hole", "A hex socket", "A square hole"], "correct": 1, "short": "A round (threaded) hole through the center.", "expl": "A die is round or hexagonal in shape with a round hole through the center that does the thread cutting.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-14 (Dies); AIM Tool Notes", "topic": "Dies"}, {"q": "The two types of dies his notes list are:", "options": ["Adjustable die and bottoming die", "Round die and pipe die", "Solid (hex rethreading) die and split die", "Taper die and plug die"], "correct": 2, "short": "Solid (hex rethreading) die and split die.", "expl": "His notes give two die types: (1) the solid hex rethreading die, and (2) the split die. The handbook also describes adjustable vs. plain round split dies.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-14 (Dies); AIM Tool Notes", "topic": "Dies"}, {"q": "A solid hex rethreading die is best used to:", "options": ["Cut internal threads", "Cut brand-new threads on raw stock", "Ream a hole to size", "Clean up / restore (rethread) damaged existing threads"], "correct": 3, "short": "Clean up / restore (rethread) damaged threads.", "expl": "A solid (hex) rethreading die is used to chase/restore damaged external threads. It is solid (not adjustable). The split die can be adjusted slightly for thread fit.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-14 (Dies); AIM Tool Notes", "topic": "Dies"}, {"q": "A split die differs from a solid die in that it:", "options": ["Cuts internal threads", "Is hexagonal", "Can be adjusted slightly to control the thread depth/fit", "Is only used for rethreading"], "correct": 2, "short": "It can be adjusted to control thread fit.", "expl": "The adjustable (split) die has an adjusting screw so the thread fit can be controlled; the solid die is fixed-size.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-14 (Dies)", "topic": "Dies"}, {"q": "Which tool turns a round split die?", "options": ["A diestock", "A flare-nut wrench", "A tap wrench (T-handle)", "A breast drill"], "correct": 0, "short": "A diestock.", "expl": "Round split dies are turned with a diestock. Taps, by contrast, are turned with a T-handle or adjustable tap wrench.", "cite": "FAA-H-8083-30B Ch.11 (Hand Tools & Measuring Devices), p. 11-14 (Taps and Dies)", "topic": "Dies"}];
const DRILL = [{"label": "Screwdriver slot fill", "text": "A common (flat) screwdriver must fill at least 75% of the screw slot."}, {"label": "Phillips vs Reed & Prince", "text": "Reed & Prince = SHARP point; Phillips = BLUNT tip (sized #1,2,3,4). NOT interchangeable."}, {"label": "Pliers rule", "text": "NEVER use pliers to turn nuts or bolts. Duckbill pliers = twist safety wire ONLY."}, {"label": "Center punch angle", "text": "Center punch is ground to ~60 deg and starts a drilled hole. Prick punch = layout reference marks."}, {"label": "Punch types", "text": "Prick = ref marks; Center (60 deg) = start drill; Pin/drift = drive out rivets/pins; Starting/drive = start a pin out; Transfer = mark holes from template."}, {"label": "Wrench material", "text": "Wrenches = chrome-vanadium steel, cad- or chrome-plated. Jaws 15 deg-90 deg or parallel."}, {"label": "Box-end points", "text": "Box-end wrench = 6 or 12 point. Combination = one open + one box, same size."}, {"label": "Flare-nut wrench", "text": "Flare-nut wrench is used on B-nuts/fittings of fluid lines (fuel, hydraulic, oxygen)."}, {"label": "Snip color code", "text": "STRAIGHT = YELLOW handles, RIGHT-hand = GREEN, LEFT-hand = RED."}, {"label": "Hacksaw pitch (TPI)", "text": "14 TPI = soft/machine/structural; 18 TPI = solid stock alum/tool steel/cast iron; 24 TPI = thin tubing/copper/brass/angle; 32 TPI = thin-wall tubing & sheet."}, {"label": "Hacksaw cutting", "text": "Teeth point AWAY from handle; cut on the FORWARD stroke; >=3 teeth on thin tubing wall."}, {"label": "Cold chisel angle", "text": "Flat cold chisel cutting edge = 60 deg to 70 deg for general use."}, {"label": "Hand drill (egg beater)", "text": "Holes 1/4 inch and UNDER -> hand drill ('egg beater'). Drill point ~118 deg general, 90 deg soft metals."}, {"label": "Countersink angle", "text": "Standard countersink = 100 deg (matches 100 deg flush rivet/screw head)."}, {"label": "Reamer rule", "text": "Rotate reamer in the CUTTING direction ONLY; NEVER back it out. Drill the hole slightly UNDERSIZE first."}, {"label": "Taps & dies", "text": "Tap = INTERNAL threads; Die = EXTERNAL threads. 3-tap set: taper (starts) -> plug -> bottoming (blind holes, needs taper first)."}];

const QUIZ = {
  order:[], i:0, score:0, answered:0, missed:[], shuffle:false,

  init(){
    document.getElementById('startmeta').innerHTML =
      '<b>'+DATA.length+'</b> questions &nbsp;·&nbsp; instant feedback &nbsp;·&nbsp; every answer cited';
    const t=document.getElementById('shuffleToggle');
    t.onclick=()=>{ this.shuffle=!this.shuffle; t.classList.toggle('on',this.shuffle); };
  },

  start(){
    this.order = DATA.map((_,k)=>k);
    if(this.shuffle){ for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('start').style.display='none';
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  retake(missedOnly){
    if(missedOnly && this.missed.length){ const m=this.missed.slice(); this.order=m; }
    else { this.order = DATA.map((_,k)=>k); if(this.shuffle){for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];}} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  render(){
    const idx=this.order[this.i], q=DATA[idx];
    const total=this.order.length;
    document.getElementById('counter').textContent = 'Q'+(this.i+1)+' of '+total;
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('progfill').style.width = (this.i/total*100)+'%';
    let opts='';
    q.options.forEach((o,li)=>{
      const L='ABCD'[li];
      opts += '<button class="opt" data-li="'+li+'" onclick="QUIZ.pick('+li+')">'+
              '<span class="L">'+L+'</span><span class="T">'+esc(o)+'</span><span class="mark"></span></button>';
    });
    document.getElementById('cardmount').innerHTML =
      '<div class="card"><span class="tag">'+esc(q.topic)+'</span>'+
      '<div class="stem">'+esc(q.q)+'</div>'+
      '<div class="opts" id="opts">'+opts+'</div>'+
      '<div class="fb" id="fb"></div></div>';
    document.getElementById('nextbtn').disabled = true;
    document.getElementById('skipbtn').style.display = '';
    this.locked=false;
  },

  pick(li){
    if(this.locked) return;
    this.locked=true;
    const idx=this.order[this.i], q=DATA[idx];
    const wrapEl=document.getElementById('opts'); wrapEl.classList.add('locked');
    const btns=wrapEl.querySelectorAll('.opt');
    const ok = (li===q.correct);
    btns.forEach(b=>{
      const bl=+b.dataset.li;
      if(bl===q.correct){ b.classList.add('correct'); b.querySelector('.mark').textContent='✓'; }
      if(bl===li && !ok){ b.classList.add('wrong'); b.querySelector('.mark').textContent='✗'; }
    });
    this.answered++;
    if(ok) this.score++; else this.missed.push(idx);
    const fb=document.getElementById('fb');
    fb.className='fb show '+(ok?'ok':'no');
    fb.innerHTML = '<div class="verdict">'+(ok?'✓ Correct':'✗ Incorrect')+'</div>'+
      '<div class="ans">Answer: '+'ABCD'[q.correct]+'. '+esc(q.short)+'</div>'+
      '<div class="expl">'+esc(q.expl)+'</div>'+
      '<div class="cite">📖 '+esc(q.cite)+'</div>';
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('nextbtn').disabled = false;
    document.getElementById('skipbtn').style.display = 'none';
  },

  next(skip){
    if(skip && !this.locked){ /* skipped, not answered */ }
    this.i++;
    if(this.i >= this.order.length){ this.finish(); return; }
    this.render();
    window.scrollTo({top:0,behavior:'smooth'});
  },

  finish(){
    document.getElementById('quiz').style.display='none';
    const R=document.getElementById('results');
    const total=this.answered;
    const pct = total? Math.round(this.score/total*100):0;
    const pass = pct>=70;
    let miss='';
    if(this.missed.length){
      miss='<h3 style="text-align:left;font-size:16px;color:var(--navy);margin:22px 0 8px;">Review your '+this.missed.length+' missed:</h3><div class="misslist">';
      this.missed.forEach(idx=>{ const q=DATA[idx];
        miss+='<div class="missitem"><div class="mq">'+esc(q.q)+'</div>'+
              '<div class="ma"><b>'+'ABCD'[q.correct]+'. '+esc(q.short)+'</b> — '+esc(q.expl)+'</div>'+
              '<div class="mc">📖 '+esc(q.cite)+'</div></div>';
      });
      miss+='</div>';
    } else {
      miss='<div class="allright">🎯 Perfect — every question correct!</div>';
    }
    let drillHtml='';
    if(DRILL && DRILL.length){
      drillHtml='<details class="drill"><summary>📌 High-Yield Drill Box ('+DRILL.length+' must-know facts)</summary>';
      DRILL.forEach(d=>{ drillHtml+='<div class="drillrow"><b>'+esc(d.label)+':</b> '+esc(d.text)+'</div>'; });
      drillHtml+='</details>';
    }
    R.innerHTML =
      '<h1>'+(pass?'Nice work 👍':'Keep grinding 💪')+'</h1>'+
      '<div class="bigscore">'+this.score+'<small>/'+total+'</small></div>'+
      '<div class="pct '+(pass?'pass':'fail')+'">'+pct+'%  '+(pass?'· passing (≥70%)':'· below 70%')+'</div>'+
      '<div class="nav" style="max-width:430px;margin:0 auto 4px;">'+
        '<button class="btn primary" onclick="QUIZ.retake(false)">Retake all</button>'+
        (this.missed.length?'<button class="btn ghost" onclick="QUIZ.retake(true)">Retake missed only</button>':'')+
      '</div>'+
      miss + drillHtml;
    R.style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  }
};

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('quiz').style.display==='none') return;
  const k=e.key.toLowerCase();
  if(['a','b','c','d'].includes(k)) QUIZ.pick('abcd'.indexOf(k));
  else if(['1','2','3','4'].includes(k)) QUIZ.pick(+k-1);
  else if(e.key==='Enter' && !document.getElementById('nextbtn').disabled) QUIZ.next();
});

QUIZ.init();
</script>
</body>
