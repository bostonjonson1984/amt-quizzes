<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Block 2 Materials &amp; Processes — Notes Review</title>
<style>
  :root{
    --navy:#0d2a4a; --navy2:#15436e; --gold:#ffce4d; --ink:#1c2330;
    --green:#1f9d57; --greenbg:#e7f7ee; --red:#d6453d; --redbg:#fdecea;
    --line:#e3e8f0; --muted:#5a6678; --card:#ffffff; --bg:#eef2f8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:0 16px env(safe-area-inset-bottom);
  }
  .wrap{width:100%; max-width:720px; margin:0 auto;}

  /* top bar */
  .bar{position:sticky; top:0; z-index:10; background:var(--bg); padding:14px 0 8px;}
  .barrow{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted); font-weight:600;}
  .score{color:var(--navy);}
  .prog{height:8px; background:#dbe3ee; border-radius:6px; margin-top:8px; overflow:hidden;}
  .progfill{height:100%; width:0; background:linear-gradient(90deg,var(--navy2),var(--gold)); transition:width .35s ease;}

  /* card */
  .card{background:var(--card); border-radius:14px; padding:22px 20px 20px; margin-top:14px;
        box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .tag{display:inline-block; background:#eef2f8; color:var(--navy2); font-size:10.5px; font-weight:800;
       letter-spacing:.5px; padding:3px 9px; border-radius:11px; text-transform:uppercase;}
  .stem{font-size:19px; line-height:1.42; font-weight:600; margin:12px 0 18px; color:#0d1b2a;}

  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{display:flex; align-items:flex-start; gap:11px; width:100%; text-align:left;
       background:#f7f9fc; border:1.5px solid var(--line); border-radius:11px;
       padding:14px 15px; font-size:16px; line-height:1.35; cursor:pointer;
       transition:border-color .12s, background .12s, transform .05s; color:var(--ink);}
  .opt:hover:not(.locked){border-color:var(--navy2); background:#fff;}
  .opt:active:not(.locked){transform:scale(.995);}
  .opt .L{flex:0 0 26px; height:26px; border-radius:50%; background:#e6ecf4; color:var(--navy);
          font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;}
  .opt .T{flex:1; padding-top:2px;}
  .opts.locked .opt{cursor:default;}
  .opt.correct{border-color:var(--green); background:var(--greenbg);}
  .opt.correct .L{background:var(--green); color:#fff;}
  .opt.wrong{border-color:var(--red); background:var(--redbg);}
  .opt.wrong .L{background:var(--red); color:#fff;}
  .opt .mark{margin-left:auto; font-weight:800; font-size:15px; align-self:center;}
  .opt.correct .mark{color:var(--green);}
  .opt.wrong .mark{color:var(--red);}

  /* feedback */
  .fb{margin-top:16px; border-radius:11px; padding:15px 16px; display:none;}
  .fb.show{display:block; animation:rise .25s ease;}
  @keyframes rise{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .fb.ok{background:var(--greenbg); border:1px solid #b9e6cb;}
  .fb.no{background:var(--redbg); border:1px solid #f3c6c2;}
  .fb .verdict{font-weight:800; font-size:15px; margin-bottom:5px;}
  .fb.ok .verdict{color:var(--green);}
  .fb.no .verdict{color:var(--red);}
  .fb .ans{font-weight:700; margin-bottom:6px;}
  .fb .expl{font-size:14.5px; line-height:1.5; color:#27313f;}
  .fb .cite{margin-top:9px; font-size:12.5px; color:var(--muted); font-style:italic;}

  .nav{display:flex; gap:10px; margin:16px 0 26px;}
  .btn{flex:1; border:none; border-radius:11px; padding:15px; font-size:16px; font-weight:700;
       cursor:pointer; font-family:inherit;}
  .btn.primary{background:var(--navy); color:#fff;}
  .btn.primary:hover{background:var(--navy2);}
  .btn.ghost{background:#fff; color:var(--navy); border:1.5px solid var(--line);}
  .btn:disabled{opacity:.4; cursor:default;}
  .hint{text-align:center; font-size:12px; color:var(--muted); margin:-12px 0 22px;}

  /* start + results screens */
  .screen{background:var(--card); border-radius:16px; padding:30px 24px; margin-top:22px; text-align:center;
          box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .screen h1{font-size:24px; margin:0 0 6px; color:var(--navy);}
  .screen .sub{color:var(--muted); font-size:14px; margin-bottom:22px; line-height:1.45;}
  .bigscore{font-size:60px; font-weight:800; color:var(--navy); line-height:1; margin:8px 0;}
  .bigscore small{font-size:22px; color:var(--muted); font-weight:600;}
  .pct{font-size:17px; font-weight:700; margin-bottom:18px;}
  .pass{color:var(--green);} .fail{color:var(--red);}
  .opt.toggle{justify-content:center; cursor:pointer; font-weight:600; max-width:320px; margin:0 auto 18px;}
  .opt.toggle.on{border-color:var(--navy2); background:#eef4fb;}
  .misslist{text-align:left; margin-top:6px;}
  .missitem{border-left:3px solid var(--red); background:#fff6f5; border-radius:6px; padding:11px 13px; margin-bottom:10px;}
  .missitem .mq{font-weight:600; font-size:14.5px; margin-bottom:5px;}
  .missitem .ma{font-size:13.5px; color:#27313f;} .missitem .mc{font-size:12px; color:var(--muted); font-style:italic; margin-top:4px;}
  .allright{font-size:16px; color:var(--green); font-weight:700; margin:14px 0;}
  details.drill{margin:18px 0 4px; text-align:left;}
  details.drill summary{cursor:pointer; font-weight:700; color:var(--navy); font-size:15px; padding:8px 0;}
  .drillrow{border-bottom:1px solid var(--line); padding:9px 2px; font-size:13.5px;}
  .drillrow b{color:var(--navy2);}
  .foot{text-align:center; color:#9aa6b8; font-size:11px; margin:10px 0 26px;}
</style>
</head>

<script>
const DATA  = [{"q": "An alloy is best defined as a base metal to which what has been added?", "options": ["Small quantities of other metals or elements", "An acid that replaces ions during a chemical reaction", "A protective oxide coating only", "A non-metallic resin filler"], "correct": 0, "short": "Base metal + other metals/elements.", "expl": "A base metal such as iron to which small quantities of other metals or elements are added is called an alloy; the additions change or improve the chemical/physical properties.", "cite": "FAA-H-8083-30B, p. 7-2", "topic": "Metals & Alloys"}, {"q": "Which three metals does the notes page list as the common AIRCRAFT metals?", "options": ["Copper, brass, bronze", "Aluminum, titanium, steel", "Magnesium, lead, zinc", "Nickel, tin, silver"], "correct": 1, "short": "Aluminum, titanium, steel.", "expl": "The notes name aluminum, titanium, and steel as the core aircraft metals. Magnesium is noted as basically retired because it ignites easily and is hard to extinguish.", "cite": "FAA-H-8083-30B, p. 7-2 (AIM Materials notes p.1)", "topic": "Metals & Alloys"}, {"q": "The term 'ferrous' comes from the Latin word for what element?", "options": ["Carbon", "Copper", "Iron", "Nickel"], "correct": 2, "short": "Iron (Latin 'ferrum').", "expl": "'Ferrous' applies to the group of metals having iron as their principal element. Steel is ferrous because it contains iron.", "cite": "FAA-H-8083-30B, p. 7-2", "topic": "Ferrous Metals"}, {"q": "Ferrous metals share which physical property that non-ferrous metals lack?", "options": ["They are lighter than aluminum", "They are always non-magnetic", "They are always corrosion-proof", "They are magnetic (iron-based)"], "correct": 3, "short": "Ferrous = magnetic / iron-based.", "expl": "Because ferrous metals contain iron, they are magnetic; therefore non-ferrous (non-iron) materials are non-magnetic. A magnet is a quick field check for ferrous vs. non-ferrous.", "cite": "FAA-H-8083-30B, p. 7-2 (AIM notes p.1)", "topic": "Ferrous Metals"}, {"q": "Why has magnesium been largely retired from aircraft structural use?", "options": ["It catches fire easily and is difficult to extinguish", "It is far too heavy", "It cannot be alloyed", "It is magnetic and disrupts compasses"], "correct": 0, "short": "Flammable / hard to extinguish.", "expl": "The notes flag magnesium as the most flammable structural metal — it ignites readily and is difficult to put out, so it has basically been retired from new construction.", "cite": "FAA-H-8083-30B, p. 7-8 (AIM notes p.1,6)", "topic": "Magnesium"}, {"q": "Strength is the ability of a material to resist what?", "options": ["Corrosion and oxidation", "Deformation, and to resist force without breaking", "Heat conduction", "Magnetic attraction"], "correct": 1, "short": "Resist deformation / force without breaking.", "expl": "Strength is one of the most important properties of a material — the ability to resist deformation, and the ability to resist force without breaking.", "cite": "FAA-H-8083-30B, p. 7-1 (AIM notes p.1)", "topic": "Strength"}, {"q": "Which strength describes the ability to resist a PULLING (tension) load?", "options": ["Yield strength", "Shear strength", "Tensile strength", "Bearing strength"], "correct": 2, "short": "Tensile strength = pulling/tension.", "expl": "Tensile strength resists being pulled apart (tension). Shear resists side-to-side forces; bearing strength resists crushing/compressing.", "cite": "FAA-H-8083-30B, p. 7-1 (AIM notes p.1)", "topic": "Strength"}, {"q": "Shear strength is the ability of a material to resist which type of force?", "options": ["Bending around a radius", "Straight pulling apart", "Crushing/compressing", "Side-to-side (forces trying to slide layers past each other)"], "correct": 3, "short": "Shear = side-to-side forces.", "expl": "Shear strength resists side-to-side forces — the kind that try to slice or slide one layer past another (e.g., the load on a rivet or bolt shank).", "cite": "FAA-H-8083-30B, p. 7-1 (AIM notes p.1)", "topic": "Strength"}, {"q": "Yield strength refers to a material's ability to do what?", "options": ["Resist deformation (resist taking a permanent set)", "Resist being pulled apart", "Resist crushing", "Conduct electricity"], "correct": 0, "short": "Yield = resist deformation/permanent set.", "expl": "Yield strength is the point at which a material resists permanent deformation; past the yield point it takes a permanent set and won't spring back.", "cite": "FAA-H-8083-30B, p. 7-1 (AIM notes p.1)", "topic": "Strength"}, {"q": "Bearing strength is the ability of a material to resist what kind of load?", "options": ["Tension", "Crushing / compressing", "Shear", "Torsion only"], "correct": 1, "short": "Bearing = crushing/compressing.", "expl": "Bearing strength resists crushing or compressing loads — important at bolt holes and fittings where one part presses against another.", "cite": "FAA-H-8083-30B, p. 7-1 (AIM notes p.1-2)", "topic": "Strength"}, {"q": "Hardness is the property that lets a material resist what?", "options": ["Heat conduction", "Pulling forces only", "Abrasion, penetration, cutting action, and permanent distortion", "Magnetic fields"], "correct": 2, "short": "Resist abrasion/penetration/cutting/distortion.", "expl": "Hardness is the ability of a material to resist abrasion, penetration, cutting action, and permanent distortion. It can be increased by cold-working and, for steel and some aluminum alloys, by heat treatment.", "cite": "FAA-H-8083-30B, p. 7-1 (AIM notes p.2)", "topic": "Properties of Metals"}, {"q": "Hardness in steel and certain aluminum alloys can be increased by what two methods?", "options": ["Welding and brazing", "Annealing and normalizing", "Painting and anodizing", "Cold working and heat treatment"], "correct": 3, "short": "Cold working & heat treatment.", "expl": "Hardness may be increased by cold working the metal and, in the case of steel and certain aluminum alloys, by heat treatment.", "cite": "FAA-H-8083-30B, p. 7-1 (AIM notes p.2)", "topic": "Properties of Metals"}, {"q": "Density is best defined as which of the following?", "options": ["The weight of a unit volume of a material", "The ability to be drawn into wire", "The ability to return to original shape", "The ability to resist abrasion"], "correct": 0, "short": "Weight of a unit volume.", "expl": "Density is the weight of a unit volume of a material. In aviation it matters because weight is always a design concern.", "cite": "FAA-H-8083-30B, p. 7-1 (AIM notes p.2)", "topic": "Properties of Metals"}, {"q": "Malleability is the property that allows a metal to be:", "options": ["Drawn out into thin wire", "Hammered, rolled, or pressed into shape without cracking or breaking", "Returned to its original shape after a load is removed", "Melted by the application of heat"], "correct": 1, "short": "Hammered/rolled/pressed without cracking.", "expl": "A malleable metal can be hammered, rolled, or pressed into various shapes without cracking, breaking, or leaving some other detrimental effect.", "cite": "FAA-H-8083-30B, p. 7-1 (AIM notes p.2)", "topic": "Properties of Metals"}, {"q": "Ductility is the property that permits a metal to be permanently:", "options": ["Heated until it melts", "Compressed into a denser form", "Drawn, bent, or twisted into shapes without breaking", "Magnetized"], "correct": 2, "short": "Drawn/bent/twisted without breaking.", "expl": "Ductility permits a metal to be permanently drawn, bent, or twisted into various shapes without breaking. It is essential for metals used in wire and tubing.", "cite": "FAA-H-8083-30B, p. 7-1 (AIM notes p.2)", "topic": "Properties of Metals"}, {"q": "Which property is ESSENTIAL for metals used in making wire and tubing?", "options": ["Conductivity", "Brittleness", "Fusibility", "Ductility"], "correct": 3, "short": "Ductility.", "expl": "Because wire and tubing must be drawn out without breaking, ductility is the essential property for those metals.", "cite": "FAA-H-8083-30B, p. 7-1 (AIM notes p.2)", "topic": "Properties of Metals"}, {"q": "Elasticity is the property that enables a metal to:", "options": ["Return to its original shape and size after the deforming force is removed", "Be permanently drawn into wire", "Resist abrasion and penetration", "Melt at low temperature"], "correct": 0, "short": "Return to original shape/size.", "expl": "Elasticity is the property that enables a metal to return to its original shape and size when the force that caused the change of shape is removed.", "cite": "FAA-H-8083-30B, p. 7-1 (AIM notes p.2)", "topic": "Properties of Metals"}, {"q": "Toughness is a desirable aircraft-metal property meaning the material can:", "options": ["Be hammered into thin sheets", "Withstand tearing or shearing and be deformed without breaking", "Conduct heat rapidly", "Resist all corrosion"], "correct": 1, "short": "Withstand tearing/shearing without breaking.", "expl": "A tough material can withstand tearing or shearing and may be stretched or otherwise deformed without breaking — a highly desirable property in aircraft metals.", "cite": "FAA-H-8083-30B, p. 7-1 (AIM notes p.2)", "topic": "Properties of Metals"}, {"q": "Brittleness is the property of a metal that allows little bending or deformation without:", "options": ["Drawing into wire", "Returning to original shape", "Shattering (it snaps rather than bends)", "Conducting electricity"], "correct": 2, "short": "Shattering without bending.", "expl": "A brittle metal breaks or cracks with little change of shape — it is apt to break or crack without much bending or deformation. Cast iron, cast aluminum, and very hard steel are brittle.", "cite": "FAA-H-8083-30B, p. 7-2 (AIM notes p.2-3)", "topic": "Properties of Metals"}, {"q": "Fusibility is the ability of a metal to:", "options": ["Carry electric current", "Resist abrasion", "Be hammered flat", "Become liquid by the application of heat"], "correct": 3, "short": "Become liquid by heat (melting/welding).", "expl": "Fusibility is the ability of a metal to become liquid by the application of heat — the property that makes welding possible. Steel fuses around 2,600 °F; aluminum alloys at about 1,100 °F.", "cite": "FAA-H-8083-30B, p. 7-2 (AIM notes p.3)", "topic": "Properties of Metals"}, {"q": "Conductivity is the property that enables a metal to carry what?", "options": ["Heat or electricity", "Tension loads", "Magnetic flux only", "Liquid"], "correct": 0, "short": "Heat or electricity.", "expl": "Conductivity is the property that enables a metal to carry heat or electricity. Heat conductivity governs how much heat is needed for proper fusion in welding.", "cite": "FAA-H-8083-30B, p. 7-2 (AIM notes p.3)", "topic": "Properties of Metals"}, {"q": "On the aircraft, all conductive metal surfaces are electrically BONDED together so that:", "options": ["The aircraft becomes magnetic", "Static electricity is dissipated at the trailing edges of the wings (static discharge)", "Heat treatment is unnecessary", "Corrosion cannot occur"], "correct": 1, "short": "Static dissipated at trailing-edge dischargers.", "expl": "Electrical bonding ties all conductive surfaces together so static electricity is dissipated by the static dischargers at the trailing edges of the wings, eliminating radio interference.", "cite": "FAA-H-8083-30B, p. 7-2 (AIM notes p.3)", "topic": "Properties of Metals"}, {"q": "Thermal expansion refers to which reactions in a metal?", "options": ["Corrosion by salt water", "Hardening by cold work", "Contraction and expansion caused by cooling and heating", "Magnetization by current"], "correct": 2, "short": "Contraction/expansion from heating/cooling.", "expl": "Thermal expansion is the contraction and expansion produced in metals as a result of heating or cooling; heat applied to a metal causes it to expand (become larger).", "cite": "FAA-H-8083-30B, p. 7-2 (AIM notes p.3)", "topic": "Properties of Metals"}, {"q": "What are the THREE methods of metalworking?", "options": ["Hardening, tempering, normalizing", "Casting, forging, welding", "Rolling, drawing, annealing", "Hot-working, cold-working, and extruding"], "correct": 3, "short": "Hot-working, cold-working, extruding.", "expl": "There are three methods of metalworking: hot-working, cold-working, and extruding. The method used depends on the metal and the part required.", "cite": "FAA-H-8083-30B, p. 7-12 (AIM notes p.3)", "topic": "Metalworking"}, {"q": "'Wrought' describes a process used to do what to a metal?", "options": ["Shape, alter, bend, and manufacture various forms (e.g., iron, steel, aluminum)", "Pour molten metal into a mold", "Add carbon to the surface", "Coat the metal with pure aluminum"], "correct": 0, "short": "Shaping/altering/bending/manufacturing.", "expl": "Wrought refers to metal that has been mechanically worked (shaped, altered, bent, manufactured) into forms, as opposed to cast. Wrought iron, steel, and aluminum are examples.", "cite": "FAA-H-8083-30B, p. 7-7, 7-12 (AIM notes p.3)", "topic": "Metalworking"}, {"q": "Casting is a process in which liquid metal is:", "options": ["Forced through a die", "Poured into a mold with a hollow cavity, then allowed to cool and solidify", "Hammered while hot", "Drawn through successively smaller dies"], "correct": 1, "short": "Poured into a mold, then solidified.", "expl": "Casting pours liquid metal into a mold containing a hollow cavity of the desired shape, then lets it cool and solidify into the part.", "cite": "FAA-H-8083-30B, p. 7-6 (AIM notes p.3)", "topic": "Metalworking"}, {"q": "Hot-working means forming metal at what temperature?", "options": ["Below freezing", "Room temperature", "An elevated temperature (above the critical range)", "Exactly at the melting point"], "correct": 2, "short": "Elevated (above critical range) temperature.", "expl": "Hot-working forms metal at an elevated temperature, above the critical range. Pressing is used for large objects; drop forging hammers while hot; hammering is used for small parts (smith forging).", "cite": "FAA-H-8083-30B, p. 7-12 (AIM notes p.3)", "topic": "Metalworking"}, {"q": "Cold-working is performed at what temperature relative to the metal's critical range?", "options": ["At the annealing temperature only", "Above the critical temperature", "At the fusion (melting) point", "Below the critical temperature (room temp) — e.g., cold rolling and cold drawing"], "correct": 3, "short": "Below critical temp (cold roll/draw).", "expl": "Cold-working is mechanical working performed below the metal's critical temperature; the two key processes for a mechanic are cold rolling and cold drawing. It strain-hardens the metal.", "cite": "FAA-H-8083-30B, p. 7-29 (AIM notes p.4)", "topic": "Metalworking"}, {"q": "In extrusion, hot or cold metal is forced through a ___ to produce the desired shape.", "options": ["Die", "Mold", "Furnace", "Quench tank"], "correct": 0, "short": "A die.", "expl": "Extrusion forces hot or cold metal through a die that produces the desired cross-sectional shape — used mostly on aluminum.", "cite": "FAA-H-8083-30B, p. 7-12 (AIM notes p.4)", "topic": "Metalworking"}, {"q": "Non-ferrous metals are defined by the fact that they:", "options": ["Always contain carbon", "Do not contain iron (iron is not the base/principal constituent)", "Are always magnetic", "Cannot be heat-treated"], "correct": 1, "short": "Contain no iron.", "expl": "Non-ferrous refers to all metals that have elements OTHER than iron as their base or principal constituent — aluminum, titanium, copper, magnesium, plus alloys like Monel.", "cite": "FAA-H-8083-30B, p. 7-5 (AIM notes p.4)", "topic": "Non-Ferrous Metals"}, {"q": "Why is PURE aluminum alloyed with other metals for aircraft use?", "options": ["Pure aluminum is too heavy", "Pure aluminum is magnetic", "Pure aluminum lacks sufficient strength for most aircraft applications", "Pure aluminum cannot be machined"], "correct": 2, "short": "Pure aluminum lacks strength.", "expl": "Commercially pure aluminum lacks sufficient strength for most aircraft applications, so it is alloyed with other metals to increase its strength.", "cite": "FAA-H-8083-30B, p. 7-5 (AIM notes p.4)", "topic": "Aluminum"}, {"q": "In the wrought aluminum index, the 1xxx series designates:", "options": ["Magnesium as the alloying element", "Copper as the alloying element", "Zinc as the alloying element", "Commercially pure aluminum (99% or higher)"], "correct": 3, "short": "1xxx = pure aluminum (≥99%).", "expl": "The 1xxx group is 99% or higher pure aluminum — excellent corrosion resistance and conductivity, low mechanical properties.", "cite": "FAA-H-8083-30B, p. 7-7 (AIM notes p.4)", "topic": "Aluminum Alloy Series"}, {"q": "What is the principal alloying element in the 2xxx aluminum series (e.g., 2024)?", "options": ["Copper", "Manganese", "Silicon", "Zinc"], "correct": 0, "short": "2xxx = copper.", "expl": "Copper is the principal alloying element of the 2xxx series; its best-known alloy is 2024. It has poor corrosion resistance unclad, so it is usually clad.", "cite": "FAA-H-8083-30B, p. 7-7 (AIM notes p.4)", "topic": "Aluminum Alloy Series"}, {"q": "What is the principal alloying element in the 3xxx aluminum series (e.g., 3003)?", "options": ["Copper", "Manganese", "Magnesium", "Zinc"], "correct": 1, "short": "3xxx = manganese.", "expl": "Manganese is the principal alloying element of the 3xxx series, such as 3003 — a common non-heat-treatable alloy.", "cite": "FAA-H-8083-30B, p. 7-7 (AIM notes p.4)", "topic": "Aluminum Alloy Series"}, {"q": "What is the principal alloying element in the 4xxx aluminum series?", "options": ["Copper", "Magnesium", "Silicon", "Zinc"], "correct": 2, "short": "4xxx = silicon.", "expl": "Silicon is the principal alloying element of the 4xxx series; silicon lowers the melting point and is used in welding/brazing filler.", "cite": "FAA-H-8083-30B, p. 7-7 (AIM notes p.4)", "topic": "Aluminum Alloy Series"}, {"q": "What is the principal alloying element in the 5xxx aluminum series (e.g., 5052)?", "options": ["Copper", "Silicon", "Manganese", "Magnesium"], "correct": 3, "short": "5xxx = magnesium.", "expl": "Magnesium is the principal alloying element of the 5xxx series, such as 5052 — a common non-heat-treatable alloy with good corrosion resistance.", "cite": "FAA-H-8083-30B, p. 7-7 (AIM notes p.4)", "topic": "Aluminum Alloy Series"}, {"q": "The 6xxx aluminum series is alloyed principally with which TWO elements?", "options": ["Magnesium and silicon", "Copper and zinc", "Manganese and chromium", "Nickel and tin"], "correct": 0, "short": "6xxx = magnesium + silicon.", "expl": "The 6xxx series uses magnesium and silicon together (e.g., 6061) — heat-treatable, good corrosion resistance, widely used.", "cite": "FAA-H-8083-30B, p. 7-7 (AIM notes p.4)", "topic": "Aluminum Alloy Series"}, {"q": "What is the principal alloying element in the 7xxx aluminum series (e.g., 7075)?", "options": ["Copper", "Zinc", "Silicon", "Manganese"], "correct": 1, "short": "7xxx = zinc.", "expl": "Zinc is the principal alloying element of the 7xxx series, such as 7075 — a very high-strength heat-treatable alloy.", "cite": "FAA-H-8083-30B, p. 7-7 (AIM notes p.4)", "topic": "Aluminum Alloy Series"}, {"q": "The 8xxx aluminum series is designated for:", "options": ["Pure aluminum", "Copper", "Other elements (alloying elements not covered by 2xxx-7xxx)", "Magnesium and silicon"], "correct": 2, "short": "8xxx = other elements.", "expl": "The 8xxx group covers 'other elements' — alloying constituents that don't fall into the 2xxx through 7xxx categories.", "cite": "FAA-H-8083-30B, p. 7-7 (AIM notes p.4)", "topic": "Aluminum Alloy Series"}, {"q": "Most external aircraft surfaces are made of which aluminum?", "options": ["Cast aluminum", "1100 pure aluminum", "7075-T6 bare", "Alclad aluminum"], "correct": 3, "short": "Alclad.", "expl": "Most external surfaces of aircraft are made of Alclad aluminum for its corrosion protection.", "cite": "FAA-H-8083-30B, p. 7-21 (AIM notes p.4)", "topic": "Alclad"}, {"q": "Alclad is best described as:", "options": ["Pure aluminum coated on the surface of an alloyed-aluminum core to improve corrosion resistance", "Aluminum mixed with zinc throughout", "A heat-treated copper alloy", "Aluminum with a paint primer baked on"], "correct": 0, "short": "Pure Al clad over alloy core for corrosion resistance.", "expl": "Alclad (and Pureclad) is a sheet with an aluminum-alloy core coated with a layer of PURE aluminum (~5.5% on each side) that protects the core both as a barrier and electrolytically (sacrificially).", "cite": "FAA-H-8083-30B, p. 7-21 (AIM notes p.4)", "topic": "Alclad"}, {"q": "When discussing aluminum, the property most concerned with is:", "options": ["Magnetism", "Weight (aluminum is valued for its light weight)", "Electrical insulation", "Hardness above all"], "correct": 1, "short": "Weight.", "expl": "Matthew's note: 'Most always think of WEIGHT when discussing aluminum.' Aluminum's light weight is its headline aircraft property.", "cite": "FAA-H-8083-30B, p. 7-5 (AIM notes p.4)", "topic": "Aluminum"}, {"q": "Heat treatment is the process of HEATING and COOLING metals to:", "options": ["Coat the metal with pure aluminum", "Add carbon to the surface", "Gain a desired quality (e.g., hardness, softness, strength)", "Magnetize the metal"], "correct": 2, "short": "Heating + cooling to gain a desired quality.", "expl": "Heat treating is the controlled heating and cooling of metals to gain a desired quality such as hardness, strength, or softness.", "cite": "FAA-H-8083-30B, p. 7-21 (AIM notes p.5)", "topic": "Heat Treatment"}, {"q": "The two heat treatments used on ALUMINUM are:", "options": ["Hardening and tempering", "Carburizing and nitriding", "Annealing and normalizing", "Solution heat treatment and precipitation (age) heat treatment"], "correct": 3, "short": "Solution + precipitation (age).", "expl": "There are two types of heat treatment applicable to aluminum alloys: solution heat treatment and precipitation (also called age) heat treatment.", "cite": "FAA-H-8083-30B, p. 7-21 (AIM notes p.5)", "topic": "Heat Treatment"}, {"q": "Solution heat treating involves heating the alloy until the constituents enter solid solution, then:", "options": ["Quenching to hold the constituents in solution", "Air-cooling slowly in still air", "Reheating to add carbon", "Coating with pure aluminum"], "correct": 0, "short": "Quench to hold constituents in solution.", "expl": "In solution heat treatment the alloy is heated so the alloying constituent enters solid solution, then quenched to lock it in a supersaturated, unstable state ready to age.", "cite": "FAA-H-8083-30B, p. 7-7, 7-22 (AIM notes p.5)", "topic": "Heat Treatment"}, {"q": "Which quenching medium is the FASTEST (strongest), and which is the SLOWEST?", "options": ["Oil is fastest; brine is slowest", "Brine is fastest; oil is slowest (water is in between)", "Water is fastest; brine is slowest", "Air is fastest; water is slowest"], "correct": 1, "short": "Brine fastest → water → oil slowest.", "expl": "Of the three quenching liquids, brine is the strongest (fastest) quenching medium, water is next, and oil is the least (slowest). Brine is a 5-10% salt solution.", "cite": "FAA-H-8083-30B, p. 7-16 (AIM notes p.5)", "topic": "Heat Treatment"}, {"q": "Brine quench is a salt solution of approximately what concentration?", "options": ["1 percent salt in water", "25 to 30 percent salt in water", "5 to 10 percent salt in water", "50 percent salt in water"], "correct": 2, "short": "5-10% salt solution.", "expl": "Brine is a 5 to 10 percent solution of salt in water, used as the fastest quench because the salt speeds heat removal.", "cite": "FAA-H-8083-30B, p. 7-16 (AIM notes p.5)", "topic": "Heat Treatment"}, {"q": "Precipitation (age) heat treatment occurs when the metal, after solution treatment, is:", "options": ["Cold rolled to final size", "Quenched a second time in brine", "Carburized in a furnace", "Allowed to age harden — naturally at room temperature or artificially at an elevated temperature"], "correct": 3, "short": "Age hardening (natural or artificial).", "expl": "Precipitation hardening (also called age-hardening, precipitation-hardening, or precipitation heat treatment) is when the solution-treated metal hardens by aging — naturally at room temperature, or artificially at an elevated temperature.", "cite": "FAA-H-8083-30B, p. 7-7, 7-22 (AIM notes p.5)", "topic": "Heat Treatment"}, {"q": "The temper designation -T2 means:", "options": ["Annealed (cast products only)", "Solution heat-treated, then cold-worked", "Artificially aged only", "Solution heat-treated then artificially aged"], "correct": 0, "short": "T2 = annealed (cast products only).", "expl": "T2 designates annealed (cast products only). Memorize the full ladder T1-T10.", "cite": "FAA-H-8083-30B, p. 7-21 (AIM notes p.5)", "topic": "Temper Designations"}, {"q": "The temper designation -T3 means:", "options": ["Solution heat-treated only", "Solution heat-treated and then cold-worked", "Artificially aged", "Solution then stabilized"], "correct": 1, "short": "T3 = solution heat-treated + cold-worked.", "expl": "T3 = solution heat-treated and then cold-worked (e.g., 2024-T3 sheet).", "cite": "FAA-H-8083-30B, p. 7-21 (AIM notes p.5)", "topic": "Temper Designations"}, {"q": "The temper designation -T4 means:", "options": ["Solution then artificially aged", "Annealed cast products", "Solution heat-treated (followed by natural aging)", "Artificially aged only"], "correct": 2, "short": "T4 = solution heat-treated (natural aging).", "expl": "T4 = solution heat-treated, then naturally aged. The handbook also notes T4 and W indicate solution-treated and quenched but not (fully) aged.", "cite": "FAA-H-8083-30B, p. 7-21 (AIM notes p.5)", "topic": "Temper Designations"}, {"q": "The temper designation -T5 means:", "options": ["Solution then stabilized", "Solution heat-treated and cold-worked", "Annealed", "Artificially aged only"], "correct": 3, "short": "T5 = artificially aged only.", "expl": "T5 = artificially aged only (no separate solution-treat step in the designation).", "cite": "FAA-H-8083-30B, p. 7-21 (AIM notes p.5)", "topic": "Temper Designations"}, {"q": "The temper designation -T6 means:", "options": ["Solution heat-treated, then artificially aged", "Solution heat-treated, then naturally aged", "Annealed cast products", "Strain hardened only"], "correct": 0, "short": "T6 = solution + artificially aged.", "expl": "T6 = solution heat-treated and then artificially aged — the hardened, heat-treated condition (e.g., 7075-T6, 6061-T6).", "cite": "FAA-H-8083-30B, p. 7-21 (AIM notes p.5)", "topic": "Temper Designations"}, {"q": "The temper designation -T7 means:", "options": ["Solution then cold-worked", "Solution heat-treated and then stabilized", "Artificially aged only", "Annealed"], "correct": 1, "short": "T7 = solution + stabilized.", "expl": "T7 = solution heat-treated and then stabilized.", "cite": "FAA-H-8083-30B, p. 7-21 (AIM notes p.5)", "topic": "Temper Designations"}, {"q": "The temper designation -T8 means:", "options": ["Annealed cast products", "Solution then naturally aged", "Solution heat-treated, cold-worked, then artificially aged", "Artificially aged then cold-worked"], "correct": 2, "short": "T8 = solution + cold-worked + artificially aged.", "expl": "T8 = solution heat-treated, cold-worked, and then artificially aged (the notes phrase it 'solution, strained and artificially aged').", "cite": "FAA-H-8083-30B, p. 7-21 (AIM notes p.5)", "topic": "Temper Designations"}, {"q": "The temper designation -T9 means:", "options": ["Artificially aged then cold-worked", "Annealed cast products", "Solution then stabilized", "Solution heat-treated, artificially aged, then cold-worked (strain hardened)"], "correct": 3, "short": "T9 = solution + artificially aged + cold-worked.", "expl": "T9 = solution heat-treated, artificially aged, and then cold-worked (the notes: 'solution, artificially aged, strain hardened').", "cite": "FAA-H-8083-30B, p. 7-21 (AIM notes p.6)", "topic": "Temper Designations"}, {"q": "The temper designation -T10 means:", "options": ["Artificially aged and then cold-worked", "Solution heat-treated then artificially aged", "Annealed", "Solution then cold-worked"], "correct": 0, "short": "T10 = artificially aged + cold-worked.", "expl": "T10 = artificially aged and then cold-worked (the notes: 'artificially aged, strain hardened').", "cite": "FAA-H-8083-30B, p. 7-21 (AIM notes p.6)", "topic": "Temper Designations"}, {"q": "Alclad material is generally limited to no more than how many reheat treatments?", "options": ["One (1)", "Three (3)", "Five (5)", "Ten (10)"], "correct": 1, "short": "3 reheat treatments for Alclad.", "expl": "Heat-treatable metals can generally be reheat-treated any number of times, but ALCLAD material is generally limited to no more than three reheat treatments, because repeated treatment lets the alloy diffuse into the clad layer and defeats the cladding.", "cite": "FAA-H-8083-30B, p. 7-22 (AIM notes p.6)", "topic": "Heat Treatment"}, {"q": "Annealing is the process that softens a metal to do what, and it is the opposite of:", "options": ["Adds carbon; opposite of nitriding", "Increases hardness; opposite of tempering", "Decreases internal stress; it is the opposite of hardening", "Removes the clad layer; opposite of cladding"], "correct": 2, "short": "Softens / relieves stress; opposite of hardening.", "expl": "Annealing softens a metal to decrease internal stress; it is the opposite of hardening. The temperature is raised to the proper annealing temperature then cooled to 500 °F at a rate of about 50 °F per hour.", "cite": "FAA-H-8083-30B, p. 7-19 (AIM notes p.6)", "topic": "Heat Treatment"}, {"q": "Which three are the common NON-heat-treatable aluminum alloys from the notes?", "options": ["355, 214, and 112", "2024, 7075, and 6061", "2017, 2024, and 2117", "1100, 3003, and 5052"], "correct": 3, "short": "1100, 3003, 5052.", "expl": "1100 (pure), 3003 (manganese), and 5052 (magnesium) are non-heat-treatable — they are strengthened by strain hardening (cold work), not by heat treatment.", "cite": "FAA-H-8083-30B, p. 7-8, 7-21 (AIM notes p.6)", "topic": "Non-Heat-Treatable Alloys"}, {"q": "Strain hardening (work hardening) strengthens a metal by:", "options": ["Mechanically working it below the critical temperature", "Heating it above the critical range and quenching", "Adding carbon to the surface", "Aging it at elevated temperature"], "correct": 0, "short": "Cold working below critical temp.", "expl": "Strain hardening (also called cold working or work hardening) mechanically works the metal below its critical temperature to strengthen it. Hardness/temper is shown by a letter designation.", "cite": "FAA-H-8083-30B, p. 7-21, 7-29 (AIM notes p.6)", "topic": "Strain Hardening"}, {"q": "The hardness designation 'F' means:", "options": ["Annealed (recrystallized)", "As fabricated", "Strain hardened", "Solution heat-treated"], "correct": 1, "short": "F = as fabricated.", "expl": "F designates the 'as fabricated' condition — no special control over the temper.", "cite": "FAA-H-8083-30B, p. 7-21 (AIM notes p.6)", "topic": "Hardness Designations"}, {"q": "The hardness designation 'O' means:", "options": ["Strain hardened only", "As fabricated", "Annealed, recrystallized (softest temper of wrought products)", "Strain hardened and stabilized"], "correct": 2, "short": "O = annealed, recrystallized.", "expl": "O designates the annealed, recrystallized temper — the softest condition of wrought products.", "cite": "FAA-H-8083-30B, p. 7-21 (AIM notes p.6)", "topic": "Hardness Designations"}, {"q": "The hardness designation 'H1' means:", "options": ["Annealed", "Strain hardened and partially annealed", "Strain hardened and stabilized", "Strain hardened only"], "correct": 3, "short": "H1 = strain hardened only.", "expl": "H1 (plus digits) = strain hardened ONLY.", "cite": "FAA-H-8083-30B, p. 7-8 (AIM notes p.6)", "topic": "Hardness Designations"}, {"q": "The hardness designation 'H2' means:", "options": ["Strain hardened and partially annealed", "Strain hardened only", "Strain hardened and stabilized", "As fabricated"], "correct": 0, "short": "H2 = strain hardened + partially annealed.", "expl": "H2 (plus digits) = strain hardened and PARTIALLY annealed.", "cite": "FAA-H-8083-30B, p. 7-8 (AIM notes p.6)", "topic": "Hardness Designations"}, {"q": "The hardness designation 'H3' means:", "options": ["Strain hardened only", "Strain hardened and stabilized", "Strain hardened and partially annealed", "Annealed, recrystallized"], "correct": 1, "short": "H3 = strain hardened + stabilized.", "expl": "H3 (plus digits) = strain hardened and STABILIZED.", "cite": "FAA-H-8083-30B, p. 7-8 (AIM notes p.6)", "topic": "Hardness Designations"}, {"q": "How is magnesium produced, per the notes?", "options": ["By extruding aluminum", "By smelting iron ore with coke", "By electrolysis of sea water", "By carburizing low-carbon steel"], "correct": 2, "short": "Electrolysis of sea water.", "expl": "Magnesium is one of the lightest structural metals and is obtained from seawater (electrolysis of sea water), brines, and ores like dolomite/magnesite. Like aluminum it is alloyed with other metals.", "cite": "FAA-H-8083-30B, p. 7-8 (AIM notes p.6)", "topic": "Magnesium"}, {"q": "Titanium is best described as a:", "options": ["Pure metal that needs no alloying", "Heavy, magnetic, low-strength metal", "Ferrous metal that rusts quickly", "Light-weight, high-strength metal with excellent corrosion resistance"], "correct": 3, "short": "Light, high-strength, corrosion-resistant.", "expl": "Titanium is a light-weight, high-strength metal with excellent corrosion resistance. It falls between aluminum and stainless steel in density and is about 60% heavier than aluminum, 50% lighter than stainless.", "cite": "FAA-H-8083-30B, p. 7-9 (AIM notes p.7)", "topic": "Titanium"}, {"q": "The three classifications (A-B-C) of titanium alloys are:", "options": ["Alpha, alpha-beta, and beta", "Gamma, delta, epsilon", "Soft, medium, hard", "T1, T2, T3"], "correct": 0, "short": "Alpha, alpha-beta, beta.", "expl": "The A-B-C classification names the three titanium families: A = alpha, B = beta, C = alpha-beta (combination). The notes list them as alpha, alpha-beta, and beta.", "cite": "FAA-H-8083-30B, p. 7-9 (AIM notes p.7)", "topic": "Titanium"}, {"q": "Monel is a high-NICKEL alloy whose approximate composition is:", "options": ["About 80% nickel and 14% chromium", "About 68% nickel and 29% copper (plus small iron and manganese)", "About 90% copper and 10% tin", "About 50% iron and 50% nickel"], "correct": 1, "short": "Monel ≈ 68% Ni / 29% Cu.", "expl": "Monel, the leading high-nickel alloy, is about 68% nickel and 29% copper plus small amounts of iron and manganese. It combines high strength with excellent corrosion resistance and CANNOT be hardened by heat treatment.", "cite": "FAA-H-8083-30B, p. 7-11 (AIM notes p.7)", "topic": "Nickel Alloys"}, {"q": "Inconel is a nickel alloy whose approximate composition (AIM deck figure) is:", "options": ["About 60% copper and 40% zinc", "About 68% nickel and 29% copper", "About 80% nickel and 14% chromium (plus small iron/other elements)", "About 97% copper and 2% beryllium"], "correct": 2, "short": "Inconel ≈ 80% Ni / 14% Cr.", "expl": "AIM deck / note figure: Inconel ≈ 80% nickel and 14% chromium with small iron and other elements. NOTE the FAA-H-8083-31B describes Inconel generically as a nickel-chromium-iron super alloy (Inconel 625/718) for high-temp powerplant use — exam may phrase it that way. Both Monel and Inconel are frequently used on turbine engines.", "cite": "FAA-H-8083-30B p. 7-3 to 7-11; FAA-H-8083-31B (AIM notes p.7)", "topic": "Nickel Alloys"}, {"q": "Monel and Inconel are noted as being 'frequently used on' what?", "options": ["Wooden wing spars", "Landing gear shock struts", "Cabin window frames", "Turbine engines (high temperature, corrosion areas)"], "correct": 3, "short": "Turbine engines.", "expl": "Both nickel alloys (Monel and Inconel) are frequently used on turbine engines because of their high strength and corrosion resistance at elevated temperatures.", "cite": "FAA-H-8083-30B, p. 7-11 (AIM notes p.7)", "topic": "Nickel Alloys"}, {"q": "In aircraft, copper is NOT used in structural areas; its primary use is:", "options": ["Electrical wiring / electrical system (bus bars, bonding, lock wire)", "Wing spars", "Landing gear", "Engine mounts"], "correct": 0, "short": "Electrical wiring.", "expl": "Copper's structural use is limited by its great weight, so it is used primarily in the electrical system — bus bars, bonding, and lock wire — because of its high electrical conductivity.", "cite": "FAA-H-8083-30B, p. 7-10 (AIM notes p.7)", "topic": "Copper Alloys"}, {"q": "Brass is copper alloyed with which element (plus small amounts of others)?", "options": ["Tin", "Zinc", "Beryllium", "Nickel"], "correct": 1, "short": "Brass = copper + ZINC.", "expl": "Brass is a copper alloy containing ZINC (commonly 30-45%) plus small amounts of other metals. (Bronze, by contrast, is copper + tin.)", "cite": "FAA-H-8083-30B, p. 7-10 (AIM notes p.7)", "topic": "Copper Alloys"}, {"q": "Bronze is a copper alloy containing up to about 25% of which element?", "options": ["Beryllium", "Zinc", "Tin", "Magnesium"], "correct": 2, "short": "Bronze = copper + TIN.", "expl": "True bronzes are copper alloys containing TIN (up to ~25%, but those under ~11% are most useful for tube fittings). Do not confuse with brass (copper + zinc).", "cite": "FAA-H-8083-30B, p. 7-10 (AIM notes p.7)", "topic": "Copper Alloys"}, {"q": "Beryllium copper is approximately:", "options": ["89% copper, 9% aluminum", "68% copper, 29% nickel", "60% copper, 40% zinc", "97% copper, 2% beryllium, plus enough nickel for strength/elongation"], "correct": 3, "short": "≈97% Cu, 2% Be (+ nickel).", "expl": "Beryllium copper contains about 97% copper, 2% beryllium, and enough nickel to increase elongation. Heat treatment can raise its tensile strength from 70,000 psi (annealed) to 200,000 psi — good for diaphragms, bearings, springs.", "cite": "FAA-H-8083-30B, p. 7-10 (AIM notes p.7)", "topic": "Copper Alloys"}, {"q": "Any alloy metal that has IRON as its chief ingredient is considered:", "options": ["Ferrous", "Non-ferrous", "An alloy of aluminum", "A composite"], "correct": 0, "short": "Ferrous (iron chief ingredient).", "expl": "Any alloy metal with iron as its chief ingredient is ferrous. Steel is iron with carbon added.", "cite": "FAA-H-8083-30B, p. 7-2 (AIM notes p.8)", "topic": "Ferrous / Steel"}, {"q": "Steel is iron with what added?", "options": ["Zinc", "Carbon", "Copper", "Silicon"], "correct": 1, "short": "Carbon.", "expl": "Steel is iron with carbon added (up to ~1%). Carbon steel forms the base of alloy steels made by adding other elements.", "cite": "FAA-H-8083-30B, p. 7-2 (AIM notes p.8)", "topic": "Ferrous / Steel"}, {"q": "The density of steel is approximately how many grams per cubic centimeter?", "options": ["1.0 g/cc", "2.7 g/cc", "7.9 g/cc", "11.3 g/cc"], "correct": 2, "short": "Steel ≈ 7.9 g/cc.", "expl": "Steel's density is approximately 7.9 grams per cubic centimeter — roughly three times aluminum's 2.7 g/cc, which is why weight is a constant trade-off.", "cite": "FAA-H-8083-30B, Ch.7 (AIM notes p.8)", "topic": "Ferrous / Steel"}, {"q": "Iron in its pure state is cast as:", "options": ["Carburized stock", "Wrought aluminum", "Billet steel", "Cast iron or pig iron"], "correct": 3, "short": "Cast iron / pig iron.", "expl": "Known in its pure state as cast iron or pig iron, iron is made by mixing iron ore with coke and limestone and heating. Steel is iron with carbon added.", "cite": "FAA-H-8083-30B, p. 7-2 (AIM notes p.8)", "topic": "Ferrous / Steel"}, {"q": "The SAE (Society of Automotive Engineers) classifies steel with a code of how many digits?", "options": ["Four digits", "Two digits", "Three digits", "Six digits"], "correct": 0, "short": "Four-digit SAE number.", "expl": "SAE (with AISI) classifies steel with a four-digit number. The first digit = type/alloy class, the second = percent of the main alloying agent, and the last two = carbon content in hundredths of a percent (points).", "cite": "FAA-H-8083-30B, p. 7-2 to 7-4 (AIM notes p.8)", "topic": "SAE Steel Numbering"}, {"q": "In the SAE 4-digit steel code, the FIRST number represents:", "options": ["The carbon content", "The type (class) of steel / primary alloying agent group", "The hardness", "The density"], "correct": 1, "short": "First digit = type/class.", "expl": "The first digit represents the type of steel (alloy class): 1 = carbon, 2 = nickel, 3 = nickel-chromium, 4 = molybdenum, 5 = chromium, etc.", "cite": "FAA-H-8083-30B, p. 7-4 (AIM notes p.8)", "topic": "SAE Steel Numbering"}, {"q": "In the SAE 4-digit steel code, the LAST TWO digits represent:", "options": ["The type of steel", "The percent of alloying agent", "The carbon content in hundredths of one percent (points of carbon)", "The heat-treat temper"], "correct": 2, "short": "Last two = carbon in hundredths %.", "expl": "The last two digits give the carbon content in hundredths of one percent. Example: SAE 1095 = plain carbon (1), 0% special alloy (0), 0.95% carbon (95).", "cite": "FAA-H-8083-30B, p. 7-4 (AIM notes p.8)", "topic": "SAE Steel Numbering"}, {"q": "In SAE 1030, what is the carbon content?", "options": ["3.0 percent carbon", "30 percent carbon", "10 percent carbon", "0.30 percent carbon"], "correct": 3, "short": "1030 = 0.30% carbon.", "expl": "Reading SAE 1030: '10' = plain carbon steel, '30' = 0.30% carbon. Low-carbon steel (0.10-0.30%) is used for safety wire, nuts, rod ends.", "cite": "FAA-H-8083-30B, p. 7-3, 7-4 (AIM notes p.8)", "topic": "SAE Steel Numbering"}, {"q": "Which of these is NOT one of the heat treatments of ferrous metals listed in the notes?", "options": ["Anodizing", "Hardening", "Tempering", "Annealing / Normalizing / Case hardening"], "correct": 0, "short": "Anodizing is NOT a ferrous heat treatment.", "expl": "The notes' ferrous heat treatments are: hardening, tempering, annealing, normalizing, and case hardening (carburizing & nitriding). Anodizing is an aluminum SURFACE/corrosion treatment, not a ferrous heat treatment.", "cite": "FAA-H-8083-30B, p. 7-16 to 7-20 (AIM notes p.8)", "topic": "Ferrous Heat Treatment"}, {"q": "In plain carbon steel, the maximum hardness obtainable by heat treatment depends almost entirely on what?", "options": ["The amount of zinc present", "The carbon content of the steel", "The quench oil viscosity", "The thickness of the part"], "correct": 1, "short": "Carbon content.", "expl": "In plain carbon steel, maximum hardness depends almost entirely on the carbon content. Pure iron, wrought iron, and extremely low-carbon steels cannot be appreciably hardened because they lack a hardening element.", "cite": "FAA-H-8083-30B, p. 7-17 (AIM notes p.8)", "topic": "Ferrous Heat Treatment"}, {"q": "Tempering reduces the BRITTLENESS imparted by hardening and:", "options": ["Adds carbon to the surface", "Increases brittleness further", "Produces definite physical properties; it always FOLLOWS hardening and softens the steel slightly", "Removes the clad layer"], "correct": 2, "short": "Reduces brittleness; follows hardening.", "expl": "Tempering reduces the brittleness imparted by hardening and produces definite physical properties. Tempering ALWAYS follows the hardening operation and softens the steel slightly to relieve stresses.", "cite": "FAA-H-8083-30B, p. 7-18 (AIM notes p.8-9)", "topic": "Ferrous Heat Treatment"}, {"q": "Annealing of steel produces a fine, soft, ductile metal WITHOUT internal stresses; in the annealed state steel has its:", "options": ["Maximum brittleness", "Highest strength", "Maximum hardness", "Lowest strength"], "correct": 3, "short": "Lowest strength (softest).", "expl": "Annealing produces a fine-grained, soft, ductile metal without internal stresses or strains; in the annealed state steel has its lowest strength. Annealing is the opposite of hardening.", "cite": "FAA-H-8083-30B, p. 7-19 (AIM notes p.9)", "topic": "Ferrous Heat Treatment"}, {"q": "Normalizing of steel does what to internal stresses set up by heat-treating, welding, casting, forming, or machining?", "options": ["Removes (relieves) the internal stresses", "Increases the internal stresses", "Adds carbon to relieve them", "Has no effect on stresses"], "correct": 0, "short": "Removes internal stresses.", "expl": "Normalizing relieves the internal stresses produced by machining, forging, welding, etc. It is done by heating the steel above the upper critical point and cooling in STILL AIR — producing a harder, stronger material than annealing.", "cite": "FAA-H-8083-30B, p. 7-19, 7-20 (AIM notes p.9)", "topic": "Ferrous Heat Treatment"}, {"q": "Case hardening produces what kind of part?", "options": ["A uniformly soft part throughout", "A hard, wear-resistant surface (case) over a strong, tough core", "A uniformly brittle part throughout", "A part with a soft surface and hard core"], "correct": 1, "short": "Hard case over a tough core.", "expl": "Case hardening produces a hard, wear-resistant surface over a strong, tough core. It is ideal for parts needing a wear surface but a tough interior. Best suited to LOW-carbon and low-alloy steels.", "cite": "FAA-H-8083-30B, p. 7-20 (AIM notes p.9)", "topic": "Case Hardening"}, {"q": "Carburizing is a case-hardening process in which ___ is added to the surface of low-carbon steel.", "options": ["Chromium", "Nitrogen (ammonia)", "Carbon", "Zinc"], "correct": 2, "short": "Carburizing adds CARBON.", "expl": "Carburizing adds CARBON to the surface of low-carbon steel, giving a high-carbon (hardenable) surface over a low-carbon, tough interior. When heat-treated, the case hardens while the core stays soft and tough.", "cite": "FAA-H-8083-30B, p. 7-20 (AIM notes p.9)", "topic": "Case Hardening"}, {"q": "Nitriding differs from other case-hardening processes because, before nitriding, the part is:", "options": ["Cold rolled to size", "Packed in charcoal and heated to 1,700 °F", "Quenched in brine", "Heat-treated AND tempered first, then placed in a special furnace at ~1,000 °F with ammonia gas"], "correct": 3, "short": "Pre-heat-treated/tempered; ~1,000°F with ammonia.", "expl": "In nitriding the part is heat-treated and tempered BEFORE nitriding, then placed in a special nitriding furnace heated to ~1,000 °F while ammonia gas circulates. The ammonia cracks into nitrogen and hydrogen; nitrogen reacts with iron to form a very hard nitride case.", "cite": "FAA-H-8083-30B, p. 7-20 (AIM notes p.9-10)", "topic": "Case Hardening"}, {"q": "Carburizing (pack method) heats the parts to approximately what temperature?", "options": ["About 1,700 °F", "About 1,000 °F", "About 500 °F", "About 2,600 °F"], "correct": 0, "short": "Pack carburizing ≈ 1,700 °F.", "expl": "In pack carburizing the steel is packed with charcoal, sealed, and heated to about 1,700 °F and soaked. (Contrast: nitriding runs cooler, ~1,000 °F.)", "cite": "FAA-H-8083-30B, p. 7-20 (AIM notes p.9)", "topic": "Case Hardening"}, {"q": "During nitriding, the ammonia gas cracks (breaks down) into which two elements?", "options": ["Carbon and oxygen", "Nitrogen and hydrogen", "Nitrogen and carbon", "Hydrogen and oxygen"], "correct": 1, "short": "Nitrogen + hydrogen.", "expl": "At ~1,000 °F the ammonia gas cracks into nitrogen and hydrogen. The nitrogen reacts with the iron at the surface to form the nitride case; the hydrogen and undissociated ammonia pass on.", "cite": "FAA-H-8083-30B, p. 7-20 (AIM notes p.10)", "topic": "Case Hardening"}, {"q": "Why have wood, fabric, and magnesium nearly disappeared from aircraft construction since the mid-1950s?", "options": ["They were banned by the FAA", "They became too expensive to mine", "They were replaced by aluminum/alloys and, increasingly, reinforced plastics and advanced composites", "They are too heavy"], "correct": 2, "short": "Replaced by metals then composites.", "expl": "Wood, fabric, and magnesium use nearly disappeared after the mid-1950s; aluminum dropped from ~80% of airframes in 1950 to ~15% today, replaced increasingly by reinforced plastics and advanced composites.", "cite": "FAA-H-8083-30B, p. 7-29 (AIM notes p.10)", "topic": "Non-Metals / Wood"}, {"q": "Which are the three types of wood used in aircraft structures, per the notes?", "options": ["Veneer, dowel, and plank", "Pine, spruce, and balsa", "Hardwood, softwood, and particle board", "Solid, laminated, and plywood"], "correct": 3, "short": "Solid, laminated, plywood.", "expl": "The notes list solid (for wing spars), laminated (wing spar made of two or three pieces glued together), and plywood (two or more thin layers glued so the grain crosses at 45° or 90°).", "cite": "FAA-H-8083-30B, p. 7-29; FAA-H-8083-31B (AIM notes p.10)", "topic": "Non-Metals / Wood"}, {"q": "In plywood, the thin layers are glued so the grain of adjacent layers crosses at:", "options": ["45 or 90 degrees", "0 degrees (parallel)", "15 degrees", "180 degrees"], "correct": 0, "short": "45° or 90° cross-grain.", "expl": "Plywood is two or more thin layers glued so that grain crosses at 45 or 90 degrees — the cross-grain construction is what gives plywood its strength in multiple directions.", "cite": "FAA-H-8083-31B (AIM notes p.10)", "topic": "Non-Metals / Wood"}, {"q": "Resin (a plastic material) is used in aircraft for which application?", "options": ["Engine bearings", "Canopies, windshields, windows, and similar transparent enclosures", "Landing gear struts", "Exhaust gaskets"], "correct": 1, "short": "Transparent enclosures (canopies/windows).", "expl": "Thermoplastic resin materials are used in aircraft canopies, windshields, windows, and other similar transparent enclosures.", "cite": "FAA-H-8083-30B, p. 7-29, 7-30 (AIM notes p.10)", "topic": "Plastics"}, {"q": "Transparent plastics divide into two classes; what is the key difference between thermoplastic and thermosetting?", "options": ["Both soften every time they are heated", "Thermoplastic cannot be reshaped; thermosetting can", "Thermoplastic softens when heated and hardens when cooled (can be reshaped); thermosetting hardens on heating and CANNOT be reshaped", "Neither is affected by heat"], "correct": 2, "short": "Thermoplastic = re-softens; thermosetting = set permanently.", "expl": "Thermoplastic materials soften when heated and harden when cooled — they can be reheated and reshaped. Thermosetting plastics harden upon heating and reheating has no softening effect; once cured they cannot be reshaped.", "cite": "FAA-H-8083-30B, p. 7-30 (AIM notes p.10)", "topic": "Plastics"}, {"q": "Which two transparent THERMOPLASTICS are named in the notes?", "options": ["Kevlar and graphite", "Epoxy and polyester", "Phenolic and melamine", "Cellulose acetate and acrylic"], "correct": 3, "short": "Cellulose acetate and acrylic.", "expl": "The two transparent thermoplastics named are cellulose acetate (older) and acrylic (modern). Both soften with heat.", "cite": "FAA-H-8083-30B, p. 7-30 (AIM notes p.10-11)", "topic": "Plastics"}, {"q": "Cellulose acetate was used on early aircraft for windshields/side windows but has a tendency to:", "options": ["Shrink and turn yellow with age", "Catch fire spontaneously", "Conduct electricity", "Rust"], "correct": 0, "short": "Shrinks and turns yellow.", "expl": "Cellulose acetate was used on early aircraft for windshields and side windows but tends to shrink and turn yellow with age, so it was largely replaced by acrylic.", "cite": "FAA-H-8083-30B, p. 7-30 (AIM notes p.11)", "topic": "Plastics"}, {"q": "Acrylic plastic is stiffer and more transparent than cellulose acetate, and acetone leaves what on it?", "options": ["A black scorch mark", "A white residue (it is identifiable that way)", "No mark at all", "A blue stain"], "correct": 1, "short": "Acetone leaves a white residue on acrylic.", "expl": "Acrylic is stiffer and more transparent than cellulose acetate; acetone leaves a WHITE residue on acrylic — a quick way to tell the two apart (acetone softens cellulose acetate instead).", "cite": "FAA-H-8083-30B, p. 7-30 (AIM notes p.11)", "topic": "Plastics"}, {"q": "Which three are common TRADE NAMES for acrylic plastic?", "options": ["Teflon, Viton, and Buna", "Kevlar, Nomex, and Mylar", "Lucite, Plexiglas, and Perspex", "Lexan, Bakelite, and Formica"], "correct": 2, "short": "Lucite, Plexiglas, Perspex.", "expl": "Acrylic plastic is sold under the trade names Lucite, Plexiglas, and Perspex — all the same family of transparent thermoplastic.", "cite": "FAA-H-8083-30B, p. 7-30 (AIM notes p.11)", "topic": "Plastics"}, {"q": "A composite material is made from how many constituent materials?", "options": ["Only resins", "Exactly one pure material", "Only metals", "Two or more, with significantly different properties, that remain separate and distinct"], "correct": 3, "short": "Two or more distinct constituents.", "expl": "A composite is made from two or more constituent materials with significantly different physical or chemical properties that, combined, produce a material with characteristics different from the individual components — and they remain separate and distinct within the finished structure.", "cite": "FAA-H-8083-30B, p. 7-30 (AIM notes p.11)", "topic": "Composites"}, {"q": "In composite construction, fiberglass cloth/mat provides strength but lacks rigidity, so it is impregnated with what to make a structural part?", "options": ["Polyester (or epoxy) resin, then molded to shape", "Pure aluminum", "Natural rubber", "Carbon powder"], "correct": 0, "short": "Impregnated with resin (polyester/epoxy).", "expl": "Fiberglass cloth/mat has great strength for its weight but lacks rigidity; to make a structural part it is impregnated with polyester (or epoxy) resin and molded into the desired shape.", "cite": "FAA-H-8083-30B, p. 7-30 to 7-32 (AIM notes p.11)", "topic": "Composites"}, {"q": "In composite resin chemistry, the CATALYST does what?", "options": ["Prevents the resin from hardening", "Shortens / starts the curing process", "Adds color", "Makes the resin transparent"], "correct": 1, "short": "Catalyst shortens/starts curing.", "expl": "A catalyst (often benzoyl peroxide for polyester) shortens and starts the curing (polymerization) process. By contrast, an INHIBITOR is added to PREVENT hardening before use.", "cite": "FAA-H-8083-30B, p. 7-30 to 7-32 (AIM notes p.11)", "topic": "Composites"}, {"q": "An INHIBITOR is added to composite resin in order to:", "options": ["Add flexibility", "Speed up the cure", "Prevent it from hardening before use", "Increase heat resistance"], "correct": 2, "short": "Inhibitor prevents premature hardening.", "expl": "An inhibitor is added to prevent the resin from hardening before it is intended to be used (extends shelf/working life). The catalyst does the opposite — it starts the cure.", "cite": "FAA-H-8083-30B, p. 7-31, 7-32 (AIM notes p.11)", "topic": "Composites"}, {"q": "Epoxy resin can be used in place of polyester resin because it has:", "options": ["Magnetic properties", "Higher shrinkage and lower strength", "No need for any hardener and instant cure", "A low percentage of shrinkage and high strength, and it does not need a catalyst (uses a curing agent/hardener)"], "correct": 3, "short": "Low shrinkage, high strength; uses a curing agent.", "expl": "Epoxy resin can replace polyester: it has a low percentage of shrinkage, high strength, and doesn't need a catalyst — instead it needs a curing agent (hardener) to start the hardening process.", "cite": "FAA-H-8083-30B, p. 7-31, 7-32 (AIM notes p.11)", "topic": "Composites"}, {"q": "In composites, the STYRENE monomer is added to the resin to do what?", "options": ["Thin the resin (act as a monomer that helps it flow/cure)", "Prevent hardening", "Add color", "Increase weight"], "correct": 0, "short": "Styrene = monomer added to the resin.", "expl": "Styrene is a monomer added to polyester resin (it helps the resin flow and cross-link during cure). Polyester itself is a thick, complex molecule cured by a chemical reaction.", "cite": "FAA-H-8083-30B, p. 7-31 (AIM notes p.11)", "topic": "Composites"}, {"q": "Heat is used to affect the curing process; some resins become more active above what temperature?", "options": ["About 32 °F", "About 90 °F (and may run off vertical surfaces before they set)", "About 250 °F", "About 600 °F"], "correct": 1, "short": "≈90 °F.", "expl": "Heat speeds curing; some resins become very active above about 90 °F and may run off inclined or vertical surfaces before they set, so working temperature must be controlled.", "cite": "FAA-H-8083-30B, p. 7-32 (AIM notes p.12)", "topic": "Composites"}, {"q": "Thixotropic agents are added to a resin to increase its:", "options": ["Electrical conductivity", "Transparency", "Viscosity (thickness) — so it can be made into a paste", "Cure temperature"], "correct": 2, "short": "Thickness/viscosity (makes a paste).", "expl": "Thixotropic agents are added to increase viscosity (thickness). A common type is hollow glass balls (microballoons) used to thicken epoxy or polyester resin into a paste for filling.", "cite": "FAA-H-8083-30B, p. 7-32 (AIM notes p.12)", "topic": "Composites"}, {"q": "Fiberglass is glass fibers woven into cloth used for:", "options": ["Shock absorption", "Heat shielding around engines only", "Electrical wiring", "High strength (it is saturated with resin and used where low cost matters more than strength)"], "correct": 3, "short": "High strength; low-cost cloth.", "expl": "Fiberglass is glass fibers woven into a cloth — used for high strength, saturated with resin. It is used where low cost is more important than maximum strength; newer composites have replaced it in many applications.", "cite": "FAA-H-8083-30B, p. 7-30 to 7-32 (AIM notes p.12)", "topic": "Composite Materials"}, {"q": "Ceramic fiber is a form of fiber glass used in HIGH-HEAT applications (up to ~3000 °F). Where is it used?", "options": ["Around engines and exhaust systems (high-temperature areas)", "In cabin windows", "In landing gear struts", "In control cables"], "correct": 0, "short": "Engines/exhaust (high heat).", "expl": "Ceramic fiber is a form of fiber glass used in high-heat applications (up to ~3000 °F) — around engines and exhaust systems where ordinary composites would fail.", "cite": "FAA-H-8083-30B, p. 7-31 (AIM notes p.12)", "topic": "Composite Materials"}, {"q": "Kevlar (aramid) is a yellow organic fiber valued for:", "options": ["Heat resistance above all", "Impact resistance — extremely light, strong, and tough (used where damage from debris occurs, e.g., landing gear and behind propellers)", "Electrical conductivity", "Being the stiffest fiber available"], "correct": 1, "short": "Yellow; impact resistance; light & tough.", "expl": "Kevlar is a yellow organic fiber with high impact resistance — extremely light, strong, and tough. It is used in areas where damage from sand or debris occurs, such as landing gear and behind propellers. (Identify it by its YELLOW color.)", "cite": "FAA-H-8083-30B, p. 7-30; FAA-H-8083-31B (AIM notes p.12)", "topic": "Composite Materials"}, {"q": "Graphite (carbon) fiber, manufactured by heating and stretching rayon fibers, is valued for being:", "options": ["The best impact-resistant fiber", "The cheapest fiber available", "Extremely light weight, strong, and stiff (rigid)", "A good electrical insulator"], "correct": 2, "short": "Light, strong, and STIFF.", "expl": "Graphite (carbon) fiber is made by heating and stretching rayon fibers; it is extremely light, strong, and STIFF (rigid). Stiffness is its defining trait — distinguishing it from impact-tough Kevlar.", "cite": "FAA-H-8083-30B, p. 7-30, 7-31 (AIM notes p.12)", "topic": "Composite Materials"}, {"q": "A laminated structure built with an inner CORE of material is called a:", "options": ["Monolithic structure", "Wrought structure", "Cast structure", "Sandwich structure"], "correct": 3, "short": "Sandwich structure.", "expl": "A composite made with an inner core between two face sheets is a SANDWICH structure. Sandwich (laminate) construction is strong and stiff but light — and laminate is equal in strength yet much lighter (very important for aerospace).", "cite": "FAA-H-8083-30B, p. 7-32 (AIM notes p.12)", "topic": "Laminated Materials / Cores"}, {"q": "Which are the three types of CORES listed in the notes?", "options": ["Metal, wood, and cellular", "Glass, foam, and rubber", "Steel, titanium, aluminum", "Epoxy, polyester, phenolic"], "correct": 0, "short": "Metal, wood, cellular.", "expl": "The three core types in the notes are metal core, wood core, and cellular core (honeycomb / cellular materials). Each is bonded between face sheets.", "cite": "FAA-H-8083-30B, p. 7-32 (AIM notes p.12-13)", "topic": "Laminated Materials / Cores"}, {"q": "A METAL core composite uses an extremely thin material in the shape of a honeycomb made of:", "options": ["Steel rod", "Aluminum, bonded between sheets of fiberglass/resin", "Solid lead", "Wood plank"], "correct": 1, "short": "Aluminum honeycomb between fiberglass sheets.", "expl": "A metal core composite uses extremely thin ALUMINUM in a honeycomb shape, bonded between sheets of fiberglass/resin (or metal).", "cite": "FAA-H-8083-30B, p. 7-32 (AIM notes p.13)", "topic": "Cores / Honeycomb"}, {"q": "A WOOD core uses end-grain slabs of which wood between face sheets?", "options": ["Pine", "Oak", "Balsa wood (between two face sheets of fiberglass or metal)", "Mahogany"], "correct": 2, "short": "Balsa wood core.", "expl": "Wood core uses end-grain slabs of BALSA wood between two face sheets of fiberglass or metal — used for floors, wall panels, and aircraft skin.", "cite": "FAA-H-8083-30B, p. 7-32 (AIM notes p.13)", "topic": "Cores / Honeycomb"}, {"q": "A CELLULAR core composite uses a resin-impregnated material such as:", "options": ["Steel mesh", "Solid aluminum block", "Balsa wood", "Kraft paper or glass cloth bonded between two sheets of fiberglass"], "correct": 3, "short": "Kraft paper / glass cloth honeycomb.", "expl": "Cellular core uses resin-impregnated KRAFT paper (or glass cloth) bonded between two sheets of fiberglass to form a lightweight cellular (honeycomb) core.", "cite": "FAA-H-8083-30B, p. 7-32 (AIM notes p.13)", "topic": "Cores / Honeycomb"}, {"q": "Honeycomb (No-Step / No-Push) materials have high aerodynamic strength but poor PHYSICAL strength, meaning:", "options": ["Pushing or standing on them can cause physical damage to the structure", "They cannot carry any flight loads", "They corrode rapidly", "They must be painted yellow"], "correct": 0, "short": "Don't step/push — physical strength is poor.", "expl": "Honeycomb-cored panels have high aerodynamic strength but poor physical (point-load) strength; standing or pushing on them can crush/damage the structure — hence the 'No-Step' and 'No-Push' placards.", "cite": "FAA-H-8083-30B, p. 7-32 (AIM notes p.13)", "topic": "Cores / Honeycomb"}, {"q": "Natural rubber is used to prevent the entrance of dirt, water, or air and the loss of fluids; where does the latex come from?", "options": ["Petroleum refining", "The rubber tree (harvested as latex by 'tapping' the bark)", "Coal tar", "Sea water"], "correct": 1, "short": "From the rubber tree (latex, by tapping).", "expl": "Natural rubber comes from the rubber tree as latex — a sticky, milky colloid drawn off by making incisions in the bark and collecting it ('tapping'). It is then refined into rubber.", "cite": "FAA-H-8083-30B, p. 7-32 (AIM notes p.13)", "topic": "Rubber"}, {"q": "Why is natural rubber's use in aircraft LIMITED, and where is it never used?", "options": ["It conducts electricity; never used in tires", "It is too heavy; never used in seals", "It has inferior resistance to deterioration; it is never used in hoses", "It is magnetic; never used in cores"], "correct": 2, "short": "Inferior deterioration resistance; never in hoses.", "expl": "Natural rubber's aircraft use is limited by its inferior resistance to the influences that cause deterioration (fuel, solvents, ozone). It is never used in hoses; synthetic rubbers are used there instead.", "cite": "FAA-H-8083-30B, p. 7-32 (AIM notes p.13)", "topic": "Rubber"}, {"q": "Shock absorber cord is made from what, encased in a braided cotton cover?", "options": ["Nylon thread", "Synthetic neoprene blocks", "Steel wire", "Natural rubber strands"], "correct": 3, "short": "Natural rubber strands.", "expl": "Shock absorber cord is made from natural rubber strands encased in a braided cover of woven cotton cords treated to resist oxidation and wear. Great tension/elongation comes from weaving the jacket while the strands are stretched ~3× their length.", "cite": "FAA-H-8083-30B, p. 7-33 (AIM notes p.13)", "topic": "Shock Absorber Cord"}, {"q": "What is the difference between Type I and Type II shock absorbing cord?", "options": ["Type I is a straight cord; Type II is a continuous ring known as a 'bungee'", "Type I is a ring; Type II is straight", "Type I is synthetic; Type II is natural", "Type I is for tires; Type II is for seals"], "correct": 0, "short": "Type I straight; Type II ring (bungee).", "expl": "There are two types of elastic shock absorbing cord: Type I is a STRAIGHT cord, and Type II is a continuous RING known as a 'bungee.' The Type II ring is easily/quickly replaced and needs no stretching-and-whipping to secure.", "cite": "FAA-H-8083-30B, p. 7-33 (AIM notes p.13)", "topic": "Shock Absorber Cord"}, {"q": "Synthetic rubber, created in 1906 by Fritz Hofmann, comes in several types. Which are the four named in the notes?", "options": ["Latex, Thiokol, Silastic, Viton", "Butyl, Buna-S, Buna-N, and Neoprene", "Epoxy, polyester, phenolic, melamine", "Kevlar, graphite, ceramic, fiberglass"], "correct": 1, "short": "Butyl, Buna-S, Buna-N, Neoprene.", "expl": "The notes' four synthetic rubbers are Butyl, Buna-S, Buna-N, and Neoprene. Each is compounded for different properties.", "cite": "FAA-H-8083-30B, p. 7-32, 7-33 (AIM notes p.14)", "topic": "Synthetic Rubber"}, {"q": "Butyl rubber is a hydrocarbon rubber with SUPERIOR resistance to what?", "options": ["Heat above 600 °F", "Fuel and oil", "Gas permeation (it also resists oxygen, ozone, and weathering)", "Strong acids only"], "correct": 2, "short": "Gas permeation.", "expl": "Butyl is a hydrocarbon rubber with superior resistance to GAS permeation; it also resists oxygen, vegetable oils, animal fats, alkalies, ozone, and weathering. (But it swells in petroleum/coal-tar solvents.) Used with phosphate-ester hydraulic fluids (Skydrol).", "cite": "FAA-H-8083-30B, p. 7-32 (AIM notes p.14)", "topic": "Synthetic Rubber"}, {"q": "Buna-S rubber most resembles natural rubber but has POOR resistance to gasoline and oil, so it is normally used for:", "options": ["Weather seals", "Fuel seals", "Oil hoses", "Tires and tubes (as a substitute for natural rubber)"], "correct": 3, "short": "Tires and tubes.", "expl": "Buna-S resembles natural rubber and has poor resistance to gasoline, oil, acids, and solvents — so it is normally used for tires and tubes as a substitute for natural rubber.", "cite": "FAA-H-8083-30B, p. 7-33 (AIM notes p.14)", "topic": "Synthetic Rubber"}, {"q": "Buna-N is OUTSTANDING in its resistance to hydrocarbons, so it is used as a seal for what?", "options": ["Oil and gasoline (fuel/oil systems — it won't stick to the cylinder wall)", "Skydrol phosphate-ester fluid", "High-temperature exhaust", "Coolant water"], "correct": 0, "short": "Oil and gasoline (fuel/oil).", "expl": "Buna-N is outstanding in resistance to hydrocarbons and other solvents; it is used for oil and gasoline (won't stick to the cylinder wall). It is the go-to seal for fuel/oil systems.", "cite": "FAA-H-8083-30B, p. 7-33 (AIM notes p.14)", "topic": "Synthetic Rubber"}, {"q": "Neoprene takes more punishment than natural rubber and has exceptional resistance to ozone, sunlight, heat, and aging — so it is used primarily for:", "options": ["Fuel-tank linings", "Weather seals, window channels, bumper pads, oil-resistant hose, and carburetor diaphragms", "High-temperature exhaust gaskets", "Tires and tubes"], "correct": 1, "short": "Weather seals and oil-resistant hose.", "expl": "Neoprene resists ozone, sunlight, heat, and aging; it is used primarily for weather seals, window channels, bumper pads, oil-resistant hose, and carburetor diaphragms. (Think 'Neoprene = weather.')", "cite": "FAA-H-8083-30B, p. 7-33 (AIM notes p.14)", "topic": "Synthetic Rubber"}, {"q": "Seals are used to:", "options": ["Add structural strength", "Conduct heat away from the engine", "Prevent fluid from passing a certain point (and keep air/dirt out)", "Provide electrical bonding"], "correct": 2, "short": "Prevent fluid from passing a point.", "expl": "Seals prevent fluid from passing a certain point, and keep air and dirt out of the system. The three main classes are packings, gaskets, and wipers.", "cite": "FAA-H-8083-30B, p. 7-32 to 7-34 (AIM notes p.14)", "topic": "Seals & Packing"}, {"q": "What are the THREE main types/classes of seals?", "options": ["Static, dynamic, thermal", "O-rings, V-rings, U-rings", "Natural, synthetic, silicone", "Packings, gaskets, and wipers"], "correct": 3, "short": "Packings, gaskets, wipers.", "expl": "The three main classes of seals are packings (running/moving seals), gaskets (static seals), and wipers (which clean and lubricate moving parts such as shafts/pistons).", "cite": "FAA-H-8083-30B, p. 7-32 to 7-35 (AIM notes p.14)", "topic": "Seals & Packing"}, {"q": "PACKINGS are used as which kind of seal?", "options": ["'Running seals' — in units that contain MOVING parts (actuating cylinders, pumps, selector valves)", "Static seals between two flat surfaces", "Heat shields", "Electrical insulators"], "correct": 0, "short": "Running (moving-part) seals.", "expl": "Packings are 'running seals' used in units that contain moving parts — actuating cylinders, pumps, selector valves, and so forth. They are made as O-rings, V-rings, and U-rings.", "cite": "FAA-H-8083-30B, p. 7-34 (AIM notes p.14)", "topic": "Seals & Packing"}, {"q": "GASKETS are used as which kind of seal?", "options": ["Running seals on moving pistons", "Static (stationary) seals between two flat surfaces", "Wipers on shafts", "Backup rings for O-rings"], "correct": 1, "short": "Static seals between flat surfaces.", "expl": "Gaskets are static (stationary) seals used between two flat surfaces. Common gasket materials are asbestos, copper, cork, and rubber.", "cite": "FAA-H-8083-30B, p. 7-35 (AIM notes p.14)", "topic": "Seals & Packing"}, {"q": "When O-rings are installed with backup rings, what are those backup rings for?", "options": ["To carry electrical current", "To add color coding", "To prevent extrusion of the O-ring at high pressure (above ~1,500 psi)", "To lubricate the moving shaft"], "correct": 2, "short": "Prevent O-ring extrusion at high pressure.", "expl": "O-rings are installed with BACKUP RINGS (Teflon, MS28782) to prevent extrusion. At pressures above ~1,500 psi, backup rings are required; with pressure from one side use one backup ring (on the side AWAY from the pressure), with pressure from both sides use two.", "cite": "FAA-H-8083-30B, p. 7-34, 7-35 (AIM notes p.14)", "topic": "Seals & Packing"}, {"q": "An O-ring designed as a STATIC seal, if installed on a moving part, will probably:", "options": ["Last forever", "Work better than a dynamic seal", "Become magnetic", "Fail to do the job (static and dynamic O-rings are not interchangeable)"], "correct": 3, "short": "It will not do the job.", "expl": "An O-ring designed specifically as a static (stationary) seal probably will NOT do the job when installed on a moving part such as a hydraulic piston. O-rings look alike but their compounds differ widely — match the application, fluid, and temperature.", "cite": "FAA-H-8083-30B, p. 7-34 (AIM notes p.14)", "topic": "Seals & Packing"}];
