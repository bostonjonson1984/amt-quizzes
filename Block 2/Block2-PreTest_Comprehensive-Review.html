<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Block 2 Pre-Test — Comprehensive Review</title>
<style>
  :root{
    --navy:#0d2a4a; --navy2:#15436e; --gold:#ffce4d; --ink:#1c2330;
    --green:#1f9d57; --greenbg:#e7f7ee; --red:#d6453d; --redbg:#fdecea;
    --line:#e3e8f0; --muted:#5a6678; --card:#ffffff; --bg:#eef2f8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:0 16px env(safe-area-inset-bottom);
  }
  .wrap{width:100%; max-width:720px; margin:0 auto;}

  /* top bar */
  .bar{position:sticky; top:0; z-index:10; background:var(--bg); padding:14px 0 8px;}
  .barrow{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted); font-weight:600;}
  .score{color:var(--navy);}
  .prog{height:8px; background:#dbe3ee; border-radius:6px; margin-top:8px; overflow:hidden;}
  .progfill{height:100%; width:0; background:linear-gradient(90deg,var(--navy2),var(--gold)); transition:width .35s ease;}

  /* card */
  .card{background:var(--card); border-radius:14px; padding:22px 20px 20px; margin-top:14px;
        box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .tag{display:inline-block; background:#eef2f8; color:var(--navy2); font-size:10.5px; font-weight:800;
       letter-spacing:.5px; padding:3px 9px; border-radius:11px; text-transform:uppercase;}
  .stem{font-size:19px; line-height:1.42; font-weight:600; margin:12px 0 18px; color:#0d1b2a;}

  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{display:flex; align-items:flex-start; gap:11px; width:100%; text-align:left;
       background:#f7f9fc; border:1.5px solid var(--line); border-radius:11px;
       padding:14px 15px; font-size:16px; line-height:1.35; cursor:pointer;
       transition:border-color .12s, background .12s, transform .05s; color:var(--ink);}
  .opt:hover:not(.locked){border-color:var(--navy2); background:#fff;}
  .opt:active:not(.locked){transform:scale(.995);}
  .opt .L{flex:0 0 26px; height:26px; border-radius:50%; background:#e6ecf4; color:var(--navy);
          font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;}
  .opt .T{flex:1; padding-top:2px;}
  .opts.locked .opt{cursor:default;}
  .opt.correct{border-color:var(--green); background:var(--greenbg);}
  .opt.correct .L{background:var(--green); color:#fff;}
  .opt.wrong{border-color:var(--red); background:var(--redbg);}
  .opt.wrong .L{background:var(--red); color:#fff;}
  .opt .mark{margin-left:auto; font-weight:800; font-size:15px; align-self:center;}
  .opt.correct .mark{color:var(--green);}
  .opt.wrong .mark{color:var(--red);}

  /* feedback */
  .fb{margin-top:16px; border-radius:11px; padding:15px 16px; display:none;}
  .fb.show{display:block; animation:rise .25s ease;}
  @keyframes rise{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .fb.ok{background:var(--greenbg); border:1px solid #b9e6cb;}
  .fb.no{background:var(--redbg); border:1px solid #f3c6c2;}
  .fb .verdict{font-weight:800; font-size:15px; margin-bottom:5px;}
  .fb.ok .verdict{color:var(--green);}
  .fb.no .verdict{color:var(--red);}
  .fb .ans{font-weight:700; margin-bottom:6px;}
  .fb .expl{font-size:14.5px; line-height:1.5; color:#27313f;}
  .fb .cite{margin-top:9px; font-size:12.5px; color:var(--muted); font-style:italic;}

  .nav{display:flex; gap:10px; margin:16px 0 26px;}
  .btn{flex:1; border:none; border-radius:11px; padding:15px; font-size:16px; font-weight:700;
       cursor:pointer; font-family:inherit;}
  .btn.primary{background:var(--navy); color:#fff;}
  .btn.primary:hover{background:var(--navy2);}
  .btn.ghost{background:#fff; color:var(--navy); border:1.5px solid var(--line);}
  .btn:disabled{opacity:.4; cursor:default;}
  .hint{text-align:center; font-size:12px; color:var(--muted); margin:-12px 0 22px;}

  /* start + results screens */
  .screen{background:var(--card); border-radius:16px; padding:30px 24px; margin-top:22px; text-align:center;
          box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .screen h1{font-size:24px; margin:0 0 6px; color:var(--navy);}
  .screen .sub{color:var(--muted); font-size:14px; margin-bottom:22px; line-height:1.45;}
  .bigscore{font-size:60px; font-weight:800; color:var(--navy); line-height:1; margin:8px 0;}
  .bigscore small{font-size:22px; color:var(--muted); font-weight:600;}
  .pct{font-size:17px; font-weight:700; margin-bottom:18px;}
  .pass{color:var(--green);} .fail{color:var(--red);}
  .opt.toggle{justify-content:center; cursor:pointer; font-weight:600; max-width:320px; margin:0 auto 18px;}
  .opt.toggle.on{border-color:var(--navy2); background:#eef4fb;}
  .misslist{text-align:left; margin-top:6px;}
  .missitem{border-left:3px solid var(--red); background:#fff6f5; border-radius:6px; padding:11px 13px; margin-bottom:10px;}
  .missitem .mq{font-weight:600; font-size:14.5px; margin-bottom:5px;}
  .missitem .ma{font-size:13.5px; color:#27313f;} .missitem .mc{font-size:12px; color:var(--muted); font-style:italic; margin-top:4px;}
  .allright{font-size:16px; color:var(--green); font-weight:700; margin:14px 0;}
  details.drill{margin:18px 0 4px; text-align:left;}
  details.drill summary{cursor:pointer; font-weight:700; color:var(--navy); font-size:15px; padding:8px 0;}
  .drillrow{border-bottom:1px solid var(--line); padding:9px 2px; font-size:13.5px;}
  .drillrow b{color:var(--navy2);}
  .foot{text-align:center; color:#9aa6b8; font-size:11px; margin:10px 0 26px;}
</style>
</head>
<body>
<div class="wrap">

  <!-- START -->
  <div id="start" class="screen">
    <h1>Block 2 Pre-Test — Comprehensive Review</h1>
    <div class="sub">AMTBLK02 PRE-TEST (ID: B) · Q16-Q94 · every answer cited to FAA-H-8083-30B / AC 43.13-1B / AC 43-4B</div>
    <div id="startmeta" class="sub"></div>
    <div id="shuffleToggle" class="opt toggle"><span class="T">🔀&nbsp; Shuffle question order</span></div>
    <div class="nav" style="max-width:320px;margin:0 auto;">
      <button class="btn primary" onclick="QUIZ.start()">Start Quiz →</button>
    </div>
    <div class="hint">Tip: press A–D (or 1–4) to answer, Enter for next.</div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" style="display:none;">
    <div class="bar">
      <div class="barrow"><span id="counter">Q1</span><span class="score" id="scorelbl">Score 0/0</span></div>
      <div class="prog"><div class="progfill" id="progfill"></div></div>
    </div>
    <div id="cardmount"></div>
    <div class="nav">
      <button class="btn ghost" id="skipbtn" onclick="QUIZ.next(true)">Skip</button>
      <button class="btn primary" id="nextbtn" onclick="QUIZ.next()" disabled>Next →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="screen" style="display:none;"></div>

</div>

<script>
const DATA  = [{"q": "Select the correct reason for solid rivets being marked on their head.", "options": ["Indicates the rivet length", "Indicates the material of which they are made", "Indicates the rivet width"], "correct": 1, "short": "Head markings indicate the rivet's material/alloy.", "expl": "The marking on a solid rivet head identifies the alloy/material (e.g., dimple = 2117, raised dot = 2017, raised double-dash = 2024), not its size.", "cite": "FAA-H-8083-30B Ch.7, Aircraft Rivets (rivet identification)", "topic": "Hardware / Rivets"}, {"q": "Galvanic corrosion is caused by:", "options": ["Dissimilar metals in contact", "Improper heat treatment", "Use of corrosion resistant alloys"], "correct": 0, "short": "Two dissimilar metals in contact with an electrolyte.", "expl": "Galvanic (dissimilar-metal) corrosion occurs when two different metals contact each other in the presence of an electrolyte, forming a galvanic cell.", "cite": "FAA-H-8083-30B Ch.8, Forms of Corrosion (Galvanic)", "topic": "Corrosion"}, {"q": "For a more in-depth study on detection and treatment of Corrosion Control for aircraft can be found on:", "options": ["AC 43-4B", "FAA-H-8083-30A", "Structure Repair Manual"], "correct": 0, "short": "AC 43-4B, Corrosion Control for Aircraft.", "expl": "AC 43-4B is the FAA advisory circular dedicated to corrosion detection, identification, and treatment for aircraft.", "cite": "AC 43-4B, Corrosion Control for Aircraft", "topic": "Corrosion"}, {"q": "A drawing that is made rapidly and without much detail is referred to as a:", "options": ["Assembly drawing", "Draft drawing", "Sketch"], "correct": 2, "short": "A sketch.", "expl": "A sketch is a quick, simple drawing made without instruments or much detail, used to convey an idea fast.", "cite": "FAA-H-8083-30B Ch.4, Drawings / Sketches", "topic": "Drawings"}, {"q": "Select the correct tool used for checking swaged terminals for proper compression.", "options": ["Terminal compression card", "Go-No-Go gauge", "Yes-No-Yes gauge"], "correct": 1, "short": "A Go/No-Go gauge.", "expl": "After swaging a cable terminal, a Go/No-Go gauge is used to verify the swaged fitting has been compressed to the correct diameter.", "cite": "FAA-H-8083-30B Ch.7, Swaged Terminals (cable swaging)", "topic": "Hardware / Cable"}, {"q": "When using a common screwdriver, the screwdriver must fill at least ____ % of the slot on the screw.", "options": ["75%", "100%", "50%"], "correct": 0, "short": "75% of the slot.", "expl": "A standard (flat-tip) screwdriver blade should fill at least 75% of the screw slot to avoid stripping or burring the slot.", "cite": "FAA-H-8083-30B Ch.11, Common Hand Tools (Screwdrivers)", "topic": "Tools"}, {"q": "Vertical locations on an airplane are made in reference to the:", "options": ["Datum", "Waterline", "Buttock line"], "correct": 1, "short": "The waterline (WL).", "expl": "Vertical (height) positions on an aircraft are measured from the waterline; the datum is the longitudinal reference, and buttock line is the lateral reference.", "cite": "FAA-H-8083-30B Ch.6, Weight & Balance (Reference datum / waterline / BL)", "topic": "Weight & Balance"}, {"q": "What is meant by the term \"Alloy\" when referring to metals and why is it used?", "options": ["An alloy is a combination of two or more metals in various percentages, used to create desired properties that would not exist in their unmixed state", "Alloy is the treatment of a given metal that contains only very minimal impurities", "Alloy is a means of treating metal to make it resistant to malleability"], "correct": 0, "short": "A combination of two or more metals to get desired properties.", "expl": "An alloy is a mixture of two or more metals (or a metal plus other elements) blended to gain properties—like strength or corrosion resistance—the base metal alone lacks.", "cite": "FAA-H-8083-30B Ch.7, Aircraft Metals (Alloys)", "topic": "Materials"}, {"q": "What are some examples of highly malleable metals?", "options": ["Copper, Lead, Gold", "Iron, Titanium, High Carbon Steel", "Bronze, Stainless Steel, Inconel"], "correct": 0, "short": "Copper, lead, and gold.", "expl": "Malleability is the ability to be shaped/hammered/rolled without breaking; soft metals like copper, lead, and gold are highly malleable.", "cite": "FAA-H-8083-30B Ch.7, Properties of Metals (Malleability)", "topic": "Materials"}, {"q": "Why is a plastic surface flushed with water before it is cleaned with soap and water?", "options": ["To prevent scratching", "To prevent softening the plastic", "To prevent crazing"], "correct": 0, "short": "To prevent scratching.", "expl": "Transparent plastics (windshields/windows) are flushed with clean water first to float off grit so dirt particles don't scratch the soft surface during washing.", "cite": "FAA-H-8083-30B Ch.8/Ch.7, Cleaning Transparent Plastics", "topic": "Cleaning"}, {"q": "\"Purple plague\" is a brittle compound formed when bonding:", "options": ["Gold to aluminum", "Silver to gold", "Silver to copper"], "correct": 0, "short": "Gold-to-aluminum bond.", "expl": "Purple plague is a brittle gold-aluminum intermetallic compound that forms where gold and aluminum are bonded (common failure in electrical connections).", "cite": "FAA-H-8083-30B Ch.7, Aircraft Metals (gold-aluminum intermetallics)", "topic": "Materials"}, {"q": "When torquing nuts, what should the bolt threads first be lubricated with?", "options": ["Nothing, they should be clean and dry unless specified by the manufacturer", "A light coating of Molybdenum grease or alternate specified by the manufacturer", "They should always be sprayed with a light-weight oil or alternate specified by the manufacturer"], "correct": 0, "short": "Nothing — clean and dry unless the manufacturer specifies a lubricant.", "expl": "Torque values are based on clean, dry threads unless the manufacturer states otherwise. Lubricant changes friction and gives a false (too-high) clamp-up for the same torque reading.", "cite": "FAA-H-8083-30B Ch.7, Torque & Torque Wrenches", "topic": "Hardware / Torque"}, {"q": "Aircraft bolts with an asterisk (cross) marked on the bolt head are?", "options": ["Made of aluminum alloy", "Close tolerance bolts", "Standard steel bolts"], "correct": 1, "short": "Close-tolerance bolts.", "expl": "A raised or recessed asterisk/cross on an AN bolt head identifies a close-tolerance bolt (the single raised dash/triangle indicates standard steel AN bolts).", "cite": "FAA-H-8083-30B Ch.7, Aircraft Bolts (head markings)", "topic": "Hardware / Bolts"}, {"q": "What are the three classes of aircraft drawings?", "options": ["Perspective, Isometric, and Oblique", "Orthographic, Auxiliary, and Isometric", "Detail, Assembly, and Installation"], "correct": 2, "short": "Detail, Assembly, and Installation drawings.", "expl": "The three classes (types) of working drawings used in aircraft maintenance/manufacturing are detail, assembly, and installation drawings.", "cite": "FAA-H-8083-30B Ch.4, Types of Drawings", "topic": "Drawings"}, {"q": "The ratio for blending an area in which corrosion has been removed is:", "options": ["20 to 1 length to depth", "15 to 1 length to depth", "10 to 1 length to width"], "correct": 0, "short": "20:1, length to depth.", "expl": "When blending out a cleaned-up corrosion/damage area, the rework is faired at a 20:1 length-to-depth ratio to avoid stress concentrations.", "cite": "AC 43.13-1B Ch.4 / FAA-H-8083-30B Ch.8 (blend-out ratio)", "topic": "Corrosion / Repair"}, {"q": "What kind of pictorial drawings show an object as it appears to an observer?", "options": ["Isometric drawings", "Perspective drawings", "Oblique drawings"], "correct": 1, "short": "Perspective drawings.", "expl": "A perspective drawing shows an object the way the human eye actually sees it (lines converge to vanishing points), like a photograph.", "cite": "FAA-H-8083-30B Ch.4, Pictorial Drawings (Perspective)", "topic": "Drawings"}, {"q": "Extensive pitting damage may result from contact between dissimilar metal parts in the presence of a conductor. This form of corrosion is known as?", "options": ["Concentration cell corrosion", "Filiform corrosion", "Dissimilar metal corrosion"], "correct": 2, "short": "Dissimilar metal corrosion.", "expl": "Dissimilar-metal (galvanic) corrosion between two different metals in the presence of an electrolyte/conductor produces extensive pitting at the contact area.", "cite": "FAA-H-8083-30B Ch.8, Forms of Corrosion (Dissimilar Metal)", "topic": "Corrosion"}, {"q": "Using the provided electrical wiring chart, determine the cable size of a 50-foot length of single cable in a bundle, with a continuous rating in a 28-volt system with a 20-ampere load.", "options": ["10", "8", "6"], "correct": 0, "short": "AWG #10.", "expl": "Off the FAA wire-size chart, a 50 ft single wire in a bundle/conduit at 20 A continuous (28 V) falls on the #10 AWG curve. Bundled wire derates, so it sizes larger (lower gauge number) than free-air.", "cite": "FAA-H-8083-30B Ch.9/Ch.13, Wire Size Selection Chart", "topic": "Electrical"}, {"q": "Internal wrenching bolts are fabricated from high-strength steel and are suitable for:", "options": ["use in both tension and shear application", "for tension application only", "for shear application only"], "correct": 0, "short": "Both tension and shear applications.", "expl": "Internal-wrenching (hex-socket) bolts are high-strength and may be used in both tension and shear applications.", "cite": "FAA-H-8083-30B Ch.7, Internal Wrenching Bolts", "topic": "Hardware / Bolts"}, {"q": "The corrosion that consists of a special form of oxygen concentration cell that occurs on metal surfaces having an organic coating system is known as?", "options": ["Surface corrosion", "Pitting corrosion", "Filiform corrosion"], "correct": 2, "short": "Filiform corrosion.", "expl": "Filiform is a special oxygen-concentration-cell corrosion that travels in thread-like filaments under an organic coating (paint) on metal surfaces.", "cite": "FAA-H-8083-30B Ch.8, Forms of Corrosion (Filiform)", "topic": "Corrosion"}, {"q": "When removing or installing screws, cordless drills with screwdriver bits:", "options": ["Are not recommended for removing or installing screws", "May be used when removing a large number of screws", "May be used when installing a large number of screws in order to save time"], "correct": 0, "short": "Are not recommended.", "expl": "Power/cordless drivers tend to strip slots, cam out, and over-torque screws, so they are not recommended for installing or removing aircraft screws.", "cite": "FAA-H-8083-30B Ch.11, Hand Tools (Screwdrivers — power tool caution)", "topic": "Tools"}, {"q": "Who is permitted to make notes or changes on approved prints?", "options": ["Only authorized mechanics", "The draftsmen, mechanic, and their supervisor", "The draftsmen and the person approving the drawing"], "correct": 2, "short": "The draftsman and the person who approves the drawing.", "expl": "Approved drawings/prints may only be altered by the draftsman and the person authorized to approve the drawing—not by mechanics in the field.", "cite": "FAA-H-8083-30B Ch.4, Working with Drawings (changes to prints)", "topic": "Drawings"}, {"q": "Protecting the interiors of structural steel and aluminum tubing against corrosion is best done by:", "options": ["Phosphate rust-proofing", "Metal spraying on the surface to be protected", "Coating the tube interior by flushing with hot linseed oil"], "correct": 2, "short": "Flushing the interior with hot linseed oil.", "expl": "The inside of closed steel/aluminum tubing is protected by flushing it with hot linseed oil, which coats and seals the interior surface against corrosion.", "cite": "FAA-H-8083-30B Ch.8 / AC 43.13-1B Ch.6 (tube interior corrosion protection)", "topic": "Corrosion"}, {"q": "A B-nut fitting on a fluid line needs to be tightened, which type of wrench would be the most appropriate for this situation?", "options": ["Flare nut wrench", "Adjustable wrench", "Open end wrench"], "correct": 0, "short": "A flare-nut wrench.", "expl": "A flare-nut (line) wrench wraps around the B-nut on more flats than an open-end wrench, preventing rounding of the soft tubing nut while still slipping over the tubing.", "cite": "FAA-H-8083-30B Ch.11, Hand Tools (Flare-nut wrench)", "topic": "Tools / Fluid Lines"}, {"q": "In the universal numbering system, the letter C indicates what size drawing?", "options": ["8 1/2\" X 11\"", "17\" X 22\"", "11\" X 17\""], "correct": 1, "short": "17\" x 22\" (size C).", "expl": "In the universal drawing-number system, sheet sizes are lettered: A = 8.5x11, B = 11x17, C = 17x22, D = 22x34. So C indicates a 17x22 inch drawing.", "cite": "FAA-H-8083-30B Ch.4, Drawing Number / Sheet Sizes", "topic": "Drawings"}, {"q": "Graphs and charts are frequently used for what purpose?", "options": ["To serve as a visual display of information given certain conditions", "To serve as a troubleshooting tool for the detection of trouble conditions", "To convey information graphically or information given certain condition"], "correct": 0, "short": "A visual display of information for given conditions.", "expl": "Graphs and charts present information visually so a value can be read off quickly under given conditions.", "cite": "FAA-H-8083-30B Ch.4, Graphs and Charts", "topic": "Drawings"}, {"q": "When considering hacksaw blades, what does the term \"pitch\" refer to?", "options": ["The number of teeth per inch on the blade", "The angle of the blade in relation to the cutting surface", "The length of the blade"], "correct": 0, "short": "The number of teeth per inch.", "expl": "Blade pitch is the number of teeth per inch (TPI); finer pitch (more teeth) is used for thin/hard material, coarser pitch for soft/thick stock.", "cite": "FAA-H-8083-30B Ch.11, Hand Tools (Hacksaws — pitch)", "topic": "Tools"}, {"q": "The most common methods used to illustrate objects graphically are:", "options": ["Orthographic projections, pictorial drawings, diagrams, and flowcharts", "Orthographic projections, Isometrics, Oblique and Perspective", "Orthographic projections, Oblique, Cylindrical, and Auxiliary views"], "correct": 0, "short": "Orthographic projections, pictorial drawings, diagrams, and flowcharts.", "expl": "The four common graphic methods are orthographic projections, pictorial drawings, diagrams, and flowcharts.", "cite": "FAA-H-8083-30B Ch.4, Methods of Illustrating", "topic": "Drawings"}, {"q": "What symbols are usually shown on a drawing as a revolved or removed section?", "options": ["Material symbols", "Electrical symbols", "Shape symbols"], "correct": 0, "short": "Material symbols.", "expl": "Revolved and removed sections use cross-hatch (material) symbols to show the kind of material and the cross-sectional shape of the part.", "cite": "FAA-H-8083-30B Ch.4, Sectional Views / Material Symbols", "topic": "Drawings"}, {"q": "Exfoliation corrosion is/are:", "options": ["Accumulation of hydrogen in anodic areas", "Lifting of the surface metal by the corrosion products", "Worm-like threads found under paint surfaces"], "correct": 1, "short": "Lifting of surface metal by corrosion products.", "expl": "Exfoliation is intergranular corrosion that proceeds along grain boundaries parallel to the surface, and the corrosion product wedges the layers apart, lifting/flaking the surface metal.", "cite": "FAA-H-8083-30B Ch.8, Forms of Corrosion (Exfoliation)", "topic": "Corrosion"}, {"q": "What are some of the advantages of composite materials?", "options": ["High strength-to-weight ratio, longer life than metals, high corrosion resistance", "Easy to inspect, cheap to manufacture, products are non toxic and non hazardous", "Standardized methodology data base for repairs already exists, cheaper repair costs"], "correct": 0, "short": "High strength-to-weight, long life, corrosion resistant.", "expl": "Composites' chief advantages are a high strength-to-weight ratio, long fatigue life, and excellent corrosion resistance (they don't rust like metal).", "cite": "FAA-H-8083-30B Ch.7, Composite Materials (advantages)", "topic": "Materials"}, {"q": "Most corrosion can be prevented by using some of the following preventative measures:", "options": ["draining fuel tanks daily, cleaning glass and windows daily, parking the aircraft in the hangar daily, and servicing the engine after each flight", "adequate cleaning, keeping drain holes clear, and a daily wipe down of exposed critical areas", "covering the aircraft with a tarp, keeping the cabin and engine bays warm in cold weather, changing engine oil frequently, and keeping the tires inflated"], "correct": 1, "short": "Adequate cleaning, clear drain holes, wipe down critical areas.", "expl": "Routine corrosion prevention = keeping the aircraft clean, keeping drain holes/paths open so water doesn't collect, and wiping down exposed critical areas.", "cite": "FAA-H-8083-30B Ch.8, Corrosion Preventive Maintenance", "topic": "Corrosion"}, {"q": "What are the two types of flowcharts used most frequently in the aviation industry?", "options": ["Troubleshooting and logic flowcharts", "Fuel consumption and wiring flowcharts", "BMEP charts and cable tension vs temperature charts"], "correct": 0, "short": "Troubleshooting and logic flowcharts.", "expl": "The two most common flowcharts in aviation maintenance are troubleshooting flowcharts and logic flowcharts.", "cite": "FAA-H-8083-30B Ch.4, Flowcharts", "topic": "Drawings"}, {"q": "What is the common term used to describe the end of the solid shank rivet that is upset by the application of the bucking bar?", "options": ["Machine head", "Tail end", "Shop head"], "correct": 2, "short": "The shop head.", "expl": "On a solid-shank rivet, the original head is the manufactured (machine) head; the deformed end formed by the bucking bar is called the shop head.", "cite": "FAA-H-8083-30B Ch.7, Solid Rivets (shop head)", "topic": "Hardware / Rivets"}, {"q": "Select the MAXIMUM number of turnbuckle terminal threads that can be exposed outside of the barrel.", "options": ["Four", "Three", "One"], "correct": 1, "short": "No more than three threads exposed.", "expl": "A turnbuckle is correctly adjusted when not more than three threads are exposed on either end outside the barrel (a check is that you cannot pass a pin through the inspection hole).", "cite": "AC 43.13-1B Ch.7, Turnbuckle Safetying / FAA-H-8083-30B Ch.7", "topic": "Hardware / Cable"}, {"q": "What are the three classes of Seals?", "options": ["Packings, Gaskets, O-rings", "Packings, Gaskets, Wipers", "Gaskets, Wipers, O-rings"], "correct": 1, "short": "Packings, Gaskets, and Wipers.", "expl": "The three classes of seals are packings, gaskets, and wipers. (O-rings are a type/shape of packing, not a separate class.)", "cite": "FAA-H-8083-30B Ch.7, Seals (classes)", "topic": "Materials / Seals"}, {"q": "In metal working what does the term \"Casting\" refer to?", "options": ["A process in which heated metal is forced through a preformed die.", "A process in which metal is heated and poured into mold.", "A process where metal is shaped using a hammering effect."], "correct": 1, "short": "Metal heated and poured into a mold.", "expl": "Casting is forming a part by melting metal and pouring it into a mold to solidify into the desired shape.", "cite": "FAA-H-8083-30B Ch.7, Metalworking Processes (Casting)", "topic": "Materials"}, {"q": "What kind of corrosion occurs when two dissimilar metals make contact in the presence of an electrolyte?", "options": ["Fretting corrosion", "Fatigue corrosion", "Galvanic corrosion"], "correct": 2, "short": "Galvanic corrosion.", "expl": "Galvanic corrosion = two dissimilar metals in contact plus an electrolyte. (Fretting is from vibration/rubbing; fatigue corrosion involves cyclic stress.)", "cite": "FAA-H-8083-30B Ch.8, Forms of Corrosion (Galvanic)", "topic": "Corrosion"}, {"q": "The possibility of an inflight mishap or excessive down time for structural repairs mandates:", "options": ["Periodic thorough cleaning, lubrication and preservation", "A&P technician be familiar with the different types of corrosion", "An active corrosion prevention and control program"], "correct": 2, "short": "An active corrosion prevention and control program.", "expl": "Because corrosion can cause in-flight failures or long downtimes, operators must maintain an active corrosion prevention and control program (CPCP).", "cite": "FAA-H-8083-30B Ch.8, Corrosion Control Program", "topic": "Corrosion"}, {"q": "Chemical spot testing should be accomplished by:", "options": ["Qualified personnel", "NDI Tech", "Certified A&P Tech"], "correct": 0, "short": "Qualified personnel.", "expl": "Chemical spot tests (used to identify corrosion/metal) must be performed only by qualified personnel because the chemicals and interpretation require training.", "cite": "FAA-H-8083-30B Ch.8, Corrosion Detection (chemical spot test)", "topic": "Corrosion"}, {"q": "Define the word Ductility:", "options": ["Breaks or shatters under stress", "The ability to be drawn into shape", "Ability to return to an original shape after being bent or pulled"], "correct": 1, "short": "The ability to be drawn into shape (e.g., into wire).", "expl": "Ductility is the property that lets a metal be drawn, stretched, or formed (e.g., into wire) without breaking.", "cite": "FAA-H-8083-30B Ch.7, Properties of Metals (Ductility)", "topic": "Materials"}, {"q": "Select the correct washer material to use under the head and nut when installing a steel bolt to secure aluminum or magnesium members.", "options": ["Magnesium", "Aluminum", "Steel"], "correct": 2, "short": "A steel (cadmium-plated) washer.", "expl": "When a steel bolt secures aluminum/magnesium parts, place a cad-plated steel washer under the head and nut to spread load and to keep the dissimilar steel bolt from bearing directly on the soft metal.", "cite": "FAA-H-8083-30B Ch.7, Washers (use under bolt head/nut)", "topic": "Hardware / Washers"}, {"q": "In metal working what does the term \"Forging\" refer to?", "options": ["A process where metal is shaped using a hammering effect.", "A process in which metal is heated and poured into mold.", "A process in which heated metal is forced through a preformed die."], "correct": 0, "short": "Shaping metal by hammering/pressing.", "expl": "Forging shapes metal by hammering or pressing it (usually while hot). Pouring into a mold = casting; forcing through a die = extruding.", "cite": "FAA-H-8083-30B Ch.7, Metalworking Processes (Forging)", "topic": "Materials"}, {"q": "A pictorial drawing of two or more parts that fit together as an assembly is what kind of view drawing is it?", "options": ["Installation drawings", "Exploded view drawings", "Assembly drawings"], "correct": 1, "short": "An exploded view drawing.", "expl": "An exploded view is a pictorial that separates the parts along a common axis to show how they fit together as an assembly.", "cite": "FAA-H-8083-30B Ch.4, Exploded View Drawings", "topic": "Drawings"}, {"q": "What kind of drawings is a combination of the views of an orthographic projection and tilts the object forward so that portions of all three views can be seen in one view?", "options": ["Isometric drawings", "Oblique drawings", "Perspective drawings"], "correct": 0, "short": "Isometric drawings.", "expl": "An isometric drawing tilts the object so three faces (the three orthographic views) are seen at once, with the axes 120 degrees apart and true to scale along the axes.", "cite": "FAA-H-8083-30B Ch.4, Pictorial Drawings (Isometric)", "topic": "Drawings"}, {"q": "Select the correct MAXIMUM time length that 2017-T \"ice-box\" rivets can remain at room temperature before they must be used (driven).", "options": ["2017-T should be driven within two hours", "2017-T is not time-limited", "2017-T should be driven within one hour"], "correct": 2, "short": "Within one hour.", "expl": "Icebox rivets: 2017-T must be driven within about 1 hour after removal from refrigeration, while 2024-T must be driven within about 10-20 minutes.", "cite": "FAA-H-8083-30B Ch.7, Icebox Rivets (heat treatment time)", "topic": "Hardware / Rivets"}, {"q": "Centerlines are made up of", "options": ["Alternating long and short dashes", "Solid lines with one arrowhead", "One long and two short dashes spaced evenly"], "correct": 0, "short": "Alternating long and short dashes.", "expl": "A centerline is drawn as alternating long and short dashes; it marks the center of a symmetrical object or a circle's axis.", "cite": "FAA-H-8083-30B Ch.4, Lines and Their Meanings (Centerline)", "topic": "Drawings"}, {"q": "Select the correct tool used for checking aircraft control cable tension.", "options": ["Multi-meter", "Potentiometer", "Tensiometer"], "correct": 2, "short": "A tensiometer.", "expl": "A cable tensiometer is the tool used to measure control-cable tension (riser deflects the cable a set amount and reads tension off a calibration chart).", "cite": "FAA-H-8083-30B Ch.11 / Ch.7, Cable Tensiometer", "topic": "Tools / Cable"}, {"q": "After reaching the maximum torque, what should be done when torquing a Castle (or Castellated Shear) nut and the cotter pin hole does not align with the bolt hole?", "options": ["The AC43-13-1B allows exceeding the maximum torque value only once", "Change the washer or nut for another and re-try torquing the nut", "Add a thick washer and then re-try torquing the nut"], "correct": 1, "short": "Change the washer or nut and re-torque.", "expl": "If the slot won't line up with the cotter-pin hole at max torque, do NOT exceed max torque—swap the washer/nut for another and try again until the slot aligns within the torque range.", "cite": "FAA-H-8083-30B Ch.7, Torque (castellated nut alignment)", "topic": "Hardware / Torque"}, {"q": "What are the four types of pictorial drawings used frequently by aircraft engineers and technicians?", "options": ["Auxiliary, Isometric, Orthographic, and Exploded view", "Perspective, Isometric, Oblique, and Exploded view", "Orthographic, Perspective, Isometric, and Oblique"], "correct": 2, "short": "Orthographic, Perspective, Isometric, and Oblique.", "expl": "The four common pictorial-type drawings are orthographic, perspective, isometric, and oblique drawings.", "cite": "FAA-H-8083-30B Ch.4, Pictorial Drawings", "topic": "Drawings"}, {"q": "The universal numbering system provides a means of identifying:", "options": ["Standard drawing sizes", "Standard cover metric & inch measurement", "Allowances and tolerances"], "correct": 0, "short": "Standard drawing sizes.", "expl": "The universal numbering (drawing-size) system identifies the standard sheet sizes (A, B, C, D, etc.) of drawings.", "cite": "FAA-H-8083-30B Ch.4, Universal Numbering System", "topic": "Drawings"}, {"q": "Select the proper application of running seals:", "options": ["Packings are never used on moving parts to prevent internal and external leaks", "Packings used on both stationary and moving parts to prevent internal and external leaks", "Packings used on moving parts to prevent internal and external leaks"], "correct": 2, "short": "Packings on moving parts to prevent internal and external leaks.", "expl": "A running (dynamic) seal is a packing used on moving parts to seal against internal and external leakage; a gasket seals between stationary parts.", "cite": "FAA-H-8083-30B Ch.7, Seals (running/dynamic packings)", "topic": "Materials / Seals"}, {"q": "In metal working what does the term \"Extruding\" refer to?", "options": ["A process in which metal is heated and poured into mold.", "A process in which heated metal is forced through a preformed die.", "A process where metal is shaped using a hammering effect."], "correct": 1, "short": "Heated metal forced through a die.", "expl": "Extruding forces heated metal through a shaped die to produce a long part of constant cross-section (like extruded angle/channel stock).", "cite": "FAA-H-8083-30B Ch.7, Metalworking Processes (Extruding)", "topic": "Materials"}, {"q": "What are the three most common types of torque wrenches?", "options": ["Direct Reading, Dial Indicating, Offset", "Offset, Direct Reading, Indirect Reading", "Dial Indicating, Deflecting Beam, Micrometer Setting"], "correct": 2, "short": "Deflecting-beam, Dial-indicating, Micrometer-setting.", "expl": "The three common torque wrenches are the deflecting (flexible) beam, the dial-indicating (rigid frame), and the micrometer-setting (audible click) types.", "cite": "FAA-H-8083-30B Ch.7/Ch.11, Torque Wrenches", "topic": "Tools / Torque"}, {"q": "Why should aircraft drawings be handled carefully?", "options": ["They are valuable and inexpensive", "They are expensive and valuable", "They are carefully designed and easily recreated"], "correct": 1, "short": "They are expensive and valuable.", "expl": "Aircraft drawings represent large engineering investment—they are expensive and valuable and not easily recreated, so they must be handled carefully.", "cite": "FAA-H-8083-30B Ch.4, Care of Drawings", "topic": "Drawings"}, {"q": "Select the PRIMARY purpose of using plain washers on aircraft assemblies.", "options": ["To provide a smooth bearing surface", "They are never used on flight control areas", "They are only to be used with Castle or Castellated nuts"], "correct": 0, "short": "To provide a smooth bearing surface.", "expl": "Plain washers provide a smooth bearing surface, adjust grip length, and spread the clamping load; they also protect the surface as the nut is turned.", "cite": "FAA-H-8083-30B Ch.7, Washers (plain)", "topic": "Hardware / Washers"}, {"q": "Where can you find information that cannot be conveyed in the conventional manner or when it is desirable to avoid crowding the drawing?", "options": ["In the notes, alongside the item that they refer to", "In the miscellaneous section of the aircraft logbook", "On the bottom of the drawing in the fine print"], "correct": 0, "short": "In the notes, next to the item they refer to.", "expl": "Notes on a drawing carry information that can't be shown graphically or would clutter the view; they are placed near the item they apply to.", "cite": "FAA-H-8083-30B Ch.4, Notes on Drawings", "topic": "Drawings"}, {"q": "During the inspection of wheel well and landing gear areas, pay special attention to", "options": ["glass components", "water entrapment areas", "magnesium wheels"], "correct": 1, "short": "Water entrapment areas.", "expl": "Wheel wells and landing gear collect water, mud, and debris, so during inspection pay special attention to water-entrapment areas where corrosion starts.", "cite": "FAA-H-8083-30B Ch.8, Corrosion-Prone Areas (wheel well/gear)", "topic": "Corrosion"}, {"q": "Bilge areas are considered to be", "options": ["areas where drains are installed where water is known to collect", "an area that is subject to much more punishment than other areas of the aircraft.", "natural collection points for waste hydraulic fluids, water, dirt, etc..."], "correct": 2, "short": "Natural collection points for waste fluids, water, and dirt.", "expl": "Bilge areas are the lowest points of the structure—natural collection points for spilled hydraulic fluid, water, dirt, and debris, making them corrosion hot spots.", "cite": "FAA-H-8083-30B Ch.8, Corrosion-Prone Areas (bilge)", "topic": "Corrosion"}, {"q": "What type of sectional view drawing illustrates a cross-section of a component, often drawn to a larger scale and placed to one side of the main indicated view, in order to bring out pertinent details?", "options": ["Full section", "Removed section", "Exploded section"], "correct": 1, "short": "A removed section.", "expl": "A removed (detail) section shows a cross-section drawn separately—often enlarged—and placed beside the main view to highlight detail.", "cite": "FAA-H-8083-30B Ch.4, Sectional Views (Removed Section)", "topic": "Drawings"}, {"q": "What is recommended for use to effectively clean files?", "options": ["Soap & Water", "Removed section", "File Card"], "correct": 2, "short": "A file card.", "expl": "A file card (a stiff wire brush) is used to clean metal chips out of the teeth of a file so it cuts cleanly and doesn't 'pin' the work.", "cite": "FAA-H-8083-30B Ch.11, Hand Tools (Files / file card)", "topic": "Tools"}, {"q": "Chlorinated hydrocarbon solvents and chemical corrosion removers are prohibited from use on titanium and titanium alloys because:", "options": ["It should always be done with alkaline solution", "They are highly-reactive immediately following corrosion removal", "They are susceptible to hydrogen embrittlement"], "correct": 2, "short": "Titanium is susceptible to hydrogen embrittlement.", "expl": "Chlorinated solvents and chemical removers can drive hydrogen into titanium, causing hydrogen embrittlement (and stress-corrosion cracking), so they are prohibited on titanium.", "cite": "FAA-H-8083-30B Ch.8, Cleaning/Corrosion of Titanium", "topic": "Corrosion / Materials"}, {"q": "The interior surface of sealed structural steel tubing is best protected against corrosion by:", "options": ["Evacuating the tubing before sealing.", "Chemical Dip", "A coating of hot linseed oil."], "correct": 2, "short": "A coating of hot linseed oil.", "expl": "The inside of sealed steel tubing is protected by flushing with hot linseed oil, which leaves a protective film on the interior surface before the tube is sealed.", "cite": "FAA-H-8083-30B Ch.8 / AC 43.13-1B Ch.6 (tube interior protection)", "topic": "Corrosion"}, {"q": "Using the provided brake horse power chart, determine the brake mean effective pressure of an aircraft reciprocating engine that has a 2800 cubic inch displacement (CID) and develops 2000 BHP at 2400 RPM.", "options": ["217 psi", "225 psi", "237 psi"], "correct": 2, "short": "≈237 psi.", "expl": "BMEP = (BHP x 792,000) / (RPM x CID) = (2000 x 792,000) / (2400 x 2800) = 1,584,000,000 / 6,720,000 = 235.7 psi → closest option 237 psi.", "cite": "FAA-H-8083-32B, Engine Power (BMEP formula) — worked", "topic": "Powerplant / Calc"}, {"q": "Exfoliation corrosion:", "options": ["involves a constant or cyclic stress acting in conjunction with a damaging chemical environment", "is an advanced form of intergranular corrosion and shows itself by lifting up the surface grains", "is an attack along the grain boundaries of an alloy"], "correct": 1, "short": "Advanced intergranular corrosion lifting up surface grains.", "expl": "Exfoliation is an advanced form of intergranular corrosion; the corrosion product forces the grain layers apart, lifting/flaking up the surface grains.", "cite": "FAA-H-8083-30B Ch.8, Forms of Corrosion (Exfoliation)", "topic": "Corrosion"}, {"q": "Testing method that uses high-frequency sound waves (vibrations) to detect corrosion and moisture in adhesive-bonded metal honeycomb structures is call:", "options": ["Acoustic Emission Testing", "Eddy Current Inspection Testing", "Ultrasonic Inspection Testing"], "correct": 2, "short": "Ultrasonic inspection.", "expl": "Ultrasonic inspection uses high-frequency sound waves to find corrosion, disbonds, and moisture in bonded metal honeycomb structures.", "cite": "FAA-H-8083-30B Ch.8 / AC 43.13-1B Ch.5 (Ultrasonic Inspection)", "topic": "NDT / Corrosion"}, {"q": "Why is aluminum one of the most widely used metals for aircraft construction?", "options": ["Superior weight to strength ratio", "Superior painting surfaces", "Superior wind resistance"], "correct": 0, "short": "Superior strength-to-weight ratio.", "expl": "Aluminum is widely used because of its high strength-to-weight ratio—it's light yet strong, and it's corrosion-resistant and workable.", "cite": "FAA-H-8083-30B Ch.7, Aircraft Metals (Aluminum)", "topic": "Materials"}, {"q": "The locking feature of the nylon-type locknut is obtained by:", "options": ["The use of an unthreaded nylon locking insert", "Making the threads in the nylon insert slightly smaller than those on the load carrying section", "A nylon insert held firmly in place at the base of the nut load carrying section"], "correct": 1, "short": "Threads in the nylon insert are smaller than the bolt threads.", "expl": "A nylon (self-locking) nut locks because the unthreaded nylon insert is smaller in diameter than the bolt threads; the bolt cuts its own threads into the nylon, gripping it.", "cite": "FAA-H-8083-30B Ch.7, Self-Locking Nuts (nylon insert)", "topic": "Hardware / Nuts"}, {"q": "Using the provided brake horse power chart, determine the brake mean effective pressure of an aircraft reciprocating engine that has 1830 cubic inch displacement (CID) and develops 1190 BHP at 2700 RPM.", "options": ["195 psi", "180 psi", "187 psi"], "correct": 0, "short": "≈195 psi.", "expl": "BMEP = (BHP x 792,000) / (RPM x CID) = (1190 x 792,000) / (2700 x 1830) = 942,480,000 / 4,941,000 = 190.7 psi → closest option 195 psi.", "cite": "FAA-H-8083-32B, Engine Power (BMEP formula) — worked", "topic": "Powerplant / Calc"}, {"q": "Using an inch-pound torque wrench, calculate the correct torque for 10 ft-lbs of required torque.", "options": ["10 in-lbs", "120 in-lbs", "120 ft-lbs"], "correct": 1, "short": "120 in-lbs.", "expl": "1 foot = 12 inches, so 10 ft-lbs x 12 = 120 in-lbs.", "cite": "FAA-H-8083-30B Ch.7, Torque (unit conversion) — worked", "topic": "Hardware / Torque"}, {"q": "What are the two types of screwdrivers commonly used on recessed head screws with a 'cross' slot?", "options": ["Phillips & Stevens", "Phillips & Davis", "Phillips and Reed & Prince"], "correct": 2, "short": "Phillips and Reed & Prince.", "expl": "The two common cross-slot (recessed-head) screwdriver types are the Phillips and the Reed & Prince (Frearson). They look similar but are NOT interchangeable—the tip angles differ.", "cite": "FAA-H-8083-30B Ch.11, Hand Tools (Recessed-head screwdrivers)", "topic": "Tools"}, {"q": "All bolt installation which involve self-locking or plain nuts should have at least ____ thread of the bolt protruding through the nut.", "options": ["Three", "Two", "One"], "correct": 2, "short": "At least one thread.", "expl": "A properly installed bolt/nut should show at least one thread of the bolt protruding past the nut (for AN self-locking and plain nuts).", "cite": "FAA-H-8083-30B Ch.7 / AC 43.13-1B Ch.7 (bolt thread protrusion)", "topic": "Hardware / Bolts"}, {"q": "The cutting angle of most common chisels should be between:", "options": ["45° and 55°", "40° and 50°", "60° and 70°"], "correct": 2, "short": "60° to 70°.", "expl": "The cutting (bevel) angle for most common cold chisels is ground to about 60-70 degrees for general metal-cutting work.", "cite": "FAA-H-8083-30B Ch.11, Hand Tools (Chisels)", "topic": "Tools"}, {"q": "What is the difference between \"Ferrous\" and \"Non-Ferrous\" metals?", "options": ["Ferrous refers to metals that have been heat treated, non-ferrous refers to metals that have not been heat treated", "Ferrous refers to metals that have been mixed with smaller quantities of other metals, Non-Ferrous metals are those metals that have not been mixed and are in their purest form", "Ferrous metals are those that are iron based. Non-Ferrous metals are those that are not iron based."], "correct": 2, "short": "Ferrous = iron-based; non-ferrous = not iron-based.", "expl": "Ferrous metals contain iron (steel, cast iron); non-ferrous metals contain no iron (aluminum, copper, titanium, magnesium).", "cite": "FAA-H-8083-30B Ch.7, Aircraft Metals (ferrous vs non-ferrous)", "topic": "Materials"}, {"q": "Regarding to the following statement, which one is true", "options": ["Corrosion is different from erosion, which causes destruction by chemical action", "Corrosion is different from erosion, which causes destruction by mechanical action", "Corrosion is similar to erosion, which causes destruction by mechanical action"], "correct": 1, "short": "Corrosion differs from erosion; erosion is mechanical destruction.", "expl": "Corrosion is chemical/electrochemical attack on metal; erosion is mechanical wearing away. They are different—erosion destroys by mechanical action.", "cite": "FAA-H-8083-30B Ch.8, Corrosion vs Erosion", "topic": "Corrosion"}, {"q": "Appearance of corrosion on silver is describe as", "options": ["Blue or blue-green powdery deposit", "Brown-to-black film", "No visible corrosion product"], "correct": 1, "short": "A brown-to-black film (tarnish).", "expl": "Silver corrodes/tarnishes as a brown-to-black film. (Blue/blue-green powder = copper/brass; gray-white powder = aluminum/magnesium.)", "cite": "FAA-H-8083-30B Ch.8, Corrosion Appearance by Metal (silver)", "topic": "Corrosion"}, {"q": "Torque values for tightening aircraft nuts and bolts relate to ____ unless otherwise specified.", "options": ["Either dry or lightly oiled threads.", "Clean, dry threads.", "Clean, lightly oiled threads."], "correct": 1, "short": "Clean, dry threads.", "expl": "Standard torque tables assume clean, dry threads unless the manufacturer specifies otherwise—lubricant changes the friction and the resulting clamp load.", "cite": "FAA-H-8083-30B Ch.7, Torque (clean dry threads)", "topic": "Hardware / Torque"}, {"q": "Titanium is prone to cause severe corrosion of adjacent parts through:", "options": ["Filiform corrosion", "Pitting corrosion", "Galvanic corrosion"], "correct": 2, "short": "Galvanic corrosion of adjacent parts.", "expl": "Titanium is cathodic (noble) to most aircraft metals, so when it contacts aluminum/steel with an electrolyte present, it drives severe galvanic corrosion of those adjacent (anodic) parts.", "cite": "FAA-H-8083-30B Ch.8, Galvanic Corrosion (titanium)", "topic": "Corrosion / Materials"}, {"q": "In what kind of drawing would the classes of fits specified in the standard be indicated?", "options": ["Assembly drawing", "Installation drawing", "Detail drawing"], "correct": 2, "short": "A detail drawing.", "expl": "A detail drawing describes a single part with all dimensions, tolerances, material, and the class of fit needed to manufacture it.", "cite": "FAA-H-8083-30B Ch.4, Detail Drawings (fits/tolerances)", "topic": "Drawings"}];
const DRILL = [{"label": "Blend-out ratio", "text": "Corrosion rework is faired at 20:1 length-to-depth."}, {"label": "Purple plague", "text": "Brittle GOLD-to-ALUMINUM intermetallic compound."}, {"label": "Titanium + dissimilar metal", "text": "Drives GALVANIC corrosion of adjacent parts (Ti is cathodic)."}, {"label": "Exfoliation", "text": "Advanced INTERGRANULAR corrosion that LIFTS surface grains/metal."}, {"label": "Filiform", "text": "Oxygen-concentration-cell corrosion as worm-like threads UNDER paint."}, {"label": "Galvanic corrosion", "text": "Two DISSIMILAR metals + an ELECTROLYTE."}, {"label": "B-nut wrench", "text": "Use a FLARE-NUT (line) wrench on fluid-line B-nuts."}, {"label": "Casting / Forging / Extruding", "text": "Cast = poured into mold; Forge = hammered/pressed; Extrude = forced through a die."}, {"label": "Vertical reference", "text": "Vertical locations are referenced to the WATERLINE."}, {"label": "Alloy", "text": "A combination of TWO OR MORE metals for desired properties."}, {"label": "Torque assumption", "text": "Torque values = CLEAN, DRY threads unless mfr says otherwise."}, {"label": "3 torque wrenches", "text": "Deflecting-beam, Dial-indicating, Micrometer-setting."}, {"label": "Chemical spot testing", "text": "Done only by QUALIFIED PERSONNEL."}, {"label": "Corrosion reference", "text": "Detection & treatment of corrosion = AC 43-4B."}, {"label": "Tube interior protection", "text": "Flush sealed steel/aluminum tubing with HOT LINSEED OIL."}, {"label": "Icebox rivets", "text": "2017-T drive within ~1 hr; 2024-T within ~10-20 min."}, {"label": "Screwdriver fit", "text": "A flat-tip screwdriver must fill at least 75% of the slot."}, {"label": "Turnbuckle threads", "text": "No more than THREE threads exposed outside the barrel."}, {"label": "Silver corrosion color", "text": "Brown-to-black film (vs blue-green = copper, gray-white = aluminum)."}, {"label": "BMEP formula", "text": "BMEP = (BHP x 792,000) / (RPM x CID)."}];

const QUIZ = {
  order:[], i:0, score:0, answered:0, missed:[], shuffle:false,

  init(){
    document.getElementById('startmeta').innerHTML =
      '<b>'+DATA.length+'</b> questions &nbsp;·&nbsp; instant feedback &nbsp;·&nbsp; every answer cited';
    const t=document.getElementById('shuffleToggle');
    t.onclick=()=>{ this.shuffle=!this.shuffle; t.classList.toggle('on',this.shuffle); };
  },

  start(){
    this.order = DATA.map((_,k)=>k);
    if(this.shuffle){ for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('start').style.display='none';
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  retake(missedOnly){
    if(missedOnly && this.missed.length){ const m=this.missed.slice(); this.order=m; }
    else { this.order = DATA.map((_,k)=>k); if(this.shuffle){for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];}} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  render(){
    const idx=this.order[this.i], q=DATA[idx];
    const total=this.order.length;
    document.getElementById('counter').textContent = 'Q'+(this.i+1)+' of '+total;
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('progfill').style.width = (this.i/total*100)+'%';
    let opts='';
    q.options.forEach((o,li)=>{
      const L='ABCD'[li];
      opts += '<button class="opt" data-li="'+li+'" onclick="QUIZ.pick('+li+')">'+
              '<span class="L">'+L+'</span><span class="T">'+esc(o)+'</span><span class="mark"></span></button>';
    });
    document.getElementById('cardmount').innerHTML =
      '<div class="card"><span class="tag">'+esc(q.topic)+'</span>'+
      '<div class="stem">'+esc(q.q)+'</div>'+
      '<div class="opts" id="opts">'+opts+'</div>'+
      '<div class="fb" id="fb"></div></div>';
    document.getElementById('nextbtn').disabled = true;
    document.getElementById('skipbtn').style.display = '';
    this.locked=false;
  },

  pick(li){
    if(this.locked) return;
    this.locked=true;
    const idx=this.order[this.i], q=DATA[idx];
    const wrapEl=document.getElementById('opts'); wrapEl.classList.add('locked');
    const btns=wrapEl.querySelectorAll('.opt');
    const ok = (li===q.correct);
    btns.forEach(b=>{
      const bl=+b.dataset.li;
      if(bl===q.correct){ b.classList.add('correct'); b.querySelector('.mark').textContent='✓'; }
      if(bl===li && !ok){ b.classList.add('wrong'); b.querySelector('.mark').textContent='✗'; }
    });
    this.answered++;
    if(ok) this.score++; else this.missed.push(idx);
    const fb=document.getElementById('fb');
    fb.className='fb show '+(ok?'ok':'no');
    fb.innerHTML = '<div class="verdict">'+(ok?'✓ Correct':'✗ Incorrect')+'</div>'+
      '<div class="ans">Answer: '+'ABCD'[q.correct]+'. '+esc(q.short)+'</div>'+
      '<div class="expl">'+esc(q.expl)+'</div>'+
      '<div class="cite">📖 '+esc(q.cite)+'</div>';
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('nextbtn').disabled = false;
    document.getElementById('skipbtn').style.display = 'none';
  },

  next(skip){
    if(skip && !this.locked){ /* skipped, not answered */ }
    this.i++;
    if(this.i >= this.order.length){ this.finish(); return; }
    this.render();
    window.scrollTo({top:0,behavior:'smooth'});
  },

  finish(){
    document.getElementById('quiz').style.display='none';
    const R=document.getElementById('results');
    const total=this.answered;
    const pct = total? Math.round(this.score/total*100):0;
    const pass = pct>=70;
    let miss='';
    if(this.missed.length){
      miss='<h3 style="text-align:left;font-size:16px;color:var(--navy);margin:22px 0 8px;">Review your '+this.missed.length+' missed:</h3><div class="misslist">';
      this.missed.forEach(idx=>{ const q=DATA[idx];
        miss+='<div class="missitem"><div class="mq">'+esc(q.q)+'</div>'+
              '<div class="ma"><b>'+'ABCD'[q.correct]+'. '+esc(q.short)+'</b> — '+esc(q.expl)+'</div>'+
              '<div class="mc">📖 '+esc(q.cite)+'</div></div>';
      });
      miss+='</div>';
    } else {
      miss='<div class="allright">🎯 Perfect — every question correct!</div>';
    }
    let drillHtml='';
    if(DRILL && DRILL.length){
      drillHtml='<details class="drill"><summary>📌 High-Yield Drill Box ('+DRILL.length+' must-know facts)</summary>';
      DRILL.forEach(d=>{ drillHtml+='<div class="drillrow"><b>'+esc(d.label)+':</b> '+esc(d.text)+'</div>'; });
      drillHtml+='</details>';
    }
    R.innerHTML =
      '<h1>'+(pass?'Nice work 👍':'Keep grinding 💪')+'</h1>'+
      '<div class="bigscore">'+this.score+'<small>/'+total+'</small></div>'+
      '<div class="pct '+(pass?'pass':'fail')+'">'+pct+'%  '+(pass?'· passing (≥70%)':'· below 70%')+'</div>'+
      '<div class="nav" style="max-width:430px;margin:0 auto 4px;">'+
        '<button class="btn primary" onclick="QUIZ.retake(false)">Retake all</button>'+
        (this.missed.length?'<button class="btn ghost" onclick="QUIZ.retake(true)">Retake missed only</button>':'')+
      '</div>'+
      miss + drillHtml;
    R.style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  }
};

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('quiz').style.display==='none') return;
  const k=e.key.toLowerCase();
  if(['a','b','c','d'].includes(k)) QUIZ.pick('abcd'.indexOf(k));
  else if(['1','2','3','4'].includes(k)) QUIZ.pick(+k-1);
  else if(e.key==='Enter' && !document.getElementById('nextbtn').disabled) QUIZ.next();
});

QUIZ.init();
</script>
</body>
</html>
