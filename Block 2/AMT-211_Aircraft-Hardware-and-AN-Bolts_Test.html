<script>
const DATA  = [{"q": "In aircraft hardware coding, the letters \"AN\" stand for what standard?", "options": ["Air Force-Navy Standard", "Aircraft National", "Aerospace Numbered", "Army-Navy Aeronautical"], "correct": 0, "short": "Air Force-Navy (AN) Standard", "expl": "AN = Air Force-Navy. The handbook lists AN (Air Force-Navy) numbers as one of the primary ways threaded fasteners and rivets are identified.", "cite": "FAA-H-8083-30B p. 7-37 (Identification / Threaded Fasteners)", "topic": "Standards Organizations"}, {"q": "Which standards abbreviation means \"Air Force-Navy\" Standard?", "options": ["MS", "AN", "NAS", "SAE"], "correct": 1, "short": "AN", "expl": "AN = Air Force-Navy. NAS = National Aerospace/Aircraft Standard, MS = Military Standard, SAE = Society of Automotive Engineers.", "cite": "FAA-H-8083-30B p. 7-37 (Identification / Threaded Fasteners)", "topic": "Standards Organizations"}, {"q": "The abbreviation \"NAF\" on older aircraft hardware refers to the:", "options": ["National Aircraft Foundation", "Navy Airframe Fitting", "Naval Aircraft Factory", "North American Fastener"], "correct": 2, "short": "Naval Aircraft Factory", "expl": "NAF = Naval Aircraft Factory, an early military source of aircraft-parts standards on the AMT 211 standards list.", "cite": "[class notes] — AMT 211 Review Answer Key (AIM Block 2)", "topic": "Standards Organizations"}, {"q": "Which abbreviation stands for \"Naval Aircraft Factory\"?", "options": ["NAS", "AF", "AN", "NAF"], "correct": 3, "short": "NAF", "expl": "NAF = Naval Aircraft Factory. Do not confuse with NAS (National Aerospace Standard) or AF (Air Force Standard).", "cite": "[class notes] — AMT 211 Review Answer Key (AIM Block 2)", "topic": "Standards Organizations"}, {"q": "\"AF\" as a hardware standard designation means:", "options": ["Air Force Standard", "Aircraft Fastener", "Airframe Fitting", "Anodized Finish"], "correct": 0, "short": "Air Force Standard", "expl": "AF = Air Force Standard on the AMT 211 standards-organizations list.", "cite": "[class notes] — AMT 211 Review Answer Key (AIM Block 2)", "topic": "Standards Organizations"}, {"q": "Which abbreviation stands for \"Air Force Standard\"?", "options": ["AN", "AF", "NAF", "AC"], "correct": 1, "short": "AF", "expl": "AF = Air Force Standard. AN = Air Force-Navy; NAF = Naval Aircraft Factory.", "cite": "[class notes] — AMT 211 Review Answer Key (AIM Block 2)", "topic": "Standards Organizations"}, {"q": "The abbreviation \"NAS\" on aircraft hardware stands for:", "options": ["Naval Aircraft Standard", "National Aeronautical Society", "National Aerospace Standard", "Navy Air Standard"], "correct": 2, "short": "National Aerospace Standard", "expl": "NAS. The -30B spells it 'National Aircraft Standard'; the AIM worksheet uses 'National Aerospace Standard.' Both name the same NAS series of close-tolerance/internal-wrenching parts. AIM wording wins on the worksheet.", "cite": "FAA-H-8083-30B p. 7-37 (Identification / Threaded Fasteners)", "topic": "Standards Organizations"}, {"q": "Which abbreviation designates a \"National Aerospace Standard\" part?", "options": ["AN", "MS", "NAF", "NAS"], "correct": 3, "short": "NAS", "expl": "NAS. AIM uses 'National Aerospace Standard'; the FAA handbook says 'National Aircraft Standard' — same NAS series.", "cite": "FAA-H-8083-30B p. 7-37 (Identification / Threaded Fasteners)", "topic": "Standards Organizations"}, {"q": "The standards organization abbreviated \"SAE\" is the:", "options": ["Society of Automotive Engineers", "Standard Aerospace Engineering", "Society of Aviation Examiners", "Steel & Alloy Engineers"], "correct": 0, "short": "Society of Automotive Engineers", "expl": "SAE = Society of Automotive Engineers, the body behind many alloy and hardware specifications referenced in aircraft maintenance.", "cite": "[class notes] — AMT 211 Review Answer Key (AIM Block 2)", "topic": "Standards Organizations"}, {"q": "Which abbreviation stands for \"Society of Automotive Engineers\"?", "options": ["ASA", "SAE", "ASTM", "AS"], "correct": 1, "short": "SAE", "expl": "SAE = Society of Automotive Engineers.", "cite": "[class notes] — AMT 211 Review Answer Key (AIM Block 2)", "topic": "Standards Organizations"}, {"q": "\"ASA\" (American Standards Association) is the predecessor of which present-day body?", "options": ["ASTM", "ISO", "ANSI", "NIST"], "correct": 2, "short": "ANSI (American National Standards Institute)", "expl": "The American Standards Association (ASA) was renamed and is known today as ANSI.", "cite": "[class notes] — AMT 211 Review Answer Key (AIM Block 2)", "topic": "Standards Organizations"}, {"q": "On the AMT 211 standards list, \"ASA\" stands for what — and is now known as what?", "options": ["Aerospace Standards Authority / FAA", "Aviation Safety Agency / EASA", "Allied Steel Alliance / ASTM", "American Standards Association / ANSI"], "correct": 3, "short": "American Standards Association (now ANSI)", "expl": "ASA = American Standards Association, which became ANSI (American National Standards Institute).", "cite": "[class notes] — AMT 211 Review Answer Key (AIM Block 2)", "topic": "Standards Organizations"}, {"q": "\"MS\" in a part number such as MS20004 designates which standard?", "options": ["Military Standard", "Metric Standard", "Material Specification", "Manufacturing Standard"], "correct": 0, "short": "Military Standard", "expl": "MS = Military Standard. Threaded fasteners are identified by AN, NAS, or MS numbers per the Identification section.", "cite": "FAA-H-8083-30B p. 7-37 (Identification / Threaded Fasteners)", "topic": "Standards Organizations"}, {"q": "Which abbreviation stands for \"Military Standard\"?", "options": ["MIL", "MS", "AN", "NAS"], "correct": 1, "short": "MS", "expl": "MS = Military Standard (e.g., MS20363 self-locking nuts, MS20004 bolts).", "cite": "FAA-H-8083-30B p. 7-37 (Identification / Threaded Fasteners)", "topic": "Standards Organizations"}, {"q": "Threaded fasteners and rivets are identified by which three families of numbers?", "options": ["SAE, ASA, and AF", "ISO, DIN, and JIS", "AN, NAS, and MS", "NAF, AF, and AC"], "correct": 2, "short": "AN, NAS, and MS", "expl": "The handbook states threaded fasteners and rivets are identified by AN (Air Force-Navy), NAS (National Aircraft Standard), or MS (Military Standard) numbers.", "cite": "FAA-H-8083-30B p. 7-37 (Identification / Threaded Fasteners)", "topic": "Standards Organizations"}, {"q": "The general-purpose hex-head aircraft bolt falls in which AN number range?", "options": ["AN21 through AN36", "AN73 through AN81", "AN173 through AN186", "AN3 through AN20"], "correct": 3, "short": "AN3 through AN20", "expl": "The hex-head aircraft bolt (AN-3 through AN-20) is the all-purpose structural bolt for tension or shear where a light drive fit is permissible.", "cite": "FAA-H-8083-30B pp. 7-37 to 7-38 (Aircraft Bolts / General Purpose Bolts)", "topic": "AN Bolt Ranges"}, {"q": "Which AN bolt range is the clevis bolt (shear) series?", "options": ["AN21-AN36", "AN3-AN20", "AN73-AN81", "AN173-AN186"], "correct": 0, "short": "AN21 through AN36", "expl": "Clevis bolts (AN21-AN36) are designed for shear loads only and are often used as a mechanical pin in a control system.", "cite": "FAA-H-8083-30B p. 7-39 (Clevis Bolts — shear only)", "topic": "AN Bolt Ranges"}, {"q": "The drilled-head bolt (deeper head drilled to receive safety wire) is in which range?", "options": ["AN3-AN20", "AN73 through AN81", "AN21-AN36", "AN173-AN186"], "correct": 1, "short": "AN73 through AN81 (drilled-head series)", "expl": "The AN-73 through AN-81 drilled-head bolts are like the standard hex bolt but have a deeper head drilled for safety wire; AN-3 and AN-73 are interchangeable for strength.", "cite": "FAA-H-8083-30B p. 7-38 (General Purpose / Close Tolerance Bolts)", "topic": "AN Bolt Ranges"}, {"q": "Close-tolerance hex-head bolts, machined more accurately for tight drive-fit holes, are in which range?", "options": ["AN3-AN20", "AN21-AN36", "AN173 through AN186", "AN73-AN81"], "correct": 2, "short": "AN173 through AN186", "expl": "Close-tolerance bolts may be hex-headed (AN-173 through AN-186) or 100-degree countersunk (NAS-80 through NAS-86); they require a tight drive fit.", "cite": "FAA-H-8083-30B p. 7-38 (General Purpose / Close Tolerance Bolts)", "topic": "AN Bolt Ranges"}, {"q": "Bolts numbered AN3 to AN20 are which type?", "options": ["Clevis (shear) bolts", "Drilled-head bolts", "Close-tolerance bolts", "General-purpose hex-head bolts"], "correct": 3, "short": "General-purpose hex-head bolts", "expl": "AN3-AN20 = the general-purpose hex-head structural bolt, the most common bolt on the aircraft.", "cite": "FAA-H-8083-30B pp. 7-37 to 7-38 (Aircraft Bolts / General Purpose Bolts)", "topic": "AN Bolt Ranges"}, {"q": "Bolts numbered AN21 to AN36 are which type?", "options": ["Clevis bolts (shear applications)", "General-purpose hex-head bolts", "Close-tolerance bolts", "Internal-wrenching bolts"], "correct": 0, "short": "Clevis bolts (shear applications)", "expl": "AN21-AN36 = clevis bolts, used only in shear (as a pin in control systems), driven by a screwdriver slot rather than a wrench.", "cite": "FAA-H-8083-30B p. 7-39 (Clevis Bolts — shear only)", "topic": "AN Bolt Ranges"}, {"q": "Bolts numbered AN73 to AN81 are which type?", "options": ["Close-tolerance bolts", "Drilled-head (safety-wire) bolts", "Clevis bolts", "Eyebolts"], "correct": 1, "short": "Drilled-head (safety-wire) bolts", "expl": "AN73-AN81 = drilled-head bolts; the head is drilled to receive safety wire. Interchangeable with AN3 for tension/shear.", "cite": "FAA-H-8083-30B p. 7-38 (General Purpose / Close Tolerance Bolts)", "topic": "AN Bolt Ranges"}, {"q": "Bolts numbered AN173 to AN186 are which type?", "options": ["General-purpose bolts", "Clevis bolts", "Close-tolerance hex-head bolts", "Drilled-head bolts"], "correct": 2, "short": "Close-tolerance hex-head bolts", "expl": "AN173-AN186 = close-tolerance hex-head bolts, used in tight drive-fit holes that carry reversing/vibrating loads.", "cite": "FAA-H-8083-30B p. 7-38 (General Purpose / Close Tolerance Bolts)", "topic": "AN Bolt Ranges"}, {"q": "A close-tolerance bolt is properly seated into its hole only when struck with what tool?", "options": ["A 2-pound dead-blow mallet", "Finger pressure only", "A hydraulic press", "A 12- to 14-ounce hammer"], "correct": 3, "short": "A 12- to 14-ounce hammer", "expl": "The handbook defines the tight drive fit of a close-tolerance bolt: it moves into position only when struck with a 12- to 14-ounce hammer.", "cite": "FAA-H-8083-30B p. 7-38 (General Purpose / Close Tolerance Bolts)", "topic": "AN Bolt Ranges"}, {"q": "The AN-3 and AN-73 series bolts are essentially interchangeable in:", "options": ["Tension and shear strength", "Head diameter only", "Thread pitch only", "Material composition only"], "correct": 0, "short": "Tension and shear strength", "expl": "The AN-73 is the same as the AN-3 except for the drilled (deeper) head; the two series are interchangeable for tension and shear strengths.", "cite": "FAA-H-8083-30B p. 7-38 (General Purpose / Close Tolerance Bolts)", "topic": "AN Bolt Ranges"}, {"q": "Clevis bolts are designed to carry which kind of load?", "options": ["Tension only", "Shear only", "Both tension and torsion", "Compression only"], "correct": 1, "short": "Shear only", "expl": "Clevis bolts (AN21-AN36) are made for shear loads only and are not used in tension; they act as a mechanical pin.", "cite": "FAA-H-8083-30B p. 7-39 (Clevis Bolts — shear only)", "topic": "AN Bolt Ranges"}, {"q": "A single raised dash on a bolt head identifies the bolt as:", "options": ["2024 aluminum alloy", "A reworked bolt", "AN standard steel (corrosion-resistant/CRES)", "Close-tolerance NAS bolt"], "correct": 2, "short": "AN standard steel bolt (corrosion-resistant steel)", "expl": "Per Figure 7-19, a single raised dash = AN standard steel bolt. (The running text on p.7-39 has a known self-contradicting typo; the figure and the AIM worksheet agree on single-dash = steel/CRES.)", "cite": "FAA-H-8083-30B p. 7-40, Figure 7-19 (Aircraft bolt identification)", "topic": "Bolt-Head Markings"}, {"q": "Two raised dashes on a bolt head indicate the bolt is made of:", "options": ["Corrosion-resistant steel", "Cadmium-plated carbon steel", "Titanium", "2024 aluminum alloy"], "correct": 3, "short": "2024 aluminum-alloy bolt", "expl": "Figure 7-19 shows the aluminum-alloy (2024) bolt marked with two raised dashes. Single dash = steel; double dash = aluminum.", "cite": "FAA-H-8083-30B p. 7-40, Figure 7-19 (Aircraft bolt identification)", "topic": "Bolt-Head Markings"}, {"q": "A raised or recessed triangle on a bolt head identifies a:", "options": ["Close-tolerance NAS bolt", "Reworked bolt", "Drilled-head bolt", "Special low-strength bolt"], "correct": 0, "short": "Close-tolerance (NAS) bolt", "expl": "Close-tolerance NAS bolts are marked with either a raised or recessed triangle; the material marking is otherwise the same as AN bolts.", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Bolt-Head Markings"}, {"q": "A cross (plus-sign) marking on a bolt head indicates:", "options": ["A close-tolerance bolt", "A standard AN steel bolt", "An aluminum bolt", "A magnetically inspected bolt"], "correct": 1, "short": "Standard AN steel bolt", "expl": "AN standard steel bolts are marked with a raised dash, an asterisk, a cross, or a single raised dash (Figure 7-19). The cross identifies a standard AN steel bolt.", "cite": "FAA-H-8083-30B p. 7-40, Figure 7-19 (Aircraft bolt identification)", "topic": "Bolt-Head Markings"}, {"q": "An asterisk (*) on a bolt head is one of the markings used for:", "options": ["A close-tolerance bolt", "An aluminum-alloy bolt", "A standard AN steel bolt", "A magnetically inspected bolt"], "correct": 2, "short": "A standard AN steel bolt", "expl": "The handbook lists the AN standard steel bolt markings as a raised dash, an asterisk, or a single raised dash (Figure 7-19).", "cite": "FAA-H-8083-30B p. 7-40, Figure 7-19 (Aircraft bolt identification)", "topic": "Bolt-Head Markings"}, {"q": "A bolt head marked with the letter \"C\" indicates the bolt is:", "options": ["Cadmium-plated", "2024 aluminum", "Close-tolerance", "Corrosion-resistant (stainless) steel"], "correct": 3, "short": "Corrosion-resistant (stainless/CRES) steel", "expl": "A 'C' (whether on the head or in the part number) designates corrosion-resistant steel.", "cite": "FAA-H-8083-30B p. 7-40, Figure 7-19 (Aircraft bolt identification)", "topic": "Bolt-Head Markings"}, {"q": "An orange-dyed bolt head indicates the bolt has been:", "options": ["Magnetically (Magnaflux) inspected", "Cadmium plated", "Heat treated", "Reworked oversize"], "correct": 0, "short": "Magnetically (Magnaflux) inspected", "expl": "Figure 7-19 labels an orange-dyed bolt as magnetically inspected; bolts inspected magnetically (Magnaflux) or fluorescently (Zyglo) are identified by colored lacquer or a distinctive head marking. (Answer-key flags color conventions vary by source — defer to instructor if marked otherwise.)", "cite": "FAA-H-8083-30B p. 7-40, Figure 7-19 (Aircraft bolt identification)", "topic": "Bolt-Head Markings"}, {"q": "A letter \"S\" stamped on a bolt head usually identifies a:", "options": ["Stainless bolt", "Special-purpose bolt", "Shear bolt", "Standard bolt"], "correct": 1, "short": "Special-purpose bolt", "expl": "Where manufacturers make bolts of different dimensions or greater strength than standard, the letter 'S' stamped on the head usually identifies these special bolts.", "cite": "FAA-H-8083-30B pp. 7-37 to 7-38 (Aircraft Bolts / General Purpose Bolts)", "topic": "Bolt-Head Markings"}, {"q": "Which set of head markings ALL identify a standard AN steel bolt?", "options": ["Two raised dashes or a triangle", "A circle or a square", "Single raised dash, asterisk, or cross", "Orange dye or a letter A"], "correct": 2, "short": "Single raised dash, asterisk, or cross", "expl": "AN standard steel bolts are marked with a raised dash, an asterisk, a cross, or a single raised dash (Figure 7-19).", "cite": "FAA-H-8083-30B p. 7-40, Figure 7-19 (Aircraft bolt identification)", "topic": "Bolt-Head Markings"}, {"q": "How is a bolt head marked to show 2024 aluminum-alloy construction?", "options": ["Single raised dash", "A raised triangle", "An asterisk", "Two raised dashes"], "correct": 3, "short": "Two raised dashes", "expl": "Figure 7-19: the 2024 aluminum-alloy bolt carries two raised dashes; the single dash/asterisk/cross are steel.", "cite": "FAA-H-8083-30B p. 7-40, Figure 7-19 (Aircraft bolt identification)", "topic": "Bolt-Head Markings"}, {"q": "In the part number AN3DD5A, what does the \"AN\" indicate?", "options": ["Air Force-Navy standard bolt", "Aircraft National", "Anodized", "Aluminum nut"], "correct": 0, "short": "Air Force-Navy standard bolt", "expl": "The handbook's own AN3DD5A breakdown: 'AN' designates an Air Force-Navy standard bolt.", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "In the part number AN3DD5A, what does the \"3\" indicate?", "options": ["Length of 3/8 inch", "Diameter of 3/16 inch (3 sixteenths)", "Grip length of 3 inches", "Three threads per inch"], "correct": 1, "short": "Diameter = 3/16 inch (3 sixteenths)", "expl": "The number right after AN gives diameter in sixteenths of an inch: '3' = 3/16 inch.", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "In the part number AN3DD5A, what does the \"DD\" indicate?", "options": ["Drilled and deburred", "Cadmium plated", "2024 aluminum alloy", "Double dash steel"], "correct": 2, "short": "2024 aluminum alloy", "expl": "Per the handbook example, 'DD' = 2024 aluminum alloy. A 'C' in its place = corrosion-resistant steel; no letter = cadmium-plated steel.", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "In the part number AN3DD5A, what does the \"5\" indicate?", "options": ["Diameter of 5/16 inch", "5 threads per inch", "Grade-5 steel", "Length of 5/8 inch (5 eighths)"], "correct": 3, "short": "Length = 5/8 inch (5 eighths)", "expl": "The number before any trailing letter gives length in eighths of an inch: '5' = 5/8 inch.", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "In the part number AN3DD5A, what does the trailing \"A\" indicate?", "options": ["The shank is undrilled (no cotter-pin hole)", "Aluminum material", "Anodized finish", "An adjustable grip"], "correct": 0, "short": "The shank is undrilled (no cotter-pin hole)", "expl": "Per the handbook example, a trailing 'A' means the shank is undrilled. Absence of the 'A' means the shank IS drilled for a cotter pin.", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "Decode the full part number AN3DD5A. Which reading is entirely correct?", "options": ["AN std · 3/8 dia · steel · 5/16 long · drilled", "AN std · 3/16 dia · 2024 aluminum · 5/8 long · undrilled shank", "AN std · 3/16 dia · cadmium steel · 5 in long · drilled head", "AN std · 3 in dia · aluminum · 5/8 long · undrilled"], "correct": 1, "short": "AN std · 3/16 dia · 2024 aluminum · 5/8 long · undrilled shank", "expl": "AN3DD5A = Air Force-Navy std bolt, 3/16-inch diameter, DD = 2024 aluminum, 5/8-inch length, A = undrilled shank. (Handbook worked example, verbatim.)", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "In the part number AN3C5, the letter \"C\" tells you the bolt is:", "options": ["Cadmium-plated steel", "2024 aluminum alloy", "Corrosion-resistant (stainless) steel", "Close tolerance"], "correct": 2, "short": "Corrosion-resistant steel (CRES)", "expl": "A 'C' in place of the 'DD' indicates corrosion-resistant steel.", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "Decode AN3C5: which reading is correct?", "options": ["3/8 dia · cadmium steel · 5/16 length", "3/16 dia · 2024 aluminum · 5 in length", "3 in dia · stainless · 5/8 length", "3/16 dia · CRES steel · 5/8 length"], "correct": 3, "short": "3/16 dia · CRES steel · 5/8 length", "expl": "AN3C5 = 3/16-inch diameter, C = corrosion-resistant steel, 5/8-inch length (no trailing A, so shank is drilled).", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "In the part number AN4-7A, what does the \"4\" indicate?", "options": ["1/4-inch diameter (4 sixteenths)", "4/8-inch length", "4 threads per inch", "Grade 4"], "correct": 0, "short": "1/4-inch diameter (4 sixteenths)", "expl": "The first number after AN = diameter in sixteenths. AN4 = 4/16 = 1/4-inch diameter.", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "In the part number AN4-7A, what does the \"7\" indicate?", "options": ["7/16-inch diameter", "7/8-inch length (7 eighths)", "7 threads per inch", "Grip of 7 inches"], "correct": 1, "short": "7/8-inch length (7 eighths)", "expl": "After the material code (here a dash = cadmium-plated steel), the number = length in eighths. 7 = 7/8 inch.", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "Decode AN4-7A fully. Which is correct?", "options": ["1/4 dia · 2024 aluminum · 7/8 long · undrilled", "4/16 dia · CRES steel · 7 in long · drilled", "1/4 dia · cadmium-plated steel · 7/8 long · undrilled shank", "1/2 dia · aluminum · 7/8 long · drilled head"], "correct": 2, "short": "1/4 dia · cadmium-plated steel · 7/8 long · undrilled shank", "expl": "AN4-7A: 4 = 1/4-inch dia; the dash (no C/DD) = cadmium-plated carbon steel; 7 = 7/8-inch length; A = undrilled shank.", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "In the part number AN6-20, what does the \"6\" indicate?", "options": ["6/8-inch length", "6 threads per inch", "Grade 6", "3/8-inch diameter (6 sixteenths)"], "correct": 3, "short": "3/8-inch diameter (6 sixteenths)", "expl": "AN6 = 6/16 = 3/8-inch diameter.", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "In the part number AN6-20, the \"20\" tells you the length is:", "options": ["20/8 = 2-1/2 inches", "20/16 inch", "20 mm", "2.0 inches even"], "correct": 0, "short": "20/8 = 2-1/2 inches", "expl": "Length is in eighths of an inch: 20/8 = 2.5 inches. (And no trailing A means the shank is drilled for a cotter pin.)", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "In a bolt part number, absence of any material code letter (e.g., AN3-5) means the bolt is:", "options": ["2024 aluminum", "Cadmium-plated carbon steel", "Corrosion-resistant steel", "Titanium"], "correct": 1, "short": "Cadmium-plated (carbon) steel", "expl": "The handbook states the absence of the material letters indicates cadmium-plated steel.", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "If an \"H\" precedes the length number in a bolt part number (e.g., AN3H5A), the bolt has a:", "options": ["Hardened shank", "Hex recess", "Drilled head (for safety wire)", "Heavy washer face"], "correct": 2, "short": "Drilled head (for safetying)", "expl": "An 'H' before the length digit means the head is drilled for safetying; a trailing 'A' still means the shank is undrilled.", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "A bolt part number with a trailing \"A\" tells the technician the shank is:", "options": ["Aluminum", "Anodized", "Adjustable", "Undrilled (no cotter-pin hole)"], "correct": 3, "short": "Undrilled (no cotter-pin hole)", "expl": "Trailing 'A' = undrilled shank. NO trailing letter = the shank IS drilled for a cotter pin.", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "A bolt part number that ends with NO letter after the length number means the shank is:", "options": ["Drilled for a cotter pin", "Undrilled", "Aluminum", "Left-hand threaded"], "correct": 0, "short": "Drilled for a cotter pin", "expl": "The handbook contrasts the trailing A (undrilled) with its absence: no trailing A means the shank is drilled.", "cite": "FAA-H-8083-30B p. 7-39 (Identification & Coding; AN3DD5A example)", "topic": "Part-Number Decoding"}, {"q": "On the AMT 211 key, an \"A\" placed BETWEEN the diameter and length in a part number is taught to mean:", "options": ["Undrilled shank", "Aluminum alloy (single-letter AL code)", "Anodized", "Air Force standard"], "correct": 1, "short": "Aluminum alloy (alternate single-letter code)", "expl": "[verify with instructor] The AMT 211 key teaches a mid-number 'A' = aluminum. The FAA -30B does NOT define this; -30B only defines a TRAILING A = undrilled and DD/C as material codes. The key itself flags this (⚠). Use the AIM answer on the worksheet, but know the FAA handbook differs.", "cite": "[class notes] — AMT 211 Review Answer Key (AIM Block 2)", "topic": "Part-Number Decoding"}, {"q": "Which nut is castellated (slotted) to be safetied with a cotter pin or lock wire?", "options": ["Plain hex nut AN315", "Wing nut AN350", "Castle nut AN310", "Check nut AN316"], "correct": 2, "short": "Castle nut, AN310", "expl": "The castle nut AN310 is used with drilled-shank AN hex bolts, clevis bolts, eyebolts, drilled-head bolts, or studs; its castellations accommodate a cotter pin or lock wire and it withstands large tensional loads.", "cite": "FAA-H-8083-30B p. 7-42 (Non-Self-Locking Nuts: AN310/315/316/320/335/340/345/350)", "topic": "Nuts"}, {"q": "A plain hex nut that requires a separate locking device (jam/check nut or lock washer) is the:", "options": ["AN310 castle nut", "AN320 shear nut", "AN350 wing nut", "AN315 plain hex nut"], "correct": 3, "short": "Plain hex nut, AN315", "expl": "The plain hex nut AN315 (and AN335 coarse thread) carries large tension loads but requires an auxiliary locking device such as a check nut or lock washer.", "cite": "FAA-H-8083-30B p. 7-42 (Non-Self-Locking Nuts: AN310/315/316/320/335/340/345/350)", "topic": "Nuts"}, {"q": "The castellated SHEAR nut (thinner, shallower castellations than the castle nut) is the:", "options": ["AN320", "AN310", "AN315", "AN350"], "correct": 0, "short": "AN320 castellated shear nut", "expl": "The castellated shear nut AN320 is used with drilled clevis bolts and threaded taper pins where shear stress only is expected; it is not as deep or as strong as the AN310 castle nut.", "cite": "FAA-H-8083-30B p. 7-42 (Non-Self-Locking Nuts: AN310/315/316/320/335/340/345/350)", "topic": "Nuts"}, {"q": "The plain CHECK nut, used as a locking device for plain nuts, set screws, and threaded rod ends, is the:", "options": ["AN310", "AN316", "AN320", "AN350"], "correct": 1, "short": "AN316 plain check nut", "expl": "The plain check nut AN316 is employed as a locking device for plain nuts, set screws, threaded rod ends, and other devices.", "cite": "FAA-H-8083-30B p. 7-42 (Non-Self-Locking Nuts: AN310/315/316/320/335/340/345/350)", "topic": "Nuts"}, {"q": "The light hex nut for miscellaneous light-tension requirements (fine AN340 / coarse AN345) must be:", "options": ["Used with no locking device", "Used only in shear", "Locked by an auxiliary device", "Welded in place"], "correct": 2, "short": "Locked by an auxiliary device", "expl": "The light hex nut AN340 (fine) and AN345 (coarse) is much lighter than the plain hex nut and must be locked by an auxiliary device; used for light tension.", "cite": "FAA-H-8083-30B p. 7-42 (Non-Self-Locking Nuts: AN310/315/316/320/335/340/345/350)", "topic": "Nuts"}, {"q": "The wing nut, intended for hand tightening where the assembly is frequently removed, is the:", "options": ["AN310", "AN320", "AN340", "AN350"], "correct": 3, "short": "AN350 wing nut", "expl": "The wing nut AN350 is used where the desired tightness can be obtained by hand and where the assembly is frequently removed.", "cite": "FAA-H-8083-30B p. 7-42 (Non-Self-Locking Nuts: AN310/315/316/320/335/340/345/350)", "topic": "Nuts"}, {"q": "How is a low-temperature, fiber-insert self-locking nut typically identified?", "options": ["Its blue color / blue fiber collar", "A red dot", "A knurled flange", "A green stripe"], "correct": 0, "short": "By its blue color (fiber-insert collar)", "expl": "Self-locking nuts can be identified by the color of the insert; the low-temperature fiber-insert (elastic stop) nut is blue and is limited to about 250 F.", "cite": "FAA-H-8083-30B pp. 7-44 to 7-45 (Self-Locking / Elastic Stop Nut; nut bases)", "topic": "Nuts"}, {"q": "Elastic stop (fiber-insert) self-locking nuts must NOT be installed where temperatures exceed:", "options": ["200 F", "250 F", "150 F", "450 F"], "correct": 1, "short": "250 F", "expl": "Do not install elastic stop nuts where the temperature is higher than 250 F, because the self-locking action is reduced beyond that point.", "cite": "FAA-H-8083-30B p. 7-45 (Elastic stop nut 250 F limit; nut part numbers; sheet spring nuts)", "topic": "Nuts"}, {"q": "Above 250 F you should NOT use which nut?", "options": ["All-metal locknut", "Castle nut AN310", "Fiber-insert (elastic stop) self-locking nut", "Plain hex nut AN315"], "correct": 2, "short": "Fiber-insert (elastic stop) self-locking nut", "expl": "The fiber-collar elastic stop nut loses self-locking effectiveness above 250 F. For high heat, an all-metal locknut is used instead.", "cite": "FAA-H-8083-30B p. 7-45 (Elastic stop nut 250 F limit; nut part numbers; sheet spring nuts)", "topic": "Nuts"}, {"q": "What provides the self-locking action in an elastic stop (fiber-insert) nut?", "options": ["A nylon set screw", "A spring washer behind the nut", "A left-hand thread", "The bolt threads impressing themselves into the untapped fiber"], "correct": 3, "short": "Bolt threads impress into the untapped fiber", "expl": "The self-locking action of the elastic stop nut results from the bolt threads impressing themselves into the untapped fiber. Do NOT tap the fiber insert.", "cite": "FAA-H-8083-30B p. 7-44 (Self-Locking Nuts; fiber/all-metal types)", "topic": "Nuts"}, {"q": "A self-locking nut that holds in high-temperature areas (where fiber nuts cannot be used) is the:", "options": ["All-metal locknut", "Wing nut", "Plain check nut", "Speed nut"], "correct": 0, "short": "All-metal locknut", "expl": "All-metal self-locking nuts (e.g., Boots, Flexloc, stainless types) carry their locking feature in the metal itself, so they work above the 250 F fiber limit.", "cite": "FAA-H-8083-30B p. 7-44 (Self-Locking Nuts; fiber/all-metal types)", "topic": "Nuts"}, {"q": "Patented self-locking nuts (Boots, Flexloc, fiber locknut, elastic stop nut) carry which MS part-number range?", "options": ["MS20426 through MS20470", "MS20363 through MS20367", "MS21042 only", "MS35206 through MS35207"], "correct": 1, "short": "MS20363 through MS20367", "expl": "The patented self-locking types are assigned part numbers ranging from MS20363 through MS20367; the Boots, Flexloc, fiber locknut, elastic stop nut, and self-locking nut belong to this group.", "cite": "FAA-H-8083-30B p. 7-45 (Elastic stop nut 250 F limit; nut part numbers; sheet spring nuts)", "topic": "Nuts"}, {"q": "Self-locking nuts must NOT be used at joints that subject the nut or bolt to:", "options": ["Tension", "Vibration", "Rotation", "Compression"], "correct": 2, "short": "Rotation", "expl": "Do not use self-locking nuts at joints that subject either the nut or bolt to rotation; they are for tight connections that must not shake loose under vibration.", "cite": "FAA-H-8083-30B p. 7-44 (Self-Locking Nuts; fiber/all-metal types)", "topic": "Nuts"}, {"q": "A self-locking nut stamped out of spring sheet metal for non-structural use (access panels) is a:", "options": ["Castle nut", "Boots nut", "Plate nut", "Sheet-spring nut (speed nut / Tinnerman)"], "correct": 3, "short": "Sheet-spring nut (speed nut / Tinnerman)", "expl": "Sheet-spring nuts, such as speed nuts, are made of arched spring steel and used with standard and self-tapping screws in non-structural locations.", "cite": "FAA-H-8083-30B p. 7-45 (Elastic stop nut 250 F limit; nut part numbers; sheet spring nuts)", "topic": "Nuts"}, {"q": "What gives a speed (sheet-spring) nut its locking action?", "options": ["An arched spring lock that prevents the screw from backing out", "A fiber collar", "A cotter pin", "A left-hand thread"], "correct": 0, "short": "Arched spring lock", "expl": "Speed nuts are made from spring steel and arched prior to tightening; this arched spring lock prevents the screw from working loose.", "cite": "FAA-H-8083-30B p. 7-45 (Elastic stop nut 250 F limit; nut part numbers; sheet spring nuts)", "topic": "Nuts"}, {"q": "A nut riveted or welded permanently to the structure so a bolt can be installed from one side is a/an:", "options": ["Wing nut", "Anchor nut / nut plate", "Jam nut", "Check nut"], "correct": 1, "short": "Anchor nut / nut plate", "expl": "Self-locking nut bases (anchor nuts / nut plates) are riveted or welded to aircraft structure, allowing bolts and screws to be installed from one side — common around inspection holes.", "cite": "FAA-H-8083-30B pp. 7-44 to 7-45 (Self-Locking / Elastic Stop Nut; nut bases)", "topic": "Nuts"}, {"q": "A removable channel-mounted self-locking nut base carries what kind of nut?", "options": ["A welded fixed nut", "A wing nut", "A floating nut that snaps in/out for easy replacement", "A castle nut"], "correct": 2, "short": "A floating nut (snaps in/out)", "expl": "The removable channel type carries a floating nut that can be snapped in or out of the channel, making it easy to replace damaged nuts.", "cite": "FAA-H-8083-30B pp. 7-44 to 7-45 (Self-Locking / Elastic Stop Nut; nut bases)", "topic": "Nuts"}, {"q": "Clinch-type and spline-type self-locking nuts that depend on friction for anchorage are:", "options": ["Approved for primary structure", "Used only on engines", "The strongest nuts available", "NOT acceptable for use in aircraft structures"], "correct": 3, "short": "NOT acceptable in aircraft structures", "expl": "Nuts such as the clinch-type and spline-type depend on friction for their anchorage and are not acceptable for use in aircraft structures.", "cite": "FAA-H-8083-30B pp. 7-44 to 7-45 (Self-Locking / Elastic Stop Nut; nut bases)", "topic": "Nuts"}, {"q": "High-strength internal- and external-wrenching nuts (elastic stop / Unbrako types) are:", "options": ["Self-locking, heat-treated, high-tension nuts", "Plain non-locking nuts", "Sheet-metal speed nuts", "For shear only"], "correct": 0, "short": "Self-locking, heat-treated, high-tension nuts", "expl": "The internal/external wrenching elastic stop nut and the Unbrako wrenching nut are both self-locking, heat-treated, and carry high-strength bolt tension loads.", "cite": "FAA-H-8083-30B p. 7-44 (Self-Locking Nuts; fiber/all-metal types)", "topic": "Nuts"}, {"q": "In the nut code AN310D5R, what does the \"D\" indicate?", "options": ["Drilled", "2017-T aluminum alloy", "2024-T aluminum alloy", "Double thread"], "correct": 1, "short": "2017-T aluminum alloy", "expl": "For nut coding the handbook states: B = brass, D = 2017-T aluminum, DD = 2024-T aluminum, C = stainless steel, dash = cadmium-plated carbon steel. So 'D' = 2017-T aluminum.", "cite": "FAA-H-8083-30B p. 7-46 (Nut coding; Aircraft Washers / AN960 / AN970)", "topic": "Part-Number Decoding"}, {"q": "In the nut code AN310D5R, what does the trailing \"R\" indicate?", "options": ["Reworked", "Riveted base", "Right-hand thread", "Reduced grip"], "correct": 2, "short": "Right-hand thread", "expl": "In AN310D5R, R = right-hand thread (usually 24 threads per inch).", "cite": "FAA-H-8083-30B p. 7-46 (Nut coding; Aircraft Washers / AN960 / AN970)", "topic": "Part-Number Decoding"}, {"q": "In the nut code AN310D5R, what does the \"5\" indicate?", "options": ["Grade-5 alloy", "5/8-inch length", "5 threads per inch", "5/16-inch diameter"], "correct": 3, "short": "5/16-inch diameter", "expl": "In the AN310D5R example, 5 = 5/16-inch diameter (the dash number corresponds to the bolt diameter it fits — a 5 fits an AN5 bolt).", "cite": "FAA-H-8083-30B p. 7-46 (Nut coding; Aircraft Washers / AN960 / AN970)", "topic": "Part-Number Decoding"}, {"q": "In nut coding, the letter \"B\" following the part number means the nut material is:", "options": ["Brass", "Bronze", "2024 aluminum", "Carbon steel"], "correct": 0, "short": "Brass", "expl": "The letter 'B' following the part number indicates the nut material is brass.", "cite": "FAA-H-8083-30B p. 7-46 (Nut coding; Aircraft Washers / AN960 / AN970)", "topic": "Part-Number Decoding"}, {"q": "In nut coding, a \"DD\" indicates the nut material is:", "options": ["2017-T aluminum", "2024-T aluminum alloy", "Stainless steel", "Cadmium-plated steel"], "correct": 1, "short": "2024-T aluminum alloy", "expl": "For nuts: B = brass, D = 2017-T aluminum, DD = 2024-T aluminum, C = stainless steel, dash = cadmium-plated carbon steel.", "cite": "FAA-H-8083-30B p. 7-46 (Nut coding; Aircraft Washers / AN960 / AN970)", "topic": "Part-Number Decoding"}, {"q": "For self-locking nuts whose code ends in three or four digits, the LAST two digits indicate:", "options": ["Nut diameter in 16ths", "Material code", "Threads per inch", "Length in eighths"], "correct": 2, "short": "Threads per inch", "expl": "Self-locking nut code numbers end in three or four digits: the last two digits = threads per inch, and the preceding one or two digits = nut size in 16ths of an inch.", "cite": "FAA-H-8083-30B p. 7-46 (Nut coding; Aircraft Washers / AN960 / AN970)", "topic": "Part-Number Decoding"}, {"q": "A screw threaded along its length with no clearly defined grip, used for general repair, is a:", "options": ["Structural screw", "Self-tapping screw", "Drive screw", "Machine screw"], "correct": 3, "short": "Machine screw", "expl": "Machine screws (roundhead AN515 coarse / AN520 fine; fillister AN500-AN503; countersunk AN505/507/510) are general-purpose screws with no clearly defined grip length.", "cite": "FAA-H-8083-30B p. 7-67 (Structural / Machine / Self-Tapping / Drive Screws)", "topic": "Screws"}, {"q": "The roundhead machine screws AN515 (coarse) and AN520 (fine) differ from each other in:", "options": ["Thread pitch (coarse vs fine)", "Head shape", "Material only", "Length only"], "correct": 0, "short": "Thread pitch (coarse vs fine)", "expl": "The AN515 roundhead screw has coarse threads and the AN520 has fine threads; both are slotted or recessed head.", "cite": "FAA-H-8083-30B p. 7-67 (Structural / Machine / Self-Tapping / Drive Screws)", "topic": "Screws"}, {"q": "The 100-degree countersunk machine screw is designated:", "options": ["AN505", "AN507", "AN515", "AN520"], "correct": 1, "short": "AN507 (100-degree countersunk)", "expl": "Countersunk machine screws are AN505 and AN510 for 82 degrees and AN507 for 100 degrees.", "cite": "FAA-H-8083-30B p. 7-67 (Structural / Machine / Self-Tapping / Drive Screws)", "topic": "Screws"}, {"q": "The fillister-head general-purpose screw used as a cap screw in light mechanisms is the:", "options": ["AN515 through AN520", "AN509", "AN500 through AN503", "AN525"], "correct": 2, "short": "AN500 through AN503 (fillister head)", "expl": "The fillister-head screw AN500-AN503 is a general-purpose cap screw for light mechanisms such as gearbox cover plates; screws larger than No. 6 are drilled in the head for safetying.", "cite": "FAA-H-8083-30B p. 7-67 (Structural / Machine / Self-Tapping / Drive Screws)", "topic": "Screws"}, {"q": "A screw with coarse threads and a sharp point, designed to cut its own threads, is a:", "options": ["Machine screw", "Structural screw", "Cap screw", "Self-tapping screw"], "correct": 3, "short": "Self-tapping screw", "expl": "Self-tapping screws (machine AN504/AN506; sheet-metal AN530/AN531 Parker-Kalon Z-type) cut their own mating threads.", "cite": "FAA-H-8083-30B p. 7-67 (Structural / Machine / Self-Tapping / Drive Screws)", "topic": "Screws"}, {"q": "The AN530 and AN531 self-tapping SHEET-METAL screws are also known by what trade name?", "options": ["Parker-Kalon Z-type", "Tinnerman", "Dzus", "Cleco"], "correct": 0, "short": "Parker-Kalon Z-type", "expl": "AN530 and AN531 self-tapping sheet-metal screws, such as the Parker-Kalon Z-type, are blunt on the end and used for temporary attachment of metal for riveting and permanent nonstructural assembly.", "cite": "FAA-H-8083-30B p. 7-67 (Structural / Machine / Self-Tapping / Drive Screws)", "topic": "Screws"}, {"q": "Self-tapping screws should NOT be used to replace:", "options": ["Nameplates", "Standard screws, nuts, bolts, or rivets", "Access panels", "Speed nuts"], "correct": 1, "short": "Standard screws, nuts, bolts, or rivets", "expl": "The handbook explicitly states self-tapping screws should not be used to replace standard screws, nuts, bolts, or rivets.", "cite": "FAA-H-8083-30B p. 7-67 (Structural / Machine / Self-Tapping / Drive Screws)", "topic": "Screws"}, {"q": "Drive screws (AN535), which correspond to the Parker-Kalon U-type, are actually:", "options": ["Machine screws", "Bolts", "Nails driven with a mallet", "Rivets"], "correct": 2, "short": "Nails (driven with a mallet)", "expl": "Drive screws AN535 are not actually screws but nails; they are driven into metal with a mallet, used for nameplates and sealing drain holes, and are not meant to be removed.", "cite": "FAA-H-8083-30B p. 7-67 (Structural / Machine / Self-Tapping / Drive Screws)", "topic": "Screws"}, {"q": "A screw that has a defined grip and the same shear strength as a comparable bolt is a:", "options": ["Machine screw", "Self-tapping screw", "Drive screw", "Structural screw (AN509/AN525)"], "correct": 3, "short": "Structural screw (AN509 / AN525)", "expl": "Structural screws (AN509, AN525, and the NAS204-NAS235 series) have a definite grip and the same shear strength as a bolt of the same size; threads are National Fine.", "cite": "FAA-H-8083-30B p. 7-67 (Structural / Machine / Self-Tapping / Drive Screws)", "topic": "Screws"}, {"q": "The AN509 structural screw is specifically a:", "options": ["100-degree flathead (countersunk) screw", "Roundhead machine screw", "Washer-head screw", "Self-tapping sheet-metal screw"], "correct": 0, "short": "100-degree flathead (countersunk) structural screw", "expl": "The AN509 (100-degree) flathead screw is used in countersunk holes where a flush surface is necessary.", "cite": "FAA-H-8083-30B p. 7-67 (Structural / Machine / Self-Tapping / Drive Screws)", "topic": "Screws"}, {"q": "The AN525 structural screw is a:", "options": ["Fillister-head screw", "Washer-head screw (large contact area)", "Drive screw", "Self-tapping screw"], "correct": 1, "short": "Washer-head structural screw", "expl": "The AN525 washer-head structural screw is used where raised heads are not objectionable; the washer head provides a large contact area.", "cite": "FAA-H-8083-30B p. 7-67 (Structural / Machine / Self-Tapping / Drive Screws)", "topic": "Screws"}, {"q": "Commonly used screws are classified into how many groups?", "options": ["Two", "Three", "Four (structural, machine, self-tapping, drive)", "Five"], "correct": 2, "short": "Four", "expl": "Screws are classified in four groups: (1) structural, (2) machine, (3) self-tapping, and (4) drive screws.", "cite": "FAA-H-8083-30B p. 7-66 (Airloc fasteners; Screws — four groups)", "topic": "Screws"}, {"q": "Aircraft screws differ from bolts mainly because screws are:", "options": ["Always larger", "Always drilled for cotter pins", "Never used in aircraft", "Generally lower-strength material with a loose-fitting thread"], "correct": 3, "short": "Lower-strength material, loose-fitting thread", "expl": "Screws are generally made of lower-strength materials than bolts, can be installed with a loose-fitting thread, and have heads shaped to engage a screwdriver or wrench.", "cite": "FAA-H-8083-30B p. 7-66 (Airloc fasteners; Screws — four groups)", "topic": "Screws"}, {"q": "Recessed-head structural screws are driven with which drivers?", "options": ["Phillips or Reed & Prince", "Flat-blade only", "Allen (hex) only", "Torx only"], "correct": 0, "short": "Phillips or Reed & Prince", "expl": "Either a Phillips or a Reed & Prince screwdriver drives the recessed-head structural screws.", "cite": "FAA-H-8083-30B p. 7-67 (Structural / Machine / Self-Tapping / Drive Screws)", "topic": "Screws"}, {"q": "Which washer provides a smooth bearing surface and acts as a shim to obtain correct grip length?", "options": ["AN935 lock washer", "AN960 plain (flat) washer", "AN936 toothed washer", "AN970 wood washer"], "correct": 1, "short": "AN960 plain (flat) washer", "expl": "Plain washers AN960 (and AN970) provide a smooth bearing surface, act as shims for grip length, and position castellated nuts relative to drilled cotter-pin holes.", "cite": "FAA-H-8083-30B p. 7-46 (Nut coding; Aircraft Washers / AN960 / AN970)", "topic": "Washers"}, {"q": "The plain washer with a GREATER bearing area, used on wooden structures to prevent crushing, is the:", "options": ["AN960", "AN935", "AN970", "AN936"], "correct": 2, "short": "AN970", "expl": "The AN970 steel washer provides a greater bearing area than the AN960 and is used on wooden structures under both the head and nut to prevent crushing the surface.", "cite": "FAA-H-8083-30B p. 7-46 (Nut coding; Aircraft Washers / AN960 / AN970)", "topic": "Washers"}, {"q": "Which washer's spring action provides friction to keep a nut from loosening under vibration?", "options": ["AN960 plain washer", "AN970 wood washer", "AN975 taper-pin washer", "AN935 split lock washer"], "correct": 3, "short": "AN935 split lock washer", "expl": "The AN935 split lock washer is used with machine screws or bolts where a self-locking/castellated nut is not appropriate; its spring action prevents loosening from vibration.", "cite": "FAA-H-8083-30B pp. 7-46 to 7-47 (Plain & Lock Washers AN960/AN970/AN935/AN936)", "topic": "Washers"}, {"q": "The toothed (star) lock washer is designated:", "options": ["AN936", "AN960", "AN970", "AN935"], "correct": 0, "short": "AN936", "expl": "Lock washers AN935 (split) and AN936 (toothed) are used where a self-locking or castellated nut is not appropriate.", "cite": "FAA-H-8083-30B pp. 7-46 to 7-47 (Plain & Lock Washers AN960/AN970/AN935/AN936)", "topic": "Washers"}, {"q": "A plain washer should be placed under a lock washer in order to:", "options": ["Increase clamp load", "Prevent damage (galling) to the surface material", "Reduce bolt grip", "Improve electrical bonding"], "correct": 1, "short": "Prevent damage to the surface material", "expl": "The handbook directs using plain washers under lock washers to prevent damage to the surface material.", "cite": "FAA-H-8083-30B p. 7-46 (Nut coding; Aircraft Washers / AN960 / AN970)", "topic": "Washers"}, {"q": "Lock washers should NEVER be used in which situation (per the handbook list)?", "options": ["Under a static plain nut", "On any aluminum part", "Where they may be subjected to frequent removal, on soft materials, or with screws to primary structure", "With AN960 washers"], "correct": 2, "short": "Frequent removal / soft material / primary structure (per restriction list)", "expl": "The handbook lists conditions where lock washers should never be used (e.g., where subject to frequent removal, on soft materials, in primary or secondary structure where failure could be hazardous). Follow the manufacturer for the specific joint.", "cite": "FAA-H-8083-30B pp. 7-46 to 7-47 (Plain & Lock Washers AN960/AN970/AN935/AN936)", "topic": "Washers"}, {"q": "An aluminum or aluminum-alloy washer is used under a bolt head or nut on aluminum/magnesium structure to:", "options": ["Add weight", "Increase torque", "Act as a lock washer", "Reduce corrosion from dissimilar metals"], "correct": 3, "short": "Reduce corrosion from dissimilar metals", "expl": "Aluminum/aluminum-alloy washers are used under bolt heads or nuts on aluminum-alloy or magnesium structures where dissimilar-metal corrosion is a factor; current then flows between the washer and the steel bolt.", "cite": "FAA-H-8083-30B p. 7-46 (Nut coding; Aircraft Washers / AN960 / AN970)", "topic": "Washers"}, {"q": "A countersunk washer is used to:", "options": ["Provide a seat for the head of a countersunk (flush) fastener", "Lock a nut", "Replace a plain washer on wood", "Increase grip length only"], "correct": 0, "short": "Seat a countersunk (flush) fastener head", "expl": "A countersunk washer provides a bearing seat for the head of a flush/countersunk fastener (e.g., flush bolts/screws). [verify exact AN number with instructor — AIM slide series.]", "cite": "[class notes] — AMT 211 Review Answer Key (AIM Block 2)", "topic": "Washers"}, {"q": "To repair a worn or oversized HOLE, the technician installs a:", "options": ["Helicoil", "Bushing (replacement / sleeve bushing)", "Rivnut", "Speed nut"], "correct": 1, "short": "Replacement bushing", "expl": "Worn or oversized holes are repaired with replacement (sleeve) bushings — often shrink-fit and made of wear-resistant material, such as spark-plug bushings in cylinder heads; oversize up to 0.040 in 0.005 increments.", "cite": "FAA-H-8083-30B p. 7-48 (Replacement Bushings)", "topic": "Repair Inserts"}, {"q": "To repair worn-out internal THREADS in a casting, the technician installs a:", "options": ["Bushing", "Nut plate", "Helicoil (wire thread insert)", "Cotter pin"], "correct": 2, "short": "Helicoil (wire thread insert)", "expl": "Helicoils are precision-formed coils of 18-8 stainless wire (diamond cross-section) used as screw-thread bushings to restore damaged threads in castings/light metals.", "cite": "FAA-H-8083-30B p. 7-49 (Helicoils)", "topic": "Repair Inserts"}, {"q": "A Helicoil insert is made of what material with what cross-section?", "options": ["Brass wire, round section", "Cadmium steel, square section", "Aluminum wire, triangular section", "18-8 stainless steel wire, diamond-shaped section"], "correct": 3, "short": "18-8 stainless steel, diamond cross-section", "expl": "Helicoils are precision-formed screw-thread coils of 18-8 stainless steel wire having a diamond-shaped cross section; they form UNC or UNF class 2B and 3B threads.", "cite": "FAA-H-8083-30B p. 7-49 (Helicoils)", "topic": "Repair Inserts"}, {"q": "A Helicoil insert has a small feature that must be removed after installation. It is the:", "options": ["Driving tang (with a notch)", "Locking key", "Cotter pin", "Thimble"], "correct": 0, "short": "Driving tang", "expl": "Each Helicoil insert has a driving tang with a notch to facilitate removal of the tang after the insert is screwed into the tapped hole.", "cite": "FAA-H-8083-30B p. 7-49 (Helicoils)", "topic": "Repair Inserts"}, {"q": "A shrink-fit replacement bushing is installed by:", "options": ["Heating the bushing and freezing the hole", "Heating the cylinder/housing and freezing the bushing", "Pressing at room temperature only", "Welding it in place"], "correct": 1, "short": "Heating the housing, freezing the bushing", "expl": "Original installation and overhaul replacements are shrunk fit: a heated cylinder head and a frozen bushing, so it tightens as temperatures equalize.", "cite": "FAA-H-8083-30B p. 7-48 (Replacement Bushings)", "topic": "Repair Inserts"}, {"q": "Name the three common turnlock (quarter-turn captive) fasteners.", "options": ["Hi-Lok, Hi-Tigue, Hi-Lite", "Cherry, Olympic, Huck", "Dzus, Camloc, Airloc", "Rivnut, Jo-bolt, Lockbolt"], "correct": 2, "short": "Dzus, Camloc, and Airloc", "expl": "The most commonly used captive/turn-lock fasteners are the Dzus, Camloc, and Airloc; a quarter turn of the stud locks them. They allow quick removal of access panels.", "cite": "FAA-H-8083-30B p. 7-64 (Captive / Turn Lock Fasteners; Dzus)", "topic": "Turnlock Fasteners"}, {"q": "A Dzus turnlock fastener consists of which three parts?", "options": ["Bolt, nut, and washer", "Stud, cross pin, and receptacle", "Stud, spring, and rivet", "Stud, grommet, and receptacle"], "correct": 3, "short": "Stud, grommet, and receptacle", "expl": "The Dzus turnlock fastener consists of a stud, a grommet, and a receptacle; the grommet (aluminum) holds the stud and a spring secures it.", "cite": "FAA-H-8083-30B p. 7-64 (Captive / Turn Lock Fasteners; Dzus)", "topic": "Turnlock Fasteners"}, {"q": "How is a Dzus (and any turnlock) fastener locked?", "options": ["A quarter turn of the stud clockwise", "A full turn counterclockwise", "Pushing straight in", "Two full turns clockwise"], "correct": 0, "short": "A quarter turn clockwise", "expl": "A quarter of a turn of the stud (clockwise) locks the fastener; it is unlocked only by turning the stud counterclockwise. A Dzus key or ground screwdriver is used.", "cite": "FAA-H-8083-30B p. 7-65 (Dzus / Camloc fasteners)", "topic": "Turnlock Fasteners"}, {"q": "A Camloc fastener consists of which three parts?", "options": ["Stud, cross pin, and receptacle", "Stud assembly, grommet, and receptacle", "Bolt, collar, and pin", "Stud, spring, and key"], "correct": 1, "short": "Stud assembly, grommet, and receptacle", "expl": "The Camloc fastener consists of a stud assembly, a grommet, and a receptacle; receptacles come in rigid and floating types. Used to secure cowlings and fairings.", "cite": "FAA-H-8083-30B p. 7-65 (Dzus / Camloc fasteners)", "topic": "Turnlock Fasteners"}, {"q": "An Airloc fastener consists of which three parts?", "options": ["Stud, grommet, and receptacle", "Bolt, nut, and washer", "Stud, a cross pin, and a stud receptacle", "Stud, spring, and rivet"], "correct": 2, "short": "Stud, cross pin, and stud receptacle", "expl": "The Airloc fastener consists of a stud, a cross pin, and a stud receptacle; the stud is case-hardened steel and the stud hole is reamed for a press fit of the cross pin.", "cite": "FAA-H-8083-30B p. 7-66 (Airloc fasteners; Screws — four groups)", "topic": "Turnlock Fasteners"}, {"q": "The Airloc cross pin (chrome-vanadium steel) should:", "options": ["Be reused indefinitely", "Be lubricated and reused", "Be safety-wired", "Never be used a second time — replace it once removed"], "correct": 3, "short": "Never be reused — replace once removed", "expl": "The Airloc cross pin is chrome-vanadium steel, heat-treated; it should never be used the second time — once removed from the stud, replace it with a new pin.", "cite": "FAA-H-8083-30B p. 7-66 (Airloc fasteners; Screws — four groups)", "topic": "Turnlock Fasteners"}, {"q": "On an Airloc stud, the total material thickness it locks is stamped on the head in:", "options": ["Thousandths of an inch (e.g., 0.040, 0.070)", "Sixteenths of an inch", "Millimeters", "Eighths of an inch"], "correct": 0, "short": "Thousandths of an inch", "expl": "The total thickness of material each Airloc stud satisfactorily locks is stamped on the stud head in thousandths of an inch (0.040, 0.070, 0.190, etc.).", "cite": "FAA-H-8083-30B p. 7-66 (Airloc fasteners; Screws — four groups)", "topic": "Turnlock Fasteners"}, {"q": "Turnlock (quick-action) fasteners are most valued because they:", "options": ["Are permanent", "Permit quick and easy removal of access panels for inspection/servicing", "Carry the highest tension loads", "Replace rivets in primary structure"], "correct": 1, "short": "Allow quick removal of access panels", "expl": "The most desirable feature of turnlock fasteners is that they permit quick and easy removal of access panels for inspection and servicing; also called quick-opening or stressed-panel fasteners.", "cite": "FAA-H-8083-30B p. 7-64 (Captive / Turn Lock Fasteners; Dzus)", "topic": "Turnlock Fasteners"}, {"q": "A swaged copper sleeve squeezed onto a control cable around a thimble is known by what trade-name process?", "options": ["Dzus swage", "Camloc crimp", "Nicopress (copper-sleeve) process", "Helicoil splice"], "correct": 2, "short": "Nicopress process (copper sleeve)", "expl": "The Nicopress process is a patented method using copper sleeves swaged onto cable, usable up to the full rated strength of the cable when looped around a thimble.", "cite": "AC 43.13-1B (2025 AIM ed.) Par 7-148b, p. 7-35 (Nicopress process / copper sleeves)", "topic": "Cable Hardware"}, {"q": "The Nicopress copper-sleeve process may be used up to what cable strength when the cable is looped around a thimble?", "options": ["50 percent of rated strength", "60 percent only", "25 percent only", "The full rated strength of the cable"], "correct": 3, "short": "Full rated strength of the cable", "expl": "A patented process using copper sleeves may be used up to the full rated strength of the cable when the cable is looped around a thimble.", "cite": "AC 43.13-1B (2025 AIM ed.) Par 7-148b, p. 7-35 (Nicopress process / copper sleeves)", "topic": "Cable Hardware"}, {"q": "The Nicopress copper-sleeve process can replace the five-tuck splice on cables up to what diameter?", "options": ["3/8-inch diameter", "1/8 inch", "1/4 inch", "1/2 inch"], "correct": 0, "short": "3/8-inch diameter", "expl": "The Nicopress process may be used in place of the five-tuck splice on cables up to and including 3/8-inch diameter.", "cite": "AC 43.13-1B (2025 AIM ed.) Par 7-148b, p. 7-35 (Nicopress process / copper sleeves)", "topic": "Cable Hardware"}, {"q": "Sleeves used in the Nicopress process must be fabricated of what material (without engineering approval)?", "options": ["Aluminum", "Copper", "Stainless steel", "Brass"], "correct": 1, "short": "Copper", "expl": "Nicopress sleeves are copper. Sleeves of any material other than copper require engineering approval by the FAA for the specific application.", "cite": "AC 43.13-1B (2025 AIM ed.) Par 7-148b, p. 7-35 (Nicopress process / copper sleeves)", "topic": "Cable Hardware"}, {"q": "What tool checks a swaged cable terminal for proper compression?", "options": ["A torque wrench", "A micrometer-depth gauge only", "A go / no-go gauge", "A Dzus key"], "correct": 2, "short": "A go / no-go gauge", "expl": "Using a go no-go gauge (or a micrometer), check the terminal shank diameter after swaging; this verifies proper compression and that the fitting will develop full cable strength.", "cite": "AC 43.13-1B (2025 AIM ed.) Par 7-148a(3)(c), p. 7-35, Fig 7-13 (check swaged fitting, go no-go gauge)", "topic": "Cable Hardware"}, {"q": "After swaging a cable terminal, the technician proof-loads the cable to what percent of its rated breaking strength?", "options": ["100 percent", "40 percent", "25 percent", "60 percent"], "correct": 3, "short": "60 percent", "expl": "Test the swaged cable by proof-loading it to 60 percent of its rated breaking strength.", "cite": "AC 43.13-1B (2025 AIM ed.) Par 7-148a, p. 7-33 (swage-type terminals; go/no-go)", "topic": "Cable Hardware"}, {"q": "When checking a compressed Nicopress copper sleeve with the terminal gauge, the compressed center should:", "options": ["Enter the gauge opening with very little clearance", "Not touch the gauge at all", "Be far larger than the gauge", "Spin freely inside the gauge"], "correct": 0, "short": "Enter the gauge opening with very little clearance", "expl": "Hold the gauge on the major axis of the sleeve; the compressed center should enter the gauge opening with very little clearance. If it does not, the tool must be adjusted.", "cite": "AC 43.13-1B (2025 AIM ed.) Par 7-148f, p. 7-38, Fig 7-15 (terminal gauge; sleeve compression)", "topic": "Cable Hardware"}, {"q": "What device adjusts the tension of a control cable?", "options": ["A Nicopress sleeve", "A turnbuckle", "A thimble", "A fairlead"], "correct": 1, "short": "A turnbuckle", "expl": "A turnbuckle is the threaded barrel used to adjust control-cable tension; one end has right-hand threads and the other left-hand threads so the barrel tightens both terminals at once.", "cite": "AC 43.13-1B (2025 AIM ed.) Ch.7 (Turnbuckles — cable tension adjustment)", "topic": "Cable Hardware"}, {"q": "A turnbuckle barrel adjusts cable tension because its two ends have:", "options": ["Both right-hand threads", "No threads", "One right-hand and one left-hand thread", "Metric threads on one end only"], "correct": 2, "short": "One right-hand and one left-hand thread", "expl": "A turnbuckle has a brass or steel barrel threaded RH on one end and LH on the other; turning the barrel draws both terminals in (or lets them out) to set tension.", "cite": "AC 43.13-1B (2025 AIM ed.) Ch.7 (Turnbuckles — cable tension adjustment)", "topic": "Cable Hardware"}, {"q": "A thimble is used in a cable end to:", "options": ["Adjust tension", "Lock a turnbuckle", "Replace a turnbuckle", "Protect the cable loop from wear/crushing where the sleeve is swaged"], "correct": 3, "short": "Protect the cable loop from wear", "expl": "The cable is looped around a thimble and the copper Nicopress sleeve is swaged over the loop; the thimble keeps the loop from being crushed or chafed.", "cite": "AC 43.13-1B (2025 AIM ed.) Par 7-148b, pp. 7-35 to 7-38 (Nicopress copper-sleeve splice / thimble)", "topic": "Cable Hardware"}, {"q": "Never solder cable ends before swaging because:", "options": ["The solder increases the tendency of the cable to pull out/fray", "It weakens the copper sleeve", "It melts the thimble", "It changes the cable color"], "correct": 0, "short": "Solder increases pull-out/fray tendency", "expl": "The handbook notes: never solder cable ends to prevent fraying, since the presence of solder greatly increases the tendency of the cable to slip in the terminal.", "cite": "AC 43.13-1B (2025 AIM ed.) Par 7-148a, p. 7-33 (swage-type terminals; go/no-go)", "topic": "Cable Hardware"}, {"q": "Aircraft bolts are almost always manufactured in which class of thread fit?", "options": ["Class 1 (loose)", "Class 3 (medium)", "Class 2 (free)", "Class 4 (close)"], "correct": 1, "short": "Class 3 (medium fit)", "expl": "Aircraft bolts are almost always manufactured in Class 3, the medium fit.", "cite": "FAA-H-8083-30B p. 7-37 (Identification / Threaded Fasteners)", "topic": "Fits / Grip / Threads"}, {"q": "Aircraft screws are generally manufactured with which class of thread fit?", "options": ["Class 1", "Class 3", "Class 2 (free fit)", "Class 4"], "correct": 2, "short": "Class 2 (free fit)", "expl": "Aircraft screws are generally manufactured with a Class 2 thread fit for ease of assembly.", "cite": "FAA-H-8083-30B p. 7-37 (Identification / Threaded Fasteners)", "topic": "Fits / Grip / Threads"}, {"q": "In the thread-class system, which is the LOOSE fit?", "options": ["Class 2", "Class 3", "Class 4", "Class 1"], "correct": 3, "short": "Class 1 (loose)", "expl": "Class 1 = loose, Class 2 = free, Class 3 = medium, Class 4 = close. A Class 1 fit can be turned by hand; a Class 4 needs a wrench.", "cite": "FAA-H-8083-30B p. 7-37 (Identification / Threaded Fasteners)", "topic": "Fits / Grip / Threads"}, {"q": "A Class 4 thread fit is described as:", "options": ["Close (requires a wrench to turn the nut on)", "Loose", "Free", "Medium"], "correct": 0, "short": "Close (needs a wrench)", "expl": "A Class 4 fit is a close fit and requires a wrench to turn the nut onto the bolt, whereas a Class 1 fit turns easily by hand.", "cite": "FAA-H-8083-30B p. 7-37 (Identification / Threaded Fasteners)", "topic": "Fits / Grip / Threads"}, {"q": "Grip length of a bolt is best described as:", "options": ["Total bolt length", "The unthreaded shank length — the total thickness of material the bolt clamps", "The thread length only", "The head diameter"], "correct": 1, "short": "The unthreaded shank that clamps the material", "expl": "Grip is the unthreaded portion of the shank; it should equal the combined thickness of the material being bolted so threads do not bear in the hole. Washers are used to fine-tune grip.", "cite": "FAA-H-8083-30B pp. 7-37 to 7-38 (Aircraft Bolts / General Purpose Bolts)", "topic": "Fits / Grip / Threads"}, {"q": "Plain washers are used partly to adjust grip length so that:", "options": ["The bolt is fully threaded in the hole", "The nut spins freely", "Castellated nut slots line up with the drilled cotter-pin hole", "The bolt is loose"], "correct": 2, "short": "Castle-nut slots align with the cotter-pin hole", "expl": "Plain washers act as shims to obtain correct grip length and to position castellated nuts so their slots line up with the drilled cotter-pin hole in the bolt.", "cite": "FAA-H-8083-30B p. 7-46 (Nut coding; Aircraft Washers / AN960 / AN970)", "topic": "Fits / Grip / Threads"}, {"q": "A 1/4-28 thread designation means the bolt has a 1/4-inch diameter and:", "options": ["28 threads total", "A 28 mm length", "Class 28 fit", "28 threads per inch"], "correct": 3, "short": "28 threads per inch", "expl": "A 1/4-28 thread indicates a 1/4-inch (4/16) diameter bolt with 28 threads in one inch of its threaded length.", "cite": "FAA-H-8083-30B p. 7-37 (Identification / Threaded Fasteners)", "topic": "Fits / Grip / Threads"}];
const DRILL = [{"label": "7 standards orgs (memorize both ways)", "text": "AN = Air Force-Navy · NAF = Naval Aircraft Factory · AF = Air Force Std · NAS = National Aerospace Std (FAA book: National Aircraft Std) · SAE = Society of Automotive Engineers · ASA = American Standards Assn (now ANSI) · MS = Military Standard"}, {"label": "4 AN bolt ranges", "text": "AN3-AN20 = general-purpose hex-head · AN21-AN36 = clevis (shear only) · AN73-AN81 = drilled-head (safety wire) · AN173-AN186 = close-tolerance"}, {"label": "Bolt-head markings (Fig 7-19)", "text": "Single dash / asterisk / cross = AN standard steel (CRES) · TWO dashes = 2024 aluminum · raised-or-recessed TRIANGLE = close-tolerance NAS · 'C' = CRES · 'S' = special bolt · ORANGE dye = Magnaflux (magnetic-particle) inspected"}, {"label": "Decode AN3DD5A (FAA worked example)", "text": "AN = Air Force-Navy std · 3 = 3/16 in dia (sixteenths) · DD = 2024 aluminum (C = CRES, none = cad-plated steel) · 5 = 5/8 in length (eighths) · A = undrilled shank · H before length = drilled head"}, {"label": "Decode rule of thumb", "text": "Diameter = number right after AN, in SIXTEENTHS · Length = number after material code, in EIGHTHS · No trailing A = shank IS drilled for cotter pin"}, {"label": "Key non-locking nut numbers", "text": "AN310 = castle (cotter pin, tension) · AN315/AN335 = plain hex (needs jam/check nut) · AN316 = plain check nut · AN320 = castellated SHEAR · AN340/AN345 = light hex · AN350 = wing nut"}, {"label": "Self-locking nut facts", "text": "Fiber/elastic stop nut = BLUE, max 250 F (do NOT exceed; do NOT tap the fiber) · all-metal locknut for high heat · patented types MS20363-MS20367 · never on rotating joints"}, {"label": "Washers", "text": "AN960 = plain/flat (bearing + shim) · AN970 = larger area, wood structures · AN935 = SPLIT lock · AN936 = TOOTHED lock · put a plain washer UNDER a lock washer"}, {"label": "Screws", "text": "Machine (AN500-AN520) = no defined grip · Self-tapping (AN530/AN531 Parker-Kalon, AN504/AN506) = coarse, cuts own threads · Structural (AN509 100-deg flat / AN525 washer head) = defined grip + bolt-equal shear · Drive (AN535) = nails, do not remove"}, {"label": "Repair inserts", "text": "Bushing = worn HOLE (shrink-fit: heat housing, freeze bushing; oversize to 0.040) · Helicoil = worn THREADS (18-8 stainless wire, DIAMOND cross-section; remove driving tang)"}, {"label": "Turnlock fasteners (3 parts each)", "text": "Dzus = stud + grommet + receptacle · Camloc = stud assembly + grommet + receptacle · Airloc = stud + CROSS PIN + receptacle (cross pin = chrome-vanadium, NEVER reuse) · all lock with 1/4 turn clockwise"}, {"label": "Cable hardware (AC 43.13-1B Par 7-148)", "text": "Nicopress = swaged COPPER sleeve, full rated strength around a thimble, replaces 5-tuck splice up to 3/8 in · go/no-go gauge checks swaged terminal compression · proof-load swaged cable to 60% rated breaking strength · turnbuckle adjusts tension (one RH + one LH thread)"}, {"label": "Thread fits", "text": "Class 1 = loose · Class 2 = free (aircraft SCREWS) · Class 3 = medium (aircraft BOLTS) · Class 4 = close (needs a wrench) · close-tolerance bolt seats with a 12-14 oz hammer"}, {"label": "Numbers the written loves", "text": "250 F fiber-nut limit · 12-14 oz hammer (close-tolerance) · 60% proof load · 3/8 in max Nicopress splice · diameter in 16ths, length in 8ths · 1/4-28 = 28 threads per inch"}];

const QUIZ = {
  order:[], i:0, score:0, answered:0, missed:[], shuffle:false,

  init(){
    document.getElementById('startmeta').innerHTML =
      '<b>'+DATA.length+'</b> questions &nbsp;·&nbsp; instant feedback &nbsp;·&nbsp; every answer cited';
    const t=document.getElementById('shuffleToggle');
    t.onclick=()=>{ this.shuffle=!this.shuffle; t.classList.toggle('on',this.shuffle); };
  },

  start(){
    this.order = DATA.map((_,k)=>k);
    if(this.shuffle){ for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('start').style.display='none';
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  retake(missedOnly){
    if(missedOnly && this.missed.length){ const m=this.missed.slice(); this.order=m; }
    else { this.order = DATA.map((_,k)=>k); if(this.shuffle){for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];}} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  render(){
    const idx=this.order[this.i], q=DATA[idx];
    const total=this.order.length;
    document.getElementById('counter').textContent = 'Q'+(this.i+1)+' of '+total;
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('progfill').style.width = (this.i/total*100)+'%';
    let opts='';
    q.options.forEach((o,li)=>{
      const L='ABCD'[li];
      opts += '<button class="opt" data-li="'+li+'" onclick="QUIZ.pick('+li+')">'+
              '<span class="L">'+L+'</span><span class="T">'+esc(o)+'</span><span class="mark"></span></button>';
    });
    document.getElementById('cardmount').innerHTML =
      '<div class="card"><span class="tag">'+esc(q.topic)+'</span>'+
      '<div class="stem">'+esc(q.q)+'</div>'+
      '<div class="opts" id="opts">'+opts+'</div>'+
      '<div class="fb" id="fb"></div></div>';
    document.getElementById('nextbtn').disabled = true;
    document.getElementById('skipbtn').style.display = '';
    this.locked=false;
  },

  pick(li){
    if(this.locked) return;
    this.locked=true;
    const idx=this.order[this.i], q=DATA[idx];
    const wrapEl=document.getElementById('opts'); wrapEl.classList.add('locked');
    const btns=wrapEl.querySelectorAll('.opt');
    const ok = (li===q.correct);
    btns.forEach(b=>{
      const bl=+b.dataset.li;
      if(bl===q.correct){ b.classList.add('correct'); b.querySelector('.mark').textContent='✓'; }
      if(bl===li && !ok){ b.classList.add('wrong'); b.querySelector('.mark').textContent='✗'; }
    });
    this.answered++;
    if(ok) this.score++; else this.missed.push(idx);
    const fb=document.getElementById('fb');
    fb.className='fb show '+(ok?'ok':'no');
    fb.innerHTML = '<div class="verdict">'+(ok?'✓ Correct':'✗ Incorrect')+'</div>'+
      '<div class="ans">Answer: '+'ABCD'[q.correct]+'. '+esc(q.short)+'</div>'+
      '<div class="expl">'+esc(q.expl)+'</div>'+
      '<div class="cite">📖 '+esc(q.cite)+'</div>';
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('nextbtn').disabled = false;
    document.getElementById('skipbtn').style.display = 'none';
  },

  next(skip){
    if(skip && !this.locked){ /* skipped, not answered */ }
    this.i++;
    if(this.i >= this.order.length){ this.finish(); return; }
    this.render();
    window.scrollTo({top:0,behavior:'smooth'});
  },

  finish(){
    document.getElementById('quiz').style.display='none';
    const R=document.getElementById('results');
    const total=this.answered;
    const pct = total? Math.round(this.score/total*100):0;
    const pass = pct>=70;
    let miss='';
    if(this.missed.length){
      miss='<h3 style="text-align:left;font-size:16px;color:var(--navy);margin:22px 0 8px;">Review your '+this.missed.length+' missed:</h3><div class="misslist">';
      this.missed.forEach(idx=>{ const q=DATA[idx];
        miss+='<div class="missitem"><div class="mq">'+esc(q.q)+'</div>'+
              '<div class="ma"><b>'+'ABCD'[q.correct]+'. '+esc(q.short)+'</b> — '+esc(q.expl)+'</div>'+
              '<div class="mc">📖 '+esc(q.cite)+'</div></div>';
      });
      miss+='</div>';
    } else {
      miss='<div class="allright">🎯 Perfect — every question correct!</div>';
    }
    let drillHtml='';
    if(DRILL && DRILL.length){
      drillHtml='<details class="drill"><summary>📌 High-Yield Drill Box ('+DRILL.length+' must-know facts)</summary>';
      DRILL.forEach(d=>{ drillHtml+='<div class="drillrow"><b>'+esc(d.label)+':</b> '+esc(d.text)+'</div>'; });
      drillHtml+='</details>';
    }
    R.innerHTML =
      '<h1>'+(pass?'Nice work 👍':'Keep grinding 💪')+'</h1>'+
      '<div class="bigscore">'+this.score+'<small>/'+total+'</small></div>'+
      '<div class="pct '+(pass?'pass':'fail')+'">'+pct+'%  '+(pass?'· passing (≥70%)':'· below 70%')+'</div>'+
      '<div class="nav" style="max-width:430px;margin:0 auto 4px;">'+
        '<button class="btn primary" onclick="QUIZ.retake(false)">Retake all</button>'+
        (this.missed.length?'<button class="btn ghost" onclick="QUIZ.retake(true)">Retake missed only</button>':'')+
      '</div>'+
      miss + drillHtml;
    R.style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  }
};

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('quiz').style.display==='none') return;
  const k=e.key.toLowerCase();
  if(['a','b','c','d'].includes(k)) QUIZ.pick('abcd'.indexOf(k));
  else if(['1','2','3','4'].includes(k)) QUIZ.pick(+k-1);
  else if(e.key==='Enter' && !document.getElementById('nextbtn').disabled) QUIZ.next();
});

QUIZ.init();
</script>
</body>
</html>
