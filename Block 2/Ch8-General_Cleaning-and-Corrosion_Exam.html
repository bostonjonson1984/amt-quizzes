<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ch.8 General — Cleaning &amp; Corrosion Exam</title>
<style>
  :root{
    --navy:#0d2a4a; --navy2:#15436e; --gold:#ffce4d; --ink:#1c2330;
    --green:#1f9d57; --greenbg:#e7f7ee; --red:#d6453d; --redbg:#fdecea;
    --line:#e3e8f0; --muted:#5a6678; --card:#ffffff; --bg:#eef2f8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:0 16px env(safe-area-inset-bottom);
  }
  .wrap{width:100%; max-width:720px; margin:0 auto;}

  /* top bar */
  .bar{position:sticky; top:0; z-index:10; background:var(--bg); padding:14px 0 8px;}
  .barrow{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted); font-weight:600;}
  .score{color:var(--navy);}
  .prog{height:8px; background:#dbe3ee; border-radius:6px; margin-top:8px; overflow:hidden;}
  .progfill{height:100%; width:0; background:linear-gradient(90deg,var(--navy2),var(--gold)); transition:width .35s ease;}

  /* card */
  .card{background:var(--card); border-radius:14px; padding:22px 20px 20px; margin-top:14px;
        box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .tag{display:inline-block; background:#eef2f8; color:var(--navy2); font-size:10.5px; font-weight:800;
       letter-spacing:.5px; padding:3px 9px; border-radius:11px; text-transform:uppercase;}
  .stem{font-size:19px; line-height:1.42; font-weight:600; margin:12px 0 18px; color:#0d1b2a;}

  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{display:flex; align-items:flex-start; gap:11px; width:100%; text-align:left;
       background:#f7f9fc; border:1.5px solid var(--line); border-radius:11px;
       padding:14px 15px; font-size:16px; line-height:1.35; cursor:pointer;
       transition:border-color .12s, background .12s, transform .05s; color:var(--ink);}
  .opt:hover:not(.locked){border-color:var(--navy2); background:#fff;}
  .opt:active:not(.locked){transform:scale(.995);}
  .opt .L{flex:0 0 26px; height:26px; border-radius:50%; background:#e6ecf4; color:var(--navy);
          font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;}
  .opt .T{flex:1; padding-top:2px;}
  .opts.locked .opt{cursor:default;}
  .opt.correct{border-color:var(--green); background:var(--greenbg);}
  .opt.correct .L{background:var(--green); color:#fff;}
  .opt.wrong{border-color:var(--red); background:var(--redbg);}
  .opt.wrong .L{background:var(--red); color:#fff;}
  .opt .mark{margin-left:auto; font-weight:800; font-size:15px; align-self:center;}
  .opt.correct .mark{color:var(--green);}
  .opt.wrong .mark{color:var(--red);}

  /* feedback */
  .fb{margin-top:16px; border-radius:11px; padding:15px 16px; display:none;}
  .fb.show{display:block; animation:rise .25s ease;}
  @keyframes rise{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .fb.ok{background:var(--greenbg); border:1px solid #b9e6cb;}
  .fb.no{background:var(--redbg); border:1px solid #f3c6c2;}
  .fb .verdict{font-weight:800; font-size:15px; margin-bottom:5px;}
  .fb.ok .verdict{color:var(--green);}
  .fb.no .verdict{color:var(--red);}
  .fb .ans{font-weight:700; margin-bottom:6px;}
  .fb .expl{font-size:14.5px; line-height:1.5; color:#27313f;}
  .fb .cite{margin-top:9px; font-size:12.5px; color:var(--muted); font-style:italic;}

  .nav{display:flex; gap:10px; margin:16px 0 26px;}
  .btn{flex:1; border:none; border-radius:11px; padding:15px; font-size:16px; font-weight:700;
       cursor:pointer; font-family:inherit;}
  .btn.primary{background:var(--navy); color:#fff;}
  .btn.primary:hover{background:var(--navy2);}
  .btn.ghost{background:#fff; color:var(--navy); border:1.5px solid var(--line);}
  .btn:disabled{opacity:.4; cursor:default;}
  .hint{text-align:center; font-size:12px; color:var(--muted); margin:-12px 0 22px;}

  /* start + results screens */
  .screen{background:var(--card); border-radius:16px; padding:30px 24px; margin-top:22px; text-align:center;
          box-shadow:0 6px 22px rgba(13,42,74,.08);}
  .screen h1{font-size:24px; margin:0 0 6px; color:var(--navy);}
  .screen .sub{color:var(--muted); font-size:14px; margin-bottom:22px; line-height:1.45;}
  .bigscore{font-size:60px; font-weight:800; color:var(--navy); line-height:1; margin:8px 0;}
  .bigscore small{font-size:22px; color:var(--muted); font-weight:600;}
  .pct{font-size:17px; font-weight:700; margin-bottom:18px;}
  .pass{color:var(--green);} .fail{color:var(--red);}
  .opt.toggle{justify-content:center; cursor:pointer; font-weight:600; max-width:320px; margin:0 auto 18px;}
  .opt.toggle.on{border-color:var(--navy2); background:#eef4fb;}
  .misslist{text-align:left; margin-top:6px;}
  .missitem{border-left:3px solid var(--red); background:#fff6f5; border-radius:6px; padding:11px 13px; margin-bottom:10px;}
  .missitem .mq{font-weight:600; font-size:14.5px; margin-bottom:5px;}
  .missitem .ma{font-size:13.5px; color:#27313f;} .missitem .mc{font-size:12px; color:var(--muted); font-style:italic; margin-top:4px;}
  .allright{font-size:16px; color:var(--green); font-weight:700; margin:14px 0;}
  details.drill{margin:18px 0 4px; text-align:left;}
  details.drill summary{cursor:pointer; font-weight:700; color:var(--navy); font-size:15px; padding:8px 0;}
  .drillrow{border-bottom:1px solid var(--line); padding:9px 2px; font-size:13.5px;}
  .drillrow b{color:var(--navy2);}
  .foot{text-align:center; color:#9aa6b8; font-size:11px; margin:10px 0 26px;}
</style>
</head>

<script>
const DATA  = [{"q": "Metal corrosion is BEST defined as the deterioration of the metal by what?", "options": ["Chemical or electrochemical attack", "Melting due to excessive heat", "Repeated stress cycling (fatigue)", "Accumulation of dirt and grease"], "correct": 0, "short": "Chemical or electrochemical attack", "expl": "Metal corrosion is the deterioration of the metal by chemical or electrochemical attack. This damage can take place internally as well as on the surface.", "cite": "FAA-H-8083-30B, p. 8-1", "topic": "What corrosion is"}, {"q": "The MAIN source of corrosion in aircraft is produced when which combination occurs?", "options": ["Ultraviolet radiation acting on paint", "Water or water vapor containing salt combined with oxygen in the atmosphere", "Vibration combined with friction", "Heat combined with engine exhaust gas"], "correct": 1, "short": "Salt water/vapor + atmospheric oxygen", "expl": "Water or water vapor containing salt combines with oxygen in the atmosphere to produce the main source of corrosion in aircraft.", "cite": "FAA-H-8083-30B, p. 8-1", "topic": "What corrosion is"}, {"q": "Which operating environments make an aircraft PARTICULARLY susceptible to corrosive attack?", "options": ["High-altitude and cold-weather routes", "Desert and high-UV environments", "Marine environments or areas with corrosive industrial fumes", "Pressurized hangar storage"], "correct": 2, "short": "Marine / industrial-fume environments", "expl": "Aircraft operating in a marine environment, or in areas where the atmosphere contains corrosive industrial fumes, are particularly susceptible to corrosive attacks.", "cite": "FAA-H-8083-30B, p. 8-1", "topic": "What corrosion is"}, {"q": "The use of composite airframes has had what effect on the need to monitor for corrosion?", "options": ["It has eliminated the need entirely", "It applies only to seaplanes", "It transfers the responsibility to the pilot", "It has not eliminated the need, because metal components and accessories within the airframe still corrode"], "correct": 3, "short": "Need remains; metal parts still corrode", "expl": "Composite construction has not eliminated the need for careful corrosion monitoring; the use of metal components and accessories within the airframe means the AMT must stay alert for corrosion when inspecting any aircraft.", "cite": "FAA-H-8083-30B, p. 8-1", "topic": "What corrosion is"}, {"q": "For more in-depth corrosion information, the handbook refers the technician to which FAA document?", "options": ["AC 43-4, Corrosion Control for Aircraft", "AC 43.13-2B", "AC 65-9A", "14 CFR Part 43, Appendix D"], "correct": 0, "short": "AC 43-4, Corrosion Control for Aircraft", "expl": "The handbook directs the reader to the latest edition of FAA Advisory Circular (AC) 43-4, Corrosion Control for Aircraft, for in-depth information.", "cite": "FAA-H-8083-30B, p. 8-1", "topic": "What corrosion is"}, {"q": "On aluminum alloys and magnesium, corrosion typically appears as pitting and etching combined with what?", "options": ["A greenish film", "A gray or white powdery deposit", "A reddish (rust) byproduct", "A black mottled scale"], "correct": 1, "short": "Gray or white powdery deposit", "expl": "On aluminum alloys and magnesium, corrosion appears as pitting and etching and is often combined with a gray or white powdery deposit.", "cite": "FAA-H-8083-30B, p. 8-1", "topic": "What corrosion is"}, {"q": "On COPPER and copper alloys, the corrosion product forms what?", "options": ["A reddish rust", "A white powdery deposit", "A greenish film", "A black film"], "correct": 2, "short": "A greenish film", "expl": "On copper and copper alloys, corrosion forms a greenish film; on steel it forms a reddish byproduct called rust.", "cite": "FAA-H-8083-30B, p. 8-1", "topic": "What corrosion is"}, {"q": "Why are even shallow surface pits a concern on a highly stressed part?", "options": ["They always cause immediate failure", "They change the color of the metal only", "They have no effect on a stressed part", "They can become sites for crack development"], "correct": 3, "short": "Pits can become crack-development sites", "expl": "If surface pits are not too deep they may not significantly alter strength; however, the pits may become sites for crack development, particularly if the part is highly stressed.", "cite": "FAA-H-8083-30B, p. 8-1", "topic": "What corrosion is"}, {"q": "Which of the following is listed as a factor that influences metal corrosion and its rate?", "options": ["Heat-treatment and grain direction", "The color of the topcoat paint", "The aircraft registration category", "The altitude at which the metal was milled"], "correct": 0, "short": "Heat-treatment and grain direction", "expl": "Listed factors include type of metal; heat-treatment and grain direction; presence of a dissimilar, less corrodible metal; anodic/cathodic surface areas; temperature; electrolytes; oxygen availability; biological organisms; mechanical stress; time of exposure; and lead/graphite pencil marks.", "cite": "FAA-H-8083-30B, p. 8-1", "topic": "Factors affecting corrosion"}, {"q": "Which seemingly harmless mark on an aircraft surface metal is specifically listed as a factor that influences corrosion?", "options": ["Felt-tip ink marks", "Lead/graphite pencil marks", "Chalk-line marks", "Grease-pencil marks"], "correct": 1, "short": "Lead/graphite pencil marks", "expl": "Lead/graphite pencil marks on aircraft surface metals are listed among the factors that influence metal corrosion and its rate (graphite is highly cathodic to aluminum).", "cite": "FAA-H-8083-30B, p. 8-1", "topic": "Factors affecting corrosion"}, {"q": "The MOST ACTIVE metals (those that lose electrons easily), such as magnesium and aluminum, behave how?", "options": ["They do not corrode easily", "They corrode only at high temperature", "They corrode easily", "They are immune to electrochemical attack"], "correct": 2, "short": "They corrode easily", "expl": "The most active metals (those that lose electrons easily), such as magnesium and aluminum, corrode easily. The most noble metals (gold, silver) do not corrode easily.", "cite": "FAA-H-8083-30B, p. 8-2", "topic": "Factors affecting corrosion"}, {"q": "Most pure metals are used in aircraft construction in what manner?", "options": ["By themselves, in pure form", "Only as protective platings", "Only in seaplane hulls", "Only in combination with other metals to form alloys"], "correct": 3, "short": "Only as alloys (not pure)", "expl": "Most pure metals are not suitable for aircraft construction and are used only in combination with other metals to form alloys.", "cite": "FAA-H-8083-30B, p. 8-1", "topic": "Factors affecting corrosion"}, {"q": "The speed of electrochemical attack is INCREASED in what kind of climate?", "options": ["Hot and moist", "Cold and dry", "Temperate and windy", "High and dry"], "correct": 0, "short": "Hot, moist climate", "expl": "Temperature considerations are important because the speed of electrochemical attack is increased in a hot, moist climate.", "cite": "FAA-H-8083-30B, p. 8-2", "topic": "Factors affecting corrosion"}, {"q": "The operational environment of an aircraft is categorized in what way with respect to corrosion severity?", "options": ["Low, medium, or high", "Mild, moderate, or severe", "Class A, B, or C", "Green, yellow, or red"], "correct": 1, "short": "Mild, moderate, or severe", "expl": "The operational environment is categorized as mild, moderate, or severe with respect to the corrosion severity of the operational environment.", "cite": "FAA-H-8083-30B, p. 8-2", "topic": "Factors affecting corrosion"}, {"q": "Suggested cleaning/inspection/lubrication/preservation interval for an aircraft based in a MILD corrosion zone is every how many days?", "options": ["15 days", "30 days", "90 days", "45 days"], "correct": 2, "short": "90 days (mild zone)", "expl": "Suggested intervals are: mild zones every 90 days, moderate zones every 45 days, and severe zones every 15 days.", "cite": "FAA-H-8083-30B, p. 8-2", "topic": "Factors affecting corrosion"}, {"q": "Suggested cleaning/inspection interval for a MODERATE corrosion zone is every how many days?", "options": ["15 days", "60 days", "90 days", "45 days"], "correct": 3, "short": "45 days (moderate zone)", "expl": "Suggested intervals are mild 90 days, MODERATE 45 days, and severe 15 days.", "cite": "FAA-H-8083-30B, p. 8-2", "topic": "Factors affecting corrosion"}, {"q": "Suggested cleaning/inspection interval for a SEVERE corrosion zone is every how many days?", "options": ["15 days", "30 days", "45 days", "90 days"], "correct": 0, "short": "15 days (severe zone)", "expl": "Suggested intervals are mild 90 days, moderate 45 days, and SEVERE 15 days.", "cite": "FAA-H-8083-30B, p. 8-2", "topic": "Factors affecting corrosion"}, {"q": "Which of the following is listed as controllable FOREIGN MATERIAL that promotes corrosive attack?", "options": ["Anodized films", "Spilled battery acids and caustic cleaning solutions", "Pure-aluminum cladding", "Epoxy primer"], "correct": 1, "short": "Spilled battery acid / caustic cleaners", "expl": "Foreign material that adheres to metal surfaces includes soil and atmospheric dust; oil, grease, and exhaust residues; salt water and salt condensation; spilled battery acids and caustic cleaning solutions; and welding/brazing flux residues.", "cite": "FAA-H-8083-30B, p. 8-2", "topic": "Factors affecting corrosion"}, {"q": "Slimes, molds, and fungi growing on damp surfaces increase corrosion mainly because they do what?", "options": ["Generate electrical current", "Etch the metal directly with acid", "Cause the area to remain damp", "Strip the paint film"], "correct": 2, "short": "They keep the area damp", "expl": "Once micro-organisms (slimes, molds, fungi) are established, the area tends to remain damp, increasing the possibility of corrosion.", "cite": "FAA-H-8083-30B, p. 8-2", "topic": "Factors affecting corrosion"}, {"q": "Manufacturing processes such as machining, forming, welding, or heat-treatment can leave what in aircraft parts that may cause cracking in a corrosive environment?", "options": ["Excess paint film", "Anodic coatings", "Dissimilar-metal couples", "Residual (internal) stress"], "correct": 3, "short": "Residual stress", "expl": "Manufacturing processes can leave residual stresses in aircraft parts; this stress can cause cracking in a corrosive environment when the threshold for stress corrosion is exceeded.", "cite": "FAA-H-8083-30B, p. 8-2", "topic": "Factors affecting corrosion"}, {"q": "The two general classifications of corrosion that cover most specific forms are direct chemical attack and what?", "options": ["Electrochemical attack", "Galvanic attack", "Mechanical attack", "Thermal attack"], "correct": 0, "short": "Direct chemical & electrochemical attack", "expl": "There are two general classifications of corrosion: direct chemical attack and electrochemical attack. In both, the metal is converted into a metallic compound such as an oxide, hydroxide, or sulfate.", "cite": "FAA-H-8083-30B, p. 8-2", "topic": "Direct vs electrochemical"}, {"q": "In the corrosion process, the metal that is attacked or oxidized undergoes which change?", "options": ["Cathodic change", "Anodic change", "Neutral change", "Passive change"], "correct": 1, "short": "Anodic change", "expl": "The metal that is attacked or oxidized suffers what is called anodic change, while the corrosive agent is reduced and is considered to undergo cathodic change.", "cite": "FAA-H-8083-30B, p. 8-2", "topic": "Direct vs electrochemical"}, {"q": "In DIRECT chemical attack, the anodic and cathodic changes occur where relative to each other?", "options": ["A measurable distance apart", "Only at the cathode", "Simultaneously at the same point", "Only in the presence of salt water"], "correct": 2, "short": "Simultaneously at the same point", "expl": "Unlike electrochemical attack (where anodic and cathodic changes occur a measurable distance apart), in direct chemical attack the changes occur simultaneously at the same point.", "cite": "FAA-H-8083-30B, p. 8-2", "topic": "Direct vs electrochemical"}, {"q": "Which of the following is one of the three MOST COMMON agents that cause direct chemical attack on aircraft?", "options": ["Atmospheric oxygen", "Ultraviolet light", "Dissimilar metal contact", "Spilled battery acid or fumes from batteries"], "correct": 3, "short": "Spilled battery acid / battery fumes", "expl": "The most common agents causing direct chemical attack are spilled battery acid or fumes from batteries; residual flux deposits from inadequately cleaned welded/brazed/soldered joints; and entrapped caustic cleaning solutions.", "cite": "FAA-H-8083-30B, p. 8-2", "topic": "Direct vs electrochemical"}, {"q": "Flux residues from welding, soldering, or brazing tend to cause severe pitting if not removed, because the residues are described as what?", "options": ["Hygroscopic (moisture absorbing)", "Inert", "Cathodic", "Noble"], "correct": 0, "short": "Hygroscopic (absorb moisture)", "expl": "Flux residues are hygroscopic in nature, absorbing moisture, and unless carefully removed tend to cause severe pitting. Remove residual flux immediately after the joining operation.", "cite": "FAA-H-8083-30B, p. 8-3", "topic": "Direct vs electrochemical"}, {"q": "With the introduction of sealed lead-acid and nickel-cadmium batteries, spilled battery acid has become what?", "options": ["More of a problem", "Less of a problem", "Unchanged as a hazard", "The leading cause of corrosion"], "correct": 1, "short": "Less of a problem", "expl": "With sealed lead-acid batteries and nickel-cadmium batteries, spilled battery acid is becoming less of a problem; these closed units lessen the hazards of acid spillage and battery fumes.", "cite": "FAA-H-8083-30B, p. 8-2", "topic": "Direct vs electrochemical"}, {"q": "Where entrapment of a cleaning solution is likely to occur, the handbook says to do what?", "options": ["Use the strongest caustic cleaner available", "Skip cleaning that area entirely", "Use a noncorrosive cleaning agent, even though it is less efficient", "Apply chromic acid afterward"], "correct": 2, "short": "Use a noncorrosive (less-efficient) cleaner", "expl": "Where entrapment of the cleaning solution is likely to occur, use a noncorrosive cleaning agent, even though it is less efficient, because some cleaning solutions are themselves corrosive.", "cite": "FAA-H-8083-30B, p. 8-3", "topic": "Direct vs electrochemical"}, {"q": "How many conditions must exist before electrochemical corrosion can occur?", "options": ["Two", "Three", "Five", "Four"], "correct": 3, "short": "Four conditions", "expl": "Four conditions must exist: a metal subject to corrosion (anode), a dissimilar conductive material (cathode), a continuous conductive liquid path (electrolyte), and electrical contact between the anode and cathode.", "cite": "FAA-H-8083-30B, p. 8-3", "topic": "Direct vs electrochemical"}, {"q": "Which of the following is NOT one of the four required conditions for electrochemical corrosion?", "options": ["Direct exposure to ultraviolet light", "A metal subject to corrosion (anode)", "A continuous conductive liquid path (electrolyte)", "Electrical contact between the anode and cathode"], "correct": 0, "short": "UV light is NOT required", "expl": "The four conditions are an anode, a cathode (dissimilar conductive material), an electrolyte, and electrical contact between them. UV light is not one. Eliminating any one of the four stops electrochemical corrosion.", "cite": "FAA-H-8083-30B, p. 8-3", "topic": "Direct vs electrochemical"}, {"q": "Eliminating ANY ONE of the four conditions for electrochemical corrosion has what effect?", "options": ["Slows corrosion by half", "Stops electrochemical corrosion", "Has no effect", "Converts it to direct chemical attack"], "correct": 1, "short": "It stops the corrosion", "expl": "Elimination of any one of the four conditions stops electrochemical corrosion. This is the basis for effective corrosion control.", "cite": "FAA-H-8083-30B, p. 8-3", "topic": "Direct vs electrochemical"}, {"q": "Because corrosion products occupy more volume than the original metal, painted surfaces must be inspected for what irregularities?", "options": ["Color fade and chalking only", "Smooth glossy spots", "Blisters, flakes, chips, and lumps", "Reduced film thickness only"], "correct": 2, "short": "Blisters, flakes, chips, lumps", "expl": "Paint can mask the initial stages of corrosion. Since corrosion products occupy more volume than the original metal, painted surfaces must be inspected often for irregularities such as blisters, flakes, chips, and lumps.", "cite": "FAA-H-8083-30B, p. 8-3", "topic": "Direct vs electrochemical"}, {"q": "A metal's specific electrical potential in a given chemical environment is commonly referred to as the metal's what?", "options": ["Activity", "Passivity", "Polarity", "Nobility"], "correct": 3, "short": "Nobility", "expl": "All metals and alloys have a specific electrical potential in a given chemical environment, commonly referred to as the metal's 'nobility.' The less noble a metal is, the more easily it corrodes.", "cite": "FAA-H-8083-30B, p. 8-3", "topic": "Direct vs electrochemical"}, {"q": "In an alloy exposed to a conductive corrosive medium, the MORE ACTIVE metal becomes the ___ and the less active becomes the ___ .", "options": ["anode; cathode", "cathode; anode", "anode; electrolyte", "electrolyte; cathode"], "correct": 0, "short": "More active = anode; less active = cathode", "expl": "Exposure of the alloy surface to a conductive corrosive medium causes the more active metal to become anodic and the less active metal to become cathodic. These are called local cells.", "cite": "FAA-H-8083-30B, p. 8-3", "topic": "Direct vs electrochemical"}, {"q": "The GREATER the difference in electrical potential between two metals, the what?", "options": ["Less severe the corrosive attack", "Greater the severity of the corrosive attack", "Slower the electrolyte conducts", "More noble both metals become"], "correct": 1, "short": "Greater the severity of attack", "expl": "The greater the difference in electrical potential between the two metals, the greater the severity of a corrosive attack if the proper conditions develop.", "cite": "FAA-H-8083-30B, p. 8-3", "topic": "Direct vs electrochemical"}, {"q": "An electrochemical attack requires a medium (usually water) capable of doing what?", "options": ["Insulating the metal", "Reflecting ultraviolet light", "Conducting a tiny current of electricity", "Neutralizing the anode"], "correct": 2, "short": "Conducting a small electric current", "expl": "The reaction in electrochemical attack requires a medium, usually water, that is capable of conducting a tiny current of electricity. Electrochemical attack is responsible for most forms of corrosion on aircraft.", "cite": "FAA-H-8083-30B, p. 8-4", "topic": "Direct vs electrochemical"}, {"q": "In the galvanic (electrochemical) series, magnesium and magnesium alloy are positioned as the metals that are what?", "options": ["Least likely to corrode (cathodic)", "Completely immune", "Identical to gold in nobility", "Most likely to corrode (anodic)"], "correct": 3, "short": "Most likely to corrode (anodic end)", "expl": "In the galvanic series of metals and alloys, magnesium and magnesium alloy are at the anodic end (most likely to corrode), while gold and platinum are at the cathodic end (least likely to corrode).", "cite": "FAA-H-8083-30B, p. 8-3", "topic": "Direct vs electrochemical"}, {"q": "Which is the MOST COMMON form of corrosion, appearing as general roughening, etching, or pitting often with a powdery deposit?", "options": ["Surface (uniform) corrosion", "Intergranular corrosion", "Filiform corrosion", "Fretting corrosion"], "correct": 0, "short": "Surface (uniform) corrosion", "expl": "General surface corrosion (also called uniform etch or uniform attack) is the most common form. It appears as general roughening, etching, or pitting, frequently with a powdery deposit, and may be caused by direct chemical OR electrochemical attack.", "cite": "FAA-H-8083-30B, p. 8-5", "topic": "Forms of corrosion"}, {"q": "When surface corrosion spreads under a coating, it may be recognized by the paint or plating being lifted into what?", "options": ["A glossy film", "Small blisters", "A greenish stain", "A black ring"], "correct": 1, "short": "Small blisters", "expl": "When surface corrosion spreads under the surface coating, closer inspection reveals the paint or plating is lifted off in small blisters from the pressure of underlying corrosion products.", "cite": "FAA-H-8083-30B, p. 8-5", "topic": "Forms of corrosion"}, {"q": "A characteristic WORM-LIKE trace of corrosion products beneath a paint film identifies which form of corrosion?", "options": ["Exfoliation", "Pitting", "Filiform corrosion", "Fatigue corrosion"], "correct": 2, "short": "Filiform corrosion", "expl": "Filiform corrosion is a special form of oxygen concentration cell on metal with an organic coating, recognized by its characteristic worm-like trace of corrosion products beneath the paint film.", "cite": "FAA-H-8083-30B, p. 8-5", "topic": "Forms of corrosion"}, {"q": "Which finishes are especially SUSCEPTIBLE to filiform corrosion?", "options": ["Epoxy primers", "Zinc chromate primers", "Butyrate dope", "Polyurethane finishes"], "correct": 3, "short": "Polyurethane finishes", "expl": "Polyurethane finishes are especially susceptible to filiform corrosion.", "cite": "FAA-H-8083-30B, p. 8-5", "topic": "Forms of corrosion"}, {"q": "Filiform corrosion occurs when the relative humidity of the air is between what range and the surface is slightly acidic?", "options": ["78-90 percent", "50-65 percent", "65-78 percent", "90-100 percent"], "correct": 0, "short": "78-90 percent RH", "expl": "Filiform occurs when the relative humidity is between 78-90 percent and the surface is slightly acidic.", "cite": "FAA-H-8083-30B, p. 8-5", "topic": "Forms of corrosion"}, {"q": "Filiform corrosion can be PREVENTED by storing the aircraft in an environment with a relative humidity below what value?", "options": ["50 percent", "70 percent", "60 percent", "78 percent"], "correct": 1, "short": "Below 70 percent RH", "expl": "Filiform corrosion can be prevented by storing aircraft in an environment with a relative humidity below 70 percent, using low-oxygen-diffusion coatings, and washing to remove acidic contaminants.", "cite": "FAA-H-8083-30B, p. 8-5", "topic": "Forms of corrosion"}, {"q": "On which metal do filiform traces CROSS UNDER one another, making the damage deeper and more severe?", "options": ["Steel", "Magnesium", "Aluminum", "Titanium"], "correct": 2, "short": "Aluminum (traces cross under)", "expl": "The filiform traces never cross on steel, but they cross under one another on aluminum, making the damage deeper and more severe for aluminum.", "cite": "FAA-H-8083-30B, p. 8-5", "topic": "Forms of corrosion"}, {"q": "One of the MOST destructive and intense forms of corrosion, most common on metals that form protective oxide films (aluminum, magnesium), and first noticed as a white/gray powdery deposit, is:", "options": ["Surface corrosion", "Fretting corrosion", "Filiform corrosion", "Pitting corrosion"], "correct": 3, "short": "Pitting corrosion", "expl": "Pitting corrosion is one of the most destructive and intense forms. Most common on metals that form protective oxide films (aluminum and magnesium alloys), it first appears as a white or gray powdery deposit; cleaning it away reveals tiny pits that may penetrate deeply.", "cite": "FAA-H-8083-30B, p. 8-5", "topic": "Forms of corrosion"}, {"q": "Pitting damage is dangerous mainly because the tiny surface holes can do what?", "options": ["Penetrate deeply into structural members, causing damage out of proportion to the surface appearance", "Only discolor the surface", "Be easily polished out in all cases", "Self-seal with oxide film"], "correct": 0, "short": "Penetrate deep; damage out of proportion", "expl": "The small surface openings of pitting may penetrate deeply into structural members and cause damage completely out of proportion to its surface appearance.", "cite": "FAA-H-8083-30B, p. 8-5", "topic": "Forms of corrosion"}, {"q": "DISSIMILAR metal (galvanic) corrosion is especially serious because:", "options": ["It always produces a visible white powder", "The action often takes place out of sight, detectable only by disassembly and inspection", "It only affects external skin", "It can only be found with x-ray"], "correct": 1, "short": "Acts out of sight; needs disassembly to find", "expl": "Dissimilar metal corrosion (a galvanic action at contact points where insulation has broken down) can be very serious because the action often takes place out of sight; the only way to detect it prior to structural failure is by disassembly and inspection.", "cite": "FAA-H-8083-30B, p. 8-5", "topic": "Forms of corrosion"}, {"q": "Using steel wool or a steel wire brush on aluminum or magnesium can INDUCE dissimilar metal corrosion because it does what?", "options": ["Heats the surface excessively", "Removes the paint film", "Forces small pieces of steel into the metal being cleaned", "Adds an acidic residue"], "correct": 2, "short": "Embeds steel particles in the metal", "expl": "Improper use of steel wool or a steel wire brush on aluminum or magnesium can force small pieces of steel into the metal being cleaned, causing corrosion. A pad used on one type of metal must not be reused on a different metal.", "cite": "FAA-H-8083-30B, p. 8-5", "topic": "Forms of corrosion"}, {"q": "Concentration cell corrosion is also known by what name?", "options": ["Filiform corrosion", "Galvanic corrosion", "Fretting corrosion", "Crevice corrosion"], "correct": 3, "short": "Crevice corrosion", "expl": "Concentration cell corrosion is also known as crevice corrosion. Its three general types are metal ion concentration cells, oxygen concentration cells, and active-passive cells.", "cite": "FAA-H-8083-30B, p. 8-5", "topic": "Forms of corrosion"}, {"q": "What are the THREE general types of concentration cell corrosion?", "options": ["Metal ion, oxygen, and active-passive cells", "Surface, pitting, and intergranular cells", "Galvanic, filiform, and fretting cells", "Stress, fatigue, and exfoliation cells"], "correct": 0, "short": "Metal ion, oxygen, active-passive", "expl": "The three general types of concentration cell corrosion are metal ion concentration cells, oxygen concentration cells, and active-passive cells.", "cite": "FAA-H-8083-30B, p. 8-6", "topic": "Forms of corrosion"}, {"q": "In a METAL ION concentration cell, which area is anodic and corrodes?", "options": ["The area in contact with the HIGH metal-ion concentration", "The area in contact with the LOW metal-ion concentration", "Both areas equally", "Neither area corrodes"], "correct": 1, "short": "Low metal-ion area is anodic (corrodes)", "expl": "In a metal ion concentration cell, the area of metal in contact with the LOW concentration of metal ions is anodic and corrodes; the area in contact with the high metal-ion concentration is cathodic and does not show corrosion.", "cite": "FAA-H-8083-30B, p. 8-6", "topic": "Forms of corrosion"}, {"q": "In an OXYGEN concentration cell, corrosion occurs at the area of:", "options": ["High oxygen concentration (cathode)", "Equal oxygen concentration", "Low oxygen concentration (anode)", "Highest metal-ion concentration"], "correct": 2, "short": "Low oxygen area (anode) corrodes", "expl": "In an oxygen concentration cell, corrosion occurs at the area of low oxygen concentration (anode). Typical locations are under gaskets, wood, rubber, etc. Stainless steel is particularly susceptible to this crevice corrosion.", "cite": "FAA-H-8083-30B, p. 8-6", "topic": "Forms of corrosion"}, {"q": "Which alloy is noted as particularly susceptible to OXYGEN concentration (crevice) cell corrosion?", "options": ["2024 aluminum", "Magnesium alloy", "Cadmium plate", "Stainless steel"], "correct": 3, "short": "Stainless steel", "expl": "Alloys such as stainless steel are particularly susceptible to oxygen concentration cell (crevice) corrosion.", "cite": "FAA-H-8083-30B, p. 8-6", "topic": "Forms of corrosion"}, {"q": "Metals that depend on a tightly adhering passive film (usually an oxide) for protection are prone to rapid attack by which cell, typically starting as an oxygen concentration cell?", "options": ["Active-passive cell", "Metal ion cell", "Filiform cell", "Fretting cell"], "correct": 0, "short": "Active-passive cell", "expl": "Active-passive cells rapidly attack metals that depend on a passive oxide film. The action usually starts as an oxygen concentration cell; the passive film breaks beneath a dirt particle, exposing active metal, and a potential develops between the large passive area and small active area, causing rapid pitting.", "cite": "FAA-H-8083-30B, p. 8-6", "topic": "Forms of corrosion"}, {"q": "An attack along the GRAIN BOUNDARIES of an alloy, resulting from a lack of uniformity in the alloy structure, is called:", "options": ["Surface corrosion", "Intergranular corrosion", "Filiform corrosion", "Fretting corrosion"], "correct": 1, "short": "Intergranular corrosion", "expl": "Intergranular corrosion is an attack along the grain boundaries of an alloy, commonly resulting from a lack of uniformity in the alloy structure caused by heating/cooling during manufacture. It may exist without visible surface evidence.", "cite": "FAA-H-8083-30B, p. 8-6", "topic": "Forms of corrosion"}, {"q": "High-strength aluminum alloys such as 2014 and 7075 are MORE susceptible to intergranular corrosion under what condition?", "options": ["When anodized", "When clad with pure aluminum", "When improperly heat-treated and then exposed to a corrosive environment", "When kept below 70 percent humidity"], "correct": 2, "short": "If improperly heat-treated, then exposed", "expl": "High-strength aluminum alloys such as 2014 and 7075 are more susceptible to intergranular corrosion if they have been improperly heat-treated and then exposed to a corrosive environment.", "cite": "FAA-H-8083-30B, p. 8-6", "topic": "Forms of corrosion"}, {"q": "An ADVANCED form of intergranular corrosion that lifts up the surface grains of a metal, most often seen on extruded sections such as spars, is:", "options": ["Pitting", "Surface corrosion", "Filiform corrosion", "Exfoliation corrosion"], "correct": 3, "short": "Exfoliation corrosion", "expl": "Exfoliation is an advanced form of intergranular corrosion that lifts surface grains by the force of expanding corrosion products at grain boundaries. It is most often seen on extruded sections (like spars) where grain thickness is less than in rolled forms.", "cite": "FAA-H-8083-30B, p. 8-6", "topic": "Forms of corrosion"}, {"q": "Which NDI methods are noted as being used with great success to detect exfoliation corrosion?", "options": ["Ultrasonic and eddy current", "Magnetic particle and dye penetrant", "X-ray and acoustic emission", "Visual and tactile only"], "correct": 0, "short": "Ultrasonic and eddy current", "expl": "Exfoliation is difficult to detect in its initial stage, but ultrasonic and eddy current inspection methods are being used with a great deal of success.", "cite": "FAA-H-8083-30B, p. 8-6", "topic": "Forms of corrosion"}, {"q": "Stress-corrosion cracking involves a constant or cyclic stress acting together with what?", "options": ["An inert gas blanket", "A damaging chemical environment", "A protective oxide film", "Elevated temperature alone"], "correct": 1, "short": "Stress + damaging chemical environment", "expl": "Stress-corrosion cracking involves a constant or cyclic stress acting in conjunction with a damaging chemical environment. Stress may be internal (trapped during manufacturing) or external (riveting, welding, over-torque, press fit).", "cite": "FAA-H-8083-30B, p. 8-6", "topic": "Forms of corrosion"}, {"q": "Which environment causes stress corrosion cracking of HIGH-STRENGTH, heat-treated steel and aluminum alloys?", "options": ["Methyl alcohol-hydrochloric acid solutions", "Moist air", "Salt solutions and sea water", "Dry nitrogen"], "correct": 2, "short": "Salt solutions and sea water", "expl": "Salt solutions and sea water cause stress corrosion cracking of high-strength, heat-treated steel and aluminum alloys.", "cite": "FAA-H-8083-30B, p. 8-7", "topic": "Forms of corrosion"}, {"q": "Which environment causes stress corrosion cracking of some TITANIUM alloys?", "options": ["Salt solutions and sea water", "Moist air", "Battery electrolyte", "Methyl alcohol-hydrochloric acid solutions"], "correct": 3, "short": "Methyl alcohol-hydrochloric acid", "expl": "Methyl alcohol-hydrochloric acid solutions cause stress corrosion cracking of some titanium alloys.", "cite": "FAA-H-8083-30B, p. 8-7", "topic": "Forms of corrosion"}, {"q": "MAGNESIUM alloys may stress corrode in what environment?", "options": ["Moist air", "Dry desert air", "Sea water only", "Methyl alcohol solutions"], "correct": 0, "short": "Moist air", "expl": "Magnesium alloys may stress corrode in moist air.", "cite": "FAA-H-8083-30B, p. 8-7", "topic": "Forms of corrosion"}, {"q": "Shot peening increases resistance to stress corrosion cracking by creating what on the surface?", "options": ["Tensile stresses", "Compressive stresses", "An oxide film", "A cathodic coating"], "correct": 1, "short": "Compressive surface stresses", "expl": "Shot peening a metal surface increases resistance to stress corrosion cracking by creating compressive stresses on the surface that must be overcome by applied tensile stress before the surface sees any tension load, raising the threshold stress level.", "cite": "FAA-H-8083-30B, p. 8-7", "topic": "Forms of corrosion"}, {"q": "A particularly damaging corrosion that occurs when two mating surfaces normally at rest undergo slight relative motion is called:", "options": ["Galvanic corrosion", "Intergranular corrosion", "Fretting corrosion", "Filiform corrosion"], "correct": 2, "short": "Fretting corrosion", "expl": "Fretting corrosion occurs when two mating surfaces, normally at rest with respect to one another, are subject to slight relative motion. It is characterized by surface pitting and finely divided debris that cannot escape.", "cite": "FAA-H-8083-30B, p. 8-7", "topic": "Forms of corrosion"}, {"q": "Because fretting can wear deep grooves resembling pressure indentations, it has also been called what?", "options": ["Smoking rivet", "Crevice corrosion", "Whisker growth", "False brinelling"], "correct": 3, "short": "False brinelling", "expl": "When the fretting contact areas are small and sharp, deep grooves resembling brinell markings may be worn, so this type of corrosion on bearing surfaces has also been called false brinelling.", "cite": "FAA-H-8083-30B, p. 8-7", "topic": "Forms of corrosion"}, {"q": "The most common example of fretting corrosion, identified by a black ring around the rivet, is the:", "options": ["Smoking rivet on engine cowling and wing skins", "Green stain at a battery vent", "White whisker on a magnesium casting", "Worm trace under polyurethane paint"], "correct": 0, "short": "Smoking rivet (black ring)", "expl": "The most common example of fretting corrosion is the smoking rivet found on engine cowling and wing skins, identified by a black ring around the rivet.", "cite": "FAA-H-8083-30B, p. 8-7", "topic": "Forms of corrosion"}, {"q": "Fretting corrosion is unusual because it is one corrosion reaction that is NOT driven by an electrolyte; in fact, moisture does what?", "options": ["Accelerates it greatly", "May inhibit the reaction", "Has no effect at all", "Converts it to pitting"], "correct": 1, "short": "Moisture may inhibit it", "expl": "The smoking-rivet (fretting) reaction is not driven by an electrolyte, and in fact moisture may inhibit the reaction. (Note: water VAPOR generally increases fretting deterioration, but this specific reaction can be inhibited by moisture.)", "cite": "FAA-H-8083-30B, p. 8-7", "topic": "Forms of corrosion"}, {"q": "Fatigue corrosion involves cyclic stress plus a corrosive environment. Failure from fatigue corrosion generally occurs at a stress level that is:", "options": ["Far above the fatigue limit", "Exactly at the yield strength", "Far below the fatigue limit of an uncorroded part", "Independent of the number of cycles"], "correct": 2, "short": "Far below the uncorroded fatigue limit", "expl": "Fracture due to fatigue corrosion generally occurs at a stress level far below the fatigue limit of an uncorroded part, even though the amount of corrosion is relatively small.", "cite": "FAA-H-8083-30B, p. 8-9", "topic": "Forms of corrosion"}, {"q": "Fatigue corrosion failure occurs in how many stages?", "options": ["One stage", "Three stages", "Four stages", "Two stages"], "correct": 3, "short": "Two stages", "expl": "Fatigue corrosion failure occurs in two stages: first, combined corrosion and cyclic stress pit and crack the metal; second, a fatigue stage where the crack propagates (often from a corrosion pit) controlled by stress concentration and the metal's properties.", "cite": "FAA-H-8083-30B, p. 8-8", "topic": "Forms of corrosion"}, {"q": "GALVANIC corrosion occurs when two dissimilar metals make electrical contact in the presence of what?", "options": ["An electrolyte", "An inert gas", "Ultraviolet light", "A passive film"], "correct": 0, "short": "An electrolyte", "expl": "Galvanic corrosion occurs when two dissimilar metals make electrical contact in the presence of an electrolyte. The greater the difference in activity, the faster corrosion occurs.", "cite": "FAA-H-8083-30B, p. 8-9", "topic": "Forms of corrosion"}, {"q": "Galvanic corrosion is RAPID and SEVERE when the surface area of the corroding (anodic) metal is:", "options": ["Larger than the less active metal", "Smaller than the less active metal", "Exactly equal to the less active metal", "Coated with anodic film"], "correct": 1, "short": "Anode smaller than cathode = rapid/severe", "expl": "If the surface area of the corroding metal is SMALLER than the surface area of the less active metal, corrosion is rapid and severe. When the corroding metal is larger, corrosion is slow and superficial.", "cite": "FAA-H-8083-30B, p. 8-9", "topic": "Forms of corrosion"}, {"q": "Galvanic corrosion is SLOW and SUPERFICIAL when the corroding metal is:", "options": ["Smaller than the less active metal", "Made of magnesium", "Larger than the less active metal", "Held below 70 percent humidity"], "correct": 2, "short": "Anode larger than cathode = slow/superficial", "expl": "When the corroding metal is larger than the less active metal, corrosion is slow and superficial.", "cite": "FAA-H-8083-30B, p. 8-9", "topic": "Forms of corrosion"}, {"q": "The MOST common corrosive agents are described as acids, alkalies, and what?", "options": ["Oxides", "Plastics", "Greases", "Salts"], "correct": 3, "short": "Acids, alkalies, and salts", "expl": "The most common corrosive agents are acids, alkalies, and salts. The atmosphere and water, the two most common media for these agents, may also act as corrosive agents.", "cite": "FAA-H-8083-30B, p. 8-9", "topic": "Common corrosive agents"}, {"q": "Which acid is the SINGLE most familiar example given as 'battery acid' that severely corrodes airframe alloys?", "options": ["Sulfuric acid", "Hydrochloric acid", "Citric acid", "Phosphoric acid"], "correct": 0, "short": "Sulfuric acid (battery acid)", "expl": "The most destructive acids include sulfuric acid (battery acid), halogen acids (hydrochloric, hydrofluoric, hydrobromic), nitrous oxide compounds, and organic acids from human and animal wastes.", "cite": "FAA-H-8083-30B, p. 8-9", "topic": "Common corrosive agents"}, {"q": "As a GROUP, alkalies are described as how corrosive compared with acids, except toward aluminum and magnesium?", "options": ["More corrosive than acids", "Not as corrosive as acids", "Exactly as corrosive as acids", "Completely noncorrosive"], "correct": 1, "short": "Less corrosive than acids (except Al/Mg)", "expl": "As a group, alkalies are not as corrosive as acids. However, aluminum and magnesium alloys are exceedingly prone to corrosive attack by many alkaline solutions unless an inhibitor is present.", "cite": "FAA-H-8083-30B, p. 8-9", "topic": "Common corrosive agents"}, {"q": "Which alkali is an EXCEPTION because aluminum alloys are highly resistant to it?", "options": ["Washing soda", "Potash (wood ashes)", "Ammonia", "Lime (cement dust)"], "correct": 2, "short": "Ammonia (aluminum resists it)", "expl": "Substances particularly corrosive to aluminum are washing soda, potash (wood ashes), and lime (cement dust). Ammonia, an alkali, is an exception because aluminum alloys are highly resistant to it.", "cite": "FAA-H-8083-30B, p. 8-9", "topic": "Common corrosive agents"}, {"q": "Most salt solutions promote corrosion because they are good what?", "options": ["Insulators", "Oxidizers of paint", "Passive films", "Electrolytes"], "correct": 3, "short": "Good electrolytes", "expl": "Most salt solutions are good electrolytes and can promote corrosive attack. Some stainless steels resist salt solutions, but aluminum alloy, magnesium alloys, and other steels are extremely vulnerable.", "cite": "FAA-H-8083-30B, p. 8-9", "topic": "Common corrosive agents"}, {"q": "The two MAJOR atmospheric corrosive agents are:", "options": ["Oxygen and airborne moisture", "Nitrogen and carbon dioxide", "Ozone and ultraviolet light", "Dust and pollen"], "correct": 0, "short": "Oxygen and airborne moisture", "expl": "The major atmospheric corrosive agents are oxygen and airborne moisture. Additional moisture often accelerates corrosive attack, particularly on ferrous alloys. The atmosphere may also carry industrial and marine salt spray.", "cite": "FAA-H-8083-30B, p. 8-9", "topic": "Common corrosive agents"}, {"q": "One characteristic of WATER that determines its corrosiveness is its conductivity, i.e., its ability to do what?", "options": ["Reflect light", "Act as an electrolyte and conduct a current", "Dissolve paint", "Evaporate quickly"], "correct": 1, "short": "Act as electrolyte / conduct current", "expl": "The corrosiveness of water depends on dissolved impurities and gases (especially oxygen). One characteristic that determines its corrosiveness is conductivity -- the ability to act as an electrolyte and conduct a current. Temperature and velocity also matter.", "cite": "FAA-H-8083-30B, p. 8-9", "topic": "Common corrosive agents"}, {"q": "During any corrosion control maintenance, the handbook says to consult which document for information on chemicals used?", "options": ["The aircraft logbook", "The type certificate data sheet", "The Safety Data Sheet (SDS)", "14 CFR Part 91"], "correct": 2, "short": "Safety Data Sheet (SDS)", "expl": "During any corrosion control maintenance, consult the Safety Data Sheet (SDS) for information on any chemicals used in the process.", "cite": "FAA-H-8083-30B, p. 8-10", "topic": "Preventive maintenance & inspection"}, {"q": "Which of the following is listed as a specific corrosion preventive-maintenance function?", "options": ["Annual repaint regardless of condition", "Weekly engine overhaul", "Removal of all drain holes", "Daily draining of fuel cell sumps"], "correct": 3, "short": "Daily draining of fuel cell sumps", "expl": "Specific preventive functions include adequate cleaning, periodic lubrication, detailed inspection, prompt corrosion treatment and paint touch-up, record keeping, keeping drain holes free of obstructions, DAILY draining of fuel cell sumps, daily wipe-down of exposed critical areas, sealing against water, replacing deteriorated gaskets/sealants, and using protective covers.", "cite": "FAA-H-8083-30B, p. 8-10", "topic": "Preventive maintenance & inspection"}, {"q": "Keeping drain holes free of obstructions is important because clogged low-point drains may do what?", "options": ["Allow water to collect and become entrapped", "Increase flying speed", "Reduce paint adhesion", "Cause galvanic coupling"], "correct": 0, "short": "Allow water entrapment", "expl": "Design specifications require drains where water may collect; keeping drain holes free of obstructions and daily inspection of low-point drains prevents water entrapment that leads to corrosion.", "cite": "FAA-H-8083-30B, p. 8-10", "topic": "Preventive maintenance & inspection"}, {"q": "All corrosion inspections START with what?", "options": ["An NDI scan", "A thorough cleaning of the area to be inspected", "Application of chromic acid", "Removal of the part from the aircraft"], "correct": 1, "short": "A thorough cleaning of the area", "expl": "All corrosion inspections start with a thorough cleaning of the area to be inspected, followed by a general visual inspection using a flashlight, inspection mirror, and a 5-10X magnifying glass.", "cite": "FAA-H-8083-30B, p. 8-11", "topic": "Preventive maintenance & inspection"}, {"q": "The general visual corrosion inspection uses a flashlight, inspection mirror, and a magnifying glass of what power?", "options": ["2-3X", "20-30X", "5-10X", "50-100X"], "correct": 2, "short": "5-10X magnifying glass", "expl": "A general visual inspection follows cleaning, using a flashlight, inspection mirror, and a 5-10X magnifying glass to look for obvious defects and suspected areas.", "cite": "FAA-H-8083-30B, p. 8-11", "topic": "Preventive maintenance & inspection"}, {"q": "Which technique is described as the MOST widely used and effective method for detecting and evaluating corrosion?", "options": ["Eddy current inspection", "X-ray inspection", "Ultrasonic inspection", "Visual inspection"], "correct": 3, "short": "Visual inspection", "expl": "Visual inspection is the most widely used technique and an effective method for the detection and evaluation of corrosion. Using the sense of touch is also effective for hidden, well-developed corrosion.", "cite": "FAA-H-8083-30B, p. 8-11", "topic": "Preventive maintenance & inspection"}, {"q": "NDI methods such as eddy current, x-ray, and ultrasonic must be performed only by whom?", "options": ["Qualified and certified NDI personnel", "Any certificated A&P", "The aircraft owner", "The repair station manager"], "correct": 0, "short": "Qualified, certified NDI personnel", "expl": "NDI methods (liquid penetrant, magnetic particle, eddy current, x-ray, ultrasonic, acoustic emission) have limitations and must be performed only by qualified and certified NDI personnel. Eddy current, x-ray, and ultrasonic require calibrated equipment and a reference standard.", "cite": "FAA-H-8083-30B, p. 8-11", "topic": "Preventive maintenance & inspection"}, {"q": "In addition to routine maintenance inspections, amphibians or seaplanes must be checked how often, with critical areas cleaned or treated as necessary?", "options": ["Weekly", "Daily", "Every 45 days", "Annually"], "correct": 1, "short": "Daily (seaplanes/amphibians)", "expl": "In addition to routine maintenance inspections, amphibians or seaplanes must be checked daily and critical areas cleaned or treated as necessary.", "cite": "FAA-H-8083-30B, p. 8-11", "topic": "Preventive maintenance & inspection"}, {"q": "Exhaust deposits from both jet and reciprocating engines give particular trouble at gaps, seams, hinges, and fairings located where?", "options": ["Upstream of the engine intake", "Inside the fuel tanks", "Downstream from the exhaust pipes or nozzles", "On the upper wing surface only"], "correct": 2, "short": "Downstream of exhaust pipes/nozzles", "expl": "Exhaust deposits are very corrosive and give particular trouble where gaps, seams, hinges, and fairings are located downstream from the exhaust pipes or nozzles. Don't overlook buildup in remote areas such as the empennage.", "cite": "FAA-H-8083-30B, p. 8-11", "topic": "Corrosion-prone areas"}, {"q": "Battery compartments remain corrosion prone largely because of what?", "options": ["High vibration from the engine", "Excessive ultraviolet exposure", "Constant water spray from the runway", "Fumes from overheated electrolyte that spread to adjacent cavities"], "correct": 3, "short": "Overheated-electrolyte fumes spread", "expl": "Despite improved finishes and venting, battery compartments stay corrosion prone because fumes from overheated electrolyte are difficult to contain and spread to adjacent cavities, causing rapid corrosive attack on unprotected metal. Battery vent openings on the skin must also be inspected.", "cite": "FAA-H-8083-30B, p. 8-11", "topic": "Corrosion-prone areas"}, {"q": "In BILGE areas, what often masks small quantities of water that settle to the bottom and set up a hidden chemical cell?", "options": ["Residual oil", "Paint film", "Sealant", "Anodized coating"], "correct": 0, "short": "Residual oil", "expl": "Bilge areas are natural collection points for waste fluids and debris; residual oil quite often masks small quantities of water that settle to the bottom and set up a hidden chemical cell.", "cite": "FAA-H-8083-30B, p. 8-11", "topic": "Corrosion-prone areas"}, {"q": "Which area 'probably receives more punishment due to mud, water, salt, gravel, and other flying debris' than any other?", "options": ["The empennage", "The wheel well and landing gear area", "The battery compartment", "The bilge area"], "correct": 1, "short": "Wheel well & landing gear area", "expl": "More than any other area, the wheel well and landing gear area receives the most punishment from mud, water, salt, gravel, and debris. Complete paint-film coverage is difficult there.", "cite": "FAA-H-8083-30B, p. 8-11", "topic": "Corrosion-prone areas"}, {"q": "Why can preservatives NOT be used on some main landing gear wheels?", "options": ["They are made of titanium", "The preservative dissolves the tires", "Heat generated by braking action", "FAA regulations prohibit it"], "correct": 2, "short": "Heat from braking action", "expl": "Due to heat generated by braking action, preservatives cannot be used on some main landing gear wheels. A partially applied preservative tends to mask corrosion rather than prevent it.", "cite": "FAA-H-8083-30B, p. 8-11", "topic": "Corrosion-prone areas"}, {"q": "When inspecting the wheel well, magnesium wheels should be checked especially around bolt heads, lugs, and web areas for what?", "options": ["Paint gloss", "Tire wear", "Anodize thickness", "Entrapped water or its effects"], "correct": 3, "short": "Entrapped water (magnesium wheels)", "expl": "During wheel-well inspection, pay particular attention to magnesium wheels (around bolt heads, lugs, and wheel web areas) for the presence of entrapped water or its effects.", "cite": "FAA-H-8083-30B, p. 8-11", "topic": "Corrosion-prone areas"}, {"q": "Aircraft design requires drains in all areas where water may collect; daily inspection of which is a standard requirement?", "options": ["Low-point drains", "High-point vents", "Static ports", "Fuel filler caps"], "correct": 0, "short": "Low-point drains", "expl": "Design specifications require drains in all areas where water may collect. Daily inspection of low-point drains is a standard requirement, since neglect lets drains clog with debris, grease, or sealants.", "cite": "FAA-H-8083-30B, p. 8-12", "topic": "Corrosion-prone areas"}, {"q": "Cores of radiator coolers and reciprocating-engine cylinder fins in engine frontal areas may NOT be painted because of what requirement?", "options": ["Weight reduction", "Heat dissipation", "Electrical bonding", "Fuel resistance"], "correct": 1, "short": "Heat dissipation requirement", "expl": "In engine frontal areas, cores of radiator coolers, reciprocating-engine cylinder fins, etc., may not be painted due to the requirement for heat dissipation, leaving them corrosion prone.", "cite": "FAA-H-8083-30B, p. 8-13", "topic": "Corrosion-prone areas"}, {"q": "Wing flap and spoiler recesses are potential corrosion problem areas and should be inspected in what position?", "options": ["Fully retracted", "Neutral", "Fully deployed", "Removed from the aircraft"], "correct": 2, "short": "Fully deployed position", "expl": "Dirt and water collect in flap and spoiler recesses unnoticed because they are normally retracted; inspect these areas with the spoilers and flaps in the fully deployed position.", "cite": "FAA-H-8083-30B, p. 8-13", "topic": "Corrosion-prone areas"}, {"q": "PIANO-type hinges are prime corrosion spots primarily because of what?", "options": ["The high temperatures they experience", "Their exposure to engine exhaust", "Galvanic action of magnesium", "Dissimilar metal contact between the steel pin and aluminum hinge"], "correct": 3, "short": "Steel pin / aluminum hinge dissimilar contact", "expl": "Piano hinges are prime corrosion spots because of the dissimilar metal contact between the steel pin and aluminum hinge, and they trap dirt, salt, and moisture. Use water-displacing lubricants when servicing them.", "cite": "FAA-H-8083-30B, p. 8-13", "topic": "Corrosion-prone areas"}, {"q": "When servicing piano hinges, the inspection must include lubrication and actuation through several cycles, and what type of lubricant is specified?", "options": ["Water-displacing lubricants", "Dry graphite lubricant", "Chromic acid solution", "Anti-seize compound only"], "correct": 0, "short": "Water-displacing lubricants", "expl": "Inspection of hinges must include lubrication and actuation through several cycles to ensure complete penetration. Use water-displacing lubricants when servicing piano hinges.", "cite": "FAA-H-8083-30B, p. 8-13", "topic": "Corrosion-prone areas"}, {"q": "Corrosion of metal skins joined by spot welding results from what?", "options": ["Excessive paint thickness", "Entrance and entrapment of corrosive agents between the layers of metal", "Heat from the welding process only", "Dissimilar metal contact with rivets"], "correct": 1, "short": "Entrapped corrosive agents between layers", "expl": "Corrosion of spot-welded metal skins is the result of entrance and entrapment of corrosive agents between the metal layers, evidenced by corrosion products at the crevices. Advanced attack causes skin buckling and spot-weld fracture.", "cite": "FAA-H-8083-30B, p. 8-13", "topic": "Corrosion-prone areas"}, {"q": "How are CONTROL CABLES inspected for internal corrosion if external corrosion is evident?", "options": ["Cut the cable to inspect the core", "Apply current and measure resistance", "Relieve tension and check the cable for internal corrosion", "Soak the entire cable in solvent"], "correct": 2, "short": "Relieve tension, then check internally", "expl": "If external corrosion is evident on a control cable, relieve tension and check the cable for internal corrosion. Replace cables with internal corrosion; remove light external corrosion with an oil-soaked nonwoven abrasive pad or steel wire brush, then recoat with preservative.", "cite": "FAA-H-8083-30B, p. 8-13", "topic": "Corrosion-prone areas"}, {"q": "Helicopter rotor heads and gearboxes are corrosion prone because, besides constant exposure, they contain what?", "options": ["Only composite parts", "Sealed magnesium castings only", "Anodized aluminum only", "Bare steel surfaces, many external working parts, and dissimilar metal contacts"], "correct": 3, "short": "Bare steel, working parts, dissimilar metals", "expl": "Helicopter rotor heads and gearboxes contain bare steel surfaces, many external working parts, and dissimilar metal contacts, and are constantly exposed to the elements; inspect them frequently.", "cite": "FAA-H-8083-30B, p. 8-13", "topic": "Corrosion-prone areas"}, {"q": "The two methods normally used to REMOVE corrosion are:", "options": ["Mechanical and chemical", "Thermal and electrical", "Anodic and cathodic", "Wet wash and dry wash"], "correct": 0, "short": "Mechanical and chemical", "expl": "The methods normally used to remove corrosion are mechanical and chemical. Mechanical includes hand and powered sanding, grinding, and buffing using abrasive mats, papers, wheels, discs, and metal wool. The method depends on the metal and the degree of corrosion.", "cite": "FAA-H-8083-30B, p. 8-14", "topic": "Corrosion removal & blending"}, {"q": "When corrosion damage is SEVERE and exceeds the damage limits set by the manufacturer, the technician must:", "options": ["Apply extra primer and return to service", "Replace the part", "Reduce the inspection interval only", "Anodize the affected area"], "correct": 1, "short": "Replace the part", "expl": "Repair of corrosion damage includes removal of all corrosion products. When the damage is severe and exceeds the damage limits set by the aircraft or parts manufacturer, the part must be replaced.", "cite": "FAA-H-8083-30B, p. 8-14", "topic": "Corrosion removal & blending"}, {"q": "Before stripping compound is applied, the area must first be cleaned of grease, oil, dirt, or preservatives in order to do what?", "options": ["Add weight to the part", "Increase paint adhesion only", "Assure maximum efficiency of the stripping compound and reveal the extent of corrosion spread", "Prevent the part from overheating"], "correct": 2, "short": "Maximize stripper efficiency; reveal spread", "expl": "To assure maximum efficiency of the stripping compound, the area must be cleaned of grease, oil, dirt, or preservatives. This preliminary cleaning also helps determine the extent of the corrosion spread.", "cite": "FAA-H-8083-30B, p. 8-14", "topic": "Corrosion removal & blending"}, {"q": "Modern environmental standards encourage the use of which cleaning compounds whenever possible?", "options": ["Chlorinated solvents", "Caustic alkaline strippers", "Carbon tetrachloride", "Water-based, non-toxic cleaning compounds"], "correct": 3, "short": "Water-based, non-toxic compounds", "expl": "Modern environmental standards encourage the use of water-based, non-toxic cleaning compounds whenever possible. Some jurisdictions prohibit solvents containing volatile organic compounds (VOCs).", "cite": "FAA-H-8083-30B, p. 8-14", "topic": "Corrosion removal & blending"}, {"q": "Chemical paint removal from a large area should be accomplished where, wherever practicable?", "options": ["Outside (in open air), preferably in shaded areas", "Inside a sealed hangar", "In direct sunlight", "Over an open drain"], "correct": 0, "short": "Outside, in open air / shaded areas", "expl": "Wherever practicable, chemical paint removal from any large area is to be accomplished outside (in open air) and preferably in shaded areas. If inside, adequate ventilation must be assured.", "cite": "FAA-H-8083-30B, p. 8-14", "topic": "Corrosion removal & blending"}, {"q": "When applying paint stripper, to what depth is the entire area brushed with stripper?", "options": ["1/64\" to 1/32\"", "1/32\" to 1/16\"", "1/16\" to 1/8\"", "1/8\" to 1/4\""], "correct": 1, "short": "1/32\" to 1/16\" of stripper", "expl": "Brush the entire area to be stripped with a cover of stripper to a depth of 1/32 inch to 1/16 inch. A paintbrush exposed to paint remover must not be reused for other purposes.", "cite": "FAA-H-8083-30B, p. 8-15", "topic": "Corrosion removal & blending"}, {"q": "When assisting paint removal, only which type of scraper is permitted?", "options": ["Steel scrapers", "Brass scrapers", "Nonmetallic scrapers", "Carborundum scrapers"], "correct": 2, "short": "Nonmetallic scrapers only", "expl": "Only nonmetallic scrapers are to be used to assist in removing persistent paint finishes. Nonwoven abrasive pads intended for paint stripping may also be useful.", "cite": "FAA-H-8083-30B, p. 8-15", "topic": "Corrosion removal & blending"}, {"q": "All dish-outs from corrosion rework must be elliptically shaped with the major axis running which way on a WING?", "options": ["Chordwise (fore and aft)", "Diagonally at 45 degrees", "Vertically", "Spanwise"], "correct": 3, "short": "Spanwise on wings", "expl": "All dish-outs must be elliptically shaped with the major axis running spanwise on wings and horizontal stabilizers, longitudinally on fuselages, and vertically on vertical stabilizers.", "cite": "FAA-H-8083-30B, p. 8-15", "topic": "Corrosion removal & blending"}, {"q": "Corrosion rework depressions are blended into smoothly faired dish-outs using what ratio of LENGTH to DEPTH?", "options": ["20:1", "5:1", "10:1", "50:1"], "correct": 0, "short": "20:1 length-to-depth", "expl": "Rework depressions by forming smoothly blended dish-outs using a ratio of 20:1, length to depth.", "cite": "FAA-H-8083-30B, p. 8-15", "topic": "Corrosion removal & blending"}, {"q": "On the blend-out diagram, the WIDTH of the cleaned-up area is a minimum of how many times the depth?", "options": ["5 times the depth", "10 times the depth", "20 times the depth", "2 times the depth"], "correct": 1, "short": "Width = 10x depth minimum", "expl": "On the blending diagram, the length of the cleaned-up area is 20 times the depth minimum, and the WIDTH of the cleaned-up area is 10 times the depth minimum.", "cite": "FAA-H-8083-30B, p. 8-16", "topic": "Corrosion removal & blending"}, {"q": "Why must steel nut-plates and steel fasteners be REMOVED before blending corrosion out of an aluminum structure?", "options": ["They add unnecessary weight", "They interfere with the paint finish", "Steel or copper particles embedded in aluminum can become a point of future corrosion", "They must be replaced at every inspection"], "correct": 2, "short": "Embedded steel/copper = future corrosion", "expl": "Steel nut-plates and steel fasteners are to be removed before blending corrosion out of aluminum structure, because steel or copper particles embedded in aluminum can become a point of future corrosion.", "cite": "FAA-H-8083-30B, p. 8-15", "topic": "Corrosion removal & blending"}, {"q": "In CRITICAL and highly stressed areas, all pits remaining after corrosion removal must be blended out to prevent what?", "options": ["Paint blistering", "Galvanic coupling", "Filiform tracing", "Stress risers that may cause stress corrosion cracking"], "correct": 3, "short": "Stress risers / stress-corrosion cracking", "expl": "In critical and highly stressed areas, all pits remaining after removal of corrosion products must be blended out to prevent stress risers that may cause stress corrosion cracking. On non-critical structure, blending out every pit is unnecessary.", "cite": "FAA-H-8083-30B, p. 8-15", "topic": "Corrosion removal & blending"}, {"q": "One of the most familiar types of corrosion, ferrous oxide (rust), is described as what kind of coating?", "options": ["NOT a protective coating; it promotes additional attack", "A protective coating that seals the base metal", "An anodic film that resists moisture", "A self-healing oxide"], "correct": 0, "short": "Rust is NOT protective; promotes attack", "expl": "Rust (ferrous oxide) is not a protective coating in any sense; it actually promotes additional attack by attracting moisture from the air and acting as a catalyst for further corrosion. All rust must be removed from steel surfaces.", "cite": "FAA-H-8083-30B, p. 8-15", "topic": "Ferrous / steel treatment"}, {"q": "The MOST practicable means of controlling corrosion of steel is what?", "options": ["Chemical conversion to phosphates", "Complete mechanical removal of corrosion products and restoring corrosion-preventive coatings", "Pickling in sulfuric acid", "Anodizing the steel"], "correct": 1, "short": "Mechanical removal + restore coatings", "expl": "The most practicable means of controlling steel corrosion is the complete removal of corrosion products by mechanical means and restoring corrosion-preventive coatings. Except on highly stressed surfaces, abrasive papers, power buffers, wire brushing, or steel wool are acceptable.", "cite": "FAA-H-8083-30B, p. 8-15", "topic": "Ferrous / steel treatment"}, {"q": "A drawback of abrasive/polishing removal of rust is that residual rust usually remains where, so the part corrodes more easily next time?", "options": ["On flat surfaces", "On the cathodic areas", "In the bottom of small pits and crevices", "Only on bolt heads"], "correct": 2, "short": "In the bottom of pits/crevices", "expl": "In any use of abrasives, residual rust usually remains in the bottom of small pits and crevices. It is practically impossible to remove all corrosion products by abrasive or polishing methods alone, so a once-rusted part usually corrodes again more easily.", "cite": "FAA-H-8083-30B, p. 8-15", "topic": "Ferrous / steel treatment"}, {"q": "The use of chemical corrosion removers on HIGHLY STRESSED steel parts is prohibited without engineering authorization because these parts are subject to what?", "options": ["Filiform corrosion", "Exfoliation", "Whisker growth", "Hydrogen embrittlement"], "correct": 3, "short": "Hydrogen embrittlement", "expl": "The use of chemical corrosion removers is prohibited without engineering authorization because high-strength steel parts are subject to hydrogen embrittlement.", "cite": "FAA-H-8083-30B, p. 8-17", "topic": "Ferrous / steel treatment"}, {"q": "Corrosion products on highly stressed steel parts must be removed with which materials?", "options": ["Mild abrasive papers (rouge or fine grit aluminum oxide) or fine buffing compounds", "Coarse carborundum and steel wire wheels", "Caustic chemical dip", "Sandblasting with steel grit"], "correct": 0, "short": "Mild abrasives / fine buffing compounds", "expl": "Corrosion on highly stressed steel parts must be removed by careful processing using mild abrasive papers such as rouge or fine-grit aluminum oxide, or fine buffing compounds on cloth wheels; nonwoven abrasive pads can also be used. Do not overheat the steel; reapply protective finish immediately.", "cite": "FAA-H-8083-30B, p. 8-17", "topic": "Ferrous / steel treatment"}, {"q": "Why is the use of chemical INHIBITORS on installed steel parts considered not only undesirable but very dangerous?", "options": ["They are too expensive", "Danger of entrapment of corrosive solutions and resulting uncontrolled attack", "They require a special license", "They damage the paint shop equipment"], "correct": 1, "short": "Entrapment risk / uncontrolled attack", "expl": "Chemical inhibitors on installed steel parts are undesirable and dangerous because of the danger of entrapment of corrosive solutions and the resulting uncontrolled attack that could occur under field conditions.", "cite": "FAA-H-8083-30B, p. 8-17", "topic": "Ferrous / steel treatment"}, {"q": "A thin coating of relatively PURE aluminum applied over a base aluminum alloy for corrosion protection is commonly called:", "options": ["Anodize", "Alodine", "Alclad", "Bonderite"], "correct": 2, "short": "Alclad (pure-aluminum cladding)", "expl": "A thin coating of relatively pure aluminum applied over the base alloy is commonly called 'Alclad.' Avoid unnecessary mechanical removal of the protective Alclad layer.", "cite": "FAA-H-8083-30B, p. 8-18", "topic": "Aluminum / Alclad treatment"}, {"q": "Aluminum alloys commonly form a smooth surface oxidation of what thickness that is NOT considered detrimental?", "options": ["0.0001\" to 0.0005\"", "0.005\" to 0.010\"", "0.010\" to 0.020\"", "0.001\" to 0.0025\""], "correct": 3, "short": "0.001\" to 0.0025\" oxide (not harmful)", "expl": "Aluminum alloys commonly form a smooth surface oxidation from 0.001 inch to 0.0025 inch thick. This is not considered detrimental; it provides a hard-shell barrier. It must not be confused with severe corrosion.", "cite": "FAA-H-8083-30B, p. 8-17", "topic": "Aluminum / Alclad treatment"}, {"q": "Corrosion on aluminum surfaces is usually quite OBVIOUS because the corrosion products are what?", "options": ["White and more voluminous than the original base metal", "Reddish-brown and thin", "Greenish and transparent", "Black and tightly adhering"], "correct": 0, "short": "White and voluminous", "expl": "Corrosion on aluminum is usually quite obvious since the products of corrosion are white and generally more voluminous than the original base metal, showing as etching, pitting, or roughness even in early stages.", "cite": "FAA-H-8083-30B, p. 8-17", "topic": "Aluminum / Alclad treatment"}, {"q": "At least three forms of attack on aluminum alloys are particularly serious: penetrating pit-type corrosion of tubing walls, stress-corrosion cracking, and what?", "options": ["Filiform corrosion", "Intergranular corrosion", "Fretting corrosion", "Whisker growth"], "correct": 1, "short": "Intergranular corrosion", "expl": "Three particularly serious forms of attack on aluminum alloys are penetrating pit-type corrosion through tubing walls, stress-corrosion cracking under sustained stress, and intergranular corrosion (characteristic of certain improperly heat-treated alloys).", "cite": "FAA-H-8083-30B, p. 8-17", "topic": "Aluminum / Alclad treatment"}, {"q": "When choosing a cleaner for aluminum, why must you select a NEUTRAL pH product?", "options": ["Acidic products evaporate too fast", "Neutral products dry faster", "Many consumer products are caustic enough to induce corrosion if trapped between aluminum lap joints", "Only neutral products bond to paint"], "correct": 2, "short": "Caustic cleaners trapped in lap joints corrode", "expl": "When choosing an aluminum cleaner, use caution: many commercial consumer products are actually caustic enough to induce corrosion if trapped between aluminum lap joints. Choose a neutral-pH product.", "cite": "FAA-H-8083-30B, p. 8-18", "topic": "Aluminum / Alclad treatment"}, {"q": "Metal polish intended for clad aluminum aircraft surfaces must NOT be used on what, because it would remove the protective film?", "options": ["Bare steel", "Magnesium castings", "Titanium", "Anodized aluminum"], "correct": 3, "short": "Not on anodized aluminum", "expl": "Metal polish intended for clad aluminum surfaces must not be used on anodized aluminum, since it is abrasive enough to remove the protective anodized film. It is effective on unpainted Alclad.", "cite": "FAA-H-8083-30B, p. 8-18", "topic": "Aluminum / Alclad treatment"}, {"q": "When treating superficially corroded aluminum to be PAINTED, a 10 percent solution of which acid (activated by sulfuric acid) is applied?", "options": ["Chromic acid", "Hydrochloric acid", "Phosphoric acid", "Citric acid"], "correct": 0, "short": "10% chromic acid (+ sulfuric)", "expl": "Treat superficially corroded aluminum to be painted with a 10 percent solution of chromic acid and sulfuric acid, applied by swab or brush and scrubbed while damp. Allow chromic acid to remain at least 5 minutes, then flush with water.", "cite": "FAA-H-8083-30B, p. 8-18", "topic": "Aluminum / Alclad treatment"}, {"q": "An inhibitive sodium dichromate / chromium trioxide solution is allowed to remain on a corroded UNPAINTED aluminum area for how long before rinsing?", "options": ["1 to 2 minutes", "5 to 20 minutes", "30 to 45 minutes", "60 minutes"], "correct": 1, "short": "5 to 20 minutes", "expl": "For treating superficial corrosion on unpainted aluminum, allow the sodium dichromate / chromium trioxide solution to remain on the corroded area for 5 to 20 minutes, then remove excess by rinsing and wiping dry.", "cite": "FAA-H-8083-30B, p. 8-18", "topic": "Aluminum / Alclad treatment"}, {"q": "After any corrosion surface treatment, restoration of paint coatings must be done when?", "options": ["Within one week", "Within 30 days", "Immediately / the same day as the surface treatment", "Only after a 24-hour cure"], "correct": 2, "short": "Same day / immediately", "expl": "Restoration of paint coatings must immediately follow any surface treatment. In any case, make sure corrosion treatment is accomplished or reapplied on the SAME DAY that paint refinishing is scheduled.", "cite": "FAA-H-8083-30B, p. 8-18", "topic": "Aluminum / Alclad treatment"}, {"q": "When an ANODIZED coating is damaged in service, it can be restored in what way?", "options": ["Fully restored by re-anodizing in the field", "Restored by polishing alone", "It self-heals and needs no action", "Only partially restored by chemical surface treatment"], "correct": 3, "short": "Only partially, by chemical treatment", "expl": "When an anodized coating is damaged in service, it can only be partially restored by chemical surface treatment. Avoid destroying the oxide film in unaffected areas; do not use steel wool, steel wire brushes, or severe abrasives.", "cite": "FAA-H-8083-30B, p. 8-19", "topic": "Aluminum / Alclad treatment"}, {"q": "When INTERGRANULAR corrosion (including exfoliation) is present in heat-treated aluminum, what cleaning approach is required?", "options": ["More severe cleaning -- mechanical removal of all corrosion products and visible delaminated layers", "Light hand polishing only", "Chemical inhibitor with no mechanical work", "No treatment; monitor only"], "correct": 0, "short": "Severe cleaning; remove delaminated layers", "expl": "More severe cleaning is a must when intergranular corrosion is present. Mechanical removal of all corrosion products and visible delaminated metal layers must be done to determine the extent of destruction and evaluate remaining strength. A DER may assess damage if manufacturer limits are inadequate.", "cite": "FAA-H-8083-30B, p. 8-19", "topic": "Aluminum / Alclad treatment"}, {"q": "Which metal is the MOST chemically active of the metals used in aircraft construction and the most difficult to protect?", "options": ["Aluminum", "Magnesium", "Titanium", "Cadmium"], "correct": 1, "short": "Magnesium", "expl": "Magnesium is the most chemically active of the metals used in aircraft construction and is the most difficult to protect.", "cite": "FAA-H-8083-30B, p. 8-19", "topic": "Magnesium treatment"}, {"q": "Magnesium attack is among the EASIEST corrosion to detect early because its corrosi
