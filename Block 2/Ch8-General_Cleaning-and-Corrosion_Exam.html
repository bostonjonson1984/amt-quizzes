on products do what?", "options": ["Form a thin transparent film", "Turn the surface bright green", "Occupy several times the volume of the original metal", "Disappear when dry"], "correct": 2, "short": "Occupy several times original volume", "expl": "Magnesium attack is probably the easiest type to detect early, since magnesium corrosion products occupy several times the volume of the original metal. Attack shows as a lifting of the paint film and white spots that develop into snow-like mounds or 'white whiskers.'", "cite": "FAA-H-8083-30B, p. 8-19", "topic": "Magnesium treatment"}, {"q": "When mechanically cleaning corroded MAGNESIUM, cleaning must be LIMITED to what tools?", "options": ["Steel wire brushes and carborundum", "Aluminum wool and steel scrapers", "Bronze wool and emery cloth", "Stiff hog-bristle brushes and nonmetallic tools (including nonwoven abrasive pads)"], "correct": 3, "short": "Hog-bristle brushes / nonmetallic tools", "expl": "Limit mechanical cleaning of magnesium to stiff hog-bristle brushes and similar nonmetallic tools (including nonwoven abrasive pads). Steel or aluminum tools, steel/bronze/aluminum wool, or pads used on other metals must NOT be used.", "cite": "FAA-H-8083-30B, p. 8-19", "topic": "Magnesium treatment"}, {"q": "On magnesium, which of the following must NEVER be used, because entrapped particles can cause more trouble than the initial attack?", "options": ["Steel wire brushes, carborundum abrasives, or steel cutting tools", "Nonmetallic brushes", "Chromic acid solution", "Hog-bristle brushes"], "correct": 0, "short": "Steel wire brushes / carborundum / steel tools", "expl": "On magnesium, steel wire brushes, carborundum abrasives, or steel cutting tools must not be used. Entrapment of steel particles can cause more trouble than the initial corrosive attack.", "cite": "FAA-H-8083-30B, p. 8-19", "topic": "Magnesium treatment"}, {"q": "Corroded magnesium is treated liberally with what solution, worked into pits with a NONMETALLIC brush?", "options": ["Sodium dichromate only", "A chromic acid solution with sulfuric acid added", "Phosphoric-citric acid", "Baking soda paste"], "correct": 1, "short": "Chromic acid + sulfuric acid", "expl": "Treat the corroded magnesium area liberally with a chromic acid solution to which sulfuric acid has been added, working it into pits/crevices with a nonmetallic brush. Allow it to remain 5 to 20 minutes, then wipe up the excess with a clean damp cloth; do not let it dry on the surface (it causes paint lifting).", "cite": "FAA-H-8083-30B, p. 8-19", "topic": "Magnesium treatment"}, {"q": "Magnesium CASTINGS, compared with wrought magnesium skins, are generally what?", "options": ["Less porous and more resistant", "Immune to corrosion", "More porous and prone to penetrating attack", "Only corroded externally"], "correct": 2, "short": "More porous; prone to penetrating attack", "expl": "Magnesium castings are generally more porous and prone to penetrating attack than wrought magnesium skins. Engine cases submerged in saltwater overnight can be completely penetrated. Treatment is otherwise the same as for magnesium skin.", "cite": "FAA-H-8083-30B, p. 8-19", "topic": "Magnesium treatment"}, {"q": "Titanium is by nature highly corrosion resistant, but may show deterioration from the presence of what, particularly at high temperatures?", "options": ["Ultraviolet light", "Anodized films", "Dry nitrogen", "Salt deposits and metal impurities"], "correct": 3, "short": "Salt deposits & metal impurities", "expl": "Titanium is highly corrosion resistant by nature but may show deterioration from salt deposits and metal impurities, particularly at high temperatures.", "cite": "FAA-H-8083-30B, p. 8-20", "topic": "Titanium treatment"}, {"q": "For cleaning or removing corrosion from TITANIUM, which of the following is PROHIBITED?", "options": ["Steel wool, iron scrapers, or steel brushes", "Hand polishing with aluminum polish", "Fiber brushes", "A sodium dichromate solution"], "correct": 0, "short": "Steel wool/iron scrapers/steel brushes", "expl": "The use of steel wool, iron scrapers, or steel brushes for cleaning or removing corrosion from titanium is prohibited. Hand polishing with aluminum polish or a mild abrasive using fiber brushes only is permissible.", "cite": "FAA-H-8083-30B, p. 8-20", "topic": "Titanium treatment"}, {"q": "After cleaning titanium and treating with a sodium dichromate solution, the surface is wiped with dry cloths and then what?", "options": ["Rinsed thoroughly with water", "NOT rinsed with water", "Soaked in chromic acid", "Anodized immediately"], "correct": 1, "short": "Do NOT use a water rinse", "expl": "If titanium requires cleaning, hand polish with aluminum polish or a mild abrasive (fiber brushes only), then treat with a suitable solution of sodium dichromate. Wipe the treated surface with dry cloths to remove excess solution, but do NOT use a water rinse.", "cite": "FAA-H-8083-30B, p. 8-20", "topic": "Titanium treatment"}, {"q": "Dissimilar metal contact creates electrolytic action when moisture is present; this action is ACCELERATED when the moisture is what?", "options": ["Distilled water", "Rainwater", "Salt water", "Condensation"], "correct": 2, "short": "Salt water accelerates it", "expl": "Contact of different bare metals creates electrolytic action when moisture is present. If the moisture is salt water, the electrolytic action is accelerated, resulting in oxidation of one or both metals.", "cite": "FAA-H-8083-30B, p. 8-20", "topic": "Dissimilar metal protection"}, {"q": "Dissimilar joints NOT involving magnesium are protected with a minimum of two coats of what?", "options": ["Pure aluminum cladding", "0.003-inch vinyl tape", "Anodize coating", "Zinc chromate or, preferably, epoxy primer"], "correct": 3, "short": "2 coats zinc chromate or epoxy primer", "expl": "All dissimilar joints not involving magnesium are protected by a minimum of two coats of zinc chromate or, preferably, epoxy primer in addition to normal primer, allowed to air dry 6 hours between coats.", "cite": "FAA-H-8083-30B, p. 8-20", "topic": "Dissimilar metal protection"}, {"q": "Primer applied to dissimilar metal joints is allowed to air dry how long between coats?", "options": ["6 hours", "1 hour", "3 hours", "12 hours"], "correct": 0, "short": "6 hours between coats", "expl": "Primer (zinc chromate or epoxy) for dissimilar metal joints is applied by brush or spray and allowed to air dry 6 hours between coats.", "cite": "FAA-H-8083-30B, p. 8-20", "topic": "Dissimilar metal protection"}, {"q": "For dissimilar joints INVOLVING MAGNESIUM, after at least two coats of primer, what is added?", "options": ["A layer of pure aluminum", "A layer of pressure-sensitive vinyl tape 0.003\" thick", "A chromic acid wash", "An anodized film"], "correct": 1, "short": "0.003\" vinyl tape over primer", "expl": "For dissimilar joints involving magnesium, at least two coats of zinc chromate or epoxy primer are applied to each surface, then a layer of pressure-sensitive vinyl tape 0.003 inch thick is applied smoothly and firmly. The tape is not stretched (to avoid creep-back).", "cite": "FAA-H-8083-30B, p. 8-20", "topic": "Dissimilar metal protection"}, {"q": "When tape thickness interferes with assembly, relative motion exists, or service temperature exceeds 250 degrees F, the tape is eliminated and replaced with what?", "options": ["A single thick coat of primer", "A pure-aluminum foil layer", "Extra coats (minimum of three) of primer", "Chromic acid treatment"], "correct": 2, "short": "Minimum of three coats of primer", "expl": "When tape thickness interferes with assembly, relative motion exists between parts, or service temperatures above 250 degrees F are anticipated, the vinyl tape is eliminated and extra coats (minimum of three) of primer are applied.", "cite": "FAA-H-8083-30B, p. 8-20", "topic": "Dissimilar metal protection"}, {"q": "Corrosion damage is classified under how many standard damage types?", "options": ["Two", "Three", "Five", "Four"], "correct": 3, "short": "Four standard damage types", "expl": "Corrosion damage is classified under the four standard damage types: negligible damage, damage repairable by patching, damage repairable by insertion, and damage necessitating replacement of parts.", "cite": "FAA-H-8083-30B, p. 8-20", "topic": "Corrosion limits"}, {"q": "The term 'negligible' corrosion damage means what?", "options": ["The surface must still be cleaned, treated, and painted as appropriate", "Nothing needs to be done", "The part must be replaced", "An engineer must approve any action"], "correct": 0, "short": "Still must clean, treat, and paint", "expl": "The term 'negligible' does not imply that little or nothing is to be done. The corroded surface must be cleaned, treated, and painted as appropriate. Negligible damage is corrosion that has scarred or eaten the protective coats and begun to etch the metal.", "cite": "FAA-H-8083-30B, p. 8-20", "topic": "Corrosion limits"}, {"q": "When corrosion damage exceeds the limits to the extent that repair is NOT possible, the technician must:", "options": ["Apply more primer and continue use", "Replace the component or structure", "Reduce the inspection interval", "Re-anodize the area"], "correct": 1, "short": "Replace the component/structure", "expl": "When corrosion damage exceeds the damage limits to the extent that repair is not possible, the component or structure must be replaced.", "cite": "FAA-H-8083-30B, p. 8-21", "topic": "Corrosion limits"}, {"q": "The MAIN purpose of the surface finishes applied to aircraft parts by the manufacturer is to provide what?", "options": ["Decorative appearance", "Reduced weight", "Corrosion resistance", "Electrical conductivity"], "correct": 2, "short": "Corrosion resistance", "expl": "Aircraft parts are almost always given a surface finish by the manufacturer; the main purpose is to provide corrosion resistance, though finishes may also increase wear resistance or provide a paint base.", "cite": "FAA-H-8083-30B, p. 8-21", "topic": "Metal finishing & surface prep"}, {"q": "Between mechanical and chemical cleaning for surface preparation, which is PREFERRED, because none of the base metal is removed?", "options": ["Mechanical cleaning", "Vapor blasting", "Wire brushing", "Chemical cleaning"], "correct": 3, "short": "Chemical cleaning (no base metal removed)", "expl": "Chemical cleaning is preferred over mechanical since none of the base metal is removed by cleaning. The type used depends on the material and the foreign matter being removed.", "cite": "FAA-H-8083-30B, p. 8-21", "topic": "Metal finishing & surface prep"}, {"q": "Steel parts are PICKLED (before plating) using which acid solutions?", "options": ["Muriatic (hydrochloric) or sulfuric acid", "Chromic or phosphoric acid", "Citric or acetic acid", "Nitric or hydrofluoric acid"], "correct": 0, "short": "Muriatic (HCl) or sulfuric acid", "expl": "Steel parts are pickled to remove scale, rust, or foreign matter before plating. The pickling solution can be muriatic (hydrochloric) or sulfuric acid. Sulfuric is cheaper; muriatic is more effective on certain scale. Non-plated parts are then neutralized in a lime bath.", "cite": "FAA-H-8083-30B, p. 8-21", "topic": "Metal finishing & surface prep"}, {"q": "Electrocleaning removes grease, oil, or organic matter by suspending the metal in a hot alkaline solution and doing what?", "options": ["Boiling it in acid", "Passing an electric current through the solution", "Blasting it with abrasive media", "Dipping it in a lime bath"], "correct": 1, "short": "Passing electric current (like electroplating)", "expl": "Electrocleaning suspends the metal in a hot alkaline solution with wetting agents, inhibitors, and conductivity materials, then passes an electric current through the solution in a manner similar to electroplating.", "cite": "FAA-H-8083-30B, p. 8-21", "topic": "Metal finishing & surface prep"}, {"q": "Blast cleaning using abrasive media is NOT applicable to which material?", "options": ["Thick steel plate", "Cast iron", "Thin aluminum sheets, particularly Alclad", "Titanium forgings"], "correct": 2, "short": "Thin aluminum sheet / Alclad", "expl": "Blast cleaning using abrasive media is not applicable to thin aluminum sheets, particularly Alclad. Steel grits are not used on aluminum or corrosion-resistant metals.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Metal finishing & surface prep"}, {"q": "ANODIZING is the most common surface treatment of which surfaces?", "options": ["Clad aluminum surfaces", "Magnesium castings", "Steel fasteners", "Nonclad aluminum alloy surfaces"], "correct": 3, "short": "Nonclad aluminum alloy surfaces", "expl": "Anodizing is the most common surface treatment of nonclad aluminum alloy surfaces. The aluminum is the positive pole in an electrolytic bath where chromic acid or another oxidizing agent produces an aluminum oxide film.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Chemical treatments & finishes"}, {"q": "In the anodizing process, the aluminum alloy part serves as which pole in the electrolytic bath?", "options": ["The positive pole", "The negative pole", "A neutral electrode", "An insulator"], "correct": 0, "short": "The positive pole", "expl": "In anodizing, the aluminum alloy sheet or casting is the positive pole in an electrolytic bath in which chromic acid or other oxidizing agent produces an aluminum oxide film. Anodizing increases the thickness and density of the natural oxide film.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Chemical treatments & finishes"}, {"q": "The anodized coating provides excellent corrosion resistance, but the coating itself is described as what?", "options": ["Hard and scratch-resistant", "Soft and easily scratched", "An excellent electrical conductor", "Impossible to paint over"], "correct": 1, "short": "Soft and easily scratched", "expl": "The anodic coating provides excellent corrosion resistance, but the coating is soft and easily scratched, requiring extreme caution when handling prior to priming. It is also a poor conductor, so it is removed where bonding wires attach.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Chemical treatments & finishes"}, {"q": "Which approved tools may be used to clean ANODIZED surfaces?", "options": ["Steel wool and steel wire brushes", "Carborundum paper", "Aluminum wool, aluminum-oxide-impregnated nylon webbing, fine nonwoven abrasive pads, or fiber bristle brushes", "Emery cloth"], "correct": 2, "short": "Aluminum wool / nylon webbing / fine pads / fiber brushes", "expl": "Approved tools for cleaning anodized surfaces are aluminum wool, nylon webbing impregnated with aluminum oxide abrasive, fine-grade nonwoven abrasive pads, or fiber bristle brushes. Steel wool, steel wire brushes, and harsh abrasives are prohibited on any aluminum surface.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Chemical treatments & finishes"}, {"q": "A simple chemical treatment for ALL aluminum alloys that increases corrosion resistance and improves paint bonding, and is rapidly REPLACING anodizing in aircraft work, is:", "options": ["Pickling", "Electrocleaning", "Shot peening", "Alodizing"], "correct": 3, "short": "Alodizing", "expl": "Alodizing is a simple chemical treatment for all aluminum alloys to increase corrosion resistance and improve paint bonding. Because of its simplicity, it is rapidly replacing anodizing in aircraft work.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Chemical treatments & finishes"}, {"q": "In the alodizing process, after precleaning, the parts are rinsed with fresh water under pressure for how long?", "options": ["10 to 15 seconds", "5 seconds", "30 to 60 seconds", "2 minutes"], "correct": 0, "short": "10 to 15 seconds rinse", "expl": "In alodizing, after precleaning with an acidic or alkaline cleaner, the parts are rinsed with fresh water under pressure for 10 to 15 seconds before Bonderite is applied.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Chemical treatments & finishes"}, {"q": "A chromic acid inhibitor effective for treating exposed or corroded aluminum is what strength, activated by a small amount of sulfuric acid?", "options": ["1 percent chromic acid", "10 percent chromic acid", "5 percent chromic acid", "25 percent chromic acid"], "correct": 1, "short": "10% chromic acid (+ sulfuric)", "expl": "A 10 percent solution by weight of chromic acid, activated by a small amount of sulfuric acid, is particularly effective for treating exposed or corroded aluminum (and may also treat magnesium). Follow with regular paint finishes the same day.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Chemical treatments & finishes"}, {"q": "Chromium trioxide flake, used in chromic acid treatment, is a powerful oxidizing agent and must be stored how?", "options": ["Next to paint thinners for convenience", "In a sealed water bath", "Away from organic solvents and other combustibles", "With acetone for stability"], "correct": 2, "short": "Away from organic solvents/combustibles", "expl": "Chromium trioxide flake is a powerful oxidizing agent and fairly strong acid; it must be stored away from organic solvents and other combustibles. Wiping cloths used in chromic acid pickup must be thoroughly rinsed or disposed of.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Chemical treatments & finishes"}, {"q": "A LESS ACTIVE chemical mixture for surface treatment of aluminum, whose entrapped solutions are less likely to corrode the metal than chromic acid inhibitor, is:", "options": ["Phosphoric-citric acid", "Muriatic acid", "Baking soda", "Sodium dichromate and chromic acid solution"], "correct": 3, "short": "Sodium dichromate + chromic acid", "expl": "A less active mixture for surface treatment of aluminum is a solution of sodium dichromate and chromic acid. Entrapped solutions of this mixture are less likely to corrode metal surfaces than chromic acid inhibitor solutions.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Chemical treatments & finishes"}, {"q": "The handbook states that the MOST effective barrier between metal surfaces and corrosive media is:", "options": ["A good, intact paint finish", "An anodized film", "A layer of grease", "An Alclad coating"], "correct": 0, "short": "A good, intact paint finish", "expl": "A good, intact paint finish is the most effective barrier between metal surfaces and corrosive media. Common finishes include catalyzed polyurethane enamel, waterborne polyurethane enamel, and two-part epoxy paint.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Chemical treatments & finishes"}, {"q": "Which paint systems have INCREASED in popularity as VOC-emission regulations have taken effect?", "options": ["Nitrate dope systems", "Waterborne paint systems", "Lacquer systems", "Lead-based enamels"], "correct": 1, "short": "Waterborne paint systems", "expl": "As new VOC-emission regulations take effect, the use of waterborne paint systems has increased in popularity. Nitrate and butyrate dope finishes remain available for fabric-covered aircraft.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Chemical treatments & finishes"}, {"q": "Which is a reason the handbook gives that keeping an aircraft clean matters?", "options": ["It increases resale value only", "It is required by Part 91 before every flight", "Dirt can hide cracks in the skin, and a film of dirt reduces flying speed and adds weight", "It eliminates scheduled inspections"], "correct": 2, "short": "Dirt hides cracks; reduces speed; adds weight", "expl": "Keeping the aircraft clean means more accurate inspections: a cracked landing gear fitting covered with mud may be overlooked, dirt can hide cracks in the skin, and a film of dirt reduces flying speed and adds extra weight.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Aircraft cleaning purpose & agents"}, {"q": "The FOUR general types of cleaning agents used on aircraft are solvents, emulsion cleaners, soaps, and what?", "options": ["Chromic acid", "Caustic alkalies", "Abrasive compounds", "Synthetic detergents"], "correct": 3, "short": "Solvents, emulsion, soaps, synthetic detergents", "expl": "The types of cleaning agents used on aircraft are solvents, emulsion cleaners, soaps, and synthetic detergents.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Aircraft cleaning purpose & agents"}, {"q": "Which cleaners are classed as LIGHT-duty, and must be used whenever possible because they are nontoxic and nonflammable?", "options": ["Soap and synthetic detergent-type cleaners", "Solvent and emulsion-type cleaners", "Chlorinated solvents", "Phenolic-base cleaners"], "correct": 0, "short": "Soap & synthetic detergent (light-duty)", "expl": "Soap and synthetic detergent-type cleaners are light-duty; solvent and emulsion-type cleaners are heavy-duty. The light-duty cleaners that are nontoxic and nonflammable must be used whenever possible.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Aircraft cleaning purpose & agents"}, {"q": "An alkaline cleaner that is not rinsed and neutralized may cause corrosion where on riveted or spot-welded sheet metal?", "options": ["On the exterior paint", "Within the lap joints", "On the anodized film only", "On the fasteners only"], "correct": 1, "short": "Within the lap joints", "expl": "Cleaners that can be effectively rinsed and neutralized must be used, or an alkaline cleaner may cause corrosion within the lap joints of riveted or spot-welded sheet metal components.", "cite": "FAA-H-8083-30B, p. 8-22", "topic": "Aircraft cleaning purpose & agents"}, {"q": "What are the THREE methods of cleaning the aircraft EXTERIOR?", "options": ["Steam, vacuum, and chemical", "Soak, scrub, and rinse", "Wet wash, dry wash, and polishing", "Brush, spray, and wipe"], "correct": 2, "short": "Wet wash, dry wash, polishing", "expl": "The three methods of cleaning the aircraft exterior are wet wash, dry wash, and polishing. Polishing can be further broken into hand polishing and mechanical polishing.", "cite": "FAA-H-8083-30B, p. 8-23", "topic": "Exterior cleaning methods"}, {"q": "WET WASH removes oil, grease, carbon deposits, and most soils EXCEPT what?", "options": ["Dust and airport film", "Salt deposits", "Light surface dirt", "Corrosion and oxide films"], "correct": 3, "short": "Except corrosion and oxide films", "expl": "Wet wash removes oil, grease, carbon deposits, and most soils, with the exception of corrosion and oxide films. Cleaning compounds are applied by spray or mop, then rinsed with high-pressure running water (alkaline or emulsion cleaners).", "cite": "FAA-H-8083-30B, p. 8-23", "topic": "Exterior cleaning methods"}, {"q": "DRY WASH is used to remove airport film, dust, and small dirt accumulations when liquids are not desirable; it is NOT suitable for what?", "options": ["Removing heavy carbon, grease, or oil deposits, especially in exhaust areas", "Removing light dust", "Cleaning windows", "Cleaning fabric surfaces"], "correct": 0, "short": "Not for heavy carbon/grease/oil", "expl": "Dry wash removes airport film, dust, and small accumulations when liquids are neither desirable nor practical, but is NOT suitable for heavy deposits of carbon, grease, or oil, especially in engine exhaust areas.", "cite": "FAA-H-8083-30B, p. 8-24", "topic": "Exterior cleaning methods"}, {"q": "Besides restoring luster, POLISHING is also used to remove what?", "options": ["Paint film", "Oxidation and corrosion", "Sealant", "Rivets"], "correct": 1, "short": "Oxidation and corrosion", "expl": "Polishing restores the luster to painted and unpainted surfaces and is also used to remove oxidation and corrosion. Polishing materials come in various forms and degrees of abrasiveness; follow the manufacturer's instructions.", "cite": "FAA-H-8083-30B, p. 8-24", "topic": "Exterior cleaning methods"}, {"q": "Washing of aircraft should be performed where whenever possible, to prevent compounds from streaking the surface?", "options": ["In direct sunlight", "On hot metal", "In the shade", "Inside a heated hangar"], "correct": 2, "short": "In the shade", "expl": "Washing should be performed in the shade whenever possible, because cleaning compounds tend to streak the surface if applied to hot metal or allowed to dry on the area.", "cite": "FAA-H-8083-30B, p. 8-24", "topic": "Exterior cleaning methods"}, {"q": "During washing, particular attention must be paid to protecting which components from water/cleaner entry?", "options": ["Wing tips and antennas", "Landing gear doors", "Wheel brakes", "Instrument system components such as pitot-static fittings and ports"], "correct": 3, "short": "Pitot-static fittings and ports", "expl": "Install covers over all openings where water or cleaners might enter and cause damage. Pay particular attention to instrument system components, such as pitot-static fittings and ports.", "cite": "FAA-H-8083-30B, p. 8-24", "topic": "Exterior cleaning methods"}, {"q": "Flat-finish painted areas (such as those housing radar or forward of the flight deck) must be cleaned how?", "options": ["Not cleaned more than necessary, and never scrubbed with stiff brushes or coarse rags", "Scrubbed with stiff brushes", "Polished with mechanical buffers", "Cleaned only with MEK"], "correct": 0, "short": "Minimal cleaning; no stiff brushes", "expl": "Flat-finish painted areas must not be cleaned more than necessary and never scrubbed with stiff brushes or coarse rags. Use a soft sponge or cheesecloth with minimal manual rubbing; rinse immediately.", "cite": "FAA-H-8083-30B, p. 8-24", "topic": "Exterior cleaning methods"}, {"q": "Before applying soap and water to PLASTIC surfaces, the surfaces should first be flushed with what?", "options": ["Acetone", "Fresh water", "Naphtha", "Kerosene"], "correct": 1, "short": "Flush with fresh water first", "expl": "Before applying soap and water to plastic surfaces, flush them with fresh water to dissolve salt deposits and wash away dust particles. Then wash with soap and water, preferably by hand.", "cite": "FAA-H-8083-30B, p. 8-24", "topic": "Plastics & tires cleaning"}, {"q": "Why should plastic windows NOT be rubbed with a DRY cloth?", "options": ["It leaves lint", "It dissolves the plastic", "It can cause scratches and builds an electrostatic charge that attracts dust", "It removes the tint"], "correct": 2, "short": "Scratches + static charge attracts dust", "expl": "In view of the soft surface, do not rub plastic with a dry cloth, since it is likely to cause scratches and also builds an electrostatic charge that attracts dust. Remove the charge and dust by gently blotting with a clean damp chamois.", "cite": "FAA-H-8083-30B, p. 8-24", "topic": "Plastics & tires cleaning"}, {"q": "Which materials must NOT be used on aircraft PLASTIC surfaces because they soften the plastic and cause crazing?", "options": ["Soap and water", "A clean damp chamois", "Plastic polish for aircraft windows", "Acetone, benzene, gasoline, or lacquer thinners"], "correct": 3, "short": "Acetone/benzene/gasoline/lacquer thinner", "expl": "Do not use acetone, benzene, carbon tetrachloride, lacquer thinners, window cleaning sprays, gasoline, fire extinguisher fluid, or deicer fluid on plastics, because they soften the plastic and cause crazing.", "cite": "FAA-H-8083-30B, p. 8-24", "topic": "Plastics & tires cleaning"}, {"q": "Surface oil, grease, or fuel can be removed from aircraft TIRES by washing with what?", "options": ["A mild soap solution", "Kerosene", "MEK", "Chromic acid"], "correct": 0, "short": "A mild soap solution", "expl": "Surface oil, hydraulic fluid, grease, or fuel can be removed from aircraft tires by washing with a mild soap solution. After cleaning, lubricate grease fittings and hinges where grease may have been removed or diluted.", "cite": "FAA-H-8083-30B, p. 8-24", "topic": "Plastics & tires cleaning"}, {"q": "Corrosion can establish itself on the INSIDE structure to a greater degree because:", "options": ["The interior is always wetter", "It is difficult to reach some areas for cleaning", "The interior has no paint", "Interior metals are more active"], "correct": 1, "short": "Hard to reach areas for cleaning", "expl": "Keeping the interior clean is just as important as the exterior. Corrosion can establish itself on the inside structure to a greater degree because it is difficult to reach some areas for cleaning. Dropped nuts, bolts, and wire combined with moisture cause electrolytic corrosion.", "cite": "FAA-H-8083-30B, p. 8-24", "topic": "Interior cleaning & cabin fire safety"}, {"q": "When cleaning aircraft cabins, the principal hazard from indiscriminate use of flammable cleaning agents is:", "options": ["Excessive water damage", "Static discharge to avionics", "Restricted ventilation and quick buildup of flammable vapor/air mixtures", "Damage to seat fabrics"], "correct": 2, "short": "Flammable vapor buildup in small enclosure", "expl": "Aircraft cabins are relatively small enclosures; restricted ventilation and quick buildup of flammable vapor/air mixtures can occur with any indiscriminate use of flammable cleaning agents or solvents, with possible ignition sources nearby. Use nonflammable agents wherever possible.", "cite": "FAA-H-8083-30B, p. 8-24", "topic": "Interior cleaning & cabin fire safety"}, {"q": "When cleaning seat materials, why must only the necessary amount of water be used?", "options": ["To save water", "Water causes static buildup", "Water dissolves the seat foam", "Water laced with leached fire-retardant salts can induce corrosion of aluminum seat frames and rails"], "correct": 3, "short": "Leached fire-retardant salts corrode Al frames", "expl": "Care is needed to prevent leaching of water-soluble fire-retardant salts. Allowing water laced with fire-retardant salts to contact the aluminum framework of seats and seat rails can induce corrosion, so use only the necessary amount of water.", "cite": "FAA-H-8083-30B, p. 8-25", "topic": "Interior cleaning & cabin fire safety"}, {"q": "Which are examples of NONFLAMMABLE dry cleaning agents that still carry a toxicity hazard?", "options": ["Perchlorethylene and trichlorethylene", "Acetone and MEK", "AVGAS and naphtha", "Toluol and benzene"], "correct": 0, "short": "Perchlorethylene & trichlorethylene", "expl": "Perchlorethylene and trichlorethylene used at ambient temperatures are examples of nonflammable dry cleaning agents. They do have a toxicity hazard requiring care, and their use may be restricted by environmental laws.", "cite": "FAA-H-8083-30B, p. 8-25", "topic": "Interior cleaning & cabin fire safety"}, {"q": "Accumulation of flammable vapors above what percent of the lower flammability limit (measured 5 feet from the point of use) requires emergency revision of operations?", "options": ["10 percent", "25 percent", "50 percent", "75 percent"], "correct": 1, "short": "25 percent of lower flammability limit", "expl": "The accumulation of flammable vapors above 25 percent of the lower flammability limit of the vapor being used, measured at a point 5 feet from the location of use, shall result in emergency revisions of operations in progress.", "cite": "FAA-H-8083-30B, p. 8-26", "topic": "Interior cleaning & cabin fire safety"}, {"q": "The flammable-vapor 25 percent threshold during cabin cleaning is measured at a point how far from the location of use?", "options": ["1 foot", "3 feet", "5 feet", "10 feet"], "correct": 2, "short": "5 feet from point of use", "expl": "The 25 percent of lower flammability limit threshold is measured at a point 5 feet from the location of use.", "cite": "FAA-H-8083-30B, p. 8-26", "topic": "Interior cleaning & cabin fire safety"}, {"q": "Hand-portable electrical equipment used within an aircraft cabin during cleaning must be approved for use in which hazardous location class/group?", "options": ["Class II, Group E", "Class III, Group F", "Class I, Group A", "Class I, Group D"], "correct": 3, "short": "Class I, Group D", "expl": "Electrical equipment of a hand-portable nature used within an aircraft cabin shall be of the type approved for use in Class I, Group D, Hazardous Locations as defined by the National Electrical Code.", "cite": "FAA-H-8083-30B, p. 8-26", "topic": "Interior cleaning & cabin fire safety"}, {"q": "For cleaning OUTSIDE the hangar, portable fire extinguishers at cabin entrances must have a minimum rating of what?", "options": ["20-B", "10-B", "4-A", "2-A"], "correct": 0, "short": "20-B minimum", "expl": "During cleaning/refurbishing of an aircraft outside the hangar, portable fire extinguishers at cabin entrances must have a minimum rating of 20-B. An alternate is a Class A extinguisher rated 4-A or a Class B rated 20-B at cabin doors.", "cite": "FAA-H-8083-30B, p. 8-26", "topic": "Interior cleaning & cabin fire safety"}, {"q": "Why are all-purpose ABC (dry chemical) fire extinguishers NOT to be used where aluminum corrosion is a problem?", "options": ["They are ineffective on Class B fires", "The dry-chemical residue is corrosive to aluminum if the extinguisher is used", "They are too heavy to carry", "They release toxic fumes"], "correct": 1, "short": "Dry-chemical residue corrodes aluminum", "expl": "All-purpose ABC (dry chemical) type extinguishers are not to be used in situations where aluminum corrosion is a problem, because of the corrosive residue left if the extinguisher is used.", "cite": "FAA-H-8083-30B, p. 8-26", "topic": "Interior cleaning & cabin fire safety"}, {"q": "Why is cleaning the powerplant important regarding cooling?", "options": ["Grease improves cooling", "Dirt increases airflow", "Grease and dirt accumulations insulate an air-cooled engine against the cooling effect of airflow", "Cleaning has no cooling effect"], "correct": 2, "short": "Grease/dirt insulate against cooling airflow", "expl": "Grease and dirt accumulations on an air-cooled engine provide effective insulation against the cooling effect of air flowing over it, and can also cover up cracks or other defects.", "cite": "FAA-H-8083-30B, p. 8-26", "topic": "Powerplant & propeller cleaning"}, {"q": "When cleaning an engine, begin at the top and wash down the engine and accessories with a fine spray of what?", "options": ["High-pressure water", "Chromic acid solution", "Baking soda paste", "Kerosene or solvent"], "correct": 3, "short": "Fine spray of kerosene or solvent", "expl": "When cleaning an engine, open or remove the cowling, and beginning with the top, wash down the engine and accessories with a fine spray of kerosene or solvent. A bristle brush may help clean some surfaces.", "cite": "FAA-H-8083-30B, p. 8-26", "topic": "Powerplant & propeller cleaning"}, {"q": "Except in the process of etching, what type of material must NOT be used on a PROPELLER?", "options": ["Caustic material", "Fresh water", "Approved cleaning solvent", "Mild soap"], "correct": 0, "short": "Caustic material (except etching)", "expl": "Fresh water, soap, and approved cleaning solvents may be used on propeller and rotor blades. Except in the process of etching, caustic material must not be used on a propeller. Scrapers, power buffers, steel brushes, or any tool that mars or scratches must not be used on propeller blades.", "cite": "FAA-H-8083-30B, p. 8-26", "topic": "Powerplant & propeller cleaning"}, {"q": "STEEL propeller blades compared with aluminum alloy blades have what abrasion/corrosion characteristic?", "options": ["Less resistance to abrasion and corrosion", "More resistance to abrasion and corrosion", "Identical resistance", "No corrosion resistance at all"], "correct": 1, "short": "Steel blades = more resistance", "expl": "Steel propeller blades have more resistance to abrasion and corrosion than aluminum alloy blades. Steel blades, if rubbed down with oil after each flight, retain a smooth surface for a long time.", "cite": "FAA-H-8083-30B, p. 8-26", "topic": "Powerplant & propeller cleaning"}, {"q": "Why is keeping a propeller blade surface wiped with OIL considered a safety feature?", "options": ["It increases blade strength", "It prevents the blade from overheating", "Cracks become filled with oil that oxidizes, helping make cracks more obvious", "It balances the propeller"], "correct": 2, "short": "Oil-filled cracks show up on inspection", "expl": "Cracks in steel or aluminum alloy blades can become filled with oil that oxidizes and is readily seen on inspection. Keeping the surface wiped with oil serves as a safety feature by helping make cracks more obvious.", "cite": "FAA-H-8083-30B, p. 8-27", "topic": "Powerplant & propeller cleaning"}, {"q": "After cleaning and polishing propeller parts, the blades must be coated with what?", "options": ["Chromic acid", "Zinc chromate primer", "Wax", "Clean engine oil"], "correct": 3, "short": "Clean engine oil", "expl": "After rinsing all cleaning substances from propeller parts, all surfaces must be dried and coated with clean engine oil. Steel hubs are cleaned with soap and fresh water or approved solvent, avoiding tools that scratch the plating.", "cite": "FAA-H-8083-30B, p. 8-27", "topic": "Powerplant & propeller cleaning"}, {"q": "HIGH flash point solvents (such as Stoddard solvent) are stable products having a flash point in what range?", "options": ["100 to 140 degrees F", "24 to 80 degrees F", "80 to 100 degrees F", "140 to 200 degrees F"], "correct": 0, "short": "100 to 140 degrees F", "expl": "High flash point solvents are stable products having a flash point from 100 degrees F to 140 degrees F, with a comparatively low degree of toxicity.", "cite": "FAA-H-8083-30B, p. 8-25", "topic": "Solvents & flash points"}, {"q": "LOW flash point Class I flammable liquids have a flash point BELOW what temperature, and are NOT to be used for aircraft cleaning?", "options": ["80 degrees F", "100 degrees F", "105 degrees F", "140 degrees F"], "correct": 1, "short": "Below 100 degrees F (Class I)", "expl": "Class I flammable liquids (flash point below 100 degrees F) are not to be used for aircraft cleaning or refurbishing. If a flammable liquid is absolutely necessary, use high flash point liquids (100 degrees F or more).", "cite": "FAA-H-8083-30B, p. 8-25", "topic": "Solvents & flash points"}, {"q": "Which of the following is an example of a Class I (low flash point) flammable liquid that must NOT be used for aircraft cleaning?", "options": ["Stoddard solvent", "Aliphatic naphtha (used with care)", "Methyl ethyl ketone (MEK)", "Water emulsion cleaner"], "correct": 2, "short": "MEK (also acetone, AVGAS, naphtha, toluol)", "expl": "Common Class I materials include acetone, aviation gasoline (AVGAS), methyl ethyl ketone, naphtha, and toluol -- all flash below 100 degrees F and are not to be used for aircraft cleaning.", "cite": "FAA-H-8083-30B, p. 8-25", "topic": "Solvents & flash points"}, {"q": "In general, solvent cleaners used in aircraft cleaning must have a flashpoint of NOT LESS than what, if explosion-proofing and special precautions are to be avoided?", "options": ["75 degrees F", "100 degrees F", "140 degrees F", "105 degrees F"], "correct": 3, "short": "Not less than 105 degrees F", "expl": "In general, solvent cleaners used in aircraft cleaning must have a flashpoint of not less than 105 degrees F if explosion proofing of equipment and special precautions are to be avoided. Chlorinated solvents meet the nonflammable requirement but are toxic.", "cite": "FAA-H-8083-30B, p. 8-27", "topic": "Solvents & flash points"}, {"q": "Which solvent is the MOST common petroleum-base solvent used in aircraft cleaning, with a flashpoint slightly above 105 degrees F?", "options": ["Stoddard (dry cleaning) solvent", "Kerosene", "Methyl ethyl ketone", "Aromatic naphtha"], "correct": 0, "short": "Stoddard (dry cleaning) solvent", "expl": "Stoddard solvent is the most common petroleum-base solvent used in aircraft cleaning. Its flashpoint is slightly above 105 degrees F; it removes grease, oils, or light soils and is preferable to kerosene, though it leaves a slight residue on evaporation.", "cite": "FAA-H-8083-30B, p. 8-27", "topic": "Solvents & flash points"}, {"q": "At what approximate temperature does ALIPHATIC NAPHTHA flash, requiring it to be used with care?", "options": ["24 degrees F", "80 degrees F", "105 degrees F", "140 degrees F"], "correct": 1, "short": "About 80 degrees F", "expl": "Aliphatic naphtha (recommended for wipe-down of cleaned surfaces just before painting and usable for cleaning acrylics and rubber) flashes at approximately 80 degrees F and must be used with care.", "cite": "FAA-H-8083-30B, p. 8-27", "topic": "Solvents & flash points"}, {"q": "AROMATIC naphtha differs from aliphatic naphtha in that aromatic naphtha is:", "options": ["Nonflammable and safe on plastics", "Recommended for wipe-down before painting", "Toxic and attacks acrylics and rubber products", "Identical and interchangeable"], "correct": 2, "short": "Toxic; attacks acrylics & rubber", "expl": "Aromatic naphtha must not be confused with the aliphatic material. It is toxic, attacks acrylics and rubber products, and must be used with adequate controls.", "cite": "FAA-H-8083-30B, p. 8-27", "topic": "Solvents & flash points"}, {"q": "What is the approximate flashpoint of Methyl Ethyl Ketone (MEK)?", "options": ["About 80 degrees F", "About 105 degrees F", "About 140 degrees F", "About 24 degrees F"], "correct": 3, "short": "About 24 degrees F", "expl": "MEK is a very active solvent and metal cleaner with a flashpoint of about 24 degrees F. It is toxic when inhaled and has largely been replaced by safer, more environmentally friendly solvents.", "cite": "FAA-H-8083-30B, p. 8-27", "topic": "Solvents & flash points"}, {"q": "A very active solvent and paint stripper for small areas, with a flashpoint of about 24 degrees F and toxic when inhaled, is:", "options": ["Methyl Ethyl Ketone (MEK)", "Stoddard solvent", "Kerosene", "Aliphatic naphtha"], "correct": 0, "short": "MEK (24 degrees F flashpoint)", "expl": "MEK has a flashpoint of about 24 degrees F and is a very active solvent, metal cleaner, and paint stripper for small areas. This is the reverse-direction version of the MEK flashpoint fact.", "cite": "FAA-H-8083-30B, p. 8-27", "topic": "Solvents & flash points"}, {"q": "Safety solvent, trichloroethane (methyl chloroform), is used for general cleaning and grease removal as a replacement for which material?", "options": ["Kerosene", "Carbon tetrachloride", "Stoddard solvent", "Aliphatic naphtha"], "correct": 1, "short": "Replacement for carbon tetrachloride", "expl": "Safety solvent, trichloroethane (methyl chloroform), is used for general cleaning and grease removal. It is nonflammable under ordinary circumstances and is used as a replacement for carbon tetrachloride. Prolonged use can cause dermatitis.", "cite": "FAA-H-8083-30B, p. 8-27", "topic": "Solvents & flash points"}, {"q": "KEROSENE is mixed with solvent emulsion-type cleaners for what purpose?", "options": ["Increasing the flash point", "Neutralizing acid", "Softening heavy preservative coatings", "Polishing aluminum"], "correct": 2, "short": "Softening heavy preservative coatings", "expl": "Kerosene is mixed with solvent emulsion-type cleaners for softening heavy preservative coatings. It does not evaporate as fast as dry cleaning solvent and leaves an appreciable, possibly corrosive film, so its use must be followed by another protective coating or rinse.", "cite": "FAA-H-8083-30B, p. 8-27", "topic": "Solvents & flash points"}, {"q": "Which solvent's use is specifically to be AVOIDED among chlorinated solvents because of its toxicity?", "options": ["Stoddard solvent", "Aliphatic naphtha", "Kerosene", "Carbon tetrachloride"], "correct": 3, "short": "Carbon tetrachloride (avoid)", "expl": "Chlorinated solvents of all types meet the nonflammable requirement but are toxic; safety precautions must be observed, and the use of carbon tetrachloride is to be avoided.", "cite": "FAA-H-8083-30B, p. 8-27", "topic": "Solvents & flash points"}, {"q": "Which cleaning compounds are approved for use in the OXYGEN system?", "options": ["Anhydrous (waterless) ethyl alcohol or isopropyl alcohol", "Kerosene or Stoddard solvent", "Methyl ethyl ketone or acetone", "Chromic acid or sodium dichromate"], "correct": 0, "short": "Anhydrous ethyl or isopropyl alcohol", "expl": "Cleaning compounds for the oxygen system are anhydrous (waterless) ethyl alcohol or isopropyl (anti-icing fluid) alcohol, used to clean accessible components such as crew masks and lines.", "cite": "FAA-H-8083-30B, p. 8-27", "topic": "Oxygen system cleaning"}, {"q": "When cleaning oxygen equipment, you must NOT use any cleaning compound that may do what?", "options": ["Evaporate quickly", "Leave an oily film", "Contain alcohol", "Remove salt deposits"], "correct": 1, "short": "Leave an oily film", "expl": "Do not use any cleaning compounds that may leave an oily film when cleaning oxygen equipment. Fluids must not be put into tanks or regulators. Follow the manufacturer's instructions at all times.", "cite": "FAA-H-8083-30B, p. 8-27", "topic": "Oxygen system cleaning"}, {"q": "Solvent emulsion compounds are particularly useful for removing what?", "options": ["Salt films", "Surface oxidation only", "Heavy deposits such as carbon, grease, oil, or tar", "Anodized coatings"], "correct": 2, "short": "Heavy carbon/grease/oil/tar deposits", "expl": "Solvent and water emulsion compounds are used in general aircraft cleaning. Solvent emulsions are particularly useful for removing heavy deposits such as carbon, grease, oil, or tar; used per instructions they do not affect good paint coatings.", "cite": "FAA-H-8083-30B, p. 8-28", "topic": "Emulsion / soap / detergent cleaners"}, {"q": "Which solvent emulsion cleaner is MORE effective for heavy-duty application but also tends to soften paint and requires care around rubber and plastics?", "options": ["Nonphenolic solvent emulsion cleaner", "Water emulsion cleaner (MIL-C-22543A)", "Nonionic detergent cleaner", "Phenolic-base solvent emulsion cleaner"], "correct": 3, "short": "Phenolic-base solvent emulsion cleaner", "expl": "The phenolic-base solvent emulsion cleaner is more effective for heavy-duty application but tends to soften paint coatings and must be used with care around rubber, plastics, or other nonmetallic materials. Wear rubber gloves and goggles.", "cite": "FAA-H-8083-30B, p. 8-28", "topic": "Emulsion / soap / detergent cleaners"}, {"q": "The water emulsion cleaning compound under Specification MIL-C-22543A is safe for use on what?", "options": ["Both painted and unpainted surfaces, including fluorescent-painted surfaces and acrylics", "Only bare metal", "Only fabric surfaces", "Only the oxygen system"], "correct": 0, "short": "Painted/unpainted, fluorescent, acrylics", "expl": "MIL-C-22543A water emulsion cleaner is intended for both painted and unpainted aircraft surfaces, is acceptable for fluorescent-painted surfaces, and is safe on acrylics, though properties vary so a sample application must be checked first.", "cite": "FAA-H-8083-30B, p. 8-28", "topic": "Emulsion / soap / detergent cleaners"}, {"q": "An OIL-SOLUBLE nonionic detergent cleaner is effective at what concentration in dry cleaning solvent for softening heavy preservative coatings?", "options": ["1 to 2 percent", "3 to 5 percent", "10 to 15 percent", "20 to 25 percent"], "correct": 1, "short": "3 to 5 percent in dry cleaning solvent", "expl": "The oil-soluble nonionic detergent cleaner is effective in a 3 to 5 percent solution in dry cleaning solvent for softening and removing heavy preservative coatings, with performance similar to emulsion cleaners.", "cite": "FAA-H-8083-30B, p. 8-28", "topic": "Emulsion / soap / detergent cleaners"}, {"q": "The introduction of nonwoven abrasive pads gave the AMT a clean, inexpensive material for what?", "options": ["Anodizing surfaces", "Painting", "Removal of corrosion products and other light abrasive needs", "Welding flux removal only"], "correct": 2, "short": "Removing corrosion / light abrasive needs", "expl": "Nonwoven abrasive pads give a clean, inexpensive material for removing corrosion products and other light abrasive needs. They can be used on most metals (but the same pad must not be used on different metals) and are generally the first choice.", "cite": "FAA-H-8083-30B, p. 8-28", "topic": "Abrasives & mechanical cleaning"}, {"q": "Aluminum metal polish is used to produce a high luster on unpainted aluminum clad surfaces but must NOT be used on what?", "options": ["Bare steel", "Magnesium castings", "Titanium", "Anodized surfaces"], "correct": 3, "short": "Not on anodized surfaces", "expl": "Aluminum metal polish produces a high, long-lasting luster on unpainted aluminum clad surfaces but must not be used on anodized surfaces, because it removes the oxide coat.", "cite": "FAA-H-8083-30B, p. 8-28", "topic": "Abrasives & mechanical cleaning"}, {"q": "Powdered pumice is used for what?", "options": ["Cleaning corroded aluminum surfaces", "Stripping paint", "Polishing titanium", "Neutralizing battery acid"], "correct": 0, "short": "Cleaning corroded aluminum", "expl": "Powdered pumice can be used for cleaning corroded aluminum surfaces; similar mild abrasives may also be used. Impregnated cotton wadding is used to remove exhaust gas stains and polish corroded aluminum.", "cite": "FAA-H-8083-30B, p. 8-28", "topic": "Abrasives & mechanical cleaning"}, {"q": "Which abrasive paper, 300 grit or finer, is described as safe to use on most surfaces?", "options": ["Carborundum (silicon carbide) paper", "Aluminum oxide paper", "Emery paper", "Crocus cloth"], "correct": 1, "short": "Aluminum oxide paper, 300 grit or finer", "expl": "Aluminum oxide paper, 300 grit or finer, is available in several forms and is safe to use on most surfaces. Abrasive papers must not contain sharp or needle-like abrasives that imbed in the base metal.", "cite": "FAA-H-8083-30B, p. 8-28", "topic": "Abrasives & mechanical cleaning"}, {"q": "Why must CARBORUNDUM (silicon carbide) paper be avoided, particularly on aluminum or magnesium?", "options": ["It is too soft to cut", "It leaves an oily film", "Its sharp, hard grains penetrate and bury themselves, even in steel surfaces", "It is flammable"], "correct": 2, "short": "Sharp hard grains embed in the metal", "expl": "Avoid carborundum (silicon carbide) papers, particularly on aluminum or magnesium; the grain structure is sharp and so hard that individual grains penetrate and bury themselves, even in steel surfaces.", "cite": "FAA-H-8083-30B, p. 8-29", "topic": "Abrasives & mechanical cleaning"}, {"q": "The use of EMERY paper or CROCUS cloth on aluminum or magnesium can cause serious corrosion because of what?", "options": ["The chromium content of the abrasive", "Excessive heat generated", "Removal of the Alclad layer", "Imbedded iron oxide"], "correct": 3, "short": "Imbedded iron oxide", "expl": "The use of emery paper or crocus cloth on aluminum or magnesium can cause serious corrosion of the metal by imbedded iron oxide.", "cite": "FAA-H-8083-30B, p. 8-29", "topic": "Abrasives & mechanical cleaning"}, {"q": "Impregnated nylon webbing material is PREFERRED over aluminum wool for what?", "options": ["Removing corrosion products and stubborn paint films, and scuffing existing paint before touchup", "Stripping paint chemically", "Polishing windshields", "Cleaning the oxygen system"], "correct": 0, "short": "Removing corrosion / scuffing paint for touchup", "expl": "Three grades of aluminum wool are used for general cleaning of aluminum, but impregnated nylon webbing material is preferred over aluminum wool for removing corrosion products and stubborn paint films and for scuffing existing paint finishes prior to touchup.", "cite": "FAA-H-8083-30B, p. 8-28", "topic": "Abrasives & mechanical cleaning"}, {"q": "Why must chemical cleaners be used with great care on ASSEMBLED aircraft?", "options": ["They are too expensive", "Danger of entrapping corrosive materials in faying surfaces and crevices", "They evaporate too slowly", "They damage avionics"], "correct": 1, "short": "Entrapment in faying surfaces/crevices", "expl": "Chemical cleaners must be used with great care on assembled aircraft because of the danger of entrapping corrosive materials in faying surfaces and crevices. Materials used must be relatively neutral and easy to remove, and all residues must be removed.", "cite": "FAA-H-8083-30B, p. 8-29", "topic": "Chemical cleaners & neutralizing"}, {"q": "Soluble salts from chemical surface treatments (such as chromic acid or dichromate) can cause what problem if not fully removed?", "options": ["Loss of electrical bonding", "Excessive paint adhesion", "Liquefaction that promotes blistering in the paint coatings", "Hydrogen embrittlement"], "correct": 2, "short": "Paint blistering from salt residue", "expl": "Soluble salts from chemical surface treatments, such as chromic acid or dichromate treatment, liquefy and promote blistering in the paint coatings; all residues must be removed.", "cite": "FAA-H-8083-30B, p. 8-29", "topic": "Chemical cleaners & neutralizing"}, {"q": "Acid burns from a phosphoric-citric acid cleaner are neutralized by copious water washing followed by treatment with a diluted solution of what?", "options": ["Chromic acid", "Sodium dichromate", "Ammonia", "Baking soda (sodium bicarbonate)"], "correct": 3, "short": "Diluted baking soda (sodium bicarbonate)", "expl": "With phosphoric-citric acid cleaner, wear rubber gloves and goggles. Any acid burns are neutralized by copious water washing followed by treatment with a diluted solution of baking soda (sodium bicarbonate).", "cite": "FAA-H-8083-30B, p. 8-29", "topic": "Chemical cleaners & neutralizing"}, {"q": "Baking soda (sodium bicarbonate) may be used to neutralize acid deposits in which battery compartment, and to treat acid burns?", "options": ["Lead-acid battery compartments", "Nickel-cadmium battery compartments", "Oxygen system lines", "Hydraulic reservoirs"], "correct": 0, "short": "Lead-acid battery compartments", "expl": "Baking soda may be used to neutralize acid deposits in lead-acid battery compartments and to treat acid burns from chemical cleaners and inhibitors. (For ni-cad/alkaline battery spills, an acid such as boric is used instead -- baking soda is for ACID deposits.)", "cite": "FAA-H-8083-30B, p. 8-29", "topic": "Chemical cleaners & neutralizing"}];
const DRILL = [{"label": "4 conditions for electrochemical corrosion", "text": "anode (metal that corrodes), cathode (dissimilar conductive material), electrolyte (conductive liquid path), and electrical contact between anode and cathode (p. 8-3)"}, {"label": "Corrosion severity intervals", "text": "mild zone every 90 days / moderate every 45 days / severe every 15 days (p. 8-2)"}, {"label": "Filiform corrosion humidity", "text": "occurs at 78-90% relative humidity (slightly acidic surface); prevented by storage below 70% RH (p. 8-5)"}, {"label": "Stress-corrosion environments", "text": "salt water = high-strength steel & aluminum; methyl alcohol-HCl = titanium; moist air = magnesium (p. 8-7)"}, {"label": "Galvanic corrosion rate", "text": "SMALL anode + large cathode = rapid, severe; LARGE anode = slow, superficial (p. 8-9)"}, {"label": "Magnesium", "text": "most chemically active aircraft metal; hardest to protect; corrosion products occupy several times the original volume (p. 8-19)"}, {"label": "Highly stressed steel", "text": "chemical corrosion removers PROHIBITED without engineering authorization due to hydrogen embrittlement (p. 8-17)"}, {"label": "Blend-out ratio", "text": "corrosion dish-outs blended 20:1 length-to-depth; cleaned area width min 10x depth, length min 20x depth (pp. 8-15, 8-16)"}, {"label": "MEK flashpoint", "text": "about 24 degrees F (very active solvent / small-area paint stripper, toxic when inhaled) (p. 8-27)"}, {"label": "Aircraft cleaning solvent flashpoint", "text": "must be not less than 105 degrees F; Stoddard solvent flashes slightly above 105 degrees F (p. 8-27)"}, {"label": "Flash point bands", "text": "high flash point solvents 100-140 degrees F; Class I (low) flash point BELOW 100 degrees F = NOT for cleaning; aliphatic naphtha ~80 degrees F (pp. 8-25, 8-27)"}, {"label": "Chromic acid inhibitor", "text": "10% chromic acid by weight + a small amount of sulfuric acid; treat exposed/corroded aluminum (also magnesium); paint same day (p. 8-22)"}, {"label": "Cabin flammable-vapor threshold", "text": "emergency revision of operations when vapors exceed 25% of lower flammability limit, measured 5 feet from point of use (p. 8-26)"}, {"label": "Oxygen system cleaning", "text": "anhydrous ethyl alcohol or isopropyl alcohol ONLY; never anything that leaves an oily film; no fluids in tanks/regulators (p. 8-27)"}, {"label": "Dissimilar metal joints", "text": "min 2 coats zinc chromate or epoxy primer (air dry 6 hr between coats); magnesium joints add 0.003-inch vinyl tape, or 3+ primer coats above 250 degrees F (p. 8-20)"}];

const QUIZ = {
  order:[], i:0, score:0, answered:0, missed:[], shuffle:false,

  init(){
    document.getElementById('startmeta').innerHTML =
      '<b>'+DATA.length+'</b> questions &nbsp;·&nbsp; instant feedback &nbsp;·&nbsp; every answer cited';
    const t=document.getElementById('shuffleToggle');
    t.onclick=()=>{ this.shuffle=!this.shuffle; t.classList.toggle('on',this.shuffle); };
  },

  start(){
    this.order = DATA.map((_,k)=>k);
    if(this.shuffle){ for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('start').style.display='none';
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  retake(missedOnly){
    if(missedOnly && this.missed.length){ const m=this.missed.slice(); this.order=m; }
    else { this.order = DATA.map((_,k)=>k); if(this.shuffle){for(let j=this.order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[this.order[j],this.order[k]]=[this.order[k],this.order[j]];}} }
    this.i=0; this.score=0; this.answered=0; this.missed=[];
    document.getElementById('results').style.display='none';
    document.getElementById('quiz').style.display='block';
    this.render();
  },

  render(){
    const idx=this.order[this.i], q=DATA[idx];
    const total=this.order.length;
    document.getElementById('counter').textContent = 'Q'+(this.i+1)+' of '+total;
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('progfill').style.width = (this.i/total*100)+'%';
    let opts='';
    q.options.forEach((o,li)=>{
      const L='ABCD'[li];
      opts += '<button class="opt" data-li="'+li+'" onclick="QUIZ.pick('+li+')">'+
              '<span class="L">'+L+'</span><span class="T">'+esc(o)+'</span><span class="mark"></span></button>';
    });
    document.getElementById('cardmount').innerHTML =
      '<div class="card"><span class="tag">'+esc(q.topic)+'</span>'+
      '<div class="stem">'+esc(q.q)+'</div>'+
      '<div class="opts" id="opts">'+opts+'</div>'+
      '<div class="fb" id="fb"></div></div>';
    document.getElementById('nextbtn').disabled = true;
    document.getElementById('skipbtn').style.display = '';
    this.locked=false;
  },

  pick(li){
    if(this.locked) return;
    this.locked=true;
    const idx=this.order[this.i], q=DATA[idx];
    const wrapEl=document.getElementById('opts'); wrapEl.classList.add('locked');
    const btns=wrapEl.querySelectorAll('.opt');
    const ok = (li===q.correct);
    btns.forEach(b=>{
      const bl=+b.dataset.li;
      if(bl===q.correct){ b.classList.add('correct'); b.querySelector('.mark').textContent='✓'; }
      if(bl===li && !ok){ b.classList.add('wrong'); b.querySelector('.mark').textContent='✗'; }
    });
    this.answered++;
    if(ok) this.score++; else this.missed.push(idx);
    const fb=document.getElementById('fb');
    fb.className='fb show '+(ok?'ok':'no');
    fb.innerHTML = '<div class="verdict">'+(ok?'✓ Correct':'✗ Incorrect')+'</div>'+
      '<div class="ans">Answer: '+'ABCD'[q.correct]+'. '+esc(q.short)+'</div>'+
      '<div class="expl">'+esc(q.expl)+'</div>'+
      '<div class="cite">📖 '+esc(q.cite)+'</div>';
    document.getElementById('scorelbl').textContent = 'Score '+this.score+'/'+this.answered;
    document.getElementById('nextbtn').disabled = false;
    document.getElementById('skipbtn').style.display = 'none';
  },

  next(skip){
    if(skip && !this.locked){ /* skipped, not answered */ }
    this.i++;
    if(this.i >= this.order.length){ this.finish(); return; }
    this.render();
    window.scrollTo({top:0,behavior:'smooth'});
  },

  finish(){
    document.getElementById('quiz').style.display='none';
    const R=document.getElementById('results');
    const total=this.answered;
    const pct = total? Math.round(this.score/total*100):0;
    const pass = pct>=70;
    let miss='';
    if(this.missed.length){
      miss='<h3 style="text-align:left;font-size:16px;color:var(--navy);margin:22px 0 8px;">Review your '+this.missed.length+' missed:</h3><div class="misslist">';
      this.missed.forEach(idx=>{ const q=DATA[idx];
        miss+='<div class="missitem"><div class="mq">'+esc(q.q)+'</div>'+
              '<div class="ma"><b>'+'ABCD'[q.correct]+'. '+esc(q.short)+'</b> — '+esc(q.expl)+'</div>'+
              '<div class="mc">📖 '+esc(q.cite)+'</div></div>';
      });
      miss+='</div>';
    } else {
      miss='<div class="allright">🎯 Perfect — every question correct!</div>';
    }
    let drillHtml='';
    if(DRILL && DRILL.length){
      drillHtml='<details class="drill"><summary>📌 High-Yield Drill Box ('+DRILL.length+' must-know facts)</summary>';
      DRILL.forEach(d=>{ drillHtml+='<div class="drillrow"><b>'+esc(d.label)+':</b> '+esc(d.text)+'</div>'; });
      drillHtml+='</details>';
    }
    R.innerHTML =
      '<h1>'+(pass?'Nice work 👍':'Keep grinding 💪')+'</h1>'+
      '<div class="bigscore">'+this.score+'<small>/'+total+'</small></div>'+
      '<div class="pct '+(pass?'pass':'fail')+'">'+pct+'%  '+(pass?'· passing (≥70%)':'· below 70%')+'</div>'+
      '<div class="nav" style="max-width:430px;margin:0 auto 4px;">'+
        '<button class="btn primary" onclick="QUIZ.retake(false)">Retake all</button>'+
        (this.missed.length?'<button class="btn ghost" onclick="QUIZ.retake(true)">Retake missed only</button>':'')+
      '</div>'+
      miss + drillHtml;
    R.style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  }
};

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('quiz').style.display==='none') return;
  const k=e.key.toLowerCase();
  if(['a','b','c','d'].includes(k)) QUIZ.pick('abcd'.indexOf(k));
  else if(['1','2','3','4'].includes(k)) QUIZ.pick(+k-1);
  else if(e.key==='Enter' && !document.getElementById('nextbtn').disabled) QUIZ.next();
});

QUIZ.init();
</script>
</body>
